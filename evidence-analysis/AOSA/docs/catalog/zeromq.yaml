project_name: "ZeroMQ"
source: "AOSA"
source_url: "https://aosabook.org/en/v2/zeromq.html"
project_url: "https://github.com/zeromq/libzmq"
evidence_type: "book-chapter"
aosa_volume: 2
aosa_chapter_authors: ["Martin Sústrik"]
year_described: 2012
domain: "Messaging / Distributed Systems"
architecture_styles:
  - "Broker-less Messaging"
  - "Pipeline"
  - "Actor Model (socket-as-actor)"
key_technologies:
  - "C / C++"
  - "TCP"
  - "IPC (inter-process communication)"
  - "inproc (in-process)"
  - "PGM (multicast)"
  - "Lock-free queues"
quality_attributes:
  - "Performance"
  - "Scalability"
  - "Low Latency"
  - "Simplicity (API)"
production_scale: "Widely used in financial trading systems, scientific computing, and distributed applications requiring millions of messages per second"
notable_strengths:
  - "Broker-less architecture eliminates the central bottleneck — sockets connect directly peer-to-peer"
  - "Socket abstraction provides messaging patterns (PUB/SUB, REQ/REP, PUSH/PULL, PAIR) as first-class concepts"
  - "Lock-free algorithms for inter-thread communication achieve near-zero overhead"
  - "Batching and adaptive batching algorithms optimize throughput vs. latency tradeoff"
  - "Transport-agnostic: same API works across TCP, IPC, inproc, and multicast"
  - "Clean object model with strict ownership semantics — each object belongs to exactly one thread"
notable_gaps:
  - "No built-in message persistence or durability (by design — it's a transport layer)"
  - "No broker means no centralized message routing, discovery, or guaranteed delivery"
  - "Debugging distributed ZeroMQ systems is challenging due to the broker-less topology"
one_line_summary: "A broker-less messaging library that provides high-level socket abstractions (PUB/SUB, REQ/REP, PUSH/PULL) over lock-free queues and transport-agnostic connections, optimized for millions of messages per second with zero central bottleneck."
