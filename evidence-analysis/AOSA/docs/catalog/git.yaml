project_name: "Git"
source: "AOSA"
source_url: "https://aosabook.org/en/v2/git.html"
project_url: "https://github.com/git/git"
evidence_type: "book-chapter"
aosa_volume: 2
aosa_chapter_authors: ["Susan Potter"]
year_described: 2012
domain: "Version Control / Developer Tools"
architecture_styles:
  - "Content-Addressable Storage"
  - "Directed Acyclic Graph (DAG)"
key_technologies:
  - "C"
  - "SHA-1 (content addressing)"
  - "zlib (compression)"
  - "packfiles"
  - "Unix filesystem"
quality_attributes:
  - "Performance"
  - "Data Integrity"
  - "Distributed Operation"
  - "Simplicity (of data model)"
production_scale: "Used by virtually every software team worldwide; GitHub alone hosts 400M+ repositories"
notable_strengths:
  - "Content-addressable object store: every object (blob, tree, commit, tag) is identified by its SHA-1 hash, providing inherent integrity verification"
  - "Immutable data model — objects are never modified, only new ones created, enabling safe concurrent access and trivial caching"
  - "DAG-based commit history enables powerful branching and merging with full distributed operation"
  - "Packfile compression dramatically reduces storage by delta-encoding similar objects"
  - "Clean separation between plumbing (low-level) and porcelain (user-facing) commands"
  - "Fully distributed: every clone is a complete repository with full history"
notable_gaps:
  - "Poor handling of large binary files (mitigated by Git LFS)"
  - "Steep learning curve due to powerful but complex command set"
  - "No built-in access control for sub-repository paths"
one_line_summary: "A distributed version control system built on a content-addressable object store and DAG-based commit history, where immutable SHA-1-addressed objects provide inherent data integrity and enable fully decentralized operation."
