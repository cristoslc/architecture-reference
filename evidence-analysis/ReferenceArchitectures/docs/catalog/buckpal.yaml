notable_strengths:
  - "Companion to 'Get Your Hands Dirty on Clean Architecture' book — deeply explained rationale for every structural decision"
  - "Ports and Adapters clearly separated: input ports (use cases), output ports (driven adapters), with no framework leaking into domain"
  - "Package structure mirrors hexagonal boundaries: adapter/in, adapter/out, application/port/in, application/port/out, domain"
  - "Demonstrates how to test each hexagonal layer independently: domain unit tests, use case tests with mocked ports, adapter integration tests"
  - "Deliberately minimal: avoids over-engineering to focus on the core hexagonal pattern"
notable_gaps:
  - "Very simple domain (send money between accounts) — no complex business rules"
  - "No event-driven patterns, messaging, or distributed system concerns"
  - "No CI/CD configuration"
one_line_summary: "A deliberately minimal Java/Spring Boot Hexagonal Architecture reference with clear ports-and-adapters package structure, companion to the 'Get Your Hands Dirty on Clean Architecture' book."
