# Reference Architectures Evidence Catalog Schema
# =================================================
# For curated open-source reference implementations that demonstrate
# specific architecture patterns with working code.
#
# Key differences from TheKataLog schema:
#   - No competition fields (placement, season, kata_challenge)
#   - Adds: source, source_url, project_url, evidence_type, domain, language
#   - architecture_styles uses the same normalized vocabulary as TheKataLog
#
# Required fields:
#   project_name, source, project_url, evidence_type, architecture_styles,
#   one_line_summary
#
# Optional fields:
#   source_url, domain, language, github_stars_approx,
#   key_technologies, quality_attributes, diagram_types,
#   notable_strengths, notable_gaps, has_running_code,
#   has_tests, has_ci_cd, has_documentation, has_adr,
#   maintained_as_of, year_created

# --- Example entry ---
# project_name: "eShopOnContainers"
# source: "ReferenceArchitectures"
# project_url: "https://github.com/dotnet-architecture/eShopOnContainers"
# evidence_type: "reference-implementation"
# domain: "E-Commerce"
# language: "C#"
# github_stars_approx: 24000
# architecture_styles:
#   - "Microservices"
#   - "Event-Driven"
#   - "Domain-Driven Design"
#   - "CQRS"
# key_technologies: [...]
# quality_attributes: [...]
# has_running_code: true
# has_tests: true
# has_ci_cd: true
# has_documentation: true
# has_adr: false
# notable_strengths: [...]
# notable_gaps: [...]
# one_line_summary: "..."
