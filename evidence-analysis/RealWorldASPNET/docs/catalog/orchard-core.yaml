notable_strengths:
  - "True modular monolith: the entire CMS is composed of independent modules (features) that can be enabled/disabled per tenant at runtime"
  - "Multi-tenancy with per-tenant module activation: a single deployment hosts multiple isolated sites with independent content, themes, and enabled features"
  - "YesSql provides document-database semantics (schemaless content storage) on top of relational databases (SQL Server, PostgreSQL, MySQL, SQLite) — combining NoSQL flexibility with SQL reliability"
  - "Content type system: types are composed from reusable parts and fields at runtime without code deployment"
  - "Module isolation via ASP.NET Core application parts: each module is a self-contained unit with its own controllers, views, assets, and migrations"
  - "NuGet-based module distribution: modules are standard NuGet packages, leveraging existing .NET infrastructure"
  - "Liquid template engine provides safe, sandboxed rendering (no arbitrary code execution in templates)"
  - "Recipes system: declarative JSON-based setup scripts for reproducible site configuration"
notable_gaps:
  - "Single-process deployment model: all tenants share resources; a resource-heavy tenant affects others"
  - "YesSql abstraction adds a layer of indirection that can make query debugging harder than direct ORM usage"
  - "Learning curve for the module/feature/tenant interaction model"
  - "Smaller ecosystem than WordPress or headless CMS alternatives"
one_line_summary: "A modular monolith CMS where independently activatable modules compose the entire application, with per-tenant feature isolation, document-over-SQL storage via YesSql, runtime content type composition, and NuGet-based module distribution."
