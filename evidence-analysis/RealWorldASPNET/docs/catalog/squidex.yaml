notable_strengths:
  - "Full CQRS + Event Sourcing in production: every state change is stored as an immutable event, enabling complete audit trail and temporal queries"
  - "MongoDB as both event store and read model store — pragmatic choice that avoids separate infrastructure for projections"
  - "Event-sourced content versioning: all content changes are events, enabling undo/redo, version comparison, and content scheduling"
  - "Multi-tenant architecture with per-app isolation: a single Squidex instance serves multiple independent content apps"
  - "Dual API: GraphQL for flexible content delivery queries, REST for management operations and content mutations"
  - "Scripting engine allows custom validation and transformation rules on content changes"
  - "Rule system triggers external actions (webhooks, Algolia sync, Elasticsearch indexing) based on content events"
  - "Optional Orleans integration for distributed clustering and virtual actor model"
notable_gaps:
  - "Event store on MongoDB means no built-in event stream subscriptions like EventStoreDB provides — projections are custom-built"
  - "Event sourcing adds storage growth over time; requires snapshot strategies for aggregates with long event histories"
  - "Angular admin UI is monolithic and heavy; less flexibility for custom admin experiences"
  - "Community is smaller than competing headless CMS options (Strapi, Contentful) limiting ecosystem"
one_line_summary: "A headless CMS built on CQRS + Event Sourcing with MongoDB, where every content change is an immutable event enabling full audit trails, versioning, and event-triggered integrations — the most complete production CQRS/ES implementation in the .NET open-source ecosystem."
