# RealWorldASPNET Evidence Catalog Schema
# =========================================
# Production ASP.NET Core applications curated from
# github.com/nathancolgate/real-world-aspnetcore
#
# These are real, deployed, production-grade open-source applications
# (not templates or educational projects). They receive the highest
# evidence weight (6 pts) because they demonstrate patterns proven
# at production scale with real users.
#
# Required fields:
#   project_name, source, source_url, project_url, evidence_type,
#   architecture_styles, one_line_summary
#
# Optional fields:
#   domain, language, github_stars_approx, year_created,
#   maintained_as_of, key_technologies, quality_attributes,
#   production_scale, has_running_code, has_tests, has_ci_cd,
#   has_documentation, has_plugin_system,
#   notable_strengths, notable_gaps

# --- Example entry ---
# project_name: "Squidex"
# source: "RealWorldASPNET"
# source_url: "https://github.com/nathancolgate/real-world-aspnetcore"
# project_url: "https://github.com/Squidex/squidex"
# evidence_type: "production-application"
# domain: "Headless CMS"
# language: "C#"
# architecture_styles:
#   - "CQRS"
#   - "Event Sourcing"
# ...
