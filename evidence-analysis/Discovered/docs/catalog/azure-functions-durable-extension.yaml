one_line_summary: "A NuGet plugin that extends the Azure Functions host with stateful, event-sourced workflow orchestration, virtual actor entities, and elastic serverless scaling via a swappable storage backend."
classification_reasoning: "The repository is the Azure Functions Durable Extension — a plugin that extends the Azure Functions (WebJobs) host with stateful orchestration capabilities. The dominant architectural style is Microkernel: `DurableTaskExtension` implements `IExtensionConfigProvider` (the Azure Functions plugin contract), is stamped with `[Extension(\"DurableTask\")]`, and registers three trigger binding rules (OrchestrationTrigger, ActivityTrigger, EntityTrigger) at startup. The storage backend is fully pluggable via `IDurabilityProviderFactory`, with Azure Storage as the default and Netherite/MSSQL as optional third-party adapters. Six additional adapter interfaces (ILifeCycleNotificationHelper, IDurableHttpMessageHandlerFactory, IMessageSerializerSettingsFactory, IErrorSerializerSettingsFactory, ITelemetryActivator, IDurableClientFactory) expose further customisation points without modifying the core — a textbook plugin architecture. The secondary Event-Driven style is evidenced by the Durable Task Framework's event-sourced, history-replay execution model: orchestrators run by replaying HistoryEvent sequences, expose WaitForExternalEvent<T>() for external signal receipt, and participate in a gRPC WorkItem stream (orchestrator_service.proto) carrying OrchestratorRequest / ActivityRequest / EntityBatchRequest messages. Lifecycle events are published to Azure Event Grid via EventGridLifeCycleNotificationHelper. The tertiary Serverless style is supported by the extension implementing IScaleMonitorProvider and ITargetScalerProvider so that Azure Functions' ScaleController can scale worker instances from zero to N; the extension ships as NuGet packages and extension bundles with no persistent server process. Previous classification (Microkernel + Hexagonal Architecture) was partially correct but overstated the Hexagonal label — the storage port pattern is a single adapter family within a larger Microkernel structure, and Event-Driven and Serverless are more precisely the secondary styles."
