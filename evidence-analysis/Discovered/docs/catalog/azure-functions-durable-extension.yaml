review_notes: README states this is an 'extension for Azure Functions' adding orchestrator, activity, and entity functions. Core project (src/WebJobs.Extensions.DurableTask/) contains Bindings/ with OrchestrationTriggerAttributeBindingProvider.cs, ActivityTriggerAttributeBindingProvider.cs, EntityTriggerAttributeBindingProvider.cs - these are Azure Functions trigger bindings, confirming Serverless architecture. Listener/ directory contains TaskOrchestrationShim.cs, TaskActivityShim.cs, TaskEntityShim.cs implementing the function dispatch model. EntityScheduler/ implements actor-model entities with RequestMessage.cs, ResponseMessage.cs, MessageSorter.cs - event-driven message passing. EventGridLifeCycleNotificationHelper.cs integrates with Azure Event Grid for lifecycle events. Grpc/Protos/orchestrator_service.proto enables out-of-process function communication. Storage/ abstracts Azure Storage backends (Blob, Queue, Table). The csproj depends on Microsoft.Azure.DurableTask.Core and Microsoft.Azure.DurableTask.AzureStorage. Worker.Extensions.DurableTask provides the isolated worker model with DurableFunctionExecutor handling Orchestration, Activity, and Entity execution. Dockerfiles exist only in test/SmokeTests/ for CI, not production deployment. No ARCHITECTURE.md found.