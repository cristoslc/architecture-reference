classification_reasoning: "## Analysis\n\nThis repository is the **Azure Functions\
  \ Durable Extension** - a plugin that extends the Azure Functions runtime with stateful\
  \ orchestration capabilities. The architecture is fundamentally a **Microkernel\
  \ (Plugin)** pattern, with secondary Hexagonal Architecture characteristics for\
  \ its storage abstraction.\n\n### Primary Evidence: Microkernel (Plugin) Architecture\n\
  \n**1. Azure Functions Extension Contract Implementation**\n\nThe core `DurableTaskExtension`\
  \ class implements `IExtensionConfigProvider` - the Azure Functions plugin contract:\n\
  \n```csharp\n[Extension(\"DurableTask\", \"DurableTask\")]\npublic class DurableTaskExtension\
  \ :\n    IExtensionConfigProvider,\n    IDisposable,\n    IAsyncConverter<HttpRequestMessage,\
  \ HttpResponseMessage>,\n    INameVersionObjectManager<TaskOrchestration>,\n   \
  \ INameVersionObjectManager<TaskActivity>\n```\n(`src/WebJobs.Extensions.DurableTask/DurableTaskExtension.cs:37-43`)\n\
  \n**2. Auto-Registration via Startup Classes**\n\nThe extension uses assembly-level\
  \ attributes for auto-registration with the host:\n\n```csharp\n[assembly: WebJobsStartup(typeof(DurableTaskWebJobsStartup))]\n\
  \ninternal class DurableTaskWebJobsStartup : IWebJobsStartup\n{\n    public void\
  \ Configure(IWebJobsBuilder builder)\n    {\n        builder.AddDurableTask();\n\
  \    }\n}\n```\n(`src/WebJobs.Extensions.DurableTask/DurableTaskWebJobsStartup.cs`)\n\
  \nA separate startup for the isolated worker model:\n```csharp\n[assembly: WorkerExtensionStartup(typeof(DurableTaskExtensionStartup))]\n\
  ```\n(`src/Worker.Extensions.DurableTask/DurableTaskExtensionStartup.cs`)\n\n**3.\
  \ Dynamic Function Registration**\n\nThe extension registers user functions dynamically\
  \ at runtime through binding rules:\n\n```csharp\nvoid IExtensionConfigProvider.Initialize(ExtensionConfigContext\
  \ context)\n{\n    // ...\n    var rule = context.AddBindingRule<DurableClientAttribute>()\n\
  \        .BindToInput<DurableClient>(...\");\n    // ...\n    context.AddBindingRule<OrchestrationTriggerAttribute>()\n\
  \        .BindToTrigger(...);\n    context.AddBindingRule<ActivityTriggerAttribute>()\n\
  \        .BindToTrigger(...);\n    context.AddBindingRule<EntityTriggerAttribute>()\n\
  \        .BindToTrigger(...);\n}\n```\n(`src/WebJobs.Extensions.DurableTask/DurableTaskExtension.cs:372-451`)\n\
  \nFunctions are registered via:\n- `RegisterOrchestrator(FunctionName, RegisteredFunctionInfo)`\
  \ (line 1194)\n- `RegisterActivity(FunctionName, ITriggeredFunctionExecutor)` (line\
  \ 1232)\n- `RegisterEntity(FunctionName, RegisteredFunctionInfo)` (line 1268)\n\n\
  **4. Shim Pattern for Multi-Language Support**\n\nThe extension adapts user functions\
  \ (in any language) to the Durable Task Framework core:\n\n```csharp\ninternal class\
  \ TaskOrchestrationShim : TaskCommonShim\n{\n    private readonly DurableOrchestrationContext\
  \ context;\n    // Delegates execution to registered function\n}\n```\n(`src/WebJobs.Extensions.DurableTask/Listener/TaskOrchestrationShim.cs`)\n\
  \n### Secondary Evidence: Hexagonal Architecture (Storage Ports)\n\n**Pluggable\
  \ Storage Backend Pattern**\n\nThe extension defines a clear port interface for\
  \ storage backends:\n\n```csharp\npublic interface IDurabilityProviderFactory\n\
  {\n    string Name { get; }\n    DurabilityProvider GetDurabilityProvider();\n \
  \   DurabilityProvider GetDurabilityProvider(DurableClientAttribute attribute);\n\
  }\n```\n(`src/WebJobs.Extensions.DurableTask/IDurabilityProviderFactory.cs:11-53`)\n\
  \nMultiple storage adapters:\n- **Azure Storage** (`AzureStorageDurabilityProviderFactory`)\
  \ - default\n- **MSSQL** (`Microsoft.DurableTask.SqlServer.AzureFunctions` package)\n\
  - **Netherite** (`Microsoft.Azure.DurableTask.Netherite.AzureFunctions` package)\n\
  - **Emulator** (`EmulatorDurabilityProviderFactory`) - for testing\n\n```csharp\n\
  public DurableTaskExtension(\n    IEnumerable<IDurabilityProviderFactory> orchestrationServiceFactories,\
  \ // Injected plugins\n    ...)\n```\n\nTest projects demonstrate multiple backends:\n\
  ```xml\n<PackageReference Include=\"Microsoft.DurableTask.SqlServer.AzureFunctions\"\
  \ Version=\"1.5.1\" />\n<PackageReference Include=\"Microsoft.Azure.DurableTask.Netherite.AzureFunctions\"\
  \ Version=\"3.1.0\" />\n```\n(`test/SmokeTests/BackendSmokeTests/MSSQL/MSSQL.csproj`,\
  \ `Netherite.csproj`)\n\n**Additional Plugin Points (Adapters):**\n- `ILifeCycleNotificationHelper`\
  \ - lifecycle event notifications\n- `IDurableHttpMessageHandlerFactory` - HTTP\
  \ handler customization\n- `ITelemetryActivator` - distributed tracing integration\n\
  - `IMessageSerializerSettingsFactory` / `IErrorSerializerSettingsFactory` - serialization\
  \ customization\n- `IDurableClientFactory` - client creation customization\n\n###\
  \ What This Is NOT\n\n- **NOT Layered Architecture**: There's no horizontal layering\
  \ (presentation/business/data). This is a plugin library with vertical extension\
  \ points.\n\n- **NOT Microservices**: This is a single extension library deployed\
  \ as a NuGet package, not multiple independently deployable services.\n\n- **NOT\
