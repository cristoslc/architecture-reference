one_line_summary: "A Rails-based open-source e-commerce platform structured as a Modular Monolith of cooperating Rails Engines, with a Microkernel plugin registry for swappable strategies and an in-process Omnes event bus enabling decoupled cross-module integration."
classification_reasoning: "Solidus exhibits a three-style composition: Modular Monolith as primary, Microkernel as secondary, Event-Driven as tertiary.\n\nMODULAR MONOLITH (primary, 0.88): Solidus is a monorepo of Rails Engines packaged as gems — solidus_core, solidus_api, solidus_admin, solidus_backend, solidus_promotions, solidus_legacy_promotions, solidus_sample. All engines mount into a single Rails process, share one ActiveRecord database connection and schema, and communicate by directly calling Spree::* domain classes from core. Each engine uses isolate_namespace to prevent route/controller collisions and carries its own migrations, specs, routes, and assets. The promotions module demonstrates genuine replaceability (solidus_promotions substitutes solidus_legacy_promotions without touching solidus_core). No inter-component network communication or message brokers — pure in-process modular decomposition.\n\nMICROKERNEL (secondary, 0.82): Spree::Core::Environment maintains ClassConstantizer::Set registries for payment_methods, stock_splitters, and subscribers. Spree::AppConfiguration (backed by Spree::Preferences::Configuration) exposes ~30+ swappable class references: order_merger_class, order_mailer_class, carton_shipped_email_class, promotions.coupon_code_handler_class, stock.availability_validator_class, state_machines.order, and more. Spree::Core::EnvironmentExtension defines add_class_set and add_nested_class_set DSL methods that formalize extension points. Stock fulfillment uses a SplitterChain composing pluggable Splitter::Base subclasses (Backordered, ShippingCategory, Weight) registered at boot. Tax calculators, reimbursement types, permission sets, and search classes are all independently replaceable via configuration. This is a textbook Microkernel plugin contract over a stable core.\n\nEVENT-DRIVEN (tertiary, 0.72): Solidus uses the Omnes library for an internal publish/subscribe bus (Spree::Bus). Domain events published from model methods: order_finalized, order_canceled, order_emptied, order_recalculated, order_short_shipped (from Spree::Order), carton_shipped (from Spree::OrderShipping), reimbursement_reimbursed, reimbursement_errored (from Spree::Reimbursement). Subscriber classes (Omnes::Subscriber mixin) are registered into Spree::Config.environment.subscribers and wired to the bus at boot. The pattern enables cross-module integration without direct coupling — solidus_promotions subscribes to order_emptied without solidus_core importing any promotions code. Events are synchronous and in-process (no message broker), limiting the primary classification weight.\n\nRULED OUT - Layered: Rails MVC imposes horizontal layering within each engine, but the modular decomposition and plugin registry are the organizing architectural principles, not the layering.\n\nRULED OUT - Hexagonal Architecture: No ports/adapters. ActiveRecord models mix persistence and business logic. No infrastructure boundary inversion.\n\nRULED OUT - Domain-Driven Design: Rich domain model (~135 classes in core/app/models/spree/) but no explicit bounded contexts, aggregate roots, value objects, or domain events in the DDD sense.\n\nRULED OUT - Microservices/Service-Based: Single deployable process. All engines share one database. No inter-service network calls, no independent deployability per engine.\n\nRULED OUT - CQRS: No read-model/write-model separation. Standard ActiveRecord read and write paths throughout.\n\nQUALITY ATTRIBUTES evidence: Extensibility — ClassConstantizer::Set registries for payment methods, splitters, subscribers; 30+ swappable class references in AppConfiguration; Omnes bus for cross-module integration without direct imports. Replaceability — entire subsystems are swappable: promotions engine (solidus_promotions replaces solidus_legacy_promotions), admin UI (solidus_admin replacing solidus_backend), tax calculator, order merger, state machine class. Maintainability — gem packaging enforces module boundaries; separate migration trees per engine; comprehensive RSpec suite per engine with factory_bot support. Evolvability — Spree::Core::VersionedValue; explicit Spree.deprecator framework; load_defaults(version) mechanism lets applications pin to older behavior while upgrading incrementally. Testability — independent spec suite per engine; spree/testing_support module; factory_bot_rails fixtures. Observability — Spree::StateChange model + StateChangeTrackingJob; LogEntry model for payment gateway responses; Spree::Bus events carry domain context usable for audit/monitoring. Security — role-based Spree::PermissionSet classes; Spree::Ability RBAC; sensitive parameter filtering in engine initializer; credit card number/CVV scrubbed from logs via regex filters."
