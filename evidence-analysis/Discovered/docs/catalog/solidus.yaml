review_notes: 'Solidus is structured as a **Modular Monolith** organized through a
  multi-gem workspace. While it is built on Ruby on Rails (which dictates a **Layered**
  internal structure for each module), the high-level organization is defined by the
  separation of the system into distinct, semi-autonomous engines that work together
  within a single deployable context.


  ### Evidence of Modular Monolith

  The repository is split into several top-level directories, each functioning as
  an autonomous Ruby gem (Engine):

  - `/core`: Contains the essential domain models (`spree_core`), business logic,
  and migrations. It serves as the "kernel" of the system.

  - `/api`: (Referenced in README) Provides the RESTful interface.

  - `/admin` & `/backend`: Provide administrative interfaces.

  - `/legacy_promotions`: A feature-specific module separated from the core to manage
  technical debt and specific domain logic.


  These are not **Microservices** because they are designed to run within the same
  process, share a common database schema (seen in the shared `db/migrate` patterns
  across modules), and are typically required together in a single `Gemfile` to produce
  one Rails application. The README explicitly states: *"When you require the solidus
  gem... Bundler will install all of the following gems... All of the gems are designed
  to work together."*'
