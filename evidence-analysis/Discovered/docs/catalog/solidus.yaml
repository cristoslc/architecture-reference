review_notes: 'Strong modular monolith signals: 7 separate gemspecs (solidus_core,
  solidus_api, solidus_backend, solidus_admin, solidus_promotions, solidus_legacy_promotions,
  solidus_sample) each with its own Rails::Engine using isolate_namespace. Core README
  explicitly documents sub-systems: Order, User, Payment, Inventory, Shipments. All
  gems depend on solidus_core and share the Spree namespace database (58 migrations
  in core/db/migrate/). Internal event bus via Omnes (core/lib/spree/bus.rb) with
  pub/sub subscribers (core/app/subscribers/). Promotions subsystem extracted to separate
  swappable gem with own models/controllers. All modules deploy as a single Ruby process
  - not microservices despite multi-gem structure. Docker-compose is dev-only (databases
  + single app container).'
