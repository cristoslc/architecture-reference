classification_reasoning: "## Analysis\n\n### Primary: Microkernel (Plugin) Architecture\n\
  \nStrapi's most defining structural property is its plugin system. The `Strapi`\
  \ class (`packages/core/core/src/Strapi.ts`) extends a `Container` service-locator\
  \ that lazily resolves named factories. `providers/registries.ts` registers all\
  \ core registries at `init()` time. The loader in `loaders/` discovers both\
  \ `INTERNAL_PLUGINS` (content-manager, content-type-builder, email, upload, i18n,\
  \ content-releases, review-workflows) and user-configured external plugins.\n\n\
  Every plugin conforms to a well-defined lifecycle contract: `{ bootstrap, destroy,\
  \ register, config, routes, controllers, services, policies, middlewares, contentTypes\
  \ }`. The `applyUserExtension()` mechanism allows application developers to override\
  \ plugin schemas and inject custom `strapi-server.js` without forking core code.\n\
  \n`packages/providers/` contains swappable implementations for email (Amazon SES,\
  \ Mailgun, Sendgrid, Nodemailer, Sendmail) and upload (AWS S3, Cloudinary, local).\
  \ Providers expose an `init()` interface, enabling runtime replacement via config.\n\
  \nOn the frontend, `StrapiApp.tsx` exposes `registerPlugin()`, injection zones,\
  \ and hook overrides, mirroring the server-side plugin contract.\n\n### Secondary:\
  \ Layered Architecture\n\nWithin every plugin and the core, a consistent three-tier\
  \ layered structure is applied:\n- **HTTP / Routing** — `server/routes/`, `register-routes.ts`,\
  \ Koa middleware stack\n- **Controllers** — request/response shaping, sanitization,\
  \ validation\n- **Services** — domain operations, business rules\n- **Data** — `@strapi/database`\
  \ (Knex-backed entity-manager, query builder, schema sync)\n\nThe Document Service\
  \ (`services/document-service/`) wraps the deprecated Entity Service, adding Draft\
  \ & Publish state management, locale branching (i18n), component handling, and\
  \ relation bidirectionality logic. It exposes repository-style methods (`findMany`,\
  \ `create`, `update`, `publish`, `unpublish`, `discard`) that delegate to `strapi.db.query()`.\n\
  \nThe Core API (`core-api/controller/`, `core-api/service/`) auto-generates default\
  \ CRUD controllers and services for every user-defined content type.\n\n### Tertiary:\
  \ Event-Driven (in-process)\n\nStrapi embeds an internal EventHub (`services/event-hub.ts`)\
  \ implementing a pub/sub bus with named events (`entry.create`, `entry.update`,\
  \ `entry.delete`, `entry.publish`, `entry.unpublish`, `entry.draft-discard`). The\
  \ Document Service event manager (`services/document-service/events.ts`) emits\
  \ these events after the wrapping database transaction commits (`onCommit`), ensuring\
  \ consistent payloads. The Webhook Runner subscribes to the EventHub and routes\
  \ events to registered HTTP endpoints via an in-process `WorkerQueue` (concurrency\
  \ 5). A separate `lifecycles/` provider in `@strapi/database` handles lower-level\
  \ database operation hooks (timestamps, model-level subscribers).\n\n### What This\
  \ Is NOT\n\n**Not Microservices:** Single Node.js process, single database connection,\
  \ no service-to-service network communication. Monorepo packages are library modules\
  \ co-deployed into one process.\n\n**Not Modular Monolith:** Packages represent\
  \ framework components published separately to npm for extension, not bounded module\
  \ boundaries within a single deployable unit.\n\n**Not Hexagonal (Ports & Adapters):**\
  \ While the Container acts as a service locator and providers are swappable, controllers\
  \ access the global `strapi` singleton rather than injected port interfaces. Inbound\
  \ adapters are tied to Koa, not abstracted behind ports.\n\n### Conclusion\n\n\
  Strapi is a **Microkernel + Layered** system with a meaningful in-process **Event-Driven**\
  \ component. The core provides a minimal runtime, registry, and lifecycle surface;\
  \ all functional capabilities arrive as plugins conforming to a documented contract.\
  \ Inside plugin boundaries, a classic layered decomposition (routes → controllers\
  \ → services → database) provides familiar structure. The event system decouples\
  \ lifecycle side-effects (webhooks, hooks) from the mutation path without requiring\
  \ a message broker.\n\nConfidence is 0.92: the three-style combination is strongly\
  \ evidenced by direct source inspection of Container, EventHub, provider registries,\
  \ plugin loader, Document Service, and Webhook Runner."
