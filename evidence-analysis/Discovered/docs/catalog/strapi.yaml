classification_reasoning: "## Analysis\n\n### Primary: Microkernel (Plugin) Architecture\n\
  \nStrapi is fundamentally designed as a **plugin-based system** with a core runtime\
  \ that loads and orchestrates plugins at startup:\n\n**Plugin Loading Infrastructure:**\n\
  - `packages/core/core/src/loaders/plugins/index.ts` - Central plugin loader that\
  \ discovers, validates, and initializes plugins\n- `packages/core/core/src/registries/plugins.ts`\
  \ - Plugin registry with `add()`, `get()`, `getAll()` methods\n- Plugins declare\
  \ themselves via `strapi-server.js` entry point with a well-defined contract\n\n\
  **Plugin Contract (defaultPlugin in loaders/plugins/index.ts:18-32):**\n```javascript\n\
  const defaultPlugin = {\n  bootstrap() {},\n  destroy() {},\n  register() {},\n\
  \  config: { default: {}, validator() {} },\n  routes: [],\n  controllers: {},\n\
  \  services: {},\n  policies: {},\n  middlewares: {},\n  contentTypes: {},\n};\n\
  ```\n\n**Internal vs External Plugins:**\n- `INTERNAL_PLUGINS` list in `get-enabled-plugins.ts:36-44`\
  \ defines core plugins always loaded: content-manager, content-type-builder, email,\
  \ upload, i18n, content-releases, review-workflows\n- External plugins loaded from\
  \ `node_modules` or local paths via `plugins.js` config\n\n**Provider Extension\
  \ Pattern:**\n- `packages/providers/` contains swappable implementations (email-amazon-ses,\
  \ email-sendgrid, upload-aws-s3, upload-cloudinary)\n- Providers implement `init()`\
  \ interface, allowing runtime replacement\n\n**User Extension Mechanism:**\n- `applyUserExtension()`\
  \ function loads user overrides from `extensions/` directory\n- Users can override\
  \ plugin schemas and inject custom `strapi-server.js` to mutate plugin behavior\n\
  \n**Admin Panel Plugin System:**\n- `packages/core/admin/admin/src/StrapiApp.tsx`\
  \ - Admin-side plugin registration with `appPlugins`, `registerPlugin()`, injection\
  \ zones\n- `PluginsInitializer.tsx` - Orchestrates plugin initialization lifecycle\
  \ in the frontend\n\n### Secondary: Layered Architecture\n\nWithin each plugin and\
  \ the core, Strapi follows a traditional layered pattern:\n\n**MVC-style Organization:**\n\
  - **Routes Layer**: `packages/core/core/src/services/server/register-routes.ts`\
  \ - Route registration\n- **Controllers Layer**: `packages/core/core/src/registries/controllers.ts`\
  \ - Request handling\n- **Services Layer**: `packages/core/core/src/registries/services.ts`\
  \ - Business logic\n- **Data Layer**: `packages/core/database/` - Database abstraction\n\
  \n**Core API Structure (`packages/core/core/src/core-api/`):**\n```\ncore-api/\n\
  \  controller/    # Request handlers\n  routes/        # Route definitions\n  service/\
  \       # Business logic\n```\n\nEach plugin (e.g., `packages/plugins/i18n/server/src/`)\
  \ follows this same pattern with `controllers/`, `services/`, `routes/`, `content-types/`.\n\
  \n### What This Is NOT\n\n**Not Microservices:** Single Node.js process, single\
  \ database connection, no service-to-service communication. The monorepo packages\
  \ are library modules, not independent services.\n\n**Not Modular Monolith:** While\
  \ organized as packages, they don't represent enforced internal module boundaries\
  \ within a single deployable. They're framework components published separately\
  \ to npm, designed to be extended via plugins.\n\n**Not Hexagonal Architecture:**虽有\
  \ dependency injection (`Container` class), but lacks the ports-and-adapters separation.\
  \ Controllers directly access `strapi` global service locator rather than depending\
  \ on injected interfaces.\n\n**Not Domain-Driven Design:** Code is organized by\
  \ technical layer (controllers, services) within plugins, not by bounded context\
  \ with aggregates/entities/value objects.\n\n### Conclusion\n\nStrapi is a **plugin-based\
  \ CMS framework** where the core provides the runtime, registry, and extension points,\
  \ while plugins provide features. Users extend the system by installing plugins,\
  \ creating local plugins, or overriding plugin behavior through extensions. This\
  \ is the canonical Microkernel pattern: a minimal core with a rich plugin ecosystem."
