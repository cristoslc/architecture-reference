review_notes: 'Evidence from catalog: heuristic top candidate is Modular Monolith
  (score 0.70), 60 package_manifests signals suggest a monorepo with multiple internal
  packages (consistent with Strapi''s known architecture of core + plugins as npm
  packages), zero container_orchestration and zero messaging signals rule out Microservices
  and Event-Driven, zero infrastructure_as_code rules out Serverless. Strapi''s public
  architecture is well-known: a single deployable Node.js application with a plugins/extensions
  system and internal module boundaries — classic Modular Monolith. Layered (score
  0.4) is likely a secondary characteristic given the MVC-style controllers/services/repositories
  pattern typical of Strapi''s internals.'
