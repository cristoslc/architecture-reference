review_notes: '### Architecture Analysis


  Strapi is structured as a **Microkernel (Plugin)** architecture. The core system
  provides a minimal engine that manages the application lifecycle, while all functional
  domains (Authentication, Content-Management, Upload, Internationalization) are implemented
  as independent plugins that register themselves with the core.


  #### 1. Microkernel (Plugin) Style

  The most defining characteristic of Strapi''s architecture is its plugin system.
  As seen in `packages/core/strapi/package.json`, the main `@strapi/strapi` package
  acts as an orchestrator, pulling in multiple internal packages:

  - `@strapi/admin`: The dashboard UI.

  - `@strapi/content-manager`: Logic for managing data.

  - `@strapi/content-type-builder`: Logic for schema modification.

  - `@strapi/upload`, `@strapi/i18n`, `@strapi/permissions`: Functional extensions.'
