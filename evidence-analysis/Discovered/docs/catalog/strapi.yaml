review_notes: Strapi.ts extends Container (IoC) and bootstraps all modules in one
  process. packages/core/ has core framework (database, server, registries, services);
  packages/plugins/ has GraphQL, i18n, users-permissions etc; packages/providers/
  has email/upload providers. Registry pattern in registries/ manages content-types,
  controllers, services, policies, middlewares, hooks. core-api/ shows layered controller->service->entity-service->database.
  Koa-based HTTP server in services/server/ with middleware pipeline. docker-compose.dev.yml
  only runs databases for dev. Monorepo uses yarn workspaces + Nx + Lerna for build
  coordination but all packages compose into a single deployment unit.
