one_line_summary: "Official JetBrains reference app (\"Thinkter\") demonstrating a full-stack Kotlin microblogging application with a Ktor/JVM backend layered over H2 and a Kotlin/JS React frontend, deployed as two Gradle subprojects communicating over synchronous HTTP."
