review_notes: "Backend follows layered pattern: HTTP route handlers (Login.kt, Register.kt, PostThought.kt, etc.) -> DAO interface (ThinkterStorage) -> database implementation (ThinkterDatabase with H2). Model layer (atoms.kt, responses.kt) shared as data classes. Frontend is a separate Kotlin/JS SPA compiled via webpack with React wrappers, proxying to backend REST API on port 9090. Two Gradle subprojects (backend, frontend) in settings.gradle. No Docker, no event-driven patterns, no CQRS, no hexagonal ports/adapters. Single deployable backend with embedded H2 database. Archived repo (deprecated in favor of kotlin-full-stack-application-demo). Small demo project limits depth of architectural evidence but layered separation is clear."