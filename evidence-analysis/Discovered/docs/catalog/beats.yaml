one_line_summary: "A Microkernel framework (libbeat) hosting independently deployable data-shipper plugins (Filebeat, Metricbeat, etc.) that each process events through an explicit, ACK-backed Pipeline."
classification_reasoning: "The Beats repository is a textbook Microkernel architecture: libbeat
  is the core kernel providing plugin loading infrastructure (libbeat/plugin/plugin.go),
  the Beater interface contract (libbeat/beat/beat.go), and independent registries for
  outputs (output_reg.go), processors (processors/registry.go), and inputs. Each Beat
  (Filebeat, Metricbeat, Auditbeat, Heartbeat, Packetbeat, Winlogbeat) is a plugin
  that implements Beater and registers capabilities via init() functions. Within Metricbeat,
  a second plugin tier exists: modules self-register MetricSets via mb.Registry.MustAddMetricSet().
  Build-time plugin discovery uses code-generated blank imports so modules register via
  init() without modifying core. A community ecosystem of third-party Beats provides
  definitive proof of open extension. Pipeline is the co-primary style: every Beat routes
  events through libbeat/publisher/pipeline/ — Input -> Processors -> Queue (mem or disk)
  -> OutputController -> OutputClient — with typed stage interfaces (Queue, Producer, Batch,
  Client) and ACK backpressure for at-least-once delivery. The previous secondary classification
  of Layered is replaced by Pipeline because the publisher pipeline is an explicit, named
  runtime construct with its own interface contracts, not merely internal layering within
  a single component. Microservices and Modular Monolith are rejected: Beats do not communicate
  with each other and each is a separate binary, not a shared deployable. Hexagonal and DDD
  are rejected: no ports-and-adapters domain isolation or bounded contexts are present."
