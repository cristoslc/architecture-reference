review_notes: 'The Elastic Beats repository is a classic example of a **Microkernel
  (Plugin)** architecture, often referred to in the Go community as a "framework and
  implementation" pattern.


  ### 1. Primary Style: Microkernel (Plugin)

  The system is built around a core framework called `libbeat` (mentioned in the README
  and visible in the project structure), which serves as the "microkernel." This kernel
  provides common services required by all data shippers: configuration handling,
  output pipelines (Elasticsearch, Logstash), logging, and the publisher interface.


  Individual "Beats" (Filebeat, Metricbeat, etc.) act as **plugins** or extensions
  of this core. They implement a specific interface (typically the `Beater` interface)
  and are registered with the central framework.

  - **Plugin Separation:** Each Beat (e.g., `./metricbeat`, `./filebeat`) resides
  in its own top-level directory.

  - **Sub-Plugins:** Within a specific Beat, like `Metricbeat`, there is a second
  level of the plugin pattern. `metricbeat/module/` (e.g., `./metricbeat/module/docker`,
  `./metricbeat/module/redis`) contains individual modules that can be enabled/disabled
  at runtime via `.yml` files in `modules.d/`.

  - **Extension Points:** The README explicitly mentions that the community can create
  their own Beats using the `libbeat` framework, which is the hallmark of a Microkernel
  design where the core is extensible by third parties.'
