review_notes: "Evidence: README.md describes Coherence as 'a scalable, fault-tolerant, cloud-ready, distributed platform for building grid-based applications and reliably storing data' with data 'partitioned (or sharded) across a number of designated remote nodes.' prj/ contains 40+ Maven modules including coherence-core (PartitionedService, partition/ package with PartitionAssignmentStrategy, DistributionManager, PartitionEvent), coherence-concurrent (distributed locks, semaphores, executors, queues), coherence-grpc, coherence-rest. Space-Based: core architecture is a partitioned in-memory data grid with automatic data distribution across cluster members, NearCaches, ViewCaches, backup replication, partition-level transactions, and map/reduce aggregation -- textbook IMDG/space-based tuple-space pattern. Event-Driven: net/events/ package with EventInterceptor, EventDispatcher, MapListeners for async client notifications, partition transfer events, lifecycle events, federation change records, and distributed pub/sub topics (net/topic/ with Publisher/Subscriber). Not Microservices despite heuristic candidate -- this is a single distributed system/framework, not independently deployable services."