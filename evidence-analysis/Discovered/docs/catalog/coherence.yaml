one_line_summary: Oracle Coherence is a canonical Space-Based in-memory data grid
  that partitions data and co-locates compute with storage across cluster nodes, organized
  as a 38+ module Modular Monolith that shades into a single distribution JAR.
classification_reasoning: "Oracle Coherence is a textbook Space-Based Architecture\
  \ (primary) with Modular Monolith code organization (secondary).\n\n**Space-Based\
  \ (Primary):**\nAll seven hallmarks of the space-based style are present. The `DistributedCacheService`\
  \ + `PartitionedService` + `PartitionAssignmentStrategy` trinity implements the\
  \ canonical data-grid partition management model. `InvocableMap` (prj/coherence-core/src/main/java/com/tangosol/util/InvocableMap.java)\
  \ documents the defining inversion: code travels to data rather than data to client.\
  \ `EntryProcessor` and `InvocationService.Invocable` implement partition-local compute.\
  \ Parallel aggregations execute map/reduce across all storage partitions simultaneously.\
  \ `PagedTopicService` extends `DistributedCacheService` — pub/sub messaging is natively\
  \ inside the grid with no external broker. `coherence-concurrent` provides distributed\
  \ locks, semaphores, latches, and queues as grid primitives. Coherence*Extend proxy\
  \ and gRPC proxy decouple remote (polyglot) clients from internal grid topology.\n\
  \n**Modular Monolith (Secondary):**\n38+ Maven modules (coherence-core, coherence-core-components,\
  \ coherence-grpc, coherence-cdi, coherence-concurrent, coherence-hnsw, coherence-rag-parent,\
  \ etc.) with enforced dependency boundaries that compile and shade into a single\
  \ coherence.jar. No independently deployable service components within the platform;\
  \ each cluster member runs a single JVM with the full grid engine.\n\n**Event-Driven\
  \ (feature layer, not defining style):**\nMapListeners, EventInterceptors, partition\
  \ events, WAN federation events, and topic pub/sub are first-class features. They\
  \ operate as reactive notification mechanisms within the grid, not as the structural\
  \ organizing topology.\n\n**Rejected styles:** Microservices (no independently deployable\
  \ services; platform is used to build them), CQRS (no formal command/event sourcing\
  \ model), Hexagonal (no ports-and-adapters contracts), Microkernel (XML config and\
  \ pluggable strategies provide extensibility but not a minimal-kernel style)."
