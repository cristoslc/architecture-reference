review_notes: "README explicitly describes DDD with Event Storming, hexagonal architecture, and CQRS. Bounded contexts (lending, catalogue) separated by packages with ArchUnit enforcement (ModularArchitectureTest.java). Lending context uses model/application/infrastructure hexagonal layering enforced by LendingHexagonalArchitectureTest.java and NoSpringInDomainLogicTest.java. Rich aggregate design (Patron with PlacingOnHoldPolicy, AvailableBook/BookOnHold/CheckedOutBook type-state pattern). DomainEvents interface with both immediate (JustForwardDomainEventPublisher) and eventual (StoreAndForwardDomainEventPublisher) consistency. Separate CQRS read models: PatronProfileReadModel queries holds_sheet/checkouts_sheet tables, DailySheet for expiring holds and overdue checkouts. GitHub topics include ddd, hexagonal-architecture, ports-and-adapters, aggregate, event-storming. Org is ddd-by-examples."