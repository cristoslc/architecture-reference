review_notes: "Classic layered architecture. backend/app/api/routes/ (presentation/API layer with items.py, users.py, login.py, utils.py), backend/app/api/deps.py (dependency injection for auth and DB sessions), backend/app/crud.py (data access/service layer), backend/app/models.py (SQLModel ORM domain models: User, Item with Pydantic schemas), backend/app/core/ (cross-cutting: config.py, security.py, db.py). frontend/ is a separate React SPA with auto-generated API client (frontend/src/client/sdk.gen.ts from OpenAPI). compose.yml orchestrates infrastructure (db, backend, frontend, traefik) but this is a single monolithic backend, not microservices. No DDD patterns (no bounded contexts, aggregates, repositories). No hexagonal ports/adapters."