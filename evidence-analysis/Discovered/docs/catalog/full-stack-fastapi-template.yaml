classification_reasoning: "The primary organizing topology is Service-Based: compose.yml defines two separately-built application containers (backend FastAPI, frontend React/Nginx) sharing a single PostgreSQL database instance, with Traefik as the TLS-terminating reverse proxy. This matches the Service-Based pattern exactly — coarse-grained services collaborating over a shared data store, without independent data ownership or the operational complexity of Microservices. The backend internal structure is unambiguously Layered: api/routes/ (presentation), crud.py (data access), models.py (domain entities + Pydantic schemas), and core/ (infrastructure) form horizontal layers with clean unidirectional dependencies. Routes call crud functions; crud functions accept SQLModel Session objects and return ORM entities; no HTTP concerns bleed into crud.py and no database code appears in routes. A prestart service handles Alembic migrations before the backend starts, gated by a Docker healthcheck dependency. The frontend is a React SPA auto-generated against the backend's OpenAPI spec using openapi-ts, eliminating manual API contract work. Playwright covers E2E testing; pytest covers backend; GitHub Actions runs both in CI with staging and production deployment workflows. No message broker, no service mesh, no independent per-service databases, no plugin extension points — the classification is straightforward."
review_notes: "Service-Based is the correct primary style: two coarse-grained services (backend + frontend) share one PostgreSQL database, deployed via Docker Compose. The backend's internal horizontal layering (routes -> crud -> models -> core) qualifies as Layered secondary. This is a reference template (use_type: reference), not a production deployment — it provides an opinionated starting point that engineers fork, which accounts for the slightly lower scope compared to production applications. The previous entry listed Service-Based + Layered and this reclassification confirms both styles with updated metadata conforming to the SPEC-031 catalog-entry schema."
