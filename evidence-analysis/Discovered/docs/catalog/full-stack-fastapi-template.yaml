review_notes: 'Evidence from catalog: (1) Known public repo ''tiangolo/full-stack-fastapi-template''
  is a well-documented full-stack template with FastAPI backend (controllers/routers
  + services + models = layered), React/TypeScript frontend, and PostgreSQL — classic
  N-tier web stack. (2) 4 container_orchestration signals + 4 package_manifests suggest
  ~2-4 distinct service containers (frontend, backend, db, possibly proxy/traefik),
  fitting Service-Based rather than full Microservices. (3) No messaging signals (0)
  rules out Event-Driven. (4) No api_specs signals rules against formal Microservices
  contract patterns. (5) Score of 0.5 for Microservices in heuristic_candidates is
  likely a false positive from Docker presence alone — service count and lack of service
  discovery/API gateway config point to Service-Based. (6) FastAPI backends conventionally
  use routers → services → repositories/models layering, supporting Layered classification.'
