review_notes: 'This repository follows a traditional **Layered** architecture, which
  is the standard organizational pattern for FastAPI-based full-stack applications.
  While it uses Docker Compose to manage a suite of components (PostgreSQL, Traefik,
  Mailcatcher, Backend, Frontend), the internal code organization of the application
  logic itself is strictly partitioned into horizontal layers.


  ### Evidence of Layered Architecture:

  The backend (`/backend/app`) is structured by technical responsibility rather than
  functional domains:

  - **Presentation/API Layer**: `backend/app/api/` contains the routes and dependency
  injection logic (`deps.py`).

  - **Business Logic/Persistence Layer**: `backend/app/crud.py` acts as the data access/manipulation
  layer.

  - **Data Model Layer**: `backend/app/models.py` defines the SQLModel (SQLAlchemy
  + Pydantic) schemas and entities used across the application.

  - **Cross-Cutting Concerns**: `backend/app/core/` handles configuration, security
  (JWT), and database initialization.


  ### Why not other styles:'
