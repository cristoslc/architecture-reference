review_notes: "LLM review: CONTRIBUTING.md explicitly states 'organized as a monorepo' with modular packages. Core architecture is pipe-and-filter: ingestion/pipeline.py implements run_transformations() chaining TransformComponent sequences; query engines chain retrievers->postprocessors->response synthesizers; TransformQueryEngine wraps query engines with query transforms. The monorepo has llama-index-core as the central module with 25+ integration categories (llms, embeddings, vector_stores, readers, etc.) each as independently installable packages -- classic modular monolith with plugin architecture. 300+ integration packages on LlamaHub. Not classified as Multi-Agent despite agent support because the repo IS a data framework/toolkit, not an agent orchestration system itself."