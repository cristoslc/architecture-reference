review_notes: 'Repository structure under components/ and cmd/ shows 15+ services:
  (1) server — main backend orchestrator for workspace lifecycle and API requests;
  (2) ws-manager-mk2 — workspace instance creation, scheduling, lifecycle management;
  (3) ws-daemon — low-level workspace operations on worker nodes; (4) supervisor —
  runs inside workspace containers for IDE/tooling management; (5) ws-proxy —
  workspace port routing over HTTP/WebSocket; (6) image-builder-mk3 — container
  image building service (gRPC API); (7) registry-facade — Docker registry proxy;
  (8) content-service — workspace snapshots and content (gRPC API); (9) blobserve —
  blob content serving; (10) dashboard — React web UI; (11) ide-service — IDE
  backend coordination; (12) public-api-server — external REST API; (13) spicedb —
  authorization/permissions; (14) usage — metering service. Inter-service
  communication via gRPC (ws-manager ↔ ws-daemon, server ↔ image-builder, server ↔
  content-service), HTTP REST (dashboard ↔ server), and WebSocket (browser ↔
  ws-proxy). Workspace lifecycle: Dashboard → Server → Ws-Manager → Ws-Daemon →
  Image-Builder → Content-Service. Service-Based because 15+ coarse-grained
  services own distinct domain responsibilities and communicate via defined APIs.'
