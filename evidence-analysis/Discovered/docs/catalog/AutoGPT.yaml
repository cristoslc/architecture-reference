quality_attributes:
  deployability:
    present: true
    evidence: >
      Eight independently containerised services (rest_server, executor, copilot_executor,
      websocket_server, database_manager, scheduler_server, notification_server, frontend)
      each use a separate Docker Compose service with distinct ports, Dockerfile build
      targets, and health-check-gated startup ordering. Services can be scaled or
      replaced independently.
  modularity:
    present: true
    evidence: >
      275+ Block subclasses are loaded dynamically at startup via importlib in
      blocks/__init__.py. A public backend.sdk module re-exports all base classes,
      enabling third-party block development without touching the executor or core.
      Blocks are categorised (AI, TEXT, SEARCH, LOGIC, COMMUNICATION, DEVELOPER_TOOLS,
      etc.) with no circular dependencies between block files and the execution engine.
  scalability:
    present: true
    evidence: >
      The executor uses a ThreadPoolExecutor with a configurable pool size exposed as
      a Prometheus gauge (execution_manager_pool_size). Graph execution tasks are
      dispatched via RabbitMQ direct exchanges and queues, allowing multiple executor
      replicas to consume work in parallel. A dedicated copilot_executor service handles
      CoPilot workloads independently of graph execution.
  fault_tolerance:
    present: true
    evidence: >
      RabbitMQ connection configuration explicitly sets BLOCKED_CONNECTION_TIMEOUT=300s,
      SOCKET_TIMEOUT=30s, and CONNECTION_ATTEMPTS=5 with retry logic. The continuous_retry
      and func_retry decorators wrap execution entry points. A Redis-backed ClusterLock
      prevents duplicate graph execution across replicas. InsufficientBalanceError and
      ModerationError are caught and converted to execution status updates rather than
      crashes.
  observability:
    present: true
    evidence: >
      monitoring/instrumentation.py defines Prometheus counters (autogpt_graph_executions_total,
      autogpt_block_executions_total), a histogram (autogpt_block_duration_seconds with
      nine buckets), and a gauge (autogpt_websocket_connections_total). Sentry is initialised
      in util/metrics.py and integrated into every service. Structured logging uses a
      TruncatedLogger wrapper. Redis streams real-time execution status events to
      WebSocket clients. monitoring/ also contains AccuracyMonitor, BlockErrorMonitor,
      and LateExecutionMonitor for operational alerting.
  evolvability:
    present: true
    evidence: >
      LaunchDarkly feature flags gate new frontend capabilities (frontend/src/services/feature-flags/).
      AgentGraph models carry an integer graph_version field, enabling forward-compatible
      versioning of agent definitions. The classic/ subtree is preserved alongside
      autogpt_platform/ as a maintained legacy path. Block SDK design allows new
      integrations to be added as independent Python packages without modifying the core
      executor.
one_line_summary: >
  AI agent platform built on a block-based pipeline execution engine deployed as
  eight cooperating microservices, with recursive multi-agent composition and
  production-grade observability.
classification_reasoning: |
  ## Architecture Classification Analysis

  ### Primary Style: Pipeline (Pipe-and-Filter)

  AutoGPT's core execution model is a directed-graph dataflow engine. The 275+
  classes in `backend/backend/blocks/` each extend `Block` and define a typed
  `BlockSchemaInput`, a `BlockSchemaOutput`, and an async `run()` method that
  yields `(output_pin, value)` tuples. Agents are stored as `AgentGraph` objects
  (schema.prisma: AgentGraph, AgentNode, AgentNodeLink). `Link` instances wire a
  `source_name` output pin on a source `Node` to a `sink_name` input pin on a sink
  `Node`. The `ExecutionManager` in `executor/manager.py` traverses nodes in
  dependency order, calls `execute_node()` for each, and propagates outputs to
  connected sink nodes via an in-process `ExecutionQueue`. This is a textbook
  pipe-and-filter pattern: blocks are stateless filters, links are typed pipes,
  and graphs are composed pipelines.

  ### Secondary Style: Microservices

  The platform deploys eight independently containerised processes visible in
  `docker-compose.platform.yml`:
  - rest_server (FastAPI REST API, port 8006)
  - websocket_server (real-time push, port 8001)
  - executor (graph execution, port 8002)
  - copilot_executor (CoPilot AI, port 8008)
  - database_manager (DB proxy, port 8005)
  - scheduler_server (cron/triggers, port 8003)
  - notification_server (email/push, port 8007)
  - frontend (Next.js, port 3000)

  Inter-service communication uses two mechanisms: asynchronous message dispatch
  via RabbitMQ (fanout and direct exchanges defined in `data/rabbitmq.py` and
  `executor/utils.py`) and synchronous HTTP RPC through the `BaseAppService`
  framework in `util/service.py`. Services share PostgreSQL (via Supabase) and
  Redis but otherwise run independently. All eight can be individually scaled,
  replaced, or omitted from a deployment.

  ### Tertiary Style: Multi-Agent

  The `AgentExecutorBlock` (`blocks/agent.py`, BlockType.AGENT) allows any node
  in a graph to invoke a separate, independently versioned `AgentGraph` as a
  sub-agent. This enables recursive composition: agents can orchestrate other
  agents. The `agents/` directory contains 17 pre-built agent JSON definitions.
  `BlockType.MCP_TOOL` enables agents to call external Model Context Protocol tool
  servers. The Store marketplace allows users to publish and reuse agent templates,
  making cross-user agent composition practical at platform scale.

  ### Styles Considered But Not Primary

  - Event-Driven: RabbitMQ and the Redis event bus are used for async dispatch, but
    they are infrastructure choices serving the microservices topology; the execution
    model is graph-ordered, not event-reactive.
  - Microkernel: The Block SDK provides an extension mechanism, but blocks are not
    dynamically loaded plugins in the traditional microkernel sense; they are
    statically compiled into the server image.
  - Hexagonal Architecture: Port/adapter separation exists for integrations
    (backend/integrations/) but is not the organising principle of the codebase.

  ### Confidence

  0.93 — The Pipeline and Microservices patterns are unambiguous from code and
  deployment configuration. Multi-Agent is strongly evidenced by AgentExecutorBlock
  and the recursive graph invocation pattern. Minor uncertainty on precise boundary
  between Pipeline and Event-Driven given the RabbitMQ usage.
