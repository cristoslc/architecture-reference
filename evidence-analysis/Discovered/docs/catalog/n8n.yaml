review_notes: 'Evidence from catalog and public knowledge: (1) Modular Monolith —
  n8n is a well-known monorepo (single deployable unit) with internal packages for
  core, nodes, cli, editor-ui etc., high package_manifest count (65) consistent with
  a monorepo of internal modules rather than independently deployed microservices;
  (2) Pipe-and-Filter — the core product is a workflow engine where data flows through
  a sequence of nodes (filters/transformers), which is textbook pipe-and-filter; (3)
  Event-Driven — Kafka and RabbitMQ are listed as key technologies and n8n supports
  queue-mode execution with workers consuming job events, giving it an event-driven
  execution backbone; Microservices score of 0.5 is not high enough given single-deployment
  nature of the core product; DDD score of 0.3 is low and not corroborated by directory
  signals; 152 signals detected with strong CI/CD (58) and package manifests (65)
  further support a large but cohesive monorepo codebase.'
