review_notes: 'PRIMARY: Pipe-and-Filter - WorkflowExecute.processRunExecutionData()
  in packages/core/src/execution-engine/workflow-execute.ts implements classic pipe-and-filter
  loop: nodes popped from nodeExecutionStack, each executed via executeNode(), output
  data (INodeExecutionData[][]) passed to downstream nodes via addNodeToBeExecuted()
  using connectionsBySourceNode graph. 304 integration nodes in packages/nodes-base/nodes/
  each implement INodeType as self-contained filters. NodeConnectionTypes defines
  Main plus 12 AI connection types. Workflow class in packages/workflow/src/workflow.ts
  models the directed graph with connectionsBySourceNode/connectionsByDestinationNode.
  SECONDARY: Event-Driven - MessageEventBus in packages/cli/src/eventbus/ with typed
  event message classes (audit, execution, node, queue, workflow, runner). Scaling
  via Redis pub/sub in packages/cli/src/scaling/. Triggers include webhooks, cron,
  polling. Push notifications via SSE/WebSocket. Also exhibits Modular Monolith traits:
  pnpm workspace monorepo with clear package boundaries (workflow, core, cli, nodes-base,
  frontend) and DI container (@n8n/di), but deployed as single process.'
