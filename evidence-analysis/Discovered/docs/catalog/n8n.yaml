  #### Primary Style: Microkernel (Plugin)

  The system''s USP is its extensibility. The "Workflow" is a graph of nodes, where
  each node is a discrete plugin. The `packages/workflow` and `packages/core` (inferred
  from common n8n patterns and `pnpm-workspace.yaml` glob `packages/*`) represent
  the microkernel. The repo contains infrastructure specifically for generating, testing,
  and loading these nodes. The `scripts/backend-module` folder further reinforces
  this by providing boilerplate for "features" that plug into the existing system.


  #### Secondary Style: Modular Monolith

