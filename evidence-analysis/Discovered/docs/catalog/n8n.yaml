review_notes: 'Evidence: (1) Modular Monolith - pnpm-workspace.yaml at root confirms
  monorepo structure, single main Dockerfile (docker/images/n8n/Dockerfile) bundles
  entire application into one deployment unit at /usr/local/lib/node_modules/n8n,
  65 package manifests indicate internal packages not microservices; (2) Event-Driven
  - Task runner Dockerfiles (docker/images/runners/) for JavaScript and Python runners
  enable async sandboxed execution, catalog notes queue-mode with workers consuming
  job events; (3) Pipe-and-Filter - n8n''s core function IS workflow automation where
  data flows through sequential nodes (filters/transformers), this is the fundamental
  processing model of the product'
