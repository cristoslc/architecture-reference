classification_reasoning: "## Analysis\n\nn8n is a **workflow automation platform**\
  \ built on a **Microkernel (Plugin) architecture**. The core system provides the\
  \ runtime infrastructure, while all integration capabilities are implemented as\
  \ dynamically-loaded plugins (called \"nodes\").\n\n### Primary Evidence for Microkernel\
  \ (Plugin)\n\n**1. Plugin Loading Infrastructure**\n\nThe codebase has a sophisticated\
  \ plugin loading system at its core:\n\n- `packages/core/src/nodes-loader/directory-loader.ts`\
  \ - Abstract base class defining the plugin loading contract\n- `packages/core/src/nodes-loader/package-directory-loader.ts`\
  \ - Loads plugins from npm packages\n- `packages/core/src/nodes-loader/custom-directory-loader.ts`\
  \ - Loads user-created plugins from custom directories\n- `packages/core/src/nodes-loader/lazy-package-directory-loader.ts`\
  \ - Lazy loading for memory efficiency\n\n**2. Dynamic Plugin Discovery** (`packages/cli/src/load-nodes-and-credentials.ts`)\n\
  \n```typescript\n// Loads built-in nodes\nawait this.loadNodesFromNodeModules(nodeModulesDir,\
  \ 'n8n-nodes-base');\nawait this.loadNodesFromNodeModules(nodeModulesDir, '@n8n/n8n-nodes-langchain');\n\
  \n// Discovers community plugins by convention (n8n-nodes-*)\nconst installedPackagePaths\
  \ = [\n  ...(await glob('n8n-nodes-*', globOptions)),\n  ...(await glob('@*/n8n-nodes-*',\
  \ { ...globOptions, deep: 2 })),\n];\n\n// Loads from custom directories\nawait\
  \ this.loadNodesFromCustomDirectories();\n```\n\n**3. Plugin Contract** (`packages/workflow/src/interfaces.ts:2030`)\n\
  \nAll plugins must extend the `Node` base class:\n\n```typescript\nexport abstract\
  \ class Node {\n  abstract description: INodeTypeDescription;\n  execute?(context:\
  \ IExecuteFunctions, response?: EngineResponse): Promise<INodeExecutionData[][]>;\n\
  \  webhook?(context: IWebhookFunctions): Promise<IWebhookResponseData>;\n  poll?(context:\
  \ IPollFunctions): Promise<INodeExecutionData[][] | null>;\n}\n```\n\n**4. Extension\
  \ SDK** (`packages/@n8n/extension-sdk/src/schema.ts`)\n\nA formal extension manifest\
  \ system with permissions, event subscriptions, and UI extension points:\n\n```typescript\n\
  export const extensionManifestSchema = z.object({\n  name: z.string(),\n  entry:\
  \ z.object({ backend: z.string(), frontend: z.string() }),\n  permissions: z.object({\
  \ frontend: z.array(z.string()), backend: z.array(z.string()) }),\n  events: z.array(z.string()),\n\
  \  extends: z.object({ views: z.object({ workflows: z.object({ header: z.string()\
  \ }) }) }),\n});\n```\n\n**5. Community Node Tooling** (`packages/@n8n/create-node`)\n\
  \nA dedicated CLI tool for scaffolding custom plugins, demonstrating first-class\
  \ support for the plugin ecosystem.\n\n**6. Massive Plugin Library**\n\n`packages/nodes-base/package.json`\
  \ contains 965 lines of node and credential registrations—400+ integrations, all\
  \ loaded as plugins.\n\n### What This Is NOT\n\n**Not Microservices**: A single\
  \ Dockerfile produces one deployable image. The `worker`, `webhook`, and `start`\
  \ commands are different runtime modes of the same application, not separate services.\
  \ All modes share the same database and codebase.\n\n**Not Modular Monolith**: While\
  \ organized as a pnpm monorepo with internal packages (`packages/@n8n/*`), these\
  \ are library modules for code organization, not bounded contexts with enforced\
  \ boundaries. The primary architectural pattern is plugin-based, not module-based.\n\
  \n**Not Layered**: While the implementation uses controllers/services/repositories,\
  \ this is an internal implementation detail. The defining architectural characteristic\
  \ is the plugin system that enables extensibility.\n\n**Not Service-Based**: Although\
  \ n8n can scale horizontally (main + workers + webhooks + Redis queue), this is\
  \ horizontal scaling of the same application, not decomposition into distinct services\
  \ with different responsibilities.\n\n### Conclusion\n\nn8n exemplifies the Microkernel\
  \ (Plugin) pattern: a minimal core system (workflow engine, API, persistence) extended\
  \ by a rich ecosystem of plugins (nodes) that are discovered and loaded at runtime.\
  \ The plugin contract is well-defined, the loading infrastructure is sophisticated,\
  \ and there's dedicated tooling for plugin development. This is the architectural\
  \ style that defines n8n's identity as an extensible workflow automation platform."
