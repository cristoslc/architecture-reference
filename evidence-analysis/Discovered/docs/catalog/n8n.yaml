one_line_summary: "Self-hostable workflow automation platform organized as a pipeline of integration nodes executed by a modular monolith backend, with optional Redis-backed queue scaling, a durable event bus, and LangGraph-based multi-agent AI workflow building."
classification_reasoning: "Pipeline is the primary style: n8n's core value proposition is user-composed directed graphs of 300+ integration nodes through which data flows step-by-step, implemented via the Workflow graph model in the workflow package and traversed by WorkflowExecute in n8n-core — every integration node is a stateless pipe-and-filter stage implementing INodeType. Modular Monolith is the primary runtime style: all backend packages (cli, core, db, config, di, task-runner, and feature modules) resolve into a single Express process with in-process DI (@n8n/di), shared TypeORM database connection, and no inter-service network calls; optional queue-worker scaling (BullMQ + Redis) is an operational mode, not a decomposition into independent services. Event-Driven is a genuine secondary style with two independent mechanisms: a durable file-backed MessageEventBus for execution/audit log streaming, and a typed internal EventService for cross-service coordination; in queue mode, a Redis pub/sub command bus propagates control commands across multiple mains and workers. Multi-Agent is an emerging secondary style: the @n8n/ai-workflow-builder.ee package implements a LangGraph StateGraph with SupervisorAgent, PlannerAgent, BuilderSubgraph, and DiscoverySubgraph autonomous agents, while the AI Agent nodes (v1–v3) expose tool-calling and orchestrator/subagent multi-agent workflow patterns as a first-class user primitive."
