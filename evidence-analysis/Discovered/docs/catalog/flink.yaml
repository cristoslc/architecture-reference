classification_reasoning: "## Architecture Classification: Apache Flink\n\n### Primary\
  \ Style: Modular Monolith\n\nApache Flink is architected as a **Modular Monolith**\
  \ with strong internal module boundaries enforced through Maven's multi-module structure\
  \ and ArchUnit architecture tests.\n\n**Evidence:**\n\n1. **Single Deployable Unit**:\
  \ The `flink-dist` module produces a unified distribution. The `bin.xml` assembly\
  \ creates a single `flink-dist-{version}.jar` placed in `lib/` alongside core libraries,\
  \ forming one cohesive runtime.\n\n2. **Enforced Module Boundaries**: Flink uses\
  \ a dedicated `flink-architecture-tests` module containing ArchUnit rules that enforce\
  \ dependency constraints. Key rules include:\n   - `ConnectorRules.java`: \"Connector\
  \ production code must depend only on public API when outside of connector packages\"\
  \n   - `ApiAnnotationRules.java`: Enforces that `@Public` API methods only use `@Public`\
  \ types\n   - `TableApiRules.java`: Enforces visibility annotations and proper package\
  \ structure\n\n3. **Clear Module Hierarchy** (~40 modules in `pom.xml`):\n   - Core:\
  \ `flink-annotations`, `flink-core-api`, `flink-core`\n   - Runtime: `flink-runtime`,\
  \ `flink-runtime-web`\n   - APIs: `flink-datastream-api`, `flink-streaming-java`,\
  \ `flink-table-*`\n   - Extensions: `flink-connectors`, `flink-formats`, `flink-metrics`,\
  \ `flink-filesystems`, `flink-state-backends`\n\n4. **API Visibility System**: Uses\
  \ annotations (`@Public`, `@PublicEvolving`, `@Internal`, `@Experimental`) to define\
  \ public API contracts, with architecture tests ensuring internal modules don't\
  \ leak implementation details.\n\n5. **Dependency Graph**: Clear module dependencies\
  \ flow from `flink-core-api` → `flink-core` → `flink-runtime` → higher-level APIs.\
  \ The `pom.xml` shows disciplined layering.\n\n### Secondary Style: Microkernel\
  \ (Plugin)\n\nFlink incorporates a **Plugin Architecture** for runtime extensibility\
  \ without modifying the core.\n\n**Evidence:**\n\n1. **Plugin System** (`flink-core/src/main/java/org/apache/flink/core/plugin/`):\n\
  \   - `PluginManager` interface: Manages cluster plugins loaded via separate classloaders\n\
  \   - `PluginLoader`: Uses `ServiceLoader` to discover SPI implementations\n   -\
  \ `Plugin` interface: Base interface for plugins with `configure()` lifecycle\n\
  \   - `PluginClassLoader`: Custom classloader isolating plugin dependencies from\
  \ Flink core\n\n2. **Plugin Distribution**: The `plugins.xml` assembly shows plugins\
  \ deployed to `plugins/` directory:\n   - `plugins/metrics-jmx/`, `plugins/metrics-prometheus/`,\
  \ `plugins/metrics-graphite/`, etc.\n   - `plugins/external-resource-gpu/`\n   -\
  \ Each plugin is a self-contained JAR loaded at runtime\n\n3. **Extension Points\
  \ via SPI**:\n   - **State Backends**: Multiple implementations (`flink-statebackend-rocksdb`,\
  \ `flink-statebackend-heap-spillable`, `flink-statebackend-forst`) following `StateBackend`\
  \ interface\n   - **Metrics Reporters**: Pluggable implementations in `flink-metrics-*`\
  \ modules\n   - **Filesystems**: Pluggable filesystems (`flink-s3-fs-*`, `flink-azure-fs-*`,\
  \ etc.)\n   - **Connectors**: `flink-connector-base` defines SPI for external system\
  \ connections\n\n### What Was Rejected\n\n- **NOT Microservices**: Flink distributes\
  \ as a single monolithic deployment unit. The runtime itself is not decomposed into\
  \ independently deployable services.\n\n- **NOT Layered** (primarily): While there's\
  \ API/implementation separation, the architecture emphasizes **module** boundaries\
  \ over horizontal layers. Modules like `flink-connectors`, `flink-formats`, `flink-state-backends`\
  \ are vertical domains, not horizontal layers.\n\n- **NOT Event-Driven**: Though\
  \ Flink processes streaming data (its business domain), the internal codebase structure\
  \ is not organized around event-driven communication between components.\n\n- **NOT\
  \ Hexagonal**: No explicit ports/adapters pattern. The plugin system serves extensibility\
  \ but doesn't follow hexagonal architecture patterns.\n\n### Summary\n\nFlink exemplifies\
  \ a mature Modular Monolith with clear module boundaries enforced through tooling\
  \ (ArchUnit, Maven modules, API annotations). Its plugin system provides the extensibility\
  \ needed for a data processing framework—allowing users to add metrics reporters,\
  \ filesystems, and state backends without touching core code. The architecture tests\
  \ in `flink-architecture-tests` actively prevent erosion of module boundaries, making\
  \ this a well-maintained modular monolith."
