  ### 1. Primary Style: Pipeline (Pipe-and-Filter)

  The core of Flink’s architecture is the transformation of data streams through a
  series of filters, maps, and aggregations.

  - **Dataflow DAG:** The `ExecutionGraph` (found in `flink-runtime`) represents the
  central data structure coordinating distributed execution. It explicitly handles
  `JobVertex` (filters/processors) and `IntermediateResult` (pipes/buffers).

  - **Stream/Batch Unification:** As seen in the README examples, the programming
  model follows a linear pipeline construction (`map().keyBy().window().sum()`), which
  the runtime translates into a physical pipeline of operators connected by distribution
  channels.

  - **Back-pressure:** The mention of "Natural back-pressure" in the README is a hallmark
  of sophisticated Pipe-and-Filter systems where downstream filters can signal upstream
  ones to slow data production.


  ### 2. Secondary Style: Microkernel (Plugin)

  Flink acts as a core execution engine (the kernel) that is highly extensible through
  a strict plugin architecture.

  - **Factory/SPI Pattern:** The `Factory.java` file in `flink-table` confirms the
  use of Java''s Service Provider Interface (SPI) for discovering extensions. This
  allows users to plug in custom connectors, formats, and file systems without modifying
  the core.

  - **Externalized Connectors:** The README and the `flink-connectors/` directory
  structure demonstrate that most IO logic (Kafka, Cassandra, ES) is treated as external
  plugins that adhere to the core''s interfaces.

  - **Filesystems and Formats:** The presence of `flink-filesystems/` and `flink-formats/`
  indicates a system where the "Kernel" (runtime) knows how to execute a graph, but
  relies on "Plugins" to read/write data in specific formats or from specific storage
  layers (S3, OSS, HDFS).


  ### 3. Secondary Style: Modular Monolith

  Despite being a distributed system when deployed, the repository itself is structured
  as a **Modular Monolith** (specifically a Maven Multi-Module project) with strong
  internal boundaries.

  - **Strict Boundary Enforcement:** The existence of `archunit-violations/stored.rules`
  across various modules (`flink-core`, `flink-table`, etc.) suggests that the developers
  use ArchUnit to programmatically enforce dependency rules between modules, preventing
  unintended coupling (e.g., ensuring local table logic doesn''t leak into the global
  runtime).

  - **Logical Layering:** The directory tree shows a clear separation between `flink-core`
  (base abstractions), `flink-runtime` (the execution engine), and `flink-streaming-java`/`flink-table`
  (API layers).


  ### Why not Microservices?

  While Flink deploys separate processes (JobManager, TaskManager), these are specialized
  workers of a single platform rather than independent business services. The repository
  is a single codebase for a unified framework, not a collection of independent domain
  services.


  ### Why not Event-Driven?

  While Flink *processes* events and is often used in Event-Driven architectures,
  the internal structure of the Flink engine itself is more aligned with a coordinated
  dataflow/pipeline than a decoupled pub/sub system. The "events" in Flink are data
  items moving through a graph, not necessarily architectural control events.'
