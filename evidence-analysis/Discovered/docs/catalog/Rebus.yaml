review_notes: 'Primary: Pipe-and-Filter -- IPipeline interface (Rebus/Pipeline/IPipeline.cs)
  defines ordered IIncomingStep[] and IOutgoingStep[] sequences. Each step implements
  Process(context, next) filter pattern. DefaultPipeline (Rebus/Pipeline/DefaultPipeline.cs)
  builds receive chain (retry->deferred->hydrate->deserialize->routing->activate->saga->dispatch)
  and send chain (headers->correlation->serialize->validate->send). PipelineStepInjector
  enables inserting filters at relative positions. DefaultPipelineInvoker chains steps
  as nested delegates. Encryption/Compression steps (DecryptMessagesIncomingStep,
  EncryptMessagesOutgoingStep, ZippingSerializerDecorator) are additional pluggable
  filters. Secondary: Event-Driven -- IBus (Rebus/Bus/IBus.cs) provides Publish/Subscribe/Unsubscribe
  pub/sub primitives. IHandleMessages<T> (Rebus/Handlers/) for message type handlers.
  ISubscriptionStorage for topic subscriptions. Saga support (ISagaStorage, Saga<T>)
  for long-running event-driven workflows. README explicitly describes ''smart endpoints,
  dumb pipes'' async messaging pattern.'
