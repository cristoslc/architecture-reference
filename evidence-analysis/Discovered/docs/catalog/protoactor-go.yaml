review_notes: 'README describes "Ultra fast distributed actors for Go, C# and
  Java/Kotlin." actor/actor.go defines the Actor interface with Receive(Context)
  method. actor/pid.go implements process identifiers for location-transparent
  messaging. remote/ package enables cross-node actor communication via gRPC
  serialization (remote/endpoint_manager.go, remote/server.go). cluster/ package
  implements distributed virtual actors (grains) with cluster/grain.go for grain
  activation and cluster/member_list.go for membership tracking. cluster/identity/
  provides identity lookup strategies for grain placement across nodes. Supervision
  via actor/supervision.go with configurable restart strategies. Props (actor/props.go)
  configure actor creation with mailbox, dispatcher, and supervisor settings.
  Space-Based because virtual actors are processing units distributed across cluster
  nodes with automatic placement and location transparency. Event-Driven because
  all actor communication is asynchronous message passing via typed protobuf messages
  over gRPC for remote actors.'
