review_notes: "The Supabase Auth (formerly GoTrue) repository is a classic example\
  \ of a **Layered Architecture** (specifically a variation of the Service/Repository\
  \ or MVC pattern common in Go web applications).\n\n### Evidence of Layered Architecture:\n\
  \n1.  **Clear Vertical Separation of Concerns**: The `internal/` directory is organized\
  \ into distinct horizontal layers that manage specific ranges of responsibility:\n\
  \    *   **Presentation/API Layer (`internal/api/`)**: Contains HTTP handlers, routing\
  \ logic, and request/response parsing (e.g., `signup.go`, `token.go`, `logout.go`).\n\
  \    *   **Data Access/Model Layer (`internal/models/`)**: Defines the structure\
  \ of the entities (User, Session, RefreshToken) and contains the logic for interacting\
  \ with the database.\n    *   **External Service Adapters (`internal/mailer/`, `internal/storage/`)**:\
  \ Abstracts side effects like sending emails or managing database connections.\n\
  \    *   **Foundational/Utility Layers (`internal/crypto/`, `internal/observability/`,\
  \ `internal/ratelimit/`)**: Provides cross-cutting concerns used by other layers."
