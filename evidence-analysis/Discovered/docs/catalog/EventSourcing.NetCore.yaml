  ### Rejected Styles

  *   **Layered:** While it uses folders like "Core," the fundamental data flow is
  circular (Event -> Store -> Projection -> Query) rather than the linear top-down
  hierarchy characteristic of standard Layered or Onion architectures.

  *   **Microservices:** Although many Event-Driven systems are Microservices, this
  repository is organized as a collection of educational modules and samples. It lacks
  the service discovery, API gateways, and multi-service deployment configuration
  (e.g., missing root docker-compose for services) to be classified as a Microservices
  architecture in its own right; it is instead a library of patterns for such systems.'
