review_notes: 'This repository is an architectural exemplar focused on **Event-Driven**
  systems, specifically implementing the **Event Sourcing** pattern. While the "Samples"
  directory was not found in the root (likely due to the repository''s structure often
  nesting them within specialized sub-folders or being the root of the "Workshops"
  themselves), the provided documentation and exhaustive "Workshops" directory tree
  provide definitive evidence of its architectural organization.


  ### Technical Reasoning


  1.  **Event-Driven (Primary Style):** The entire codebase is structured around the
  lifecycle of events. Components do not store current state; instead, they persist
  discrete events (e.g., `InvoiceInitiated`, `InvoiceIssued`) to an event store (Marten
  or EventStoreDB). The architecture is defined by "Streams" (the sequence of events)
  and "Projections" (the mechanism to transform events into readable state). Evidence
  is found in paths like `Workshops/BuildYourOwnEventStore/09-Projections/IProjecti


  2.  **CQRS (Secondary Style):** The repository explicitly separates the write model
  (commands that append to streams) from the read model (projections for queries).
  The file `Marten.Integration.Tests/Commands/MartenAsyncCommandBusTests.cs` and the
  workshop sections on `Projections.SingleStream` vs `Projections.MultiStream` demonstrate
  a strict separation of Command and Query responsibilities.


  3.  **Domain-Driven Design (Secondary Style):** The code organization utilizes DDD
  tactical patterns to define consistency boundaries. Aggregates are used as the unit
  of event persistence and state rehydration. Files such as `Workshops/BuildYourOwnEventStore/EventStoreBasics/IAggregate.cs`
  and the presence of "Sagas" (e.g., `Workshops/EventDrivenArchitecture/05-Consistency/Sagas`)
  indicate a DDD approach to managing long-running business processes and bounded
  contexts.'
