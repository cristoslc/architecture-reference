review_notes: 'The repository is structured as a **Service-Based** architecture, characterized
  by a small number of coarse-grained services that share a common data infrastructure.
  While it has components of a monolith (shared codebase in `api/`), its deployment
  and operational model rely on separating concerns into distinct functional units.


  ### Primary Style: Service-Based

  The system decomposes into several primary services that operate independently but
  are highly coupled at the database level (PostgreSQL). Evidence from `docker-compose.yaml`
  and the directory structure shows:

  - **`api` service**: The core Flask application providing the RESTful interface
  for the console and web apps.

  - **`worker` service**: A separate deployment unit running Celery to handle asynchronous
  tasks (indexing, document processing).

  - **`sandbox` service**: A specialized service for secure code execution (`CODE_EXECUTION_ENDPOINT`),
  providing a clear boundary for untrusted logic.

  - **`web` service**: A Next.js frontend deployed independently of the backend.


  Unlike Microservices, these units share the same database schema (`api/migrations`)
  and core logic (`api/core`), but unlike a pure Monolith, they are scaled and managed
  as separate runtime entities.'
