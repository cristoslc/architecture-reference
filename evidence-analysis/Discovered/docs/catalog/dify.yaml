classification_reasoning: "The repository is structured as a **Service-Based** architecture,\
  \ characterized by a small number of coarse-grained services that share a common\
  \ data infrastructure. While it has components of a monolith (shared codebase in\
  \ `api/`), its deployment and operational model rely on separating concerns into\
  \ distinct functional units.\n\n### Primary Style: Service-Based\nThe system decomposes\
  \ into several primary services that operate independently but are highly coupled\
  \ at the database level (PostgreSQL). Evidence from `docker-compose.yaml` and the\
  \ directory structure shows:\n- **`api` service**: The core Flask application providing\
  \ the RESTful interface for the console and web apps.\n- **`worker` service**: A\
  \ separate deployment unit running Celery to handle asynchronous tasks (indexing,\
  \ document processing).\n- **`sandbox` service**: A specialized service for secure\
  \ code execution (`CODE_EXECUTION_ENDPOINT`), providing a clear boundary for untrusted\
  \ logic.\n- **`web` service**: A Next.js frontend deployed independently of the\
  \ backend.\n\nUnlike Microservices, these units share the same database schema (`api/migrations`)\
  \ and core logic (`api/core`), but unlike a pure Monolith, they are scaled and managed\
  \ as separate runtime entities.\n\n### Secondary Style: Event-Driven\nThe architecture\
  \ heavily utilizes an asynchronous, event-driven pattern for its most intensive\
  \ workloads. \n- **Message Broker**: Extensive use of Redis/Celery (`CELERY_BROKER_URL`)\
  \ to decouple request handling from background processing.\n- **Task Distribution**:\
  \ The `api/tasks/` and `api/schedule/` directories contain logic for RAG pipelines,\
  \ document indexing, and workflow executions that are triggered by events (e.g.,\
  \ `document_indexing_task.py`, `workflow_execute_task.py`).\n- **Pub/Sub logic**:\
  \ The presence of `api/core/trigger` suggests an internal mechanism for reacting\
  \ to system state changes.\n\n### Secondary Style: Layered (Internal)\nWithin the\
  \ `api` component, the code follows a traditional Layered pattern:\n- **Presentation**:\
  \ Flask routes (found in `api/app.py` and factory-loaded modules).\n- **Business\
  \ Logic**: Concentrated in `api/core/`, which acts as the service layer for LLM\
  \ orchestration, RAG, and Agent logic.\n- **Data Access**: Managed via SQLAlchemy\
  \ in `api/core/db` and externalized via the `repositories` pattern (e.g., `api/core/repositories/sqlalchemy_workflow_execution_repository.py`).\n\
  \n### Architectural Observations\n- **Infrastructure Heavy**: The `docker-compose.yaml`\
  \ reveals a \"Sidecar-rich\" environment with many supporting specialized stores\
  \ (Vector DBs like Weaviate/Milvus/Qdrant, Redis for caching, etc.), which is typical\
  \ for modern LLMOps platforms.\n- **Modularity**: While not a \"Modular Monolith\"\
  \ in the strict sense of enforced boundaries, the separation of `api/core/rag`,\
  \ `api/core/agent`, and `api/core/workflow` shows a strong attempt to organize the\
  \ codebase by domain concerns."
