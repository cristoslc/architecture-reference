review_notes: "Evidence: dify_graph/README.md describes a 'queue-based distributed workflow execution system' with DAG graph traversal, typed nodes (LLM, Agent, Code, HTTP, iteration, loop, if-else, etc.), and edge-based conditional routing -- textbook Pipe-and-Filter. dify_graph/graph_engine/graph_engine.py docstring explicitly states 'Event-Driven Architecture' with lifecycle events (NodeRunStartedEvent, GraphRunSucceededEvent, etc.), event queues, and a layer/middleware system. Celery workers (celery_entrypoint.py, tasks/) handle async document indexing and workflow execution. api/ shows clear Layered structure: controllers/ (REST endpoints), services/ (business logic), core/ (domain), models/ (ORM). docker-compose.yaml deploys api, worker, worker_beat, web as separate containers sharing one codebase (monolith deployment, not microservices). The agent system (dify_graph/nodes/agent/) runs as workflow nodes using pluggable strategies, not autonomous multi-agent orchestration."