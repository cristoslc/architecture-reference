classification_reasoning: "## Architecture Analysis: Dify Repository\n\n### Primary\
  \ Style: Layered Architecture\n\nDify implements a classic **Layered Architecture**\
  \ with clear horizontal separation:\n\n**Controller Layer** (`api/controllers/`):\n\
  - `console/` - Admin/console API endpoints (app management, datasets, workspace)\n\
  - `service_api/` - External service API endpoints  \n- `web/` - End-user web application\
  \ endpoints\n- `trigger/` - Webhook and trigger endpoints\n- `inner_api/` - Internal\
  \ API for plugin daemon communication\n\n**Service Layer** (`api/services/`):\n\
  - Business logic classes: `app_service.py`, `dataset_service.py`, `workflow_service.py`,\
  \ `account_service.py`, etc.\n- Service classes orchestrate domain operations without\
  \ direct database coupling\n\n**Repository/Model Layer** (`api/models/`, `api/repositories/`):\n\
  - SQLAlchemy ORM models: `account.py`, `dataset.py`, `model.py`, `workflow.py`\n\
  - Repository pattern for data access abstraction\n\n**Core/Domain Layer** (`api/core/`):\n\
  - Domain logic: `core/app/`, `core/agent/`, `core/tools/`, `core/rag/`\n- `dify_graph/`\
  \ - Isolated workflow execution engine with strict layering\n\nThe `api/.importlinter`\
  \ file explicitly enforces dependency rules between modules, particularly isolating\
  \ `dify_graph` from infrastructure concerns.\n\n### Secondary Style: Event-Driven\n\
  \n**Asynchronous task processing via Celery**:\n- `api/tasks/` - 30+ Celery task\
  \ modules for async operations\n- `api/schedule/` - Scheduled task definitions\n\
  - `api/events/` - Blinker signal-based internal events\n\nKey async operations:\n\
  - Document indexing (`document_indexing_task.py`, `add_document_to_index_task.py`)\n\
  - Workflow execution (`async_workflow_tasks.py`)\n- Mail delivery (`mail_*.py` tasks)\n\
  - Dataset cleanup (`clean_*.py` tasks)\n\nRedis serves as the Celery message broker,\
  \ enabling decoupled async processing.\n\n### Secondary Style: Microkernel (Plugin)\n\
  \n**Plugin infrastructure**:\n- `plugin_daemon` service - Separate deployment unit\
  \ managing plugin lifecycle\n- `core/plugin/` - Plugin management code (installer,\
  \ entities, implementations)\n- `core/extension/extensible.py` - Dynamic extension\
  \ scanning and loading\n\nThe system supports extensible:\n- **Tools**: `core/tools/builtin_tool/`,\
  \ `core/tools/plugin_tool/`\n- **Model providers**: Model runtime plugin architecture\n\
  - **Data sources**: `core/datasource/` with provider plugins\n- **Moderation**:\
  \ `core/moderation/` with API and keyword implementations\n\n### Deployment Topology\n\
  \nDocker Compose defines multiple services but NOT as independent microservices:\n\
  - **`api` and `worker`** share identical code (`langgenius/dify-api` image) - worker\
  \ just runs Celery\n- **Shared database** (PostgreSQL/MySQL) across all components\n\
  - **`web`** - Next.js frontend\n- **`plugin_daemon`** - Plugin execution sandbox\n\
  - **`sandbox`** - Code execution isolation\n- **Supporting services**: Redis, Nginx,\
  \ vector DBs\n\nThis is a **modular deployment** of a layered monolith, not true\
  \ microservices.\n\n### What This Is NOT\n\n- **Not Microservices**: Single codebase,\
  \ shared database, no bounded context isolation between services\n- **Not Service-Based**:\
  \ More than 2-3 services, but they're not coarse-grained business services\n- **Not\
  \ Domain-Driven Design**: No aggregates, value objects, or bounded context patterns\n\
  - **Not Hexagonal**: No ports/adapters pattern for external interface isolation\n\
  - **Not CQRS**: No separate read/write model separation\n\n### Key Evidence Files\n\
  \n- `api/app_factory.py` - Flask application factory with layered extension initialization\n\
  - `api/.importlinter` - Enforces module boundaries and import restrictions\n- `docker/docker-compose.yaml`\
  \ - Multi-service deployment (api, worker, web, plugin_daemon)\n- `api/extensions/ext_celery.py`\
  \ - Celery configuration with task imports\n- `api/core/extension/extensible.py`\
  \ - Plugin scanning and loading mechanism\n- `api/dify_graph/README.md` - Documents\
  \ strict layering in workflow engine"
