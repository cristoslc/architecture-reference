review_notes: "Grafana Mimir is a classic example of a **Microservices** architecture\
  \ that supports a **Modular Monolith** deployment mode (often referred to as \"\
  monolithic mode\" in the documentation). The codebase is designed around a single\
  \ shared binary (`cmd/mimir`) that can behave as any one of several distinct services\
  \ based on a `-target` flag.\n\n### 1. Microservices (Primary Style)\nThe system\
  \ is built as a collection of specialized services that collaborate to provide Prometheus-compatible\
  \ storage and querying. \n- **Service Boundaries:** Clear boundaries exist in the\
  \ `pkg/` directory, including `ingester`, `querier`, `distributor` (implied in logic),\
  \ `alertmanager`, `scheduler`, and `frontend`. These modules encapsulate specific\
  \ business logic and maintain their own internal state or access patterns.\n- **Independent\
  \ Scalability:** The `docker-compose.yml` provides definitive evidence of microservices.\
  \ It defines separate containers for `ingester-zone-a-1`, `distributor-1`, `querier`,\
  \ `query-frontend`, `compactor`, and `store-gateway`. Each container runs the same\
  \ `mimir` binary but passed different `-target` arguments (e.g., `-target=ingester`).\n\
  - **Communication:** Services interact via gRPC (proxied/managed by the `pkg/mimirpb`\
  \ definitions) and shared state in object storage (S3/Minio).\n\n### 2. Event-Driven\
  \ (Secondary Style)\nMimir relies heavily on event-stream processing for specific\
  \ components, particularly its long-term storage and internal coordination."
