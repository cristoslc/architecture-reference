classification_reasoning: "## Architecture Analysis: Grafana Mimir\n\n### Primary\
  \ Classification: Microservices\n\nMimir is architected as a **microservices system**\
  \ with the following evidence:\n\n**1. Independent Deployable Services via `-target`\
  \ Flag:**\nFrom `development/mimir-microservices-mode/docker-compose.yml` and `docs/sources/mimir/configure/about-configurations.md`:\n\
  - Services can be deployed independently: `-target=distributor`, `-target=ingester`,\
  \ `-target=querier`, `-target=query-frontend`, `-target=store-gateway`, `-target=compactor`,\
  \ `-target=alertmanager`, `-target=ruler`\n- Each service runs its own process with\
  \ dedicated HTTP/gRPC ports\n- Multiple replicas of same service type can be deployed\
  \ (e.g., `ingester-1`, `ingester-2`, `ingester-3`)\n\n**2. gRPC-Based Inter-Service\
  \ Communication:**\nProto files define clear service interfaces:\n- `pkg/ingester/client/ingester.proto`:\
  \ Ingester gRPC service\n- `pkg/distributor/distributorpb/distributor.proto`: Distributor\
  \ gRPC service  \n- `pkg/storegateway/storegatewaypb/gateway.proto`: Store Gateway\
  \ gRPC service\n- `pkg/frontend/v2/frontendv2pb/frontend.proto`: Query Frontend\
  \ gRPC service\n\n**3. Service Discovery via Hash Rings:**\nFiles like `pkg/distributor/distributor_ring.go`,\
  \ `pkg/ingester/ingester_ring.go`, `pkg/storegateway/gateway_ring.go` show each\
  \ service type maintains its own ring for:\n- Service registration and discovery\n\
  - Load balancing\n- Replication\n\n**4. Independent Data Ownership:**\n- Each ingester\
  \ owns a shard of time-series data (consistent hashing via ring)\n- Store Gateway\
  \ owns specific blocks\n- No shared database between services\n- Object storage\
  \ (S3/GCS) used as common persistence layer\n\n**5. Distinct Module Boundaries in\
  \ `pkg/mimir/modules.go`:**\n```go\ndeps := map[string][]string{\n    Distributor:\
  \    {DistributorService, API, ActiveGroupsCleanupService, Vault, ...},\n    Ingester:\
  \       {IngesterService, API, ActiveGroupsCleanupService, Vault},\n    StoreGateway:\
  \   {API, Overrides, MemberlistKV, Vault},\n    QueryFrontend:  {QueryFrontendTripperware,\
  \ MemberlistKV, Vault},\n    // ... etc\n    All: {QueryFrontend, QueryScheduler,\
  \ Querier, Ingester, Distributor, StoreGateway, Ruler, Compactor},\n}\n```\n\n###\
  \ Secondary Classification: Modular Monolith\n\nMimir also supports **monolithic\
  \ deployment** as evidenced by:\n\n**1. Single Binary Deployment (`-target=all`):**\n\
  From `development/mimir-monolithic-mode/docker-compose.yml`:\n```yaml\ncommand:\
  \ [\"sh\", \"-c\", \"sleep 3 && exec ./mimir -config.file=./config/mimir.yaml -target=all\
  \ ...\"]\n```\n\n**2. Unified Codebase Structure:**\n- Single `cmd/mimir/main.go`\
  \ entrypoint\n- All modules in `pkg/` directory as separate packages\n- Shared configuration\
  \ file used across all components\n- Module manager (`pkg/mimir/modules.go`) orchestrates\
  \ initialization\n\n**3. Explicit Module Dependency Graph:**\nModules have defined\
  \ dependencies that must be satisfied regardless of deployment mode, creating strong\
  \ internal boundaries even in monolithic mode.\n\n### What This Is NOT:\n\n- **Not\
  \ Event-Driven**: Services communicate via synchronous gRPC calls, not through message\
  \ brokers. No Kafka/RabbitMQ/etc. for inter-service coordination (though Kafka is\
  \ optional for ingest storage).\n\n- **Not Layered**: This isn't a layered presentation→business→data\
  \ architecture. Each service is vertically sliced with its own responsibilities.\n\
  \n- **Not Service-Based (coarse-grained)**: With 10+ distinct deployable services,\
  \ this goes beyond the typical 2-5 service definition.\n\n- **Not CQRS**: While\
  \ there's separation between write path (distributor→ingester) and read path (querier→store-gateway),\
  \ this is standard microservices data flow, not CQRS pattern.\n\n### Conclusion\n\
  \nMimir is a well-designed system that embodies **microservices architecture** while\
  \ also supporting **modular monolith deployment**. The same codebase can be deployed\
  \ as independent services (microservices mode) or as a single binary (monolithic\
  \ mode), with the module boundaries and gRPC interfaces remaining consistent. This\
  \ flexibility is a deliberate architectural choice documented in the configuration\
  \ guide: \"Use a single configuration file, and either pass it to all replicas of\
  \ Grafana Mimir (if you are running multiple single-process Mimir replicas) or to\
  \ all components of Grafana Mimir (if you are running Grafana Mimir as microservices).\""
