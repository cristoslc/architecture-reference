review_notes: "The repository is a textbook implementation of a **Microservices**\
  \ architecture, explicitly designed as an exemplar for this style. The codebase\
  \ is partitioned into independent, deployable services located under `internal/services/`,\
  \ including `catalogwriteservice`, `catalogreadservice`, and `orderservice`. Each\
  \ service contains its own `Dockerfile`, `go.mod`, configuration, and internal logic,\
  \ ensuring strict deployment boundaries.\n\n### Architectural Logic:\n\n1.  **Microservices\
  \ (Primary):**\n    *   **Independent Deployability:** Each directory in `internal/services/`\
  \ is a self-contained unit with its own lifecycle management (Dockerfiles, separate\
  \ `go.mod` files).\n    *   **Data Sovereignty:** The README and directory structure\
  \ indicate different backing stores for different services (e.g., `catalogreadservice`\
  \ uses MongoDB/ElasticSearch while `catalogwriteservice` uses Postgres), a hallmark\
  \ of microservices.\n    *   **Polyglot Persistence:** Use of MongoDB, Postgres,\
  \ and EventStoreDB across different service boundaries.\n\n2.  **Event-Driven (Secondary):**"
