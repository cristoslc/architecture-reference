classification_reasoning: "## Architecture Analysis: LocalStack\n\n### Primary Style:\
  \ Microkernel (Plugin)\n\nLocalStack implements a clear **Microkernel (Plugin) architecture**\
  \ where a core runtime system provides the infrastructure and AWS services are loaded\
  \ as discoverable plugins.\n\n### Key Evidence\n\n**1. Plugin Framework (`plux`):**\n\
  - The repository uses the `plux` plugin framework for dynamic plugin discovery and\
  \ loading\n- `pyproject.toml` declares `plux>=1.14.0` as a core dependency\n- Entry\
  \ points are defined in `plux.ini` with multiple plugin namespaces:\n  - `localstack.aws.provider`\
  \ - AWS service provider plugins\n  - `localstack.cloudformation.resource_providers`\
  \ - CloudFormation resource plugins\n  - `localstack.openapi.spec` - OpenAPI specification\
  \ plugins\n  - `localstack.extensions` - Extension plugins\n\n**2. Service Provider\
  \ Registration (`plux.ini` lines 1-49):**\n```ini\n[localstack.aws.provider]\nacm:default\
  \ = localstack.services.providers:acm\napigateway:default = localstack.services.providers:apigateway\n\
  dynamodb:default = localstack.services.providers:dynamodb\nlambda:default = localstack.services.providers:lambda_\n\
  s3:default = localstack.services.providers:s3\n# ... 30+ more service providers\n\
  ```\n\n**3. Plugin Decorators (`services/providers.py`):**\n```python\n@aws_provider()\n\
  def acm():\n    from localstack.services.acm.provider import AcmProvider\n    provider\
  \ = AcmProvider()\n    return Service.for_provider(provider, dispatch_table_factory=MotoFallbackDispatcher)\n\
  ```\nEach AWS service is registered as a plugin factory function with the `@aws_provider()`\
  \ decorator.\n\n**4. Service Plugin Lifecycle (`services/plugins.py`):**\n- `ServiceContainer`\
  \ class manages plugin lifecycle (states: UNKNOWN, AVAILABLE, STARTING, RUNNING,\
  \ STOPPED)\n- `ServiceLifecycleHook` provides extension points (`on_after_init`,\
  \ `on_before_start`, `on_before_stop`)\n- `PluginManager` from `plux` is used to\
  \ discover and load service plugins\n\n**5. Runtime Hook System (`runtime/hooks.py`):**\n\
  ```python\non_infra_start = hook_spec(HOOKS_ON_INFRA_START)\non_infra_ready = hook_spec(HOOKS_ON_INFRA_READY)\n\
  on_infra_shutdown = hook_spec(HOOKS_ON_INFRA_SHUTDOWN)\n```\nA comprehensive hook\
  \ system allows plugins to register callbacks for infrastructure lifecycle events.\n\
  \n**6. Extension Points (`extensions/api/extension.py`):**\n```python\nclass Extension(BaseExtension):\n\
  \    namespace = \"localstack.extensions\"\n    \n    def on_extension_load(self):\
  \ pass\n    def on_platform_start(self): pass\n    def update_gateway_routes(self,\
  \ router): pass\n    def update_request_handlers(self, handlers): pass\n    def\
  \ on_platform_ready(self): pass\n```\nExtensions can inject routes, handlers, and\
  \ response processors into the gateway.\n\n**7. CloudFormation Resource Provider\
  \ Plugins:**\nThe `plux.ini` file defines 80+ CloudFormation resource provider plugins,\
  \ each independently loadable:\n```ini\naws::dynamodb::table = localstack.services.dynamodb.resource_providers.aws_dynamodb_table_plugin:DynamoDBTableProviderPlugin\n\
  aws::lambda::function = localstack.services.lambda_.resource_providers.aws_lambda_function_plugin:...\n\
  ```\n\n### Core System vs Plugins\n\n**Core System (Microkernel):**\n- `localstack-core/localstack/runtime/`\
  \ - Runtime management\n- `localstack-core/localstack/aws/gateway.py` - Request\
  \ gateway\n- `localstack-core/localstack/aws/chain.py` - Handler chain\n- `localstack-core/localstack/aws/skeleton.py`\
  \ - Request dispatching\n- Plugin discovery via `plux`\n- Service container and\
  \ lifecycle management\n\n**Plugins (AWS Services):**\n- Each service in `localstack-core/localstack/services/{s3,dynamodb,lambda_,...}/`\
  \ is a plugin\n- Services have `provider.py` (API handlers), `models.py` (state),\
  \ `plugins.py` (registration)\n- Services can have multiple implementations (`dynamodb`\
  \ vs `dynamodb:v2`)\n\n### Single Deployable\n\nThe architecture is a monolith packaged\
  \ as a single Docker container, with services loaded as plugins at runtime - this\
  \ distinguishes it from both microservices (multiple deployables) and modular monolith\
  \ (internal modules without plugin discovery).\n\n### Rejected Styles\n\n- **Not\
  \ Microservices**: Single container deployment, not distributed services\n- **Not\
  \ Modular Monolith**: While services are modular, the defining characteristic is\
  \ plugin discovery at runtime via entry points, not just internal module boundaries\n\
  - **Not Layered**: While layers exist (gateway → handler → provider), the primary\
  \ architectural driver is plugin extensibility\n- **Not Service-Based**: There are\
  \ 30+ fine-grained services, not 2-5 coarse-grained services\n- **Not Hexagonal**:\
  \ While there's a gateway, ports/adapters pattern isn't the primary organization\
  \ - plugins are"
