classification_reasoning: "## Analysis\n\nThis repository is an unambiguous **Microservices**\
  \ architecture implemented with Spring Cloud.\n\n### Six Independently Deployable\
  \ Services\n\nThe root `pom.xml` declares six Maven modules, each building a separate\
  \ Spring Boot application with its own Docker image:\n\n| Service | Purpose | Image\
  \ |\n|---------|---------|-------|\n| `employee-service` | Employee CRUD | `piomin/employee-service:1.2-SNAPSHOT`\
  \ |\n| `department-service` | Department CRUD | `piomin/department-service:1.2-SNAPSHOT`\
  \ |\n| `organization-service` | Organization CRUD | `piomin/organization-service:1.2-SNAPSHOT`\
  \ |\n| `gateway-service` | API Gateway | `piomin/gateway-service:1.1-SNAPSHOT` |\n\
  | `config-service` | Config Server | `piomin/config-service:1.1-SNAPSHOT` |\n\
  | `discovery-service` | Eureka Server | `piomin/discovery-service:1.1-SNAPSHOT`\
  \ |\n\n`docker-compose.yml` confirms seven containers (six services + Zipkin) with\
  \ health-check ordered startup.\n\n### Isolated Data Ownership\n\nEach business\
  \ service owns its own in-memory repository with no shared state: `EmployeeRepository`,\
  \ `DepartmentRepository`, `OrganizationRepository`. No shared database exists.\n\
  \n### Service Discovery\n\nAll business services register with Eureka (`spring-cloud-starter-netflix-eureka-client`\
  \ in each POM; `@EnableDiscoveryClient` on application classes). `discovery-service`\
  \ runs `@EnableEurekaServer`.\n\n### Synchronous OpenFeign Communication\n\n- `department-service`\
  \ -> `employee-service` via `@FeignClient(name = \"employee-service\")`\n- `organization-service`\
  \ -> `employee-service` and `department-service` via respective Feign clients\n\
  \nAll calls are synchronous HTTP. Zero references to Kafka, RabbitMQ, or any message\
  \ broker in source or config.\n\n### API Gateway\n\n`gateway-service` uses Spring\
  \ Cloud Gateway with `lb://` URIs for load-balanced routing to all three business\
  \ services. Routes are defined in config-service YAML.\n\n### Centralized Configuration\n\
  \n`config-service` serves 11 per-service YAML files from classpath via Spring Cloud\
  \ Config Server (native mode).\n\n### Distributed Tracing\n\nAll business services\
  \ depend on `micrometer-tracing-bridge-otel` + `opentelemetry-exporter-zipkin`\
  \ with 100% sampling probability.\n\n### Styles Rejected\n\n- **Event-Driven**:\
  \ No message broker, no async consumers, all calls are blocking OpenFeign HTTP.\n\
  - **Service-Based**: Fine-grained single-entity services with isolated data stores;\
  \ no shared database pattern.\n- **Modular Monolith**: Six separate container images;\
  \ no single deployable artifact.\n- **Layered**: No shared horizontal technical\
  \ layers across services.\n- **Hexagonal**: No ports-and-adapters structure; standard\
  \ Spring MVC controllers and plain repositories.\n- **CQRS**: No read/write model\
  \ separation.\n- **DDD**: Simple POJO entities with no aggregates, value objects,\
  \ or domain events."
