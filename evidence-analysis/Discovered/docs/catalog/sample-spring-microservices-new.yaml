review_notes: 'README explicitly titled ''Microservices with Spring Cloud Advanced
  Demo Project''. 6 independently deployable Spring Boot services: employee-service,
  department-service, organization-service, gateway-service (Spring Cloud Gateway
  with lb:// routes), discovery-service (Eureka @EnableEurekaServer), config-service
  (Spring Cloud Config @EnableConfigServer). Inter-service calls via @FeignClient
  annotations in department-service/client/EmployeeClient.java and organization-service/client/{EmployeeClient,DepartmentClient}.java.
  docker-compose.yml orchestrates all services as separate containers with health
  checks. Distributed tracing via Micrometer+OpenTelemetry+Zipkin. Per-service config
  files in config-service/src/main/resources/config/. Multi-module Maven pom.xml with
  packaging=pom.'
