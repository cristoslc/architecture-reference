classification_reasoning: "## Analysis\n\nThis repository demonstrates a clear **Microservices\
  \ architecture** implemented with Spring Cloud. The evidence is unambiguous:\n\n\
  ### Multiple Independently Deployable Services\n\nThe codebase consists of **6 separate\
  \ deployable units**, each built as an independent Spring Boot application with\
  \ its own container image:\n\n| Service | Purpose | Docker Image |\n|---------|---------|--------------|\n\
  | `employee-service` | Employee CRUD operations | `piomin/employee-service:1.2-SNAPSHOT`\
  \ |\n| `department-service` | Department CRUD operations | `piomin/department-service:1.2-SNAPSHOT`\
  \ |\n| `organization-service` | Organization CRUD operations | `piomin/organization-service:1.2-SNAPSHOT`\
  \ |\n| `gateway-service` | API Gateway | `piomin/gateway-service:1.1-SNAPSHOT` |\n\
  | `config-service` | Centralized configuration | `piomin/config-service:1.1-SNAPSHOT`\
  \ |\n| `discovery-service` | Service registry (Eureka) | `piomin/discovery-service:1.1-SNAPSHOT`\
  \ |\n\n**Evidence:** `pom.xml` defines 6 Maven modules; `docker-compose.yml` defines\
  \ 7 containers (including Zipkin).\n\n### Each Service Owns Its Data\n\nEach business\
  \ service has its own data repository isolated from others:\n- `EmployeeRepository`\
  \ in `employee-service` (`EmployeeRepository.java`)\n- `DepartmentRepository` in\
  \ `department-service`  \n- `OrganizationRepository` in `organization-service`\n\
  \nAll use in-memory storage with no shared database — clear data ownership boundaries.\n\
  \n### Service Discovery and Registration\n\nAll business services register with\
  \ Eureka:\n```xml\n<!-- employee-service/pom.xml, department-service/pom.xml, organization-service/pom.xml\
  \ -->\n<dependency>\n    <groupId>org.springframework.cloud</groupId>\n    <artifactId>spring-cloud-starter-netflix-eureka-client</artifactId>\n\
  </dependency>\n```\n\n### API Gateway Pattern\n\n`gateway-service` implements Spring\
  \ Cloud Gateway (`GatewayApplication.java`):\n- Routes requests to downstream services\n\
  - Dynamically discovers services via Eureka\n- Aggregates Swagger UI across all\
  \ microservices\n\n### Inter-Service Communication via OpenFeign\n\nServices communicate\
  \ synchronously through declarative HTTP clients:\n- `department-service` → `employee-service`\
  \ via `EmployeeClient` (`@FeignClient(name = \"employee-service\")`)\n- `organization-service`\
  \ → `employee-service` and `department-service` via respective clients\n\n### Infrastructure\
  \ Services\n\n- **Config Server** (`config-service`): Externalized configuration\n\
  - **Discovery Server** (`discovery-service`): Netflix Eureka\n- **Distributed Tracing**:\
  \ Zipkin integration with OpenTelemetry\n\n---\n\n### Styles Rejected\n\n- **Service-Based**:\
  \ Rejected because there are 6 fine-grained independently deployable services, not\
  \ 2-5 coarse-grained services sharing a database. This is the key distinction.\n\
  \n- **Layered**: Rejected because there is no horizontal layering across the application.\
  \ Each service has its own controller/repository, but these are isolated within\
  \ service boundaries, not shared layers.\n\n- **Modular Monolith**: Rejected because\
  \ this is explicitly NOT a single deployable — each service builds its own Docker\
  \ image and runs in its own container.\n\n- **Event-Driven**: Rejected because communication\
  \ is synchronous HTTP via OpenFeign. No message broker (Kafka, RabbitMQ) is present\
  \ in dependencies or docker-compose.\n\n- **Hexagonal Architecture**: Rejected because\
  \ there are no explicit ports/adapters patterns. Services use standard Spring MVC\
  \ controllers with in-memory repositories, not dependency inversion through interfaces.\n\
  \nThis is a textbook example of Spring Cloud microservices architecture with all\
  \ the canonical infrastructure components."
