review_notes: "Layered: Each SDK (packages/js-sdk/, packages/python-sdk/) is organized in clear layers - API client layer (src/api/), connection config layer (src/connectionConfig.ts), sandbox domain layer (src/sandbox/), and envd communication layer (src/envd/) with generated protobuf stubs. The Sandbox class in packages/js-sdk/src/sandbox/index.ts composes modules (Filesystem, Commands, Pty, Git) atop a transport layer using ConnectRPC. Microservices: The system communicates with a separate E2B API service (spec/openapi.yml defines REST endpoints for sandbox CRUD at api.e2b.app) and a per-sandbox envd daemon (spec/envd/envd.yaml for file operations, spec/envd/process/process.proto and spec/envd/filesystem/filesystem.proto for gRPC process/filesystem services). The pnpm-workspace.yaml defines independent packages (js-sdk, python-sdk, cli, connect-python, apps/web) each with their own build/publish lifecycle. Supabase edge functions (supabase/functions/) provide serverless auth hooks. The MCP server spec (spec/mcp-server.json) defines integration contracts. Code generation from OpenAPI and protobuf specs (Makefile codegen target, codegen.Dockerfile) reinforces service boundary separation."