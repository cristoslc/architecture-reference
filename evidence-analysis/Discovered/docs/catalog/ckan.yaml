classification_reasoning: "## Architecture Analysis: CKAN\n\n### Primary Style: Microkernel\
  \ (Plugin)\n\nCKAN is architected around a sophisticated **plugin system** that\
  \ is the defining characteristic of its architecture. The evidence is extensive:\n\
  \n**Plugin Infrastructure:**\n- `ckan/plugins/base.py` defines the core `Interface`\
  \ and `Plugin` base classes, along with `SingletonPlugin` for single-instance plugins\n\
  - `ckan/plugins/core.py` implements the plugin lifecycle: `load()`, `unload()`,\
  \ `load_all()`, `get_plugin()` - plugins are loaded dynamically at runtime via Python\
  \ entry points (`ckan.plugins` entry point group)\n- Plugin discovery uses `importlib.metadata.entry_points`\
  \ to find plugins registered as Python package entry points (lines 10, 37 in `core.py`)\n\
  \n**Extension Interfaces (over 20 defined):**\nThe `ckan/plugins/interfaces.py`\
  \ file defines numerous interfaces that plugins can implement:\n- `IActions`, `IAuthFunctions`,\
  \ `IConfigurer`, `IDatasetForm`, `IGroupForm`\n- `IBlueprint`, `IResourceController`,\
  \ `ITemplateHelpers`, `IValidators`\n- `IMiddleware`, `IAuthenticator`, `ITranslation`,\
  \ `ISignal`, `INotifier`\n- And many more...\n\n**Entry Point Registration (setup.cfg\
  \ lines 52-119):**\n```ini\nckan.plugins =\n    tracking = ckanext.tracking.plugin:TrackingPlugin\n\
  \    activity = ckanext.activity.plugin:ActivityPlugin\n    datastore = ckanext.datastore.plugin:DatastorePlugin\n\
  \    ...\n```\n\n**Built-in Extensions:**\nThe `ckanext/` directory contains 20+\
  \ bundled plugins that demonstrate the plugin architecture:\n- `datastore/`, `activity/`,\
  \ `datapusher/` - core functionality as plugins\n- `imageview/`, `videoview/`, `audioview/`\
  \ - resource view plugins\n- `multilingual/`, `stats/`, `tracking/` - feature extensions\n\
  \n**Plugin Lifecycle Management:**\n```python\n# ckan/plugins/core.py\ndef load(*plugins:\
  \ str, force_update: bool = False) -> Plugin | list[Plugin]:\n    observers = PluginImplementations(interfaces.IPluginObserver)\n\
  \    for plugin in plugins:\n        service = _get_service(plugin)\n        for\
  \ observer_plugin in observers:\n            observer_plugin.before_load(service)\n\
  \        _PLUGINS_SERVICE[plugin] = service\n        ...\n```\n\n**Blanket Decorators\
  \ for Simplified Plugin Development:**\nThe `ckan/plugins/blanket.py` provides convenience\
  \ decorators (`@tk.blanket.actions`, `@tk.blanket.helpers`, etc.) that automate\
  \ common plugin patterns.\n\n### Secondary Style: Layered\n\nWithin the monolithic\
  \ core, CKAN exhibits classic layered architecture:\n\n**Views/Presentation Layer:**\
  \ `ckan/views/` - Flask blueprints handling HTTP requests (`dataset.py`, `user.py`,\
  \ `group.py`, `api.py`)\n\n**Logic/Business Layer:** `ckan/logic/` with subdirectories:\n\
  - `action/` - `create.py`, `get.py`, `update.py`, `delete.py`, `patch.py` - action\
  \ functions\n- `auth/` - authorization functions organized similarly\n\n**Model/Data\
  \ Layer:** `ckan/model/` - SQLAlchemy ORM models (`package.py`, `user.py`, `resource.py`,\
  \ `group.py`, etc.) with `meta.py` for session management\n\n**Library/Helpers:**\
  \ `ckan/lib/` - utility functions, helpers, signals, jobs\n\n**Single Deployable\
  \ Unit:**\n- One `wsgi.py` entry point creating a single WSGI application\n- One\
  \ Python package (`ckan` + `ckanext` namespace package)\n- Configuration via INI\
  \ files, not service discovery\n\n### What This Is NOT\n\n**Not Microservices:**\
  \ Single process, single database, single deployment unit. External services like\
  \ Solr/Redis are infrastructure dependencies, not application services.\n\n**Not\
  \ Modular Monolith:** No enforced module boundaries at the package level. The plugin\
  \ system IS the modularization mechanism - modules are implemented as plugins, not\
  \ as internal bounded contexts.\n\n**Not Hexagonal Architecture:** While plugins\
  \ use interfaces, these are extension points, not ports/adapters for dependency\
  \ inversion. The model layer directly uses SQLAlchemy without repository interfaces.\n\
  \n**Not Domain-Driven Design:** No aggregates, value objects, bounded contexts,\
  \ or ubiquitous language patterns. The domain logic is in `logic/action/` functions,\
  \ not domain entities.\n\n### Summary\n\nCKAN is a textbook example of a **Microkernel/Plugin\
  \ architecture**: a stable core system with a well-defined plugin interface contract\
  \ that allows extensions to be loaded at runtime. The layered organization within\
  \ the core is secondary to the plugin-centric extensibility that defines CKAN's\
  \ architecture."
