review_notes: 'CKAN (Comprehensive Knowledge Archive Network) is a classic example
  of a **Microkernel (Plugin)** architecture. While it follows a strict internal **Layered**
  structure for its core operations, its defining architectural characteristic is
  the heavy reliance on a plugin system to define almost all functional behavior,
  including core features.


  ### 1. Microkernel (Plugin) Architecture

  The system is built around a "Core" (the Microkernel) that provides essential services
  (database management, configuration, base models) but delegates specific functionality
  to plugins.

  - **Plugin Loading:** `ckan/plugins/core.py` demonstrates a sophisticated loading
  mechanism using Python entry points (`ckan.plugins` group). It manages a global
  registry of active plugins (`_PLUGINS_SERVICE`) and matches them against `ckan.plugins`
  in the config file.

  - **Interfaces:** Extensibility is enforced via a set of formalized interfaces in
  `ckan/plugins/interfaces.py`. Plugins must "implement" these interfaces (e.g., `IMapper`,
  `IRoutes`, `IConfigurer`) to hook into the core lifecycle.

  - **Plugin Toolkit:** `ckan/plugins/toolkit.py` acts as a stable API surface (a
  "facade") that provides plugins with access to core functions without creating tight
  coupling or circular dependencies.


  ### 2. Layered Architecture (Internal)

  Within the core and within well-behaved plugins, CKAN enforces a strict horizontal
  layering pattern, visible in the directory structure:'
