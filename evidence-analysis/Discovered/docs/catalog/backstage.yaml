one_line_summary: "Spotify's open-source developer portal platform built on a Microkernel plugin system where a thin core runtime hosts 154+ independently registered plugins communicating exclusively through typed service contracts and extension points, deployed by default as a Modular Monolith."
classification_reasoning: "Backstage is definitively Microkernel as its primary architectural style. The entire system is structured around three core primitives defined in packages/backend-plugin-api: createBackendPlugin, createBackendModule, and createExtensionPoint. The BackstageBackend runtime (packages/backend-app-api) acts as the kernel: it resolves service factories via a ServiceRegistry, topologically orders initialization, and provides 18 default core services (logger, database, auth, discovery, httpRouter, scheduler, cache, permissions, etc.) that plugins consume via dependency injection. Plugins are installed with backend.add(import('@backstage/plugin-X')) and never import each other's code — the architecture docs state explicitly that each plugin operates completely independently and may only communicate over the network. Extension points are typed interfaces that plugins expose and modules consume to inject behavior before plugin init runs. The 154 plugin packages in plugins/ demonstrate this in practice. The same microkernel model applies to the frontend via packages/frontend-plugin-api with createFrontendPlugin, createExtension, and extension overrides composing the UI into a single app extension tree. The secondary style is Modular Monolith: the standard deployment is a single Node.js/Express process where all plugins share one HTTP listener, each mounted under /api/<pluginId> by the httpRouterServiceFactory. The monorepo workspace with ADR-011 naming conventions and lint rules enforces strict package-level module boundaries without runtime service mesh or independent deployment per plugin. Multi-backend splitting is documented as an option but is not the default topology. Events backend and signals backend are supplementary infrastructure, not the primary communication pattern. The previous classification listed Layered as the secondary style; Modular Monolith more accurately describes the deployment model and the intra-process package boundary enforcement."
