review_notes: 'Textbook Rails layered architecture: app/controllers/ (~106 controllers)
  for REST API + GraphQL, app/models/ (~113 ActiveRecord models) with rich concerns,
  app/services/service/ for domain logic (ticket, auth, AI, calendar), app/policies/
  using Pundit for authorization. Procfile runs web (Puma), websocket (EventMachine),
  and background worker (delayed_job) as co-located processes in one codebase. Vue.js
  frontend in app/frontend/ with desktop and mobile apps. PostgreSQL, Redis, Elasticsearch.
  No separate deployable services, no message broker, no explicit module/bounded-context
  boundaries -- standard Rails monolith with well-organized layers.'
