classification_reasoning: |-
  ## Analysis

  Zammad is a Ruby on Rails helpdesk/customer support platform deployed as a
  single monolith (web + websocket + worker processes from one codebase,
  one PostgreSQL database).

  ### Primary: Layered

  The Rails horizontal stack is consistently applied and disciplined:

  - **Controllers** (`app/controllers/`): REST API entry point; 95 modular route
    files organized by domain (ticket, channel_email, channel_whatsapp,
    knowledge_base, ai_agent, etc.).
  - **GraphQL** (`app/graphql/gql/`): Complete second API surface with mutations,
    queries, subscriptions, types, resolvers, and context. Mounted at `/graphql`.
  - **Service Layer** (`app/services/service/`): 120+ service objects organized by
    domain (ticket, user, auth, channel, ai, ai_assistance, history, link,
    template, translation, system). Controllers and GraphQL mutations delegate
    downward to services.
  - **Policy Layer** (`app/policies/`): 51-item Pundit authorization layer; every
    action gated by `authorize!`.
  - **Models** (`app/models/`): 114+ ActiveRecord models. Rich shared behavior via
    45 concerns (`has_transaction_dispatcher`, `has_history`, `has_tags`,
    `has_online_notifications`, `can_search`, etc.).
  - **Jobs** (`app/jobs/`): 41 ActiveJob-backed background jobs.
  - **Frontend** (`app/frontend/apps/`): Separate `desktop` and `mobile` Vue.js
    SPAs (TypeScript/Vite) communicating via REST and GraphQL.

  Single deployable, single database — monolithic topology.

  ### Secondary: Event-Driven

  Zammad contains a purpose-built internal event bus:

  - **`HasTransactionDispatcher`** concern is included in all major domain models.
    It registers `after_create TransactionDispatcher` and `after_update
    TransactionDispatcher` hooks — model changes are automatically captured.
  - **`EventBuffer`** accumulates typed event descriptors (`{object, type, id,
    changes, user_id, created_at}`) within the database transaction boundary.
  - **`TransactionDispatcher.commit`** is called after commit:
    1. Reads and deduplicates buffered events (`EventBuffer.list('transaction')`).
    2. Executes sync backends sequentially in-process (registered via
       `Setting.where(area: 'Transaction::Backend::Sync')`).
    3. Schedules async backends via `TransactionJob.perform_later` (registered
       via `Setting.where(area: 'Transaction::Backend::Async')`).
  - **Registered transaction backends**: `Transaction::Trigger` (automation rules),
    `Transaction::Notification` (in-app and email notifications),
    `Transaction::SignatureDetection`, `Transaction::CtiCallerIdDetection`,
    `Transaction::ClearbitEnrichment`. Each is a pluggable handler class.

  This is an intentional, first-party internal event bus — not incidental Rails
  callbacks. Backend handlers are pluggable and runtime-configurable via
  database settings. The pattern is architecturally equivalent to Chatwoot's
  `Dispatcher` + listener system.

  ### Rejected

  - **Modular Monolith**: No enforced module boundaries. Models cross-reference
    freely; no separate schemas per domain. Route/service subdirectories are
    organizational, not architectural.
  - **Microservices / Service-Based**: Single deployable, single database. The
    three Procfile processes (web, websocket, worker) are co-located threads
    within one app — not independent services.
  - **Pipeline**: `lib/sequencer/` is an internal utility for import workflows,
    not the primary system integration mechanism.
  - **Microkernel**: `Package` model hints at a plugin system but is not the
    dominant integration topology.
  - **Event-Driven-only (no Layered)**: The Rails layering is too substantial to
    demote. Both styles are structural and co-present.
