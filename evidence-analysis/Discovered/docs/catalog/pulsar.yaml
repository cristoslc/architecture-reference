one_line_summary: Distributed pub-sub and event streaming platform with a strictly
  layered stateless-broker/managed-ledger/BookKeeper storage architecture, an event-driven
  core, and a microkernel NAR plugin system for protocol handlers, IO connectors,
  and tiered storage offloaders.
classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Styles: Event-Driven + Layered\n\n**EVENT-DRIVEN (primary, 0.96):** Pulsar's\
  \ entire design is organized around durable, named topics. The `BrokerService` in\
  \ `pulsar-broker/.../service/BrokerService.java` bootstraps a Netty server that\
  \ handles pub-sub I/O over a binary protocol; `PersistentTopic` and `PersistentDispatcherMultipleConsumers`\
  \ in `pulsar-broker/.../service/persistent/` manage subscription fan-out with per-subscription\
  \ cursor tracking. The `pulsar-io/` module contains 30+ source and sink connectors\
  \ (Kafka, Debezium CDC, Cassandra, Elasticsearch, JDBC, Kinesis, MongoDB, RabbitMQ,\
  \ Redis, etc.) that bridge external systems into/out of the event log. The `pulsar-functions/`\
  \ module provides an inline serverless processing layer (`FunctionRuntimeManager`,\
  \ `RuntimeSpawner`) that subscribes to topics and publishes results. System topics\
  \ (`pulsar-broker/.../systopic/`) carry internal coordination events (namespace\
  \ policy changes, topic policies, transaction snapshots). Geo-replication is implemented\
  \ as a push-based `PersistentReplicator` writing to remote cluster topics. The transaction\
  \ subsystem (`pulsar-transaction/coordinator/`) achieves exactly-once semantics\
  \ via a two-phase-commit coordinator topic. The entire client API (`pulsar-client-api/`)\
  \ exposes only event-centric primitives: producer, consumer, reader, and table-view.\n\
  \n**LAYERED (primary, 0.88):** Pulsar enforces a rigid three-tier storage hierarchy\
  \ that is its most distinctive architectural feature. Tier 1: stateless broker nodes\
  \ (`pulsar-broker/`) that own topic routing, dispatch, and protocol handling but\
  \ hold no durable state. Tier 2: the managed ledger abstraction (`managed-ledger/`)\
  \ wrapping Apache BookKeeper into a sequentially appended, cursor-tracked log\
  \ (`ManagedLedger`, `ManagedCursor`). Tier 3: Apache BookKeeper bookie nodes for\
  \ physical segment storage. Because the broker is stateless, broker nodes can be\
  \ freely added or replaced without data migration. Orthogonally, the metadata layer\
  \ (`pulsar-metadata/`) backed by ZooKeeper or etcd manages namespace ownership,\
  \ broker registry, and load-balancing state, forming a control-plane layer above\
  \ the broker data plane. A stateless proxy tier (`pulsar-proxy/`) provides routing,\
  \ service discovery, and TLS termination in front of the brokers. A WebSocket adapter\
  \ (`pulsar-websocket/`) translates the binary Pulsar protocol for browser clients.\n\
  \n### Secondary Style: Microkernel\n\n**MICROKERNEL (secondary, 0.81):** The broker\
  \ defines multiple named extension points loaded at runtime from NAR (NiFi Archive)\
  \ packages. The `ProtocolHandler` SPI (`pulsar-broker/.../protocol/ProtocolHandler.java`)\
  \ allows plugging custom wire protocols without modifying core broker code — used\
  \ in practice by KoP (Kafka on Pulsar) and AoP (AMQP on Pulsar). `EntryFilter` /\
  \ `EntryFilterProvider` (`pulsar-broker/.../service/plugin/`) allow pluggable per-message\
  \ filtering on the dispatch path. `BrokerInterceptor` (`pulsar-broker/.../intercept/`)\
  \ hooks into the full producer/consumer lifecycle. The IO connector framework\
  \ (`pulsar-io/core/`) defines a `Source`/`Sink` SPI with 30+ implementations\
  \ deployable as NAR packages. Functions runtimes (`pulsar-functions/runtime/`) are\
  \ pluggable (thread, process, Kubernetes). Tiered storage offloaders (`tiered-storage/`)\
  \ are NAR-packaged and loaded dynamically to offload cold ledger segments to S3,\
  \ GCS, Azure Blob, HDFS, or Alluxio. Load manager extension points\
  \ (`pulsar-broker/.../loadbalance/`) support pluggable load ranking and\
  \ bundle-shedding strategies.\n\n### What Was Rejected and Why\n\n**Not Microservices:**\
  \ The broker, proxy, functions worker, and WebSocket service are separate deployable\
  \ processes but share a common codebase, a common binary distribution, and a common\
  \ BookKeeper/ZooKeeper data tier. They are deployment roles of one platform, not\
  \ independently deployed services with their own bounded-context data stores.\n\n\
  **Not pure Pipeline:** While IO connectors and Functions form event-processing\
  \ pipelines, the core platform is not itself organized as a data-transformation\
  \ pipeline. The primary abstraction is the durable topic, not a directed processing\
  \ graph.\n\n**Not CQRS:** Although read (consumer/reader) and write (producer)\
  \ paths are separated, there is no explicit command/query model with separate read\
  \ and write data stores — both paths operate against the same managed ledger\
  \ segments.\n\n### Quality Attributes Evidence\n\n**SCALABILITY:** Stateless broker\
  \ tier scales horizontally without data migration; BookKeeper bookie nodes scale\
  \ independently; partitioned topics distribute load across broker instances;\
  \ namespace bundle splitting and pluggable load shedding strategies.\n\n**DURABILITY:**\
  \ ManagedLedger writes to BookKeeper with configurable write quorum and ack quorum;\
  \ geo-replication via PersistentReplicator; tiered storage offloads cold segments\
  \ to object stores; message retention independent of subscription state.\n\n**EXTENSIBILITY:**\
  \ ProtocolHandler SPI (KoP, AoP); EntryFilter and BrokerInterceptor extension\
  \ points; NAR-packaged IO connectors and storage offloaders; pluggable Functions\
  \ runtimes; custom load balancing strategies; all extensions deployable without\
  \ broker restarts via the package management API.\n\n**PERFORMANCE:** Netty-based\
  \ async I/O throughout the broker; `numIOThreads` and `numOrderedExecutorThreads`\
  \ tuning in `conf/broker.conf`; producer-side batching, compression, and\
  \ deduplication; dispatch and subscribe rate limiting per namespace and subscription.\n\
  \n**MULTI-TENANCY:** Three-level hierarchy (tenant -> namespace -> topic);\
  \ per-namespace authentication, authorization, and quota policies; resource groups\
  \ (`resourcegroup/`); failure domain isolation for hardware segregation.\n\n**OBSERVABILITY:**\
  \ OpenTelemetry integration (`pulsar-opentelemetry/`); Prometheus metrics endpoints\
  \ on broker and proxy; structured event logging (`structured-event-log/`); Grafana\
  \ dashboards (`grafana/`); Wireshark dissector (`wireshark/`) for protocol\
  \ debugging.\n\n**EXACTLY-ONCE DELIVERY:** Transaction coordinator with two-phase\
  \ commit over an internal coordinator topic (`pulsar-transaction/coordinator/`);\
  \ transactional producers and consumers in the client API;\
  \ `TransactionMetadataStoreService` in the broker."
