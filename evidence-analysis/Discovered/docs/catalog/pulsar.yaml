classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Style: Microkernel (Plugin)\n\nApache Pulsar is architected as a **microkernel\
  \ system with extensive plugin infrastructure**. The core broker provides a stable\
  \ runtime that can be extended through dynamically loaded plugins.\n\n**Evidence:**\n\
  \n1. **NAR Plugin System**: Pulsar implements a sophisticated plugin mechanism using\
  \ NAR (NiFi Archive) packages with isolated classloaders:\n   - `pulsar-common/src/main/java/org/apache/pulsar/common/nar/NarClassLoader.java`\
  \ — Custom classloader enabling plugin isolation\n   - `NarClassLoaderBuilder.java`\
  \ and `NarUnpacker.java` — Plugin loading infrastructure\n   - The NAR format allows\
  \ plugins to have conflicting dependencies without affecting the core system\n\n\
  2. **Protocol Handler Plugins**: The broker supports pluggable messaging protocols:\n\
  \   - `pulsar-broker/src/main/java/org/apache/pulsar/broker/protocol/ProtocolHandler.java`\
  \ — Core interface for protocol extensions\n   - `ProtocolHandlerWithClassLoader.java`\
  \ wraps handlers with isolated classloaders (lines 31-42 show NarClassLoader integration)\n\
  \   - `ProtocolHandlers.load()` discovers and loads handlers from a directory at\
  \ runtime\n\n3. **Entry Filter Plugins**: Message filtering is extensible:\n   -\
  \ `pulsar-broker/src/main/java/org/apache/pulsar/broker/service/plugin/EntryFilter.java`\
  \ — Plugin interface\n   - `EntryFilterWithClassLoader.java` — Isolated execution\
  \ wrapper\n\n4. **IO Connector Plugins**: 25+ connectors (Kafka, AWS, Elasticsearch,\
  \ Cassandra, etc.) implement the plugin contract:\n   - `pulsar-io/core/src/main/java/org/apache/pulsar/io/core/Source.java`\
  \ and `Sink.java` — Core plugin interfaces\n   - `@Connector` annotation provides\
  \ metadata for plugin discovery\n   - Connectors like `KafkaAbstractSink` implement\
  \ `Sink<byte[]>` to integrate with the core\n\n5. **Functions Runtime**: User-defined\
  \ functions are loaded as plugins with isolation:\n   - `pulsar-functions/runtime/src/main/java/org/apache/pulsar/functions/runtime/RuntimeFactory.java`\
  \ — Creates isolated execution environments\n\n### Secondary Style: Layered\n\n\
  Within the core broker, Pulsar exhibits clear horizontal layering:\n\n| Layer |\
  \ Location | Components |\n|-------|----------|------------|\n| Protocol/API | `broker/protocol/`,\
  \ `broker/web/` | ProtocolHandlers, REST API |\n| Service | `broker/service/` |\
  \ BrokerService, Topic, Subscription, Consumer, Producer |\n| Storage | `managed-ledger/`\
  \ | ManagedLedger, ManagedCursor interfaces |\n| Admin | `broker/admin/` | AdminResource\
  \ implementations |\n\nEvidence from directory structure:\n- `pulsar-broker/src/main/java/org/apache/pulsar/broker/service/`\
  \ contains core domain: `BrokerService.java`, `Topic.java`, `Subscription.java`,\
  \ `Consumer.java`, `Producer.java`\n- `managed-ledger/src/main/java/org/apache/bookkeeper/mledger/ManagedLedger.java`\
  \ provides the storage abstraction interface\n\n### Why Not Microservices?\n\nWhile\
  \ Pulsar **can be deployed** as separate processes (broker, bookkeeper, zookeeper,\
  \ proxy, function worker), this is an **operational deployment pattern**, not a\
  \ codebase architecture property:\n\n1. The repository is a **single monorepo**\
  \ with Maven multi-module structure\n2. `distribution/server/pom.xml` produces a\
  \ **single distribution package**\n3. The `pulsar-daemon` script runs components\
  \ together\n4. `standalone.conf` enables single-process operation for development\n\
  \nThe microservice-style deployment exists at the infrastructure level, not the\
  \ code organization level.\n\n### Why Not Event-Driven?\n\nAlthough Pulsar is a\
  \ messaging platform, its **internal code organization** is not event-driven. The\
  \ broker uses synchronous request-response patterns for client interactions, and\
  \ while it processes messages asynchronously, the architecture is built around service\
  \ abstractions (BrokerService, Topic, Subscription) rather than event handlers and\
  \ message broker communication between internal components.\n\n### Conclusion\n\n\
  Pulsar is a well-designed **Microkernel architecture** where the core broker provides\
  \ stable extension points (ProtocolHandler, EntryFilter, Source/Sink) that are discovered\
  \ and loaded at runtime via NAR classloaders. This enables users to extend Pulsar\
  \ with custom protocols, connectors, and filters without modifying the core. The\
  \ Layered organization within the broker provides clean separation of concerns between\
  \ protocol handling, service logic, and storage abstraction."
