one_line_summary: Notebook-style data pipeline builder and orchestrator structured
  as a pipeline DAG runtime inside a modular monolith, with event-driven triggers
  and streaming connector support.
classification_reasoning: "## Architecture Classification Analysis\n\n### Primary
  Styles: Pipeline + Modular Monolith\n\n**PIPELINE (primary, 0.93):** The pipeline
  abstraction is the foundational primitive of the entire system. Every unit of work
  is a Block (DataLoader, Transformer, DataExporter, Sensor, Callback, Conditional,
  DBT, SQL, R, or custom) connected via explicit upstream_blocks/downstream_blocks
  declarations in each pipeline's metadata.yaml. PipelineType (python, streaming,
  integration, databricks, pyspark, execution_framework) governs execution strategy.
  The StreamingPipelineExecutor enforces a strict linear source->transformer->sink
  topology, raising structural exceptions at initialization if violated. ExecutorFactory
  dispatches to local, K8s, ECS, Azure Container Instance, GCP Cloud Run, or PySpark
  executors at the pipeline level. The run_blocks async function drives concurrent
  DAG execution with output-passing between blocks.\n\n**MODULAR MONOLITH (primary,
  0.87):** The entire system deploys as a single Python process (Tornado async web
  server on port 6789) backed by a single SQLAlchemy relational database. All subsystems
  — api, authentication, cache, cli, cluster_manager, data_preparation, data_integrations,
  extensions, frameworks, kernels, orchestration, server, services, streaming, version_control
  — are Python packages within a single mage-ai pip installable. The docker-compose.yml
  defines one server container plus an optional Next.js frontend container. 93 api/resources/
  classes expose all capabilities through one REST API surface. The mage_integrations
  Singer library is imported in-process, not called over a network.\n\n### Secondary
  Style: Event-Driven\n\n**EVENT-DRIVEN (secondary, 0.72):** Three event-handling
  mechanisms operate within the monolith: (1) EventTrigger calls schedule_with_event()
  to launch pipeline runs in response to external cloud events; (2) EventStreamHandler
  implements Server-Sent Events for live pipeline output delivery to the browser;
  (3) WebSocketServer tunnels Jupyter kernel I/O for the notebook UI. Redis is optionally
  used for distributed locking and activity tracking. Celery can replace the default
  ProcessQueue for distributed block execution. These are significant but secondary
  — the system runs without an event broker and the core execution path is synchronous
  scheduler-driven dispatch.\n\n### What Was Rejected and Why\n\n**Not Microservices:**
  No independent services with separate data stores. ECS, K8s, and Cloud Run executors
  dispatch ephemeral compute from the central server, not independently deployed services
  with their own APIs.\n\n**Not Microkernel:** BlockFactory and ExecutorFactory implement
  factory patterns, but there is no formal plugin discovery (no Python entry points,
  no plugin registry). Block type classes and executor classes are statically imported.\n\n**Not
  pure Event-Driven:** The dominant coordination mechanism is the synchronous scheduler
  loop and SQLAlchemy ORM, not an event broker. Events are supplementary I/O mechanisms.\n\n**Not
  Serverless:** Requires a persistent long-running Tornado process and a persistent
  relational database. Serverless block execution is an optional deployment target,
  not the architectural model."
