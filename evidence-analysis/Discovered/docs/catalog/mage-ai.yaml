review_notes: "The Mage OSS repository is a **Modular Monolith** designed as a data\
  \ orchestration engine. While it supports distributed execution, the codebase itself\
  \ is structured as a single integrated Python package (`mage-ai`) with a React-based\
  \ frontend integrated into the same deployment unit.\n\n### 1. Modular Monolith\
  \ (Primary Style)\nThe system is organized into high-level functional modules within\
  \ `mage_ai/` that represent distinct domains of the application, yet they run under\
  \ a single process (as seen in `server.py`). \n- **Decoupled domains:** Modules\
  \ like `mage_ai/orchestration`, `mage_ai/data_preparation`, `mage_ai/api`, and `mage_ai/streaming`\
  \ have clear boundaries but share the same database (`mage_ai/orchestration/db`)\
  \ and memory space within the Tornado server.\n- **Unified Entry Point:** `mage_ai/server/server.py`\
  \ acts as the core controller, initializing everything from user authentication\
  \ to scheduler managers and websocket servers in a single application lifecycle.\n\
  - **Internal Modules:** Instead of independent services, it uses internal logic\
  \ separation (e.g., `variable_manager`, `repo_manager`) to handle the complexity\
  \ of data pipeline management.\n\n### 2. Hexagonal Architecture (Secondary Style)\n\
  Mage heavily utilizes the **Ports and Adapters** pattern, specifically for its \"\
  Block\" and \"IO\" systems to maintain isolation from external infrastructure:"
