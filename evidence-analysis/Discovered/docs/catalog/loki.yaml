classification_reasoning: "## Architecture Classification: Loki\n\n**Primary Style:\
  \ Microservices** with **Modular Monolith** as a secondary deployment option.\n\n\
  ### Evidence for Microservices\n\n**1. Multiple Deployment Modes with Explicit Microservices\
  \ Mode**\n\nThe Helm chart (`production/helm/loki/Chart.yaml`) explicitly supports\
  \ three deployment modes:\n- `SingleBinary` - monolithic deployment\n- `SimpleScalable`\
  \ - read/write/backend separation  \n- `Distributed` - full microservices decomposition\n\
  \nThe `distributed-values.yaml` shows independently deployable services:\n```yaml\n\
  deploymentMode: Distributed\ningester:\n  replicas: 3\nquerier:\n  replicas: 3\n\
  queryFrontend:\n  replicas: 2\nqueryScheduler:\n  replicas: 2\ndistributor:\n  replicas:\
  \ 3\ncompactor:\n  replicas: 1\nindexGateway:\n  replicas: 2\n```\n\n**2. Independent\
  \ Service Deployments**\n\nEach microservice has its own Kubernetes resource templates:\n\
  - `deployment-distributor.yaml` - Distributor as Deployment\n- `statefulset-ingester.yaml`\
  \ - Ingester as StatefulSet\n- `statefulset-compactor.yaml` - Compactor as StatefulSet\n\
  - Separate HPAs for independent autoscaling\n\n**3. Integration Tests Demonstrate\
  \ Microservices**\n\nThe integration test `loki_micro_services_test.go` explicitly\
  \ starts each component as a separate process:\n```go\ntCompactor = clu.AddComponent(\"\
  compactor\", \"-target=compactor\", ...)\ntIndexGateway = clu.AddComponent(\"index-gateway\"\
  , \"-target=index-gateway\", ...)\ntDistributor = clu.AddComponent(\"distributor\"\
  , \"-target=distributor\", ...)\ntIngester = clu.AddComponent(\"ingester\", \"-target=ingester\"\
  , ...)\ntQueryScheduler = clu.AddComponent(\"query-scheduler\", \"-target=query-scheduler\"\
  , ...)\ntQuerier = clu.AddComponent(\"querier\", \"-target=querier\", ...)\ntQueryFrontend\
  \ = clu.AddComponent(\"query-frontend\", \"-target=query-frontend\", ...)\n```\n\
  \n**4. gRPC-Based Inter-Service Communication**\n\nServices communicate via gRPC\
  \ with protobuf definitions (`pkg/logproto/logproto.proto`):\n```protobuf\nservice\
  \ Querier {\n  rpc Query(QueryRequest) returns (stream QueryResponse) {}\n  rpc\
  \ QuerySample(SampleQueryRequest) returns (stream SampleQueryResponse) {}\n  rpc\
  \ Label(LabelRequest) returns (LabelResponse) {}\n  ...\n}\n```\n\nClient pools\
  \ manage connections between services (`pkg/ingester/client/client.go`).\n\n**5.\
  \ Ring-Based Service Discovery and Coordination**\n\nEach service type participates\
  \ in a ring for discovery and sharding:\n- `ringKey = \"distributor\"` in distributor\n\
  - `RingKey = \"ring\"` in ingester  \n- `ringKey = \"compactor\"` in compactor\n\
  \nUses `github.com/grafana/dskit/ring` for memberlist-based coordination.\n\n**6.\
  \ Shared Object Storage, Not Shared Database**\n\nServices share object storage\
  \ (S3, GCS, Azure Blob, filesystem) but don't share a database. Each service owns\
  \ its in-memory state and coordinates through the ring.\n\n### Evidence for Secondary\
  \ Style: Modular Monolith\n\n**Single Binary Deployment Mode**\n\nThe same codebase\
  \ supports running all components in a single process:\n```yaml\ndeploymentMode:\
  \ SingleBinary\nsingleBinary:\n  replicas: 1\n```\n\nFrom README.md: \"Loki differs\
  \ from Prometheus by...want a single-binary, easy to operate system with no dependencies.\"\
  \n\nThe `cmd/loki/main.go` entrypoint can run all targets in one process, making\
  \ it a modular monolith when deployed in single-binary mode.\n\n### What This Is\
  \ NOT\n\n- **Not Service-Based** - There are 8+ independently deployable services,\
  \ exceeding the 2-5 coarse-grained services characteristic. Services don't share\
  \ a database.\n\n- **Not Event-Driven** - Primary communication is synchronous gRPC,\
  \ not message brokers. While Kafka is optionally supported for the write path (`pkg/kafka/`),\
  \ it's an optional ingestion mechanism, not the core architectural pattern.\n\n\
  - **Not Layered** - Services are organized by functional role (ingestion, querying,\
  \ compaction), not horizontal layers (presentation, business, data).\n\n- **Not\
  \ Hexagonal** - No explicit ports/adapters pattern. Services expose gRPC/HTTP interfaces\
  \ but aren't organized around hexagonal principles.\n\n### Summary\n\nLoki is fundamentally\
  \ a **Microservices** architecture designed for horizontal scalability, with each\
  \ service (distributor, ingester, querier, query-frontend, compactor, index-gateway,\
  \ etc.) independently deployable and scalable. The same codebase supports a **Modular\
  \ Monolith** deployment mode for simpler use cases, demonstrating architectural\
  \ flexibility common in cloud-native systems."
