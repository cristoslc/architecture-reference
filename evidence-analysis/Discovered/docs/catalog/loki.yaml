one_line_summary: >
  Horizontally-scalable, multi-tenant log aggregation platform built as a single binary
  that deploys as a full microservices cluster, grouped read/write/backend targets, or a
  monolith — all sharing the same codebase and module dependency graph.

classification_reasoning: >
  Loki simultaneously embodies Microservices and Modular Monolith — both are intentional,
  first-class deployment modes supported by a single binary. Each functional component
  (Distributor, Ingester, QueryFrontend, QueryScheduler, Querier, Compactor, IndexGateway,
  Ruler, BloomPlanner, BloomBuilder, BloomGateway, PatternIngester) is independently
  deployable, independently scalable, and communicates over gRPC/HTTP interfaces when
  deployed as separate processes (microservices mode). Simultaneously, all components compile
  into one binary and are wired together via dskit/modules.Manager with an explicit dependency
  graph; -target=all runs everything in-process (modular monolith mode). The Pipeline style
  is a strong secondary pattern: pkg/logql/log/pipeline.go defines composable Stage/Pipeline
  interfaces for log-line processing, and pkg/querier/queryrange/queryrangebase/ implements
  a tripperware Middleware chain that applies query splitting, sharding, caching, and retries
  in sequential stages. An optional Kafka-backed ingest path (pkg/kafka/, pkg/ingester/kafka_consumer.go)
  introduces event-driven decoupling between write acknowledgment and ingestion, but it is
  not the default mode. Consistent hash rings (dskit/ring, Memberlist gossip) provide
  peer discovery and data sharding across all stateful components. Object storage (S3, GCS,
  Azure Blob) is the unified backend for both index (TSDB via index shipper) and chunks.
  The architecture's most distinctive characteristic is the "single binary, multiple personas"
  model — components are differentiated by -target flags, not by separate binaries — sitting
  at the intersection of Microservices and Modular Monolith.

