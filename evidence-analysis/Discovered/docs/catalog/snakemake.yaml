review_notes: 'Snakemake is a workflow management system primarily structured as a
  **Microkernel (Plugin)** architecture. The core "kernel" handles the workflow graph
  (DAG) resolution, job scheduling, and the DSL parsing, while almost all external
  interactions—including execution environments, storage backends, and reporting—are
  offloaded to a specialized plugin system.


  ### Evidence for Microkernel (Plugin)

  The system relies on a set of well-defined interfaces that allow third-party or
  decoupled plugins to extend its capabilities. This is explicitly evidenced in the
  `pyproject.toml` dependencies:

  - `snakemake-interface-executor-plugins`: Allows Snakemake to support various backends
  (Slurm, Kubernetes, AWS Batch, etc.) without having the logic in the core repository.

  - `snakemake-interface-storage-plugins`: Abstracts data access (S3, GS, FTP).

  - `snakemake-interface-report-plugins`, `snakemake-interface-logger-plugins`, and
  `snakemake-interface-scheduler-plugins`.


  The core repository contains the "kernel" in `src/snakemake/` (as identified via
  `tool.setuptools_scm`), providing the execution engine and the Python-based DSL,
  while the actual heavy lifting of infrastructure communication is handled by external
  packages following these plugin contracts.'
