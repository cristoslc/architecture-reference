classification_reasoning: "## Analysis\n\n### Primary: Microkernel (Plugin) Architecture\n\
  \nSnakemake exhibits a **clear microkernel architecture** with a well-defined plugin\
  \ system spanning multiple extension points:\n\n**Plugin Infrastructure Evidence:**\n\
  \n1. **Five distinct plugin interfaces** defined as separate Python packages (see\
  \ `pyproject.toml` lines 51-56):\n   - `snakemake-interface-executor-plugins>=9.3.2`\
  \ — Execution environments (local, cluster, cloud)\n   - `snakemake-interface-storage-plugins>=4.3.2`\
  \ — Storage providers (S3, GCS, Azure, FTP, etc.)\n   - `snakemake-interface-report-plugins>=1.2.0`\
  \ — Report generation\n   - `snakemake-interface-logger-plugins>=1.1.0` — Logging\
  \ handlers\n   - `snakemake-interface-scheduler-plugins>=2.0.0` — Job scheduling\
  \ algorithms\n\n2. **Plugin Registry Pattern**: All plugins are discovered and loaded\
  \ via registry classes:\n   ```python\n   # From cli.py lines 16-21\n   from snakemake_interface_executor_plugins.registry\
  \ import ExecutorPluginRegistry\n   from snakemake_interface_storage_plugins.registry\
  \ import StoragePluginRegistry\n   from snakemake_interface_report_plugins.registry\
  \ import ReportPluginRegistry\n   from snakemake_interface_logger_plugins.registry\
  \ import LoggerPluginRegistry\n   from snakemake_interface_scheduler_plugins.registry\
  \ import SchedulerPluginRegistry\n   ```\n\n3. **Plugin Selection at Runtime** (cli.py\
  \ lines 1967-1987):\n   ```python\n   executor_plugin = ExecutorPluginRegistry().get_plugin(args.executor)\n\
  \   scheduler_plugin = SchedulerPluginRegistry().get_plugin(args.scheduler)\n  \
  \ report_plugin = ReportPluginRegistry().get_plugin(args.reporter)\n   ```\n\n4.\
  \ **Built-in Executors as Core Extensions**: The `executors/` directory contains\
  \ only essential built-in executors (`local.py`, `dryrun.py`, `touch.py`), while\
  \ cluster/cloud executors (SLURM, Kubernetes, Google Life Sciences, AWS Batch) are\
  \ provided as external plugins.\n\n5. **Remote Providers Replaced by Plugins** (`src/snakemake/remote/__init__.py`):\n\
  \   ```python\n   # remote providers have been replaced by storage plugins\n   raise\
  \ NotImplementedError(\n       \"Remote providers have been replaced by Snakemake\
  \ storage plugins.\"\n   )\n   ```\n\n### Secondary: Layered Architecture\n\nWithin\
  \ the microkernel core, Snakemake exhibits **horizontal layering** with clear separation\
  \ of concerns:\n\n| Layer | Files | Lines | Responsibility |\n|-------|-------|-------|----------------|\n\
  | CLI/Presentation | `cli.py` | 2,282 | Argument parsing, user interaction |\n|\
  \ API | `api.py` | 831 | Programmatic interface (`SnakemakeApi`, `WorkflowApi`)\
  \ |\n| Workflow/Orchestration | `workflow.py` | 2,498 | Workflow definition, rule\
  \ registration |\n| Core Logic | `dag.py`, `jobs.py`, `rules.py`, `parser.py` |\
  \ 8,000+ | DAG construction, job scheduling, rule parsing |\n| Execution | `executors/`,\
  \ `scheduling/` | — | Job execution strategies |\n| Infrastructure | `io/`, `deployment/`,\
  \ `caching/`, `storage/` | — | I/O, deployment, persistence |\n\n### What This Is\
  \ NOT\n\n- **Not Microservices**: Single deployable Python package, no inter-service\
  \ communication, no independent deployment units\n- **Not Event-Driven**: No message\
  \ broker, no asynchronous event handling between services; jobs are scheduled synchronously\
  \ via the DAG\n- **Not Pipeline (as primary)**: While workflows execute as pipelines,\
  \ the codebase organization centers on the plugin system, not pipe-and-filter data\
  \ transformation stages\n- **Not Domain-Driven Design**: No bounded contexts, aggregates,\
  \ or ubiquitous language patterns; the domain model (rules, jobs, DAG) is relatively\
  \ flat\n\n### Key Architectural Insight\n\nSnakemake's architecture enables extensibility\
  \ through a carefully designed plugin contract: interface packages define the API\
  \ contracts (`snakemake-interface-*`), external plugins implement these interfaces,\
  \ and the core discovers and invokes them via registries. This allows users to extend\
  \ Snakemake with new execution backends, storage providers, and schedulers without\
  \ modifying the core—a textbook microkernel pattern."
