review_notes: "README.md: describes Snakemake as a workflow management system for reproducible/scalable data analyses with rules defining input-to-output transformations. dag.py: builds directed acyclic graph of jobs from rule dependencies - core pipe-and-filter orchestration. rules.py + jobs.py: define transformation steps (filters) and their instantiated executions. scheduling/: job_scheduler.py, greedy.py, milp.py handle execution ordering of pipeline stages. executors/: local.py, dryrun.py, touch.py provide different execution backends. pyproject.toml: declares 6 plugin interface packages (snakemake-interface-executor-plugins, storage-plugins, report-plugins, logger-plugins, scheduler-plugins, common) enabling modular extension. src/snakemake/ contains well-separated modules: caching/, deployment/ (conda.py, singularity.py, containerize.py), linting/, report/, io/, ioutils/, settings/, remote/ (S3, GS, FTP, HTTP, etc.), script/, template_rendering/. workflow.py: central orchestrator importing from all modules. api.py: public API layer with plugin registries (ExecutorPluginRegistry, StoragePluginRegistry, ReportPluginRegistry, SchedulerPluginRegistry). Single deployable package with plugin-based extensibility = Modular Monolith; rule-based input-to-output DAG execution = Pipe-and-Filter."