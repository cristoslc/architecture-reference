review_notes: "Evidence: README.md explicitly states 'modular monolith architecture' with 'CQRS', 'Clean Architecture', and 'Domain-Driven Design' building blocks; modules integrated via 'event-driven architecture' with local contracts. src/Modules/ contains 7 independent modules (Agendas, Attendances, Conferences, Saga, Speakers, Tickets, Users) loaded by a single Bootstrapper. Complex modules (Agendas, Attendances) use 4-layer Clean Architecture (Api/Application/Domain/Infrastructure) with DDD aggregates (AggregateRoot base class in Shared.Abstractions/Kernel/Types/). Simpler modules (Conferences, Speakers, Tickets, Users) use 2-layer CRUD (Api/Core). CQRS confirmed via Commands/Queries separation in Shared.Abstractions and per-module Application layers. Event-driven integration via IMessageBroker publishing to both RabbitMQ (external) and IModuleClient (in-process). Saga module orchestrates cross-module workflows (InviteSpeakerSaga.cs). docker-compose.yaml runs PostgreSQL and RabbitMQ."