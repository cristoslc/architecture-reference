classification_reasoning: "## Architecture Classification: Modular Monolith\n\n###\
  \ Evidence for Modular Monolith\n\n**Single Deployable with Module Boundaries:**\n\
  - The `Bootstrapper` project (`src/Bootstrapper/Confab.Bootstrapper/Confab.Bootstrapper.csproj`)\
  \ references all modules and serves as the single entry point\n- All modules are\
  \ compiled into one application and run via `dotnet run` from the Bootstrapper\n\
  \n**Explicit Module Contract (`IModule` interface):**\n```csharp\n// src/Shared/Confab.Shared.Abstractions/Modules/IModule.cs\n\
  public interface IModule\n{\n    string Name { get; }\n    string Path { get; }\n\
  \    IEnumerable<string> Policies => null;\n    void Register(IServiceCollection\
  \ services);\n    void Use(IApplicationBuilder app);\n}\n```\n\n**Dynamic Module\
  \ Loading with Enable/Disable Support:**\n```csharp\n// src/Bootstrapper/Confab.Bootstrapper/ModuleLoader.cs\n\
  var enabled = configuration.GetValue<bool>($\"{moduleName}:module:enabled\");\n\
  if (!enabled) { disabledModules.Add(file); }\n```\n\n**Inter-Module Communication\
  \ via Local Contracts:**\n- `IModuleClient` provides `SendAsync()` for request/response\
  \ and `PublishAsync()` for broadcast\n- Type translation via serialization prevents\
  \ direct type dependencies between modules:\n```csharp\n// src/Shared/Confab.Shared.Infrastructure/Modules/ModuleClient.cs\n\
  private T TranslateType<T>(object value)\n    => _moduleSerializer.Deserialize<T>(_moduleSerializer.Serialize(value));\n\
  ```\n\n**Separate Database Schemas Per Module:**\n```csharp\n// src/Modules/Agendas/Confab.Modules.Agendas.Infrastructure/EF/AgendasDbContext.cs\n\
  protected override void OnModelCreating(ModelBuilder modelBuilder)\n{\n    modelBuilder.HasDefaultSchema(\"\
  agendas\");\n}\n```\n\n**7 Well-Defined Modules:**\n- Agendas, Attendances, Conferences,\
  \ Saga, Speakers, Tickets, Users\n- Each has its own namespace: `Confab.Modules.*`\n\
  - Each has internal layering (Api/Application/Domain/Infrastructure or Core)\n\n\
  ### Evidence for Domain-Driven Design (Secondary)\n\n**Aggregate Root Pattern:**\n\
  ```csharp\n// src/Shared/Confab.Shared.Abstractions/Kernel/Types/AggregateRoot.cs\n\
  public abstract class AggregateRoot<T>\n{\n    public IEnumerable<IDomainEvent>\
  \ Events => _events;\n    protected void AddEvent(IDomainEvent @event) { ... }\n\
  }\n```\n\n**Domain Entities with Business Logic:**\n```csharp\n// src/Modules/Agendas/Confab.Modules.Agendas.Domain/Submissions/Entities/Submission.cs\n\
  public sealed class Submission : AggregateRoot\n{\n    public void Approve() =>\
  \ ChangeStatus(SubmissionStatus.Approved, SubmissionStatus.Rejected);\n    // Business\
  \ logic encapsulated in entity methods\n}\n```\n\n**Domain Events and Handlers:**\n\
  ```csharp\n// src/Modules/Agendas/Confab.Modules.Agendas.Domain/Agendas/Events/Handlers/SubmissionApprovedHandler.cs\n\
  internal sealed class SubmissionApprovedHandler : IDomainEventHandler<SubmissionStatusChanged>\n\
  ```\n\n**Domain Services, Repositories, and Value Objects present in module Domain\
  \ layers**\n\n### What This Architecture Is NOT\n\n- **NOT Microservices**: The\
  \ README explicitly states this is a modular monolith. All modules deploy together\
  \ through the Bootstrapper. The `APIGateway` and `Services/Tickets` projects exist\
  \ for future microservices transition demonstration, not current deployment.\n\n\
  - **NOT Just Layered**: While modules have internal horizontal layers (Api/Application/Domain/Infrastructure),\
  \ the **primary architectural driver is vertical module boundaries** with enforced\
  \ isolation. Horizontal layering is secondary.\n\n- **NOT Service-Based**: Service-Based\
  \ architecture has 2-5 coarse-grained services often sharing a database. This has\
  \ 7 fine-grained modules with separate schemas and stronger isolation through local\
  \ contracts.\n\n### Conclusion\n\nConfab is a textbook example of **Modular Monolith**\
  \ architecture with strong module boundary enforcement through:\n1. Explicit `IModule`\
  \ contracts\n2. Dynamic loading with enable/disable capability\n3. Separate database\
  \ schemas per module\n4. Local contracts approach for inter-module communication\
  \ (no shared types)\n5. Serialization-based type translation preventing direct dependencies\n\
  \nThe DDD patterns (aggregates, domain events, entities with business logic) are\
  \ applied **within modules**, making DDD a complementary secondary style supporting\
  \ the modular monolith primary architecture."
