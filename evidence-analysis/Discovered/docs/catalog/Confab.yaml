review_notes: 'The repository is explicitly designed as a **Modular Monolith**, as
  stated in the README and evidenced by the project structure. The core architecture
  centers on a single deployable unit (the `Bootstrapper`) that aggregates multiple
  independent modules located under `src/Modules/`.


  ### Primary Style: Modular Monolith

  - **Single Deployment Unit:** The `src/Bootstrapper/Confab.Bootstrapper` project
  serves as the entry point. Its responsibility is to load and initialize all modules
  into a single process.

  - **Module Isolation:** Modules (e.g., `Attendances`, `Agendas`, `Tickets`) are
  organized into separate folders with their own internal layering (Domain, Application,
  Infrastructure, Api).

  - **Module Loading:** The presence of `src/Bootstrapper/Confab.Bootstrapper/ModuleLoader.cs`
  indicates a formal mechanism for discovering and starting these modules within the
  monolith''s lifecycle.

  - **Strict Boundaries:** The README mentions the use of "local contracts" instead
  of shared projects to prevent tight coupling between independent modules.


  ### Secondary Style: Event-Driven

  - **Inter-Module Communication:** The system uses asynchronous messaging for integration
  between modules. This is supported by infrastructure in `src/Shared/Confab.Shared.Infrastructure/Messaging`
  and `Events`.'
