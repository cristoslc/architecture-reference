review_notes: "README.md describes full serverless stack: Vue.js frontend via Amplify, AppSync GraphQL API hub, Cognito auth, DynamoDB storage. Four backend services in src/backend/ (catalog, booking, payment, loyalty), each with its own SAM template.yaml using AWS::Serverless-2016-10-31. Booking service template.yaml defines AWS::StepFunctions::StateMachine (ProcessBooking) orchestrating reserve-flight, reserve-booking, collect-payment, confirm-booking with compensating transactions (cancel, refund, release). SNS BookingTopic enables async messaging; Loyalty IngestFunc subscribes via SNS FilterPolicy on Booking.Status=confirmed. Services use different languages (Python for booking/payment/catalog, TypeScript for loyalty). Makefile deploys services independently (deploy.booking, deploy.payment, deploy.loyalty). amplify.yml defines CI/CD pipeline. Shared Lambda Layer in src/backend/shared/libs."