classification_reasoning: "## Architecture Analysis: AWS Serverless Airline Booking\n\
  \n### Primary Style: Microservices\n\nThis repository implements a **Microservices\
  \ architecture** with four distinct, independently deployable services, each owning\
  \ its own data:\n\n1. **Catalog Service** (`src/backend/catalog/`) — GraphQL API\
  \ via AppSync, DynamoDB for flight data, VTL resolvers\n2. **Booking Service** (`src/backend/booking/`)\
  \ — Step Functions state machine orchestrating Lambda functions, DynamoDB for bookings,\
  \ SNS topic for event publishing\n3. **Payment Service** (`src/backend/payment/`)\
  \ — Lambda functions wrapping Stripe API, integrates with external payment provider\n\
  4. **Loyalty Service** (`src/backend/loyalty/`) — REST API via API Gateway, TypeScript\
  \ Lambda functions, separate DynamoDB table\n\n**Evidence from `Makefile` lines\
  \ 21-27:**\n```makefile\ndeploy: ##=> Deploy services\n    $(MAKE) deploy.shared-lambda-layers\n\
  \    $(MAKE) deploy.payment\n    $(MAKE) deploy.booking\n    $(MAKE) deploy.loyalty\n\
  ```\n\nEach service has its own `template.yaml` (SAM) and deploys independently.\
  \ Services own their data:\n- **Booking**: Dedicated DynamoDB table via AppSync\
  \ (`BookingTable`)\n- **Loyalty**: Separate DynamoDB table (`LoyaltyDataTable` in\
  \ `src/backend/loyalty/template.yaml`)\n- **Catalog**: Dedicated DynamoDB table\
  \ (`FlightTable`)\n- **Payment**: Integrates with Stripe via Serverless Application\
  \ Repository\n\n### Secondary Style: Serverless\n\nThe entire system is built on\
  \ AWS serverless primitives:\n- **Compute**: AWS Lambda functions (Python and TypeScript)\n\
  - **API**: AppSync GraphQL, API Gateway REST\n- **Database**: DynamoDB (pay-per-request\
  \ mode)\n- **Orchestration**: Step Functions state machine for booking workflow\n\
  - **Messaging**: SNS for pub/sub between services\n- **Deployment**: SAM (Serverless\
  \ Application Model) templates for each service\n\nFrom `src/backend/booking/template.yaml`:\n\
  ```yaml\nAWSTemplateFormatVersion: 2010-09-09\nTransform: AWS::Serverless-2016-10-31\n\
  ```\n\nAll services use Lambda functions triggered by events (API Gateway, SNS,\
  \ Step Functions).\n\n### Secondary Style: Event-Driven\n\nThe architecture uses\
  \ event-driven communication patterns:\n\n**SNS Pub/Sub between services** — From\
  \ `src/backend/loyalty/template.yaml` lines 81-88:\n```yaml\nEvents:\n  Listener:\n\
  \    Type: SNS\n    Properties:\n      Topic: !Ref BookingSNSTopic\n      FilterPolicy:\n\
  \        Booking.Status:\n          - confirmed\n```\n\n**Step Functions Orchestration**\
  \ — The booking workflow uses a state machine with Saga pattern for distributed\
  \ transactions (confirmed in `src/backend/booking/README.md` line 50):\n> \"Booking\
  \ state machine handles all operations necessary to create bookings including payment.\
  \ We use Saga pattern to demonstrate how to implement coordinated transactions,\
  \ fallback transactions, and dead-letter-queue as part of a state machine.\"\n\n\
  The state machine definition from `src/backend/booking/template.yaml`:\n```yaml\n\
  StateMachineName: !Sub Airline-ProcessBooking-${Stage}\nDefinitionString: !Sub |\n\
  \    {\n        \"StartAt\": \"Reserve Flight\",\n        \"States\": {\n      \
  \      \"Reserve Flight\": { ... },\n            ...\n        }\n    }\n```\n\n\
  ### What Was Rejected\n\n- **Not Layered**: No horizontal presentation/business/data\
  \ layering. Services are vertically sliced by business capability (catalog, booking,\
  \ payment, loyalty).\n\n- **Not Modular Monolith**: Not a single deployable unit.\
  \ Each service has its own SAM template and CloudFormation stack, deployed independently\
  \ via separate make targets.\n\n- **Not Service-Based (2-5 coarse services)**: While\
  \ there are 4 services, the key distinction is that these follow microservice patterns:\
  \ separate data ownership, event-driven communication, and independent deployability.\
  \ Service-Based typically implies shared database, which is not the case here.\n\
  \n- **Not CQRS**: No explicit separation of command and query models. While AppSync\
  \ provides GraphQL queries and mutations, there's no dedicated read/write model\
  \ separation.\n\n- **Not Hexagonal Architecture**: No ports-and-adapters pattern.\
  \ Services use Lambda handlers directly without application core isolation.\n\n\
  ### Summary\n\nThis is a well-architected **Microservices** system built entirely\
  \ on **Serverless** infrastructure, with **Event-Driven** patterns for inter-service\
  \ communication (SNS) and workflow orchestration (Step Functions). The services\
  \ are bounded by business capability, own their data, and communicate through well-defined\
  \ APIs and events."
