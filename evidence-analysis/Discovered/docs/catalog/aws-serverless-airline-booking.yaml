one_line_summary: "AWS-native serverless airline booking reference app with four independently deployed microservices (Catalog, Booking, Payment, Loyalty) communicating via AppSync GraphQL, SNS pub/sub, and Step Functions orchestration."
classification_reasoning: "The dominant pattern is Serverless: all compute is AWS Lambda (Python and TypeScript), storage is DynamoDB (PAY_PER_REQUEST), and every API/workflow component (AppSync, Step Functions, API Gateway, Cognito) is a fully managed service with no persistent processes. Microservices is the second pattern: four bounded-context services each own their data store, deploy from independent SAM templates via separate Makefile targets, and use different language runtimes. Event-Driven is the third pattern: Booking publishes to an SNS topic with a Booking.Status attribute; Loyalty subscribes with a filter policy, decoupling the two services. The booking workflow uses Step Functions implementing the Saga pattern for distributed transaction management, with compensating transactions (CancelBooking, RefundPayment, Release Flight Seat) and a SQS dead-letter queue for permanently failed executions. Styles rejected: Pipeline (no ETL pipeline, Step Functions is a business workflow); CQRS (no separate read/write models); Hexagonal Architecture (Lambda handlers directly use AWS SDKs, no ports-and-adapters isolation); Service-Based (isolated data stores and fine-grained service decomposition distinguish this from Service-Based, which typically uses a shared database); DDD (bounded contexts exist but no tactical DDD patterns are present)."
