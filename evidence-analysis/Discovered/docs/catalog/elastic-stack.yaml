review_notes: 'Multi-repo ecosystem forming the classic ELK/Elastic Stack. Service
  coordination workflow: (1) Beats agents (Filebeat, Metricbeat, Packetbeat,
  Auditbeat — separate Go binaries) collect data from infrastructure and ship via
  REST to Elasticsearch or Logstash; (2) Logstash (Ruby/Java pipeline) ingests
  events, applies filter plugins (grok, mutate, geoip), outputs to Elasticsearch
  via /_bulk REST API; (3) Elasticsearch (Java, distributed) indexes documents
  across shards/replicas, serves search/aggregation queries via REST API;
  (4) Kibana (TypeScript/Node.js) queries Elasticsearch via REST API for
  visualization, dashboards, alerting, APM, and fleet management. Each component:
  independently versioned (separate repos, coordinated releases), independently
  deployed (own Docker image), communicates via documented REST APIs. Service-Based
  because 4 coarse-grained services with distinct responsibilities (collection,
  processing, storage, visualization) coordinate via REST APIs. Also Pipe-and-Filter
  because data flows through a processing pipeline (Beats → Logstash → Elasticsearch
  → Kibana).'
