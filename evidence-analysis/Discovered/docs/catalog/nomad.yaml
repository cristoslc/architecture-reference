one_line_summary: >
  A distributed workload orchestrator deployed as a single Go binary whose
  strongly partitioned internal packages (Modular Monolith) expose a stable
  gRPC plugin framework for out-of-process task drivers and device plugins
  (Microkernel).
classification_reasoning: >
  Nomad is a single deployable binary (~2,100 Go source files) whose internal
  structure is partitioned into clearly bounded, independently testable packages:
  nomad/ (server control plane with Raft FSM, evaluation broker, RPC endpoints),
  client/ (data-plane agent with alloc runners and plugin managers), scheduler/
  (service/batch/system/sysbatch algorithms), plugins/ (gRPC interfaces), drivers/
  (built-in task driver implementations), acl/, api/, and helper/. All packages
  share one compilation unit and one Raft-backed state store — the textbook
  Modular Monolith pattern.

  The plugins/ and drivers/ subsystem constitutes a genuine Microkernel extension
  architecture: the core binary defines stable gRPC interfaces (via hashicorp/go-plugin
  v1.7.0) for task drivers, device plugins, and CSI plugins; out-of-process
  extensions implement those interfaces and are loaded, supervised, and versioned
  by the kernel's plugin managers at runtime. Built-in drivers (Docker, exec, Java,
  QEMU, rawexec) live in the same binary but expose themselves through the same
  plugin interface as external community drivers.

  Secondary patterns present but not primary styles: an evaluation broker ->
  scheduler worker -> plan applier -> client dispatch Pipeline drives scheduling
  internally; an EventBroker layer provides streaming event pub/sub over Raft
  state changes; Raft + Serf provide strong consistency and gossip-based cluster
  membership. None of these secondary patterns override the Modular Monolith +
  Microkernel primary classification.

  Evidence against alternative styles: not Microservices (single binary, single
  process, shared state store); not Service-Based (no independently deployable
  coarse services); not Event-Driven (Raft-based synchronous mutation is primary,
  event streaming is supplementary); not CQRS (single read/write state store via
  go-memdb).
