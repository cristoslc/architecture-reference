classification_reasoning: "## Architecture Classification: Microkernel (Plugin) with\
  \ Layered Components\n\n### Primary Style: Microkernel (Plugin)\n\nNomad is architected\
  \ as a **microkernel with a plugin system** - this is HashiCorp's signature architecture\
  \ pattern. The evidence is extensive:\n\n**Plugin Infrastructure:**\n\n1. **Plugin\
  \ Interface Definitions** (`plugins/`):\n   - `plugins/base/base.go`: Defines `BasePlugin`\
  \ interface that ALL plugins must implement (`PluginInfo()`, `ConfigSchema()`, `SetConfig()`)\n\
  \   - `plugins/drivers/driver.go`: `DriverPlugin` interface for task execution (Docker,\
  \ QEMU, Java, Exec)\n   - `plugins/device/plugin.go`: `DevicePlugin` interface for\
  \ hardware device management (GPU, FPGA)\n   - `plugins/csi/plugin.go`: CSI plugin\
  \ interface for storage\n\n2. **Plugin Registry & Types** (`plugins/base/plugin.go`):\n\
  \   ```go\n   const (\n       PluginTypeBase   = \"base\"\n       PluginTypeDriver\
  \  = \"driver\"\n       PluginTypeDevice  = \"device\"\n   )\n   ```\n\n3. **Plugin\
  \ Loading System** (`helper/pluginutils/loader/loader.go`):\n   - `PluginLoader`\
  \ scans plugin directories for binaries\n   - Supports both **internal plugins**\
  \ (compiled into binary) and **external plugins** (separate binaries)\n   - Version\
  \ negotiation via API versioning\n   - Plugin fingerprinting and configuration schema\
  \ validation\n\n4. **Plugin Managers** (runtime orchestration):\n   - `client/pluginmanager/drivermanager/manager.go`:\
  \ Manages driver plugin lifecycle\n   - `client/devicemanager/manager.go`: Manages\
  \ device plugins\n   - `client/pluginmanager/csimanager/manager.go`: Manages CSI\
  \ storage plugins\n\n5. **Built-in Driver Plugins** (`drivers/`):\n   - `drivers/docker/`\
  \ - Docker container driver (2063 lines)\n   - `drivers/qemu/` - QEMU virtual machine\
  \ driver\n   - `drivers/java/` - Java execution driver\n   - `drivers/exec/` - Executable\
  \ driver\n   - `drivers/rawexec/` - Raw execution driver\n\nEach driver can be built\
  \ as a standalone plugin binary (`drivers/docker/cmd/main.go`):\n```go\nfunc main()\
  \ {\n    // Serve the plugin\n    plugins.ServeCtx(factory)\n}\n```\n\n6. **gRPC\
  \ Plugin Communication** (`plugins/drivers/plugin.go`):\n   - Uses `github.com/hashicorp/go-plugin`\
  \ for process isolation\n   - Plugins communicate over gRPC with handshake authentication\n\
  \   - Plugin binaries are launched as separate processes\n\n### Secondary Style:\
  \ Layered\n\nWithin the microkernel, Nomad exhibits clear horizontal layering:\n\
  \n**Layer Structure:**\n1. **API Layer** (`api/`): Go client library for external\
  \ integration\n2. **Command/Agent Layer** (`command/agent/`): HTTP server, CLI commands,\
  \ configuration\n3. **Server Business Logic** (`nomad/`): Scheduling, Raft consensus,\
  \ state management\n4. **Client Business Logic** (`client/`): Allocation management,\
  \ fingerprinting, task execution\n5. **Scheduler Layer** (`scheduler/`): Job scheduling\
  \ algorithms\n6. **Plugin Layer** (`plugins/`, `drivers/`): Extensible task execution\n\
  \n**Raft Consensus Layer** (`nomad/server.go`):\n- Uses HashiCorp's Raft library\
  \ for distributed state\n- State stored in BoltDB/WAL\n- In-memory state via go-memdb\
  \ (`nomad/state/`)\n\n### Why NOT Other Styles:\n\n- **Not Microservices**: Single\
  \ binary deployment (`main.go`), single process per agent. No service boundaries\
  \ with independent deployment.\n- **Not Service-Based**: No 2-5 coarse-grained services\
  \ sharing a database.\n- **Not Event-Driven**: Uses synchronous RPC for communication.\
  \ Raft for consensus, not message brokers.\n- **Not Modular Monolith**: While it's\
  \ a single binary, the defining characteristic is the plugin extension mechanism,\
  \ not just internal module boundaries.\n- **Not CQRS**: Single state store, no separate\
  \ read/write models.\n- **Not DDD**: Code organized by technical function (client,\
  \ server, scheduler, plugins), not bounded contexts/aggregates.\n\n### Key Architecture\
  \ Diagram:\n\n```\n┌─────────────────────────────────────────────────────────────┐\n\
  │                      Nomad Agent (main.go)                   │\n│  ┌───────────────────────────────────────────────────────┐\
  \  │\n│  │              Core System (Microkernel)                 │  │\n│  │  ┌─────────────┐\
  \  ┌─────────────┐  ┌──────────────┐  │  │\n│  │  │   Server    │  │   Client  \
  \  │  │  Scheduler   │  │  │\n│  │  │  (Raft/FSM) │  │  (Allocs)    │  │  (Planner)\
  \   │  │  │\n│  │  └─────────────┘  └─────────────┘  └──────────────┘  │  │\n│ \
  \ │                                                       │  │\n│  │  ┌──────────────────────────────────────────────────┐\
  \ │  │\n│  │  │           Plugin Managers                        │ │  │\n│  │  │\
  \  ┌──────────┐ ┌───────────┐ ┌────────────────┐ │ │  │\n│  │  │  │ Driver   │ │\
  \  Device   │ │ CSI Manager    │ │ │  │\n│  │  │  │ Manager  │ │  Manager  │ │ \
