review_notes: "Evidence: README.md 'Service architecture' section lists 9 independently deployed services (frontend, ledger-writer, balance-reader, transaction-history, ledger-db, user-service, contacts, accounts-db, loadgenerator). kubernetes-manifests/ has separate Deployment+Service YAML per service. src/ organized by domain: src/accounts/ (userservice, contacts, accounts-db), src/ledger/ (ledgerwriter, balancereader, transactionhistory, ledger-db). Each service has own Dockerfile/Jib build, skaffold.yaml, cloudbuild.yaml. Ledger domain exhibits CQRS: ledger-writer handles writes (POST /transactions), balance-reader and transaction-history handle reads with Guava caches polling ledger-db. src/ledgermonolith/ provides monolith variant combining 3 Java services, confirming microservices as primary. docs/adding-new-microservice.md documents adding new services. config.yaml service-api-config shows inter-service HTTP via Kubernetes service names."