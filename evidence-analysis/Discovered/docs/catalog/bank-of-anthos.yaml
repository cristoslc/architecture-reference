one_line_summary: "Google Cloud's canonical Kubernetes-native banking demo implementing
  Microservices with nine independently deployable services across two domain-aligned
  bounded contexts (accounts and ledger), synchronous HTTP/REST communication, database-per-service,
  and Istio service mesh."
classification_reasoning: "Bank of Anthos is a textbook Microservices implementation
  designed as a Google Cloud reference application. Nine independently containerized
  services (frontend, userservice, contacts, ledgerwriter, balancereader, transactionhistory,
  accounts-db, ledger-db, loadgenerator) each have their own Dockerfile, skaffold.yaml,
  cloudbuild.yaml, and Kubernetes manifest. Database-per-service is enforced at the
  infrastructure level via two separate PostgreSQL StatefulSets with distinct credentials
  (accounts-db owned by the accounts domain; ledger-db owned by the ledger domain).
  Services communicate synchronously over HTTP/REST via Kubernetes DNS service discovery.
  The frontend uses a TracedThreadPoolExecutor to fan out parallel HTTP calls to backend
  services. No message broker, pub/sub, or event bus is present. The balancereader
  and transactionhistory services employ a LedgerReader polling pattern for read-side
  cache updates — a CQRS-adjacent optimization, but not formal CQRS (no event sourcing,
  no command bus, same underlying ledger-db). Istio/ASM service mesh handles cross-cutting
  concerns (mTLS, observability, traffic management). Polyglot stack (Python/Flask
  for accounts domain and frontend; Java/Spring Boot for ledger domain) reflects technology-per-service
  freedom. The src/ledgermonolith/ module exists as a migration-comparison artifact,
  explicitly demonstrating the transition from monolith to microservices and reinforcing
  that the primary architecture is microservices. Confidence: 0.97."
