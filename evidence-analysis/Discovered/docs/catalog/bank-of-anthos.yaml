classification_reasoning: "## Architecture Classification: Microservices\n\n**Bank\
  \ of Anthos** is a canonical microservices architecture designed for Kubernetes\
  \ deployment. The evidence is overwhelming:\n\n### Multiple Independently Deployable\
  \ Services\n\nThe repository contains **9 distinct services**, each with its own\
  \ deployment configuration:\n\n| Service | Language | Deployed As |\n|---------|----------|-------------|\n\
  | frontend | Python/Flask | Deployment + Service |\n| userservice | Python/Flask\
  \ | Deployment + Service |\n| contacts | Python/Flask | Deployment + Service |\n\
  | ledgerwriter | Java/Spring Boot | Deployment + Service |\n| balancereader | Java/Spring\
  \ Boot | Deployment + Service |\n| transactionhistory | Java/Spring Boot | Deployment\
  \ + Service |\n| accounts-db | PostgreSQL | StatefulSet |\n| ledger-db | PostgreSQL\
  \ | StatefulSet |\n| loadgenerator | Python/Locust | Deployment |\n\nEach service\
  \ has independent build artifacts (`Dockerfile`, `skaffold.yaml`, `cloudbuild.yaml`)\
  \ and Kubernetes manifests (`kubernetes-manifests/*.yaml`).\n\n### Database-Per-Service\
  \ Pattern\n\nTwo independent PostgreSQL databases with clear ownership boundaries:\n\
  \n- **accounts-db** (line 16-17 of `kubernetes-manifests/accounts-db.yaml`): Owned\
  \ by the accounts domain (userservice, contacts)\n- **ledger-db** (line 21-22 of\
  \ `kubernetes-manifests/ledger-db.yaml`): Owned by the ledger domain (ledgerwriter,\
  \ balancereader, transactionhistory)\n\nEach database is deployed as a separate\
  \ `StatefulSet` with dedicated `ConfigMap` for configuration.\n\n### Synchronous\
  \ Service-to-Service Communication\n\nServices communicate via REST over HTTP, not\
  \ events. The `kubernetes-manifests/config.yaml` defines service endpoints:\n\n\
  ```yaml\nTRANSACTIONS_API_ADDR: \"ledgerwriter:8080\"\nBALANCES_API_ADDR: \"balancereader:8080\"\
  \nHISTORY_API_ADDR: \"transactionhistory:8080\"\nCONTACTS_API_ADDR: \"contacts:8080\"\
  \nUSERSERVICE_API_ADDR: \"userservice:8080\"\n```\n\nThe frontend (`src/frontend/frontend.py`\
  \ lines 115-134) makes parallel HTTP calls to multiple backend services using a\
  \ thread pool executor, confirming synchronous orchestration.\n\n### No Event-Driven\
  \ Infrastructure\n\nSearched for message broker configurations (kafka, rabbitmq,\
  \ pubsub, queue, event) across all YAML files—**no results found**. Services communicate\
  \ directly via HTTP, not through an event bus.\n\n### Independent Build Pipeline\n\
  \nThe root `skaffold.yaml` orchestrates builds across 6 separate modules:\n```yaml\n\
  requires:\n- configs: [accounts]\n  path: src/accounts/skaffold.yaml\n- configs:\
  \ [ledger]\n  path: src/ledger/skaffold.yaml\n- configs: [frontend]\n  path: src/frontend/skaffold.yaml\n\
  # ... etc\n```\n\n### Alternative Monolith Option\n\nThe repository includes `src/ledgermonolith/`—a\
  \ single Java service that combines ledger-writer, balance-reader, and transaction-history\
  \ functionality. This exists specifically to demonstrate migration from monolith\
  \ to microservices, reinforcing that the primary architecture is microservices.\n\
  \n### What This Is NOT\n\n- **Not Service-Based**: 9 services exceeds the typical\
  \ 2-5 coarse-grained services definition\n- **Not Modular Monolith**: No single\
  \ deployable unit; each service is independently containerized and deployed\n- **Not\
  \ Event-Driven**: No message broker, no pub/sub patterns\n- **Not CQRS**: While\
  \ balancereader maintains a read-optimized cache, there's no formal CQRS command/query\
  \ separation—ledgerwriter writes directly to the same ledger-db\n- **Not DDD**:\
  \ Domain-oriented services exist, but no aggregates, domain events, or bounded context\
  \ maps\n\nThis is a reference implementation for cloud-native microservices on Kubernetes\
  \ with Istio service mesh, designed to demonstrate Google Cloud products (GKE, Anthos,\
  \ Cloud SQL, Cloud Build)."
