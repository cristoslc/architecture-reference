architecture_qualifiers:
- type: distribution-model
  value: peer-to-peer
  protocol: JGroups
  note: All cluster nodes are peers; no dedicated master/coordinator beyond topology manager election
- type: consistency-model
  value: configurable
  note: AP by default (ALLOW_READ_WRITES); CP mode available via PartitionHandling.DENY_READ_WRITES and jgroups-raft for counters/locks
- type: deployment-model
  value: embedded-or-server
  note: Can run embedded in a JVM (no server tier required) or as a standalone server with all protocol modules
