one_line_summary: Red Hat's distributed in-memory data grid — Modular Monolith of 55+ @InfinispanModule-annotated Maven modules, with Space-Based cluster topology (consistent-hash segments, elastic rebalancing, XSite replication) and Microkernel extensibility (NonBlockingStore SPI, AsyncInterceptorChain, pluggable protocol servers).
