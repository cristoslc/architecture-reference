review_notes: 'Infinispan is primarily structured as a **Microkernel (Plugin)** architecture.
  The core of the system provides the fundamental distributed key/value engine, while
  a vast array of functionalities are implemented through a pluggable module system.
  This is evidenced by:


  1.  **SPI and Archetypes:** The presence of `commons/spi` and an `archetypes/` directory
  (containing `archetypes/custom-module`, `archetypes/store`, and `archetypes/server-task`)
  indicates a formal contract for external and internal extensions. Developers can
  implement "stores" or "tasks" that plug into the core engine.

  2.  **Extensible Server Core:** The `server/` directory shows a core runtime (`server/core`,
  `server/runtime`) that is extended by multiple protocol modules such as `server/hotrod`,
  `server/rest`, `server/memcached`, and `server/resp`. These act as protocol-specific
  "plugins" to the same underlying data grid.

  3.  **Core/Commons Separation:** The repository strictly separates the absolute
  `core` from `commons`, `tasks`, and various integration modules (like `hibernate/`,
  `quarkus/`), allowing the system to boot as a minimal kernel and load only necessary
  components.


  As an "In-Memory Distributed Database," it also natively embodies a **Space-Based**
  architecture. The code focuses on partitioning data across nodes (sharding), handling
  high availability through replication, and providing a "tuple space" (the Key/Value
  store) where processing moves to the data.


  While the project is a huge repository, it is essentially a **Modular Monolith**
  in terms of its development units; although it can be deployed as an independent
  server, many of these modules (`core`, `lock`, `anchored-keys`) are compiled into
  JARs intended to be used together or embedded into a single JVM process, with clearly
  defined dependency boundaries enforced by Maven `pom.xml` files.'
