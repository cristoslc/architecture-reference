classification_reasoning: >
  Infinispan is a Modular Monolith as its primary style: 55+ Maven modules wired by a
  compile-time @InfinispanModule annotation processor and a ModuleLifecycle SPI, all
  building into a single distribution artifact. Module boundaries are enforced at
  compile time — each module declares its requiredModules/optionalModules, and the
  component-processor validates the graph. The API / Commons / Core three-tier
  abstraction stack (api/ → commons/ → core/) enforces upward-only dependencies.
  Space-Based is the secondary style: at runtime each cluster node owns a consistent-hash-
  assigned slice of a segmented keyspace (DefaultConsistentHash routing table),
  executes operations locally against its segments (DistributionManager), and
  participates in elastic rebalancing via StateConsumerImpl/StateProviderImpl. JGroups
  provides cluster membership; jgroups-raft provides Raft consensus for counters and
  locks. Partition handling (PartitionHandling.java) exposes the CP/AP trade-off dial.
  Cross-site replication (XSite / IRAC) spans geographically separate clusters.
  Microkernel is the tertiary style: the NonBlockingStore SPI defines a formal plugin
  contract for swappable persistence backends (JDBC, RocksDB, Remote, SQL); the
  AsyncInterceptorChain is the command-pipeline extension point used by query, transaction,
  and state-transfer modules; and the server tier loads five protocol modules (HotRod,
  REST, Memcached, RESP, Router) as named @InfinispanModule plugins behind a single-port
  ALPN/SNI router. Three Maven archetypes (custom-module, store, server-task) formalize
  the third-party extension contract.
review_notes: >
  Infinispan is primarily structured as a Modular Monolith: 55+ Maven modules each
  annotated with @InfinispanModule and validated by a compile-time annotation processor,
  all building into a single deployable distribution. The API/Commons/Core three-tier
  abstraction enforces upward-only module dependencies. At runtime the system is a
  Space-Based data grid: each node owns consistent-hash-assigned segments, executes
  operations locally, and participates in elastic rebalancing and optional XSite
  cross-datacenter replication. A Microkernel layer governs extensibility via the
  NonBlockingStore SPI (four production backends), AsyncInterceptorChain (module injection
  of command interceptors), and five protocol-server plugins loaded by server/runtime.
  Three Maven archetypes formalize the third-party plugin authoring contract.
key_technologies:
- Java 17+
- JGroups (cluster transport and membership)
- jgroups-raft (Raft consensus)
- Netty (non-blocking I/O)
- Lucene (full-text search / query)
- RocksDB (embedded persistence)
- Protobuf / ProtoStream (serialization)
- RxJava 3 (reactive streams)
- CDI / Quarkus integration
- Maven multi-module build
quality_attributes:
- High Availability (configurable backup owners, partition handling)
- Horizontal Scalability (elastic rebalancing, consistent-hash partitioning)
- Fault Tolerance (replica copies, split-brain protection, IRAC cross-site)
- Low Latency (in-memory, local execution against owned segments)
- Extensibility (NonBlockingStore SPI, AsyncInterceptorChain, @InfinispanModule)
- Multi-Protocol Support (HotRod, REST, Memcached, RESP in one server process)
- Geographic Distribution (XSite / IRAC active-active and active-passive replication)
- Embeddability (all modules can run in-process without the server tier)
notable_strengths:
- Compile-time module graph validation via @InfinispanModule annotation processor
- NonBlockingStore SPI enforces fully async persistence with Characteristic declarations
- Single-port ALPN/SNI router allows all protocols on one listener
- Topology-aware consistent hashing ensures replicas span racks and datacenters
- IRAC provides conflict-tolerant async cross-site replication
- Three Maven archetypes lower the barrier for third-party extensions
notable_gaps:
- No ArchUnit or equivalent automated enforcement of upward-only layer dependencies (unlike Hazelcast)
- AsyncInterceptorChain modification at runtime is marked @Experimental
- NonBlockingStore SPI is also @Experimental despite being the only persistence contract
