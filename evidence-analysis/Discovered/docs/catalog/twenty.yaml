classification_reasoning: "## Analysis\n\n### Primary Style: Modular Monolith\n\n\
  The Twenty repository exhibits strong characteristics of a **Modular Monolith**\
  \ architecture:\n\n**Single Deployable Unit:**\n- The `docker-compose.yml` (`packages/twenty-docker/docker-compose.yml`)\
  \ shows a single Docker image (`twentycrm/twenty`) used for both the `server` and\
  \ `worker` services\n- The worker runs from the same codebase with `yarn worker:prod`\
  \ command, not as a separate service\n- Single shared PostgreSQL database and Redis\
  \ instance\n\n**Enforced Internal Module Boundaries:**\n- **278 NestJS modules**\
  \ organized with clear cohesion\n- Each module in `packages/twenty-server/src/modules/`\
  \ follows consistent structure:\n  - `standard-objects/` for workspace entities\n\
  \  - `services/` for business logic\n  - `jobs/` for background processing\n  -\
  \ `resolvers/` for GraphQL endpoints\n  - `repositories/` for data access\n- Examples\
  \ include: `calendar/`, `messaging/`, `workflow/`, `favorite/`, `connected-account/`,\
  \ `dashboard/`\n\n**Module Isolation:**\n- NestJS module system enforces explicit\
  \ dependencies via `imports` arrays\n- Each module encapsulates its own:\n  - Workspace\
  \ entities (e.g., `company.workspace-entity.ts`, `person.workspace-entity.ts`)\n\
  \  - Services with dependency injection\n  - GraphQL resolvers\n  - Background jobs\n\
  \n**Nx Workspace Enforcing Boundaries:**\n- Monorepo structure (`nx.json` line 2-5)\
  \ organizes packages\n- Build dependencies enforced (`\"dependsOn\": [\"^build\"\
  ]`)\n- Tags for scope control (`\"scope:backend\"`, `\"scope:frontend\"`)\n\n###\
  \ Secondary Style: Layered\n\nHorizontal layering is evident in the backend architecture:\n\
  \n**API Layer** (`packages/twenty-server/src/engine/api/`):\n- `graphql/` - GraphQL\
  \ endpoints with Yoga driver\n- `rest/` - REST API controllers\n- `mcp/` - Model\
  \ Context Protocol support\n\n**Business Logic Layer:**\n- `packages/twenty-server/src/modules/`\
  \ - Domain business logic (calendar, messaging, workflow)\n- `packages/twenty-server/src/engine/core-modules/`\
  \ - Infrastructure concerns (auth, billing, email, file-storage)\n\n**Data Access\
  \ Layer:**\n- TypeORM entities and repositories\n- TwentyORM custom abstraction\
  \ (`packages/twenty-server/src/engine/twenty-ORM/`)\n- Workspace entities with defined\
  \ relations\n\n### What This Is NOT\n\n**Not Microservices:**\n- Single deployable\
  \ Docker image (not independently deployable services)\n- Single shared database\
  \ (not database-per-service)\n- In-process communication via NestJS modules (not\
  \ network calls)\n\n**Not Event-Driven Architecture:**\n- BullMQ queues are for\
  \ background job processing within the monolith, not inter-service communication\n\
  - EventEmitter2 (`packages/twenty-server/src/engine/workspace-event-emitter/`) handles\
  \ internal events in-process\n- No message broker for service-to-service communication\n\
  \n**Not Domain-Driven Design:**\n- No bounded context terminology or aggregates\n\
  - Workspace entities are ORM models, not DDD entities with invariants\n- Module\
  \ organization follows NestJS conventions, not DDD tactical patterns\n\n**Not Hexagonal\
  \ Architecture:**\n- No ports/adapters terminology\n- Uses standard NestJS dependency\
  \ injection, not explicit adapter interfaces\n- Infrastructure concerns mixed in\
  \ modules rather than isolated\n\n### Evidence Summary\n\n| Criterion | Finding\
  \ |\n|-----------|---------|\n| Deployable units | 1 Docker image (server + worker\
  \ share codebase) |\n| Database topology | Single shared PostgreSQL |\n| Module\
  \ count | 278 NestJS modules with explicit boundaries |\n| Communication | In-process\
  \ (NestJS DI), not network-based |\n| Background processing | Queue worker from\
  \ same codebase (BullMQ) |\n| Frontend | Separate React SPA, not SSR Next.js |"
