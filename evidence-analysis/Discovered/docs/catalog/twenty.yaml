one_line_summary: Open-source CRM built as a NestJS modular monolith with an event-driven
  async layer (BullMQ + EventEmitter2), an AI agent execution engine supporting 7
  LLM providers, and a visual workflow builder — all within a single deployable unit
  backed by PostgreSQL and Redis.
quality_attributes:
  extensibility: high — metadata-driven dynamic schema; NestJS module system; 8 pluggable
    tool providers; application marketplace with OAuth and package registry
  scalability: medium — horizontal scaling possible via BullMQ worker pool (Redis-backed);
    workspace-scoped datasources allow per-tenant isolation; single shared PostgreSQL
    is the ceiling
  maintainability: high — Nx monorepo with enforced package boundaries; 278+ NestJS
    modules with explicit dependency injection; strict TypeScript; Prometheus metrics
    and OpenTelemetry instrumentation
  observability: medium-high — Prometheus exporter (v1.17.0), OpenTelemetry via
    instrument.ts, per-queue job metrics, BullMQ dashboard integration
  testability: high — NestJS DI makes unit testing straightforward; Jest integration
    config; mock driver (SyncDriver) for queue-free testing; Playwright e2e suite
  ai_integration: high — first-class AI subsystem with 7 LLM providers (OpenAI,
    Anthropic, Bedrock, Google, xAI, Groq, Mistral); ReAct agentic loop with tool
    calling; MCP server endpoint; AI workflow action step; frontend AI chat
classification_reasoning: "## Analysis\n\n### Primary Style: Modular Monolith\n\n\
  Twenty is definitively a Modular Monolith. The decisive evidence:\n\n**Single deployable\
  \ unit:** `docker-compose.yml` uses one Docker image (`twentycrm/twenty`) for both\
  \ the `server` and `worker` services. The worker runs with `yarn worker:prod` from\
  \ the same compiled codebase. One shared PostgreSQL database and one Redis instance.\
  \ No network boundary separates application logic.\n\n**278+ NestJS modules with\
  \ explicit boundaries:** Modules under `src/engine/` and `src/modules/` use NestJS\
  \ `@Module` decorator with explicit `imports` arrays. Domain modules (calendar, messaging,\
  \ workflow, connected-account, note, task, opportunity, company, person) each have\
  \ their own `.module.ts`, services, repositories, resolvers, and jobs — maintaining\
  \ strong cohesion within and loose coupling between domains.\n\n**TwentyORM multi-tenant\
  \ abstraction:** A custom TypeORM layer manages per-workspace datasources, keeping\
  \ all data access within the single deployment boundary while supporting multi-tenant\
  \ schema isolation.\n\n**Nx enforced boundaries:** The monorepo uses Nx scope tags\
  \ (`scope:backend`, `scope:frontend`) with build dependency enforcement. The 15+\
  \ packages are compilation units, not runtime services.\n\n### Secondary Style:\
  \ Event-Driven\n\nThree event-driven mechanisms are structurally embedded:\n\n1.\
  \ **WorkspaceEventEmitter (EventEmitter2):** In-process typed event bus for domain\
  \ events (CRUD actions, custom workspace events). Decouples modules without network\
  \ calls.\n\n2. **BullMQ job queue (17 named queues):** Redis-backed async job processing\
  \ for messaging, calendar, webhooks, AI, workflow, billing, and more. The queue\
  \ worker is a separate process but runs from the same codebase.\n\n3. **Redis SSE\
  \ subscriptions:** Real-time push to the React frontend via graphql-sse, backed\
  \ by Redis pub/sub for multi-instance support.\n\nThese are genuine event-driven\
  \ mechanisms that shape how cross-module coupling is managed, making Event-Driven\
  \ a legitimate secondary style rather than incidental middleware.\n\n### Why NOT\
  \ Microservices\n\nNo bounded context with its own deployable + database. Server\
  \ and worker share one image, one PostgreSQL, one Redis. In-process NestJS DI mediates\
  \ all module communication — no HTTP or message bus service-to-service calls.\n\n\
  ### Why NOT Multi-Agent (primary style)\n\nAI agents are a rich feature set within\
  \ the monolith (AgentEntity, ai-agent-execution, 7 LLM providers, ReAct loop, MCP\
  \ server). But the system itself is not organized as autonomous coordinating agents.\
  \ Agents are configurable user-facing capabilities, not the runtime topology of\
  \ the platform.\n\n### Why NOT Pipeline (primary style)\n\nThe workflow engine implements\
  \ a DAG execution model (trigger → builder → runner → executor → action handlers).\
  \ This is a genuine Pipeline pattern scoped to the workflow feature. But it is one\
  \ module cluster inside the monolith, not the organizing principle of the entire\
  \ system.\n\n### Evidence Summary\n\n| Criterion | Finding |\n|-----------|---------|\n\
  | Deployable units | 1 Docker image (server + worker share codebase) |\n| Database\
  \ topology | Single shared PostgreSQL 16 |\n| Module count | 278+ NestJS modules\
  \ with explicit boundaries |\n| Communication | In-process NestJS DI (primary),\
  \ BullMQ/Redis (async jobs), EventEmitter2 (internal events) |\n| Background processing\
  \ | Queue worker from same codebase (BullMQ, 17 queues) |\n| Real-time | Redis\
  \ SSE (graphql-sse) |\n| AI | Full agent execution engine: 7 providers, ReAct loop,\
  \ MCP server, AI workflow action |\n| Frontend | React SPA (separate package, communicates\
  \ via GraphQL + SSE) |"
