review_notes: 'ARCHITECTURE.md describes layered backend: routes->commands->models->policies->presenters.
  21 plugins in plugins/ each with plugin.json, server/, client/, shared/ subdirs.
  server/services/ runs web, worker, websockets, collaboration, cron, admin as in-process
  services (not separate deployables). server/queues/ has globalEventQueue, processorEventQueue,
  websocketQueue, taskQueue backed by Bull/Redis. 28+ event processors in server/queues/processors/.
  server/commands/ contains domain operations like documentCreator, documentMover,
  userProvisioner. Procfile splits into web+worker processes from same codebase. docker-compose.yml
  only has postgres and redis as infrastructure. Single package.json, single Dockerfile.'
