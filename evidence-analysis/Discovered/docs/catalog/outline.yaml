classification_reasoning: "## Analysis\n\nOutline is a **Layered architecture with\
  \ a Microkernel-style plugin system**. The repository is structured as a single\
  \ deployable monolith with clear horizontal layering on both frontend and backend,\
  \ extended by a robust plugin infrastructure.\n\n### Primary: Layered Architecture\n\
  \nThe codebase exhibits classic horizontal layering:\n\n**Backend (Koa/Node.js)**\
  \ in `server/`:\n- **Routes layer** (`server/routes/`) - API endpoints organized\
  \ by domain (documents, collections, users, etc.)\n- **Commands layer** (`server/commands/`)\
  \ - Business logic operations spanning multiple models\n- **Models layer** (`server/models/`)\
  \ - Sequelize ORM data access with 30+ domain models\n- **Policies layer** (`server/policies/`)\
  \ - Authorization logic using cancan\n- **Presenters layer** (`server/presenters/`)\
  \ - JSON serialization transforming models to API responses\n- **Middlewares layer**\
  \ (`server/middlewares/`) - Request processing (authentication, validation, rate\
  \ limiting)\n\n**Frontend (React/Vite)** in `app/`:\n- **Scenes** (`app/scenes/`)\
  \ - Full-page views (route-level components)\n- **Components** (`app/components/`)\
  \ - Reusable UI components\n- **Stores** (`app/stores/`) - MobX state containers\
  \ (CollectionsStore, DocumentsStore, etc.)\n- **Models** (`app/models/`) - Client-side\
  \ domain models with MobX observables\n- **Routes** (`app/routes/`) - Route definitions\
  \ with lazy loading\n\nThe `docs/ARCHITECTURE.md` explicitly documents this layered\
  \ organization.\n\n### Secondary: Microkernel (Plugin) Architecture\n\nA sophisticated\
  \ plugin system extends the core:\n\n**Server PluginManager** (`server/utils/PluginManager.ts`):\n\
  ```typescript\nexport enum Hook {\n  API = \"api\",\n  AuthProvider = \"authProvider\"\
  ,\n  Processor = \"processor\",\n  Task = \"task\",\n  UnfurlProvider = \"unfurl\"\
  ,\n  // ...\n}\n```\n\nPlugins register via hooks for API routes, authentication\
  \ providers, async processors, tasks, and more. The system dynamically loads plugins\
  \ at runtime:\n```typescript\nglob.sync(path.join(rootDir, \"plugins/*/server/!(*.test|schema).[jt]s\"\
  ))\n```\n\n**Client PluginManager** (`app/utils/PluginManager.ts`):\n```typescript\n\
  export enum Hook {\n  Settings = \"settings\",\n  Imports = \"imports\",\n  Icon\
  \ = \"icon\",\n}\n```\n\n**20+ plugins** provide integrations:\n- `plugins/slack/`\
  \ - Slack auth and slash commands\n- `plugins/github/` - GitHub issue unfurling\n\
  - `plugins/google/` - Google authentication\n- `plugins/linear/`, `plugins/figma/`,\
  \ `plugins/notion/` - Various integrations\n\nEach plugin has `plugin.json` metadata\
  \ and optional `client/`, `server/`, and `shared/` directories. Example from `plugins/github/server/index.ts`:\n\
  ```typescript\nif (enabled) {\n  PluginManager.add([\n    { type: Hook.API, value:\
  \ router },\n    { type: Hook.Task, value: GitHubWebhookTask },\n    { type: Hook.UnfurlProvider,\
  \ value: { unfurl: GitHub.unfurl } },\n  ]);\n}\n```\n\n### Why Not Other Styles\n\
  \n- **Not Microservices**: Single `package.json`, single `Dockerfile`, single build\
  \ artifact (`build/server/index.js`). The \"services\" (web, worker, collaboration)\
  \ are runtime modes of the same application sharing one PostgreSQL database.\n\n\
  - **Not Modular Monolith**: While organized by domain, there's no enforced module\
  \ boundary system (no package workspaces, module-scoped dependencies, or internal\
  \ API contracts). The plugin system provides extension, not internal module isolation.\n\
  \n- **Not Hexagonal**: No ports/adapters pattern. The presenters layer transforms\
  \ data but isn't an adapter abstraction. Database and external services are accessed\
  \ directly from models and commands.\n\n- **Event-Driven is internal only**: Bull\
  \ queues with Redis handle async tasks (emails, notifications, websockets) but this\
  \ is background job processing within the monolith, not inter-service event communication.\n\
  \n### Deployment Topology\n\nSingle container deployed with multiple runtime service\
  \ modes:\n```javascript\n// server/services/index.ts\nexport default {\n  websockets,\
  \ collaboration, admin, web, worker, cron\n}\n```\n\nServices are selected via CLI\
  \ flags (`--services=web,worker,collaboration`), allowing horizontal scaling of\
  \ specific capabilities while remaining a single codebase."
