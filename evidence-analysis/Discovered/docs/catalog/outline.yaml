review_notes: 'Outline is structured as a classic **Layered** architecture (specifically
  a specialized Monolith) with a strong **Event-Driven** secondary pattern for asynchronous
  processing. While it is housed in a monorepo, the `app` (frontend) and `server`
  (backend) represent a standard client-server split rather than independent microservices.


  ### Primary Style: Layered

  The backend (`server/`) follows a strict horizontal layering common in Node.js/Koa
  applications:

  1.  **Routing Layer** (`server/routes/`): Entry points for HTTP requests, divided
  into `api` and `auth`.

  2.  **Business Logic / Command Layer** (`server/commands/`): The `ARCHITECTURE.md`
  highlights this as the home for "complex commands that perform actions across multiple
  models," separating orchestration logic from HTTP concerns.

  3.  **Domain/Persistence Layer** (`server/models/`): Uses Sequelize (ORM) to define
  the data schema and domesticate the database. The logic here includes lifecycle
  hooks (e.g., `AfterCreate` in `Reaction.ts`).

  4.  **Authorization Layer** (`server/policies/`): Decoupled authorization logic
  using the `cancan` pattern, separating "who can do what" from the business logic.

  5.  **Presentation Layer** (`server/presenters/`): Handles the transformation of
  internal database models into the JSON formats consumed by the frontend.'
