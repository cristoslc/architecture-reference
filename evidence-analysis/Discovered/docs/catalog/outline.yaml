one_line_summary: Collaborative knowledge-base built as a Layered monolith with a
  formal Microkernel plugin system for auth providers, integrations, and async processors.
classification_reasoning: "Outline is a production TypeScript knowledge-management
  application (think Notion/Confluence) structured as a **Layered** architecture
  with a **Microkernel** extension system.\n\n### Primary: Layered Architecture\n\
  \nThe backend (`server/`) follows strict horizontal layering documented explicitly
  in `docs/ARCHITECTURE.md`:\n\n1. **Routes layer** (`server/routes/api/`) — HTTP
  ingress, request parsing, validation via Zod schemas\n2. **Middleware layer** (`server/middlewares/`)
  — authentication, CSRF, rate-limiting, request tracing\n3. **Commands layer** (`server/commands/`)
  — cross-model business orchestration (`documentCreator`, `documentMover`, `documentImporter`,
  etc.)\n4. **Models layer** (`server/models/`) — 30+ Sequelize ORM entities with
  lifecycle hooks that emit domain events to the queue\n5. **Policies layer** (`server/policies/`)
  — cancan authorization rules decoupled from HTTP and business logic\n6. **Presenters
  layer** (`server/presenters/`) — JSON serializers transforming models into API
  response shapes\n7. **Storage layer** (`server/storage/`) — PostgreSQL via Sequelize,
  Redis via ioredis, S3-compatible file storage\n\nThe React frontend in `app/` mirrors
  the same layered discipline: Routes → Scenes → Components → Stores (MobX) → Models.\n\
  \n### Secondary: Microkernel (Plugin System)\n\n`server/utils/PluginManager.ts`
  defines a typed hook registry:\n\n```typescript\nexport enum Hook {\n  API = \"api\",\n
  \ AuthProvider = \"authProvider\",\n  EmailTemplate = \"emailTemplate\",\n  IssueProvider
  = \"issueProvider\",\n  Processor = \"processor\",\n  Task = \"task\",\n  UnfurlProvider
  = \"unfurl\",\n  Uninstall = \"uninstall\",\n}\n```\n\n21 first-party plugins (slack,
  github, google, gitlab, linear, notion, figma, azure, oidc, webhooks, passkeys,
  etc.) register via `PluginManager.add()`, contributing routers, auth strategies,
  event processors, and scheduled tasks. Plugins are glob-discovered at startup from
  `plugins/*/server/index.[jt]s` and conditionally activated via environment variables.
  A parallel `app/utils/PluginManager.ts` handles client-side extension hooks. This
  is a textbook microkernel: stable core with typed extension points.\n\n### Internal
  Event-Driven Pattern (not a primary style)\n\nA Redis/Bull queue system provides
  async processing within the monolith: model `AfterSave` hooks emit domain events
  to a `globalEventQueue`; the worker fans them out to registered `BaseProcessor`
  subclasses (`BacklinksProcessor`, `NotificationsProcessor`, `WebsocketsProcessor`,
  `RevisionsProcessor`, etc.). This is intra-process background job orchestration,
  not inter-service event communication.\n\n### Deployment Model\n\nOne `package.json`,
  one `Dockerfile`, one PostgreSQL database. Multiple runtime service modes (web,
  worker, collaboration, websockets, cron, admin) are selected via `--services=`
  CLI flag. Services share the same codebase and database. This is not microservices.\n\
  \n### Why Not Other Styles\n\n- **Not Microservices**: Single deployable, shared
  database, no inter-service APIs\n- **Not Modular Monolith**: No enforced module
  boundaries, no workspace isolation, no internal API contracts\n- **Not Hexagonal**:
  No explicit port/adapter interfaces; storage accessed directly from models and commands\n\
  - **Not CQRS**: No read/write model split; Sequelize models serve both\n- **Not
  Event-Driven (primary)**: Bull queues are internal background processing, not the
  primary integration mechanism"
