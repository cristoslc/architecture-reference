review_notes: "LiveKit is organized as a high-performance **Service-Based** architecture,\
  \ specifically designed as a distributed media server (SFU). While it can be deployed\
  \ as a \"single binary,\" its internal structure is explicitly designed for multi-node\
  \ coordination and distributed scaling.\n\n### Primary Style: Service-Based\nThe\
  \ codebase is structured into coarse-grained functional domains that cooperate within\
  \ the same process or across a cluster. It avoids the complexity of true granular\
  \ microservices while maintaining clear service boundaries:\n- **`pkg/service`**:\
  \ Contains the primary entry points and lifecycle management for various services\
  \ like `roomservice.go`, `rtcservice.go`, and `ingress.go`. \n- **`pkg/routing`**:\
  \ Implements global service discovery and request routing. The presence of `redisrouter.go`\
  \ and `node.go` indicates a system designed to run as multiple nodes coordinated\
  \ via a shared state store (Redis), where requests are routed to specific nodes\
  \ owning a \"Room\" (the primary aggregate).\n- **`cmd/server`**: The single entry\
  \ point that orchestrates these services into a deployable unit.\n\n### Secondary\
  \ Style: Event-Driven\nThe system relies heavily on asynchronous communication for\
  \ state synchronization and external integrations:"
