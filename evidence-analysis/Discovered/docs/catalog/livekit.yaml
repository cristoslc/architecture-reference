review_notes: 'Documentation describes independently deployable services: (1) LiveKit
  Server — core WebRTC SFU handling rooms, participants, and media streams;
  (2) Egress Service — recording and streaming export, deployed separately with own
  Helm chart; (3) Ingress Service — accepts external RTMP/WHIP/HLS/SRT streams into
  rooms, deployed separately; (4) SIP Server — telephony bridge for SIP calls into
  WebRTC rooms; (5) Agents — optional AI/automation service. Services communicate
  via Redis message queues for task dispatching and coordination. Each service has
  independent Docker deployment and Kubernetes Helm chart. docker-compose examples
  show multi-container deployment with livekit + redis + ingress + sip as separate
  services. Service-Based because 4-5 coarse-grained services with distinct
  responsibilities coordinate via Redis. Event-Driven because services use Redis
  pub/sub for async task dispatch.'
