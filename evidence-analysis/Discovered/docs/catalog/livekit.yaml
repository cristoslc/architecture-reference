classification_reasoning: "## Analysis\n\n### Primary Classification: Modular Monolith\n\
  \nLiveKit is a **single deployable binary** WebRTC SFU (Selective Forwarding Unit)\
  \ server with well-organized internal module boundaries. Key evidence:\n\n**Single\
  \ Deployable Unit:**\n- `Dockerfile` produces a single binary: `livekit-server`\n\
  - Single entry point in `cmd/server/main.go`\n- All code in one Go module (`go.mod`)\
  \ with no submodules\n\n**Enforced Module Boundaries:**\nThe `pkg/` directory shows\
  \ distinct packages with clear responsibilities:\n\n| Package | Responsibility |\n\
  |---------|---------------|\n| `pkg/config/` | Configuration management |\n| `pkg/service/`\
  \ | API/Service layer (RoomService, RTCService, AgentService, etc.) |\n| `pkg/routing/`\
  \ | Message routing (LocalRouter, RedisRouter for distributed mode) |\n| `pkg/rtc/`\
  \ | WebRTC room and participant management |\n| `pkg/sfu/` | Selective Forwarding\
  \ Unit (media packet handling) |\n| `pkg/telemetry/` | Metrics and observability\
  \ |\n| `pkg/agent/` | AI agent integration |\n| `pkg/clientconfiguration/` | Client\
  \ capability management |\n\n**Interface-based Abstractions:**\nThe codebase uses\
  \ Go interfaces extensively with generated mocks (`counterfeiter`) to enforce boundaries:\n\
  - `pkg/service/interfaces.go`: `ObjectStore`, `ServiceStore`, `RoomAllocator`, `AgentStore`\n\
  - `pkg/routing/interfaces.go`: `Router`, `MessageSink`, `MessageSource`\n- `pkg/routing/selector/interfaces.go`:\
  \ `NodeSelector`\n\n**Distributed Capability via Router Abstraction:**\n```go\n\
  // routing/interfaces.go\nfunc CreateRouter(rc redis.UniversalClient, node LocalNode,\
  \ ...) Router {\n    lr := NewLocalRouter(...)\n    if rc != nil {\n        return\
  \ NewRedisRouter(lr, rc, kps)  // Distributed mode\n    }\n    // Single-node mode\n\
  \    return lr\n}\n```\n\nThe same binary operates in single-node or distributed\
  \ mode via Redis pub/sub coordination — this is **horizontal scaling of a monolith**,\
  \ not microservices.\n\n### Secondary Classification: Layered\n\nThe architecture\
  \ exhibits horizontal layering:\n\n1. **Presentation/API Layer** — `pkg/service/rtcservice.go`,\
  \ HTTP/Twirp handlers\n2. **Business Logic Layer** — `pkg/service/roomservice.go`,\
  \ `pkg/service/roommanager.go`\n3. **Communication/Routing Layer** — `pkg/routing/`\
  \ (LocalRouter, RedisRouter)\n4. **Core Processing Layer** — `pkg/rtc/` (rooms,\
  \ participants), `pkg/sfu/` (media forwarding)\n5. **Data/State Layer** — `pkg/service/localstore.go`,\
  \ `pkg/service/redisstore.go`\n\n### What This Is NOT\n\n**Not Microservices:**\n\
  - Single deployable binary, not multiple independently deployable services\n- Services\
  \ in `pkg/service/` are internal packages, not separate deployments\n- Redis is\
  \ used for coordination, not as message broker between microservices\n\n**Not Service-Based\
  \ (distinct from Modular Monolith):**\n- Service-based architecture typically means\
  \ 2-5 coarse-grained services, each owning its database\n- LiveKit has many more\
  \ internal packages and uses Redis for coordination, not as primary data store per\
  \ service\n- No separate database per service pattern\n\n**Not Event-Driven:**\n\
  - Redis pub/sub is used for node coordination in distributed mode, not as primary\
  \ application architecture\n- Main flow is synchronous request/response via HTTP/Twirp\
  \ and WebSocket\n- No event sourcing, CQRS, or event-driven orchestration\n\n**Not\
  \ Domain-Driven Design:**\n- Packages organized by technical capability (`sfu`,\
  \ `routing`, `rtc`), not bounded contexts\n- No aggregates, entities, value objects\
  \ pattern\n- Business domain (real-time video) is implicit in technical components\n\
  \n**Not Hexagonal:**\n- Core domain not isolated via ports/adapters pattern\n- Dependencies\
  \ like Pion WebRTC (`pkg/rtc/`, `pkg/sfu/`) are deeply integrated, not abstracted\
  \ behind ports\n\n### Conclusion\n\nLiveKit is a well-structured **Modular Monolith**\
  \ with **Layered** organization. It achieves scalability through stateless horizontal\
  \ scaling (Redis-based coordination for distributed deployments) rather than decomposing\
  \ into microservices. The clear package boundaries and interface abstractions make\
  \ it maintainable as a single codebase while supporting distributed deployment when\
  \ needed."
