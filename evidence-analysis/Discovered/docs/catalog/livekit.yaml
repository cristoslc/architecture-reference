one_line_summary: "Single-binary WebRTC SFU server organized as a disciplined modular monolith with event-driven signaling via PSRPC/Redis pub-sub enabling optional horizontal multi-node distribution."
classification_reasoning: "LiveKit is a Modular Monolith: all domain concerns (SFU media forwarding, WebRTC session management, room lifecycle, signaling, agent dispatch, ingress/egress integration, telemetry) compile into a single Go binary (one go.mod, one Dockerfile, one cmd/server entrypoint). Internal structure is decomposed into well-bounded packages (pkg/sfu, pkg/rtc, pkg/service, pkg/routing, pkg/agent, pkg/telemetry) with typed interfaces, generated counterfeiter fakes, and Google Wire compile-time dependency injection — classic markers of deliberate modular monolith design. Event-Driven is a strong secondary style: the PSRPC message bus (backed by either a local in-process bus or Redis pub/sub) is load-bearing for multi-node operation, routing signaling messages between signal-accepting and RTC-processing nodes via MessageSink/MessageSource channel interfaces. The telemetry subsystem enqueues domain events (RoomStarted, ParticipantJoined, TrackPublished) for async fan-out to analytics pipelines and webhook URLs. The agent worker protocol is an event-driven job dispatch sequence over WebSocket. Microservices is ruled out because all concerns live in one process; Egress, Ingress, and SIP are separate external repos integrated via RPC clients, not internal decomposition. Layered is ruled out because pkg boundaries follow domain functions, not horizontal technical layers. Service-Based is ruled out because there is no coarse-grained database-sharing topology."
