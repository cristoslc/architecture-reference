review_notes: 'README describes "The first and the best multi-agent framework" with
  role-playing approach to multi-agent conversations. camel/agents/ defines agent
  types including ChatAgent (camel/agents/chat_agent.py), CriticAgent, TaskSpecifyAgent,
  and RolePlaying (camel/societies/role_playing.py) which orchestrates conversations
  between AI Assistant and AI User agents. camel/messages/ implements structured
  message passing between agents (BaseMessage with role, content, metadata).
  camel/societies/ contains multi-agent coordination: BabyAGI, role_playing, and
  workforce (camel/workforce/) for parallel agent task execution. camel/toolkits/
  provides 50+ tool integrations agents can use. camel/models/ abstracts LLM backends
  (OpenAI, Anthropic, etc.). Multi-Agent because the core pattern is autonomous
  agents (with distinct roles) communicating via structured message protocols to
  solve tasks collaboratively. Event-Driven because agent interactions are
  message-driven with async processing in workforce mode.'
