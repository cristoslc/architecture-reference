review_notes: "Pipeline architecture: IPipelineBehavior<TRequest,TResponse> defines filter stages; RequestHandlerWrapperImpl builds pipeline via Aggregate() delegate chain (src/MediatR/Wrappers/RequestHandlerWrapper.cs). Pipeline/ dir contains IRequestPreProcessor, IRequestPostProcessor, RequestPreProcessorBehavior, RequestPostProcessorBehavior, RequestExceptionProcessorBehavior. README shows AddBehavior/AddStreamBehavior/AddRequestPreProcessor/AddRequestPostProcessor registration. CQRS secondary: ISender dispatches commands/queries to single handlers, IPublisher dispatches notifications to multiple handlers. IRequest<TResponse> vs IRequest separates response-bearing queries from void commands. Library enables CQRS but does not enforce read/write model separation."