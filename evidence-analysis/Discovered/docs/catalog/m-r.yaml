classification_reasoning: "## Architecture Classification: CQRS (Command Query Responsibility\
  \ Segregation)\n\nThis is a **canonical CQRS implementation with Event Sourcing**\
  \ - in fact, this appears to be Greg Young's reference example (\"SimplestPossibleThing\"\
  \ solution with \"SimpleCQRS\" project).\n\n### Key Evidence for CQRS\n\n**1. Separate\
  \ Write and Read Models:**\n\n- **Write Model** (`Domain.cs`): The `InventoryItem`\
  \ aggregate encapsulates all state mutations through domain methods (`CheckIn()`,\
  \ `Remove()`, `ChangeName()`, `Deactivate()`, `ChangeMaxQty()`) that produce events\
  \ via `ApplyChange()`\n  \n- **Read Model** (`ReadModel.cs`): Completely separate\
  \ DTOs (`InventoryItemListDto`, `InventoryItemDetailsDto`) populated by event handlers\
  \ (`InventoryListView`, `InventoryItemDetailView`), accessed via `ReadModelFacade`\n\
  \n**2. Command/Event Separation:**\n\n- **Commands** (`Commands.cs`): `CreateInventoryItem`,\
  \ `RenameInventoryItem`, `DeactivateInventoryItem`, etc. - intent-based messages\
  \ for writes\n- **Events** (`Events.cs`): `InventoryItemCreated`, `InventoryItemRenamed`,\
  \ `InventoryItemDeactivated` - state-change notifications\n- **Command Handlers**\
  \ (`CommandHandlers.cs`): Mediate between commands and aggregates\n\n**3. Event\
  \ Sourcing:**\n\n- `AggregateRoot` base class with `LoadsFromHistory()` method (line\
  \ 106-109 in `Domain.cs`)\n- `EventStore` persists and retrieves events by aggregate\
  \ ID\n- `Repository<T>` rebuilds aggregate state from event history\n\n**4. Separate\
  \ Communication Paths:**\n\n- **Commands**: Sent to exactly one handler (`FakeBus.Send()`\
  \ throws if handlers ≠ 1, line 30 in `FakeBus.cs`)\n- **Events**: Published to multiple\
  \ subscribers (`FakeBus.Publish()` dispatches to all registered handlers, line 39-50\
  \ in `FakeBus.cs`)\n\n**5. Wiring in `Program.cs` (lines 32-54):**\n\n```\nWrite\
  \ side:  Commands → CommandHandlers → Repository → EventStore\nRead side:   Events\
  \ → InventoryItemDetailView, InventoryListView → ReadModelFacade\n```\n\n### Why\
  \ NOT Other Architectures\n\n- **Not Microservices**: Single deployable unit - two\
  \ .NET projects in one solution, no service boundaries\n- **Not Event-Driven Architecture**\
  \ (inter-service): The bus is internal (`FakeBus`), not a message broker for service\
  \ coordination\n- **Not Layered**: The organizing principle is CQRS separation (command/query),\
  \ not horizontal layers (presentation/business/data). While MVC exists in `CQRSGui`,\
  \ it's a thin shell over the CQRS structure\n- **Not Domain-Driven Design**: Has\
  \ one aggregate (`InventoryItem`) but lacks bounded contexts, domain services, value\
  \ objects, and ubiquitous language - it's a focused CQRS example, not full DDD\n\
  - **Not Hexagonal**: No ports-and-adapters isolation; the `FakeBus` and `FakeDatabase`\
  \ are inline implementations, not adapters to external systems\n\n### Confidence\n\
  \n**0.95** - This is a textbook reference implementation of CQRS with Event Sourcing.\
  \ Greg Young is the co-author of the original CQRS pattern, and this repository\
  \ serves as the canonical minimal example. The separation is explicit, complete,\
  \ and the sole architectural focus of the codebase."
