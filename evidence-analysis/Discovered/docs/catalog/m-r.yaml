review_notes: "CQRS: Commands.cs defines 6 command classes (CreateInventoryItem, DeactivateInventoryItem, etc.) inheriting from Command:Message; CommandHandlers.cs routes each to InventoryCommandHandlers.Handle(); ReadModel.cs provides a completely separate read side with IReadModelFacade, InventoryListView, and InventoryItemDetailView projecting denormalized DTOs; FakeBus.cs enforces Send() to exactly one handler (commands) vs Publish() to many (events); HomeController.cs uses _bus.Send() for writes and _readmodel for reads. Event-Driven/Event Sourcing: Events.cs defines 6 domain events; EventStore.cs implements IEventStore with SaveEvents/GetEventsForAggregate persisting events as source of truth; Domain.cs AggregateRoot.LoadsFromHistory() reconstitutes state by replaying events; Repository.GetById() loads all events and replays them; EventStore publishes events via IEventPublisher to update read model projections. DDD: Domain.cs contains AggregateRoot base class with Id, Version, and change tracking; InventoryItem is a proper aggregate with encapsulated domain logic and invariant enforcement (e.g. cant remove more than available qty, max qty validation); IRepository pattern constrains to AggregateRoot."