one_line_summary: >-
  Greg Young's canonical "Simplest Possible Thing" reference implementation
  demonstrating CQRS with Event Sourcing in a single-process .NET application —
  strict command/query segregation, an in-memory event store, and event-driven
  read model projection across approximately 200 lines of application code.
classification_reasoning: |
  ## Architecture Classification: Layered + CQRS

  This is Greg Young's authoritative reference implementation of CQRS with Event
  Sourcing. The solution (`SimplestPossibleThing.sln`) contains two projects:
  `SimpleCQRS` (core library) and `CQRSGui` (ASP.NET Core MVC front end), targeting
  .NET 7.

  ### Primary Style: Layered

  The application is organized across distinct horizontal layers with unidirectional
  dependencies:

  - **Presentation layer** (`CQRSGui/Controllers/HomeController.cs`, Razor views):
    The MVC controller sends commands to `FakeBus` and reads from `ReadModelFacade`.
    It never touches domain aggregates or the event store directly.

  - **Application/command layer** (`SimpleCQRS/CommandHandlers.cs`):
    `InventoryCommandHandlers` receives typed commands, loads the `InventoryItem`
    aggregate via `IRepository<T>`, invokes the appropriate domain method, and
    saves via the repository. No presentation or infrastructure concerns cross
    into this layer.

  - **Domain layer** (`SimpleCQRS/Domain.cs`):
    `InventoryItem` extends `AggregateRoot` and encapsulates all business rules
    (`CheckIn`, `Remove`, `Deactivate`, `ChangeMaxQty`). Every mutation goes
    through `ApplyChange(Event)`, which dispatches via private reflection to
    typed `Apply(EventType)` methods and accumulates uncommitted events.
    `LoadsFromHistory(IEnumerable<Event>)` rehydrates state from the event stream.

  - **Infrastructure layer** (`SimpleCQRS/EventStore.cs`, `SimpleCQRS/FakeBus.cs`):
    `EventStore` is an in-memory `Dictionary<Guid, List<EventDescriptor>>` with
    optimistic concurrency checking (version mismatch raises `ConcurrencyException`).
    `FakeBus` implements both `ICommandSender` (single-handler routing) and
    `IEventPublisher` (fan-out to all registered handlers via `ThreadPool`).

  - **Read model layer** (`SimpleCQRS/ReadModel.cs`):
    `InventoryListView` and `InventoryItemDetailView` subscribe to domain events
    and maintain a flat `FakeDatabase` (two static dictionaries). `ReadModelFacade`
    exposes `GetInventoryItems()` and `GetInventoryItemDetails()` for pure data
    retrieval with no domain model involvement.

  ### Secondary Style: CQRS

  The CQRS separation is complete and enforced at every level:

  **Write path:**
  `Commands.cs` defines intent-bearing messages (`CreateInventoryItem`,
  `RenameInventoryItem`, `DeactivateInventoryItem`, `CheckInItemsToInventory`,
  `RemoveItemsFromInventory`, `ChangeMaxQty`). `FakeBus.Send<T>()` enforces
  single-handler routing — it throws `InvalidOperationException` if handler
  count is not exactly 1. Command handlers load aggregates from the event-sourced
  repository, call domain methods, and save.

  **Read path:**
  `FakeBus.Publish<T>()` fans out events to all registered subscribers — in
  `Program.cs`, these are wired to `InventoryItemDetailView.Handle()` and
  `InventoryListView.Handle()`. The read model is updated asynchronously on
  the `ThreadPool`. The controller always reads from `ReadModelFacade`, never
  from the aggregate or event store.

  **Wiring in Program.cs (the composition root):**
  ```
  Write:  FakeBus → CommandHandlers → Repository<InventoryItem> → EventStore
  Events: EventStore.SaveEvents → FakeBus.Publish → InventoryItemDetailView,
                                                    InventoryListView
  Query:  Controller → ReadModelFacade → FakeDatabase
  ```

  ### Event Sourcing (data-pattern qualifier)

  Event Sourcing is the persistence strategy for the write side, not an
  independent topology style. `AggregateRoot.LoadsFromHistory()` replays
  all stored events to reconstruct aggregate state; `EventStore` stores
  every event as an immutable `EventDescriptor` with version stamp; the
  `Repository<T>` never updates aggregate state in place.

  Optimistic concurrency is enforced: every command carries `OriginalVersion`
  and `EventStore.SaveEvents()` checks that the last stored version matches
  before appending new events.

  ### Why Not Other Styles

  - **Not Microservices:** Single solution, single deployable process, no service
    boundaries or network communication between components.
  - **Not Event-Driven (macro-architecture):** `FakeBus` is an in-process handler
    registry, not a message broker enabling inter-service communication.
  - **Not Domain-Driven Design:** One aggregate, no bounded contexts, no value
    objects, no domain services. DDD building blocks are absent; this is a
    focused CQRS mechanics demonstration.
  - **Not Hexagonal:** No port/adapter separation. `FakeBus` and `FakeDatabase`
    are inline stubs, not adapters behind formally named ports.
  - **Not Modular Monolith:** No module boundaries with enforced contracts beyond
    the two projects (one library, one web front end).

  ### Confidence: 0.97

  This repository is authored by Greg Young, who co-originated and named the CQRS
  pattern. The `SimplestPossibleThing` solution name explicitly signals its intent
  as a minimal reference. The CQRS separation is complete and unambiguous at every
  structural level. The layered organization is unmistakable from the dependency
  flow and role separation across the five layers.
