review_notes: "Evidence: README.md L54 describes 'Fast and Flexible Multi-Agent Automation Framework'. README.md L59-60 details two core paradigms: Crews (autonomous collaborating agents with role-based delegation) and Flows (event-driven workflows with @start/@listen/@router decorators). lib/crewai/src/crewai/agents/ contains agent executor, delegation tools (delegate_work_tool.py, ask_question_tool.py), and agent adapters. lib/crewai/src/crewai/flow/ implements event-driven control with flow.py (@start, @listen, @router decorators), state management, persistence, and conditional branching. lib/crewai/src/crewai/events/ has a full event bus (event_bus.py singleton with sync/async handlers), event listeners, and typed events (agent_events, crew_events, flow_events, a2a_events). lib/crewai/src/crewai/a2a/ provides agent-to-agent protocol support with delegation utilities. process.py defines sequential and hierarchical execution processes for crews. lib/crewai/src/crewai/memory/ and knowledge/ provide shared memory and knowledge layers. The workspace (pyproject.toml) is a uv monorepo with crewai, crewai-tools, crewai-files, and devtools packages."