review_notes: "The Sentry Relay is structured as a **Modular Monolith** built on top\
  \ of a custom actor-like framework defined in `relay-system`. While it is a single\
  \ deployable binary, it is meticulously partitioned into dozens of local crates\
  \ (over 40 workspace members in `Cargo.toml`), each with strictly defined responsibilities\
  \ and internal APIs.\n\n### 1. Modular Monolith / Actor System\nThe core of the\
  \ architecture is defined in `relay-system/src/lib.rs`. It provides a `Service`\
  \ and `Interface` abstraction that mimics the Actor model. Components communicate\
  \ by sending messages to an `Addr<T>`. \n- **Internal Boundaries:** The `relay-server`\
  \ crate acts as the primary orchestrator, but high-level logic is delegated to specialized\
  \ \"services\" located in `relay-server/src/services/` (e.g., `processor.rs`, `outcome.rs`,\
  \ `upstream.rs`).\n- **Encapsulation:** By splitting the logic into crates like\
  \ `relay-event-normalization`, `relay-filter`, and `relay-metrics`, the project\
  \ enforces compile-time boundary checks. Each module owns its specific logic (PII\
  \ scrubbing, normalization, etc.), preventing a \"big ball of mud.\"\n\n### 2. Event-Driven\
  \ (Internal & External)\nThe system is heavily event-driven in two ways:\n- **Internal:**\
  \ The `relay-system` framework uses asynchronous message passing between services\
  \ via `tokio` channels, decoupling the HTTP ingestion layer from the processing\
  \ and forwarding layers."
