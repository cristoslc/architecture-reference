one_line_summary: "Single-binary Rust event ingestion proxy organized as a multi-stage processing pipeline (parse → normalize → filter → sample → rate-limit → PII-scrub → forward) within a modular monolith of ~28 workspace crates backed by an actor-style async service runtime."
classification_reasoning: "The dominant architectural force in Relay is a deterministic, ordered pipeline through which every SDK envelope must pass before reaching its destination (Kafka or upstream HTTP). The Processor/Forward trait chain in relay-server/src/processing/ formalizes this as a compile-time pipeline contract, and the lib.rs crate-level documentation explicitly illustrates the pipeline with a Mermaid sequence diagram. Each stage (normalize, filter, dynamic-sample, Redis quota, PII-scrub, metrics-extract, Kafka-write) is isolated in its own sub-module and produces typed output consumed by the next. The physical deployment unit is one Rust binary compiled from a single Cargo workspace of ~28 crates (relay-event-normalization, relay-pii, relay-filter, relay-sampling, relay-kafka, relay-quotas, relay-metrics, etc.). Crate visibility rules enforce strict module boundaries at compile time, but no network boundary separates them — all inter-service communication is in-process via the relay-system Addr<I> typed channel primitives. This makes the physical structure a Modular Monolith. Relay produces to Kafka (ingest-events, ingest-transactions, ingest-spans, profiles, ingest-metrics, outcomes) but does not consume from Kafka and does not route internal work via an event broker, so Event-Driven is not a primary style. Two RelayMode variants (Proxy and Managed/Processing) gate full pipeline execution behind a Cargo feature flag, but both modes execute the same single-process pipeline architecture."
