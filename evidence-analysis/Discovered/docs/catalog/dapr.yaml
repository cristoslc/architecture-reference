review_notes: 'Dapr''s repository architecture is a classic example of a **Microkernel
  (Plugin)** system, designed to provide a standardized runtime (the kernel) that
  can be extended with a vast array of interchangeable infrastructure implementations
  (the plugins).


  ### 1. Primary Style: Microkernel (Plugin)

  The core of the repository is centered around `pkg/runtime`, which defines the "kernel"
  orchestrating sidecar lifecycle, API exposure (HTTP/gRPC), and component management.

  - **Plugin Structure:** The `cmd/daprd/components` directory acts as a registry
  for over 100 pluggable components. These files (e.g., `state_postgres.go`, `pubsub_kafka.go`)
  are thin wrappers that register specific implementations into the Dapr runtime at
  compile-time.

  - **Separation of Concerns:** The core logic for each building block (state, pub/sub,
  secrets) is maintained in `pkg/components`, providing a consistent loading and management
  lifecycle for these plugins.

  - **Extensibility:** The architecture is designed so that new infrastructure providers
  can be added with minimal changes to the core runtime, adhering to the "Open-Closed
  Principle."


  ### 2. Secondary Style: Hexagonal Architecture (Ports and Adapters)

  To maintain its "any-language, any-infrastructure" promise, Dapr heavily utilizes
  the **Hexagonal** pattern.'
