classification_reasoning: "## Architecture Classification Analysis\n\n### Primary:\
  \ Microkernel (Plugin)\n\nThe Dapr repository implements a textbook **Microkernel\
  \ (Plugin)** architecture. The evidence is substantial and unambiguous:\n\n**1.\
  \ Registry Pattern as Core Plugin Mechanism**\n\nEvery capability in Dapr is implemented\
  \ as a pluggable component with a dedicated registry:\n- `pkg/components/bindings/registry.go`\
  \ - Input/output bindings\n- `pkg/components/state/registry.go` - State stores\n\
  - `pkg/components/pubsub/registry.go` - Publish/subscribe\n- `pkg/components/secretstores/registry.go`\
  \ - Secret stores\n- `pkg/components/lock/registry.go` - Distributed locks\n- `pkg/components/crypto/registry.go`\
  \ - Cryptography providers\n- `pkg/components/nameresolution/registry.go` - Service\
  \ discovery\n- `pkg/components/configuration/registry.go` - Configuration stores\n\
  \nEach registry implements `Register*()` and `Create*()` methods for plugin discovery\
  \ and instantiation.\n\n**2. Build-Time Plugin Registration via `init()`**\n\nIn\
  \ `cmd/daprd/components/`, 100+ component files register themselves using Go's `init()`\
  \ mechanism:\n\n```go\n// cmd/daprd/components/bindings_redis.go\nfunc init() {\n\
  \    bindingsLoader.DefaultRegistry.RegisterOutputBinding(redis.NewRedis, \"redis\"\
  )\n}\n```\n\nBuild tags control inclusion: `//go:build allcomponents || stablecomponents`\n\
  \nThe main app (`cmd/daprd/app/app.go`) imports components anonymously to trigger\
  \ registration:\n```go\nimport (\n    // Register all components\n    _ \"github.com/dapr/dapr/cmd/daprd/components\"\
  \n    ...\n)\n```\n\n**3. Runtime Pluggable Components via gRPC**\n\nBeyond build-time\
  \ plugins, Dapr supports runtime pluggable components discovered via Unix sockets:\n\
  \n`pkg/components/pluggable/discovery.go`:\n```go\nfunc Discover(ctx context.Context)\
  \ error {\n    // Discovers components from socket files, uses gRPC reflection\n\
  \    services, err := serviceDiscovery(...)\n    callback(services)\n}\n```\n\n\
  `pkg/components/pluggable/grpc.go` defines `GRPCConnector[TClient]` - a generic\
  \ connector wrapping gRPC clients as Dapr components.\n\n**4. Well-Defined Plugin\
  \ Contracts**\n\ngRPC protobuf contracts define stable interfaces in `dapr/proto/components/v1/`:\n\
  - `state.proto` - State store interface\n- `pubsub.proto` - Pub/sub interface\n\
  - `bindings.proto` - Bindings interface\n- `secretstore.proto` - Secret store interface\n\
  \n**5. Core Runtime with Stable APIs**\n\n`dapr/proto/runtime/v1/dapr.proto` defines\
  \ the stable Dapr API surface (50+ RPC methods) that applications use, independent\
  \ of which plugins are loaded.\n\n### Secondary: Microservices\n\nDapr is deployed\
  \ as **multiple independent services**:\n\n**Separate Deployable Binaries** (`cmd/`):\n\
  - `daprd` - The sidecar runtime (core)\n- `operator` - Kubernetes operator for managing\
  \ Dapr resources\n- `placement` - Actor placement service for distributed state\n\
  - `scheduler` - Job scheduling service\n- `sentry` - Certificate authority for mTLS\n\
  - `injector` - Kubernetes mutating webhook for sidecar injection\n\n**Kubernetes\
  \ Deployment** (`charts/dapr/Chart.yaml`):\n```yaml\ndependencies:\n  - name: dapr_operator\n\
  \  - name: dapr_placement\n  - name: dapr_sidecar_injector\n  - name: dapr_sentry\n\
  \  - name: dapr_scheduler\n```\n\n**gRPC-Based Inter-Service Communication**: Services\
  \ communicate via protobuf-defined protocols in `dapr/proto/`.\n\n### Why This Classification\
  \ is Correct\n\n**Rejected Layered**: While code has layers (API/grpc, runtime,\
  \ components), layering is not the primary organizing principle—the plugin architecture\
  \ is.\n\n**Rejected Modular Monolith**: Dapr services are separate deployment units,\
  \ not modules in a single binary.\n\n**Rejected Hexagonal**: Although there are\
  \ ports/adapters patterns, the defining characteristic is the plugin registry and\
  \ extension mechanism, not port/adapter isolation.\n\n**Rejected DDD**: No bounded\
  \ contexts, aggregates, or domain-centric organization exists.\n\n**Not Serverless**:\
  \ Dapr runs as long-lived processes/services, not event-triggered functions.\n\n\
  **Not Event-Driven Primary**: While Dapr *enables* event-driven architectures for\
  \ applications, its internal architecture is organized around the plugin microkernel\
  \ pattern, not event-driven communication between its own components.\n\nThe architecture\
  \ exists specifically to provide \"pluggable components without vendor lock-in\"\
  \ (README goal) through a stable API core with swappable implementations—the essence\
  \ of Microkernel architecture."
