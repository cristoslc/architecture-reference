review_notes: |-
  The Supabase Storage Engine is structured as a **Modular Monolith**. While it supports complex features like multi-tenancy, sharding, and multiple communication protocols, it is designed to be deployed as a single unit (as evidenced by `src/start/server.ts` which initializes the API server, admin server, queue workers, and background migrations within one lifecycle).

  ### Reasoning:

  #### 1. Modular Monolith Surface Area
  The codebase is organized into high-level directories (`src/storage`, `src/internal`, `src/http`) that separate the core domain logic from infrastructure concerns.
  - **Protocol Separation:** Despite supporting HTTP, S3, TUS, and Iceberg, these are implemented as modules within the same deployable. `src/app.ts` shows all these protocols being registered as Fastify routes within a single application instance.
  - **Internal Boundaries:** The `src/internal` directory contains cross-cutting concerns (sharding, auth, database, monitoring) that are shared across the storage domain modules but kept distinct from the business logic in `src/storage`.

  #### 2. Hexagonal Architecture (Ports and Adapters)
