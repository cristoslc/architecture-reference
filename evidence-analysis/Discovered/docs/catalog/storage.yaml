classification_reasoning: >-
  ## Architecture Classification Analysis


  ### Primary Style: Layered


  The repository exhibits a clear horizontal layering with well-defined separation of concerns:


  **1. HTTP/Presentation Layer** (`src/http/`)

  - Routes organized by domain: `bucket/`, `object/`, `s3/`, `tus/`, `iceberg/`, `vector/`, `render/`, `cdn/`

  - Plugins for cross-cutting concerns: `jwt.ts`, `metrics.ts`, `tracing.ts`, `signature-v4.ts`, `tenant-id.ts`

  - Schema definitions and error handlers


  **2. Service/Business Layer** (`src/storage/`)

  - `Storage` class as the main orchestrator (`src/storage/storage.ts`)

  - `ObjectStorage` for object operations (`src/storage/object.ts`)

  - Protocol implementations for S3, TUS, Iceberg, Vector (`src/storage/protocols/`)

  - Renderers for image transformation and content delivery


  **3. Data Access Layer** (`src/storage/database/` and `src/storage/backend/`)

  - `Database` interface defining 40+ data operation contracts

  - `StorageBackendAdapter` abstract class defining storage operations

  - `StorageKnexDB` concrete PostgreSQL implementation via Knex

  - `S3Backend` and `FileBackend` concrete storage implementations


  **4. Infrastructure Layer** (`src/internal/`)

  - Database connections and pooling (`internal/database/`)

  - pg-boss PostgreSQL job queue (`internal/queue/`)

  - PostgreSQL LISTEN/NOTIFY pub/sub (`internal/pubsub/`)

  - Monitoring and metrics (`internal/monitoring/`)

  - Authentication/crypto (`internal/auth/`)

  - Cluster orchestration with ECS/EKS adapters (`internal/cluster/`)


  ### Secondary Style: Modular Monolith


  The codebase is a single deployable artifact with strong internal module boundaries:

  - Single `Dockerfile` and `package.json`; no npm workspaces or internal package boundaries

  - `src/app.ts` registers all protocols (S3, TUS, Iceberg, REST) as Fastify route modules within one application instance

  - `src/start/server.ts` bootstraps queue, migrations, pub/sub, cluster management, and HTTP servers in one process lifecycle

  - The codebase can run as combined API+worker or as separate server and worker processes, but shares one compiled artifact


  ### Hexagonal Architecture (Ports and Adapters) — Qualifier


  Strong hexagonal characteristics via explicit ports and adapters:

  - **Storage Port**: `StorageBackendAdapter` (`src/storage/backend/adapter.ts`) — abstract class defining `getObject`, `uploadObject`, `deleteObject`, multipart methods; implemented by `S3Backend` and `FileBackend`

  - **Persistence Port**: `Database` interface (`src/storage/database/adapter.ts`) — defines all data operations; implemented by `StorageKnexDB`

  - **Constructor injection**: `Storage(backend: StorageBackendAdapter, db: Database, location: StorageObjectLocator)` isolates core domain from infrastructure

  - **Cluster Port**: `src/internal/cluster/cluster.ts` abstracted with `ecs.ts` and `eks.ts` adapters


  ### Event-Driven (supporting concern, not primary style)


  The system has meaningful asynchronous event processing but it is secondary to the synchronous HTTP request path:

  - pg-boss PostgreSQL-backed job queue with polling, dead-letter queues, semaphore concurrency control, and 20-retry limits

  - 12 registered background workers (Webhook, BackupObjectEvent, ObjectAdminDelete, RunMigrationsOnTenants, ReconcileIcebergCatalog, etc.)

  - PostgreSQL LISTEN/NOTIFY for tenant configuration cache invalidation

  - The primary request path remains synchronous: HTTP → route handler → Storage service → database/backend


  ### What Was Rejected


  **Not Microservices**: Single deployable unit, no service-to-service network communication, no separate services per protocol.

  **Not primarily Event-Driven**: Events are used for background tasks (webhooks, migrations, cleanup) but the core request/response cycle is synchronous.
