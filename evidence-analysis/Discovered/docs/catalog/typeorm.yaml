review_notes: 'src/ has 25+ distinct modules with clean interfaces: Driver interface
  (src/driver/Driver.ts) with DriverFactory (src/driver/DriverFactory.ts) selecting
  among 15+ database implementations; layered flow from DataSource (src/data-source/DataSource.ts)
