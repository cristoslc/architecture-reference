  subsystem has own layers: EntityPersistExecutor -> SubjectExecutor -> SubjectBuilder
  -> QueryRunner; subscriber/Broadcaster pattern provides event hooks but does not
  define system structure; single npm package deployment (monolith); no formal architecture
  docs'
