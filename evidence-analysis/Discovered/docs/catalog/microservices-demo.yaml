one_line_summary: "Google Cloud Platform's canonical Kubernetes-native e-commerce\
  \ demo implementing Microservices with 11 independently deployable, polyglot services\
  \ (Go, C#, Node.js, Python, Java) communicating exclusively over synchronous gRPC\
  \ using a shared Protocol Buffers contract, with database-per-service and optional\
  \ Istio service mesh."
classification_reasoning: "Online Boutique satisfies every canonical criterion of\
  \ the Microservices architectural style with extremely high confidence. Eleven services\
  \ -- frontend (Go/HTTP BFF), cartservice (C#/gRPC), productcatalogservice (Go/gRPC),\
  \ currencyservice (Node.js/gRPC), paymentservice (Node.js/gRPC), shippingservice\
  \ (Go/gRPC), emailservice (Python/gRPC), checkoutservice (Go/gRPC), recommendationservice\
  \ (Python/gRPC), adservice (Java/gRPC), and the optional shoppingassistantservice\
  \ (Python/HTTP+Gemini RAG) -- each live in their own src/<service>/ subdirectory\
  \ with a dedicated Dockerfile, Kubernetes Deployment/Service/ServiceAccount manifest,\
  \ and Skaffold build context. Database-per-service is enforced at the infrastructure\
  \ level: cartservice owns a dedicated redis-cart Redis StatefulSet and no other\
  \ service accesses it. All inter-service communication is synchronous gRPC defined\
  \ by a shared protos/demo.proto Protocol Buffers contract; nine gRPC service interfaces\
  \ (CartService, RecommendationService, ProductCatalogService, ShippingService,\
  \ CurrencyService, PaymentService, EmailService, CheckoutService, AdService) are\
  \ defined therein. checkoutservice is the heaviest orchestrator, holding persistent\
  \ gRPC client connections to six downstream services (cart, productcatalog, currency,\
  \ shipping, payment, email) and invoking them in sequence for the PlaceOrder RPC.\
  \ The frontend holds seven independent gRPC client connections. An exhaustive search\
  \ of all source files in Go, Python, Java, C#, and Node.js reveals zero references\
  \ to any message broker, pub/sub system, Kafka, RabbitMQ, NATS, or async event\
  \ bus, ruling out Event-Driven as a co-primary style. No shared runtime, shared\
  \ database, or shared library containing domain logic crosses service boundaries,\
  \ ruling out Modular Monolith and Service-Based. No ports-and-adapters structuring\
  \ or explicit domain-layer isolation rules out Hexagonal Architecture. No read-model/write-model\
  \ split or event sourcing rules out CQRS. Services run as always-on Kubernetes\
  \ Deployment replicas, ruling out Serverless. OpenTelemetry distributed tracing\
  \ (OTLP gRPC export), structured JSON logging, and gRPC health probes on every\
  \ service implement observability as a cross-cutting concern. Kustomize overlays\
  \ support opt-in GCP extensions (Istio/CSM, Spanner, Memorystore, AlloyDB, Gemini)\
  \ without altering the default microservices topology. Confidence: 0.98."
