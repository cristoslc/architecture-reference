classification_reasoning: "## Analysis\n\nThis repository is a canonical example of\
  \ a **Microservices architecture**. The evidence is unambiguous:\n\n### Independent\
  \ Deployable Services\n\nThe repository contains **11 independently deployable services**\
  \ under `src/`, each with:\n- Its own **Dockerfile** (12 Dockerfiles found)\n- Its\
  \ own **Kubernetes Deployment manifest** in `kubernetes-manifests/` and `helm-chart/templates/`\n\
  - Its own **ServiceAccount** for security isolation\n\nServices include: `adservice`,\
  \ `cartservice`, `checkoutservice`, `currencyservice`, `emailservice`, `frontend`,\
  \ `loadgenerator`, `paymentservice`, `productcatalogservice`, `recommendationservice`,\
  \ `shippingservice`.\n\n### Polyglot Implementation\n\nEach service is written in\
  \ a different language optimized for its purpose:\n- **Go**: frontend, checkoutservice,\
  \ productcatalogservice, shippingservice\n- **C#**: cartservice\n- **Node.js**:\
  \ currencyservice, paymentservice  \n- **Python**: emailservice, recommendationservice\n\
  - **Java**: adservice\n\n### Service-Owned Data\n\nEach service owns its data store\
  \ independently:\n- `cartservice` uses Redis (`REDIS_ADDR` env var in `kubernetes-manifests/cartservice.yaml:50-51`)\n\
  - `productcatalogservice` loads products from a local JSON file (`products.json`)\n\
  - No shared relational database across services\n\n### gRPC Communication\n\nAll\
  \ inter-service communication happens via **gRPC** with a well-defined contract\
  \ in `protos/demo.proto`. The proto file defines 10 service interfaces (CartService,\
  \ RecommendationService, ProductCatalogService, ShippingService, CurrencyService,\
  \ PaymentService, EmailService, CheckoutService, AdService). Services call each\
  \ other synchronously:\n\n```go\n// frontend/rpc.go - Frontend calling multiple\
  \ services\npb.NewCurrencyServiceClient(fe.currencySvcConn).GetSupportedCurrencies(...)\n\
  pb.NewProductCatalogServiceClient(fe.productCatalogSvcConn).ListProducts(...)\n\
  pb.NewCartServiceClient(fe.cartSvcConn).GetCart(...)\n```\n\n### Orchestration Pattern\n\
  \nThe `checkoutservice` demonstrates service orchestration. In `src/checkoutservice/main.go:66-86`,\
  \ it holds connections to 6 different services and coordinates the checkout flow\
  \ by calling each in sequence.\n\n### What This Is NOT\n\n- **Not Service-Based**:\
  \ Service-Based typically has 2-5 coarse-grained services often sharing a database.\
  \ This has 11+ fine-grained services with independent data stores.\n\n- **Not Layered**:\
  \ There's no horizontal presentation/business/data layering. Each service is a vertical\
  \ slice handling its own domain.\n\n- **Not Modular Monolith**: Services are independently\
  \ deployable containers, not modules within a single deployment unit.\n\n- **Not\
  \ Event-Driven**: Services communicate via synchronous gRPC calls, not through asynchronous\
  \ message brokers.\n\n- **Not Hexagonal**: Services don't implement ports/adapters\
  \ pattern. They're straightforward gRPC servers.\n\n### Confidence\n\n**0.98** —\
  \ This is the explicit purpose of this repository (as stated in README: \"cloud-first\
  \ microservices demo application\"). The architecture signals are clear, consistent,\
  \ and comprehensive across all dimensions: deployment, data ownership, communication,\
  \ and technology stack."
