review_notes: 'README explicitly describes NATS as ''a simple, secure and performant
  communications system for digital systems, services and devices'' — it IS a messaging/event
  infrastructure system. Core architecture in server/ is built entirely around event-driven
  primitives: subject-based pub/sub (server/sublist.go, server/client.go with CLIENT/ROUTER/GATEWAY/LEAF/JETSTREAM
  connection types), message streams with configurable retention (server/stream.go
  StreamConfig with subjects, retention policies), consumers with delivery semantics
  (server/consumer.go), persistent event log via JetStream (server/jetstream.go, server/jetstream_cluster.go
  for Raft-based replication), event routing across clusters (server/route.go, server/gateway.go
  for inter-cluster links, server/leafnode.go for edge connections), and system events
  for observability (server/events.go with $SYS subject hierarchy for connect/disconnect/account
  events). The entire codebase IS an event-driven messaging system — subject-based
  addressing, publish-subscribe fan-out, queue groups for load-balanced consumption,
  at-least-once/exactly-once delivery via JetStream, and Raft consensus for stream
  replication. Confidence 0.95: this is a textbook event-driven system — it does not
  merely use event-driven patterns, it is the event-driven infrastructure itself.'
