  application with distinct subsystems (core server, JetStream, cluster/routing, leaf
  nodes, auth) — consistent with Modular Monolith + Event-Driven classification. Heuristic
  candidates from catalog (Modular Monolith 0.4, Event-Driven 0.3) align with this
  assessment.'
