review_notes: 'Single Go module (go.mod) and single Dockerfile confirm single deployable
  unit. The `server/` package is the core monolith containing all major subsystems:
  jetstream.go, jetstream_cluster.go, accounts.go, gateway.go, mqtt.go, auth.go, store.go,
  monitor.go — all within one package. Internal modules (`internal/ldap`, `internal/ocsp`,
  `internal/fastrand`) and `logger/` provide clear module boundaries. Event-Driven
  classification is well-supported: NATS is itself a pub/sub messaging infrastructure;
  `server/jetstream_events.go`, `server/events_test.go`, and the overall pub/sub/streaming
  architecture confirm event-driven patterns as a first-class concern. No multiple
  Dockerfiles, no Kubernetes manifests, no API gateway config — ruling out Microservices.'
