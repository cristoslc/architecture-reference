one_line_summary: "High-performance CNCF messaging broker built on a subject-based publish-subscribe engine, deployed as a single binary with cleanly separated subsystems (JetStream, clustering, MQTT, monitoring) that communicate internally through the same pub-sub bus."
classification_reasoning: "NATS Server's organizing principle is asynchronous, decoupled message exchange through a subject-based pub-sub engine — the definition of Event-Driven architecture. The subject trie (sublist.go) is the routing core; every PUB results in fan-out to matched subscribers via processMsgResults. Crucially, internal subsystems also communicate this way: JetStream management is exposed as $JS.API.* subjects, system advisories are $SYS.* messages, and auth callouts use request-reply over NATS subjects rather than direct function calls. Modular Monolith is the secondary style: all subsystems (JetStream persistence, Raft clustering, gateway federation, MQTT adapter, monitoring) live in a single Go package and binary with clean functional boundaries maintained by the message bus rather than process isolation. The built-in Raft consensus (raft.go, ~5000 lines) is an implementation mechanism for JetStream distributed replication, not a separate architectural style. MQTT and WebSocket are protocol adapters that translate foreign wire formats into NATS pub-sub semantics, not independent services. The prior classification of Layered is incorrect: there is no strict layer discipline and subsystems do not communicate through layer boundaries — they communicate through the internal pub-sub bus."
