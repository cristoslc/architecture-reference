review_notes: 'docker-compose.yml defines 12+ services in default profile: (1) web —
  main application server (HTTP API, UI, port 9000); (2) relay — event ingestion
  gateway, first entry point for SDKs, forwards via Kafka; (3) events-consumer —
  processes ingest-events from Kafka; (4) attachments-consumer — processes
  ingest-attachments; (5) post-process-forwarder-errors — routes processed events
  to Snuba; (6) subscription-consumer-events — handles subscription queries;
  (7) sentry-cleanup — scheduled maintenance; (8) snuba-api — analytics/query API
  (port 1218) for search and aggregation over ClickHouse; (9) snuba-errors-consumer —
  feeds events into ClickHouse; (10) snuba-outcomes-consumer — billing/outcome data;
  (11) symbolicator — debug symbol/sourcemap processing; (12) nginx — API gateway.
  Full feature-complete profile adds 20+ more specialized consumers (transactions,
  metrics, replays, profiles, spans). Services communicate via Kafka topics for
  async event processing and HTTP/RPC for synchronous operations. Service-Based
  because 12+ coarse-grained services handle distinct business capabilities.
  Event-Driven because Kafka is the central communication hub for async event
  processing.'
