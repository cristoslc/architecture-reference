classification_reasoning: "Netflix Conductor is a workflow orchestration engine structured\
  \ around a **Microkernel (Plugin)** architecture. \n\n### Primary Style: Microkernel\
  \ (Plugin)\nThe repository is organized as a core engine (`conductor-core`) that\
  \ remains agnostic of specific infrastructure or task implementations. It uses a\
  \ provider/plugin pattern to extend functionality. Evidence includes:\n- **Persistence\
  \ Plugins:** Separate modules for different storage backends like `conductor-redis-persistence`,\
  \ `conductor-cassandra-persistence`, and `conductor-es6-persistence` (for indexing).\n\
  - **Task Plugins:** Special task types are isolated into their own modules, such\
  \ as `conductor-http-task` and `conductor-json-jq-task`.\n- **Infrastructure Plugins:**\
  \ Features like locking (`conductor-redis-lock`) and external storage (`conductor-awss3-storage`)\
  \ are decoupled from the core logic.\n- **Contract-based Extension:** The `conductor-common`\
  \ module defines the shared models and interfaces that these plugins must implement\
  \ to be loaded by the `conductor-server` (the Spring Boot runtime).\n\n### Secondary\
  \ Style: Event-Driven\nWhile Conductor is an orchestrator, its internal and external\
  \ communication frequently leverages event-driven patterns.\n- The existence of\
  \ `conductor-awssqs-event-queue` indicates that the system can consume and produce\
  \ events to external message brokers.\n- The documentation mentions `eventhandlers.md`,\
  \ which are used to trigger workflows or tasks based on external messages (Pub/Sub).\n\
  \n### Secondary Style: Layered\nAt the deployment unit level (`conductor-server`),\
  \ it follows a traditional **Layered** approach using Spring Boot:\n- **Presentation/API:**\
  \ Managed in `conductor-rest` and `conductor-grpc-server`.\n- **Business Logic:**\
  \ Encapsulated in `conductor-core`.\n- **Data Access:** Abstracted via the persistence\
  \ modules mentioned above.\n\n### Rejected Architecture Styles\n- **Microservices:**\
  \ Although the README states it *orchestrates* microservices, the repository itself\
  \ is a distributed-system-in-a-box. It typically deploys as a single \"Server\"\
  \ unit (the orchestrator) rather than a set of independent business services.\n\
  - **Modular Monolith:** While it has modules, it exceeds the definition of a modular\
  \ monolith due to its explicit \"plugin\" nature where components (like SQS or Redis)\
  \ are swapped based on configuration to adapt the system's fundamental capabilities."
