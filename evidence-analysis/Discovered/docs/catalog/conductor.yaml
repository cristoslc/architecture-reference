review_notes: "Netflix Conductor is a workflow orchestration engine structured around\
  \ a **Microkernel (Plugin)** architecture. \n\n### Primary Style: Microkernel (Plugin)\n\
  The repository is organized as a core engine (`conductor-core`) that remains agnostic\
  \ of specific infrastructure or task implementations. It uses a provider/plugin\
  \ pattern to extend functionality. Evidence includes:\n- **Persistence Plugins:**\
  \ Separate modules for different storage backends like `conductor-redis-persistence`,\
  \ `conductor-cassandra-persistence`, and `conductor-es6-persistence` (for indexing).\n\
  - **Task Plugins:** Special task types are isolated into their own modules, such\
  \ as `conductor-http-task` and `conductor-json-jq-task`.\n- **Infrastructure Plugins:**\
  \ Features like locking (`conductor-redis-lock`) and external storage (`conductor-awss3-storage`)\
  \ are decoupled from the core logic.\n- **Contract-based Extension:** The `conductor-common`\
  \ module defines the shared models and interfaces that these plugins must implement\
  \ to be loaded by the `conductor-server` (the Spring Boot runtime).\n\n### Secondary\
  \ Style: Event-Driven"
