one_line_summary: Netflix Conductor is a workflow orchestration engine structured as a Microkernel + Hexagonal Architecture
  system deployed as a Modular Monolith, where a stable core defines abstract plugin extension points (task types, persistence,
  queuing, locking) fulfilled by interchangeable infrastructure adapter modules, all assembled into a single Spring Boot application.
classification_reasoning: |-
  Netflix Conductor exhibits three interlocking architecture styles with strong structural evidence across its 20+ Gradle submodule codebase.

  PRIMARY: Microkernel (Plugin Architecture). The `conductor-core` module defines a stable kernel with abstract extension points: `WorkflowSystemTask` (abstract base for all task types), `EventQueueProvider` (queue backend abstraction), `Lock` (distributed locking abstraction), and `ExternalPayloadStorage` (payload storage abstraction). `SystemTaskRegistry` auto-discovers all `WorkflowSystemTask` implementations via Spring DI injection of `Set<WorkflowSystemTask>`. Optional plugin modules register without touching core: `conductor-http-task`, `conductor-json-jq-task`, `conductor-awssqs-event-queue`, `conductor-redis-lock`, `conductor-awss3-storage`. Built-in system tasks (Fork, Join, Switch, DoWhile, SubWorkflow, Wait, Human, Lambda, etc.) are themselves plugins registered in this same registry.

  PRIMARY: Hexagonal Architecture (Ports and Adapters). Eight pure Java DAO interfaces in `com.netflix.conductor.dao` (ExecutionDAO, QueueDAO, MetadataDAO, IndexDAO, EventHandlerDAO, PollDataDAO, RateLimitingDAO, ConcurrentExecutionLimitDAO) define the domain's persistence ports with zero implementation code. Infrastructure adapter modules implement these ports: `conductor-redis-persistence` (RedisExecutionDAO, RedisMetadataDAO, RedisQueueDAO), `conductor-cassandra-persistence` (CassandraExecutionDAO, CassandraMetadataDAO), `conductor-es6-persistence` (ElasticSearchDAOV6 implementing IndexDAO). Runtime adapter selection uses `@ConditionalOnProperty` and `@Conditional` annotations. The `conductor-core` module has no compile-time dependency on any adapter module; all wiring happens in `conductor-server`, the explicit hexagonal composition root.

  PRIMARY: Modular Monolith. `server/build.gradle` assembles all modules as `implementation project(...)` dependencies and produces a single Spring Boot JAR via `bootJar` with mainClass `com.netflix.conductor.Conductor`. Docker deployment uses a single `conductor-server` container with external Redis and Elasticsearch as infrastructure. 20+ Gradle subprojects enforce module boundaries at compile time without deploying independently.

  SECONDARY: Event-Driven. `WorkflowExecutor` uses Spring `ApplicationEventPublisher` to publish `WorkflowCreationEvent` and `WorkflowEvaluationEvent` internally. `ObservableQueue` (using RxJava Observable) abstracts external message queues consumed by `DefaultEventProcessor` for event-handler-triggered workflow actions. `WorkflowStatusListener` and `TaskStatusListener` extension interfaces allow external reaction to lifecycle changes. The core task dispatch model is REST/gRPC worker polling — not reactive push — so event-driven is a secondary structural feature.

  REJECTED: Microservices (single deployable unit, no independent service deployment), Service-Based (REST/gRPC are external APIs not internal architectural boundaries), CQRS (same DAO interfaces handle commands and queries), Pipeline (Conductor orchestrates external pipelines but is not itself a pipeline system), Domain-Driven Design (domain concepts present but not organized around bounded contexts/aggregates).
