classification_reasoning: "## Architecture Analysis\n\nNetflix Conductor exhibits\
  \ a **Hexagonal Architecture (Ports and Adapters)** pattern as its primary style,\
  \ with strong characteristics of **Modular Monolith** and a **Microkernel/Plugin**\
  \ system for extensibility.\n\n### Evidence for Hexagonal Architecture\n\n**1. Core\
  \ Domain Defines Port Interfaces (DAOs)**\n\nThe `core` module defines persistence\
  \ abstraction interfaces in `core/src/main/java/com/netflix/conductor/dao/`:\n-\
  \ `ExecutionDAO` - workflow and task execution storage\n- `QueueDAO` - message queue\
  \ operations\n- `MetadataDAO` - workflow and task definitions\n- `IndexDAO` - search/indexing\
  \ operations\n- `EventHandlerDAO` - event handler storage\n\nThese are pure interfaces\
  \ with no implementation detailsâ€”classic \"ports\" in hexagonal architecture.\n\n\
  **2. Pluggable Adapter Implementations**\n\nMultiple persistence modules implement\
  \ these interfaces:\n- `redis-persistence/` - `RedisExecutionDAO`, `RedisMetadataDAO`,\
  \ `RedisQueueDAO` (implements `QueueDAO`)\n- `cassandra-persistence/` - `CassandraExecutionDAO`,\
  \ `CassandraMetadataDAO`\n- `es6-persistence/` - `ElasticSearchDAOV6` (implements\
  \ `IndexDAO`)\n\nEach module uses Spring's `@Conditional` annotations for runtime\
  \ selection:\n```java\n@Configuration\n@Conditional(AnyRedisCondition.class)  //\
  \ Redis module\n@ConditionalOnProperty(name = \"conductor.db.type\", havingValue\
  \ = \"cassandra\")  // Cassandra module\n```\n\n**3. Application Core Isolation**\n\
  \nThe `core` module contains all business logic with compile-time dependencies only\
  \ on common models (`conductor-common`) and abstraction interfaces. The server module\
  \ wires everything together:\n```groovy\n// server/build.gradle\nimplementation\
  \ project(':conductor-rest')\nimplementation project(':conductor-core')\nimplementation\
  \ project(':conductor-redis-persistence')\nimplementation project(':conductor-cassandra-persistence')\n\
  implementation project(':conductor-es6-persistence')\n```\n\n### Evidence for Modular\
  \ Monolith\n\n**1. Single Deployable Unit**\n\nThe `server` module produces a single\
  \ Spring Boot JAR:\n```groovy\nbootJar {\n    mainClass = 'com.netflix.conductor.Conductor'\n\
  \    classifier = 'boot'\n}\n```\n\n**2. Enforced Module Boundaries via Gradle**\n\
  \nClear separation into 20+ Gradle subprojects:\n```\ninclude 'core'\ninclude 'common'\n\
  include 'server'\ninclude 'rest'\ninclude 'client'\ninclude 'redis-persistence'\n\
  include 'cassandra-persistence'\ninclude 'es6-persistence'\ninclude 'http-task'\n\
  include 'json-jq-task'\n...\n```\n\nEach module has explicit dependency declarations\
  \ (`build.gradle`), preventing circular dependencies.\n\n**3. Layered Organization\
  \ Within Modules**\n\n- `common` - Domain models, annotations, validation\n- `core`\
  \ - Business logic, workflow execution engine, service layer\n- `rest` - REST controllers\
  \ (presentation layer)\n- `server` - Spring Boot application assembly\n\n### Evidence\
  \ for Microkernel/Plugin Pattern\n\n**1. System Task Plugin Architecture**\n\nCore\
  \ defines an abstract `WorkflowSystemTask` base class:\n```java\npublic abstract\
  \ class WorkflowSystemTask {\n    private final String taskType;\n    public void\
  \ start(WorkflowModel workflow, TaskModel task, WorkflowExecutor workflowExecutor)\
  \ { }\n    public boolean execute(WorkflowModel workflow, TaskModel task, WorkflowExecutor\
  \ workflowExecutor) { }\n    public void cancel(WorkflowModel workflow, TaskModel\
  \ task, WorkflowExecutor workflowExecutor) { }\n}\n```\n\n**2. Auto-Discovery via\
  \ Spring DI**\n\nThe `SystemTaskRegistry` auto-discovers all `WorkflowSystemTask`\
  \ implementations:\n```java\n@Component\npublic class SystemTaskRegistry {\n   \
  \ private final Map<String, WorkflowSystemTask> registry;\n    \n    public SystemTaskRegistry(Set<WorkflowSystemTask>\
  \ tasks) {\n        this.registry = tasks.stream()\n            .collect(Collectors.toMap(WorkflowSystemTask::getTaskType,\
  \ Function.identity()));\n    }\n}\n```\n\n**3. Optional Task Modules**\n\n- `http-task`\
  \ - `HttpTask extends WorkflowSystemTask` (with `@Component(TASK_TYPE_HTTP)`)\n\
  - `json-jq-task` - JSON processing task\n- `awssqs-event-queue` - AWS SQS integration\n\
  \nThese are optionally included in the server build, allowing runtime extensibility.\n\
  \n### What Was Rejected\n\n- **Microservices**: Single deployable JAR, not multiple\
  \ independent services. Docker compose runs one server container with external Redis/ES\
  \ dependencies.\n\n- **Event-Driven**: While Conductor *orchestrates* event-driven\
  \ workflows, its internal architecture is synchronous request-response (REST controllers\
  \ â†’ Services â†’ DAOs). QueueDAO is a persistence mechanism, not an architectural\
  \ messaging pattern.\n\n- **CQRS**: No separation of read/write models. The same\
  \ DAO interfaces handle both queries and commands.\n\n- **Domain-Driven Design**:\
