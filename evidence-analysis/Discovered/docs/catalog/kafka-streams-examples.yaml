classification_reasoning: |
  ## Analysis

  ### Repository Purpose
  This is the official Confluent reference implementation repository for Kafka Streams patterns.
  It contains two categories of content: (1) standalone stream processing examples demonstrating
  individual Kafka Streams DSL features (WordCount, AnomalyDetection, SessionWindows, GlobalKTables,
  PageViewRegion, etc.) and (2) a complete event-driven microservices ecosystem (the `microservices/`
  package) demonstrating an order management workflow.

  ### Primary Style: Event-Driven

  **Evidence 1: Topic-only inter-service coupling in microservices package**
  domain/Schemas.java defines all 6 Kafka topics as the sole inter-service contract:
  `ORDERS`, `ORDER_VALIDATIONS`, `PAYMENTS`, `CUSTOMERS`, `WAREHOUSE_INVENTORY`, `ORDERS_ENRICHED`.
  No service holds a reference to any other service object.

  **Evidence 2: Choreographed order workflow**
  - OrdersService → produces Order to `orders` topic
  - FraudService, InventoryService, OrderDetailsService → each consumes from `orders`, emits
    PASS/FAIL to `order-validations` (parallel, no coordination)
  - ValidationsAggregatorService → joins `order-validations` stream with `orders` stream,
    counts pass results per session window (numberOfRules=3), writes validated/failed Order
    back to `orders`
  - EmailService → reacts to order state changes, sends email
  No orchestrator. Each service reacts to events independently. This is canonical choreography.

  **Evidence 3: Explicit documentation**
  microservices/README.md line 6: "business events that describe the order management workflow
  propagate through this ecosystem."

  **Evidence 4: Even the non-Streams service uses events**
  OrderDetailsService is intentionally implemented with raw KafkaConsumer/KafkaProducer
  (instead of Streams DSL) to show event-driven integration without higher-level APIs.
  It uses Kafka transactions for exactly-once semantics.

  **Evidence 5: Interactive Queries as CQRS read side**
  OrdersService.java Javadoc line 72-74: "This class provides a REST interface to write and
  read orders using a CQRS pattern." Writes go to Kafka; reads query the local ReadOnlyKeyValueStore
  materialized from the `orders` topic via KafkaStreams. MetadataService routes GET requests to
  the correct instance using KafkaStreams.queryMetadataForKey().

  ### Secondary Style: Pipeline

  Every Kafka Streams application in the repository builds a directed dataflow topology:

  - WordCountLambdaExample: stream → flatMapValues → groupBy → count → toStream → to
  - FraudService: stream(ORDERS) → filter → groupBy(customerId) → windowedBy(SessionWindows)
    → aggregate(OrderValue) → toStream → split/branch(above/below limit) → mapValues → to
  - ValidationsAggregatorService: stream(ORDER_VALIDATIONS) + stream(ORDERS) → groupByKey
    → windowedBy(SessionWindows) → aggregate(pass count) → filter(>= 3) → join(orders)
    → to(ORDERS)
  - KafkaMusicExample: stream(play-events) → filter(duration >= 30s) → map(rekeyed by songId)
    → leftJoin(song KTable) → groupBy(song) → count(song-play-count store)
    → groupBy(genre) → aggregate(top-five-by-genre store) | aggregate(top-five store)
  - AnomalyDetectionLambdaExample: stream(UserClicks) → groupByKey → windowedBy(TimeWindows(1min))
    → count → filter(> 2) → to(AnomalousUsers)

  The Pipe-and-Filter structure is the universal within-application execution model. It describes
  how data moves *inside* each application. Event-Driven describes how *applications* (services)
  communicate with each other.

  ### Confidence Rationale
  0.90 confidence reflects that both styles are clearly and intentionally demonstrated with
  production-quality code and accompanying documentation. The slight reduction from 1.0 is
  because this is a reference/examples repo (not a production deployment) and the two styles
  operate at different scopes (inter-service vs intra-application), making the classification
  dual rather than singular.
