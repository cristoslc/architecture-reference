one_line_summary: "Official Confluent reference repository demonstrating Kafka Streams patterns including event-driven microservices choreography, stateful stream topologies, and interactive state store queries."
review_notes: |
  The repository demonstrates two intertwined topology-defining styles.

  **Primary: Event-Driven (0.92)**
  The microservices package is the clearest evidence: six services (OrdersService, FraudService,
  InventoryService, OrderDetailsService, ValidationsAggregatorService, EmailService) interact
  exclusively through Kafka topics declared in domain/Schemas.java. No service calls another
  service directly. The choreographed order workflow — three validators consuming from `orders`
  in parallel, each emitting to `order-validations`, then ValidationsAggregatorService joining
  and writing the final state back to `orders` — is canonical event-driven choreography.
  OrderDetailsService deliberately uses raw Kafka Producer/Consumer (not the Streams DSL) to
  demonstrate event-driven interaction without the higher-level API.

  **Secondary: Pipeline (0.85)**
  Every KafkaStreams application constructs an explicit directed dataflow topology via StreamsBuilder.
  Operators (filter, map, flatMap, groupBy, windowedBy, aggregate, count, split/branch, join) are
  chained into a Pipe-and-Filter graph. KafkaMusicExample.buildTopology() is the most complex
  instance: play-events → filter → rekeyed → join song KTable → groupBy → count → aggregate
  top-five by genre and overall. The Pipeline style describes the *within-application* structure
  that all examples share; Event-Driven describes the *between-service* structure of the
  microservices package.

  **Architecture Qualifiers**
  - CQRS: OrdersService explicitly labels its REST interface as CQRS (Javadoc line 74);
    writes go via KafkaProducer to the `orders` topic, reads come from a materialized
    ReadOnlyKeyValueStore queried via Interactive Queries.
  - Change-Data-Capture: state stores are backed by Kafka changelog topics (implicit CDC).
