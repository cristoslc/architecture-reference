review_notes: "README states: 'code examples that demonstrate how to implement real-time applications and event-driven microservices using the Streams API of Apache Kafka.' All examples process events via Kafka topics (15 messaging signals detected). src/main/java/.../streams/ contains ~20 standalone examples (WordCount, MapFunction, SessionWindows, joins, aggregations) all using Kafka Streams DSL -- inherently event-driven. Dedicated microservices/ subdirectory demonstrates an order management workflow with OrdersService, FraudService, InventoryService, OrderDetailsService, EmailService, ValidationsAggregatorService communicating exclusively through Kafka topics. docker-compose.yml orchestrates Kafka + ZooKeeper + Schema Registry for the KafkaMusic demo app. Single Maven pom.xml packaging as jar -- not multi-module. Event-Driven is primary (all examples), Microservices is secondary (one demo subdirectory)."