review_notes: 'The repository is structured as a **Modular Monolith** managed within
  a Turborepo monorepo. While it contains multiple deployable units, the core business
  logic (scheduling, availability, bookings) is centralized in a single large Next.js
  application (`apps/web`), complemented by shared internal packages that enforce
  module boundaries.


  ### Primary Style: Modular Monolith

  The architecture is fundamentally a monolith because the vast majority of the system''s
  functionality, state management, and UI reside in `apps/web`. However, it is "Modular"
  because:

  - **Shared Packages:** Logic is extracted into specialized packages under `packages/`
  (e.g., `@calcom/prisma` for data, `@calcom/trpc` for API contracts, and `@calcom/features`
  for domain logic).

  - **Dependency Enforcement:** `turbo.json` and `package.json` workspaces define
  a clear dependency graph where the web app consumes discrete, versioned internal
  modules.

  - **Single Database: ** Almost all services share a single PostgreSQL database managed
  by a central Prisma schema (`packages/prisma/schema.prisma`), a hallmark of monolithic
  data architecture.


  ### Secondary Style: Microkernel (Plugin)

  The system implements a strong **Microkernel** pattern through its "App Store" infrastructure:'
