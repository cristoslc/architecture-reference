review_notes: 'Evidence: 120 package manifests strongly indicate a large monorepo
  with internal packages/modules rather than independent microservices. RabbitMQ presence
  (15 messaging signals) points to event-driven communication between modules. Microservices
  scored only 0.4 vs Event-Driven 0.6, and without Kubernetes/Helm manifests or API
  gateway config, full microservices is unlikely. 8 container orchestration signals
  (Docker Compose) suggest a single deployable unit with supporting services. The
  scheduling domain and known public architecture of cal.com (Next.js monorepo with
  apps/ and packages/ directories) supports Modular Monolith as primary style. DDD
  score of 0.3 is insufficient to list as a primary style without directory evidence.'
