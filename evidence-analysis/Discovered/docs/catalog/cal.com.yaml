review_notes: "Evidence: README.md identifies Next.js/tRPC/Prisma stack. package.json declares Yarn workspaces monorepo (calcom-monorepo) with turbo.json orchestration. apps/ contains web (Next.js) and api/ (v1 as Next.js, v2 as NestJS). packages/features/ contains 60+ domain-organized modules (bookings/, eventtypes/, availability/, slots/, workflows/, organizations/, etc.) each with services/, repositories/, di/ subdirectories. packages/features/di/ implements IoC container via @evyweb/ioctopus with typed tokens (tokens.ts) and module bindings. packages/features/bookings/repositories/ shows repository pattern with interfaces (IBookingRepository.ts, IAttendeeRepository.ts) and Prisma implementations. packages/features/bookings/di/ has per-domain DI modules (RegularBookingService.module.ts, BookingCancelService.module.ts). packages/features/tasker/ provides async task abstraction (internal/redis backends) for webhooks, SMS, CRM events. docker-compose.yml runs single calcom container + separate calcom-api (NestJS v2) container sharing one Postgres DB -- service-based deployment but shared data store confirms modular monolith not microservices. AGENTS.md says 'Never put business logic in repositories - that belongs in Services' confirming layered service/repository separation within domain modules. packages/ee/ separates enterprise features. packages/app-store/ uses plugin architecture for 60+ integrations. packages/trpc/server/routers/ organizes API by domain (viewer/, apps/, features/)."