classification_reasoning: "## Architecture Analysis\n\n### Primary Style: Modular\
  \ Monolith\n\n**Strong Evidence:**\n\n1. **Feature-based vertical slices** in `packages/features/`:\n\
  \   - Each domain has its own self-contained directory: `bookings/`, `availability/`,\
  \ `event-types/`, `auth/`, `insights/`, `webhooks/`, etc.\n   - Features include:\
  \ `services/`, `repositories/`, `components/`, `hooks/`, `lib/`, `types.ts`\n  \
  \ - Clear public APIs exported from each feature\n\n2. **Enforced module boundaries**\
  \ with explicit architecture rules:\n   ```typescript\n   // From agents/rules/architecture-feature-boundaries.md\n\
  \   // Incorrect - Importing internal implementation details\n   import { calculateSlots\
  \ } from \"@calcom/features/availability/services/internal/slotCalculator\";\n \
  \  \n   // Correct - Import through the feature's public API\n   import { getAvailability\
  \ } from \"@calcom/features/availability\";\n   ```\n\n3. **Repository pattern with\
  \ dependency injection**:\n   - 30+ repository interfaces: `IBookingAuditRepository`,\
  \ `IBookingReferenceRepository`, `IBookingReportRepository`, etc.\n   - DI container\
  \ using `@evyweb/ioctopus` with type-safe module loaders\n   - Services depend on\
  \ abstractions (interfaces), not concretions:\n   ```typescript\n   // packages/features/booking-audit/di/tokens.ts\n\
  \   export const BOOKING_AUDIT_DI_TOKENS = {\n     BOOKING_AUDIT_REPOSITORY: Symbol(\"\
  BookingAuditRepository\"),\n     BOOKING_AUDIT_PRODUCER_SERVICE: Symbol(\"BookingAuditProducerService\"\
  ),\n     // ...\n   };\n   ```\n\n4. **Single deployable unit** (primary): \n  \
  \ - Dockerfile builds one main application (`@calcom/web`)\n   - All features are\
  \ compiled into the same deployment artifact\n   - Single PostgreSQL database (not\
  \ database-per-service)\n\n5. **Clear layering within the monolith**:\n   - `apps/web/modules/`\
  \ - tRPC hooks and React components (web-specific)\n   - `packages/features/` -\
  \ Framework-agnostic business logic (shared)\n   - `packages/lib/` - Cross-cutting\
  \ utilities\n   - `packages/prisma/` - Data access layer\n\n### Secondary Style:\
  \ Microkernel (Plugin)\n\n**Strong Evidence:**\n\n1. **140+ plugins in App Store**\
  \ (`packages/app-store/`):\n   - googlecalendar, zoomvideo, stripepayment, hubspot,\
  \ salesforce, slack, discord, etc.\n   - Each app follows standardized structure:\
  \ `index.ts`, `api/`, `lib/`, `_metadata.ts`, `config.json`\n\n2. **Generated plugin\
  \ registry**:\n   ```typescript\n   // packages/app-store/apps.server.generated.ts\
  \ (auto-generated)\n   export const apiHandlers = {\n     googlecalendar: import(\"\
  ./googlecalendar/api\"),\n     zoomvideo: import(\"./zoomvideo/api\"),\n     stripepayment:\
  \ import(\"./stripepayment/api\"),\n     // 140+ apps...\n   };\n   ```\n\n3. **CLI\
  \ tool for plugin scaffolding**:\n   - `packages/app-store-cli/` with commands:\
  \ `create-app`, `edit-app`, `delete-app`\n   - Auto-generates `*.generated.ts` files\
  \ that register plugins\n\n4. **Plugin metadata and contracts**:\n   ```typescript\n\
  \   // packages/app-store/googlecalendar/_metadata.ts\n   export const metadata\
  \ = {\n     name: \"Google Calendar\",\n     type: \"google_calendar\",\n     category:\
  \ \"calendar\",\n     isOAuth: true,\n     // Standard plugin interface\n   };\n\
  \   ```\n\n5. **Plugin extension points**:\n   - `api/` - API handlers for OAuth\
  \ callbacks and webhooks\n   - `lib/` - Calendar service implementations\n   - `components/`\
  \ - UI components (browser-generated)\n\n### Rejected Styles\n\n**Not Microservices**\
  \ because:\n- Only 2 services (`calcom` and `calcom-api`) sharing a single database\n\
  - No database-per-service pattern\n- Features are not independently deployable\n\
  - All features compile into the same deployment artifact\n\n**Not Event-Driven**\
  \ because:\n- No message broker (Kafka, RabbitMQ, etc.) in deployment configuration\n\
  - Direct synchronous calls between components\n- No event sourcing or CQRS patterns\n\
  \n**Not Serverless** because:\n- Docker container deployment\n- No AWS Lambda/Firebase\
  \ functions\n- Traditional server architecture\n\n**Not DDD (Domain-Driven Design)**\
  \ because:\n- While organized by domain, no formal aggregates, value objects, or\
  \ bounded context definitions\n- No ubiquitous language documentation\n- No event\
  \ storming artifacts\n\n### Deployment Topology\n\nFrom `docker-compose.yml`:\n\
  - **calcom** - Main Next.js web application\n- **calcom-api** - NestJS Platform\
  \ API (for external integrations)\n- **database** - Shared PostgreSQL instance\n\
  - **redis** - Shared Redis cache\n\nBoth services share the same database, confirming\
  \ the modular monolith architecture with an optional separate API surface for platform\
  \ consumers."
