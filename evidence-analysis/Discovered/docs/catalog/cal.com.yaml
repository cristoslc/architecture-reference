one_line_summary: Open-source scheduling platform structured as a Modular Monolith
  with a Microkernel plugin system (140+ integrations), tRPC-backed feature modules,
  shared PostgreSQL database, and an async task pipeline via trigger.dev.
classification_reasoning: "cal.com is classified as Modular Monolith (primary) +
  Microkernel (secondary) at confidence 0.92.\n\n## Primary: Modular Monolith\n\n\
  The definitive evidence is a single shared PostgreSQL database (119 Prisma models
  in one schema.prisma) consumed by both the main Next.js app (`apps/web`) and the
  NestJS REST API (`apps/api/v2`). Both services compile from shared packages in
  `packages/features/` and share the same Prisma client — confirming a monolithic
  data architecture despite having two runtime processes.\n\nThe 'Modular' aspect
  is enforced through:\n- Turborepo workspace boundaries with explicit dependency
  graphs\n- `packages/features/` vertical-slice modules (bookings, availability,
  eventtypes, auth, webhooks, billing, workflows, etc.), each with repositories/,
  services/, di/, and lib/ sub-layers\n- tRPC routers in `packages/trpc/server/routers/`
  as the internal API contract layer for `apps/web`\n- `@evyweb/ioctopus` IoC containers
  with typed DI tokens wiring repository interfaces to Prisma implementations\n-
  Repository pattern with explicit interfaces (IBookingRepository, IAttendeeRepository,
  IWebhookRepository, etc.)\n\n## Secondary: Microkernel\n\n`packages/app-store/`
  implements a textbook microkernel: the core scheduling engine is the kernel, and
  140+ calendar/video/CRM/payment integrations are plugins loaded dynamically via
  auto-generated registries (`apps.server.generated.ts`, `apps.metadata.generated.ts`,
  `apps.schemas.generated.ts`). The `app-store-cli` provides lifecycle tooling (create-app,
  edit-app, delete-app). Each plugin conforms to a standard contract: `_metadata.ts`,
  `config.json`, `api/` (OAuth/webhooks), `lib/` (service implementations), `components/`
  (UI).\n\n## Tertiary (emerging): Event-Driven elements\n\nAn async task pipeline
  layers on top of the synchronous core: trigger.dev integration with named queues
  (webhook-delivery concurrency 25, calendars concurrency 10, booking notifications),
  a producer/consumer webhook architecture (WebhookTaskerProducerService + WebhookTaskConsumer),
  and BookingEventHandlerService with named booking lifecycle events. However, the
  core booking and scheduling flows are synchronous; trigger.dev dispatch is gated
  by ENABLE_ASYNC_TASKER env flag with a synchronous InternalTasker fallback. This
  does not constitute a primary Event-Driven architecture.\n\n## Rejected Styles\n\
  \n- Microservices: Both services share one database; no database-per-service, no
  service mesh\n- Event-Driven: No message broker (Kafka/RabbitMQ); synchronous core
  with async bolt-on; no event sourcing\n- CQRS: No explicit read/write model separation;
  single Prisma client\n- Serverless: Docker container deployment; no FaaS\n- DDD:
  Domain-organized but no formal aggregates, value objects, or bounded context documentation"
