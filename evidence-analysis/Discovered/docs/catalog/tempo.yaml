classification_reasoning: "## Analysis\n\n**Primary Style: Modular Monolith**\n\n\
  Tempo exhibits clear characteristics of a Modular Monolith architecture:\n\n###\
  \ Single Deployable with Runtime Target Selection\n- **One binary, one build artifact**:\
  \ The entire system builds from a single `go.mod` into one `tempo` binary (`cmd/tempo/main.go`,\
  \ `cmd/tempo/Dockerfile`)\n- **Same Docker image for all modes**: `grafana/tempo:latest`\
  \ is used across all deployment targets\n- **Runtime target selection**: The `-target`\
  \ flag determines which modules run: `-target=all` (single-binary), `-target=distributor`,\
  \ `-target=querier`, `-target=query-frontend`, `-target=live-store`, `-target=metrics-generator`,\
  \ `-target=backend-scheduler`, `-target=backend-worker`, etc.\n\n### Enforced Internal\
  \ Module Boundaries\nThe module system is explicitly defined in `cmd/tempo/app/modules.go`:\n\
  \n```go\nfunc (t *App) setupModuleManager() error {\n    mm := modules.NewManager(log.Logger)\n\
  \    \n    mm.RegisterModule(Distributor, t.initDistributor)\n    mm.RegisterModule(Querier,\
  \ t.initQuerier)\n    mm.RegisterModule(QueryFrontend, t.initQueryFrontend)\n  \
  \  mm.RegisterModule(MetricsGenerator, t.initGenerator)\n    mm.RegisterModule(BlockBuilder,\
  \ t.initBlockBuilder)\n    mm.RegisterModule(BackendScheduler, t.initBackendScheduler)\n\
  \    mm.RegisterModule(BackendWorker, t.initBackendWorker)\n    mm.RegisterModule(LiveStore,\
  \ t.initLiveStore)\n    mm.RegisterModule(SingleBinary, nil)\n    \n    deps :=\
  \ map[string][]string{\n        QueryFrontend:    {Common, Store, OverridesAPI},\n\
  \        Distributor:      {Common, LiveStoreRing, MetricsGeneratorRing, PartitionRing},\n\
  \        Querier:          {Common, Store, LiveStoreRing, PartitionRing},\n    \
  \    SingleBinary:     {BackendScheduler, BackendWorker, QueryFrontend, Querier,\
  \ Distributor, MetricsGenerator, BlockBuilder, LiveStore},\n    }\n    // ...\n\
  }\n```\n\nEach module has explicit initialization functions (`initDistributor`,\
  \ `initQuerier`, etc.) and declared dependencies. The `modules.Manager` from `grafana/dskit`\
  \ enforces these boundaries at startup.\n\n### Module Organization\nThe `modules/`\
  \ directory contains independently organized components:\n- `distributor/` - receives\
  \ traces, forwards to ingesters\n- `querier/` - handles trace queries\n- `frontend/`\
  \ - query frontend with sharding/caching\n- `generator/` - metrics generator from\
  \ spans\n- `ingester/` - builds blocks from traces\n- `storage/` - storage abstraction\
  \ layer\n- `cache/` - caching layer (memcached, redis)\n- `backendscheduler/`, `backendworker/`,\
  \ `blockbuilder/`, `livestore/` - backend processing\n\n### Deployment Flexibility\n\
  Docker Compose examples demonstrate both modes:\n- **Single-binary**: `command:\
  \ \"-target=all -config.file=/etc/tempo.yaml\"` (`example/docker-compose/single-binary/docker-compose.yaml`)\n\
  - **Distributed**: Separate containers per target (`example/docker-compose/distributed/docker-compose.yaml`)\n\
  \n### Ring-Based Coordination\nTempo uses rings for service discovery and sharding\
  \ (inherited from Cortex/Loki architecture):\n- `LiveStoreRing`, `MetricsGeneratorRing`,\
  \ `PartitionRing` for component coordination\n- Memberlist-based KV store for distributed\
  \ state\n\n**Secondary Style: Event-Driven**\n\nTempo optionally supports Kafka\
  \ for the ingest pipeline:\n- `pkg/ingest/config.go` defines `KafkaConfig` for trace\
  \ ingestion\n- `modules/generator/generator.go` consumes from Kafka (`kgo.Record`)\n\
  - Example configurations include Redpanda (Kafka-compatible) for ingestion\n\nHowever,\
  \ this is an optional feature rather than the core architectural pattern—the primary\
  \ communication path is synchronous gRPC between modules.\n\n---\n\n**What was rejected:**\n\
  \n- **Microservices**: Not applicable because there's a single binary/repository,\
  \ no independent deployment lifecycle per service, and modules can run in-process.\n\
  \  \n- **Layered Architecture**: Not applicable because the organization is vertical\
  \ by functional capability (distributor, querier, ingester) rather than horizontal\
  \ layers (presentation, business, data).\n\n- **Service-Based**: While Tempo can\
  \ run as distributed services, the coarse-grained service definition (2-5 services\
  \ sharing a database) doesn't match Tempo's fine-grained, ring-sharded component\
  \ model.\n\n- **Hexagonal Architecture**: While there are interfaces (e.g., `backend.Reader`,\
  \ `backend.Writer`), the pattern isn't applied comprehensively—the module system\
  \ is the dominant organizational pattern."
