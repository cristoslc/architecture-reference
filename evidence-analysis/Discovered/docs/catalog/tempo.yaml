review_notes: 'Grafana Tempo is a sophisticated example of a **Microservices** architecture
  that simultaneously supports a **Modular Monolith** deployment mode. This pattern,
  common in the Grafana Labs ecosystem (derived from Cortex/Loki design), uses a single
  codebase to define distinct functional components that can either be compiled/run
  as a single process or scaled independently as distributed services.


  ### Evidence of Microservices

  The core architecture is defined by independent functional units that own specific
  parts of the tracing lifecycle. The `docker-compose.yaml` in the `distributed` example
  provides definitive proof of a microservice deployment:

  - **Independent Scaling:** Multiple services use the same image but different `-target`
  flags (e.g., `distributor`, `querier`, `query-frontend`, `live-store`, `block-builder`).

  - **Network Boundaries:** Services communicate over gRPC/HTTP, as seen in `cmd/tempo/app/modules.go`
  where `Querier` requires a `frontend-worker` address to connect to.

  - **Service Discovery/State:** The use of a "Ring" (via Hashicorp Memberlist/Consul/Etcd)
  in `pkg/ring` and `cmd/tempo/app/memberlist.go` allows these independent services
  to discover each other and coordinate data ownership.


