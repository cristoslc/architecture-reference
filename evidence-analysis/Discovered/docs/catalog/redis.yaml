one_line_summary: "A high-performance in-memory data structure server built as a modular monolith around a single-threaded non-blocking event loop, with event-driven async I/O and a formal microkernel-style module extension system."
classification_reasoning: "Redis exhibits a three-style composition: Modular Monolith as primary, Event-Driven and Microkernel as secondary.\n\nMODULAR MONOLITH (primary, 0.92): The entire server compiles and deploys as a single process (redis-server). A global struct redisServer (server.h:1917, instantiated in server.c:84) holds all server state. ~120 C source files organize functional concerns as cleanly-bounded modules without process or network boundaries: networking (networking.c, connection.c, tls.c), data types (t_string.c, t_hash.c, t_list.c, t_set.c, t_zset.c, t_stream.c), persistence (rdb.c, aof.c), replication (replication.c), clustering (cluster.c, cluster_asm.c, cluster_legacy.c), pub/sub (pubsub.c), scripting (eval.c, functions.c), security (acl.c), eviction/expiry (evict.c, expire.c), background I/O (bio.c), observability (slowlog.c, tracking.c, latency.c), and the module runtime (module.c). All modules share server.h as a central type manifest and communicate via in-process function calls.\n\nEVENT-DRIVEN (secondary, 0.85): The runtime is structured around a purpose-built async event loop (ae.c) that abstracts epoll, kqueue, evport, and select. The aeMain() loop drives the entire server; aeFileEvent and aeTimeEvent structures register callbacks for I/O readiness and timer expiry respectively. serverCron() fires as a periodic time event (server.c:1483) coordinating expiry, eviction, replication heartbeats, and stats. beforeSleep()/afterSleep() hooks handle client writes, AOF flushing, keyspace notifications, and lazy expiry around each poll cycle. Background worker threads (bio.c: bio_close_file, bio_aof, bio_lazy_free) communicate back to the event loop via a pipe-based completion notifier (eventnotifier.h). Optional IO threads (iothread.c, up to 128 via io-threads config) offload client buffer read/write while the main thread retains exclusive command execution. Keyspace notifications fire named events dispatched through pubsub channels and module hooks.\n\nMICROKERNEL (secondary, 0.75): A formal, versioned extension system is provided via redismodule.h (REDISMODULE_APIVER_1) and module.c (~15,559 lines, the largest file). Modules load as shared libraries via dlopen, initialize through a RedisModule_OnLoad() entry point, and register new commands, data types (RedisModule_CreateDataType with RDB/AOF/free/copy callbacks), keyspace event subscriptions (RM_SubscribeToKeyspaceEvents), and server lifecycle hooks. The modules/ directory contains production extensions (redisbloom, redisearch, redisjson, redistimeseries, vector-sets) maintained outside the core and loaded at runtime. Cross-module API sharing is supported via the sharedapi dict. This constitutes genuine runtime extensibility of a stable core.\n\nRULED OUT - Microservices: Single compiled process with unified address space, no inter-service network boundaries, no separate data stores per service. Sentinel and Cluster are operating modes of the same binary, not separate services.\n\nRULED OUT - Layered: Source organization is by functional concern rather than by abstraction layer. Networking, storage, and business logic modules access each other directly through shared types in server.h.\n\nRULED OUT - CQRS: Read and write paths operate on the same in-memory data structures with no read-model/write-model separation.\n\nRULED OUT - Event-Driven as primary: The event loop is the concurrency mechanism, not the dominant organizational pattern. Module interaction and persistence are tightly coupled point-to-point, not through a decoupled event bus."
