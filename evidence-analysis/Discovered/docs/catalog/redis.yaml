review_notes: 'README describes in-memory key-value store with 16384-slot hash partitioning
  (cluster.h CLUSTER_SLOTS), pub/sub messaging (pubsub.c), streams (t_stream.c), and
  event-driven networking (ae.c/ae.h custom event loop with epoll/kqueue/select backends).
  MANIFESTO point 2: Memory storage is #1. Point 7: shared-nothing approach with single-threaded
  cores composed via Redis Cluster. Data partitioned across nodes by consistent hashing
  of key slots. server.h shows ae.h event loop as core architectural primitive. modules/
  directory contains extensible data-type plugins (redisearch, redisjson, redistimeseries,
  vector-sets).'
