classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Style: Modular Monolith\n\nOpenTripPlanner exhibits clear characteristics of a\
  \ **Modular Monolith** architecture with strongly enforced internal module boundaries:\n\
  \n**1. Single Deployable Unit with Enforced Module Boundaries**\n- The project produces\
  \ a single unified JAR (`otp-shaded/target/otp-shaded-VERSION.jar`) as documented\
  \ in `README.md` lines 51-55\n- Uses Maven multi-module structure with explicit\
  \ modules: `utils`, `domain-core`, `raptor`, `astar`, `street`, `gtfs-realtime-protobuf`,\
  \ `application` (pom.xml lines 97-107)\n- Architecture tests using ArchUnit enforce\
  \ package dependencies (see `TimetableRepositoryArchitectureTest.java` and `RaptorArchitectureTest.java`)\n\
  \n**2. Strict Module Isolation**\n- The Raptor module explicitly documents: *\"\
  there are no dependencies from Raptor to other parts of OTP code, only to utility\
  \ classes not found in the JDK\"* (`raptor/pom.xml` lines 35-37, `ARCHITECTURE.md`\
  \ lines 66-69)\n- Each module has controlled dependencies declared in pom.xml (e.g.,\
  \ `raptor` only depends on `utils`, `street` depends on `domain-core` and `astar`)\n\
  - Development Decision Records explicitly state: *\"Keep modules clean. Consider\
  \ adding an `api`, `spi` and mapping code to isolate the module from the rest of\
  \ the code. Avoid circular dependencies between modules.\"* (DEVELOPMENT_DECISION_RECORDS.md\
  \ lines 76-79)\n\n**3. Dependency Enforcement via Architecture Tests**\nThe architecture\
  \ tests enforce allowed dependencies between packages:\n```java\n// From RaptorArchitectureTest.java\
  \ - explicit dependency boundaries\nRAPTOR_SPI.dependsOn(OTP_UTILS, API_MODEL, API_PATH).verify();\n\
  ```\n\n**4. Module Wiring via Dependency Injection**\n- Uses Dagger for component\
  \ wiring with explicit module classes (`*Module.java` files)\n- Module wiring follows\
  \ documented pattern: `\"Put the wiring code in <module-name>/configure/<Module-name>Module.java\"\
  ` (DEVELOPMENT_DECISION_RECORDS.md lines 67-68)\n- Clear service/repository interfaces\
  \ with implementations in `internal` packages (see `service/` directory structure\
  \ in `application/src/main/java/org/opentripplanner/service/`)\n\n### Secondary\
  \ Style: Layered Architecture\n\nThe codebase exhibits layered architecture patterns\
  \ within and across modules:\n\n**Layer Organization (from ARCHITECTURE.md lines\
  \ 21-36):**\n- **Use Case Services**: Stateless services combining multiple domain\
  \ services (e.g., `RoutingService`, `TransitService`)\n- **Domain Services**: Business\
  \ logic for specific domains (transit, vehicle position, etc.)\n- **Domain Models**:\
  \ Encapsulate business areas with separate Service and Repository\n- **Repositories**:\
  \ Maintain domain models, used by updaters\n\n**Service Package Structure (from\
  \ service/package.md):**\n```\no.o.service.<name>\n  configure/          -- Dependency\
  \ Injection configuration\n  internal/           -- Internal implementation\n  model/\
  \              -- Public model/api\n  <Name>Service       -- Interface for read-only\
  \ service\n  <Name>Repository    -- Interface for updating the model\n```\n\n**API\
  \ Layer:**\n- GraphQL APIs in `application/src/main/java/org/opentripplanner/apis/`\n\
  - Configuration layer in `standalone/config/` that injects POJOs into components\n\
  \n### Evidence Against Other Styles\n\n- **Not Microservices**: Single deployable\
  \ JAR, no service boundaries for independent deployment\n- **Not Serverless**: No\
  \ function-based deployment units, runs as standalone server\n- **Not CQRS**: No\
  \ separate read/write models documented (though real-time data handling exists)\n\
  - **Not Microkernel/Plugin**: No runtime plugin loading; modules are compile-time\
  \ defined\n- **Not Event-Driven (primary)**: While real-time updaters exist (`updater/`\
  \ package), the core architecture is synchronous request-response via GraphQL\n\
  - **Not Hexagonal**: No explicit ports/adapters pattern; uses direct service injection\
  \ rather than port interfaces\n\n### Conclusion\n\nOpenTripPlanner is a mature,\
  \ well-structured **Modular Monolith** that has evolved over 15+ years. The architecture\
  \ emphasizes:\n\n1. **Strong module encapsulation** enforced by both build system\
  \ (Maven dependencies) and architecture tests (ArchUnit)\n2. **Clear layered structure**\
  \ within modules following Use Case → Domain Service → Repository patterns\n3. **Explicit\
  \ dependency injection** via Dagger modules with documented wiring conventions\n\
  4. **Domain-driven design concepts** (aggregates, entities, value objects) applied\
  \ within modules\n\nThe isolated Raptor routing engine module demonstrates particularly\
  \ strong boundary enforcement, with zero dependencies on the rest of OTP beyond\
  \ utility classes."
