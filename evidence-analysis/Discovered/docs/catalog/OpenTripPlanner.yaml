review_notes: "The OpenTripPlanner (OTP) architecture is a classic example of a **Modular\
  \ Monolith** that is progressively evolving from a traditional **Layered** structure\
  \ toward a more rigorous **Domain-Driven Design (DDD)** approach.\n\n### 1. Modular\
  \ Monolith (Primary Style)\nWhile the end product is a \"unified shaded JAR\" (as\
  \ noted in the README), the codebase is strictly partitioned into high-level Maven\
  \ modules that enforce boundary isolation. \n- **Component Isolation:** The `ARCHITECTURE.md`\
  \ explicitly highlights the `raptor` module as a decoupled component with \"as few\
  \ dependencies as possible\" and \"no dependencies from Raptor to other parts of\
  \ OTP code.\" This demonstrates a move away from a \"Big Ball of Mud\" toward enforced\
  \ module boundaries.\n- **Service Segregation:** Key algorithmic and domain concerns\
  \ are separated into sibling modules like `raptor`, `astar`, `street`, and `domain-core`.\
  \ The `application` module acts as the orchestrator that brings these together.\n\
  \n### 2. Layered & DDD (Secondary Styles)\nThe internal structure within these modules,\
  \ particularly within `application` and the documented design goals, follows a horizontal\
  \ layering strategy influenced by DDD:\n- **Use Case Services vs. Domain Services:**\
  \ `ARCHITECTURE.md` defines a clear hierarchy: `Use Case Services` (stateless orchestrators)\
  \ and `Domain Models` (encapsulated business logic). It mentions that complex domains\
  \ (like `transit`) use a separate `Service` and `Repository` layer."
