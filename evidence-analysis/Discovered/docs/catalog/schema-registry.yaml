review_notes: 'The Confluent Schema Registry is structured as a **Microkernel (Plugin)**
  architecture built within a **Modular Monolith** containing a specialized **Event-Driven**
  storage engine.


  ### 1. Primary Style: Microkernel (Plugin)

  The system''s core capability (storing and validating schemas) is designed to be
  extensible through a plugin architecture. Although the specific `SchemaProvider.java`
  file was not found under `core/src/main/java`, the `SchemaRegistryConfig.java` defines
  a `SCHEMA_PROVIDERS_CONFIG` constant and the `pom.xml` reveals a highly modular
  structure where support for different schema formats (Avro, Protobuf, JSON Schema)
  is implemented in separate modules:

  - `protobuf-provider`, `json-schema-provider`, `avro-data`

  - `protobuf-serializer`, `json-schema-serializer`, `avro-serializer`

  - `client-encryption-aws`, `client-encryption-azure`, `client-encryption-hcvault`


  The system loads these "providers" at runtime to extend the registry''s support
  to new schema types and encryption backends without modifying the `core` server
  logic.'
