classification_reasoning: "## Architecture Classification Analysis\n\n### Primary Style: Domain-Driven Design (DDD)\n\nThis\
  \ repository is explicitly designed as a DDD example project, with clear architectural evidence throughout:\n\n**Bounded\
  \ Contexts:**\nThe codebase is organized into three distinct bounded contexts, each as a separate Go module:\n- `internal/trainer/`\
  \ - Trainer availability management\n- `internal/trainings/` - Training session management  \n- `internal/users/` - User\
  \ balance management\n\nEach context has its own `go.mod` file and domain model.\n\n**Domain Layer Structure:**\nEach bounded\
  \ context follows the same DDD-aligned structure:\n- `domain/` - Contains entities, value objects, and repository interfaces\n\
  - `app/` - Application layer with use cases\n- `adapters/` - Infrastructure adapters implementing domain interfaces\n- `ports/`\
  \ - Incoming interface adapters (HTTP/gRPC handlers)\n\n**Rich Domain Model Evidence:**\n\nFrom `internal/trainer/domain/hour/hour.go`:\n\
  - Private encapsulated fields with public getters (`hour time.Time`, `availability Availability`)\n- Factory pattern for\
  \ entity creation with validation (`NewFactory()`, `FactoryConfig`)\n- Domain invariants enforced in business logic\n- Domain-specific\
  \ error types (`TooDistantDateError`, `TooEarlyHourError`)\n\nFrom `internal/trainer/domain/hour/availability.go`:\n- Type-safe\
  \ value object enum pattern (`Availability` struct instead of string)\n- Domain behavior methods (`ScheduleTraining()`,\
  \ `CancelTraining()`, `MakeAvailable()`)\n\nFrom `internal/trainer/domain/hour/repository.go`:\n- Repository interface defined\
  \ in domain layer (dependency inversion)\n\n**README Explicit Documentation:**\n> \"Wild Workouts is an **example Go DDD**\
  \ project... apply DDD by refactoring\"\n> \n> Article titles: \"When microservices in Go are not enough: introduction to\
  \ DDD Lite\", \"Combining DDD, CQRS, and Clean Architecture\"\n\n### Secondary Style: CQRS\n\nClear Command Query Responsibility\
  \ Segregation within each bounded context:\n\n**Structure Evidence:**\n```\ninternal/trainer/app/\n├── command/\n│   ├──\
  \ cancel_training.go\n│   ├── schedule_training.go\n│   └── make_hours_available.go\n└── query/\n    ├── available_hours.go\n\
  \    └── hour_availability.go\n```\n\n**Application Layer Design (`internal/trainer/app/app.go`):**\n```go\ntype Application\
  \ struct {\n    Commands Commands\n    Queries  Queries\n}\n\ntype Commands struct {\n    CancelTraining   command.CancelTrainingHandler\n\
  \    ScheduleTraining command.ScheduleTrainingHandler\n    // ...\n}\n\ntype Queries struct {\n    HourAvailability    \
  \  query.HourAvailabilityHandler\n    TrainerAvailableHours query.AvailableHoursHandler\n}\n```\n\n**Separate Handler Types:**\n\
  - Command handlers: `decorator.CommandHandler[ScheduleTraining]`\n- Query handlers: `decorator.QueryHandler[AvailableHours,\
  \ []Date]`\n- Read models for queries: `AvailableHoursReadModel` interface\n\nREADME article 10 explicitly documents this:\
  \ \"Introducing basic CQRS by refactoring\"\n\n### Secondary Style: Microservices\n\n**Independent Deployment Units:**\n\
  - Three services deployed independently on Google Cloud Run (from `terraform/cloud-run.tf`):\n  - `trainer-http` / `trainer-grpc`\n\
  \  - `trainings-http`\n  - `users-http` / `users-grpc`\n\n**Separate Go Modules:**\nGo workspace (`go.work`) defines separate\
  \ modules for each service:\n```go\nuse (\n    ./internal/common\n    ./internal/trainer\n    ./internal/trainings\n   \
  \ ./internal/users\n)\n```\n\n**Inter-Service Communication:**\n- Synchronous gRPC calls between services\n- Protobuf definitions\
  \ in `api/protobuf/`\n- Services call each other: `trainings` service calls `trainer` and `users` gPC endpoints (from `internal/trainings/adapters/trainer_grpc.go`\
  \ and `users_grpc.go`)\n\n### What Was Rejected\n\n**Not Hexagonal Architecture:** While there's a `ports/` directory and\
  \ clear separation of concerns, the pattern is DDD first. The directory naming (ports, adapters) is influenced by hexagonal\
  \ concepts, but the primary organizational principle is bounded contexts and domain models. This is \"DDD Lite\" as the\
  \ authors describe it.\n\n**Not Event-Driven:** Services communicate via synchronous gRPC calls, not through events or message\
  \ brokers. No message queue configuration, event handlers, or async event processing was found.\n\n**Not Pure Layered:**\
  \ There's no horizontal layering across the entire application (presentation → business → data). Instead, each bounded context\
  \ has its own internal vertical architecture.\n\n**Not Serverless (Primary):** While deployed to Cloud Run (serverless platform),\
  \ the architecture is defined by DDD bounded contexts and microservices patterns. Serverless is the deployment model, not\
  \ the architectural style.\n\n### Summary\n\nThis repository demonstrates a well-structured DDD implementation with CQRS\
  \ patterns applied within bounded contexts, deployed as independent microservices. The README and article series explicitly\
  \ document the intentional evolution from \"too modern\" serverless to DDD-organized architecture, making this an exemplary\
  \ reference for these architectural styles combined."
