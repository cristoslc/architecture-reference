review_notes: |-
  This repository is an exemplar of a **Microservices** architecture, explicitly designed to demonstrate **Domain-Driven Design (DDD)**, **CQRS**, and **Clean/Hexagonal Architecture** within a Go ecosystem.

  ### 1. Microservices (Primary Style)
  The codebase is structured into multiple independent services located under the `internal/` directory: `trainings`, `users`, and `trainer`.
  - **Independent Deployment:** The presence of `terraform/service` and `docker/app` strategies implies these are deployed as separate Cloud Run services. Each service has its own `main.go` and `go.mod` (using Go Workspaces/`go.work` for local development).
  - **Communication:** Services interact via gRPC, as evidenced by `api/protobuf/` containing `users.proto` and `trainer.proto`, and the corresponding adapters in `internal/trainings/adapters/users_grpc.go`.
  - **Data Ownership:** Although the directory tree suggests a shared terraform state for Firestore, the README and project intent describe independent services that would typically manage their own persistence context.

  ### 2. Domain-Driven Design (DDD) & Hexagonal Architecture
  The project explicitly organizes code around Bounded Contexts:
