classification_reasoning: >-
  The repository is unambiguously Microservices. Three bounded contexts
  (trainer, trainings, users) each have their own go.mod, their own main.go,
  and are deployed as separate Cloud Run services (five services in
  terraform/cloud-run.tf). Inter-service communication is exclusively
  synchronous gRPC over Protobuf contracts defined in api/protobuf/. There are
  no shared databases — each service owns its own Firestore collections. A
  shared internal/common library provides only cross-cutting infrastructure
  (auth, logging, metrics, decorator framework) with no business logic.

  DDD, hexagonal architecture, and CQRS are all present and prominent, but per
  ADR-006 these are design approaches / data patterns, not architectural styles.
  DDD is evidenced by private-field entities (internal/trainer/domain/hour/),
  type-safe value objects, factory-enforced invariants, and repository
  interfaces defined inside the domain layer. Hexagonal is evidenced by the
  consistent ports/ (inbound HTTP + gRPC adapters) and adapters/ (outbound
  Firestore + gRPC clients) structure across trainer and trainings services.
  CQRS is evidenced by the Application struct splitting Commands and Queries,
  the generic CommandHandler[C] / QueryHandler[Q,R] interfaces in
  internal/common/decorator, and separate app/command/ and app/query/
  subdirectories in each service.

  Confidence is 0.95. The Microservices classification is strongly supported by
  independent modules, independent Cloud Run deployments, and gRPC-only
  cross-service communication. The 0.05 uncertainty reflects that this is a
  pedagogical project — the users service lacks DDD internal structure, and the
  project is explicitly designed as a teaching tool rather than a production
  system with emergent architecture.
quality_attributes:
  testability: >-
    In-memory repository implementations enable unit tests without
    infrastructure; shared repository test suites run against all
    implementations (Firestore, MySQL, in-memory); command handler unit tests
    are isolated from ports and adapters.
  maintainability: >-
    Strict layer isolation — domain has zero infrastructure imports; application
    layer depends only on domain interfaces; ports and adapters depend on
    application interfaces. Persistence technology is swappable within a single
    adapter file.
  deployability: >-
    Each service deployed independently to Google Cloud Run; Terraform manages
    per-service image tags and environment variables; Docker Compose mirrors
    the full topology locally for development.
  evolvability: >-
    Separate Go modules prevent accidental cross-service coupling; CQRS
    separation allows read and write paths to evolve independently; repository
    interfaces in the domain layer decouple business logic from persistence
    technology.
  observability: >-
    Generic decorator framework wraps every command and query handler with
    structured logging (logrus) and metrics automatically via type introspection;
    consistent across all services via the shared common module.
  security: >-
    Firebase Auth JWT validation in internal/common/auth/; gRPC backend
    services require signed tokens (Cloud Run authentication = true); HTTP
    frontends sit behind authenticated gRPC backends.
