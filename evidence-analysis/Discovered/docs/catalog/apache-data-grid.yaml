one_line_summary: >-
  Apache Data Grid — a Space-Based in-memory compute grid where Geode
  and Ignite provide distributed caching, compute, and data co-location.
member_repos:
  - geode
  - ignite
emergent_architecture: >-
  Space-Based in-memory compute grid. Geode and Ignite are independently
  developed distributed data platforms that implement the Space-Based
  architecture pattern: processing units with co-located data and
  compute, replicated across nodes via a messaging grid, with data
  partitioned across the cluster. Geode (originally GemFire) provides
  partitioned/replicated regions, continuous queries, and WAN replication.
  Ignite provides distributed caching, SQL queries over distributed data,
  compute grid (co-locating computation with data), and service grid.
  Both implement the same fundamental pattern: data is partitioned across
  nodes, processing happens where the data lives (data affinity), and
  the cluster coordinates via membership protocols. While they don't
  directly interoperate, they represent the same architectural niche —
  Space-Based architecture for high-throughput, low-latency data
  processing — making them an ecosystem of alternative implementations
  of the same pattern.
composition_pattern: alternative implementations of space-based pattern
review_notes: >-
  The Apache Data Grid ecosystem is unusual — Geode and Ignite are
  parallel implementations rather than complementary services. However,
  they belong together because they represent the only Space-Based
  architecture entries in the catalog. Both are Modular Monolith
  internally, but their deployment model (distributed processing units
  with replicated data) is definitionally Space-Based per Richards &
  Ford. This ecosystem surfaces an underrepresented style — Space-Based
  has minimal single-repo representation because the pattern is
  inherently about distributed deployment topology.
