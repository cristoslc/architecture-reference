review_notes: "The AFFiNE repository (and its core engine `blocksuite`) is structured\
  \ primarily as a **Microkernel (Plugin)** architecture. The system is designed as\
  \ a minimalist \"operating system\" for blocks, where the core framework provides\
  \ essential services (CRDT synchronization, state management, and basic UI lifecycle)\
  \ while all specific functionalities (text, image, database, kanban, etc.) are implemented\
  \ as independent, hot-swappable plugins or \"blocks.\"\n\n### Architecture Analysis\n\
  \n**1. Microkernel (Plugin) - Primary Style**\nThe directory structure under `blocksuite/affine/blocks`\
  \ and `blocksuite/affine/widgets` demonstrates a strict plugin-based organization.\
  \ \n- **The Kernel:** Located in `blocksuite/framework/std`, it provides the `ServiceManager`,\
  \ `Extension` interfaces, and lifecycle hooks (`blocksuite/framework/std/src/extension/index.ts`).\n\
  - **Plugins:** Each block (e.g., `blocks/database`, `blocks/image`, `blocks/root`)\
  \ and fragment (e.g., `fragments/outline`) is a self-contained module that registers\
  \ its own views, models, and logic into the kernel via the `Extension` and `Service`\
  \ patterns found in the `std` framework. This allows the editor to be \"hyper-fused\"\
  \ (as the README states) by loading only the necessary extensions for a given context\
  \ (Docs vs. Whiteboard).\n\n**2. Domain-Driven Design (DDD) - Secondary Style**"
