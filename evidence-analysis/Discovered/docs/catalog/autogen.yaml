review_notes: 'Evidence: (1) Multi-Agent: Core design is explicitly agent-based with
  AssistantAgent, AgentTool, group chats, and orchestration patterns; agent_worker.proto
  and cloudevent.proto define inter-agent communication protocols; docs/design/01-03
  describe programming model, topics, and agent worker protocol. (2) Modular Monolith:
  Single monorepo with well-separated Python packages (autogen-core, autogen-agentchat,
  autogen-ext, autogenstudio, agbench, magentic-one-cli) under python/packages/, plus
  dotnet/src/ with multiple .NET packages — all deployed independently but developed
  together. (3) Event-Driven: protos/agent_worker.proto and protos/cloudevent.proto
  indicate event-based agent communication; docs/design mentions topics and event-driven
  agents; README explicitly states ''Core API implements message passing, event-driven
  agents''; the presence of cloudevent.proto (CloudEvents standard) confirms event-driven
  patterns. (4) gRPC: python/samples/core_grpc_worker_runtime and dotnet NuGet packages
  include Core.Grpc and RuntimeGateway.Grpc, supporting distributed runtime. (5) Multi-language:
  Python packages + .NET packages + Node.js MCP tooling all coexist in the monorepo.'
