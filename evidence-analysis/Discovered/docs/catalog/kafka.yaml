review_notes: "The Apache Kafka repository is structured as a **Modular Monolith**.\
  \ While it is a distributed system when deployed, the codebase itself is organized\
  \ into a single build system (Gradle) with strictly defined internal modules that\
  \ are compiled and versioned together.\n\n### Evidence of Modular Monolith\n1. \
  \ **Gradle Multi-Project Structure**: The repository uses a single root Gradle build\
  \ to manage multiple sub-projects (`core`, `clients`, `streams`, `group-coordinator`,\
  \ `storage`, etc.).\n2.  **Enforced Module Boundaries**: The directory `checkstyle/`\
  \ contains numerous `import-control-*.xml` files (e.g., `import-control-core.xml`,\
  \ `import-control-server.xml`). These files are used by the build system to strictly\
  \ enforce dependency boundaries between modules, preventing \"Big Ball of Mud\"\
  \ dependency cycles.\n3.  **Core separation**: The functionality is split into logical\
  \ units:\n    *   `clients`: The Java/c++ client logic.\n    *   `core`: The primary\
  \ broker logic (traditionally Scala).\n    *   `storage` / `server-common`: Extracted\
  \ modules to reduce the complexity of the core.\n4.  **Single Versioning**: Though\
  \ there are many modules, they are released and versioned as a single coherent unit\
  \ (Apache Kafka)."
