review_notes: "README line 12 explicitly states 'open-source distributed event streaming platform.' The entire system IS the event-driven infrastructure: topics, partitions, producers, consumers, and a commit log at its core. 198 JSON request/response message definitions in clients/src/main/resources/common/message/ define the event-based protocol. The streams module (Topology.java, KStream.java, StreamsBuilder.java) implements stream processing topologies. The connect framework (connect/) provides source/sink connector abstractions for event integration. Modular Monolith: settings.gradle defines 30+ subprojects (clients, core, server, streams, connect, raft, metadata, storage, group-coordinator, transaction-coordinator, coordinator-common, share-coordinator) that compile and deploy as a single broker process. Each module has clear domain boundaries (storage, coordination, raft consensus, stream processing) but they are not independently deployable services. docs/design/design.md describes the unified log-based architecture motivation. The raft/ module implements KRaft consensus replacing ZooKeeper. Not classifiable as Microservices despite distributed deployment: brokers run the same monolithic codebase."