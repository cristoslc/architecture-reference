classification_reasoning: "## Architecture Classification for Apache Kafka\n\n###\
  \ Primary Style: **Modular Monolith**\n\nThe Apache Kafka repository exhibits a\
  \ classic **Modular Monolith** architecture with carefully enforced module boundaries.\
  \ Key evidence:\n\n**1. Single Deployable Artifact**\n- The Dockerfile (`docker/jvm/Dockerfile`)\
  \ builds a single release tarball (`kafka.tgz`) containing all components\n- One\
  \ main entry point (`core/src/main/scala/kafka/Kafka.scala`) starts the unified\
  \ server\n\n**2. Explicit Module Structure via Gradle**\nThe `settings.gradle` defines\
  \ 40+ subprojects organized into a deliberate module hierarchy:\n```\nclients, core,\
  \ server, server-common, metadata, storage, raft,\ncoordinator-common, group-coordinator,\
  \ transaction-coordinator,\nshare-coordinator, connect:api, connect:runtime, streams,\
  \ tools...\n```\n\n**3. Enforced Dependency Direction (Layering)**\nThe repository\
  \ has **16 separate import-control XML files** in `checkstyle/` that enforce module\
  \ boundaries through static analysis. The comment at the top of each file states:\n\
  ```xml\n<!-- THINK HARD ABOUT THE LAYERING OF THE PROJECT BEFORE CHANGING THIS FILE\
  \ -->\n```\n\nKey enforcement rules include:\n- `<disallow pkg=\"kafka\" />` in\
  \ most files prevents any module from depending on the Scala core server\n- `import-control.xml`\
  \ (25,600+ bytes, the main file) defines what `org.apache.kafka.common` and `org.apache.kafka.clients`\
  \ can import\n- Separate control files for `metadata`, `server`, `server-common`,\
  \ `storage`, `group-coordinator`, `transaction-coordinator`, `coordinator-common`\
  \ enforce their specific allowed dependencies\n\n**4. Module Dependency Hierarchy**\n\
  The import controls reveal a clear layered dependency graph:\n- `common` (base utilities)\
  \ → `clients` (client libraries) → `server-common`/`metadata`/`storage` (server\
  \ infrastructure) → `core` (Scala server) and `server` (Java server)\n- Cross-cutting\
  \ modules like `raft`, `coordinator-common` have their own controlled imports\n\n\
  ---\n\n### Secondary Style: **Microkernel (Plugin)**\n\nKafka Connect implements\
  \ a **plugin architecture** within the monolith:\n\n**Plugin API (`connect/api/`)**:\
  \ Defines extension interfaces:\n- `Connector` and `Task` - base abstractions for\
  \ connectors\n- `SourceConnector`/`SinkConnector` - direction-specific interfaces\
  \  \n- `Transformation` and `Predicate` - message transformation SPIs\n- `Converter`,\
  \ `HeaderConverter` - serialization SPIs\n\n**Plugin Runtime (`connect/runtime/`)**:\
  \ Core system that loads plugins:\n- `Plugins.java` - discovers and instantiates\
  \ plugins\n- `DelegatingClassLoader.java` - custom classloader with comment: *\"\
  A custom classloader dedicated to loading Connect plugin classes in classloading\
  \ isolation\"*\n- `PluginClassLoader.java` - isolated classloader per plugin\n-\
  \ `PluginScanner.java` / `ServiceLoaderScanner.java` - plugin discovery\n\n**Built-in\
  \ Plugins (`connect/file/`, `connect/json/`, `connect/transforms/`)**: Reference\
  \ implementations showing the plugin contract in action:\n```java\n// FileStreamSourceConnector\
  \ extends SourceConnector\npublic class FileStreamSourceConnector extends SourceConnector\
  \ {\n    @Override\n    public Class<? extends Task> taskClass() {\n        return\
  \ FileStreamSourceTask.class;\n    }\n}\n```\n\n**Plugin Discovery**: Supports both\
  \ ServiceLoader-based and reflection-based plugin discovery for runtime extension.\n\
  \n---\n\n### Why Not Other Styles\n\n| Style | Reason for Rejection |\n|-------|---------------------|\n\
  | **Microservices** | Single deployable artifact; no independent service deployment\
  \ |\n| **Layered** | Layering exists within modules, but module boundaries (not\
  \ layers) are the primary organizing principle |\n| **Hexagonal** | No ports-and-adapters\
  \ pattern; dependencies flow package-to-package, not inside-out |\n| **DDD** | Modules\
  \ organized by technical function (storage, metadata, server), not business bounded\
  \ contexts |\n| **Event-Driven** | Kafka *enables* event-driven systems but its\
  \ internal codebase uses direct method calls, not event-based internal communication\
  \ |\n| **Service-Based** | No shared database with 2-5 coarse services; this is\
  \ a single application |\n\n---\n\n### Summary\n\nApache Kafka demonstrates a sophisticated\
  \ **Modular Monolith** architecture where:\n1. The build system (Gradle) defines\
  \ explicit module boundaries\n2. Static analysis (checkstyle import-control) enforces\
  \ dependency direction at compile time\n3. A gradual migration from Scala (`core`)\
  \ to Java modules (`server`, `metadata`, `storage`, etc.) is in progress\n\nThe\
  \ Kafka Connect subsystem adds a **Microkernel/Plugin** architecture for runtime\
  \ extensibility, with isolated classloading allowing third-party connectors to be\
  \ loaded without modifying the core system."
