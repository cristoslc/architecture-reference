review_notes: 'The repository is a reference implementation of a **Microservices**
  architecture using .NET 6, Dapr, and Tye. It is organized as a monorepo containing
  multiple independently deployable services, a shared infrastructure layer, and a
  central API gateway.


  ### Evidence of Microservices

  - **Independent Services:** The `samples/` directory contains distinct service boundaries:
  `ProductService`, `CustomerService`, and `SettingService`. Each has its own `.Api`
  project, `Dockerfile`, and separate database context (e.g., `MainDbContext.cs` inside
  each service''s Infrastructure).

  - **Deployment Orchestration:** The presence of `samples/tye.yaml` and `docker-compose.yml`
  indicates a multi-service deployment strategy. Tye is specifically used to manage
  multiple .NET services and their dependencies (like Dapr sidecars).

  - **API Gateway:** The `samples/AppGateway` project uses **YARP** (Yet Another Reverse
  Proxy) to route traffic to downstream services, a classic microservices pattern.

  - **Inter-service Communication:** The use of **Dapr** (Distributed Application
  Runtime) for Pub/Sub (`DaprEventBus.cs`) and service invocation demonstrates decoupled,
  network-based communication between components.


  ### Evidence of Secondary Styles

  - **CQRS:** The code explicitly separates read and write concerns. Directory structures
  in `AppCore` contain `UseCases/Commands` and `UseCases/Queries`. It utilizes **MediatR**
  to dispatch these, as seen in `N8T.Core/Domain/Cqrs.cs`.'
