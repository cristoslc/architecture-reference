review_notes: 'Evidence: (1) Microservices — separate service directories under samples/
  (Product, Customer, Setting, AppGateway, IdentityServer, WebBlazor) each with Dockerfile
  and independent .csproj files; YARP API Gateway at samples/AppGateway; tye.yaml
  orchestration; (2) DDD — N8T.Core/Domain/ with Entities.cs, Events.cs; domain aggregates
  in ProductService.AppCore/Core/ (Product.cs, ProductCode.cs); Specification pattern
  (ISpecification.cs, SpecificationBase.cs); Repository pattern (IRepository.cs);
  (3) CQRS — explicit Commands/ and Queries/ directories in each service''s AppCore/UseCases/
  (e.g. ProductService.AppCore/UseCases/Commands/CreateProduct.cs, /Queries/GetProductById.cs);
  MediatR in tech stack; N8T.Core/Domain/Cqrs.cs; (4) Hexagonal Architecture — each
  service split into three projects: *.Api (adapters-in), *.AppCore (application core
  with use cases), *.Infrastructure (adapters-out with EF Core data layer); Bus/IEventBus.cs
  port with Dapr adapter in N8T.Infrastructure/Bus/Dapr/; (5) Dapr pubsub.yaml and
  CoolStore.IntegrationEvents signal event-driven messaging between services; transactional
  outbox pattern in N8T.Infrastructure/TransactionalOutbox/'
