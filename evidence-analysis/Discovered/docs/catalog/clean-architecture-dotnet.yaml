  \ cross-cutting concerns like logging, validation, and the outbox pattern.\n2. \
  \ **Service Layers:**\n    *   **Api:** Entry point, Controllers, and Dapr integration\
  \ event handlers.\n    *   **AppCore:** Pure business logic, Domain entities, and\
