review_notes: "Evidence: README.md explicitly describes 'Minimal DDD, CQRS, and Clean Architecture' (line 35). src/N8T.Core/Domain/ provides DDD building blocks: EntityRootBase with AggregateRoot marker (Entities.cs), DomainEvents (Events.cs), IRepository (Repository/IRepository.cs), and Specification pattern (Specification/). CQRS is formalized via ICommand<T>/IQuery<T> interfaces in Cqrs.cs, with separate UseCases/Commands/ and UseCases/Queries/ directories per service. docker-compose.yml defines 4 independently deployed services (productapp, customerapp, settingapp, webapigatewayapp) each with its own Dapr sidecar, API gateway via YARP, and shared PostgreSQL. tye.yaml confirms the same multi-service topology. Event-driven: IEventBus interface in src/N8T.Infrastructure/Bus/, Dapr pub/sub (components/pubsub.yaml using Redis), TransactionalOutbox pattern in src/N8T.Infrastructure/TransactionalOutbox/, and IntegrationEvents contracts in samples/DataContracts/CoolStore.IntegrationEvents/. Each service follows Clean Architecture layers: Api (presentation), AppCore (domain+use-cases), Infrastructure (persistence)."