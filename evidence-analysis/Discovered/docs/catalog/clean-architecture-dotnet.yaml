classification_reasoning: "## Architecture Classification Analysis\n\n### Primary:\
  \ Hexagonal Architecture (Ports and Adapters)\n\nThe repository exhibits a textbook\
  \ implementation of Hexagonal/Clean Architecture with clear separation between application\
  \ core and infrastructure adapters.\n\n**Evidence:**\n\n1. **Tripartite project\
  \ structure per service** - Every domain service follows the pattern:\n   - `ProductService.Api`\
  \ - API layer (controllers, integration handlers)\n   - `ProductService.AppCore`\
  \ - Application core (domain entities, use cases)\n   - `ProductService.Infrastructure`\
  \ - Infrastructure adapters (data access, repositories)\n\n   Same pattern for Customer\
  \ and Setting services.\n\n2. **Dependency inversion** - The core defines interfaces\
  \ (ports) and infrastructure provides implementations (adapters):\n   - `IRepository<TEntity>`\
  \ interface in `src/N8T.Core/Repository/IRepository.cs` defines the port\n   - `RepositoryBase<TDbContext,\
  \ TEntity>` in `src/N8T.Infrastructure.EfCore/Repository.cs` implements the adapter\n\
  \   - `IEventBus` interface in `src/N8T.Infrastructure/Bus/IEventBus.cs` defines\
  \ the messaging port\n   - `DaprEventBus` in `src/N8T.Infrastructure/Bus/Dapr/Internal/DaprEventBus.cs`\
  \ provides the Dapr adapter\n\n3. **Application core isolation** - Domain entities\
  \ (`Product.cs`, `Customer.cs`) in `AppCore/Core/` have no infrastructure dependencies.\
  \ Use cases in `AppCore/UseCases/` only depend on repository interfaces, not implementations.\n\
  \n### Secondary: Domain-Driven Design\n\n**Evidence:**\n\n1. **Aggregate roots with\
  \ domain events** - Entities extend `EntityRootBase` implementing `IAggregateRoot`:\n\
  \   ```csharp\n   public class Product : EntityRootBase { ... }\n   public class\
  \ Customer : EntityRootBase { ... }\n   ```\n\n2. **Rich domain behavior** - Factory\
  \ methods on entities encapsulate creation logic:\n   ```csharp\n   public static\
  \ Product Create(string name, int quantity, decimal cost, ProductCode productCode)\n\
  \   {\n       Product product = new() { ... };\n       product.AddDomainEvent(new\
  \ ProductCreatedIntegrationEvent { ... });\n       return product;\n   }\n   ```\n\
  \n3. **Specification pattern** - Domain specifications for queries:\n   - `ProductByIdQuerySpec`,\
  \ `CustomerAlreadyRegisteredSpec` in respective `Core/Specs/` folders\n\n4. **Bounded\
  \ contexts** - Separate services (Product, Customer, Setting) with owned databases\
  \ and integration events for cross-context communication.\n\n### Secondary: CQRS\
  \ (Command Query Responsibility Segregation)\n\n**Evidence:**\n\n1. **Command/Query\
  \ interfaces** in `src/N8T.Core/Domain/Cqrs.cs`:\n   ```csharp\n   public interface\
  \ ICommand<T> : IRequest<ResultModel<T>>\n   public interface IQuery<T> : IRequest<ResultModel<T>>\n\
  \   public interface ICreateCommand<TRequest, TResponse> : ICommand<TResponse>,\
  \ ITxRequest\n   public interface IListQuery<TResponse> : IQuery<TResponse>\n  \
  \ ```\n\n2. **Separated use case handlers** - `UseCases/Commands/` and `UseCases/Queries/`\
  \ folders in each AppCore project:\n   - Commands: `CreateProduct.cs`, `CreateCustomer.cs`\n\
  \   - Queries: `GetProductById.cs`, `GetProducts.cs`\n\n3. **MediatR dispatch**\
  \ - Commands and queries flow through MediatR pipeline with behaviors for transactions,\
  \ validation, and logging.\n\n### Secondary: Microservices\n\n**Evidence:**\n\n\
  1. **Multiple independently deployable services** in `docker-compose.yml`:\n   -\
  \ `productapp` (port 5003)\n   - `customerapp` (port 5004)  \n   - `settingapp`\
  \ (port 5005)\n   - `webapigatewayapp` (YARP API Gateway on port 5000)\n   - `IdentityServer`\
  \ (authentication)\n\n2. **Database per service** - Each service has its own `MainDbContext`:\n\
  \   - `ProductService.Infrastructure/Data/MainDbContext.cs`\n   - `CustomerService.Infrastructure/Data/MainDbContext.cs`\n\
  \n3. **Dapr sidecars** - Each service paired with Dapr for service invocation and\
  \ pub/sub messaging.\n\n4. **Integration events for inter-service communication**:\n\
  \   - `ProductCreatedIntegrationEvent` in `CoolStore.IntegrationEvents`\n   - `CustomerCreatedIntegrationEvent`\
  \ subscribed by ProductService in `IntegrationEventHandler.cs`\n\n### What Was Rejected\n\
  \n- **Layered Architecture**: While layered, the architecture goes far beyond simple\
  \ horizontal layers—it implements ports and adapters with dependency inversion pointing\
  \ toward the domain core.\n\n- **Modular Monolith**: Clearly not a monolith; services\
  \ are separate deployables with independent databases.\n\n- **Serverless**: No function-as-a-service\
  \ components; these are containerized services.\n\n- **Space-Based Architecture**:\
  \ No in-memory data grids or distributed caching patterns.\n\n- **Pipeline/Pipe-and-Filter**:\
  \ No sequential processing stages.\n\n- **Microkernel/Plugin**: No plugin infrastructure\
