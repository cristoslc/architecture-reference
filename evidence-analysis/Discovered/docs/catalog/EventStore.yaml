classification_reasoning: |
  ## Analysis

  KurrentDB (formerly EventStoreDB) is architected as a **Microkernel** system with **Layered** organization within its core engine. This is a single-binary, single-deployment-unit database server — not a distributed microservices system.

  ### Primary Style: Microkernel

  The microkernel evidence is definitive and pervasive throughout the codebase.

  **1. Formal Plugin Contracts (KurrentDB.Plugins)**

  The `src/KurrentDB.Plugins/` project establishes the kernel's extension API:
  - `IPlugableComponent` — base interface with `ConfigureServices(IServiceCollection, IConfiguration)` and `ConfigureApplication(IApplicationBuilder, IConfiguration)` lifecycle methods
  - `Plugin` abstract class — wraps `IPlugableComponent` with versioning, licensing entitlement checks, and `DiagnosticListener` telemetry
  - `ISubsystemsPlugin` / `ISubsystem` — for plugins that manage subsystem start/stop lifecycle
  - `IAuthenticationPlugin`, `IAuthorizationPlugin` — authentication and authorization extension points
  - `IChunkTransform`, `IMD5Plugin`, `IPersistentSubscriptionConsumerStrategyPlugin` — fine-grained kernel extension hooks

  **2. Dual Plugin Discovery Mechanisms**

  From `src/KurrentDB/ClusterVNodeHostedService.cs` lines 67-69:
  ```csharp
  // two plugin mechanisms; pluginLoader is the new one
  var pluginLoader = new PluginLoader(new DirectoryInfo(Locations.PluginsDirectory));
  var plugInContainer = FindPlugins();
  ```

  The system supports:
  - **MEF-based discovery** (`CompositionContainer` with `AggregateCatalog` + `DirectoryCatalog`) — legacy mechanism using `[Export]` attributes
  - **Custom dynamic loading** (`PluginLoader` with `AssemblyLoadContext`) — modern mechanism with per-plugin assembly isolation

  **3. Extensive Built-in Plugin Ecosystem**

  `LoadSubsystemsPlugins` (lines 282-304) registers 10+ plugins at startup:
  - `OtlpExporterPlugin` — OpenTelemetry log/metric export (license-gated)
  - `UserCertificatesPlugin` — certificate-based authentication
  - `LogsEndpointPlugin` — structured log streaming
  - `EncryptionAtRestPlugin` — chunk-level encryption (license-gated)
  - `ConnectedSubsystemsPlugin` — POC connected subsystems
  - `AutoScavengePlugin` — automatic disk space reclamation
  - `TcpApiPlugin` — legacy TCP protocol (license-gated)
  - `ConnectorsPlugin` — catch-up subscription sinks (HTTP, Kafka, MongoDB, RabbitMQ, Elasticsearch)
  - `SchemaRegistryPlugin` — event schema validation
  - `ApiV2Plugin` — next-generation gRPC API

  Authentication plugins loaded dynamically: `LdapsAuthenticationPlugin`, `OAuthAuthenticationPlugin`, plus any external DLLs in `plugins/`

  **4. Plugin Assembly Isolation**

  From `src/KurrentDB.PluginHosting/PluginLoader.cs` lines 49-56:
  ```csharp
  private class PluginLoadContext : AssemblyLoadContext {
      private static readonly string[] Shared = { "Serilog", "YamlDotNet", "EventStore.Plugins" };
      // isolates plugin assemblies while sharing only core contracts
  }
  ```

  Each plugin directory gets its own `AssemblyLoadContext` with isolated dependency resolution. Only the plugin contract assembly (`EventStore.Plugins`) and logging infrastructure are shared with the kernel — classic microkernel boundary enforcement.

  **5. Runtime Enable/Disable**

  Plugins can be enabled or disabled at runtime via `IsEnabled(IConfiguration)` and the `Disable(string reason)` method on `Plugin`. License-gated plugins self-disable when `ILicenseService` rejects their entitlements.

  ### Secondary Style: Layered

  Within `KurrentDB.Core`, there is clear horizontal layering with unidirectional downward dependencies:

  - **Transport Layer**: `Services/Transport/{Grpc,Http,Tcp}` — gRPC (primary), HTTP, legacy TCP
  - **Service/Business Layer**: `Services/RequestManager/`, `Services/PersistentSubscription/`, `Services/Gossip/`, `Services/Replication/`, `Services/ElectionsService.cs`
  - **Storage Layer**: `Services/Storage/{ReaderIndex,EpochManager,InMemory}`, `StorageReaderService`, `StorageWriterService`, `StorageChaser`
  - **Transaction Log Layer**: `TransactionLog/Chunks/`, `TransactionLog/LogRecords/`, `TransactionLog/Scavenging/`, `TransactionLog/Checkpoint/`

  The `InMemoryBus` (`Bus/InMemoryBus.cs`) is a synchronous typed-dispatch message bus that allows services within the same layer boundary to communicate without direct coupling. The `ClusterVNodeController` drives a `VNodeFSM` finite state machine with 10+ states (`Initializing`, `DiscoverLeader`, `Leader`, `Follower`, `CatchingUp`, `Clone`, `ReadOnlyReplica`, etc.), coordinating layer transitions through message publication.

  ### What This Architecture Is NOT

  - **Not Microservices**: Single binary (`KurrentDB.dll`), single process. Docker-compose deploys 3 identical `esdb-node*` containers for HA clustering, not for service decomposition.
  - **Not Modular Monolith**: Plugins are loaded from external assemblies at runtime with `AssemblyLoadContext` isolation — this is runtime extensibility, not compile-time module boundaries. The kernel operates correctly with any subset of plugins.
  - **Not Event-Driven**: KurrentDB stores events for others to build event-driven systems, but its internal architecture uses synchronous `InMemoryBus` dispatch and request/response patterns, not event-driven choreography between components.
  - **Not CQRS**: While KurrentDB is a canonical backend for CQRS implementations, its own architecture does not separate read/write models — `ReadIndex` and `StorageWriterService` are distinct services, but this is standard layered separation, not the CQRS pattern.
  - **Not Hexagonal**: Ports/adapters exist (the `IPlugableComponent` ASP.NET integration resembles an adapter) but are secondary to the primary plugin extension mechanism, which goes well beyond hexagonal's in/out port model.

  ### Confidence Rationale

  Confidence is 0.94. The microkernel classification is extremely strong — dual plugin systems, formal contracts, assembly isolation, runtime enable/disable, and an entire `KurrentDB.Plugins` library define the architectural intent unambiguously. The 0.06 uncertainty accounts for the possibility that the "layered" internal organization could alternatively be framed as a modular monolith at the subsystem level, and for the active evolution of API v2 which may shift integration patterns.
review_notes: |
  KurrentDB (formerly EventStoreDB) is a Microkernel (Plugin) architecture. The core database engine
  acts as a minimal host that assembles its runtime capabilities from a registry of plugins loaded via
  two mechanisms: a legacy MEF-based CompositionContainer and a modern PluginLoader with
  AssemblyLoadContext isolation.

  The KurrentDB.Plugins project defines formal extension contracts (IPlugableComponent,
  IAuthenticationPlugin, IAuthorizationPlugin, ISubsystem, IChunkTransform, IMD5Plugin) and the
  Plugin abstract base class provides licensing, diagnostics, and enable/disable lifecycle for all
  extensions.

  Within the core, components are organized in a Layered fashion: Transport → Service/Request
  Management → Storage → Transaction Log, mediated by an InMemoryBus typed message dispatcher and
  a ClusterVNodeController finite state machine.

  The classification as Microkernel primary / Layered secondary is consistent with the prior
  classification and has been confirmed by deep code analysis of the v25.1 codebase.
