classification_reasoning: "## Analysis\n\nKurrentDB (formerly EventStoreDB) is architected\
  \ as a **Microkernel (Plugin)** system with secondary **Layered** organization within\
  \ its core.\n\n### Primary Evidence for Microkernel (Plugin)\n\n**1. Plugin Infrastructure\
  \ (Strongest Evidence)**\n\nThe codebase has a well-defined plugin infrastructure\
  \ in `src/KurrentDB.Plugins/` with explicit contracts:\n\n- `IPlugableComponent`\
  \ (line 13) - base interface for all pluggable components with lifecycle methods\n\
  - `Plugin` abstract class (`src/KurrentDB.Plugins/Plugin.cs`) - provides `ConfigureServices()`,\
  \ `ConfigureApplication()`, licensing integration, and diagnostics\n- `ISubsystemsPlugin`\
  \ and `SubsystemsPlugin` - for plugins that manage subsystems with `Start()`/`Stop()`\
  \ lifecycle\n\n**2. Dual Plugin Discovery Mechanisms**\n\nFrom `src/KurrentDB/ClusterVNodeHostedService.cs`\
  \ (lines 67-69):\n```csharp\n// two plugin mechanisms; pluginLoader is the new one\n\
  var pluginLoader = new PluginLoader(new DirectoryInfo(Locations.PluginsDirectory));\n\
  var plugInContainer = FindPlugins();\n```\n\nThe system supports:\n- **MEF-based\
  \ discovery** (`CompositionContainer` with `DirectoryCatalog`) - finds plugins via\
  \ `[Export]` attributes\n- **Custom dynamic loading** (`PluginLoader` with `AssemblyLoadContext`)\
  \ - isolates plugin assemblies with proper dependency resolution\n\n**3. Extensive\
  \ Plugin Ecosystem**\n\nThe codebase contains numerous plugin implementations, all\
  \ following the plugin contracts:\n\n| Plugin Type | Examples |\n|------------|----------|\n\
  | Authentication | `KurrentDB.Auth.Ldaps`, `KurrentDB.Auth.OAuth`, `KurrentDB.Auth.UserCertificates`\
  \ |\n| Authorization | `KurrentDB.Auth.StreamPolicyPlugin`, `KurrentDB.Auth.LegacyAuthorizationWithStreamAuthorizationDisabled`\
  \ |\n| Infrastructure | `KurrentDB.AutoScavenge`, `KurrentDB.SecondaryIndexing`,\
  \ `KurrentDB.Diagnostics.LogsEndpointPlugin` |\n| Connectors | `KurrentDB.Plugins.Connectors`\
  \ (HTTP, Kafka, MongoDB, RabbitMQ, Elasticsearch sinks) |\n| Security | `KurrentDB.Security.EncryptionAtRest`\
  \ |\n| Protocol | `KurrentDB.TcpPlugin` (legacy TCP protocol) |\n| API | `KurrentDB.Plugins.Api.V2`,\
  \ `KurrentDB.Plugins.SchemaRegistry` |\n\n**4. Plugin Isolation**\n\nFrom `src/KurrentDB.PluginHosting/PluginLoader.cs`\
  \ (lines 49-66):\n```csharp\nprivate class PluginLoadContext : AssemblyLoadContext\
  \ {\n    private static readonly string[] Shared = { \"Serilog\", \"YamlDotNet\"\
  , \"EventStore.Plugins\" };\n    // ...isolates plugin assemblies while sharing\
  \ core contracts\n}\n```\n\n**5. Extension Points**\n\nMultiple plugin interfaces\
  \ define extension contracts:\n- `IAuthenticationPlugin`, `IAuthorizationPlugin`\
  \ - authentication/authorization extensions\n- `IChunkTransform` - storage layer\
  \ transformations\n- `IMD5Plugin` - hashing algorithm extensions\n- `IPersistentSubscriptionConsumerStrategyPlugin`\
  \ - subscription behavior extensions\n- `ISubsystem` - subsystem lifecycle management\n\
  \n### Secondary Evidence for Layered Architecture\n\nWithin the core (non-plugin)\
  \ codebase, there's clear horizontal layering:\n\nFrom `src/KurrentDB.Core/Services/`:\n\
  - **Transport Layer**: `Transport/Http/`, `Transport/Grpc/`, `Transport/Tcp/`\n\
  - **Storage Layer**: `Storage/` (with `ReaderIndex/`, `EpochManager/`, `InMemory/`)\n\
  - **Replication Layer**: `Replication/`, `Cluster/`, `Gossip/`\n- **Business Services**:\
  \ `PersistentSubscription/`, `TimerService/`, `Monitoring/`\n- **Data Layer**: `TransactionLog/`,\
  \ `Index/`\n\n### What This Architecture is NOT\n\n- **Not Microservices**: Single\
  \ deployable (`KurrentDB.dll`), docker-compose shows clustered nodes for HA, not\
  \ decomposition into independent services\n- **Not Modular Monolith**: Plugin system\
  \ provides runtime extensibility with dynamic loading, not compile-time module boundaries\n\
  - **Not Event-Driven**: While KurrentDB is an event store database, its internal\
  \ architecture uses request/response patterns, message bus for internal coordination,\
  \ not event-driven choreography between components\n- **Not Hexagonal**: Ports/adapters\
  \ exist but are secondary to the primary plugin extension mechanism\n- **Not CQRS**:\
  \ The database supports event sourcing but doesn't internally separate read/write\
  \ models as an architectural principle\n\n### Rejection of Alternatives\n\n- **Modular\
  \ Monolith**: Rejected because plugins are dynamically loaded at runtime from separate\
  \ assemblies with `AssemblyLoadContext` isolation, not compile-time bounded contexts\n\
  - **Service-Based**: Rejected because it's a single database node, not multiple\
  \ coarse-grained services sharing data\n- **Event-Driven**: Rejected because internal\
  \ components communicate via direct method calls and internal message bus, not through\
  \ event brokers"
