review_notes: "Event-Driven: InMemoryBus in src/KurrentDB.Core/Bus/ with IPublisher/ISubscriber/IHandle<T> pattern; 28+ message types in src/KurrentDB.Core/Messages/; VNodeFSM dispatches by node state; PersistentSubscription and Surge streaming subsystems. CQRS: Separated write path (StorageWriterService with dedicated _writerQueue/_writerBus in src/KurrentDB.Core/Services/Storage/StorageWriterService.cs) and read path (StorageReaderService/StorageReaderWorker with StorageReaderBus in src/KurrentDB.Core/Services/Storage/StorageReaderService.cs); ReaderIndex provides read model; RequestManagementService in src/KurrentDB.Core/Services/RequestManager/ mediates writes. Modular Monolith: Single ClusterVNode process hosts distinct subsystems - Core, ProjectionsSubsystem (ISubsystem in src/KurrentDB.Projections.Core/ProjectionsSubsystem.cs), Connectors (src/Connectors/), Surge (src/KurrentDB.Surge/), 6+ Auth plugins, PluginHosting/PluginLoader.cs for dynamic loading; ~70 .NET projects in one solution."