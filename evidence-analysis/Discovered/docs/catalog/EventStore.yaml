review_notes: 'This repository is primarily structured as a **Microkernel (Plugin)**
  architecture. The core database engine acts as a minimal host that orchestrates
  various system capabilities—ranging from networking protocols and authentication
  to storage subsystems—through a formal plugin mechanism.


  ### Evidence for Microkernel (Plugin)

  The `src/KurrentDB/KurrentDB.csproj` file serves as the "kernel" or executive entry
  point. It is notably lightweight, as its primary role is to aggregate a vast array
  of `ProjectReference` items that represent distinct functional plugins.

  - **Protocol Plugins:** The repository separates the transport layers into independent
  modules such as `src/KurrentDB.TcpPlugin`, `src/KurrentDB.Plugins.Api.V2` (gRPC/HTTP),
  and `src/KurrentDB.Transport.Http`. This allows the core to remain agnostic of how
  clients communicate with the database.

  - **Cross-Cutting Plugins:** Security and monitoring features are implemented as
  plugins, evident in `src/KurrentDB.Auth.OAuth`, `src/KurrentDB.Auth.UserCertificates`,
  and `src/KurrentDB.Diagnostics.LogsEndpointPlugin`.

  - **Infrastructure Plugins:** Even fundamental database operations like indexing
  and scavenge are separated (e.g., `src/KurrentDB.AutoScavenge`, `src/KurrentDB.SecondaryIndexing`).

  - **Plugin Hosting:** The project explicitly includes a `KurrentDB.PluginHosting`
  library, which likely handles the discovery, loading, and lifecycle management of
  these components using .NET''s `System.ComponentModel.Composition` (MEF), as referenced
  in the main `csproj`.


  ### Evidence for Domain-Driven Design (DDD)'
