review_notes: 'The Umami repository follows a traditional **Layered** architecture,
  specifically optimized for the Next.js ecosystem. It functions as a single deployable
  application where concerns are separated horizontally into distinct tiers:


  1.  **Presentation/Routing (App Router):** The `src/app` directory utilizes Next.js
  App Router for both the frontend UI and the API endpoints (`src/app/api`).

  2.  **Business logic/Services:** The `src/lib` directory contains the core logic,
  including authentication (`auth.ts`), data processing (`detect.ts`, `filters.ts`),
  and coordination.

  3.  **Data Access Layer (DAL):** The repository abstracts database interactions
  into `src/queries`, with specific implementations for both **Prisma** (Relational)
  and raw **SQL** (Clickhouse/PostgreSQL). This separation allows the application
  to support multiple storage engines (PostgreSQL and Clickhouse) via a consistent
  internal API.

  4.  **State Management:** The frontend utilizes `src/store` (Zustand) for client-side
  state, maintaining a clear boundary between UI components and data orchestration.


  **Secondary Style: Event-Driven**

  While Umami is a web monolith, it incorporates **Event-Driven** patterns as a scaling
  strategy for high-volume data ingestion. The inclusion of `kafkajs` in `package.json`
  and `src/lib/kafka.ts` indicates that the "collect" functionality (tracking events)
  can be decoupled from the main database writes via a message broker. This allows
  the system to handle ingestion bursts asynchronously, separate from the primary
  application flow.'
