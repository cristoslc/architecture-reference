classification_reasoning: "Umami is a canonical Layered architecture — a single Next.js\
  \ 15 full-stack monolith organized into five explicit horizontal layers: (1) Presentation\
  \ layer: src/app/(main)/ React pages and src/store/ Zustand client state. (2) API/Controller\
  \ layer: src/app/api/ Next.js route handlers that parse, validate via Zod, authorize,\
  \ and delegate — no business logic. (3) Permissions layer: src/permissions/ named\
  \ authorization functions (canViewWebsite, canUpdateWebsite, etc.) called explicitly\
  \ from every API route. (4) Business logic/utilities layer: src/lib/ containing\
  \ auth, crypto, detect/geo enrichment, request parsing, date utilities, and infrastructure\
  \ adapters (Prisma, ClickHouse, Kafka, Redis). (5) Data access layer: src/queries/prisma/\
  \ for entity CRUD via Prisma ORM and src/queries/sql/ for analytics queries dispatched\
  \ to PostgreSQL or ClickHouse at runtime via src/lib/db.ts::runQuery(). Every API\
  \ route follows the identical pattern: parseRequest -> canViewX -> getXMetrics ->\
  \ json(data). Deployment is unambiguously a single unit: one package.json, one Dockerfile,\
  \ docker-compose.yml with exactly two services (app + database). Kafka (kafkajs)\
  \ is present as an optional write-side buffer on the ClickHouse ingest path only\
  \ (a conditional branch in saveEvent); there are no event consumers in the application\
  \ codebase, so Event-Driven does not apply. Redis is an optional auth-cache sidecar.\
  \ The dual-DAL design (prisma/ for entity CRUD vs sql/ for analytical aggregations)\
  \ is a read/write path separation at the data access layer — a CQRS-like qualifier,\
  \ not a separate architecture style."
