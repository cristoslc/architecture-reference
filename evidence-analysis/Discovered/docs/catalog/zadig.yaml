review_notes: 'pkg/microservice/ and cmd/ directories define 11 services: (1) Aslan
  (port 25000) — core business logic, workflow orchestration, project management;
  (2) User (port 80) — authentication, roles, permissions with Dex integration;
  (3) Cron (port 80) — scheduled jobs, environment recycling, K8s cleanup;
  (4) HubServer (port 26000) — multi-cluster Kubernetes management; (5) JobExecutor —
  workflow task execution on K8s pods; (6) JobAgent — VM-based task execution;
  (7) Collie (port 28080) — AI environment inspection and diagnostics;
  (8) WarpDrive (port 80) — release management and deployment coordination;
  (9) Picket — policy enforcement and RBAC; (10) PodExec — pod terminal access;
  (11) HubAgent — remote cluster communication agent. Inter-service communication:
  REST APIs (Aslan ↔ HubServer, User ↔ Aslan), gRPC (User service dual
  HTTP/gRPC), NSQ message queue for async workflows (Aslan publishes, Cron
  consumes via TopicCronjob). Service discovery via pkg/config/config.go with
  AslanServiceAddress(), UserServiceAddress(), HubServerServiceAddress(). Separate
  Dockerfiles per service in docker/ directory. Service-Based because 11
  coarse-grained services own distinct domains and coordinate via defined APIs.'
