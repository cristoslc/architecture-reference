review_notes: 'The Zadig repository is structured as a **Microservices** architecture,
  characterized by multiple independently deployable components, each with its own
  entry point, lifecycle, and Dockerfile. While the "Aslan" service acts as a large
  core containing significant business logic (suggesting a **Service-Based** approach
  where a few services are more coarse-grained), the overall deployment topology and
  high number of auxiliary services lean heavily toward microservices.


  ### Architectural Evidence:

  1.  **Independent Deployment Units**: The `Makefile` defines `MICROSERVICE_TARGETS`
  including `aslan`, `cron`, `executor`, `hub-agent`, `hub-server`, `user`, etc. Each
  of these corresponds to a specific Dockerfile in the `/docker` directory and a unique
  `main.go` entry point in the `/cmd` directory.

  2.  **Internal Service Isolation**: The code is organized such that each service''s
  implementation logic is housed under `pkg/microservice/<service_name>`. For example,
  `pkg/microservice/aslan` and `pkg/microservice/user` contain the specific handlers,
  routers, and logic for those services.

  3.  **Polyglot Persistence/Infrastructure**: The `System-Architecture-Overview.md`
  describes a distributed infrastructure using MongoDB, MySQL, and NSQ (Message Queue),
  which are common in distributed systems to satisfy different data needs and asynchronous
  communication.

  4.  **API Gateway**: The documentation confirms the use of **Gloo Edge** as an API
  Gateway to route traffic to the various backend services (`aslan`, `user`, etc.).

  5.  **Event-Driven Communication**: The presence of `pkg/tool/eventbus` and the
  reliance on **NSQ** (as cited in the architecture overview) indicates that services
  communicate via an asynchronous message-passing pattern, particularly for decoupling
  long-running workflow tasks from the main API.


