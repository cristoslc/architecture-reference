  ### Component Breakdown:

  -   **Aslan**: The monolith-like core service handling projects, environments, and
  workflows.

  -   **User**: Dedicated service for auth/authz.

  -   **Cron**: Service for scheduled tasks.

  -   **Hub-Server/Agent**: Services for distributed resource management.

  -   **Plugins**: Specialized binaries (`jenkins-plugin`, `predator-plugin`) that
  follow a modular extension pattern but are deployed as discrete units.


  The repository follows a **Go Monorepo** pattern where shared code resides in `pkg/tool`,
  `pkg/util`, and `pkg/types`, while service-specific logic is strictly isolated in
  `pkg/microservice`.'
