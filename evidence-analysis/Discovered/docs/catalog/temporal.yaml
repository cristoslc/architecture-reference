review_notes: "The Temporal server repository is a classic exemplar of a **Microservices**\
  \ architecture, specifically following the \"Service-Based\" patterns often seen\
  \ in high-scale Uber-originated projects (like its predecessor, Cadence). \n\n###\
  \ 1. Primary Style: Microservices\nThe system is decomposed into several functional\
  \ services that are independently scalable and often independently deployable, as\
  \ evidenced by:\n- **Service Boundaries**: The logic is explicitly split in the\
  \ `service/` directory into four primary roles: `frontend`, `history`, `matching`,\
  \ and `worker`.\n- **Deployment Topology**: The `docker/config_template.yaml` defines\
  \ distinct RPC and Membership ports for each service (e.g., Frontend on 7233, History\
  \ on 7234, Matching on 7235).\n- **Communication**: Services interact via gRPC.\
  \ The `common/membership` and `common/cluster` modules facilitate service discovery\
  \ and cluster metadata management across these distributed components.\n- **Dependency\
  \ Injection**: Each service uses **Uber Fx** (`service/*/fx.go`) to define its own\
  \ dependency graph, allowing each service to boot with only the specific resources\
  \ (persistence, metrics, handlers) it requires.\n\n### 2. Secondary Style: Event-Driven"
