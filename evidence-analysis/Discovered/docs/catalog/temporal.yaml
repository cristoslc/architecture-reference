review_notes: 'Documentation and docker-compose-multirole.yaml define 4 core services:
  (1) Frontend Service (port 7233) — stateless API gateway handling rate limiting,
  authorization, validation, routes requests to History and Matching; (2) History
  Service (port 7234) — workflow execution state manager, persists event history as
  append-only log, manages shards, drives execution via transfer/timer/replicator/
  visibility queues; (3) Matching Service (port 7235) — task queue manager and
  worker dispatcher, matches workers to tasks, manages queue partitioning;
  (4) Worker Service — background processing for system workflows, replication,
  maintenance. All inter-service communication via strongly-typed gRPC with Protobuf.
  Ringpop gossip protocol (ports 6934/6935/6939) for cluster membership and service
  discovery. History uses transactional outbox pattern for reliable task dispatch to
  Matching. Production scaling: Frontend (5 instances, stateless), History
  (15 instances, sharded), Matching (17 instances, distributed), Worker
  (3 instances). Service-Based because 4 coarse-grained services with distinct
  domain responsibilities communicate via well-defined gRPC interfaces with
  independent scaling characteristics.'
