classification_reasoning: |-
  Service-Based is the deployment and communication architecture: four named services (Frontend, History, Matching, Worker) share a single persistence tier (Cassandra / MySQL / PostgreSQL / SQLite configured via a shared defaultStore), communicate via synchronous gRPC with Ringpop-based service discovery, and are compiled into a single binary that supports any deployment topology (all-in-one or independently scaled). This is explicitly not Microservices (shared DB schema, coarse-grained boundaries, monorepo single binary) and not a Modular Monolith (network gRPC boundary, not in-process calls).

  Event-Driven / Event Sourcing is the co-primary execution architecture and is equally load-bearing. Every workflow execution is represented as an append-only History Event log; "the sequence of History Events alone is sufficient to recover all other relevant information." The Transactional Outbox pattern (Transfer Tasks, Timer Tasks, Visibility Tasks written atomically with mutable state updates) is the core delivery mechanism for propagating work between the History and Matching services. All scheduled operations — activity timeouts, workflow task timeouts, user timers — flow through the Timer Task queue. The entire consistency model depends on this event/task duality, making Event-Driven a primary style rather than an implementation detail.

  Supporting structural patterns that are not primary styles: Hierarchical State Machine (service/history/hsm/) provides type-safe validated transitions with task regeneration; the newer CHASM component framework (chasm/) introduces composable hierarchical stateful components and is emerging as a second-generation execution model with Schedules already implemented on it. Shard-based data partitioning (fixed shard count, Ringpop consistent hashing, RangeID fencing) provides the scalability substrate for the History service. Long-poll dispatch in Matching (hierarchical partition forwarding tree) enables high-throughput task delivery.

  Layered is rejected as a named style: the internal handler→engine→persistence layering within each service is a universal good-practice implementation pattern, not an architectural differentiator that warrants a style classification alongside Service-Based.

  Confidence 0.93. The small gap from 1.0 reflects: the emerging CHASM framework may shift style weighting as it matures; Nexus cross-namespace RPC adds an architectural layer whose design is still evolving (multi-cluster replication for Nexus not yet implemented); and the single-binary/multi-service deployment ambiguity requires judgment on intended versus actual deployment mode.
architecture_qualifiers:
  - type: structural-pattern
    value: event-sourcing
    note: Append-only History Event log is the system of record for every workflow execution; mutable state is derivable from replaying the event sequence.
  - type: structural-pattern
    value: transactional-outbox
    note: Transfer, Timer, and Visibility tasks are written atomically with history event appends; queue processors deliver them as RPCs to ensure eventual consistency between History and Matching services.
  - type: structural-pattern
    value: hierarchical-state-machine
    note: service/history/hsm/ provides type-safe Transition[S,SM,E] framework; chasm/ introduces a next-generation component-based execution model with nested stateful component trees.
  - type: structural-pattern
    value: shard-based-partitioning
    note: Fixed shard count per cluster, Ringpop consistent hashing assigns ownership to History instances, RangeID generation counters fence split-brain during ownership transfers.
  - type: structural-pattern
    value: long-poll-dispatch
    note: Matching service implements server-side long-polling for task delivery; hierarchical partition forwarding tree (default 4 partitions) enables pollers to find tasks across the partition set.
