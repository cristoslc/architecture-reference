classification_reasoning: "## Analysis\n\n### Primary Style: Service-Based Architecture\n\
  \nThe Temporal server exhibits clear Service-Based architecture characteristics:\n\
  \n**Evidence:**\n\n1. **Coarse-grained services (4 services)**: The system is decomposed\
  \ into four well-defined services:\n   - `service/frontend/` - API gateway handling\
  \ external gRPC requests\n   - `service/history/` - Core workflow execution state\
  \ management with sharding\n   - `service/matching/` - Task queue management and\
  \ dispatch\n   - `service/worker/` - Background processing (archival, replication)\n\
  \n   Defined in `temporal/server.go`:\n   ```go\n   var Services = []string{\n \
  \      string(primitives.FrontendService),\n       string(primitives.InternalFrontendService),\n\
  \       string(primitives.HistoryService),\n       string(primitives.MatchingService),\n\
  \       string(primitives.WorkerService),\n   }\n   ```\n\n2. **Shared database**:\
  \ All services use the same persistence layer (Cassandra, MySQL, PostgreSQL, or\
  \ SQLite). Configuration shows `numHistoryShards` as a shared persistence parameter\
  \ in `config/development.yaml`:\n   ```yaml\n   persistence:\n     defaultStore:\
  \ sqlite-default\n     visibilityStore: sqlite-visibility\n     numHistoryShards:\
  \ 1\n   ```\n\n3. **Inter-service gRPC communication**: Services communicate via\
  \ generated gRPC clients, not in-process calls. The `client/client_bean.go` shows\
  \ the client abstraction:\n   ```go\n   type Bean interface {\n       GetHistoryClient()\
  \ historyservice.HistoryServiceClient\n       GetMatchingClient(namespaceIDToName\
  \ NamespaceIDToNameFunc) (matchingservice.MatchingServiceClient, error)\n      \
  \ GetFrontendClient() workflowservice.WorkflowServiceClient\n   }\n   ```\n\n4.\
  \ **Single deployable with service selection**: `cmd/server/main.go` produces one\
  \ binary that can run any combination of services. Default runs all together, but\
  \ can be configured for independent deployment:\n   ```go\n   var DefaultServices\
  \ = []string{\n       string(primitives.FrontendService),\n       string(primitives.HistoryService),\n\
  \       string(primitives.MatchingService),\n       string(primitives.WorkerService),\n\
  \   }\n   ```\n\n5. **Service discovery via membership**: Ringpop-based membership\
  \ system (`common/membership/ringpop/`) enables services to discover and communicate\
  \ with each other.\n\n### Secondary Style: Layered Architecture\n\nWithin each service,\
  \ there's internal layering:\n\n- **API/Handler layer**: gRPC handlers (e.g., `service/frontend/service.go`,\
  \ `service/history/handler.go`)\n- **Business logic layer**: Engines and processors\
  \ (e.g., `service/history/history_engine.go`)\n- **Data access layer**: Persistence\
  \ abstractions in `common/persistence/` with ExecutionManager, MetadataManager,\
  \ etc.\n\n### Rejected Alternatives\n\n- **NOT Microservices**: Services share a\
  \ database rather than owning separate data stores. The 4 services are coarse-grained\
  \ (not fine-grained), and the default deployment is a single process running all\
  \ services together. This matches Service-Based, not Microservices.\n\n- **NOT Modular\
  \ Monolith**: Services communicate via gRPC with service discovery, not internal\
  \ function calls. Each service has its own port configuration and can be independently\
  \ deployed and scaled.\n\n- **NOT Event-Driven**: While Temporal is a durable execution\
  \ platform that processes workflow events, internal service-to-service communication\
  \ is synchronous gRPC, not asynchronous messaging through a broker.\n\n- **NOT Hexagonal/Ports-and-Adapters**:\
  \ While there are interface abstractions, the primary architectural driver is service\
  \ decomposition, not isolation of the application core via ports and adapters.\n\
  \n### Conclusion\n\nTemporal exemplifies Service-Based architecture: a small number\
  \ of coarse-grained services (4) that communicate via gRPC, share a database, can\
  \ be deployed together or separately, and use membership-based service discovery.\
  \ The ~108K lines of service code are organized into clear vertical slices with\
  \ shared infrastructure in `common/`."
