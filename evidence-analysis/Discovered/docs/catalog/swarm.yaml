review_notes: 'README explicitly describes multi-agent coordination and execution
  with Agent and handoff primitives. setup.cfg self-describes as ''multi-agent orchestration
  framework''. swarm/types.py defines Agent class (name, model, instructions, functions).
  swarm/core.py implements orchestration loop: get completion, execute tools, switch
  agent on handoff, repeat. Agent handoff pattern in examples/triage_agent/agents.py
  and examples/airline/configs/agents.py shows functions returning Agent objects to
  trigger routing. Nine example directories demonstrate multi-agent patterns: triage,
  airline customer service, support bot, personal shopper.'
