one_line_summary: >-
  Sentry self-hosted deployment package — five coarse-grained services (Sentry,
  Snuba, Relay, Symbolicator, Vroom) sharing databases and coordinated via Kafka,
  assembled by Docker Compose.
review_required: false
review_notes: >-
  This repository is the operational packaging layer for Sentry, not the application
  source (which lives in getsentry/sentry). The architecture is Service-Based: five
  coarse-grained application services share PostgreSQL, Redis, ClickHouse, Kafka, and
  SeaweedFS and are deployed as a single coordinated unit via install.sh + docker-compose.yml.
  Event-Driven is a strong secondary style — Kafka is structurally central to all
  cross-service data flow (Relay produces, all Sentry and Snuba containers consume).
  Not Microservices because there is no database-per-service isolation and no independent
  deployment lifecycle per service. Not Modular Monolith because this repo contains no
  application source code.
classification_reasoning: >-
  ## Analysis


  ### Primary Style: Service-Based


  The docker-compose.yml defines five named application services (Sentry, Snuba, Relay,
  Symbolicator, Vroom) plus supporting infrastructure. These map to Service-Based's
  canonical "2–9 coarse-grained services" criterion.


  Evidence of shared databases (violating Microservices database-per-service rule):

  - PostgreSQL (via PgBouncer) shared by all Sentry containers

  - Redis shared by Sentry (cache, buffers, quotas, TSDB, rate-limiting, digests) and
    Snuba consumers

  - ClickHouse shared by all Snuba consumers

  - Kafka shared by Relay (producer), Sentry consumers, and Snuba consumers

  - SeaweedFS (S3-compatible) shared by Sentry nodestore and Vroom profiles


  Single deployment unit: install.sh bootstraps all services; docker-compose.yml
  starts/stops all 60+ containers together with no independent release lifecycle.


  Sentry spawns many process-role containers from one image (web, events-consumer,
  attachments-consumer, post-process-forwarder-errors, taskworker, taskscheduler,
  sentry-cleanup) — process segmentation within one service, not separate microservices.

  Snuba spawns 20+ typed consumer containers from one image, differentiated only by
  the --storage flag.


  ### Secondary Style: Event-Driven


  Kafka is not optional or peripheral — it is the mandatory inter-service data bus.


  - relay/config.example.yml: processing.kafka_config bootstrap.servers=kafka:9092
    makes Relay publish all accepted events directly to Kafka.

  - sentry.conf.example.py: SENTRY_EVENTSTREAM="sentry.eventstream.kafka.KafkaEventStream"
    makes the Kafka eventstream mandatory on the Sentry write path.

  - Every Snuba container is a Kafka consumer: snuba-errors-consumer,
    snuba-transactions-consumer, snuba-metrics-consumer, etc.

  - post-process-forwarder-* consumers synchronize on Snuba commit-log topics before
    triggering downstream alerting — distributed event coordination.

  - Subscription consumer pairs (scheduler-executor) evaluate real-time alert queries
    via Kafka-coordinated topic handoff.

  - taskbroker routes Kafka task messages to taskworker via gRPC, making async work
    dispatch fully event-driven.


  ### Rejected Alternatives


  Microservices: Services share all major databases; single deployment descriptor;
  no service registry; no mTLS mesh; no independent schema ownership per service.


  Modular Monolith: This repo contains no application source code. It assembles
  pre-built upstream images. The application monolith lives in getsentry/sentry.


  Microkernel: optional-modifications/patches/ applies configuration diffs at
  install time only, not runtime plugin loading by a kernel host.


  Serverless: All services are long-running Docker containers with persistent volumes.


  Layered: Architecture is organized around service and event-flow boundaries, not
  horizontal presentation/business/data layers.
