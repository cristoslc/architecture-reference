review_notes: "This repository is a textbook example of a **Microservices** architecture,\
  \ specifically optimized for self-hosted deployment. While the core \"Sentry\" application\
  \ is a large Django-based service, the overall system is composed of multiple independently\
  \ scalable and specialized services that own their own data domains and communicate\
  \ over the network.\n\n### Evidence of Microservices\nThe `docker-compose.yml` file\
  \ reveals a highly decoupled service topology where functional boundaries are strictly\
  \ enforced:\n1.  **Service Separation**: Distinct services exist for ingestion (**Relay**),\
  \ query processing (**Snuba**), symbolication (**Symbolicator**), and the main web\
  \ UI/worker logic (**Sentry/Web**).\n2.  **Data Ownership**: \n    *   **Clickhouse**\
  \ serves as the primary data store for event search and analytics, managed via the\
  \ **Snuba** service.\n    *   **Postgres** stores relational metadata (users, projects,\
  \ settings), managed by the Sentry core.\n    *   **SeaweedFS** (S3-compatible)\
  \ is used for \"NodeStorage\" (blob storage for raw event payloads), as seen in\
  \ `sentry.conf.example.py` under `SENTRY_NODESTORE`.\n3.  **Independent Scaling\
  \ and Technology Stacks**: The \"Snuba\" suite includes various specialized consumers\
  \ (e.g., `snuba-transactions-consumer`, `snuba-metrics-consumer`) written in Rust\
  \ or Python, which can be scaled independently based on the type of traffic (errors\
  \ vs. transactions)."
