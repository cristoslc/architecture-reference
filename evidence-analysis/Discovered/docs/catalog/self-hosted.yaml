notable_strengths:
  - Clear service boundary separation (Relay handles ingestion, Snuba handles analytics, Sentry handles business logic)
  - Feature-profile system (errors-only vs. feature-complete) reduces deployment footprint for constrained environments
  - Kafka decouples ingest rate from processing rate across all service boundaries
  - Single-command install with automated bootstrapping of secrets, volumes, migrations, and ClickHouse schema
  - Patch system allows configuration customization without forking
notable_gaps:
  - All services share infrastructure databases — no independent data ownership or schema isolation per service
  - No independent deployment or versioning lifecycle per service (all updated together on release)
  - No service mesh or mTLS — all inter-service communication is unencrypted within Docker network
  - SQLite-backed taskbroker is a single point of failure for in-flight task state
  - Recommended only for "low-volume deployments and proofs-of-concept" per official README
