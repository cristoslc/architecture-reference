classification_reasoning: "This repository is a textbook example of a **Microservices**\
  \ architecture, specifically optimized for self-hosted deployment. While the core\
  \ \"Sentry\" application is a large Django-based service, the overall system is\
  \ composed of multiple independently scalable and specialized services that own\
  \ their own data domains and communicate over the network.\n\n### Evidence of Microservices\n\
  The `docker-compose.yml` file reveals a highly decoupled service topology where\
  \ functional boundaries are strictly enforced:\n1.  **Service Separation**: Distinct\
  \ services exist for ingestion (**Relay**), query processing (**Snuba**), symbolication\
  \ (**Symbolicator**), and the main web UI/worker logic (**Sentry/Web**).\n2.  **Data\
  \ Ownership**: \n    *   **Clickhouse** serves as the primary data store for event\
  \ search and analytics, managed via the **Snuba** service.\n    *   **Postgres**\
  \ stores relational metadata (users, projects, settings), managed by the Sentry\
  \ core.\n    *   **SeaweedFS** (S3-compatible) is used for \"NodeStorage\" (blob\
  \ storage for raw event payloads), as seen in `sentry.conf.example.py` under `SENTRY_NODESTORE`.\n\
  3.  **Independent Scaling and Technology Stacks**: The \"Snuba\" suite includes\
  \ various specialized consumers (e.g., `snuba-transactions-consumer`, `snuba-metrics-consumer`)\
  \ written in Rust or Python, which can be scaled independently based on the type\
  \ of traffic (errors vs. transactions).\n\n### Evidence of Event-Driven Architecture\n\
  The system relies heavily on an asynchronous, event-based backplane:\n1.  **Kafka\
  \ Message Broker**: Kafka serves as the central nervous system. The `docker-compose.yml`\
  \ shows dozens of consumers (`snuba-errors-consumer`, `snuba-outcomes-consumer`,\
  \ etc.) that react to events published by the ingestion pipeline.\n2.  **Producer/Consumer\
  \ Pattern**: `sentry.conf.example.py` explicitly configures `SENTRY_EVENTSTREAM`\
  \ to use `KafkaEventStream`. This decouples the ingestion of a crash report from\
  \ its eventual processing, storage in Clickhouse, and alerting logic.\n3.  **Buffered\
  \ Processing**: The use of Redis as a buffer (`SENTRY_BUFFER = \"sentry.buffer.redis.RedisBuffer\"\
  `) further reinforces the asynchronous nature of the system's state updates.\n\n\
  ### Considerations\n*   **Layered (Internal)**: Internally, the Sentry Python service\
  \ follows a Layered/MVC pattern (Django), but the *repository's architecture*—the\
  \ way the entire system is structured and deployed—transcends a single monolith.\n\
  *   **Modular Monolith (Rejected)**: While Sentry started as a monolith, this repository\
  \ demonstrates its evolution into specialized services (Relay, Snuba, Symbolicator)\
  \ that are no longer part of the same codebase or deployment unit."
