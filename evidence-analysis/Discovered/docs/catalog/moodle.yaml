classification_reasoning: "## Architecture Classification: Microkernel (Plugin)\n\n\
  **Moodle is a definitive example of a Microkernel (Plugin) architecture.** The codebase\
  \ is structured as a core system with an extensive plugin infrastructure that provides\
  \ nearly all functionality through modular, hot-pluggable extensions.\n\n### Key\
  \ Evidence\n\n**1. Plugin Types System (48+ plugin types)**\nThe `lib/components.json`\
  \ file defines 48 plugin types including:\n- `mod` (activity modules like assign,\
  \ forum, quiz)\n- `auth` (authentication plugins like ldap, oauth2, shibboleth)\n\
  - `enrol` (enrollment methods)\n- `block` (sidebar blocks)\n- `theme` (visual themes)\n\
  - `filter` (content filters)\n- `local` (site-specific customizations)\n- And 40+\
  \ more types for search, cache, editors, payment gateways, etc.\n\n**2. Plugin Manager\
  \ and Lifecycle**\n`lib/classes/plugin_manager.php` provides:\n- Plugin discovery\
  \ and registration\n- Version management (`PLUGIN_STATUS_NEW`, `PLUGIN_STATUS_UPGRADE`,\
  \ etc.)\n- Dependency tracking between plugins\n- Enable/disable/uninstall capabilities\n\
  - Source distinction (`PLUGIN_SOURCE_STANDARD` vs `PLUGIN_SOURCE_EXTENSION`)\n\n\
  **3. Plugin Base Class Infrastructure**\n`lib/classes/plugininfo/base.php` defines\
  \ the abstract contract all plugins must follow:\n```php\nabstract class base {\n\
  \    public $type;      // Plugin type (mod, auth, etc.)\n    public $name;    \
  \  // Plugin name\n    public $rootdir;   // Location on disk\n    public $versiondisk;\n\
  \    public $versiondb;\n    // ... lifecycle methods\n}\n```\n\n**4. Subplugin\
  \ Architecture**\nPlugins can define their own subplugins. For example, `mod/assign/db/subplugins.json`:\n\
  ```json\n{\n    \"subplugintypes\": {\n        \"assignsubmission\": \"submission\"\
  ,\n        \"assignfeedback\": \"feedback\"\n    }\n}\n```\nThis allows the assignment\
  \ module to have pluggable submission types (file, onlinetext) and feedback types\
  \ (comments, editpdf).\n\n**5. Hook System (PSR-14 Event Dispatcher)**\n`lib/classes/hook/manager.php`\
  \ implements a modern hook system:\n- Implements PSR-14 `EventDispatcherInterface`\
  \ and `ListenerProviderInterface`\n- Plugins register callbacks in `db/hooks.php`\
  \ files\n- Decoupled communication between core and plugins\n\n**6. Standard Plugin\
  \ Structure**\nEvery plugin follows a consistent pattern:\n- `version.php` - Plugin\
  \ metadata and version\n- `db/install.xml` - Database schema\n- `db/upgrade.php`\
  \ - Migration scripts\n- `db/access.php` - Capability definitions\n- `db/services.php`\
  \ - External API definitions\n- `lang/en/` - Localization strings\n- `settings.php`\
  \ - Admin configuration\n\n**7. Core vs Plugin Separation**\n- `public/lib/` - Core\
  \ libraries (accesslib.php, adminlib.php, etc.)\n- `public/mod/` - Activity module\
  \ plugins\n- `public/auth/` - Authentication plugins\n- `public/blocks/` - Block\
  \ plugins\n- `public/local/` - Reserved for site-specific customizations\n\n**8.\
  \ Single Deployable Unit**\n- One `config.php` connecting to a single database\n\
  - One `index.php` entry point\n- Monolithic deployment via standard PHP web hosting\n\
  \n### Why Not Other Architectures\n\n**Not Microservices**: Moodle is a single PHP\
  \ application deployed as one unit with one database. No service boundaries, no\
  \ inter-service communication, no independent deployability.\n\n**Not Layered**:\
  \ While there's presentation code, Moodle isn't organized horizontally into presentation/business/data\
  \ layers. Instead, it's organized vertically by plugin type, with each plugin containing\
  \ its own view, logic, and data handling.\n\n**Not Modular Monolith**: Modular monoliths\
  \ have internal modules with enforced boundaries. Moodle goes further—plugins are\
  \ truly externalizable extensions that can be added/removed after deployment, discovered\
  \ at runtime, and maintained independently.\n\n**Not Event-Driven**: While Moodle\
  \ has events and hooks, they're implementation details within the plugin system,\
  \ not the primary architectural pattern. The hook system facilitates plugin communication\
  \ but isn't the core organizing principle.\n\n**Not Hexagonal**: While Moodle has\
  \ external APIs, there's no explicit ports-and-adapters isolation. Plugins directly\
  \ access core APIs, and the core doesn't have a clean domain layer separated from\
  \ infrastructure.\n\n### Conclusion\n\nMoodle's architecture centers on a minimal\
  \ core that provides essential services (database access, user authentication, session\
  \ management, plugin loading) while delegating virtually all features to plugins.\
  \ The sophisticated plugin infrastructure with typed plugin categories, lifecycle\
  \ management, subplugins, and hook-based communication makes this a textbook **Microkernel\
  \ (Plugin)** architecture with very high confidence (0.95)."
