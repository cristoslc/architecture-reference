review_notes: 'Moodle is a classic example of a **Microkernel (Plugin)** architecture.
  The system is built around a minimal core ("the kernel") that provides essential
  services (user management, permissions, database abstraction), while nearly all
  functional features are implemented as plugins (known in Moodle as "components"
  or "plugintypes").


  ### Evidence for Microkernel (Plugin)

  The repository structure is strictly organized by plugin types, where each subdirectory
  under `public/` (or the root in older versions) represents a specific category of
  plugin with a standardized internal contract:

  - **Consistent Plugin Structure:** Every plugin folder (e.g., `public/blocks/rss_client/`,
  `public/blocks/recent_activity/`) contains a standardized set of files: `version.php`
  for metadata/dependency management, `db/` for schema definitions, and `lang/` for
  internationalization.

  - **Plugin Categories:** The directory tree shows a deep hierarchy of plugin types.
  For instance, `public/blocks/` contains various UI widgets. Other standard Moodle
  directories (though only partially visible in the depth-4 tree) include `mod/` (activity
  modules), `auth/` (authentication methods), and `enrol/` (enrolment plugins).

  - **Extension Points:** The core system discovers these plugins at runtime, scans
  their `version.php` and `db/` directories to handle installations/upgrades, and
  calls specific hooks or extends base classes (like `moodleblock.class.php`) to integrate
  the plugin''s functionality into the UI.


