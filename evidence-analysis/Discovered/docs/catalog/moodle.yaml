one_line_summary: "A PHP-based Learning Management System built as a Microkernel with 49 formally typed plugin extension points, a PSR-14 hook system, 261 core event classes, and a plugin lifecycle manager — all deployed as a single process (Modular Monolith) with clear horizontal layers including a modern Slim 4 HTTP routing tier."
classification_reasoning: "Moodle exhibits a three-style composition: Microkernel as primary, Modular Monolith and Layered as secondary.\n\nMICROKERNEL (primary, 0.93): The dominant architectural characteristic is a formally typed plugin system codified in 49 plugin type descriptors under public/lib/classes/plugininfo/. Plugin types include mod, auth, enrol, theme, block, format, report, gradereport, filter, editor, repository, portfolio, qtype, qbehaviour, qformat, qbank, local, tool, availability, calendartype, dataformat, search, message, mlbackend, aiprovider, aiplacement, communication, smsgateway, paygw, contenttype, and more. Each type has a PHP base class defining the extension contract. Four plugin types (mod, editor, tool, local) support their own subplugin tiers (e.g., mod/forum declares forumreport subplugins via db/subplugins.json), giving the kernel three levels of extensibility. The PSR-14 hook system (core\\hook\\manager implementing EventDispatcherInterface and ListenerProviderInterface) allows plugins to register typed callback listeners via db/hooks.php; the core registers 54 hook bindings. The older event system provides 261 typed event classes in public/lib/classes/event/ (all extending core\\event\\base) with plugin observers registered via db/events.php. Every plugin registers against the kernel via standardised db/ declaration files: access.php (capabilities), events.php (event observers), hooks.php (PSR-14 callbacks), services.php (web service functions), caches.php (cache store definitions), tasks.php (scheduled/adhoc tasks), messages.php (message providers). core\\plugin_manager tracks plugin status (NODB/UPTODATE/NEW/UPGRADE/DELETE) and source (std/ext) for all installed plugins. The kernel provides shared services consumed by all plugins: DML database abstraction (public/lib/dml/ with MySQL/MariaDB/Aurora/PostgreSQL/MSSQL drivers), MUC caching framework (APCu/Redis/file/session/static backends), hierarchical context/capability system (accesslib.php, 5,193 lines), task scheduler (67 task classes), session management (DB/file/Redis/Memcached backends), PHP-DI 7 dependency injection container, and a Slim 4 HTTP routing layer (public/lib/classes/router/) introduced in the 5.x series.\n\nMODULAR MONOLITH (secondary, 0.88): All plugins and core ship as a single PHP process against a single relational database. One composer.json manifests all dependencies; one config.php configures the deployment. The DDL layer (database_manager, sql_generator) manages a unified schema across all plugin installs. Plugins occupy distinct filesystem subtrees (mod/forum/, auth/ldap/, enrol/cohort/) with their own classes/, db/, lang/, templates/, and tests/, providing physical module isolation without independent deployability. Frankenstyle namespacing (core_*, mod_*, auth_*) provides logical module boundaries enforced by PSR-4 autoloading.\n\nLAYERED (secondary, 0.82): The core and each plugin are internally organised in three horizontal layers. Presentation: Mustache templates, AMD/RequireJS JavaScript modules, Boost/Classic themes, output renderers, REST/SOAP web service endpoints. Application: thin entry scripts (index.php, view.php) delegating to classes/ services, lib.php/locallib.php business logic, backup/restore engine, external API framework, task scheduler. Data: DML abstraction (moodle_database to DBMS drivers), core\\persistent model base, procedural data functions in datalib.php. The new Slim 4 HTTP router with PSR-7/15/18 middleware stack introduces a formal HTTP layer atop the legacy bootstrap.\n\nRULED OUT - Microservices: Single deployable PHP process. All plugins share one database, one process, one Composer manifest. No independent deployability, no inter-service network communication.\n\nRULED OUT - Event-Driven (primary): 261 event classes and a PSR-14 hook system are present but both are synchronous in-process mechanisms. Events are persisted to a log store for audit/reporting; hooks are synchronous callbacks. Neither decouples independent services via a message broker. The architecture primary organising principle is the plugin type contract, not event-driven choreography.\n\nRULED OUT - Hexagonal/Ports-and-Adapters: No ports-and-adapters boundary isolating a domain layer from infrastructure. The $DB global (DML driver) is injected at bootstrap and consumed directly by business logic throughout. No formal domain model isolated behind interfaces in the Hexagonal sense.\n\nRULED OUT - Domain-Driven Design: No bounded contexts, aggregate roots, value objects, or ubiquitous language segmentation. The data model is a single unified relational schema shared by all plugins.\n\nRULED OUT - CQRS: Read and write operations use the same DML abstraction. No command/query bus or separate read/write data stores.\n\nQUALITY ATTRIBUTES evidence: Extensibility — 49 plugin types; subplugin tiers; PSR-14 hook system; 261 event classes; AMD JS extension points; Moodle Plugin Directory hosts 1,700+ third-party plugins. Maintainability — Frankenstyle namespacing enforced by autoloader; PSR-4 per-plugin class isolation; behat/phpunit infrastructure per plugin; phpcs.xml.dist enforcing coding standards. Portability — DML abstraction supports 5 DBMS; MUC supports 5 cache backends; session backends are pluggable; SCORM/IMS/LTI standards for content portability. Security — hierarchical capability/context system with 600+ capability strings; CSRF tokens; antivirus subsystem; Privacy API (GDPR); libsodium encryption; WebAuthn (lbuchs/webauthn). Scalability — MUC caching (APCu, Redis, Memcached); DB read-replica trait (moodle_read_replica_trait); CDN asset delivery; task scheduler for async work. Observability — Monolog structured logging; log readers and report plugins (eventlist, log, performance, security reports); analytics subsystem with ML backends. Interoperability — REST/SOAP/XML-RPC web services (300+ external functions); LTI 1.x/2.0; SCORM; IMS Common Cartridge; xAPI; OAuth2; MNet; WebAuthn."
