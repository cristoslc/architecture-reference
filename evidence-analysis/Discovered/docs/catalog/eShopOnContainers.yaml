review_notes: "README.md (dev branch, line 5): '.NET Microservices Sample Reference Application'. src/Services/ contains 6 independent microservices: Basket, Catalog, Identity, Ordering, Payment, Webhooks -- each with own Dockerfile and database (SQL Server, MongoDB, Redis per docker-compose.yml). src/BuildingBlocks/EventBus/ provides EventBusRabbitMQ and EventBusServiceBus for async integration events; IntegrationEvents directories exist in Basket, Catalog, Ordering, Payment, and Webhooks services. Ordering service implements full CQRS with Application/Commands/ (CreateOrderCommand, CancelOrderCommand, etc.) and Application/Queries/ (IOrderQueries, OrderQueries, OrderViewModel). Ordering service implements DDD with Ordering.Domain/AggregatesModel/ (BuyerAggregate, OrderAggregate), SeedWork/ (Entity, ValueObject, IAggregateRoot, IRepository, IUnitOfWork), and 7 domain events. API Gateways in src/ApiGateways/ (Envoy, Mobile.Bff.Shopping, Web.Bff.Shopping). NOTE: main branch is archived redirect; all evidence from dev branch."