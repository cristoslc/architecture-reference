classification_reasoning: "## Classification Analysis\n\n### Primary: Modular Monolith\n\
  \n**Strong Evidence:**\n\n1. **Single Deployable Unit:** The repository builds a\
  \ single Elixir/OTP application (`app: :realtime` in `mix.exs`), compiled into one\
  \ release artifact via `mix release`, deployed as a single Docker container (`Dockerfile`\
  \ line 92: `/app/_build/${MIX_ENV}/rel/realtime`).\n\n2. **Enforced Internal Module\
  \ Boundaries:** Clear namespace separation between bounded contexts:\n   - `lib/realtime/`\
  \ — Core business logic, tenant management, distributed coordination\n   - `lib/realtime_web/`\
  \ — Phoenix web layer (channels, controllers, plugs, views)\n   - `lib/extensions/`\
  \ — Extension point for CDC drivers with defined behaviours\n   - `beacon/` — Internal\
  \ library for distributed process group membership (separate mix project at `beacon/mix.exs`,\
  \ included as path dependency)\n\n3. **Module Isolation:** Each context has internal\
  \ structure and supervision:\n   - `realtime/tenants/` has its own supervisor tree\
  \ (`Connect`, `Migrations`, `Rebalancer`, `ReplicationConnection`, `Janitor`)\n\
  \   - `extensions/postgres_cdc_rls/` is a self-contained module with supervisor,\
  \ message dispatcher, replication poller\n   - `realtime_web/channels/` encapsulates\
  \ WebSocket channel logic with handlers for broadcast, presence, and message dispatch\n\
  \n### Secondary: Layered\n\n**Supporting Evidence:**\n\nThe codebase follows Phoenix's\
  \ conventional layered architecture:\n\n1. **Presentation Layer:** `lib/realtime_web/`\
  \ — Phoenix Endpoint (`endpoint.ex`), Router (`router.ex`), Controllers, Channels,\
  \ Views, LiveView components\n2. **Application/Business Layer:** `lib/realtime/api/`,\
  \ `lib/realtime/tenants/` — Domain logic, tenant management, authorization policies\n\
  3. **Data Access Layer:** `lib/realtime/repo.ex`, `lib/realtime/database.ex`, Ecto\
  \ schemas in `lib/realtime/api/tenant.ex`\n\nThis is standard Phoenix organization\
  \ — not a primary architectural driver but clearly present.\n\n### What Was Rejected\n\
  \n**Rejected: Event-Driven as Primary Style**\n\nWhile the system heavily uses PubSub\
  \ and event-like patterns (PostgreSQL logical replication, WebSocket channels, `TenantBroadcaster`),\
  \ this is **communication infrastructure within a monolith**, not an architectural\
  \ pattern defining module boundaries. The events flow through internal modules of\
  \ the same deployable unit — not between independent services. The distributed PubSub\
  \ (via `gen_rpc`) is for scaling the monolith across nodes, not decoupling services.\n\
  \n**Rejected: Microkernel/Plugin**\n\nThe extension system (`Realtime.PostgresCdc`\
  \ behaviour with callbacks at `lib/realtime/postgres_cdc.ex:82-86`) appears plugin-like,\
  \ but:\n- Only one implementation exists (`Extensions.PostgresCdcRls`)\n- Extensions\
  \ are configured at compile time (`Application.compile_env(:realtime, :extensions)`\
  \ at line 9)\n- No runtime plugin loading mechanism\n- This is a **build-time extension\
  \ point** for code organization, not a microkernel architecture\n\n**Rejected: Microservices**\n\
  \nSingle OTP application, single Docker image, single release artifact. No service\
  \ decomposition. The clustering (`libcluster`, `syn`, `gen_rpc`) is for **horizontal\
  \ scaling of the same monolithic application** across regions/nodes, not for inter-service\
  \ communication.\n\n**Rejected: Service-Based**\n\nOnly one service exists. There's\
  \ no decomposition into 2-5 coarse-grained services sharing a database.\n\n### Key\
  \ Architectural Discriminators\n\n| Aspect | Evidence |\n|--------|----------|\n\
  | Deployment units | Single (`mix release` → one artifact) |\n| Module boundaries\
  \ | Namespaced contexts with clear responsibility |\n| Boundary enforcement | Elixir\
  \ module system, behaviours, supervision trees |\n| Communication | Internal function\
  \ calls + distributed PubSub for scaling |\n| Data ownership | Shared Postgres,\
  \ tenant-isolated connections |\n\n### Confidence Rationale\n\n0.85 confidence —\
  \ The modular monolith classification is clear from the single deployment unit with\
  \ well-organized internal module boundaries. The layered aspect is secondary (standard\
  \ Phoenix convention). The only ambiguity is the rich distributed systems infrastructure\
  \ (`gen_rpc`, `syn`, `Beacon`) which might suggest event-driven to some, but this\
  \ is horizontal scaling machinery, not architectural decomposition."
