review_notes: '### Architecture Analysis


  The Supabase Realtime repository is structured as a high-performance, distributed
  messaging system built on the Elixir/Phoenix ecosystem. Its primary architectural
  identity is **Event-Driven**, specifically designed to handle the ingestion, transformation,
  and distribution of asynchronous data streams (Postgres changes, broadcast messages,
  and presence state).


  #### 1. Event-Driven (Primary Style)

  The core purpose and internal organization of the code revolve around event propagation.

  - **Data Ingestion**: It implements a Change Data Capture (CDC) mechanism that listens
  to Postgres logical replication slots (`lib/realtime/adapters/postgres`).

  - **Pub/Sub Mechanism**: It leverages Phoenix Channels and Elixir’s distributed
  `PubSub` for message routing. The implementation of `gen_rpc_pub_sub` (found in
  `lib/realtime/gen_rpc_pub_sub.ex`) indicates a custom, cluster-aware event distribution
  layer that allows nodes to communicate events efficiently across a cluster.

  - **Asynchronous Flow**: The system is reactive. Events originating in a database
  or a client are processed by "Extensions" (e.g., `postgres_cdc_rls`) and fanned
  out to authorized subscribers.'
