classification_reasoning: "## Architecture Analysis: Pachyderm\n\n### Primary Classification:\
  \ Pipeline (Pipe-and-Filter)\n\nPachyderm is fundamentally a **data pipeline orchestration\
  \ platform**. The evidence strongly supports this classification:\n\n**Pipeline-centric\
  \ data model:**\n- `src/pps/pps.proto` defines `Pipeline`, `Job`, `PFSInput` (PFS\
  \ = Pachyderm File System), and `Transform` messages\n- Pipelines specify input\
  \ repositories, transformation code (user container images), and output repositories\n\
  - Data flows from input repos through transform stages to output repos (examples/opencv/edges.py\
  \ reads from `/pfs/images` and writes to `/pfs/out`)\n\n**Pipeline execution architecture:**\n\
  - `src/server/pps/server/pipeline_controller.go` manages pipeline lifecycle and\
  \ state machines\n- `src/server/worker/pipeline/transform/transform.go` implements\
  \ the transform stage that processes data\n- `src/server/worker/datum/datum.go`\
  \ manages \"datums\" (data units) - the fundamental processing units that flow through\
  \ pipelines\n- Workers process datums from input file sets, transform them, and\
  \ write to output\n\n**Key pipeline code paths:**\n```\nsrc/server/pps/server/ \
  \     # Pipeline orchestration\nsrc/server/worker/pipeline/ # Pipeline execution\
  \ (transform, spout, service)\nsrc/server/worker/datum/    # Datum (data unit) processing\n\
  ```\n\n### Secondary Style: Microservices\n\nPachyderm deploys as multiple independently\
  \ scalable services on Kubernetes:\n\n**Deployment topology** (from `etc/helm/pachyderm/templates/`):\n\
  - `pachd/deployment.yaml` - Main server (multiple modes: full, enterprise, sidecar,\
  \ paused)\n- `worker/` - Dynamic workers created per pipeline\n- `etcd/` - Metadata\
  \ storage\n- PostgreSQL + pgbouncer - Database layer\n- Console (frontend/backend)\
  \ - UI service\n\n**Service separation:**\n- PFS (Pachyderm File System) - Data\
  \ storage layer (`src/server/pfs/`)\n- PPS (Pachyderm Pipeline System) - Pipeline\
  \ execution layer (`src/server/pps/`)\n- Auth, Admin, Enterprise, Identity, License\
  \ - Cross-cutting services\n\n**Worker architecture:**\n- Workers are Kubernetes\
  \ pods spawned dynamically per pipeline (`src/server/pps/server/worker_rc.go`)\n\
  - Each pipeline gets its own worker pods with user-specified container images\n\
  - Workers pull data from PFS, transform it, and push results back\n\n### What was\
  \ Rejected\n\n**Not Event-Driven (primary):** While pipelines are triggered by data\
  \ commits and workers subscribe to jobs, the core architectural pattern is pipeline-based\
  \ data transformation, not event choreography. Events (commits) trigger pipeline\
  \ runs, but the data flow is fundamentally through processing stages.\n\n**Not Layered:**\
  \ While there are layers (PFS storage, PPS processing, API), the primary organization\
  \ is around pipeline stages and data flow, not horizontal abstraction layers.\n\n\
  **Not Domain-Driven Design:** Though there are bounded contexts (PFS, PPS, Auth),\
  \ the codebase is organized around pipeline execution mechanics rather than domain\
  \ aggregates and entities.\n\n**Not Modular Monolith:** The system is explicitly\
  \ deployed as separate services (pachd, workers, console, etc.) orchestrated by\
  \ Kubernetes.\n\n### Key Evidence Files\n\n- `src/pps/pps.proto` - Pipeline definition\
  \ with Transform, PFSInput, Job\n- `src/server/cmd/worker/main.go` - Worker initialization\
  \ for pipeline execution  \n- `src/server/worker/pipeline/transform/transform.go`\
  \ - Data transformation stage\n- `etc/helm/pachyderm/templates/pachd/deployment.yaml`\
  \ - Kubernetes deployment configuration\n- `examples/opencv/edges.py` - Example\
  \ showing `/pfs/images` → transform → `/pfs/out` pattern\n- `src/server/pps/server/worker_rc.go`\
  \ - Dynamic worker pod creation for pipelines"
