classification_reasoning: "## Architecture Classification Analysis\n\n### Primary
  Styles: Pipeline + Modular Monolith\n\n**PIPELINE (primary, 0.93):** Pachyderm's
  central abstraction is the data pipeline \u2014 a DAG of user-defined transform
  stages connected through versioned PFS (Pachyderm File System) repositories. The
  pipeline controller in `src/server/pps/server/pipeline_controller.go` manages lifecycle
  state machines, and workers subscribe to jobs via `SubscribeJob` gRPC streaming
  (`src/server/worker/pipeline/transform/transform.go`). Each pipeline stage consumes
  specific input repos and commits exclusively to its own output repo. The branch
  trigger system in `src/server/pfs/server/master_trigger.go` recursively fires downstream
  stages when upstream commits satisfy thresholds (size/time/count). The datum model
  in `src/server/worker/datum/` partitions input file sets into parallelizable work
  units, driving MapReduce-style horizontal scaling at each stage. PPS and PFS enforce
  strict one-way flow: data lands in PFS repos \u2192 triggers evaluated \u2192 PPS
  schedules jobs \u2192 worker pods process datums \u2192 results commit to output
  repos.\n\n**MODULAR MONOLITH (primary, 0.87):** All functional areas (PFS, PPS,
  Auth, Identity, Transaction, Proxy, Enterprise, License, PJS, Snapshot, Storage,
  Debug, Admin, Logs, Metadata) are compiled and deployed as a single binary through
  `src/internal/pachd/full.go`, which registers all gRPC API servers in-process via
  a structured builder pattern. The `ServiceEnv` interface in `src/internal/serviceenv/service_env.go`
  is the shared dependency container binding all services inside the monolith. Internal
  cross-service calls are direct Go interface calls, not network hops. Domain boundaries
  are well-demarcated: each service has `src/server/<service>/iface.go` (internal
  interface), `src/<service>/*.proto` (public contract), and `src/server/<service>/server/`
  (implementation). The `src/internal/` tree provides shared infrastructure (pachsql,
  collection, task, transactionenv, storage, grpcutil, middleware). A single Helm
  chart deploys the monolith as one Kubernetes Deployment.\n\n### Secondary Style:
  Event-Driven\n\n**EVENT-DRIVEN (secondary, 0.74):** Commit-triggered reactive propagation
  is the primary coordination signal. The PostgreSQL-backed collection listener (`src/internal/collection/postgres_listener.go`)
  uses LISTEN/NOTIFY for state-change propagation. Pipeline workers subscribe to job
  state changes via `SubscribeJob` gRPC streaming and commits via `SubscribeCommit`.
  The PPS master runs dedicated watcher goroutines (`watchPipelines`, `pollPipelines`,
  `pollPipelinePods`) reacting to pipeline and pod state-change events via Kubernetes
  watch streams and DB watches. Branch triggers recursively fire on commit events.
  However, there is no external message broker (no Kafka, RabbitMQ, or NATS); the
  event transport is Postgres LISTEN/NOTIFY and etcd watches, making this reactive
  routing secondary to the pipeline topology.\n\n### What Was Rejected and Why\n\n**Not
  Microservices:** PFS, PPS, Auth, Identity, Transaction, and all other services are
  compiled into a single `pachd` binary. They share one PostgreSQL database and etcd
  cluster. Cross-service calls go through in-process Go interfaces (ServiceEnv contract),
  not network boundaries. Pipeline worker Kubernetes pods run the same binary in sidecar
  mode, not as independent services.\n\n**Not Service-Based:** No independent deployable
  units with separate data stores. The `pachw` worker pool is a horizontally scaled
  mode of the same binary.\n\n**Not Hexagonal Architecture:** While interfaces are
  used at service boundaries (iface.go files), the codebase is not structured around
  inward-facing domain ports with outward-facing adapters.\n\n**Not Microkernel:**
  No runtime plugin system. Services are statically compiled into the daemon. Pipeline
  container images are user-supplied but the architectural core is not extended through
  formal plugin contracts.\n\n### Quality Attributes Evidence\n\n**SCALABILITY:**
  Datum-level parallelism distributes work across dynamically scaled Kubernetes ReplicationControllers
  (one per pipeline). The `pachw` controller (`src/server/pachw/server/pachw.go`)
  auto-scales a worker-pool replica set based on task queue depth. PJS provides fair-scheduled
  task queuing with namespace/group scoping.\n\n**DATA LINEAGE:** Every PFS commit
  records `direct_provenance` commits by branch, enabling full lineage walks via `WalkCommitProvenance`
  and `WalkBranchProvenance` RPCs. Immutable content-addressed chunk storage with
  deduplication ensures any past pipeline output can be reconstructed.\n\n**RELIABILITY:**
  etcd distributed locks (dlock) ensure a single PPS master drives state transitions.
  Worker crash monitors and standby transitions are managed by dedicated goroutines.
  The transaction server allows atomic batching of PFS+PPS operations.\n\n**OBSERVABILITY:**
  Jaeger tracing, Prometheus metrics, Loki log aggregation, and structured zap logging
  are used throughout. The debug server provides cluster-wide diagnostics.\n\n**PORTABILITY:**
  Storage is abstracted via the `obj.Bucket` interface supporting GCS, S3, Azure Blob,
  MinIO, and local. Helm chart supports GOOGLE, AMAZON, MINIO, MICROSOFT, CUSTOM,
  and LOCAL deploy targets."
