one_line_summary: Data versioning and pipeline orchestration platform built as a Modular
  Monolith (all services compiled into one pachd binary) with a Pipeline topology
  as its core abstraction and commit-triggered reactive propagation as secondary coordination.
review_notes: PFS/PPS/Auth/Transaction/etc. all in-process via ServiceEnv; single
  Helm deployment; datum-level parallelism via Kubernetes RCs; branch trigger chains
  fire on commit events; PostgreSQL LISTEN/NOTIFY and etcd watches drive reactive
  coordination; pachw provides auto-scaling worker pool as a separate mode of the
  same binary.
