review_notes: "Pachyderm is primarily structured as a **Modular Monolith** that is\
  \ moving towards a **Microservices** deployment model for specific high-scale components.\
  \ \n\n### Reasoning\n\n1.  **Core Monolith (`pachd`):**\n    The central component,\
  \ `pachd`, is compiled into a single binary (as seen in `Dockerfile.pachd` with\
  \ `ENTRYPOINT [\"/pachd\"]`). The source structure under `src/server/` contains\
  \ multiple distinct functional domains—`auth`, `pfs` (Pachyderm File System), `pps`\
  \ (Pachyderm Pipeline System), `identity`, and `admin`. These are wired together\
  \ within the same process but maintain strict separation via Go's `internal` packages\
  \ and Protobuf-defined interfaces.\n\n2.  **Modular Boundaries:**\n    The repository\
  \ exhibits a highly disciplined module layout. Each major system (e.g., `src/pfs`,\
  \ `src/pps`, `src/auth`) has its own Protobuf definitions, generated gRPC clients/servers,\
  \ and a corresponding server-side implementation in `src/server/<module>`. The use\
  \ of `src/internal` to house common logic (database utilities, migrations, and service\
  \ environments) ensures that cross-module dependencies are managed in a way typical\
  \ of a Modular Monolith."
