one_line_summary: "GitLab CE is a Modular Monolith Rails platform with 69 formally governed bounded contexts, layered internal architecture, and a typed internal event bus for inter-domain decoupling."
classification_reasoning: "## Architecture Classification: gitlabhq (GitLab CE)\n\n### Primary Style: Modular Monolith\n\nGitLab CE defines 69 bounded contexts in `config/bounded_contexts.yml` — the authoritative governance document stating \"Only the defined bounded contexts are allowed\" in the domain and platform layers. The taxonomy is enforced simultaneously across every application layer: `app/models/ci/`, `app/services/ci/`, `app/workers/ci/`, `app/finders/ci/`, and `db/gitlab_schemas/gitlab_ci.yaml` all carry the same namespace. A `platform:` section in the config targets Gitlab and Banzai contexts for extraction as gems — 23 internal gems have already been extracted (`gems/`). The decomposed PostgreSQL configuration (`database.yml.decomposed-postgresql`) provides separate `main` and `ci` databases aligned to module boundaries.\n\n**Evidence of Modular structure:**\n- `config/bounded_contexts.yml`: 69 bounded contexts in domain layer (67) + platform layer (2)\n- `db/gitlab_schemas/`: 15 domain-scoped database schemas (gitlab_ci.yaml, gitlab_main_user.yaml, gitlab_sec.yaml, etc.)\n- `gems/`: 23 extracted platform-layer gems (gitlab-database-load_balancing, gitlab-schema-validation, etc.)\n- `app/workers/all_queues.yml`: 560 Sidekiq queues namespaced by bounded context (ci:*, merge_requests:*, authorized_project_update:*)\n- `config/feature_categories.yml`: 150+ feature categories mapped to bounded contexts for ownership tracking\n\n### Secondary Style: Layered\n\nWithin each bounded context, GitLab follows strict horizontal layering:\n- **Controller layer** (`app/controllers/`): HTTP request handling\n- **API layer** (`lib/api/`, 173 files): Grape REST API with ~500+ endpoints\n- **GraphQL layer** (`app/graphql/`, 323 mutations, 275 resolvers, 745 types): second API surface\n- **Service layer** (`app/services/`, 167+ domain-namespaced service classes): business logic\n- **Finder layer** (`app/finders/`, 229 files): complex query isolation\n- **Policy layer** (`app/policies/`, 181 files): DeclarativePolicy::Base authorization\n- **Model layer** (`app/models/`, 315 root files + domain subdirs): ActiveRecord persistence\n- **Presenter/Serializer layer** (`app/presenters/` 104 files, `app/serializers/` 311 files): response formatting\n\n### Supporting Style: Event-Driven\n\n`Gitlab::EventStore` (`lib/gitlab/event_store.rb`) is a formal typed pub-sub mechanism explicitly designed to \"decouple domains from different bounded contexts.\" Features: typed domain events with JSON Schema validation, immutable subscription registry (frozen after initialization), Sidekiq worker subscribers. Currently 45 `EventStore.publish` call sites and 19 subscriber workers. ActionCable provides WebSocket real-time delivery to browsers. Sidekiq (612 worker files, 560 queues) is the universal async execution backbone.\n\n### What This Is NOT\n\n- **NOT Microservices**: Single Rails application (`Gitlab::Application`) deployed as one unit. No independent deployment units, no inter-service APIs between decomposed components.\n- **NOT pure Domain-Driven Design**: While DDD vocabulary and patterns informed the design, the architecture style is defined by the enforcement mechanism (Modular Monolith with tooling governance) rather than DDD methodology itself.\n- **NOT Microkernel**: No plugin system with external extension points. EE edition features are injected via Ruby module prepending within a shared codebase, not via a kernel+plugin architecture.\n\n### Key Files\n\n1. `config/bounded_contexts.yml` — authoritative bounded context registry\n2. `db/gitlab_schemas/` — 15 domain-scoped database schemas\n3. `lib/gitlab/event_store.rb` — inter-domain pub-sub mechanism\n4. `config/database.yml.decomposed-postgresql` — decomposed DB topology\n5. `gems/` — 23 extracted platform gems\n6. `app/workers/all_queues.yml` — 560 domain-namespaced Sidekiq queues\n7. `app/models/project.rb` (4,146 lines) / `app/models/user.rb` (3,278 lines) — residual God Objects representing legacy coupling"
