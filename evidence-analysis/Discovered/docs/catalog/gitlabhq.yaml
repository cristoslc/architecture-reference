review_notes: "config/bounded_contexts.yml defines 50+ domain bounded contexts (Ci, Authn, Authz, Repositories, Security, etc.) with separated Domain and Platform layers. app/events/ contains domain events organized by context (ci/pipeline_created_event.rb, projects/project_created_event.rb, members/members_added_event.rb, repositories/default_branch_changed_event.rb). gems/ holds 22+ extracted internal modules (gitlab-utils, gitlab-backup-cli, gitlab-http, gitlab-schema-validation). Classic Rails layered structure: app/controllers/, app/models/, app/views/, app/services/, plus app/finders/ (query), app/presenters/ (presentation), app/policies/ (authorization), app/facades/, app/serializers/. lib/api/ provides Grape REST API layer; app/graphql/ provides parallel GraphQL layer. app/workers/ and config/sidekiq_queues.yml define hundreds of async background job queues. workhorse/ is a Go reverse proxy component. config/feature_categories.yml and config/bounded_contexts.yml show intentional modular architecture governance."