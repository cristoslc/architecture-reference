classification_reasoning: "## Architecture Classification: GitLab (gitlabhq)\n\n###\
  \ Primary Style: Layered Architecture\n\nGitLab is fundamentally a **Ruby on Rails\
  \ application** implementing classic layered architecture with clear horizontal\
  \ separation:\n\n**Evidence of Layering:**\n- **Controllers** (`app/controllers/`):\
  \ 60+ controllers handling HTTP requests, organized by resource\n- **Models** (`app/models/`):\
  \ 315+ ActiveRecord model files (~42,000 lines), data access layer via `ApplicationRecord`\n\
  - **Services** (`app/services/`): 167+ service objects for business logic encapsulation\n\
  - **Finders** (`app/finders/`): Dedicated query layer keeping complex queries out\
  \ of models\n- **Policies** (`app/policies/`): Authorization layer using `DeclarativePolicy::Base`\n\
  - **Workers** (`app/workers/`): Background job processing via Sidekiq\n- **Presenters/Serializers**\
  \ (`app/presenters/`, `app/serializers/`): View/serialization layer\n- **API Layer**\
  \ (`lib/api/`): REST API built on Grape framework\n\n**Single Deployable Unit:**\n\
  - One Rails application deployed via Puma\n- Single shared PostgreSQL database\n\
  - Sidekiq for background job processing\n- All components run in a single application\
  \ process\n\n### Secondary Style: Domain-Driven Design\n\nGitLab explicitly organizes\
  \ code by **bounded contexts**, documented in `config/bounded_contexts.yml`:\n\n\
  ```yaml\ndomains:\n  Ci:\n    description: Create and run CI/CD pipelines\n    feature_categories:\n\
  \      - continuous_integration\n      - pipeline_composition\n  Authn:\n    description:\
  \ Authentication layer\n  Authz:\n    description: Authorization layer\n  # ~50+\
  \ bounded contexts defined\n```\n\n**Domain Namespacing Throughout:**\n- Models:\
  \ `app/models/ci/`, `app/models/authz/`, `app/models/authn/`, etc.\n- Services:\
  \ `app/services/ci/`, `app/services/authn/`, `app/services/authz/`\n- Finders: `app/finders/ci/`,\
  \ etc.\n- Workers: `app/workers/ci/`\n\n**Database Schema Organization** (`db/gitlab_schemas/`):\n\
  - `gitlab_ci.yaml` - CI domain tables\n- `gitlab_main_org.yaml` - Organization tables\n\
  - `gitlab_main_user.yaml` - User domain\n- `gitlab_sec.yaml` - Security domain\n\
  \n**Feature Categories:** 150+ feature categories mapped to bounded contexts in\
  \ `config/feature_categories.yml`\n\n### What This Is NOT\n\n- **NOT Microservices**:\
  \ Single monolithic Rails app with shared database. No independent deployment units.\n\
  - **NOT Modular Monolith**: While domains are namespaced, there's no compile-time\
  \ enforcement of module boundaries. Domains can reference each other freely.\n-\
  \ **NOT Event-Driven**: Uses Sidekiq for background jobs, but not message broker-based\
  \ pub/sub.\n- **NOT Hexagonal Architecture**: No ports-and-adapters pattern. Uses\
  \ ActiveRecord directly throughout.\n\n### Key Files Supporting Classification\n\
  \n1. `config/bounded_contexts.yml` - Explicit domain context definitions\n2. `config/feature_categories.yml`\
  \ - 150+ feature categories mapped to domains\n3. `db/gitlab_schemas/` - Database\
  \ schemas organized by domain\n4. `doc/development/architecture.md` - Architecture\
  \ documentation\n5. Directory structure showing domain namespacing (`app/models/ci/`,\
  \ `app/services/authz/`, etc.)"
