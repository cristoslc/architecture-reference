classification_reasoning: "## Analysis\n\n### Primary Style: Pipeline (Pipe-and-Filter)\n\
  \nArgo Workflows implements a classic **Pipeline (Pipe-and-Filter)** architecture,\
  \ where workflows are defined as Directed Acyclic Graphs (DAGs) or sequential Steps\
  \ through which data flows:\n\n**Key Evidence:**\n\n1. **Workflow Definition Language**\
  \ (`examples/dag-coinflip.yaml`, `examples/steps.yaml`): Workflows are explicitly\
  \ defined as pipelines of interconnected tasks:\n   - DAG templates specify task\
  \ dependencies explicitly (`depends: \"A\"`, `depends: \"B && C\"`)\n   - Steps\
  \ templates define sequential/parallel execution stages\n   - Each step is a filter/container\
  \ that processes inputs and produces outputs\n\n2. **Pipeline Execution Engine**\
  \ (`workflow/controller/dag.go`, `workflow/controller/steps.go`):\n   - `dagContext`\
  \ tracks task dependencies and execution order\n   - `executeSteps()` method orchestrates\
  \ step-by-step pipeline execution\n   - Tasks have explicit dependencies forming\
  \ a DAG structure\n\n3. **Artifact Passing Between Steps** (`workflow/artifacts/`):\
  \ \n   - Artifacts flow between pipeline stages\n   - Output from one step becomes\
  \ input to the next\n   - Multiple artifact backends (S3, GCS, Azure, HTTP, Git)\
  \ support the pipe metaphor\n\n4. **Documentation Confirms** (`docs/architecture.md`):\n\
  \   > \"Model multi-step workflows as a sequence of tasks or capture the dependencies\
  \ between tasks using a directed acyclic graph (DAG).\"\n\n### Secondary Style:\
  \ Microkernel (Plugin)\n\nThe system implements a **Microkernel/Plugin** architecture\
  \ for extensibility:\n\n**Key Evidence:**\n\n1. **Artifact Plugin System** (`docs/artifact-plugin.md`,\
  \ `workflow/artifacts/plugin/plugin.go`):\n   - Well-defined gRPC interface (`artifact.proto`)\n\
  \   - Plugins run as sidecars communicating via Unix sockets\n   - Core system loads\
  \ plugins dynamically at runtime\n   - Supports plugins in any language (Go, Python,\
  \ Java, Rust)\n\n2. **Template Executor Plugins** (`pkg/plugins/executor/`, `workflow/executor/plugins/rpc/plugin.go`):\n\
  \   - `TemplateExecutor` plugin interface\n   - Plugins execute custom templates\
  \ via RPC\n   - Registered via ConfigMap configuration\n\n3. **Plugin Spec** (`pkg/plugins/spec/plugin_types.go`):\n\
  \   - Sidecar-based plugin registration\n   - Validated plugin contracts with required\
  \ fields (ports, resources, security context)\n\n### What This Is NOT\n\n**NOT Microservices**:\
  \ Despite multiple deployables (workflow-controller, argo-server, argoexec), this\
  \ is a monolithic codebase (`go.mod` has one module). The components are not independent\
  \ services - they're a controller, API server, and executor that work in concert\
  \ on a single workflow engine.\n\n**NOT Event-Driven** (primary style): While the\
  \ controller uses Kubernetes informers and workqueues (event-driven implementation\
  \ detail), the **architectural pattern** is Pipeline - workflows are defined as\
  \ data transformation pipelines, not as event-sourced aggregates. The workqueue\
  \ is a reconciliation mechanism, not the defining architectural characteristic.\n\
  \n**NOT Layered**: There's no horizontal presentation/business/data layering. The\
  \ architecture is organized around workflow execution (controller, operator, DAG,\
  \ steps) and extensibility (plugins), not separation of concerns layers.\n\n###\
  \ Deployment Architecture\n\nFrom `Dockerfile` and `manifests/`:\n- **workflow-controller**:\
  \ Kubernetes controller that reconciles Workflow CRDs\n- **argo-server**: API server\
  \ (gRPC+HTTP) serving the UI and clients  \n- **argoexec**: Executor binary that\
  \ runs inside workflow pods (init, wait, emissary containers)\n\nThe architecture\
  \ leverages Kubernetes as the deployment platform - workflows run as pods, the controller\
  \ watches for CRD changes, and artifacts flow through the defined pipeline structure."
