one_line_summary: "Kubernetes-native container workflow engine organized as a DAG/Steps pipeline executor with a formal microkernel plugin model for artifact backends and template executors."
classification_reasoning: "The primary organizing principle of Argo Workflows is the pipeline metaphor: workflows are defined as DAGs or sequential Steps where each node is a container step acting as a filter, and data flows between steps via artifacts and output parameters. This drives the entire internal architecture — the DAG executor (workflow/controller/dag.go), steps executor, artifact system, and the operator dispatch table in operator.go all exist to resolve and execute pipeline stages. Microkernel is a strong secondary style: three formal extension points with typed interfaces (TemplateExecutor RPC plugins, ArtifactDriver plugins, artifact plugin sidecar contracts) allow third-party code to extend the core engine without modification. The Kubernetes informer + work queue reconciliation loop is an event-driven implementation mechanism enabling pipeline execution rather than a primary architectural style in its own right. All components share one Go module (github.com/argoproj/argo-workflows/v4) deployed as workflow-controller, argo-server, and ephemeral argoexec pods — a tightly-integrated platform, not independent microservices."
