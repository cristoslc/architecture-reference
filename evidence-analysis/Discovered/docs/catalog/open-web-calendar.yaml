classification_reasoning: "## Architecture Classification Analysis\n\n### Primary
  Style: Layered (0.91)\n\nThe codebase is organized in four explicit horizontal layers
  with strict downward-only dependencies:\n\n**Presentation layer** — `app.py` Flask
  routes delegate immediately to the conversion layer after spec assembly; Jinja2
  templates in `templates/` render the UI; `static/` holds the dhtmlx Scheduler JS
  widget and supporting scripts. Routes contain no business logic.\n\n**Conversion
  (application) layer** — `convert/base.py` defines `ConversionStrategy`, an abstract
  base class owning the retrieve-collect-merge lifecycle. Three concrete strategies
  implement the three output formats: `ConvertToEvents` (JSON for dhtmlx), `ConvertToICS`
  (merged ICS feed), `ConvertToCalendars` (calendar metadata JSON). Strategy selection
  is driven by the `.<ext>` in the `/calendar.<ext>` route.\n\n**Calendar source
  layer** — `calendars/base.py` defines `Calendars` (ABC) with `get_events_between()`
  and `get_icalendars()`. `ICSCalendars` handles HTTP/webcal/ICS sources via `recurring-ical-events`;
  `CalDAVCalendars` handles CalDAV via the `caldav` library. The conversion layer
  depends only on this interface.\n\n**Infrastructure layer** — `config.py` (environment
  config), `encryption.py` (Fernet credential encryption), `clean_html.py` (lxml/BeautifulSoup
  sanitisation), `translate.py` (i18n), `error.py` (HTTP error helpers). No upward
  dependencies.\n\nLayer boundaries are strictly respected: `app.py` never imports
  from `calendars/`; conversion strategies never import from `app.py`; utilities have
  no application imports.\n\n### Secondary Style: Pipeline (0.82)\n\nWithin each
  calendar-producing request, processing follows a fixed four-stage linear pipeline:
  (1) specification assembly — merges YAML default spec, optional remote `specification_url`
  YAML, and query-string parameter overrides; (2) parallel retrieval — `ThreadPoolExecutor`
  (up to 100 workers) fetches all source URLs concurrently, producing `Calendars`
  objects; (3) component collection — each `Calendars` result is passed to `collect_components_from()`,
  appending transformed components to a shared list under an `RLock`; (4) merge/serialise
  — `merge()` assembles the final `Response`. Data flows strictly left-to-right; there
  is no feedback or branching.\n\n### What Was Rejected\n\n**Not Microservices /
  Service-Based:** Exactly one deployable process — `gunicorn -w \"$WORKERS\" open_web_calendar.app:app`.
  No inter-service communication, no API gateway, no service registry.\n\n**Not Event-Driven:**
  No message queues, event buses, or pub/sub. All processing is synchronous and request-scoped.\n\n**Not
  Microkernel:** No plugin discovery mechanism. Calendar source types and output strategies
  are selected via hard-coded conditionals in `app.py`. New types require code changes.\n\n**Not
  Hexagonal:** The `Calendars` ABC provides an interface boundary but the codebase
  lacks bidirectional ports, adapter naming conventions, and domain isolation that
  define Hexagonal.\n\n**Not Serverless:** `vercel.json` routes all paths to a single
  WSGI entrypoint, not decomposed per-function.\n\n### Quality Attribute Evidence\n\n**PRIVACY:**
  Server-side proxying of calendar feeds so visitor browsers never contact calendar
  sources directly.\n\n**SECURITY:** Fernet encryption for CalDAV credentials; aggressive
  lxml/BeautifulSoup HTML sanitisation with 15+ `clean_html_*` spec flags; `flask-allowed-hosts`
  allowlisting.\n\n**DEPLOYABILITY:** Single PyPI package, Docker image (Alpine +
  Gunicorn), and Vercel deployment. Zero external data store dependencies.\n\n**CUSTOMISABILITY:**
  Three-tier YAML/JSON specification override system controls 50+ settings without
  code changes.\n\n**INTERNATIONALISATION:** 25+ language translations; `prefer_browser_language`
  flag for automatic `Accept-Language` negotiation.\n\n**EXTENSIBILITY (limited):**
  New output formats and source protocols require code changes; no plugin registration
  exists."
