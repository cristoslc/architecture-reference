review_notes: 'README describes "a cross-platform framework for building robust,
  scalable distributed applications" using virtual actor model (grains). src/Orleans.Core/
  implements grain activation, placement strategies (src/Orleans.Runtime/Placement/),
  and messaging (src/Orleans.Runtime/Messaging/). Grains are virtual actors with
  automatic lifecycle — activated on demand across cluster nodes with location
  transparency (src/Orleans.Runtime/GrainDirectory/). State persistence via
  src/Orleans.Persistence.*/ providers (Azure, DynamoDB, Memory). Cluster membership
  via src/Orleans.Runtime/MembershipService/ with gossip protocol. Streams
  (src/Orleans.Streaming/) provide pub/sub event-driven messaging between grains.
  Reminders (src/Orleans.Reminders/) for durable timers. Transactions
  (src/Orleans.Transactions/) for distributed ACID across grains. Space-Based because
  virtual actors are processing units with in-memory state distributed across cluster
  nodes with automatic rebalancing. Event-Driven because grain-to-grain communication
  uses asynchronous message passing and the streaming subsystem provides pub/sub.'
