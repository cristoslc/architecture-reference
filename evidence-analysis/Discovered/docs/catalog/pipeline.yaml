  webhook, etc.) each independently deployable, consistent with 30 container_orchestration
  signals and 92 api_specs signals (CRD OpenAPI schemas); (3) the CI/CD domain and
  Kubernetes deployment model strongly reinforce both styles; heuristic_candidates
  confirmed Pipe-and-Filter (0.3) and Microservices (0.7) as the automated classifier''s
  top candidates, with domain knowledge elevating Pipe-and-Filter to primary since
  it is the defining user-facing abstraction of the system.'
