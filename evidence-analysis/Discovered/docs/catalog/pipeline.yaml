classification_reasoning: "## Analysis\n\nThe Tekton Pipelines repository exhibits\
  \ a **Microkernel (Plugin)** architecture as its primary style, with **Pipeline\
  \ (Pipe-and-Filter)** as a secondary architectural pattern.\n\n### Primary: Microkernel\
  \ (Plugin) Architecture\n\n**Strong evidence for plugin infrastructure:**\n\n1.\
  \ **Formal Plugin Interface:** The `Resolver` interface in `pkg/resolution/resolver/framework/interface.go`\
  \ (lines 26-55) defines a clear contract for plugins:\n   - `Initialize(ctx context.Context)\
  \ error`\n   - `GetName(ctx context.Context) string`\n   - `GetSelector(ctx context.Context)\
  \ map[string]string`\n   - `ValidateParams(ctx context.Context, params []pipelinev1.Param)\
  \ error`\n   - `Resolve(ctx context.Context, params []pipelinev1.Param) (ResolvedResource,\
  \ error)`\n\n2. **Multiple Plugin Implementations:** The codebase contains five\
  \ built-in resolvers implementing the interface:\n   - `pkg/resolution/resolver/git/resolver.go`\n\
  \   - `pkg/resolution/resolver/hub/resolver.go`\n   - `pkg/resolution/resolver/bundle/resolver.go`\n\
  \   - `pkg/resolution/resolver/cluster/resolver.go`\n   - `pkg/resolution/resolver/http/resolver.go`\n\
  \n3. **Runtime Registration:** In `cmd/resolvers/main.go` (lines 69-74), plugins\
  \ are instantiated and registered:\n   ```go\n   sharedmain.MainWithConfig(ctx,\
  \ \"controller\", cfg,\n       framework.NewController(ctx, &git.Resolver{}),\n\
  \       framework.NewController(ctx, &hub.Resolver{...}),\n       framework.NewController(ctx,\
  \ &bundle.Resolver{}),\n       framework.NewController(ctx, &cluster.Resolver{}),\n\
  \       framework.NewController(ctx, &http.Resolver{}))\n   ```\n\n4. **Extensibility\
  \ Documentation:** `docs/how-to-write-a-resolver.md` explicitly describes how third\
  \ parties can create new resolvers without modifying the core system: *\"A Resolver\
  \ is a program that runs in a Kubernetes cluster alongside Tekton Pipelines... This\
  \ pattern extends beyond just git, allowing a developer to integrate support for\
  \ other version control systems, cloud buckets, or storage systems without having\
  \ to modify Tekton Pipelines itself.\"*\n\n5. **Custom Task Extension Point:** The\
  \ `CustomRun` CRD documented in `docs/customruns.md` provides another plugin mechanism:\
  \ *\"A CustomRun allows you to instantiate and execute a Custom Task, which can\
  \ be implemented by a custom task controller running on-cluster.\"*\n\n### Secondary:\
  \ Pipeline (Pipe-and-Filter) Architecture\n\n**Evidence for pipeline processing:**\n\
  \n1. **DAG-Based Execution:** `pkg/reconciler/pipeline/dag/dag.go` implements a\
  \ graph-based pipeline scheduler with:\n   - `Node` struct with `Prev` and `Next`\
  \ pointers (lines 40-48)\n   - `Graph` struct representing pipeline topology\n \
  \  - `GetCandidateTasks()` function for determining schedulable tasks based on completion\
  \ state\n\n2. **Data Flow Hierarchy:** The CRDs define a clear pipeline structure:\n\
  \   - `Pipeline` → `PipelineTask` → `Task` → `Step`\n   - Results and artifacts\
  \ flow between tasks\n   - Workspaces provide shared data volumes between pipeline\
  \ stages\n\n3. **Artifact Provenance:** `docs/artifacts.md` describes how data flows\
  \ through the pipeline with input/output tracking and digest verification.\n\n###\
  \ What Was Rejected\n\n- **Not Microservices:** While deployed to Kubernetes, this\
  \ is a single Go module (`go.mod`) with multiple binaries that are components of\
  \ one coordinated system—not independently deployable services owning their own\
  \ data.\n\n- **Not Layered Architecture:** Although there are `pkg/apis/` and `pkg/reconciler/`\
  \ packages, this follows Kubernetes controller patterns (informers/reconcilers),\
  \ not traditional presentation/business/data horizontal layering.\n\n- **Not Domain-Driven\
  \ Design:** No bounded contexts, aggregates, entities, or value objects. The code\
  \ is organized around Kubernetes CRDs and controllers, not domain models.\n\n- **Not\
  \ Event-Driven (primary):** While events are emitted (cloudevents, K8s events),\
  \ the core coordination is synchronous reconciliation through Kubernetes controllers\
  \ watching CRDs, not asynchronous event-driven choreography."
