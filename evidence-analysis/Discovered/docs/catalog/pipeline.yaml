classification_reasoning: "## Architecture Classification Analysis\n\n### Primary Style:\
  \ Pipeline\n\n**PIPELINE (primary, 0.95):** The project's name and fundamental abstraction\
  \ is the CI/CD pipeline itself. `pkg/reconciler/pipeline/dag/dag.go` implements a\
  \ directed acyclic graph (Node, Graph) where each PipelineTask is a node, with edges\
  \ derived from `runAfter` (ordering) and `$(tasks.X.results.Y)` result-passing parameter\
  \ references. The `pipelinerun` reconciler (2005 lines) traverses this DAG on every\
  \ reconcile iteration: it identifies Tasks whose predecessors are complete, starts\
  \ them as Kubernetes Pods, collects their results, and passes results as parameters\
  \ to downstream Tasks via `pkg/substitution`. Inside each Pod, Tekton injects a custom\
  \ `entrypoint` binary (`cmd/entrypoint`) into every Step container; the entrypointer\
  \ uses filesystem-based synchronization (`/tekton/run/<N>/out` marker files) to enforce\
  \ sequential Step execution, implementing a local pipeline within the container group.\
  \ The `finally` block provides a structured termination phase for the main DAG. Data\
  \ flow is explicit, typed, and uni-directional — the canonical definition of the Pipeline\
  \ architectural style.\n\n### Secondary Style: Microkernel\n\n**MICROKERNEL (secondary,\
  \ 0.80):** `pkg/remoteresolution/resolver/framework` defines a `Resolver` interface\
  \ that resolver plugins implement. Five built-in resolvers (git, Tekton Hub, Artifact\
  \ Hub, bundle/OCI, cluster, HTTP) each register as an independent controller via\
  \ `framework.NewController` in `cmd/resolvers/main.go`. The `CustomRun` CRD provides\
  \ a formal extensibility contract for third-party task implementations — external\
  \ controllers can watch `CustomRun` objects and participate in the pipeline result/status\
  \ protocol without modifying core. The webhook process manages CRD version conversion\
  \ (v1alpha1 -> v1beta1 -> v1) through a hub-and-spoke conversion topology. The\
  \ `VerificationPolicy` CRD and `pkg/trustedresources` implement a pluggable policy\
  \ layer for trusted-supply-chain controls via Sigstore signatures.\n\n### Secondary\
  \ Style: Event-Driven\n\n**EVENT-DRIVEN (secondary, 0.70):** The control plane is\
  \ event-driven via the Kubernetes informer/watch pattern. The `pipelinerun` controller\
  \ registers `AddEventHandler` on informers for PipelineRun, TaskRun, CustomRun, ResolutionRequest,\
  \ and Pod objects; any status change triggers a reconcile queue entry, causing the\
  \ controller to re-evaluate the pipeline DAG state. This is a reactive, level-triggered\
  \ event model. Additionally, `pkg/reconciler/events/cloudevent` implements optional\
  \ CloudEvents delivery (CloudEvents SDK v2) to external sinks on every significant\
  \ TaskRun/PipelineRun status transition (`tekton.dev/v1/taskrun/started` etc.),\
  \ enabling integration with Tekton Triggers and external observability systems. Standard\
  \ Kubernetes Events are emitted via `pkg/reconciler/events/k8sevent` on all lifecycle\
  \ transitions.\n\n### What Was Rejected and Why\n\n**Not Microservices:** The three\
  \ Deployments (controller, webhook, resolvers) compile from the same Go module (`github.com/tektoncd/pipeline`)\
  \ and share all type definitions, client-go clients, and business logic. They are\
  \ deployment-split process boundaries of a single application, not independently\
  \ deployable services with their own data stores. All persistent state lives exclusively\
  \ in the Kubernetes API server (etcd).\n\n**Not Modular Monolith:** While the package\
  \ structure is modular, the project defining characteristic is the DAG-scheduled\
  \ pipeline execution model. The Pipeline style captures the essential architectural\
  \ identity; modularity is a consequence of good Go engineering, not the dominant\
  \ structural pattern.\n\n**Not Layered:** The organization is by domain concern (pipeline\
  \ scheduling, task execution, resolution, events, security) rather than horizontal\
  \ presentation/business/data tiers.\n\n**Not CQRS:** While the Kubernetes API server\
  \ provides an implicit read/write separation (lister cache for reads, API server\
  \ for writes), this is a platform pattern, not an intentional CQRS design decision.\n\
  \n### Quality Attributes Evidence\n\n**RELIABILITY:** Knative reconciler framework\
  \ provides level-triggered control loops that re-converge on state drift; leader\
  \ election (config-leader-election-*.yaml) enables HA operation; timeout handling\
  \ in pipelinerun/timeout.go prevents resource leaks.\n\n**EXTENSIBILITY:** Resolver\
  \ plugin framework (five built-in, open for custom); CustomRun CRD extensibility\
  \ contract; VerificationPolicy pluggable trust policy; feature flags\
  \ (config-feature-flags.yaml) for controlled capability rollout.\n\n**OBSERVABILITY:**\
  \ Prometheus metrics via OpenCensus/OpenTelemetry in pipelinerunmetrics and taskrunmetrics\
  \ packages; distributed tracing via OpenTelemetry in reconciler tracing.go files;\
  \ CloudEvents delivery to external sinks; Kubernetes Events for cluster-level audit.\n\
  \n**SECURITY:** SPIRE/SPIFFE workload identity (pkg/spire, go-spiffe/v2, spire-api-sdk\
  \ dependencies); TrustedResources verifies remote pipeline/task definitions against\
  \ Sigstore-based signatures (sigstore/sigstore dependency); admission webhooks enforce\
  \ validation on all CRD writes.\n\n**SCALABILITY:** Tasks execute as independent\
  \ Kubernetes Pods, achieving native horizontal scalability through the Kubernetes\
  \ scheduler; the DAG executor maximally parallelizes independent branches; resolver\
  \ service scales independently of the main controller.\n\n**EVOLVABILITY:** Three-version\
  \ API lifecycle (v1alpha1 -> v1beta1 -> v1) with webhook-managed hub-and-spoke conversion;\
  \ api_compatibility_policy.md documents a formal stability contract; feature flags\
  \ allow controlled rollout of new capabilities."
