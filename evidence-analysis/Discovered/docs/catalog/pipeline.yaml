review_notes: 'Primary: Pipe-and-Filter - core purpose is defining/executing CI/CD
  pipelines as DAGs of Tasks with data flowing between stages (pkg/reconciler/pipeline/dag/dag.go
  implements explicit DAG model; docs/pipelines.md describes Pipeline as collection
  of Tasks in execution order; Task Results pass to downstream Task Parameters). Secondary:
  Event-Driven - built on Kubernetes controller/reconciler pattern with event-triggered
  reconciliation loops (pkg/reconciler/pipelinerun/pipelinerun.go, pkg/reconciler/taskrun/taskrun.go);
  CloudEvents integration (pkg/reconciler/events/cloudevent/); K8s events at lifecycle
  transitions. Not Microservices: single Go module with shared CRDs, not independently
  deployable services.'
