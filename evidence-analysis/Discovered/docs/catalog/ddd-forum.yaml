one_line_summary: A Hacker News-style forum reference application built as an explicit
  teaching exemplar of Domain-Driven Design tactical patterns (aggregates, value objects,
  domain events, repositories) layered with Clean Architecture inside a single deployable
  monolith.
classification_reasoning: "## Analysis\n\nThis repository is an unambiguous reference\
  \ implementation of **Domain-Driven Design (DDD)** with **Layered (Clean Architecture)**\
  \ as the structural organizing principle. The evidence is explicit and comprehensive.\n\
  \n### DDD Evidence\n\n**1. Bounded Contexts:**\nTwo subdomains are clearly delimited\
  \ by directory:\n- `src/modules/users/` — User subdomain (authentication, identity,\
  \ JWT lifecycle)\n- `src/modules/forum/` — Forum subdomain (posts, comments, members,\
  \ voting)\n\nThe README explicitly states: *\"In DDDForum, we have 2 subdomains:\
  \ The users subdomain and the forum subdomain.\"*\n\n**2. Aggregates and Aggregate\
  \ Roots:**\n- `User extends AggregateRoot<UserProps>`\n- `Post extends AggregateRoot<PostProps>`\n\
  - `Member extends AggregateRoot<MemberProps>`\n\n`AggregateRoot<T>` manages domain\
  \ event collection via `addDomainEvent()` and deferred dispatch via\n`DomainEvents.markAggregateForDispatch()`.\n\
  \n**3. Value Objects:**\nExtensive use of `ValueObject<T>` wrapping all domain primitives:\
  \ `UserEmail`, `UserName`, `UserPassword`, `PostTitle`, `PostSlug`, `PostText`,\
  \ `PostLink`, `CommentText`, `PostId`, `CommentId`, `MemberId`, etc.\n\n**4. Domain\
  \ Events:**\n- `IDomainEvent` interface + `DomainEvents` static dispatcher (`src/shared/domain/events/`)\n\
  - Events: `UserCreated`, `UserLoggedIn`, `UserDeleted`, `PostCreated`, `CommentPosted`,\
  \ `PostVotesChanged`, `CommentVotesChanged`, `MemberCreated`\n- Dispatch is triggered\
  \ by Sequelize ORM `afterCreate`/`afterUpdate`/`afterSave` hooks (`src/shared/infra/database/sequelize/hooks/index.ts`)\
  \ — events fire synchronously after persistence commits\n- Subscribers: `AfterUserCreated`,\
  \ `AfterCommentPosted`, `AfterCommentVotesChanged`, `AfterPostVotesChanged`\n\n\
  **5. Repositories with DDD Pattern:**\n- Domain-layer interfaces per aggregate (`IUserRepo`,\
  \ `IPostRepo`, `IMemberRepo`, `ICommentRepo`)\n- Concrete Sequelize implementations\
  \ in `repos/implementations/` subdirectories\n- Dependency inversion enforced: use\
  \ cases depend on interfaces, not Sequelize classes\n\n**6. Domain Services:**\n\
  - `src/modules/forum/domain/services/postService.ts` encapsulates vote resolution\
  \ logic crossing multiple aggregates\n\n**7. Mappers and DTOs:**\n- `UserMap`, `PostMap`,\
  \ `CommentMap`, `MemberMap`, `PostDetailsMap` translate between domain objects,\
  \ persistence rows, and transport DTOs\n- Per-use-case DTO types (e.g., `CreateUserDTO`,\
  \ `CreatePostDTO`, `ReplyToPostDTO`)\n\n### Layered Architecture (Clean Architecture\
  \ Variant)\n\nEach bounded context enforces a strict inward dependency rule across\
  \ four layers:\n- **Domain:** Entities, AggregateRoots, ValueObjects, DomainEvents,\
  \ DomainServices\n- **Application:** UseCase classes implementing `UseCase<IRequest,\
  \ IResponse>`\n- **Adapter:** Repo interfaces, Mappers, DTOs\n- **Infrastructure:**\
  \ Sequelize models/hooks, Express controllers/routes, Redis auth service, Apollo\
  \ GraphQL server\n\nConstructor injection wires concrete implementations at module\
  \ index files, preserving the dependency inversion principle throughout.\n\n### Deployment\
  \ Topology\n\nSingle deployable monolith:\n- One `package.json`, one `Dockerfile`\n\
  - `docker-compose.yml` provisions only supporting infrastructure (MySQL, Redis, Adminer)\
  \ — no application service decomposition\n- Single Express process serving REST\
  \ (`/api/v1`) and GraphQL (Apollo Server middleware) on one port\n\n### What This\
  \ Is Not\n\n- **NOT Hexagonal Architecture:** The inward-dependency boundary exists\
  \ but ports are not formally named types; the project follows Clean Architecture\
  \ vocabulary, not Hexagonal/Ports-and-Adapters.\n- **NOT Microservices/Service-Based:**\
  \ Single process, single deployment unit.\n- **NOT CQRS:** `PostDetails` and `MemberDetails`\
  \ are query projections built inside the same repository — not a distinct read model\
  \ updated by events.\n- **NOT Event-Driven Architecture (macro):** Domain events\
  \ are intra-process synchronous callbacks dispatched by Sequelize hooks, not message\
  \ broker-based inter-service messaging.\n\n### Conclusion\n\nDDD is the dominant\
  \ architectural style — the entire structure revolves around the domain model. Clean\
  \ Architecture layering is the secondary principle that provides structural organization\
  \ within each bounded context. The project is a single-process monolith making it\
  \ the canonical exemplar for teaching DDD tactical patterns within a Layered architecture."
