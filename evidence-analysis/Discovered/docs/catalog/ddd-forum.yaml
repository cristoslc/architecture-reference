review_notes: "Evidence: README.md explicitly states 'built with Clean Architecture and DDD best practices.' src/modules/ contains two bounded contexts (users/, forum/) each with domain/application/adapter/infrastructure layers. src/shared/domain/ provides DDD building blocks: AggregateRoot.ts, Entity.ts, ValueObject.ts, WatchedList.ts, DomainEvents.ts. Forum domain has rich domain model: post.ts (aggregate root), comment.ts, member.ts with value objects (postSlug, postText, commentText, etc.). Domain events: userCreated, postCreated, commentPosted, postVotesChanged, commentVotesChanged. Event subscriptions in src/modules/forum/subscriptions/ (afterUserCreated, afterCommentPosted, afterPostVotesChanged). Repos use interface/implementation separation (IPostRepo -> sequelizePostRepo). Use cases organized per-feature (createPost, upvotePost, login, etc.). Single deployable unit with docker-compose.yml running mysql+redis+adminer. No microservices decomposition."