review_notes: 'README headline: ''Build intelligent AI agents and multi-agent systems
  with this enterprise-ready orchestration framework''. Multi-Agent evidence: python/semantic_kernel/agents/
  has agent.py, orchestration/ (sequential.py, concurrent.py, group_chat.py, handoffs.py,
  magentic.py), runtime/ with actor-based message passing (routed_agent.py, message_context.py,
  in_process_runtime.py), strategies/ for selection/termination. dotnet/src/Agents/
  has Core, Orchestration (Sequential, Concurrent, GroupChat, Handoff, Magentic),
  A2A agent-to-agent protocol, Runtime (Abstractions, Core, InProcess). Pipe-and-Filter
  evidence: python/semantic_kernel/processes/ has process_builder.py with add_step/ProcessEdgeBuilder
  pattern, kernel_process/ step pipeline. dotnet/src/Experimental/Process.* modules.
  Kernel class itself chains plugins, functions, and filters (function_invocation_filters,
  prompt_rendering_filters, auto_function_invocation_filters) as middleware pipeline.
  Multi-language SDK (Python, C#, Java) -- classifying what the repo IS (an agent
  orchestration SDK), not what it enables.'
