review_notes: 'README identifies this as the official CloudEvents SDK for Go. Core
  in v2/ has explicit layers: event (data model), binding (encoding/message abstraction
  with transformer pipeline), protocol (transport interfaces defined in protocol/doc.go
  as decoupling layer), and client (high-level facade). v2/alias.go re-exports layered
  internals as convenience API. Protocol implementations (HTTP, Kafka, AMQP, NATS,
  MQTT, PubSub, WebSocket) are separate Go modules under protocol/. The binding/transformer/
  package implements composable pipe-and-filter pattern with add_metadata, delete_metadata,
  set_metadata, and version transformers. Messages flow through MessageReader -> Transformer
  chains -> StructuredWriter/BinaryWriter pipeline. Classified as what the repo IS
  (a layered SDK with pipe-and-filter encoding), not what it enables (event-driven
  applications).'
