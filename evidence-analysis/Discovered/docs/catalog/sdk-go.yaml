review_notes: "The Go SDK for CloudEvents is structured using **Hexagonal Architecture**\
  \ (Ports and Adapters). The codebase is designed to isolate the core domain—the\
  \ `CloudEvent` entity and its manipulation logic—from the numerous transport protocols\
  \ (HTTP, Kafka, NATS, AMQP, etc.) that carry these events.\n\n### Reasoning:\n\n\
  1.  **Core Domain Isolation (The Hexagon):**\n    The core \"inside\" of the application\
  \ is the `v2/event` and `v2/binding` logic. This layer defines how a CloudEvent\
  \ is represented in memory and provides abstract interfaces for handling them. The\
  \ presence of `v2/binding/message.go` and `v2/binding/transformer.go` acts as the\
  \ primary \"Port,\" defining a generic protocol-agnostic way to interact with an\
  \ event regardless of its wire format.\n\n2.  **Adapters (The Outside):**\n    The\
  \ repository contains a vast collection of adapters located in the `protocol/` directory\
  \ (e.g., `protocol/amqp`, `protocol/kafka_sarama`, `protocol/nats`). Each of these\
  \ sub-modules implements the logic to map technology-specific envelopes (like a\
  \ Kafka message or an HTTP request) into the core `CloudEvent` model. These are\
  \ classic \"Adapters\" that connect the core logic to external infrastructure."
