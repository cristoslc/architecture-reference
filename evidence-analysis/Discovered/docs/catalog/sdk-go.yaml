classification_reasoning: |
  ## Architecture Classification Analysis

  ### Primary: Microkernel

  The cloudevents/sdk-go repository is a textbook Microkernel (Plugin) architecture.
  The evidence is consistent across module boundaries, interface definitions, and
  dependency graphs.

  **1. Stable kernel module (v2/)**

  The core is the single `github.com/cloudevents/sdk-go/v2` module. Its `v2/go.mod`
  has zero dependency on any protocol or observability implementation. It contains:

  - `v2/event`: canonical `Event` struct + `EventContext` for spec versions 0.3 and 1.0
  - `v2/binding`: `Message`, `MessageReader`, `Transformer` — the primary plugin contract
  - `v2/protocol`: `Sender`, `Receiver`, `Requester`, `Responder`, `Opener`, `Closer`
    interfaces — the extension points
  - `v2/client`: plugin host; accepts any object implementing the protocol interfaces
  - `v2/types`, `v2/context`, `v2/extensions`, `v2/observability`: shared utilities

  **2. Interface-defined extension points**

  `v2/protocol/inbound.go` and `v2/protocol/outbound.go` define the five capability
  interfaces plugins may implement. The kernel does not care which subset a plugin
  satisfies — missing capabilities are simply absent.

  **3. Plugin host via duck typing**

  `v2/client/client.go` discovers plugin capabilities at construction time through
  Go interface type assertions (lines 65-79):

      if p, ok := obj.(protocol.Sender); ok     { c.sender = p }
      if p, ok := obj.(protocol.Requester); ok  { c.requester = p }
      if p, ok := obj.(protocol.Responder); ok  { c.responder = p }
      if p, ok := obj.(protocol.Receiver); ok   { c.receiver = p }
      if p, ok := obj.(protocol.Opener); ok     { c.opener = p }

  This is the canonical Microkernel plugin-host pattern.

  **4. Nine independently-versioned protocol plugins**

  The `protocol/` directory contains nine sub-modules, each with its own `go.mod`:
  amqp, kafka_confluent, kafka_sarama, mqtt_paho, nats, nats_jetstream,
  nats_jetstream/v3, pubsub, stan, ws. Two observability plugins (opencensus,
  opentelemetry) follow the same pattern by implementing `client.ObservabilityService`.

  Each plugin:
  - Imports only `github.com/cloudevents/sdk-go/v2/binding` and `v2/protocol`; never
    imports another plugin.
  - Declares compile-time conformance assertions (e.g.,
    `var _ protocol.Sender = (*Protocol)(nil)`).
  - Uses a `replace` directive to reference the local kernel during development.

  **5. Selective import = selective inclusion**

  Adopters import only the protocol they need:
  `go get github.com/cloudevents/sdk-go/protocol/kafka_sarama/v2`.
  Unused plugins add zero weight to the final binary. This is Microkernel's defining
  deployment characteristic.

  ### Secondary Design Approach: Hexagonal (Ports and Adapters)

  The kernel boundary exhibits textbook ports-and-adapters structuring:
  - Ports: `v2/protocol` interfaces and `v2/binding` interfaces
  - Adapters: each protocol module adapting an external broker to the port interfaces
  - Core isolation: `v2/client` and `v2/event` depend only on abstractions

  Hexagonal isolation reinforces the Microkernel model but is a structural design
  approach, not the topology-defining style. It belongs in `architecture_qualifiers`.

  ### Rejected Styles

  - **Layered**: No horizontal layering (presentation/business/data). The dominant
    axis is vertical plugin extension.
  - **Modular Monolith**: Plugins are independently importable Go modules, not
    modules within a single deployable unit.
  - **Event-Driven**: The SDK transports CloudEvents but internally uses direct
    synchronous interface calls between its own components. No event bus between
    kernel and plugins.
  - **Pipeline**: The `binding.Transformer` chain is an intra-message encoding
    detail within the write path, not the system's primary topology.
  - **Microservices / Service-Based**: This is a library, not a deployed service mesh.
  - **CQRS / DDD / Serverless / Space-Based / Multi-Agent**: None of these topologies
    appear as organizing principles in the codebase.
  - **Indeterminate**: Architecture is clear and consistent throughout.
