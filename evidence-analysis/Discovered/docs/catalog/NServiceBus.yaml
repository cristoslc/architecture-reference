review_notes: 'README: ''NServiceBus is part of the Particular Service Platform''
  for building distributed systems with message queues. Core architecture evidence:
  src/NServiceBus.Core/Pipeline/ contains IBehavior<TInContext,TOutContext> (filters),
  StageConnector (stage-linking pipes), ForkConnector (pipeline forking), PipelineModelBuilder
  (topological sort of behaviors), PipelineTerminator. Message processing: MainPipelineExecutor
  drives messages through receivePipeline. Event-driven evidence: IHandleMessages<T>
  handler interface, Routing/ with publish/subscribe (ISubscriptionManager, NativePublishSubscribeFeature,
  UnicastPublishRouter), Transports/ with transport abstractions (IMessageDispatcher,
  IMessageReceiver, TransportDefinition). Sagas/ for long-running orchestration. Supports
  Azure Service Bus, SQS/SNS, RabbitMQ, SQL Server transports.'
