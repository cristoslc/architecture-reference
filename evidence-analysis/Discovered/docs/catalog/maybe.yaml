one_line_summary: "A Rails 7 personal finance platform organized as a Layered Modular Monolith with named domain sub-namespaces, a Provider registry abstraction for all external integrations, and a Sidekiq async tier for sync and AI workloads."
classification_reasoning: "Maybe exhibits a two-style composition: Layered as primary and Modular Monolith as secondary.\n\nLAYERED (primary, 0.88): The application follows strict horizontal layering throughout. Presentation: ERB views, ViewComponent components, and Hotwire/Stimulus JS controllers. Application: Rails controllers (HTTP) and Sidekiq jobs (async), with no business logic in controllers. Domain: plain Ruby objects organized per concept (Account::Syncer, Balance::Materializer, Balance::ForwardCalculator, Balance::ReverseCalculator, Rule::Registry, Rule::ActionExecutor, Assistant::Responder, PlaidItem::Importer, PlaidItem::WebhookProcessor). Infrastructure: Provider hierarchy (Provider::Plaid, Provider::Openai, Provider::Synth, Provider::Stripe, Provider::Github) behind Provider::Registry, all returning normalized Provider::Response value objects. Middleware: Doorkeeper OAuth2 + Rack::Attack rate limiting sit above Rails as an HTTP middleware layer. AASM state machines on Account and Sync enforce lifecycle rules at domain boundaries. The Syncable concern dispatches SyncJob to Sidekiq, decoupling sync initiation (models) from execution (workers) without crossing a service boundary.\n\nMODULAR MONOLITH (secondary, 0.80): Single-process deployment (Puma + Sidekiq from one Docker image). Single shared PostgreSQL database. Domain clusters are internally cohesive — account/, balance/, rule/, assistant/, plaid_item/, family/, holding/, trade/, transaction/ — each with named sub-objects that do not leak into adjacent clusters. The API namespace (api/v1/) is co-deployed in the same Rails process via Doorkeeper JWT. Shared concerns (Syncable, Monetizable, Enrichable, Anchorable, Reconcileable) are applied via ActiveSupport::Concern mixins rather than shared libraries, keeping domain objects decoupled from each other while sharing infrastructure behavior.\n\nRULED OUT - Microservices: One Rails process, one PostgreSQL database, one Docker image. No inter-service communication, no independent deployment per domain.\n\nRULED OUT - Event-Driven (primary): Sidekiq jobs and ActiveCable provide async processing, but these are the async tier of the layered architecture, not a message-broker-based decoupling mechanism between autonomous components. No Kafka/RabbitMQ/event store.\n\nRULED OUT - Hexagonal Architecture: The Provider abstraction creates port-like interfaces, but controllers interact directly with ActiveRecord models. No explicit inbound/outbound port interfaces; layering is Rails-conventional, not hexagonal.\n\nRULED OUT - CQRS: Reads and writes share the same ActiveRecord models and schema. Balance::Materializer is a materialized-view optimization, not CQRS separation.\n\nRULED OUT - Serverless: Packaged as long-running Puma + Sidekiq processes; Docker-deployed.\n\nQUALITY ATTRIBUTES evidence: Deployability — single-image Docker; compose.example.yml enables self-hosting with two containers; SELF_HOSTED env var toggles managed vs. self-hosted mode. Testability — vcr/webmock for provider HTTP isolation; mocha for unit; Capybara for integration; provider registry returns nil for unconfigured providers enabling feature-flagged tests. Maintainability — domain sub-namespaces prevent cross-cutting coupling; shared concerns codified as ActiveSupport::Concern mixins; AASM state machines make lifecycle explicit. Observability — Sentry (errors + Sidekiq), Skylight (performance, production), Logtail (log aggregation), Rack::MiniProfiler (dev), vernier/stackprof profiling. Security — Doorkeeper OAuth2 for API, Rack::Attack rate limiting, ROTP/RQRCODE for MFA, bcrypt passwords, JWT, ActiveRecord encryption for Plaid access tokens. Extensibility — Provider::Registry allows swapping data providers (exchange rates, securities, LLM) with zero controller changes. Availability — Sidekiq queue priority (high_priority for sync and AI); sidekiq-cron for market data, sync cleaning, and security health checks; sync state machine with 24h stale detection and hourly cleanup. Interoperability — Plaid (US + EU) for bank connectivity; Synth for market data/exchange rates; OpenAI (gpt-4.1) for AI chat and auto-categorization; Stripe for billing; Doorkeeper for third-party OAuth API."
