review_notes: 'The repository follows a classic **Layered** architecture, specifically
  the "Rails Way" (Model-View-Controller). However, it exhibits significant **Domain-Driven
  Design (DDD)** influences in how the model layer is structured to handle high domain
  complexity.


  ### Evidence for Layered Architecture

  The codebase is a monolithic Ruby on Rails application. It follows the standard
  horizontal layering:

  - **Presentation Layer**: Found in `app/components` (using ViewComponent), `app/javascript/controllers`
  (Stimulus.js), and traditional Rails views (though not fully visible in the tree,
  inferred from the presence of `UI` components).

  - **Business Logic Layer**: Centered in `app/models`.

  - **Data Access Layer**: Handled by `application_record.rb` and ActiveRecord models,
  mapping directly to PostgreSQL.

  - **Persistence/Infrastructure**: Found in `app/mailers` and `app/data_migrations`.


  ### Evidence for Domain-Driven Design (DDD)'
