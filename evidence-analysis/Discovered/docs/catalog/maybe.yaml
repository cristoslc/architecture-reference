review_notes: 'Evidence: Single Rails app structure under app/ with controllers/,
  models/, jobs/, mailers/, components/ — classic MVC layered pattern. Models show
  domain groupings with subdirectories (account/, balance/, family/, transaction/,
  etc.) indicating modular organization within a monolith. Background jobs (app/jobs/)
  for async work. No separate service directories, no Kubernetes/Helm, no messaging
  infrastructure (Kafka/RabbitMQ), no API gateway — ruling out Microservices and Event-Driven.
  Docker Compose used for single-app deployment per README. The cursor rules files
  (.cursor/rules/) suggest internal conventions enforcing module boundaries. PostgreSQL
  as single shared database confirms modular monolith rather than microservices.'
