review_notes: "Standard Rails MVC: 56 controllers, 93+ models, extensive views. CLAUDE.md explicitly states 'Skinny Controllers, Fat Models' and 'avoid app/services'. Services dir has only 2 files. 22+ model subdirectories (account/, family/, balance/, holding/) organize domain POROs and concerns. Docker compose deploys single image as web + Sidekiq worker - standard Rails deployment, not microservices. Background jobs via Sidekiq with priority queues. Hotwire/Turbo for frontend. ViewComponent for reusable UI. Domain concerns (Syncable, Monetizable, Accountable) provide cross-cutting behavior. Rich but conventional Rails layered architecture."