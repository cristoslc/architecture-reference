classification_reasoning: "## Analysis\n\n### Architecture Classification: Modular\
  \ Monolith\n\n**Primary Evidence:**\n\n1. **Single Deployable Unit**: The repository\
  \ builds a single NestJS server application (`packages/server`) that is deployed\
  \ as one container. The production Dockerfile (`packages/server/Dockerfile`) produces\
  \ a single artifact: `node packages/server/dist/main.js`.\n\n2. **Enforced Module\
  \ Boundaries**: The server contains **79 feature modules** under `packages/server/src/modules/`,\
  \ each organized around business domains:\n   - Accounts, Bills, Customers, Expenses,\
  \ Invoices, Banking, Inventory\n   - Each module is a NestJS `@Module` with explicit\
  \ imports/exports\n   - Modules contain controllers, services, repositories, models,\
  \ and DTOs\n\n3. **Module Structure Pattern**: Each module follows a consistent\
  \ structure:\n   - Controllers (`Accounts.controller.ts`) - HTTP layer\n   - Application\
  \ services (`AccountsApplication.service.ts`) - orchestrates use cases\n   - Granular\
  \ services (`CreateAccount.service.ts`, `GetAccount.service.ts`) - single responsibility\n\
  \   - Repositories (`Account.repository.ts`) - data access layer\n   - Models (`Account.model.ts`)\
  \ - Objection.js ORM entities\n\n4. **Multi-Tenant Database Architecture**: \n \
  \  - System database for tenant management\n   - Per-tenant databases (`bigcapital_tenant_{organizationId}`)\n\
  \   - Dynamic connection routing via `TenancyDatabaseProxyProvider` (`src/modules/Tenancy/TenancyDB/TenancyDB.module.ts`)\n\
  \   - Request-scoped tenancy context with guards (`TenancyGlobalGuard`, `EnsureTenantIsInitializedGuard`)\n\
  \n5. **Monorepo Structure**: Uses pnpm workspaces + Lerna with shared packages:\n\
  \   - `packages/server` - Backend monolith\n   - `packages/webapp` - React frontend\n\
  \   - `shared/` - SDK, utilities, templates\n\n### Secondary Style: Layered\n\n\
  The architecture exhibits clear horizontal layering within each module:\n- **Presentation\
  \ Layer**: Controllers handle HTTP requests/responses (`@Controller` classes)\n\
  - **Application/Business Logic Layer**: Services implement business rules (`@Injectable`\
  \ services)\n- **Data Access Layer**: Repositories abstract database operations\
  \ (`TenantRepository` base class)\n- **Models**: Objection.js ORM models extending\
  \ `BaseModel`\n\nExample from `Accounts.module.ts`:\n```typescript\n@Module({\n\
  \  imports: [TenancyDatabaseModule, DynamicListModule, ...models],\n  controllers:\
  \ [AccountsController],\n  providers: [\n    AccountsApplication,\n    CreateAccountService,\n\
  \    AccountRepository,\n    ...\n  ],\n})\n```\n\n### Not Microservices\n\nThe\
  \ architecture is explicitly **not microservices**:\n- Single server process, not\
  \ multiple independently deployable services\n- No service discovery, API gateway,\
  \ or inter-service communication\n- Database-per-tenant pattern is about multi-tenancy,\
  \ not service ownership\n- All modules share the same NestJS runtime and dependency\
  \ injection container\n\n### Not Event-Driven Architecture\n\nWhile the application\
  \ uses `@nestjs/event-emitter` for internal events (defined in `src/common/events/events.ts`)\
  \ and BullMQ queues for background jobs, these are implementation details within\
  \ a monolith—not the primary architectural style. Events are used for side effects\
  \ (e.g., `onAccountCreated`, `onSaleInvoiceDelivered`) within a single application\
  \ boundary.\n\n### Not Domain-Driven Design\n\nDespite having domain-oriented modules,\
  \ the architecture lacks:\n- Aggregates with enforced consistency boundaries\n-\
  \ Domain events as first-class citizens\n- Bounded context isolation (all modules\
  \ share the same database schema)\n- Ubiquitous language artifacts\n\nThe modules\
  \ are organized by business capability but don't implement DDD tactical patterns.\n\
  \n### Key Files Supporting Classification:\n\n- `packages/server/src/modules/App/App.module.ts`\
  \ - Root module importing 50+ feature modules\n- `packages/server/src/modules/Tenancy/Tenancy.module.ts`\
  \ - Tenant isolation guards\n- `packages/server/src/modules/Accounts/Accounts.module.ts`\
  \ - Typical module structure\n- `packages/server/Dockerfile` - Single container\
  \ deployment\n- `docker-compose.prod.yml` - 3 services: proxy, server, webapp (not\
  \ microservices)"
