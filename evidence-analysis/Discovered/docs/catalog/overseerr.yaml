review_notes: "### Architecture Analysis\n\nOverseerr is structured as a **Layered\
  \ Monolith**. The codebase is explicitly split into a frontend (Next.js/React, implied\
  \ by `next.config.js` and `public/`) and a backend (Express.js, located in the `server/`\
  \ directory). \n\nThe backend follows a classic horizontal layering pattern:\n1.\
  \  **Routing/Presentation Layer**: Found in `server/routes/`, where API endpoints\
  \ (e.g., `movie.ts`, `auth.ts`, `settings/`) are defined.\n2.  **Logic/Service Layer**:\
  \ Found in `server/lib/`, containing business logic for scanners (`scanners/`),\
  \ notification handling (`notifications/`), and external service integrations (Sonarr/Radarr/Plex).\n\
  3.  **Data Access/Persistence Layer**: Controlled via **TypeORM**, evidenced by\
  \ `server/entity/` (database schemas like `User.ts`, `MediaRequest.ts`), `server/migration/`\
  \ (SQL schema changes), and `server/subscriber/` (database lifecycle hooks).\n\n\
  #### Why Layered?"
