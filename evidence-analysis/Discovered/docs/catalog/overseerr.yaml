classification_reasoning: "## Analysis\n\nOverseerr is a **Layered Architecture**\
  \ monolith with **Event-Driven** patterns used internally for notifications and\
  \ data synchronization.\n\n### Evidence for Layered Architecture\n\n**Clear horizontal\
  \ layer separation:**\n\n1. **Presentation Layer (`src/`)**: Next.js/React frontend\
  \ with components, pages, hooks, and context providers (`src/components/`, `src/pages/`,\
  \ `src/hooks/`, `src/context/`)\n\n2. **API/Route Layer (`server/routes/`)**: Express\
  \ routers handling HTTP endpoints:\n   - `auth.ts`, `request.ts`, `media.ts`, `movie.ts`,\
  \ `tv.ts`, `user/`, `settings/`\n   - These act as controllers, validating requests\
  \ and delegating to business logic\n\n3. **Business Logic Layer (`server/lib/`)**:\
  \ Core domain logic including:\n   - `permissions.ts` - Permission checking logic\n\
  \   - `settings.ts` - Application configuration management\n   - `availabilitySync.ts`,\
  \ `downloadtracker.ts`, `watchlistsync.ts` - Synchronization logic\n   - `notifications/`\
  \ - Notification management system\n\n4. **Data Access Layer (`server/entity/`)**:\
  \ TypeORM entities with ORM mappings:\n   - `Media.ts`, `MediaRequest.ts`, `User.ts`,\
  \ `Issue.ts`, `Session.ts`\n   - Repository pattern via TypeORM's `getRepository()`\n\
  \   - Database migrations in `server/migration/`\n\n5. **External API Integration\
  \ Layer (`server/api/`)**: Integrations with external services:\n   - `plexapi.ts`,\
  \ `themoviedb/`, `servarr/radarr.ts`, `servarr/sonarr.ts`\n\n**Single deployment\
  \ unit**: One `Dockerfile`, one `package.json`, producing a single containerized\
  \ application using Express + Next.js with SQLite database.\n\n### Evidence for\
  \ Event-Driven (Secondary)\n\n**Internal event-driven patterns:**\n\n1. **TypeORM\
  \ Subscribers** (`server/subscriber/`):\n   - `MediaRequestSubscriber.ts` - Listens\
  \ for MediaRequest insert/update events and triggers notifications\n   - `IssueSubscriber.ts`,\
  \ `IssueCommentSubscriber.ts` - Similar event handling for issues\n\n2. **Notification\
  \ Agent System** (`server/lib/notifications/`):\n   - Observer pattern with `NotificationManager`\
  \ class registering multiple agents\n   - 11 notification agents: Discord, Email,\
  \ Telegram, Slack, Pushover, Webhook, etc.\n   - Events like `MEDIA_PENDING`, `MEDIA_APPROVED`,\
  \ `MEDIA_AVAILABLE` trigger notifications\n\n3. **Scheduled Jobs** (`server/job/schedule.ts`):\n\
  \   - `node-schedule` for periodic sync operations\n   - Plex library scans, Radarr/Sonarr\
  \ scans, Watchlist sync\n\nThese event-driven patterns are **internal implementation\
  \ details** within the layered monolith, not inter-service communication.\n\n###\
  \ What This Is NOT\n\n- **Not Microservices**: Single deployable, single database\
  \ (SQLite), no service boundaries\n- **Not Modular Monolith**: No enforced module\
  \ boundaries or module-scoped schemas; entities share the same database\n- **Not\
  \ DDD**: No bounded contexts, aggregates, or value objects pattern visible\n- **Not\
  \ Hexagonal**: No ports/adapters abstraction; direct dependencies without interface\
  \ isolation\n- **Not Serverless**: Traditional server deployment via Docker, not\
  \ function-based\n\n### Deployment Topology\n\n```\nSingle Container (Docker)\n\
  ├── Express.js Backend (server/)\n│   ├── Routes (API endpoints)\n│   ├── Business\
  \ Logic (lib/)\n│   ├── Entities (ORM models)\n│   └── SQLite Database\n└── Next.js\
  \ Frontend (src/)\n    └── React Components/Pages\n```\n\nThe architecture follows\
  \ a classic layered web application pattern with clear separation between presentation,\
  \ business logic, and data access layers."
