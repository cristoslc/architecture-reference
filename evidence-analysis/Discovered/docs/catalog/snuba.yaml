one_line_summary: "Sentry's ClickHouse analytics broker organized as an explicit typed pipeline (ingestion, query, subscription) over a strict three-layer domain model (Dataset -> Entity -> Storage), with Kafka as the event-driven transport and a Rust consumer for high-throughput batched ingestion."
classification_reasoning: "Pipeline is the primary architectural style because the system explicitly codifies every data path as a chain of typed QueryPipelineStage[Tin, Tout] stages — EntityProcessingStage, StorageProcessingStage, and ExecutionStage for queries; HealthCheck -> SetJoinTimeout -> MessageTransformer -> Reduce -> ClickhouseWriterStep for ingestion (both Python Arroyo and Rust Arroyo implementations); and a scheduler-topic -> executor-consumer -> result-topic chain for subscriptions. Layered is co-primary because the domain model is organized into three strict horizontal layers (Dataset / Entity / Storage) with enforced downward-only dependencies, a declarative initialization order (storages -> entities -> datasets), and YAML-driven config files that separate schema from behavior. CQRS is a structural signal — ReadableStorage and WritableTableStorage are distinct class hierarchies with fully separate read and write code paths — but not a primary style since it is an implementation pattern within the layered model. The entire system deploys as a single Python package with multiple CLI entry points (api, consumer, rust-consumer, replacer, subscriptions-scheduler, subscriptions-executor, migrations), making it a Modular Monolith in deployment, but Pipeline + Layered captures the organizing architectural forces."
