review_notes: 'README states ''demonstrate the simplest approach to Clean Architecture
  with .NET Core''. Src/ has 5 projects: Domain (zero deps, entities+value objects),
  Application (Commands/Queries via MediatR IRequest/IRequestHandler, port interfaces
  like INorthwindDbContext, INotificationService), Infrastructure (adapter implementations),
  Persistence (EF Core adapter for INorthwindDbContext), WebUI (ASP.NET+Angular).
  Dependency direction strictly enforced: Domain->nothing, Application->Domain, Infrastructure->Application,
  WebUI->Infrastructure+Persistence. CQRS evidenced by explicit Commands/ and Queries/
  folders per feature (Categories, Customers, Employees, Products) with MediatR dispatch.
  ValueObject base class references Microsoft DDD patterns. Single deployable unit,
  no microservices or event bus.'
