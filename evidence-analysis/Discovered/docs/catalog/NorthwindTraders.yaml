  ### Evidence for CQRS (Command Query Responsibility Segregation)

  The internal structure of the `Application` layer is strictly organized by Commands
  and Queries rather than by service-based grouping:

  - `Src/Application/Customers/Commands`

  - `Src/Application/Customers/Queries`

  - `Src/Application/Products/Commands`

  - `Src/Application/Products/Queries`

  This layout, combined with the presence of `Behaviours` (typically used with MediatR
  in .NET), indicates that the system separates read and write operations into distinct
  objects.


  ### Evidence for Domain-Driven Design (DDD)

  The repository employs several DDD tactical patterns:

  - **Entities and Value Objects**: Located in `Src/Domain/Entities` and `Src/Domain/ValueObjects`,
  using a base `ValueObject` class to handle equality logic.

  - **Bounded Contexts**: While organized as a single monolith, the folder names under
  `Application` (Customers, Products, Employees) align with domain boundaries.

  - **Auditable Entities**: Uses a common `AuditableEntity` base to manage metadata
  across the domain.


  ### Rejected Styles

  - **Layered (Traditional)**: Rejected because it does not follow the traditional
  "UI -> Service -> Data" dependency flow; instead, it uses Dependency Inversion to
  ensure the Core is independent of the Database.

  - **Microservices**: Rejected as the solution compiles into a single deployable
  unit (the WebUI project) and sits within a single `.sln` (solution) file.

  - **Modular Monolith**: While it has modules, the separation is primarily by technical
  layer (Clean Architecture) rather than strict vertical functional slicing that encapsulates
  its own persistence per module.'
