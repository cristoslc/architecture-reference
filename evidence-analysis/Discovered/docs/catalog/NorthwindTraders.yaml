review_notes: 'This repository is a classic implementation of **Hexagonal Architecture**
  (commonly referred to in the .NET ecosystem as **Clean Architecture**, as explicitly
  stated in the README). The codebase is structured into concentric layers where dependencies
  point inwards toward the core logic, isolating the application from external concerns
  like databases and UI frameworks.


  ### Evidence for Hexagonal Architecture

  The project is divided into distinct projects within the `Src/` directory that map
  directly to Hexagonal/Clean layers:

  1.  **Domain (`Src/Domain`)**: The "Center." It contains enterprise logic, entities
  (e.g., `Customer.cs`, `Product.cs`), and value objects (`AdAccount.cs`), with zero
  dependencies on other layers.

  2.  **Application (`Src/Application`)**: The "Core." This layer defines the interfaces
  (`Src/Application/Common/Interfaces`) that act as **Ports**. It contains the business
  flow logic and is independent of data access or UI frameworks.

  3.  **Infrastructure/Persistence (`Src/Infrastructure`, `Src/Persistence`)**: The
  **Adapters**. These projects implement the interfaces defined in the Application
  layer (e.g., `NorthwindDbContext.cs` implementing database access).

  4.  **WebUI (`Src/WebUI`)**: The entry point or "Primary Adapter," containing the
  controllers and the frontend (Angular).


  ### Evidence for CQRS (Command Query Responsibility Segregation)'
