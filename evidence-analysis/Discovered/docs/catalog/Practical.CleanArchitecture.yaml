classification_reasoning: "This repository is a comprehensive architectural reference\
  \ project. While it contains multiple implementations (including a Monolith and\
  \ a Modular Monolith inside the `src/` directory), the **Microservices** architecture\
  \ is the most feature-complete and sophisticated representation of the codebase's\
  \ organization, specifically designed for independent deployment and scaling.\n\n\
  ### Architectural Evidence:\n\n1.  **Microservices (Primary Style):**\n    The directory\
  \ `src/Microservices/` contains distinct, independently deployable services such\
  \ as:\n    *   `Services.Notification`, `Services.Identity`, `Services.Product`,\
  \ `Services.AuditLog`, `Services.Storage`, and `Services.Configuration`.\n    *\
  \   **Independent Deployment Units:** Each service contains its own solution (`.sln`)\
  \ file, `docker build.txt` file, and dedicated API/Background projects.\n    * \
  \  **Orchestration & Infrastructure:** The repo includes a root `docker-compose.yml`\
  \ (in the Microservices folder), Kubernetes manifests (`.k8s/*.yaml`), and Helm\
  \ charts (`.helm/`), which are key indicators of a Microservices architecture.\n\
  \    *   **API Gateways:** It implements specialized gateways in `src/Microservices/Gateways.WebAPI`\
  \ and `src/Microservices/Gateways.GraphQL`.\n\n2.  **Domain-Driven Design (Secondary\
  \ Style):**\n    Each microservice and the monolith variants follow DDD principles:\n\
  \    *   **Bounded Contexts:** Services are split by domain concerns (Identity,\
  \ Product, AuditLog).\n    *   **Internal Structure:** Within each service (e.g.,\
  \ `src/Microservices/Common/ClassifiedAds.Domain`), there are clear separations\
  \ for Domain logic, Application logic, and Persistence.\n    *   **Contracts:**\
  \ Shared integration definitions are managed via `src/Microservices/Contracts`.\n\
  \n3.  **Hexagonal Architecture (Secondary Style):**\n    The README explicitly documents\
  \ and diagrammatically explains the use of Hexagonal and Onion patterns. This is\
  \ physically realized in the code through:\n    *   **Ports & Adapters:** The `ClassifiedAds.Infrastructure`\
  \ and `ClassifiedAds.Persistence.*` projects act as adapters for external concerns\
  \ (SQL Server, MySQL, Azure S3, RabbitMQ).\n    *   **Persistence Ignorance:** The\
  \ core logic depends on interfaces defined in the Domain/Application layers, with\
  \ concrete implementations injected via the Infrastructure layers.\n\n### Communication\
  \ Patterns:\n*   **Event-Driven:** The README and app settings reveal extensive\
  \ use of message brokers (RabbitMQ, Kafka, Azure Service Bus) to handle cross-service\
  \ events like `FileUploadedEvent` and `EmailMessageCreatedEvent`.\n*   **Synchronous\
  \ Communication:** Service-to-service communication also utilizes gRPC, evidenced\
  \ by `.proto` files implied in `ClassifiedAds.Services.*.Grpc` projects and K8s\
  \ configuration for gRPC services.\n\n### Note on Multi-Architectural Nature:\n\
  The repository is explicitly designed to demonstrate different \"scales\" of architecture.\
  \ While the `src/Monolith` directory exists, the repository's metadata (CI/CD workflows,\
  \ infrastructure scripts, and root documentation) focuses heavily on the complexities\
  \ of the Microservices implementation, making it the primary architectural exemplar."
