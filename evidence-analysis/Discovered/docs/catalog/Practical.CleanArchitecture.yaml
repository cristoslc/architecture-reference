classification_reasoning: |
  ## Architecture Classification — Practical.CleanArchitecture

  ### Repository Overview

  This repository is a deliberate multi-topology reference project implementing a
  classified-ads application across three solution variants: Monolith
  (src/Monolith/), Modular Monolith (src/ModularMonolith/), and Microservices
  (src/Microservices/). The README diagrams explicitly label the approaches
  (Hexagonal Architecture, Onion Architecture, The Clean Architecture, Vertical
  Slice Architecture). Analysis covers all three variants.

  ### Primary: Modular Monolith (confidence 0.95)

  The ModularMonolith solution is the most architecturally sophisticated variant
  and best represents the project's stated design intent. Evidence:

  1. Six dedicated module projects in `src/ModularMonolith/ClassifiedAds.Modules.*/`
     each containing self-contained Commands/, Queries/, Entities/, EventHandlers/,
     Persistence/, and ServiceCollectionExtensions.cs.
  2. `docker-compose.yml` for ModularMonolith deploys a single `webapi` container;
     all modules share one process.
  3. `ClassifiedAds.Contracts/` defines typed interfaces (IAuditLogService, etc.)
     as the seam between modules, preventing direct cross-module project references.
  4. Module registration via extension methods: `.AddAuditLogModule().AddProductModule()...`

  ### Secondary: Microservices (confidence 0.93)

  The Microservices variant satisfies the canonical definition: six independently
  deployable services with per-service databases, inter-service RabbitMQ messaging,
  API gateways, and Kubernetes deployment manifests. Each service has its own .sln,
  Dockerfile, and separate SQL Server connection string in docker-compose.yml.

  ### Supporting: Layered Architecture (confidence 0.95)

  All variants share a four-layer structure (Domain, Application, Infrastructure,
  Presentation) enforced by NetArchTest at compile time. Domain → Application →
  Infrastructure is the declared dependency direction.

  ### Architecture Qualifiers

  **Hexagonal Architecture**: Domain defines interface ports (IFileStorageManager,
  IMessageBus in Domain/Infrastructure/; IRepository<T>, IUnitOfWork in
  Domain/Repositories/). Infrastructure provides adapter implementations —
  LocalFileStorageManager, AmazonS3StorageManager, AzureBlobStorageManager,
  RabbitMQSender, KafkaSender. Architecture tests verify the inward-only dependency
  direction.

  **CQRS**: Hand-rolled Dispatcher in Application/Common/Dispatcher.cs resolves
  ICommandHandler<T> and IQueryHandler<TQuery,TResult> generically at runtime.
  Each feature area (Products, FileEntries, Users, etc.) exposes Commands/ and
  Queries/ sub-folders. Generic base commands (AddEntityCommand<T>,
  DeleteEntityCommand<T>, UpdateEntityCommand<T>) are provided in Common/Commands/.

  **DDD (tactical)**: IAggregateRoot marker interface, Entity<TKey> abstract base
  with RowVersion concurrency token, IDomainEvent/IDomainEventHandler interfaces,
  EntityCreatedEvent<T>/EntityUpdatedEvent<T>/EntityDeletedEvent<T> generic events,
  and value objects (Address, Money) in Domain/ValueObjects/. The Outbox pattern
  (OutboxMessage entity + OutBoxEventPublishers/) enables reliable async event
  delivery across module and service boundaries.

  ### Rejected Primary Styles

  - **Event-Driven**: No asynchronous event-first topology; message broker is used
    for reliable delivery but synchronous request/response is the primary communication
    pattern within and between modules.
  - **Hexagonal Architecture (as primary topology)**: Hexagonal describes the internal
    layer structure; the deployment topology is Modular Monolith or Microservices.
  - **Service-Based**: Microservices variant is fine-grained (six services for a simple
    domain), not the coarse-grained 4-12 services that characterize Service-Based.
