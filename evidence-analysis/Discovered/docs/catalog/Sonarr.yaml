review_notes: 'Sonarr is organized as a **Modular Monolith**. While it consists of
  multiple .NET projects within a single solution (`src/Sonarr.sln`), they are compiled
  into a single deployable unit (the Sonarr application) rather than independent microservices.
  The architecture is characterized by a strong separation of concerns across logical
  boundaries, specifically:


  1.  **Modular Structure**: The codebase is split into distinct functional projects
  such as `NzbDrone.Core`, `NzbDrone.Common`, `Sonarr.Http` (API), and `NzbDrone.Host`.
  `NzbDrone.Core` serves as the central domain hub, containing sub-modules for everything
  from `Indexers` and `Download` clients to `MetadataSource` and `DecisionEngine`.

  2.  **Layered approach**: There is a clear horizontal progression from host/infrastructure
  (`NzbDrone.Host`, `NzbDrone.Mono`, `NzbDrone.Windows`) to the API layer (`Sonarr.Api.V3`,
  `Sonarr.Http`), and finally to the business logic core (`NzbDrone.Core`).

  3.  **Event-Driven (Internal)**: The presence of `NzbDrone.Core/Messaging` and `NzbDrone.SignalR`
  indicates an internal event-driven mechanism. It uses a MediatR-style pattern (common
  in the Servarr stack) for decoupled communication between modules via commands and
  events (e.g., `MessageHub.cs`, `IBroadcastSignalRMessage.cs`). This allows modules
  like the "Download Service" to notify the "UI" or "Rename Service" without direct
  coupling.

  4.  **Composition Root**: The existence of `NzbDrone.Common/Composition` and `NzbDrone.Host/Bootstrap.cs`
  points to a centralized Dependency Injection container that wires these modules
  together at startup.


  **Why not Microservices?**

  There is no evidence of independent deployment units or service discovery. All backend
  projects reside in one solution, share a single database context (implied by `NzbDrone.Core/Datastore`),
  and are bundled together for the user as a single executable or Docker container.'
