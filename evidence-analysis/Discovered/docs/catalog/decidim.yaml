classification_reasoning: "## Analysis\n\nThe Decidim repository implements a **Microkernel\
  \ (Plugin) architecture** as its primary architectural style.\n\n### Evidence for\
  \ Microkernel (Plugin) Architecture\n\n**1. Core System with Plugin Registration\
  \ API**\n\nThe core provides a well-defined plugin contract through manifest classes:\n\
  \n- `lib/decidim/core.rb` defines `register_component` and `register_participatory_space`\
  \ methods (lines 846, 861)\n- `decidim-core/lib/decidim/component_manifest.rb` -\
  \ Defines the complete plugin contract with settings, hooks, permissions, GraphQL\
  \ types, and resources\n- `decidim-core/lib/decidim/participatory_space_manifest.rb`\
  \ - Similar contract for participatory space plugins\n- `decidim-core/lib/decidim/manifest_registry.rb`\
  \ - Registry that holds all registered manifests\n\n**2. Plugin Modules (27 separate\
  \ gems)**\n\nThe repository contains 27 distinct plugin modules, each as a Rails\
  \ Engine:\n- `decidim-proposals`, `decidim-meetings`, `decidim-budgets`, `decidim-comments`\n\
  - `decidim-accountability`, `decidim-surveys`, `decidim-debates`, `decidim-blogs`\n\
  - `decidim-participatory_processes`, `decidim-assemblies`, `decidim-conferences`\n\
  - `decidim-admin`, `decidim-api`, `decidim-system`, `decidim-verifications`\n\n\
  Each plugin is a separate gem with its own `*.gemspec` file.\n\n**3. Self-Registration\
  \ Pattern**\n\nPlugins register themselves via a DSL at boot time. For example,\
  \ in `decidim-proposals/lib/decidim/proposals/component.rb`:\n\n```ruby\nDecidim.register_component(:proposals)\
  \ do |component|\n  component.engine = Decidim::Proposals::Engine\n  component.admin_engine\
  \ = Decidim::Proposals::AdminEngine\n  component.icon = \"media/images/decidim_proposals.svg\"\
  \n  component.actions = %w(like vote create withdraw amend comment)\n  component.permissions_class_name\
  \ = \"Decidim::Proposals::Permissions\"\n  \n  component.settings(:global) do |settings|\n\
  \    settings.attribute :vote_limit, type: :integer\n    # ... more settings\n \
  \ end\n  \n  component.on(:create) do |instance|\n    # Lifecycle hook\n  end\n\
  \  \n  component.register_resource(:proposal) do |resource|\n    resource.model_class_name\
  \ = \"Decidim::Proposals::Proposal\"\n    resource.searchable = true\n  end\nend\n\
  ```\n\n**4. Extension Points via Hooks**\n\nThe core provides multiple extension\
  \ mechanisms:\n- **Lifecycle hooks**: `component.on(:create)`, `component.on(:publish)`\n\
  - **View hooks**: `Decidim.view_hooks.register(:participatory_space_highlighted_elements)`\n\
  - **Event subscriptions**: `Decidim::Comments::CommentCreation.subscribe`\n- **Content\
  \ processors**: `config.content_processors += [:proposal]`\n\n**5. Single Deployable\
  \ Unit**\n\nAll plugins are packaged into a single Rails application:\n- `lib/decidim.rb`\
  \ requires all modules into one application\n- `decidim-generators` creates a new\
  \ Rails app that bundles all engines together\n- Components share a single database\
  \ via Rails Engine namespacing\n\n**6. Polymorphic Component Model**\n\nFrom `decidim-core/app/models/decidim/component.rb`:\n\
  ```ruby\nclass Component < ApplicationRecord\n  belongs_to :participatory_space,\
  \ polymorphic: true\n  \n  def manifest\n    Decidim.find_component_manifest(manifest_name)\n\
  \  end\nend\n```\n\nThe core doesn't know specific components - it discovers them\
  \ via manifests.\n\n### Evidence for Layered Architecture (Secondary)\n\nWithin\
  \ each module and the core, Rails MVC provides horizontal layering:\n- `app/controllers/`\
  \ - Presentation layer\n- `app/models/` - Domain/ business logic\n- `app/forms/`,\
  \ `app/commands/` - Application services\n- `app/views/`, `app/cells/` - View templates\n\
  \nThis is implementation detail within each plugin rather than the primary architectural\
  \ organization.\n\n### Why Not Other Styles\n\n**NOT Microservices:**\n- Single\
  \ Rails application deployed as one unit\n- Shared PostgreSQL database with polymorphic\
  \ associations\n- All modules run in the same process\n- No service boundaries or\
  \ inter-service communication\n\n**NOT Domain-Driven Design (Bounded Contexts):**\n\
  - While modules represent domain boundaries (proposals, meetings, budgets), they're\
  \ implemented as plugins to a core kernel, not autonomous contexts\n- They share\
  \ the same database schema and models\n\n**NOT Service-Based:**\n- This is more\
  \ than 2-5 coarse-grained services; it's a plugin ecosystem with 27 modules\n- All\
  \ modules share the same database rather than owning their data\n\n**NOT Hexagonal\
  \ Architecture:**\n- No ports/adapters pattern\n- Direct framework coupling (Rails\
  \ Engines) rather than interface-based isolation\n\n### Conclusion\n\nDecidim is\
  \ a **textbook example of a Microkernel (Plugin) architecture**:\n- Core kernel\
  \ (`decidim-core`) defines extension points and contracts\n- Plugins (`decidim-*`)\
  \ register via manifests and implement those contracts\n- Plugins can be added/removed\
  \ without modifying the core\n- The system is delivered as a single deployable Rails\
  \ application"
