review_notes: "The repository is a prime example of a **Modular Monolith** built using\
  \ the Ruby on Rails \"Engine\" pattern. While it appears to be a collection of directories\
  \ (e.g., `decidim-meetings`, `decidim-proposals`, `decidim-core`), these are not\
  \ independent microservices; they are highly cohesive modules designed to run within\
  \ a single Ruby process and share a common database schema (as evidenced by the\
  \ centralized `db/migrate` patterns within each module).\n\n### Primary Style: Modular\
  \ Monolith\nThe system is partitioned into domain-specific modules (Engines) such\
  \ as `decidim-meetings`, `decidim-budgets`, and `decidim-proposals`. Each module\
  \ maintains its own internal \"Layered\" structure (Controllers, Models, Views,\
  \ Commands) but relies on a shared core (`decidim-core`). \n- **Evidence:** The\
  \ top-level directory contains dozens of `decidim-*` folders. Each contains its\
  \ own `lib/decidim/<module>/engine.rb`, allowing the main application to compose\
  \ these modules into a single deployment unit.\n- **Boundaries:** Modules communicate\
  \ via defined APIs and shared abstractions provided by the core, but they reside\
  \ in the same codebase and operate on a shared infrastructure.\n\n### Secondary\
  \ Style: Microkernel (Plugin)\nThe architecture functions as a **Microkernel** where\
  \ `decidim-core` acts as the kernel, and other modules like `decidim-meetings` are\
  \ \"Components\" (plugins) that register themselves.\n- **Evidence:** In `decidim-meetings/lib/decidim/meetings.rb`,\
  \ the module requires `decidim/meetings/component`. Decidim's architecture allows\
  \ administrators to \"install\" or \"enable\" specific components (like Meetings\
  \ or Proposals) within different \"Participatory Spaces\" (like an Assembly or a\
  \ Process) at runtime. This plugin architecture is a hallmark of the Microkernel\
  \ style."
