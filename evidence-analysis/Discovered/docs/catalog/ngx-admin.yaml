  follows a strictly **Layered** architecture, specifically tailored for frontend
  modularity. It utilizes a directory structure that segregates systemic concerns
  from feature/business logic.


  ### 1. Primary Style: Layered

  The codebase is organized into three distinct top-level directories under `src/app/`,
  which represent a vertical layering of responsibilities:

  - **`@core` (The Infrastructure/Data Layer):** Found at `src/app/@core`, this layer
  handles foundational services, data models, and business logic that is independent
  of specific UI components. The presence of `src/app/@core/data` and `src/app/@core/mock`
  suggests this layer abstracts data fetching and state management.

  - **`@theme` (The Presentation Layer):** Found at `src/app/@theme`, this layer contains
  common UI components, layouts, pipes, and SCSS styles. This is the horizontal "cross-cutting"
  layer providing the visual framework.

  - **`pages` (The Feature/Domain Layer):** Found at `src/app/pages/`, this contains
  the specific implementations of the dashboard (e.g., `maps`, `tables`, `charts`).
  These are consumers of both `@core` and `@theme`.


  ### 2. Secondary Style: Hexagonal Architecture (Ports and Adapters)

