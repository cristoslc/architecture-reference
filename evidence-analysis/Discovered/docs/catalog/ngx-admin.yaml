review_notes: 'Three explicit layers via Angular modules: (1) @core with abstract
  data interfaces in data/ and mock implementations in mock/, bound via DI; (2) @theme
  with shared UI components, layouts, pipes, and multi-theme support; (3) pages/ with
  feature-organized UI modules (dashboard, e-commerce, charts, forms, tables). Uses
  forRoot() pattern and module-import-guard.ts to enforce single-instantiation of
  core/theme layers. No backend, no Docker, no microservices -- this is a pure front-end
  SPA template.'
