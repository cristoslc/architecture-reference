one_line_summary: >-
  Angular 15 admin dashboard template organized as a three-layer SPA (@core
  infrastructure, @theme presentation, pages features) with port/adapter
  separation in the data sub-layer.
classification_reasoning: >-
  ngx-admin exhibits canonical Layered architecture with three explicit horizontal
  layers under src/app/: @core (infrastructure/data), @theme (shared UI/presentation),
  and pages (feature/application). Dependency flow is strictly downward. @core/data/
  defines 19 abstract TypeScript classes ("ports"); @core/mock/ provides concrete
  implementations ("adapters") bound via Angular DI in core.module.ts. Feature modules
  under pages/ lazy-load via Angular router and consume @core services through abstract
  interfaces only. A single angular.json application project compiles to a single SPA
  bundle. There are no network service boundaries, no plugin registries, no event
  brokers, no domain aggregates, and no bounded contexts. The port/adapter pattern in
  the data layer qualifies as a hexagonal design approach but does not alter the
  layered topology.
