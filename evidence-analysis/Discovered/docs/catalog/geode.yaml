review_notes: "Space-Based: Core architecture is an in-memory data grid with partitioned and replicated data regions (geode-core/.../cache/PartitionedRegion.java, DistributedRegion.java, BucketRegion.java), off-heap memory management (internal/offheap/MemoryAllocatorImpl.java), data partitioning with colocation (internal/cache/partitioned/), rebalancing (partitioned/rebalance/), and shared-nothing persistence (internal/cache/persistence/). Modules geode-membership and geode-tcp-server handle cluster membership and discovery via Locators. Event-Driven: Pervasive async event infrastructure including CacheListener/CacheWriter callbacks (cache/CacheListener.java, CacheWriter.java), AsyncEventQueue with listener dispatch (cache/asyncqueue/), Continuous Query engine (geode-cq module with CqServiceImpl.java), WAN gateway event replication with parallel and serial senders (internal/cache/wan/GatewaySenderEventProcessor.java, parallel/, serial/), and HA event queues (internal/cache/ha/HARegionQueue.java). The distributed module (distributed/internal/DistributionMessage.java, ClusterDistributionManager.java) routes events across the cluster."