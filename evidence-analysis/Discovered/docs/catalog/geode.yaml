one_line_summary: >-
  A Modular Monolith data grid whose 30+ Gradle modules produce a single
  distribution; at runtime nodes form a Space-Based cluster of partitioned/replicated
  in-memory regions with compute-on-data Function Execution, extended via a
  ServiceLoader CacheService plugin mechanism.
classification_reasoning: |
  ## Primary Style: Modular Monolith

  Apache Geode packages all modules into a single distribution artifact.
  `geode-server-all/build.gradle` aggregates every subproject via `api` and
  `runtimeOnly` project dependencies into one server JAR. `geode-assembly/build.gradle`
  produces `apache-geode` as a tarball and Docker image — one deployable unit per node.

  `settings.gradle` declares 30+ Gradle subprojects with explicit `api` vs.
  `implementation` dependency visibility:

  - Foundation layer: `geode-common`, `geode-logging`, `geode-serialization`, `geode-unsafe`
  - Transport/membership: `geode-membership` (JGroups), `geode-tcp-server`
  - Core kernel: `geode-core` (Cache, Region, PartitionedRegion, GemFireCacheImpl)
  - Feature modules: `geode-wan`, `geode-cq`, `geode-lucene`, `geode-memcached`, `geode-connectors`
  - Management plane: `geode-management`, `geode-gfsh`, `geode-web-management`, `geode-web-api`, `geode-pulse`
  - Assembly: `geode-assembly`, `geode-server-all`

  `internal` packages (`org.apache.geode.internal.*`) enforce public API / implementation
  separation throughout the codebase.

  ## Secondary Style: Space-Based

  At runtime, Geode nodes form a distributed in-memory data grid — the canonical
  Space-Based topology. Each JVM process holds a share of the total data and operates
  on it locally without a central database bottleneck.

  Key evidence:

  - `PartitionedRegion.java` (extends LocalRegion) implements data partitioning across
    bucket owners, supported by `BucketRegion`, `BucketAdvisor`, and
    `PartitionedRegionDataStore`.
  - `DistributedRegion.java` implements full data replication across cluster members.
  - The public `PartitionAttributes` / `PartitionAttributesFactory` API configures
    bucket count, redundancy copies, and colocated-with relationships.
  - The README explicitly states a "shared nothing" persistence architecture.
  - `FunctionService` in `geode-core/src/main/java/org/apache/geode/cache/execute/`
    routes user-defined `Function<T>` execution co-located with the target data
    partitions (compute-to-data pattern).
  - `AsyncEventQueue` / `AsyncEventListener` provide reliable async mutation
    notifications; `CacheListener`, `CacheWriter`, `CacheLoader` are synchronous
    extension points in the Region mutation path.
  - `geode-membership` uses JGroups (`JGroupsMessenger`) for reliable group
    communication, failure detection, and split-brain quorum management.

  ## Tertiary Style: Microkernel

  `GemFireCacheImpl.initializeServices()` uses `ServiceLoader<CacheService>` to
  discover and initialize optional capabilities at cache startup:

  ```java
  ServiceLoader<CacheService> loader = ServiceLoader.load(CacheService.class);
  for (CacheService service : loader) {
    if (service.init(this)) {
      services.put(service.getInterface(), service);
    }
  }
  ```

  Optional modules register via `META-INF/services/org.apache.geode.internal.cache.CacheService`:
  - `geode-http-service` → `InternalHttpService`
  - `geode-wan` → `WanCopyRegionFunctionService`
  - `geode-lucene` → `LuceneServiceImpl`

  The `Declarable` interface allows user code (CacheLoader, CacheWriter, CacheListener,
  Function, PartitionResolver) to be declared in XML and loaded by name.

  ## Rejected Styles

  - Microservices: Single JVM per node; nodes form a peer cluster, not independently
    deployed services with private stores.
  - Event-Driven: CacheListener/AsyncEventQueue are features within the data grid,
    not the structural organizing principle.
  - Layered: Internal layering exists but is subordinate to capability-based module
    decomposition; not the primary architectural identity.
  - Pipeline: No sequential processing-stage topology.
  - CQRS: No command/query separation; reads and writes share the same Region/DataStore.
  - DDD: Organized by technical capability (partitioning, WAN, Lucene), not business
    bounded contexts.
  - Hexagonal: Extension points exist but are not organized as named inbound/outbound
    ports in the Hexagonal sense.
