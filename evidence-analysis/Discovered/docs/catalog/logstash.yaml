classification_reasoning: >-
  Logstash exhibits two deeply co-expressed architectural styles that are
  inseparable from its design intent.

  Pipeline is the primary style because the entire application exists to move
  data from sources to destinations through transformations. Every architectural
  decision — the queue subsystem, the WorkerLoop, the PipelineIR graph compiler,
  the three-section DSL — exists in service of this data flow topology. The
  pipeline is not an internal implementation detail; it is the user-facing
  primitive. Users write pipeline configs, monitor pipeline metrics, reload
  pipelines, and chain pipelines together. Key evidence: PipelineIR.java compiles
  every user configuration into a directed graph with vertices for inputs, a queue
  vertex, filter plugins, and output plugins in strict topological order.
  WorkerLoop.java pulls QueueBatch objects from the persisted/memory queue and
  runs them serially through the compiled filter/output graph. java_pipeline.rb
  manages @input_threads (producers) and @worker_threads (filter+output consumers)
  with an internal queue acting as the pipe between stages. PipelineBus.java
  enables multiple pipelines to be chained, extending the pipeline topology across
  pipeline boundaries.

  Microkernel is the secondary style because the kernel (logstash-core) is
  genuinely minimal and purely structural: it provides the execution frame
  (pipeline runner, queue, worker threads, monitoring) but contributes zero domain
  logic. Every meaningful action — reading from a file, parsing JSON, writing to
  Elasticsearch — requires a plugin. Key evidence: logstash-core-plugin-api is a
  dedicated gem exporting a stable plugin contract (LogStash::Inputs::Base,
  LogStash::Filters::Base, LogStash::Outputs::Base, LogStash::Codecs::Base).
  co.elastic.logstash.api Java package defines Java-side plugin interfaces.
  plugins/discovery/PackageScanner.java + PluginRegistry.java scan for
  @LogstashPlugin-annotated classes at runtime. PluginClassLoader.java gives each
  Java plugin an isolated classloader. plugins/registry.rb (Ruby) discovers
  installed gems via Gem::Specification metadata scanning. lib/pluginmanager/
  provides a full bin/logstash-plugin install/remove/update/generate CLI for
  runtime plugin management. The x-pack/ directory adds enterprise capabilities
  using the same plugin mechanism without touching core.

  The two styles are complementary and mutually reinforcing: Microkernel defines
  how extensions are plugged in; Pipeline defines where they are placed and how
  data flows between them. This is not Event-Driven architecture (internally uses
  a synchronous pull-based worker model). It is not Microservices (single JVM
  process, one deployable artifact). It is not Layered (no horizontal
  presentation/business/data layers — organization is around vertical plugin
  extension points within a pipeline topology).
