  - **Execution Model:** The pipeline handles buffering (queueing) between these stages
  to ensure backpressure management, a classic requirement of high-throughput pipeline
  architectures.


  ### 2. Secondary Style: Microkernel (Plugin)

  Logstash Core (`logstash-core`) acts as a minimal "Microkernel" that provides the
  execution engine, lifecycle management, and shared utilities, while almost all functional
  capabilities are outsourced to external plugins.

  - **Plugin Registry:** `logstash-core/lib/logstash/plugins/registry.rb` reveals
  a sophisticated discovery mechanism. It uses RubyGems metadata (`logstash_plugin`)
  to identify, load, and instantiate plugins dynamically.

  - **Strict Separation:** The README and directory structure confirm that "Logstash
  core will continue to exist under this repository" while "plugins are hosted in
  separate repositories." This separation between the stable core and the volatile,
  extensible peripheral modules is the hallmark of a Microkernel system.

  - **Contracts:** The registry enforces specific types (`input`, `filter`, `output`,
  `codec`), which act as the service provider interfaces (SPI) that plugins must implement
  to be integrated into the pipeline.


  ### Rejected Styles:

  - **Microservices:** While Logstash is often *used* within a microservices ecosystem,
  the repository itself is a single deployable engine. The "services" mentioned in
  `qa/integration/services` refer to external dependencies (like Elasticsearch or
  Kafka) used for testing, not internal architectural components.

  - **Layered:** Although there is internal layering (Java/Ruby bridge, Core/API),
  it is a implementation detail of the engine rather than the defining structural
  pattern of the system''s macro-architecture.

  - **Event-Driven:** While Logstash processes "events," the internal architecture
  is a linear flow (Pipeline) rather than an asynchronous, non-deterministic choreography
  of decoupled components typical of Event-Driven Systems.'
