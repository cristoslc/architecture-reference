review_notes: 'The repository is a textbook implementation of a **Modular Monolith**.
  It is explicitly designed to demonstrate high cohesion within modules and low coupling
  between them, while maintaining a single deployment unit.


  ### Evidence of Modular Monolith

  - **Single Deployment Unit**: The `src/Bootstrapper` project acts as the entry point,
  responsible for initializing all modules and starting a single web application (`Program.cs`,
  `Startup.cs`).

  - **Enforced Boundaries**: The README explicitly states there are no references
  between modules. Communication is handled via "local contracts" or asynchronous
  events, rather than direct project dependencies.

  - **Internal Structure**: The directory `src/Modules/` contains autonomous folders
  (Customers, Payments, Users, Wallets), each mimicking a microservice''s internal
  structure (Core, Api, Infrastructure).


  ### Evidence of Event-Driven Style

  - **Asynchronous Integration**: The README highlights that integration between modules
  is based on an "event-driven approach to achieve greater autonomy."

  - **Infrastructure Support**: The `src/Shared/Inflow.Shared.Infrastructure/Events`
  and `Messaging` directories indicate a robust internal event bus or message broker
  abstraction used for inter-module communication.'
