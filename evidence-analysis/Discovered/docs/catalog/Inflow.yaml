review_notes: "README explicitly declares Modular Monolith architecture. Single Bootstrapper loads 4 autonomous modules (Customers, Payments, Users, Wallets) + Saga via IModule interface. No cross-module project references; integration via IModuleClient, IMessageBroker (InMemoryMessageBroker), and local contracts (IContract). Full Outbox/Inbox pattern in Shared.Infrastructure.Messaging.Outbox. Saga pattern via Chronicle library (NewCustomerBonusFundsSaga). CQRS via separate ICommand/ICommandHandler and IQuery/IQueryHandler with dedicated dispatchers. DDD: AggregateRoot<T> base class with domain events, Value Objects (Currency, Amount, TransferName), rich domain entities (Wallet.TransferFunds), repository interfaces. Built by devmentors as a reference/teaching project for their Modular Monolith course."