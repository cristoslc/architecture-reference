review_notes: "Modular Monolith: src/Modules/ contains Identity, Multitenancy, Auditing as isolated modules loaded via IModule interface (src/BuildingBlocks/Web/Modules/ModuleLoader.cs); each module has separate Contracts and runtime projects; ModuleArchitectureTests.cs enforces modules cannot reference other module runtimes; BuildingBlocksIndependenceTests.cs prevents building blocks from depending on modules; single-process deployment via Playground.Api/Program.cs. CQRS: Mediator-based command/query separation throughout all features; Commands (RegisterUserCommand, CreateTenantCommand, DeleteRoleCommand) and Queries (GetRolesQuery, GetTenantStatusQuery) with dedicated handlers (ICommandHandler, IQueryHandler); each feature folder contains Endpoint+Handler+Validator triad in src/Modules/*/Features/v1/. DDD: AggregateRoot<TId>, BaseEntity<TId>, DomainEvent, IDomainEvent, IHasDomainEvents in src/BuildingBlocks/Core/Domain/; domain events (UserRegisteredEvent, PasswordChangedEvent, SessionRevokedEvent) in src/Modules/Identity/Domain/Events/; DomainEventsInterceptor dispatches after SaveChanges; Specification pattern in src/BuildingBlocks/Persistence/Specifications/. Event-Driven: IEventBus and IIntegrationEvent abstractions in src/BuildingBlocks/Eventing.Abstractions/; outbox pattern with OutboxDispatcher, OutboxMessage, IOutboxStore in src/BuildingBlocks/Eventing/Outbox/; inbox idempotency in src/BuildingBlocks/Eventing/Inbox/; InMemoryEventBus and RabbitMqEventBus implementations; Hangfire-scheduled outbox dispatch in IdentityModule.cs."