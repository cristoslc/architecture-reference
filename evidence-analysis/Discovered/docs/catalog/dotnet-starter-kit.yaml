one_line_summary: >-
  A .NET 10 production-grade SaaS starter kit structured as a single-host Modular Monolith with
  DDD bounded contexts (Identity, Multitenancy, Auditing), enforced via NetArchTest architecture
  guardrails and a reflection-based module loader.
classification_reasoning: |
  ## Analysis

  The **dotnet-starter-kit** is a **Modular Monolith** with deep **Domain-Driven Design** foundations.

  ### Primary Classification: Modular Monolith

  1. **Single deployable unit.** `Playground.Api/Program.cs` has one `WebApplication.CreateBuilder` call
     that loads all module assemblies and maps all endpoints. There is no separate deployment artifact
     per module and no inter-process communication between modules.

  2. **Reflection-based module loader** (`src/BuildingBlocks/Web/Modules/ModuleLoader.cs`):
     - Discovers modules via `[assembly: FshModule(typeof(IdentityModule), 100)]` attributes
     - Instantiates via `Activator.CreateInstance`, calls `ConfigureServices` then `MapEndpoints`
     - Canonical Modular Monolith plugin-host pattern

  3. **Architecture tests enforce module isolation** (`src/Tests/Architecture.Tests/ModuleArchitectureTests.cs`):
     - Scans `.csproj` files and asserts no module runtime project references another module runtime project
     - Only contracts or BuildingBlocks cross-references allowed

  4. **Contracts/implementation split per module:**
     - `Modules.Identity.Contracts` — pure DTOs, commands/queries, integration event interfaces
     - `Modules.Identity` — features, persistence, domain, services
     - `ContractsPurityTests.cs` asserts contracts have zero dependency on EF Core, FluentValidation, Hangfire, or module implementations

  5. **Layer dependency tests** (`LayerDependencyTests.cs`) enforce:
     - `BuildingBlocks.Core` has no EF Core or ASP.NET Core dependency
     - Domain types inside modules have no persistence or infrastructure dependency
     - Feature handlers have no direct `HttpContext` or MVC dependency

  6. **In-process cross-module communication via IEventBus:**
     - Default: `InMemoryEventBus` (in-process)
     - Optional: `RabbitMqEventBus` (same interface, pluggable)
     - Outbox/Inbox pattern backed by EF Core for idempotency
     - Modules communicate only through each other's `IIntegrationEvent` contracts

  ### Secondary Classification: Domain-Driven Design

  1. **DDD primitives** (`src/BuildingBlocks/Core/Domain/`):
     - `AggregateRoot<TId>`, `BaseEntity<TId>` with `IHasDomainEvents`
     - `IDomainEvent`, `DomainEvent` base record
     - `DomainEventsInterceptor` (EF Core `SaveChangesInterceptor`) dispatches domain events post-save via Mediator

  2. **Bounded contexts as modules:** Identity, Multitenancy, Auditing each have own `DbContext`,
     own domain model, own feature slices, own event definitions

  3. **Domain events translated to integration events:**
     - `UserRegisteredEvent` (domain) → `UserRegisteredIntegrationEvent` (integration, published via `IEventBus`)
     - Handlers like `UserRegisteredEmailHandler` consume integration events without module coupling

  4. **Vertical slice feature organization:**
     - `Features/v1/Users/RegisterUser/` contains endpoint, command handler, and validator in one folder

  5. **Specification pattern** (`BuildingBlocks/Persistence/Specifications/`):
     - `Specification<T>`, `SpecificationEvaluator` for encapsulating query logic

  6. **Mediator pipeline** with `ValidationBehavior<TMessage, TResponse>` applying FluentValidation
     as a cross-cutting application layer concern

  ### What This Is NOT

  - **NOT Microservices:** single deployable, shared process, no inter-service network calls
  - **NOT Hexagonal Architecture (primary):** organized around bounded contexts/modules, not ports/adapters rings
  - **NOT Event-Driven (primary):** eventing is a supporting cross-module mechanism, not the primary processing driver
  - **NOT CQRS (separate models):** commands and queries use the same EF Core DbContext; no segregated read store
  - **NOT Microkernel:** modules are compiled into the host, not independently deployed plugins
