classification_reasoning: "## Analysis\n\nThe **dotnet-starter-kit** is a **Modular\
  \ Monolith** with strong **Domain-Driven Design** influences.\n\n### Primary Classification:\
  \ Modular Monolith\n\n**Evidence for enforced internal module boundaries:**\n\n\
  1. **Single Deployable Unit**: One API host (`Playground.Api`) loads all modules\
  \ at runtime. The solution has no separate deployment artifacts per module.\n\n\
  2. **Module Discovery & Loading Plugin System** (`src/BuildingBlocks/Web/Modules/ModuleLoader.cs`):\n\
  \   - Runtime discovery via reflection scanning `FshModuleAttribute`\n   - Modules\
  \ self-register: `[assembly: FshModule(typeof(IdentityModule), 100)]`\n   - Standardized\
  \ lifecycle: `IModule` interface with `ConfigureServices()` and `MapEndpoints()`\n\
  \n3. **Architecture Tests Enforce Module Isolation** (`src/Tests/Architecture.Tests/ModuleArchitectureTests.cs`):\n\
  \   ```csharp\n   // Module runtime project must not reference other module runtime\
  \ project. \n   // Only contracts or building block projects are allowed.\n   isSelfReference.ShouldBeTrue($\"\
  Module runtime project '{currentName}' must not reference...\");\n   ```\n\n4. **Contracts\
  \ Pattern**: Each module has two projects:\n   - `Modules.Identity.Contracts` —\
  \ pure DTOs, interfaces, events (no EF, Hangfire, or implementation deps)\n   -\
  \ `Modules.Identity` — implementation, features, infrastructure\n   - `ContractsPurityTests.cs`\
  \ enforces contracts remain free of infrastructure concerns\n\n5. **Module-to-Module\
  \ Communication via Contracts Only**: Modules depend on each other's contracts,\
  \ never implementations.\n\n### Secondary Classification: Domain-Driven Design\n\
  \n**Evidence:**\n\n1. **Aggregate Roots & Entities** (`src/BuildingBlocks/Core/Domain/`):\n\
  \   - `AggregateRoot<TId>`, `BaseEntity<TId>` with domain event support\n   - `IDomainEvent`,\
  \ `IHasDomainEvents` interfaces\n\n2. **Bounded Contexts as Modules**: Identity,\
  \ Multitenancy, and Auditing are separate bounded contexts, each with:\n   - Own\
  \ DbContext (`IdentityDbContext`, `TenantDbContext`, `AuditDbContext`)\n   - Own\
  \ domain models (`FshUser`, `FshRole`, `Tenant`, `Audit`)\n   - Own feature slices\n\
  \n3. **Vertical Slice Features**: Each use case organized as self-contained folder:\n\
  \   ```\n   Features/v1/Users/RegisterUser/\n     ├── RegisterUserEndpoint.cs\n\
  \     ├── RegisterUserCommandHandler.cs\n     └── RegisterUserCommandValidator.cs\n\
  \   ```\n\n4. **Layered Dependency Enforcement** (`src/Tests/Architecture.Tests/LayerDependencyTests.cs`):\n\
  \   - Tests enforce \"Domain → Application → Infrastructure → Presentation\" flow\n\
  \   - Core must not depend on EF Core or ASP.NET Core\n   - Domain types isolated\
  \ from persistence and infrastructure\n\n### What This Is NOT\n\n- **NOT Microservices**:\
  \ Single deployable, shared process, no inter-service communication protocols\n\
  - **NOT Hexagonal Architecture**: Organization is around modules/bounded contexts,\
  \ not ports/adapters isolation\n- **NOT Event-Driven (primary)**: Eventing exists\
  \ (`IIntegrationEvent`, `InMemoryEventBus`, `RabbitMqEventBus`) but serves as cross-module\
  \ communication within the monolith, not the primary architectural driver\n\n###\
  \ Architecture Test Suite\n\nThe repository includes comprehensive architecture\
  \ guardrails (13+ test files) that validate:\n- Module independence (`ModuleArchitectureTests.cs`)\n\
  - Layer dependencies (`LayerDependencyTests.cs`)\n- Contracts purity (`ContractsPurityTests.cs`)\n\
  - Feature version isolation (`FeatureArchitectureTests.cs`)\n- Building block independence\
  \ (`BuildingBlocksIndependenceTests.cs`)"
