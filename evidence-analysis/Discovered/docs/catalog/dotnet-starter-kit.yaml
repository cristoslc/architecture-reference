review_notes: 'This repository identifies as a **Modular Monolith**. While it leverages
  modern cloud-native tooling (specifically .NET Aspire), the core architectural pattern
  is a single deployable unit (the `Playground.Api` or user-defined host) that dynamically
  loads and composes self-contained modules.


  ### Evidence of Modular Monolith

  The codebase is structured to solve the "Big Ball of Mud" problem while maintaining
  the deployment simplicity of a monolith:

  - **Module Separation**: The `src/Modules` directory contains independent modules
  like `Identity`, `Multitenancy`, and `Auditing`. These are separated into implementation
  projects and `Contracts` projects to manage cross-module dependencies.

  - **Dynamic Loading**: The README and `src/BuildingBlocks/Web/Modules` indicate
  a "module loader" pattern. The host calls `builder.AddModules(moduleAssemblies)`
  and `app.UseHeroPlatform(p => p.MapModules = true)` to wire up endpoints and services
  from these isolated projects at runtime.

  - **Enforced Boundaries**: The presence of `src/Tests/Architecture.Tests` (specifically
  `ModuleArchitectureTests.cs` and `LayerDependencyTests.cs`) is a hallmark of a Modular
  Monolith, using tools like NetArchTest to programmatically prevent illegal imports
  between modules.


