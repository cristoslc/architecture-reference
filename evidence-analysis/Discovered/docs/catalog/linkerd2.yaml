classification_reasoning: "## Analysis\n\n### Primary Classification: Microservices\n\
  \nThe linkerd2 repository exhibits clear microservices architecture characteristics:\n\
  \n**Multiple Independently Deployable Services:**\n1. **Controller** (`Dockerfile.controller`)\
  \ - A multi-purpose binary that dispatches to several internal services:\n   - `destination`\
  \ - gRPC service discovery (port 8086)\n   - `identity` - gRPC certificate authority\
  \ (port 8080)\n   - `proxy-injector` - Kubernetes admission webhook\n   - `sp-validator`\
  \ - Service profile validator webhook\n   - `heartbeat` - Telemetry collection\n\
  \   - `service-mirror` - Multicluster support\n\n2. **Policy Controller** (`policy-controller/`)\
  \ - Separate Rust binary providing gRPC policy API (port 8090), built with its own\
  \ Cargo workspace\n\n3. **Viz Extension** - Multiple independent services:\n   -\
  \ `metrics-api` (separate Dockerfile)\n   - `tap` (separate Dockerfile)  \n   -\
  \ `web` dashboard (separate Dockerfile)\n\n4. **CLI** - Standalone binary with its\
  \ own Dockerfile\n\n5. **Proxy** (`Dockerfile.proxy`) - Data plane sidecar proxy\n\
  \n**Evidence from `charts/linkerd-control-plane/templates/`:**\n- Separate Kubernetes\
  \ Deployments and Services for each component (destination.yaml, identity.yaml,\
  \ proxy-injector.yaml, heartbeat.yaml)\n- Each service exposes distinct gRPC endpoints\n\
  - Services communicate via gRPC (evident in `controller/api/destination/server.go:19`\
  \ importing `google.golang.org/grpc`)\n\n**State Isolation:**\n- No shared database\
  \ - each service uses Kubernetes API as its data store\n- Services are stateless,\
  \ storing state in Kubernetes CRDs\n\n### Secondary Classification: Microkernel\
  \ (Plugin)\n\nThe extension system documented in `EXTENSIONS.md` provides a clear\
  \ plugin architecture:\n\n**Plugin Contract:**\n- Extensions are external executables\
  \ named `linkerd-<name>`\n- Must implement: `install`, `uninstall`, `check` commands\n\
  - Discovered via PATH at runtime\n\n**Built-in Extensions:**\n- `viz` - Observability\
  \ extension (`viz/` directory with its own charts and commands)\n- `multicluster`\
  \ - Cross-cluster communication (`multicluster/` directory)\n\n**Evidence from `EXTENSIONS.md:42-48`:**\n\
  ```\nThe extension must implement these commands:\n### `linkerd-name install`\n\
  This command must print the Kubernetes manifests for the extension as yaml\nwhich\
  \ is suitable to be passed to `kubectl apply -f`.\n```\n\n### What Was Rejected\n\
  \n- **Service-Based**: Rejected because services have much finer granularity (5+\
  \ control plane services, 3+ viz services) with independent deployment capabilities,\
  \ each owning its own Kubernetes resources\n\n- **Layered**: Rejected because there's\
  \ no horizontal layering (presentation/business/data layers). The architecture is\
  \ organized around vertical service boundaries with each service having its own\
  \ full stack\n\n- **Modular Monolith**: Rejected because while the controller binary\
  \ contains multiple services, they are logically and operationally distinct services\
  \ with separate Kubernetes Deployments, not internal modules in a single deployable\n\
  \n- **Event-Driven**: Rejected because inter-service communication is synchronous\
  \ gRPC, not message broker based. Kubernetes watch streams are used for state synchronization\
  \ but this is infrastructure-level, not application architecture\n\n- **Hexagonal\
  \ Architecture**: While there's some use of interfaces (e.g., `viz/metrics-api/grpc_server.go:24`\
  \ defines a `Server` interface), ports-and-adapters is not the dominant organizational\
  \ pattern\n\n### Summary\n\nLinkerd2 is fundamentally a microservices architecture\
  \ for the control plane, with independent services communicating via gRPC and storing\
  \ state in Kubernetes. The extension system adds a microkernel dimension, allowing\
  \ third-party functionality to extend the core CLI through a well-defined plugin\
  \ contract."
