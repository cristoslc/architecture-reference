classification_reasoning: "## Architecture Classification Analysis\n\n### Primary Style:\
  \ Microservices (0.93)\n\nThe control plane is decomposed into independently deployed,\
  \ network-communicating services. Each capability runs in a separate Kubernetes\
  \ Deployment with its own service account and RBAC: **destination** (endpoint\
  \ resolution and traffic policy streaming to proxies via gRPC on port 8086),\
  \ **identity** (mTLS certificate issuance via Kubernetes token review over gRPC),\
  \ **proxy-injector** (MutatingAdmissionWebhook for transparent sidecar injection),\
  \ **policy-controller** (Rust binary with its own gRPC API for network authorization\
  \ policy), **sp-validator** (ServiceProfile CRD admission webhook), and **heartbeat**\
  \ (periodic telemetry). There is no shared database, no shared in-process memory,\
  \ and no shared library coupling at runtime. `controller/cmd/main.go` dispatches\
  \ to separate `Main()` functions compiled into one binary for build convenience,\
  \ but each is deployed as a separate Kubernetes Deployment. The policy controller\
  \ is a wholly separate Rust workspace (`Cargo.toml`), making the multi-language,\
  \ independently releasable service boundary concrete.\n\n### Secondary Style: Microkernel\
  \ (0.88)\n\n`EXTENSIONS.md` defines a formal binary extension protocol: extensions\
  \ are executables named `linkerd-<name>` on PATH and must implement `install`,\
  \ `uninstall`, and `check` subcommands with specified flags. First-party extensions\
  \ (viz, multicluster, CNI) each ship as independent Helm charts and add capabilities\
  \ without modifying the core. The viz extension adds a Prometheus metrics API\
  \ (`viz/metrics-api/`) and a tap service (`viz/tap/`) as additional Deployments.\
  \ The multicluster extension adds the service-mirror controller (`multicluster/service-mirror/`).\
  \ The core control plane is functional without any extension.\n\n### Rejected Styles\n\
  \n**Not Modular Monolith:** Components are deployed in separate containers and\
  \ communicate over the network at runtime. The single Go binary's subcommand\
  \ dispatcher is a build artifact, not a runtime coupling. The policy controller\
  \ is a separate language (Rust) and binary entirely.\n\n**Not Event-Driven (primary):**\
  \ Kubernetes SharedInformers and internal workqueues are reconciliation mechanisms,\
  \ not a first-class event architecture. There is no message broker or event bus.\
  \ Inter-component communication is synchronous gRPC.\n\n**Not Layered:** The\
  \ architecture is vertically decomposed by bounded capability, not organized as\
  \ horizontal presentation/business/data layers.\n\n**Not Pipeline:** The sidecar\
  \ proxy chain is a data-plane concern, not a control-plane architectural pattern.\n\
  \n### Quality Attribute Evidence\n\n**Security:** mTLS for all mesh traffic via\
  \ the identity controller; policy controller enforces network authorization CRDs\
  \ (Server, ServerAuthorization); non-root proxy runtime (`proxy-runtime.yml` runs\
  \ as uid 65532); separate RBAC per control plane component.\n\n**Observability:**\
  \ Prometheus metrics on every component; Grafana dashboards in `grafana/`; tap\
  \ (live request inspection) via viz extension; structured logging with logrus;\
  \ PodMonitor Helm template for scraping.\n\n**Scalability:** Each control plane\
  \ Deployment scales independently; destination controller uses streaming gRPC so\
  \ proxies hold long-lived update streams rather than polling; workqueue rate-limiting\
  \ in service mirror for burst handling.\n\n**Reliability:** Streaming endpoint\
  \ updates keep proxies current; gRPC keepalive; proxy-side load balancing and\
  \ retry logic in the data plane.\n\n**Deployability:** Full Helm chart suite\
  \ (`linkerd-crds`, `linkerd-control-plane`, `linkerd2-cni`); CLI-driven install;\
  \ extension-based optional components avoid mandatory complexity.\n\n**Extensibility:**\
  \ Documented binary extension protocol; CRD-based configuration surface (ServiceProfile\
  \ v1alpha2, Server, ServerAuthorization, ExternalWorkload, Link v1alpha3, policy\
  \ v1alpha1/v1beta3); optional Helm chart bundles for first-party extensions.\n\n\
  **Interoperability:** Gateway API (`sigs.k8s.io/gateway-api`) support; gRPC proxy\
  \ API decouples data plane from control plane allowing independent proxy releases;\
  \ multicluster federation via service mirror pattern.\n\n**Evolvability:** Separate\
  \ Go and Rust codebases with independent release cycles; versioned CRD APIs;\
  \ proxy fetched from external release rather than compiled in-tree."
