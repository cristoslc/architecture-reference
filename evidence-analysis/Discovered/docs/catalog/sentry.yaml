classification_reasoning: "## Analysis\n\nSentry is a **Modular Monolith** with a\
  \ sophisticated internal module boundary system and a plugin/integration extension\
  \ architecture.\n\n### Evidence for Modular Monolith\n\n**Single Deployable Unit:**\n\
  - One `self-hosted/Dockerfile` builds the entire application\n- Single `pyproject.toml`\
  \ defines all dependencies\n- Entry point: `CMD [\"run\", \"web\"]` - unified deployment\n\
  \n**Strong Internal Module Boundaries:**\n- ~150 distinct modules under `src/sentry/`\
  \ organized by domain feature\n- Each module follows Django app conventions with\
  \ `apps.py`, `models.py`, endpoints, services\n- Examples: `src/sentry/discover/`,\
  \ `src/sentry/notifications/`, `src/sentry/incidents/`, `src/sentry/monitors/`,\
  \ `src/sentry/feedback/`, `src/sentry/uptime/`\n\n**Silo System for Boundary Enforcement:**\n\
  - `src/sentry/silo/base.py` defines `SiloMode` enum: MONOLITH, CONTROL, REGION\n\
  - Endpoints decorated with `@control_silo_endpoint`, `@region_silo_endpoint`, `@all_silo_endpoint`\
  \ (in `src/sentry/api/base.py`)\n- `EndpointSiloLimit` class enforces which endpoints\
  \ can run in which silo mode\n- RPC service layer (`src/sentry/hybridcloud/rpc/service.py`)\
  \ with `RpcService` base class enables cross-silo communication\n\n**Service Abstraction\
  \ Layer:**\n- 124+ service files under `src/sentry/*/services/`\n- Services like\
  \ `OrganizationMappingService` (`src/sentry/hybridcloud/services/organization_mapping/service.py`)\
  \ have:\n  - Abstract service interface\n  - Database-backed implementation\n  -\
  \ RPC delegation pattern for cross-silo calls\n\n### Evidence for Microkernel (Plugin)\
  \ as Secondary Style\n\n**Plugin Infrastructure:**\n- `src/sentry/plugins/base/v2.py`\
  \ defines `IPlugin2` interface with `PluginMount` metaclass\n- Plugins register\
  \ automatically via mount pattern\n- Rich integration system in `src/sentry/integrations/`\
  \ with 30+ integrations (GitHub, Slack, Jira, Discord, etc.)\n- `src/sentry_plugins/`\
  \ contains additional plugin implementations\n\n**Integration Extension Points:**\n\
  - `IntegrationProvider` base class in `src/sentry/integrations/base.py`\n- Well-defined\
  \ hooks for issue tracking, notifications, repository providers\n- Data forwarding\
  \ plugins (`src/sentry/integrations/data_forwarding/`)\n\n### What This Is NOT\n\
  \n- **Not Microservices**: Single repository, single Dockerfile, single deployment\
  \ unit. The silo system is designed for *potential* decomposition but currently\
  \ runs as a monolith.\n\n- **Not Pure Layered**: While there's API → Service → Model\
  \ flow, the primary organization is vertical (domain modules) not horizontal (layers).\
  \ The `api/`, `models/`, `services/` exist *within* each domain module.\n\n- **Not\
  \ Event-Driven (primary)**: While Kafka consumers exist (`src/sentry/consumers/`)\
  \ and task workers (`src/sentry/taskworker/`), these are internal implementation\
  \ details for async processing, not the primary architectural pattern.\n\n### Key\
  \ Architectural Decisions\n\n1. **Hybrid Cloud Architecture**: The silo system with\
  \ CONTROL/REGION modes shows this monolith is designed to potentially split into\
  \ separate deployments while maintaining code cohesion.\n\n2. **RPC Service Pattern**:\
  \ Services can be called locally or remotely depending on silo mode - a sophisticated\
  \ abstraction that supports both monolith and potential future microservices.\n\n\
  3. **Django App Modularity**: Leverages Django's app framework for clean module\
  \ isolation while sharing a single database."
