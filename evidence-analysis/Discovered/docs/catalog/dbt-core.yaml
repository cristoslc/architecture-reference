classification_reasoning: "## Architecture Analysis: dbt-core\n\n### Primary Style:\
  \ Microkernel (Plugin)\n\n**Strong Evidence:**\n\n1. **Adapter Plugin System** —\
  \ The core architectural pattern is a plugin system for database adapters. From\
  \ `ARCHITECTURE.md`:\n   > \"dbt uses an adapter-plugin pattern to extend support\
  \ to different databases, warehouses, query engines, etc.\"\n   > \"Each adapter\
  \ is a mix of python, Jinja2, and SQL. The adapter code also makes heavy use of\
  \ Jinja2 to wrap modular chunks of SQL functionality, define default implementations,\
  \ and allow plugins to override it.\"\n\n2. **Dynamic Plugin Loading** — Adapters\
  \ are loaded dynamically at runtime based on configuration:\n   - `core/dbt/config/profile.py`:\n\
  \     ```python\n     from dbt.adapters.factory import load_plugin\n     cls = load_plugin(typename)\
  \  # Loads adapter by type from profiles.yml\n     ```\n   - `core/dbt/plugins/manager.py`:\n\
  \     ```python\n     PLUGIN_MODULE_PREFIX = \"dbt_\"\n     # Discovers all installed\
  \ dbt_* packages (dbt-postgres, dbt-snowflake, etc.)\n     ```\n\n3. **Plugin Contract**\
  \ — Adapters implement a well-defined interface from `dbt-adapters` package:\n \
  \  - **Credentials classes** — Connection parameters parsed from `profiles.yml`\n\
  \   - **Adapter classes** — Database operations (execute, create_schema, etc.)\n\
  \   - **ConnectionManager** — Thread-safe connection pooling\n   - **Relation classes**\
