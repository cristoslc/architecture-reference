classification_reasoning: |
  ## Architecture Analysis: dbt-core

  ### Primary Style: Microkernel (0.93)

  The defining architectural characteristic of dbt-core is its adapter-plugin system,
  explicitly documented in ARCHITECTURE.md: "dbt uses an adapter-plugin pattern to extend
  support to different databases, warehouses, query engines, etc."

  **Strong evidence:**

  1. **Dynamic adapter loading** — `core/dbt/plugins/manager.py` implements `PluginManager`,
     which uses `pkgutil.iter_modules()` to discover all installed `dbt_*` packages at startup
     and registers their `dbtPlugin` subclasses. `core/dbt/config/profile.py` calls
     `load_plugin(typename)` to dynamically import the adapter matching the `type` field in
     `profiles.yml`.

  2. **Formal plugin contracts** — The `dbt-adapters` package defines base classes
     (`BaseAdapter`, `BaseRelation`, `ConnectionManager`, `Credentials`) that warehouse-specific
     adapters must implement. The core (`dbt-core`) depends on `dbt-adapters>=1.22.8` as a
     first-class runtime dependency and never contains database-specific SQL.

  3. **Dual plugin mechanisms** — (a) Adapter plugins for warehouse portability, loaded via
     `load_plugin()`; (b) `dbtPlugin` base class (`get_nodes()`, `get_manifest_artifacts()`)
     allowing third-party packages to inject nodes into the DAG.

  4. **Polymorphic macro dispatch** — `adapter.dispatch()` resolves macro calls through a
     priority chain: adapter-specific project → adapter-specific imported package → adapter
     built-in → default implementation. Materializations follow the same 5-level override chain.

  5. **Micro-kernel stability** — The core itself orchestrates parsing, graph construction,
     and task scheduling; all database interaction is delegated to pluggable adapters.

  ### Primary Style: Pipeline (0.89)

  dbt-core's fundamental execution model is a DAG-ordered pipeline of SQL transformations.

  **Strong evidence:**

  1. **7-phase parsing pipeline** (`docs/arch/3_Parsing.md`): Read Files → Load Macros →
     Parse Project Files → Parse Schema Files → Patch Sources → Process References → Validation.
     Each phase is sequential and produces artifacts consumed by the next.

  2. **DAG execution queue** — `GraphQueue` (`core/dbt/graph/queue.py`) is a topological
     priority queue that releases nodes only when all upstream dependencies have called
     `mark_done()`. The thread pool (`DbtThreadPool`) maximizes parallelism while respecting
     DAG order.

  3. **Two-phase node execution** — Each node undergoes compile (Jinja rendering to produce
     `compiled_code`) then execute (adapter SQL dispatch). Ephemeral models are resolved as
     CTEs and injected into their dependents during compilation.

  4. **Strict forward data flow** — Manifest → compiled Graph → GraphQueue → RunResult →
     JSON artifacts (`manifest.json`, `run_results.json`). No feedback loops; data moves
     strictly downstream.

  5. **Pipeline-oriented commands** — All graph-based commands (`dbt run`, `dbt build`,
     `dbt test`, `dbt snapshot`, `dbt seed`) share the same `GraphRunnableTask` pipeline
     orchestration with command-specific runners.

  ### Secondary Style: Layered (0.85)

  The codebase is organized into distinct horizontal layers with strict downward dependency flow.

  **Evidence:**

  | Layer | Location | Responsibility |
  |-------|----------|----------------|
  | CLI | `core/dbt/cli/` | Command parsing, decorator-based setup chain |
  | Task | `core/dbt/task/` | Command orchestration (BaseTask → RunTask hierarchy) |
  | Graph | `core/dbt/graph/` | DAG construction, node selection, execution queue |
  | Parser | `core/dbt/parser/` | File reading, manifest construction |
  | Compilation | `compilation.py` | Jinja rendering, CTE injection |
  | Contracts | `core/dbt/contracts/` | Dataclass schemas, validation |
  | Context | `core/dbt/context/` | Jinja execution environments |
  | Clients | `core/dbt/clients/` | External dependency wrappers |

  Task hierarchy in code: BaseTask → ConfiguredTask → GraphRunnableTask → CompileTask →
  RunTask → BuildTask. Each level adds capabilities without breaking lower-layer boundaries.
  The Context layer has its own parallel hierarchy: BaseContext → ConfiguredContext →
  ManifestContext → ProviderContext.

  ### What Was Rejected

  - **Microservices** — Single deployable PyPI package; no distributed services or network
    boundaries between components.
  - **Modular Monolith** — Internal modules share state freely (Manifest, adapter factory);
    no enforced build or distribution boundaries between core layers.
  - **Event-Driven** — Events module (`core/dbt/events/`) is a structured logging facility,
    not an async message bus. Execution is synchronous DAG traversal with no event-loop
    or message broker.
  - **Domain-Driven Design** — Structure is technical (parser, compiler, task, graph) rather
    than organized around business domains. No aggregates, bounded contexts, or domain services.
  - **Hexagonal Architecture** — The adapter system achieves similar decoupling goals but is
    not organized as explicit ports/adapters in the hexagonal sense; there is no secondary
    port for persistence, messaging, or UI as distinct from the primary CLI port.
