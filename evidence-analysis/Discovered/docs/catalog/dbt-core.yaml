review_notes: '### Architectural Analysis


  The `dbt-core` repository is structured as a sophisticated CLI application that
  acts as an orchestration engine. Its architecture is characterized by a core processing
  engine that is extended via a plugin systems, organized internally with clear horizontal
  layers, and operating as a data transformation pipeline.


  #### 1. Microkernel (Plugin)

  The defining characteristic of `dbt-core` is its separation of the core logic (parsing,
  graph resolution, and orchestration) from the database-specific execution logic.

  - **Evidence:** The presence of `core/dbt/plugins/` containing `manager.py`, `contracts.py`,
  and `manifest.py` indicates a formal service provider interface (SPI) for extensions.

  - **Functionality:** In dbt''s ecosystem, the "adapters" (like `dbt-postgres`, `dbt-snowflake`)
  are external plugins that implement the contracts defined in this core repository.
