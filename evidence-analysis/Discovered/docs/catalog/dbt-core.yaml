review_notes: "Evidence: ARCHITECTURE.md describes the core pipeline: SQL/YAML files are parsed (parser/), compiled into a DAG (graph/ using networkx), then executed through task runners (task/, runners/). This is textbook Pipe-and-Filter: parse -> compile -> execute with data flowing through discrete stages. The DAG itself (graph/graph.py, graph/queue.py) orchestrates node-level execution order. README.md states 'models frequently build on top of one another' forming a dependency graph. Modular Monolith evidence: single deployable Python package (core/pyproject.toml) with well-separated internal modules -- clients/, config/, context/, contracts/, deps/, events/, graph/, parser/, task/, plugins/ -- each with its own README.md documenting boundaries. The adapter-plugin pattern (plugins/manager.py, dbt-adapters dependency) provides extensibility via Python namespace packages (PLUGIN_MODULE_PREFIX='dbt_') without decomposing into separate services. docker-compose.yml is for testing only, not service decomposition."