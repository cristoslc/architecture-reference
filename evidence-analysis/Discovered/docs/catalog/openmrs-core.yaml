review_notes: 'The OpenMRS Core repository follows a traditional **Layered** architecture
  as its primary structural pattern, heavily integrated with a **Microkernel (Plugin)**
  system for extensibility.


  ### 1. Primary Style: Layered

  The repository is organized into distinct functional layers partitioned by Maven
  modules. This is a classic "horizontal" separation:

  - **`api/`**: The Core/Business Logic layer. It contains the domain entities, service
  interfaces (e.g., `PatientService`, `EncounterService`), and the data access logic
  (historically using Hibernate).

  - **`web/`**: The Presentation/Application layer. This contains the controllers
  and web-specific logic that exposes the API via a web interface or REST.

  - **`webapp/`**: The Deployment unit. This serves as the assembly point for the
  WAR file, integrating the `api` and `web` layers into a single deployable artifact
  (`openmrs.war`).

  - **`liquibase/`**: Dedicated module for database schema management, reinforcing
  a centralized data-driven approach common in layered monoliths.


  ### 2. Secondary Style: Microkernel (Plugin)'
