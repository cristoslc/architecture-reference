classification_reasoning: "## Analysis\n\n### Primary: Microkernel (Plugin)\n\nOpenMRS-core\
  \ implements a **microkernel architecture** with a sophisticated plugin/module system\
  \ at its core. The evidence is compelling:\n\n**Module Loading Infrastructure:**\n\
  - `api/src/main/java/org/openmrs/module/ModuleFactory.java` - Central factory for\
  \ loading, starting, stopping, and storing modules at runtime\n- `api/src/main/java/org/openmrs/module/Module.java`\
  \ - Core module representation with lifecycle state\n- `api/src/main/java/org/openmrs/module/ModuleClassLoader.java`\
  \ - Custom classloader for module isolation\n- `api/src/main/java/org/openmrs/module/ModuleActivator.java`\
  \ - Lifecycle callbacks (willStart, started, willStop, stopped)\n\n**Extension Points:**\n\
  - `api/src/main/java/org/openmrs/module/Extension.java` - Abstract base for extensions\
  \ that \"run at certain extension points throughout the user interface\"\n- `api/src/main/java/org/openmrs/module/AdvicePoint.java`\
  \ - AOP-based extension points for cross-cutting concerns\n\n**Runtime Discovery\
  \ and Loading:**\n```java\n// ModuleFactory.java loads modules from a repository\
  \ at runtime\npublic static void loadModules() {\n    File modulesFolder = ModuleUtil.getModuleRepository();\n\
  \    // ... loads module JAR files dynamically\n}\n```\n\n**Explicit Documentation:**\n\
  The README explicitly states: *\"OpenMRS has a modular architecture that allows\
  \ developers to extend the OpenMRS core functionality by creating modules that can\
  \ easily be added or removed to meet the needs of a specific implementation.\"*\n\
  \nThe system maintains a public [OpenMRS Module Repository](https://addons.openmrs.org/)\
  \ for third-party modules.\n\n### Secondary: Layered\n\nWithin both the core and\
  \ modules, OpenMRS employs a traditional **layered architecture**:\n\n**Three-Tier\
  \ Layering:**\n1. **Web Layer** (`web/`, `webapp/`) - Controllers, filters, servlets,\
  \ JSP views\n2. **Service Layer** (`api/src/main/java/org/openmrs/api/`) - Business\
  \ logic interfaces and implementations\n3. **Data Access Layer** (`api/src/main/java/org/openmrs/api/db/`)\
  \ - DAO interfaces with Hibernate implementations\n\n**Evidence from Code Structure:**\n\
  - Service interfaces: `PatientService.java`, `ConceptService.java`, `UserService.java`\n\
  - Service implementations: `PatientServiceImpl.java`, `ConceptServiceImpl.java`\n\
  - DAO interfaces: `PatientDAO.java`, `ConceptDAO.java`\n- DAO implementations: `HibernatePatientDAO.java`,\
  \ `HibernateConceptDAO.java`\n\n**Spring Configuration:**\n`api/src/main/resources/applicationContext-service.xml`\
  \ wires services to DAOs via dependency injection:\n```xml\n<bean id=\"serviceContext\"\
  \ class=\"org.openmrs.api.context.ServiceContext\">\n    <property name=\"patientService\"\
  \ ref=\"patientService\"/>\n    <property name=\"conceptService\" ref=\"conceptService\"\
  />\n    ...\n</bean>\n```\n\n### Single Deployable Unit\n\nThe project builds to\
  \ a single `webapp/target/openmrs.war` deployed to Tomcat or Jetty, confirming this\
  \ is NOT a microservices architecture. All core services share a single database\
  \ connection and Spring application context.\n\n### What This Is NOT\n\n- **NOT\
  \ Microservices**: Single WAR file, single database, shared Spring context\n- **NOT\
  \ Modular Monolith**: Module boundaries are NOT enforced at compile-time; modules\
  \ are loaded dynamically at runtime from external JARs\n- **NOT Event-Driven**:\
  \ No message broker configurations, no event sourcing patterns\n- **NOT DDD**: No\
  \ bounded contexts, aggregates, or domain-centric organization; the structure follows\
  \ technical layers\n\n### Conclusion\n\nOpenMRS-core is a textbook example of a\
  \ **microkernel architecture**: a minimal core platform that can be extended through\
  \ a well-defined plugin/module system. Modules are discovered and loaded at runtime,\
  \ have their own classloaders, can define extension points, and can be added/removed\
  \ without modifying the core. This is layered on top of a traditional service/DAO\
  \ layered architecture for internal code organization."
