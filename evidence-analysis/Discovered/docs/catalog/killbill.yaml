classification_reasoning: 'Kill Bill is a classic example of a **Modular Monolith**
  that leverages a **Microkernel (Plugin)** architecture for extensibility and an
  **Event-Driven** approach for internal component coordination.


  ### 1. Primary Style: Modular Monolith

  While the README mentions that the project "does not use a monolithic repository,"
  this refers to the broader Kill Bill ecosystem (client libraries, documentation,
  etc.). The core platform itself, contained in this repository, is structured as
  a Modular Monolith:

  - **Unified Build and Deployment:** The root `pom.xml` defines a single multi-module
  Maven project. The `profiles/killbill/pom.xml` shows that all functional modules
  (`account`, `catalog`, `invoice`, `payment`, `subscription`, etc.) are bundled into
  a single `.war` file (Web Application Archive) for deployment.

  - **Enforced Boundaries via API Module:** The `api/` directory contains the Java
  interfaces and constants that define the contracts between modules. By separating
  interfaces into a dedicated module, the system ensures that functional modules interact
  through defined APIs rather than reaching into each other''s implementation details.

  - **Shared Infrastructure:** All modules share a common infrastructure (Guice for
  DI, Shiro for security, and a unified `jaxrs` layer for the REST API), which is
  typical of a monolith rather than a microservices architecture where such concerns
  would be decentralized.


  ### 2. Secondary Style: Microkernel (Plugin)

  The system is designed to be highly extensible through a plugin architecture (referred
  to in the documentation as the "platform").

  - **Core vs. Plugins:** The "Microkernel" is the Kill Bill engine, which provides
  essential services like multi-tenancy (`tenant/`), auditing, and the event bus.

  - **Plugin Integration:** The `profiles/killbill/pom.xml` references `kill-bill-platform-osgi`,
  indicating that it can load external bundles at runtime. The presence of `killbill-plugin-api-*`
  dependencies (catalog, payment, etc.) confirms that external logic (like a specific
  payment gateway or taxation engine) is integrated via stable plugin contracts.


  ### 3. Secondary Style: Event-Driven

  The internal coordination between modules is decoupled using an asynchronous event-driven
  model.

  - **Inter-Module Communication:** When an action occurs in one module (e.g., a subscription
  change), it broadcasts an event. The `invoice` module listens for subscription events
  to generate new charges, and the `payment` module listens for invoice events to
  trigger collections.

  - **Evidence:** References to `killbill-queue` (in the profiles POM) and the `beatrix`
  module (which serves as the "glue" or orchestration layer) indicate a system built
  on internal message passing to maintain consistency across the modular boundaries
  without tight coupling.


  ### Rejection of Microservices

  Although the modules are logically distinct and the documentation mentions "highly
  modularized," they are not **Microservices** because they are not independently
  deployable. They share a single lifecycle, are packaged in a single WAR, and generally
  operate against a shared database schema (facilitated by the `tenant` module for
  isolation). The "Service-Based" style was also rejected as the granularity is much
  finer (10+ modules) than typical service-based architectures.'
