review_notes: "Hazelcast is a textbook implementation of a **Space-Based** architecture.\
  \ While it provides features like streaming and SQL, its primary architectural identity\
  \ is a distributed, in-memory data grid designed to eliminate the central database\
  \ bottleneck by distributing both data and processing across a cluster of nodes.\n\
  \n### 1. Primary Style: Space-Based\nThe core of Hazelcast’s architecture is centered\
  \ around distributed data structures (maps, queues, topics) that are partitioned\
  \ across multiple nodes. \n- **Evidence:** The README highlights \"Distributed,\
  \ partitioned, queryable key-value store\" and \"Distributed coordination for microservices.\"\
  \ \n- **Mechanism:** The system uses \"Processing Units\" (Hazelcast nodes) that\
  \ hold a portion of the data (partitions) and perform operations locally to that\
  \ data. This is supported by the `docs/design/partitioning` and `docs/design/cluster`\
  \ directories, which describe split-brain recovery, migration, and anti-entropy\
  \ mechanisms—all hallmarks of the Space-Based pattern.\n\n### 2. Secondary Style:\
  \ Microkernel (Plugin)\nHazelcast's extensibility is managed through a sophisticated\
  \ plugin system, allowing it to integrate with various external ecosystems without\
  \ bloating the core engine.\n- **Evidence:** The existence of a dedicated `/extensions`\
  \ directory containing modules for `kinesis`, `s3`, `mongodb`, `cdc-postgres`, `kafka`,\
  \ and `elasticsearch`."
