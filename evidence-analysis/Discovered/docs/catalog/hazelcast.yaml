one_line_summary: >-
  A Modular Monolith whose runtime topology is a Space-Based distributed
  in-memory data grid (271 partitions, node-local execution) extended via a
  Microkernel plugin system (NodeExtension, DataConnectionRegistration,
  ServiceLoader) with 18 optional connector extensions and an embedded Jet
  streaming pipeline engine.
classification_reasoning: |
  ## Primary: Modular Monolith

  Hazelcast is built as a single Maven multi-module project producing one
  `hazelcast.jar`. All distributed data-structure services run within the same
  JVM process on each node. The codebase is organized around named technical
  capability services (MapService, QueueService, TopicService, CacheService,
  ClusterService, IPartitionService, JetServiceBackend, etc.), each registered
  in `ServiceManagerImpl.registerDefaultServices()` and each implementing
  well-defined SPI contracts (`ManagedService`, `PartitionAwareService`,
  `MigrationAwareService`, `RemoteService`, etc.).

  Build-time ArchUnit rules in `hazelcast-archunit-rules` enforce that no
  public API class exposes types from `impl` or `internal` packages
  (`PublicApiClassesExposingInternalImplementationCondition`), providing
  machine-checked module boundary enforcement — the defining discipline of a
  modular monolith.

  ## Secondary: Space-Based

  At runtime, Hazelcast distributes a 271-partition keyspace (configurable via
  `ClusterProperty.PARTITION_COUNT`) across the cluster using consistent
  hashing. Each node owns a slice of the keyspace and executes operations
  locally against its assigned partitions — the processing-unit pattern of
  Space-Based architecture. `InternalPartitionServiceImpl` manages partition
  assignment, migration (`MigrationManagerImpl`), replication (configurable
  backup count), and anti-entropy. The Raft-based CP subsystem
  (`com.hazelcast.cp.internal.raft`) provides strong-consistency primitives
  (IAtomicLong, IAtomicReference, ISemaphore, locks) as an in-memory
  coordination layer. WAN replication (`com.hazelcast.wan`) extends the data
  grid across data centers.

  ## Tertiary: Microkernel

  Eleven ServiceLoader extension points in
  `hazelcast/src/main/resources/META-INF/services/` make the node kernel
  pluggable: `NodeExtension` (the enterprise seam — Hazelcast Enterprise
  provides security, HD memory, and hot restart by replacing
  `DefaultNodeExtension`), `DataConnectionRegistration` (pluggable named data
  sources: JDBC, Hazelcast-native built-in; Kafka and MongoDB via extensions),
  `DiscoveryStrategyFactory`, `SerializerHook`, `ServiceDescriptorProvider`,
  and others. The `extensions/` directory contains 18 optional connector
  modules (Kafka, MongoDB, CDC-Postgres, CDC-MySQL, Debezium, Elasticsearch,
  Kinesis, S3, Hadoop, Kafka Connect, gRPC, Protobuf, Python, Avro, CSV,
  MapStore, Hadoop-dist), each integrating into the core through the
  DataConnectionRegistration or Jet Processor/ProcessorMetaSupplier contracts.

  ## Rejected Styles

  - Microservices: Single JVM per node; no independent service decomposition
    with private data stores or container-per-service topology.
  - Event-Driven: Topic, ReliableTopic, CacheListener, EntryListener are
    product capabilities, not the codebase's organizational backbone.
  - Pipeline: Jet's DAG-based execution (DAG.java, Vertex, Edge) is a subsystem
    feature within the monolith, not the primary structural pattern.
  - Layered: Layering (foundation → cluster → partitioning → data structures →
    streaming/SQL) exists as scaffolding within the modular monolith but is not
    enforced as the primary organizing principle across all modules.
  - CQRS/Event Sourcing: No command/query separation; read and write share the
    same partition and RecordStore. Map event journal is a streaming feature.
  - Hexagonal: SPI contracts make core components swappable but code is not
    organized around explicit named inbound/outbound ports.
  - DDD: Organization is by technical capability, not business bounded contexts.
