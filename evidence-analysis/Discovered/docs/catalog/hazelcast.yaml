classification_reasoning: "## Analysis\n\n### Primary Style: Modular Monolith\n\n\
  The Hazelcast repository is architected as a **Modular Monolith** — a single deployable\
  \ artifact with well-defined and enforced internal module boundaries.\n\n**Key Evidence:**\n\
  \n1. **Single Deployment Unit**: The build produces one core JAR (`hazelcast.jar`)\
  \ from the main module. All services (MapService, QueueService, CacheService, etc.)\
  \ run within the same JVM process.\n\n2. **Service-Based Module Boundaries**: The\
  \ codebase contains 154+ service classes organized around distributed data structures:\n\
  \   - `hazelcast/src/main/java/com/hazelcast/map/impl/MapService.java`\n   - `hazelcast/src/main/java/com/hazelcast/collection/impl/queue/QueueService.java`\n\
  \   - `hazelcast/src/main/java/com/hazelcast/cache/impl/CacheService.java`\n\n3.\
  \ **Enforced Internal Boundaries**: ArchUnit rules explicitly enforce separation\
  \ between public API and internal implementation:\n   ```java\n   // PublicApiClassesExposingInternalImplementationCondition.java\n\
  \   private static final Set<String> INTERNAL_PACKAGE_NAMES = Set.of(\"impl\", \"\
  internal\");\n   ```\n   Packages like `com.hazelcast.internal.*` and `*.impl` are\
  \ protected from public API exposure.\n\n4. **Service Interface Contracts**: Services\
  \ implement well-defined SPI interfaces:\n   ```java\n   // MapService implements\
  \ 12+ service interfaces\n   public class MapService implements ManagedService,\
  \ ChunkedMigrationAwareService,\n       PartitionAwareService, RemoteService, EventPublishingService,\
  \ \n       SplitBrainHandlerService, TransactionalService, ...\n   ```\n\n5. **Centralized\
  \ Service Management**: The `ServiceManagerImpl` (`hazelcast/src/main/java/com/hazelcast/spi/impl/servicemanager/impl/ServiceManagerImpl.java`)\
  \ manages all service lifecycle through standard interfaces (`ManagedService.init()`,\
  \ `ManagedService.shutdown()`).\n\n### Secondary Style: Microkernel (Plugin)\n\n\
  The architecture exhibits strong **Microkernel/Plugin** characteristics through\
  \ its extensibility mechanisms:\n\n1. **Service Discovery via ServiceLoader**: Services\
  \ are discovered via `META-INF/services`:\n   - `hazelcast/src/main/resources/META-INF/services/com.hazelcast.spi.impl.servicemanager.ServiceDescriptorProvider`\n\
  \   - Multiple extension points use this pattern: `DataConnectionRegistration`,\
  \ `DiscoveryStrategyFactory`, `SerializerHook`, etc.\n\n2. **Pluggable Extension\
  \ Modules**: The `extensions/` directory contains optional plugins that can be added\
  \ to the core:\n   - `extensions/kafka/` - Kafka connector\n   - `extensions/mongodb/`\
  \ - MongoDB connector\n   - `extensions/elasticsearch/` - Elasticsearch integration\n\
  \   - `extensions/grpc/`, `extensions/protobuf/`, `extensions/python/`\n\n3. **Dynamic\
  \ Service Configuration**: `ServiceConfig.java` allows runtime registration of custom\
  \ services:\n   ```java\n   public class ServiceConfig {\n       private String\
  \ className;\n       private Object serviceImpl;\n       private Properties properties;\n\
  \   }\n   ```\n\n4. **Extension Points Throughout**:\n   - `NodeExtension` for extending\
  \ core node behavior\n   - `DataConnectionRegistration` for pluggable data sources\n\
  \   - `DiscoveryStrategyFactory` for custom discovery mechanisms\n   - `SerializerHook`\
  \ for custom serialization\n\n### What This Is NOT\n\n- **Not Microservices**: Single\
  \ JAR deployment, no independent services owning separate data stores, no inter-service\
  \ network communication, no container orchestration configs.\n\n- **Not Event-Driven\
  \ Architecture**: While Hazelcast provides event-based features (topics, event listeners,\
  \ Jet streaming), these are product capabilities, not the codebase's organizational\
  \ structure.\n\n- **Not Domain-Driven Design**: Services are organized by technical\
  \ capability (map, queue, cache, executor), not business domains. No bounded contexts,\
  \ aggregates, or ubiquitous language patterns.\n\n- **Not Layered Architecture**:\
  \ No horizontal separation into presentation/business/data layers. Organization\
  \ is by service capability, not functional layer.\n\n- **Not Space-Based Architecture**:\
  \ While Hazelcast IS an in-memory data grid (a space-based product), the codebase's\
  \ organization is service-based modularity, not organized around data grids and\
  \ processing units."
