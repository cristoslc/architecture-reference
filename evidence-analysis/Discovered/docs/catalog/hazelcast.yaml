classification_reasoning: "Hazelcast is a textbook implementation of a **Space-Based**\
  \ architecture. While it provides features like streaming and SQL, its primary architectural\
  \ identity is a distributed, in-memory data grid designed to eliminate the central\
  \ database bottleneck by distributing both data and processing across a cluster\
  \ of nodes.\n\n### 1. Primary Style: Space-Based\nThe core of Hazelcast’s architecture\
  \ is centered around distributed data structures (maps, queues, topics) that are\
  \ partitioned across multiple nodes. \n- **Evidence:** The README highlights \"\
  Distributed, partitioned, queryable key-value store\" and \"Distributed coordination\
  \ for microservices.\" \n- **Mechanism:** The system uses \"Processing Units\" (Hazelcast\
  \ nodes) that hold a portion of the data (partitions) and perform operations locally\
  \ to that data. This is supported by the `docs/design/partitioning` and `docs/design/cluster`\
  \ directories, which describe split-brain recovery, migration, and anti-entropy\
  \ mechanisms—all hallmarks of the Space-Based pattern.\n\n### 2. Secondary Style:\
  \ Microkernel (Plugin)\nHazelcast's extensibility is managed through a sophisticated\
  \ plugin system, allowing it to integrate with various external ecosystems without\
  \ bloating the core engine.\n- **Evidence:** The existence of a dedicated `/extensions`\
  \ directory containing modules for `kinesis`, `s3`, `mongodb`, `cdc-postgres`, `kafka`,\
  \ and `elasticsearch`.\n- **Mechanism:** The core engine provides \"Ports\" (Connectors)\
  \ that these plugins implement to ingest or sink data. This allows the core (\"\
  Jet\" engine and the data grid) to remain independent of the specific data sources\
  \ it interacts with.\n\n### 3. Secondary Style: Pipeline (Pipe-and-Filter)\nThe\
  \ \"Jet\" engine within Hazelcast (now unified into the main repo) follows a **Pipeline**\
  \ architecture for stream and batch processing. \n- **Evidence:** The README mentions\
  \ \"Stateful and fault-tolerant data processing... using SQL or dataflow API.\"\
  \ The directory `docs/design/jet` contains design docs for \"stage rebalance,\"\
  \ \"connectors,\" and \"watermarks.\"\n- **Mechanism:** Data flows through a Directed\
  \ Acyclic Graph (DAG) of vertices (filters/transformers) and edges (pipes), where\
  \ each step performs a specific transformation on the stream.\n\n### Architecture\
  \ Rejection\n- **Microservices:** While Hazelcast supports microservices, the repository\
  \ itself is a distributed systems platform, not a collection of microservices. It\
  \ is a set of modules that compile into a unified runtime.\n- **Layered:** Although\
  \ internal code has layers (API, Service, SPI), the primary structural concern is\
  \ the horizontal distribution of data and tasks across a network, making \"Layered\"\
  \ an insufficient description."
