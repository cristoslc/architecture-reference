review_notes: 'The Frappe Framework is a quintessential example of a **Microkernel
  (Plugin)** architecture, designed specifically to be extended by "apps" (such as
  ERPNext). Its core identity revolves around the "Bench" environment, which manages
  a collection of independent applications that are loaded into a single runtime.


  ### Reasoning:


  **1. Microkernel (Plugin) / Extension Architecture:**

  Frappe is built on the concept of "Apps" as plugins.

  - **`frappe/hooks.py`**: This is the central integration point. It defines how external
  apps can hook into the core framework’s events, overriding or extending functionality
  without modifying the core.

  - **`frappe/core`**: This directory contains the "Microkernel" components—the essential
  services like user management, file handling, and permissions that all other plugins
  (apps) rely on.

  - **Metadata-Driven**: The README mentions the "Semantic Web" inspiration. The framework
  treats "DocTypes" (metadata definitions) as the primary way to extend the system,
  allowing plugins to define data structures that the core then renders and manages.'
