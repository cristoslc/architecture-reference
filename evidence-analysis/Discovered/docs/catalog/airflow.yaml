classification_reasoning: Apache Airflow is structured as a Microkernel (Plugin) architecture
  at its core, complemented by a Service-Based deployment topology. The defining structural
  characteristic is the extensive providers/ system with 100+ independently versioned
  packages. The core handles scheduling, DAG parsing, and state management while all
  connectivity is in separate provider packages with registration via provider.yaml
  files. The task-sdk provides stable BaseOperator/BaseHook interfaces. Deployment
  is 4-5 coarse-grained services (Scheduler, Webserver, Worker, Triggerer) sharing
  a metadata database — characteristic of Service-Based rather than Microservices.
  Internally follows a Layered pattern with UI/CLI, domain models (DAG, TaskInstance),
  and data access via SQLAlchemy.
