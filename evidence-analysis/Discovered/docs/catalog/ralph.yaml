review_notes: 'The repository follows a **Layered** architecture, specifically adhering
  to the patterns of a large-scale **Django** application. The codebase is organized
  into a single deployable unit (as evidenced by the `Dockerfile` and `docker-compose.yml`
  in the root/docker directory) but is partitioned into several internal domain-specific
  modules.


  ### Evidence of Layered Architecture:

  The system uses the standard horizontal layering associated with the Django framework
  across its internal apps (e.g., `src/ralph/data_center`, `src/ralph/back_office`):

  - **Presentation Layer**: Handled via `views.py`, `templates/`, and `forms.py` (e.g.,
  `src/ralph/data_center/views.py`, `src/ralph/data_center/forms.py`).

  - **Business Logic/Domain Layer**: Encapsulated within `models.py` and `admin.py`
  (which in Django often contains significant orchestrating logic), as well as specialized
  modules like `publishers.py` and `signals.py`.

  - **Data Access Layer**: Abstracted by Django’s ORM within `models.py` and managed
  through `migrations/` directories.

  - **API Layer**: Expressed through `api.py` files (e.g., `src/ralph/back_office/api.py`),
  likely using Django Rest Framework.


  ### Evidence of Modular Monolith:'
