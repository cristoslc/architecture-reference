review_notes: 'Classic Django layered architecture: presentation (admin views/templates
  in ralph/admin/), API layer (DRF with centralized RalphRouter in ralph/api/routers.py),
  business logic (models + transitions system in ralph/lib/transitions/), data access
  (Django ORM across 20+ apps). Modular Monolith signals from well-defined Django
  apps: assets, data_center, back_office, networks, deployment, dhcp, dns, domains,
  virtual, operations, etc. Each app has models.py, admin.py, views.py, and api/ subpackages.
  Single deployable: docker-compose.yml runs one web service with nginx/MySQL/Redis.
  Shared lib/ directory provides cross-cutting concerns (transitions, custom_fields,
  permissions, metrics). INSTALLED_APPS in settings/base.py lists all ~25 internal
  apps. URL routing in urls/base.py is a single monolithic dispatcher. No messaging,
  event bus, or service decomposition detected.'
