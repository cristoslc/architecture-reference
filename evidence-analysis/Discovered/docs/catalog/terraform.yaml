classification_reasoning: "## Analysis\n\n**Primary Classification: Microkernel (Plugin)**\n\
  \nTerraform exhibits a classic microkernel architecture where a minimal core system\
  \ is extended through plugins loaded at runtime. The evidence is compelling:\n\n\
  ### Core System + Plugin Extension Model\n\n1. **Single Core Binary**: Terraform\
  \ compiles to a single executable (`main.go`), with all core functionality in the\
  \ `internal/` directory (65+ packages). There's one `go.mod` defining a single module.\n\
  \n2. **Plugin Infrastructure**: The architecture explicitly separates Terraform\
  \ Core from providers:\n   - From `README.md` (line 38): *\"This repository contains\
  \ only Terraform core, which includes the command line interface and the main graph\
  \ engine. Providers are implemented as plugins, and Terraform can automatically\
  \ download providers that are published on the Terraform Registry.\"*\n\n3. **go-plugin\
  \ Integration**: \n   - `go.mod` line 29: `github.com/hashicorp/go-plugin v1.7.0`\n\
  \   - `main.go` line 17: `\"github.com/hashicorp/go-plugin\"` imported directly\n\
  \   - `internal/plugin/plugin.go` defines `VersionedPlugins` mapping for protocol\
  \ versions 5 and 6\n\n4. **gRPC Plugin Protocol**:\n   - Protocol definitions in\
  \ `docs/plugin-protocol/tfplugin5.proto` and `tfplugin6.proto`\n   - The plugin\
  \ protocol documentation (`docs/plugin-protocol/README.md`) describes: *\"Terraform\
  \ plugins are normal executable programs that, when launched, expose gRPC services\
  \ on a server... Terraform Core discovers and launches plugins, waits for a handshake\
  \ to be printed on the plugin's stdout, and then connects to the indicated port\
  \ number as a gRPC client.\"*\n\n5. **Plugin Discovery System**:\n   - `internal/getproviders/`\
  \ contains 30+ files for discovering, downloading, and caching providers from registries\n\
  \   - `provider_source.go` builds provider sources from CLI configuration\n\n6.\
  \ **Provider Interface Contract**:\n   - `internal/providers/provider.go` defines\
  \ `Interface` with methods: `GetProviderSchema`, `ConfigureProvider`, `ReadResource`,\
  \ `ApplyResourceChange`, etc.\n   - External providers implement this interface\
  \ via SDKs that speak the gRPC protocol\n\n### Backend Plugin System\n\nBackends\
  \ also follow a plugin pattern (though currently compiled in):\n- `internal/backend/backend.go`\
  \ defines the `Backend` interface\n- `internal/backend/init/init.go` registers backends:\
  \ local, remote, cloud, plus 10+ remote-state backends (S3, consul, azure, gcs,\
  \ kubernetes, oci, oss, pg, etc.)\n- Comment notes (line 40-43): *\"Backends are\
  \ hardcoded into Terraform because the API for backends uses complex structures\
  \ and supporting that over the plugin system is currently prohibitively difficult.\"\
  *\n\n### Built-in Plugins\n\nEven internal plugins follow the plugin interface:\n\
  - `internal/builtin/providers/factories.go` provides `BuiltInProviders()` returning\
  \ the built-in \"terraform\" provider\n- `internal/builtin/provisioners/` contains\
  \ file, local-exec, remote-exec provisioners\n\n---\n\n**Secondary Classification:\
  \ Modular Monolith**\n\nWhile the plugin architecture dominates, Terraform also\
  \ exhibits modular monolith characteristics:\n\n1. **Strong Internal Package Boundaries**:\
  \ The `internal/` directory contains 65+ distinct packages (`addrs`, `backend`,\
  \ `cloud`, `command`, `configs`, `dag`, `states`, `terraform`, etc.), each with\
  \ clear responsibilities.\n\n2. **Single Deployable Unit**: One binary, one `go.mod`,\
  \ no sub-modules or separate deployables.\n\n3. **Package Organization**: Clear\
  \ separation of concerns:\n   - `internal/command/` - CLI commands (140 files)\n\
  \   - `internal/terraform/` - Core engine (246 files)\n   - `internal/configs/`\
  \ - Configuration parsing\n   - `internal/states/` - State management\n   - `internal/dag/`\
  \ - Graph operations\n\n---\n\n**What I Rejected:**\n\n- **Not Microservices**:\
  \ Single binary, single process (plugins are child processes, not independent services),\
  \ no network-based service boundaries.\n  \n- **Not Layered**: While there's a request\
  \ flow (CLI → Backend → Terraform Context), the architecture is organized around\
  \ the plugin contract, not horizontal layer separation. The `internal/terraform/`\
  \ package contains both business logic and orchestration.\n\n- **Not Hexagonal**:\
  \ No explicit ports/adapters pattern. The plugin system serves a similar purpose\
  \ but follows the microkernel pattern more closely with its discovery, loading,\
  \ and protocol negotiation mechanisms.\n\n- **Not Pipeline**: Despite the plan/apply\
  \ workflow, Terraform's core is not organized around data flowing through sequential\
  \ processing stages. It's organized around a graph-based execution engine (DAG)\
  \ coordinating plugins."
