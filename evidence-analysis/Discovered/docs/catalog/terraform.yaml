review_notes: '```


  ### Architecture Analysis


  Terraform Core is a classic example of a **Microkernel (Plugin)** architecture.
  The repository’s structure and documentation explicitly separate the "Core" engine
  from the "Providers" (plugins) that handle the actual business logic of interacting
  with infrastructure APIs.


  #### Evidence for Microkernel (Plugin)

  1.  **Core-Plugin Separation:** The README states: *"This repository contains only
  Terraform core... Providers are implemented as plugins."* The core handles the lifecycle,
  graph evaluation, and CLI, while all resource-specific logic is offloaded to external
  binaries.

  2.  **Internal Provider Implementation:** The path `internal/provider-simple-v6`
  shows how Terraform maintains internal mock or simple providers for testing and
  bootstrapping, mirroring the same interface expected from external plugins.

  3.  **Plugin Protocols:** The presence of `tools/protobuf-compile` and references
  to gRPC-based provider communication (implied by Terraform''s known architecture
  and the directory labels) indicates a rigid contract between the kernel (Core) and
  extensions (Providers).'
