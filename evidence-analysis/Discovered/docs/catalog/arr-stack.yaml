review_notes: 'Multi-repo ecosystem forming a coordinated service-based media
  automation system. Workflow: (1) User submits request via Overseerr web UI;
  (2) Overseerr dispatches to Sonarr (TV) or Radarr (movies) via REST API
  (/api/v3/); (3) Sonarr/Radarr query Prowlarr for available indexers via
  /api/v1/indexer; (4) Sonarr/Radarr manage download clients and monitor
  completion; (5) Bazarr polls Sonarr/Radarr libraries via their APIs and fetches
  subtitles from OpenSubtitles/Addic7ed. Each service: independently versioned
  (separate GitHub repos, release cycles), independently deployed (own Docker
  container), own SQLite database, own REST API with OpenAPI documentation.
  Communication is synchronous REST with webhook callbacks for event notification.
  5 coarse-grained services with clear domain boundaries (request management,
  TV acquisition, movie acquisition, indexer aggregation, subtitle management)
  communicating via well-defined REST APIs. Service-Based because this is the
  canonical pattern: independently deployed coarse-grained services coordinating
  via APIs without service mesh or API gateway overhead.'
