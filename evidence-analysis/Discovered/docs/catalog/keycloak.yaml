review_notes: 'Keycloak is a classic example of a **Microkernel (Plugin)** architecture.
  While it is delivered as a single deployable unit (typically via the Quarkus distribution
  found in `./quarkus`), its entire internal design centers around a "Service Provider
  Interface" (SPI) model.


  ### 1. Primary Style: Microkernel (Plugin)

  The core of Keycloak is a minimal "kernel" that defines how to load, configure,
  and manage the lifecycle of various components.

  - **Evidence:** The presence of `./server-spi` and `./server-spi-private` at the
  root level indicates that the system''s contract (the SPIs) is decoupled from the
  implementations.

  - **Extension Points:** Keycloak is famous for its extensibility. Almost every internal
  function—authentication flows, database persistence (JPA/NoSQL), user federation
  (LDAP/Active Directory), and even protocol handling (SAML/OIDC)—is implemented as
  a "Provider" that plugs into the defined SPIs.

  - **Runtime Discovery:** It uses Java’s `ServiceLoader` mechanism or its own custom
  provider factory to discover and load JARs at runtime, allowing users to drop custom
  logic into the `/providers` directory without altering the core codebase.


  ### 2. Secondary Style: Modular Monolith

  Despite its extensibility, the repository is managed and deployed as a **Modular
  Monolith**.'
