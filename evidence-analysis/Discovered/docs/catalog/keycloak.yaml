notable_strengths:
- "92+ named SPIs covering every major capability — the most complete plugin kernel in the IAM space"
- "`isInternal()` API stability tiering formally distinguishes public extension points from internal ones"
- "`dependsOn()` topological initialization ordering manages inter-plugin dependencies"
- "FIPS 140-2 compliance achieved entirely through the crypto provider plugin, not a forked codebase"
- "Kubernetes Operator for automated lifecycle management"
notable_gaps:
- "Single-process deployment limits horizontal scalability to session replication (Infinispan), not independent service scaling"
- "Plugin classloading isolation is limited compared to OSGi-based systems — providers share the JVM classpath"
- "No formal plugin versioning or compatibility matrix for third-party providers across Keycloak major versions"
