classification_reasoning: "## Analysis\n\nKeycloak exhibits a **Microkernel (Plugin)\
  \ Architecture** as its primary architectural style, with secondary **Layered**\
  \ characteristics.\n\n### Primary Evidence: Microkernel (Plugin) Architecture\n\n\
  The codebase implements a sophisticated plugin system centered around the **Service\
  \ Provider Interface (SPI)** pattern:\n\n**Core Plugin Infrastructure:**\n- `server-spi/`\
  \ module defines the fundamental interfaces (`Provider.java`, `ProviderFactory.java`,\
  \ `Spi.java`)\n- `server-spi-private/` contains 100+ SPI definitions (e.g., `AuthenticatorSpi.java`,\
  \ `UserStorageProviderSpi.java`, `CredentialSpi.java`)\n- Each SPI defines a contract\
  \ (`Provider` interface) and a factory (`ProviderFactory` interface)\n\n**Plugin\
  \ Discovery Mechanism:**\n```java\n// DefaultProviderLoader.java - Uses Java ServiceLoader\
  \ for discovery\nfor (Spi spi : ServiceLoader.load(Spi.class, classLoader)) {\n\
  \    list.add(spi);\n}\n```\n\nProviders are registered via `META-INF/services/`\
  \ files. For example:\n- `federation/ldap/src/main/resources/META-INF/services/org.keycloak.storage.UserStorageProviderFactory`\
  \ registers the LDAP storage provider\n- Over 164 service files across the codebase\
  \ register various providers\n\n**Runtime Plugin Loading:**\nThe `ProviderManager`\
  \ and `DefaultKeycloakSessionFactory` classes handle:\n- Discovery and registration\
  \ of all SPIs at startup\n- Loading provider factories via ServiceLoader\n- Dependency\
  \ ordering between providers (`dependsOn()` method)\n- Lifecycle management (`init()`,\
  \ `postInit()`, `close()`)\n\n**Extensibility Points:**\nThe architecture provides\
  \ numerous extension points (non-exhaustive):\n- Authentication flows (`AuthenticatorSpi`)\n\
  - User storage backends (`UserStorageProviderSpi` - LDAP, Kerberos, SSSD federation)\n\
  - Credential providers (`CredentialSpi`)\n- Cryptographic providers (`SignatureSpi`,\
  \ `HashSpi`)\n- Event listeners (`EventListenerSpi`)\n- Protocol mappers (`ProtocolMapperSpi`)\n\
  - Theme providers (`ThemeSpi`)\n- Vault providers (`VaultSpi`)\n- Identity providers\
  \ (`IdentityProviderSpi`)\n\n**Example: User Storage Plugin Contract**\n```java\n\
  // UserStorageProviderSpi.java\npublic class UserStorageProviderSpi implements Spi\
  \ {\n    @Override\n    public boolean isInternal() {\n        return false;  //\
  \ External implementations allowed\n    }\n    @Override\n    public Class<? extends\
  \ Provider> getProviderClass() {\n        return UserStorageProvider.class;\n  \
  \  }\n}\n```\n\nThe `isInternal()` flag on each SPI distinguishes between internal\
  \ (built-in only) and external (extensible) extension points.\n\n### Secondary Evidence:\
  \ Layered Architecture\n\nThe codebase also exhibits layering:\n- **SPI Layer**:\
  \ `server-spi/` and `server-spi-private/` define stable contracts\n- **Model Layer**:\
  \ `model/` contains data access abstractions (JPA, Infinispan, storage)\n- **Services\
  \ Layer**: `services/` implements business logic and default providers\n- **REST\
  \ Layer**: `rest/` provides HTTP endpoints\n\nHowever, the module structure reveals\
  \ that plugin extensibility is the primary organizational principle:\n```\nkeycloak/\n\
  ├── server-spi/          # Public plugin contracts\n├── server-spi-private/  # Internal\
  \ plugin contracts\n├── services/            # Default implementations\n├── federation/\
  \          # User federation plugins (ldap, kerberos, sssd)\n├── crypto/       \
  \       # Crypto provider plugins\n└── model/               # Storage backend plugins\
  \ (jpa, infinispan)\n```\n\n### What This Is NOT\n\n- **Not Microservices**: Single\
  \ deployable application (Quarkus server), one Dockerfile, one distribution. No\
  \ independent services.\n- **Not Event-Driven**: No message broker configurations\
  \ or event-sourced architecture. Events exist but are not the primary communication\
  \ pattern.\n- **Not Domain-Driven Design**: No bounded context organization, no\
  \ aggregates/entities/value objects pattern.\n- **Not Hexagonal**: Ports and adapters\
  \ pattern is not used; the SPI pattern is different (plugin-based rather than adapter-based).\n\
  \n### Deployment Characteristics\n\nThe `quarkus/container/Dockerfile` confirms\
  \ a single-server deployment model:\n```dockerfile\nENTRYPOINT [ \"/opt/keycloak/bin/kc.sh\"\
  \ ]\n```\n\n### Conclusion\n\nKeycloak's architecture is a textbook example of a\
  \ **Microkernel (Plugin) system**: a minimal core server that discovers and loads\
  \ functionality through a well-defined SPI mechanism. The entire system is designed\
  \ around extensibility - virtually every major feature can be replaced or extended\
  \ by implementing provider interfaces and registering them via Java's ServiceLoader\
  \ mechanism. The public vs. private SPI distinction demonstrates intentional API\
  \ stability management for third-party extensions."
