one_line_summary: Open-source IAM platform (OAuth2/OIDC/SAML) built on a Service Provider Interface kernel where all capabilities — authentication, storage, cryptography, protocols — are loaded as plugins at runtime.
review_notes: "Keycloak is the canonical textbook example of a **Microkernel** architecture.\
  \ The entire system is organized around a Service Provider Interface (SPI) mechanism:\
  \ a three-interface kernel contract (`Provider`, `ProviderFactory`, `Spi`) in `server-spi/`\
  \ anchors 92+ named extension points in `server-spi-private/`, all discovered at\
  \ runtime via `java.util.ServiceLoader` from 200 `META-INF/services/` registrations.\
  \ Every major capability — authentication flows, user storage, cryptography, login\
  \ protocols, event listeners, UI themes, vault integration — is a named SPI with\
  \ pluggable implementations. The `isInternal()` flag formally tiers extension points\
  \ into internal-only and externally extensible (e.g., `UserStorageProviderSpi.isInternal()\
  \ = false`). Despite this extensibility, the system is deployed as a single Quarkus\
  \ server process (one Dockerfile, one entrypoint `kc.sh`, 31 Maven modules under\
  \ a single version), making **Modular Monolith** the correct secondary style. The\
  \ previous secondary classification of Layered is superseded: layering exists within\
  \ individual modules but is not the dominant system-level organizing principle."
