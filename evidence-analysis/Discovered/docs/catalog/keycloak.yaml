classification_reasoning: "## Analysis\n\nKeycloak exhibits a **Microkernel** architecture\
  \ as its primary style and **Modular Monolith** as its secondary style.\n\n### Primary\
  \ Evidence: Microkernel Architecture\n\n**Three-interface kernel contract (`server-spi/`):**\n\
  - `Provider.java` — minimal interface (only `close()`) that every plugin must implement\n\
  - `Spi.java` — defines a named extension point: `isInternal()`, `getName()`, `getProviderClass()`,\
  \ `getProviderFactoryClass()`\n- `ProviderFactory.java` — manages plugin lifecycle:\
  \ `init()`, `postInit()`, `close()`, `create(KeycloakSession)`, and `dependsOn()`\
  \ for topological initialization ordering\n\n**92 named extension points in `server-spi-private/`:**\n\
  AuthenticatorSpi, ClientAuthenticatorSpi, FormAuthenticatorSpi, RequiredActionSpi,\
  \ UserStorageProviderSpi, LoginProtocolSpi, IdentityProviderSpi, EventListenerSpi,\
  \ ThemeSpi, SignatureSpi, HashSpi, CekManagementSpi, ClusterSpi, VaultSpi, TracingSpi,\
  \ ClientModelMapperSpi, and 76 more.\n\n**Plugin discovery via `java.util.ServiceLoader`:**\n\
  `ProviderManager.java` uses `ServiceLoader.load(ProviderLoaderFactory.class, ...)` to\
  \ discover all provider loaders. Providers register themselves via 200 `META-INF/services/`\
  \ files (non-test). `DefaultKeycloakSessionFactory.init()` iterates all discovered\
  \ SPIs and their registered factories at startup.\n\n**`isInternal()` stability tiering:**\n\
  `UserStorageProviderSpi.isInternal() = false` marks the primary third-party extension\
  \ point. Internal SPIs (`AuthenticatorSpi.isInternal() = true`, `LoginProtocolSpi.isInternal()\
  \ = true`) are reserved for built-in implementations. This is formal API stability\
  \ management for a third-party plugin ecosystem.\n\n**`dependsOn()` topological ordering:**\n\
  `ProviderFactory.dependsOn()` returns a set of `Provider` classes that must be initialized\
  \ before this factory's `postInit()` is called. The kernel manages this ordering —\
  \ a feature that only exists in mature plugin systems with cross-plugin dependencies.\n\
  \n**Built-in plugin implementations (reference implementations):**\n- `federation/ldap/`\
  \ — LDAP/AD user storage provider\n- `federation/kerberos/` — Kerberos federation\
  \ provider\n- `federation/sssd/` — SSSD federation provider\n- `crypto/` — BouncyCastle\
  \ and FIPS 140-2 cryptographic providers\n- `model/jpa/` — JPA-based storage provider\n\
  - `model/infinispan/` — Infinispan session cache provider\n- `services/` — default\
  \ implementations of ~149 provider interfaces\n\n### Secondary Evidence: Modular\
  \ Monolith\n\nDespite the extensibility architecture, Keycloak is a single deployable\
  \ unit:\n- Single Dockerfile: `quarkus/container/Dockerfile` with `ENTRYPOINT [\"\
  /opt/keycloak/bin/kc.sh\"]`\n- Single Maven build: 31 modules all under one parent\
  \ POM with a unified version\n- Single Quarkus process: `KeycloakApplication` (JAX-RS)\
  \ hosts all endpoints (Admin REST, OIDC, SAML, Account Console, Admin Console) in\
  \ one JVM\n- In-process provider dispatch: `DefaultKeycloakSession` holds a `Map<List<String>,\
  \ Provider>` and resolves all providers by SPI type + ID — no network hop between\
  \ components\n- Build-time wiring: `quarkus/deployment/KeycloakProcessor` performs\
  \ Quarkus augmentation, statically wiring discovered providers into the final application\
  \ artifact\n\n### What This Is NOT\n\n- **Not Microservices**: Single binary, single\
  \ Dockerfile, single process. The Kubernetes Operator is a separate process but it\
  \ manages Keycloak — it is not a Keycloak subsystem.\n- **Not Layered (primary)**:\
  \ Layering exists within modules (SPI layer, service layer, REST layer) but the primary\
  \ organizing principle across the system is the plugin extension point, not unidirectional\
  \ layer dependencies.\n- **Not Event-Driven**: EventListenerSpi exists for audit\
  \ events but is a plugin capability, not the primary inter-component communication\
  \ mechanism.\n- **Not Hexagonal**: SPI is plugin-based (providers plug into a named\
  \ registry), not adapter-based (infrastructure adapts to a domain port).\n- **Not\
  \ Pipeline**: Authentication flows are stateful directed graphs, not linear pipelines\
  \ with typed stage contracts.\n\n### Conclusion\n\nKeycloak demonstrates a textbook\
  \ Microkernel architecture: a minimal three-interface kernel that discovers and dispatches\
  \ all functionality through 92+ named extension points, loaded at runtime via Java\
  \ ServiceLoader from 200 provider registrations. The entire system is deployed as\
  \ a single Quarkus server (Modular Monolith), distinguishing it from microservices\
  \ while preserving deep runtime extensibility."
