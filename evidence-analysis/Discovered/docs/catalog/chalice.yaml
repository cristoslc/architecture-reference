review_notes: "Evidence: chalice/deploy/deployer.py lines 1-80 document a multi-stage deployment pipeline (Application Graph Builder -> Dependency Builder -> Build Stage -> Plan Stage -> Sweeper -> Executor -> Recorder). Deployer._deploy() (line 380) chains these stages sequentially, each transforming data for the next. BuildStage (line 643) iterates steps list over resources in classic pipe-and-filter. Package is layered: app.py (standalone runtime), cli/ (presentation), config.py (configuration), deploy/ (infrastructure with models/planner/executor), awsclient.py (AWS integration). setup.py describes itself as 'Microframework'. Classifying what the repo IS (a deployment tool with pipeline architecture), not what it enables (serverless apps)."