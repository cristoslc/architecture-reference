one_line_summary: >-
  A Microkernel (plugin) system in which a minimal JVM core for cluster
  coordination, transport, and storage is extended at runtime by 100+
  typed plugin extension points spanning open-source modules, optional
  plugins, and commercial X-Pack features.
classification_reasoning: |
  ## Primary: Microkernel

  Elasticsearch's defining architectural characteristic is a kernel + plugin topology:

  - `server/src/main/java/org/elasticsearch/plugins/Plugin.java` is the abstract base
    class that every extension must implement. The `plugins/` directory defines 17+
    typed extension interfaces (ActionPlugin, AnalysisPlugin, EnginePlugin, IngestPlugin,
    MapperPlugin, NetworkPlugin, RepositoryPlugin, SearchPlugin, etc.), each representing
    a formal extension contract against the kernel.

  - `PluginsService.java` and `PluginsLoader.java` manage plugin discovery (from
    `modules/`, `plugins/`, and `x-pack/plugin/` filesystem directories), classloader
    isolation per plugin via separate Java `ModuleLayer` instances, plugin descriptor
    parsing (`plugin-descriptor.properties`), and full lifecycle management
    (start/stop/reload).

  - Three tiers of extension all use the identical plugin mechanism:
      - Built-in modules (`modules/`): ~30 pre-installed plugins (lang-painless,
        transport-netty4, analysis-common, ingest-geoip, repository-s3, etc.)
      - Optional plugins (`plugins/`): ~15 (analysis-icu, discovery-ec2, repository-hdfs)
      - X-Pack commercial plugins (`x-pack/plugin/`): ~60 (security, ml, sql, esql,
        transform, watcher, inference, monitoring, etc.)

  - `libs/entitlement/` provides a security sandbox that controls what sensitive
    operations each plugin classloader is permitted to perform, a hallmark of
    production microkernel design.

  - The flagship commercial plugins confirm the pattern:
      `public class Security extends Plugin implements ActionPlugin, IngestPlugin, NetworkPlugin, ...`
      `public class MachineLearning extends Plugin implements ActionPlugin, AnalysisPlugin, ...`

  - `settings.gradle` uses `addSubProjects()` to auto-discover all plugin subprojects,
    meaning the entire repository topology is organized around the kernel + plugin model.

  ## Secondary: Layered

  The internal architecture documentation (`docs/internal/GeneralArchitectureGuide.md`,
  `docs/internal/DistributedArchitectureGuide.md`) explicitly documents a strict layered
  request path: REST/HTTP → Transport/Action → Cluster/Coordination → Index/Shard →
  Engine → Lucene. The Guice DI system (`injection/guice/`) and named Module classes
  (ActionModule, ClusterModule, IndicesModule, DiscoveryModule, GatewayModule) enforce
  these layer boundaries through dependency injection.

  ## Tertiary: Modular Monolith

  A single JVM process is packaged per node (`distribution/archives/`, `distribution/docker/`).
  Despite ~100 independently buildable Gradle subprojects, all modules execute in the same
  JVM with shared thread pools (ThreadPool.java), a shared ClusterService, and in-process
  method calls. This is a modular monolith with microkernel-style runtime extension points.

  ## Rejected Styles

  - Microservices: No service decomposition within a node; each node is one monolithic JVM.
  - Service-Based: No coarse-grained service boundaries; cluster state is a single Raft
    consensus domain (Coordinator.java, CoordinationState.java).
  - Event-Driven: Cluster state uses Raft publish/commit, not message brokers. Ingest
    pipelines are a feature, not an architectural principle.
  - Pipeline: Ingest pipeline is a subsystem; the system topology is kernel + plugins.
  - CQRS: No command/query separation; read and write share the same shard/engine.
  - Hexagonal: Transport/REST are swappable via plugins but code is not organized around
    explicit named ports/adapters.
  - DDD: Domain objects exist but no bounded contexts, aggregates, or DDD layer decomposition.
