review_notes: "This repository (Elasticsearch) is a classic exemplar of the **Microkernel\
  \ (Plugin)** architecture, implemented within a **Modular Monolith** build structure.\n\
  \n### 1. Primary Style: Microkernel (Plugin)\nThe system is designed around a minimal\
  \ \"server\" core that is extended via a sophisticated plugin and module system.\
  \ \n- **Core-Plugin Separation:** The `server/` directory contains the core engine\
  \ (cluster coordination, transport, and resource management), while high-level features\
  \ are decoupled into `plugins/` and `modules/`.\n- **Plugin Infrastructure:** The\
  \ `settings.gradle` file reveals a massive investment in automated discovery of\
  \ plugins and modules via `addSubProjects('', new File(rootProject.projectDir, 'plugins'))`.\n\
  - **Extensibility Points:** Files such as `PluginsServiceTests.java` and `ExtensionLoaderTests.java`\
  \ in the `server` module demonstrate the existence of formal `ExtensionPoint` and\
  \ `SPI` (Service Provider Interface) contracts. These allow plugins to inject custom\
  \ logic into the core (e.g., `DiscoveryPlugin`, `ActionPlugin`, `AnalysisPlugin`)\
  \ without the core having a compile-time dependency on the implementations.\n- **X-Pack\
  \ as a Plugin Aggregate:** The `x-pack/` directory functions as a massive suite\
  \ of commercial plugins (security, ml, sql, etc.) that plug into the same kernel\
  \ as the open-source plugins, reinforcing the microkernel pattern at scale.\n\n\
  ### 2. Secondary Style: Modular Monolith"
