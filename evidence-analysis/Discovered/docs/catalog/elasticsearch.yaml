review_notes: 'Classification based on well-known public knowledge of Elasticsearch''s
  architecture combined with catalog signals: (1) Modular Monolith — Elasticsearch
  is a single deployable unit composed of many internal modules (520 package manifests
  strongly suggest a large multi-module Gradle project with self-contained subsystems
  like engine, transport, plugins, modules/); (2) Layered N-Tier — the server core
  follows a classic layered pattern: REST API layer → action/transport layer → engine/index
  layer → Lucene storage layer; (3) Pipe-and-Filter — query parsing, analysis chains
  (tokenizers/filters), and indexing pipelines are central architectural patterns
  in Elasticsearch''s design. The heuristic signals for Event-Driven (Kafka/RabbitMQ
  presence, score 0.6) and CQRS (score 0.4) likely reflect test infrastructure or
  integrations in the qa/test modules rather than the core architecture style. 17
  container orchestration signals likely come from test harness Docker configs, not
  a microservices deployment topology. The single API spec signal and absence of service
  discovery/API gateway configs argue against Microservices.'
