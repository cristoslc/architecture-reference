classification_reasoning: "## Architecture Classification Analysis\n\n### Primary Styles:\
  \ Pipeline + Microkernel\n\n**PIPELINE (primary, 0.95):** Nextflow's entire runtime\
  \ is built on the GPars dataflow concurrency library (`groovyx.gpars.dataflow.*`).\
  \ Every process communicates exclusively through typed channels (`DataflowQueue`,\
  \ `DataflowVariable`) -- there is no shared mutable state between processes. `TaskProcessor.groovy`\
  \ creates a `DataflowOperator` per process instance and binds its input/output channels\
  \ so that work flows automatically when data arrives. The `DAG` class in `nextflow/dag/DAG.groovy`\
  \ builds a literal directed acyclic graph of `PROCESS`, `OPERATOR`, and `ORIGIN`\
  \ vertices connected by `Edge` objects carrying channel references. A library of\
  \ ~25 channel operators (`map`, `filter`, `collect`, `join`, `branch`, `mix`, `groupTuple`,\
  \ etc.) in `nextflow/extension/` composes higher-order pipeline graphs. `WorkflowDef.groovy`\
  \ models a named pipeline component with declared `take:`/`emit:` interfaces. The\
  \ core DSL keyword is `workflow`, and a Nextflow script is literally a description\
  \ of a data pipeline graph.\n\n**MICROKERNEL (primary, 0.91):** Nextflow uses PF4J\
  \ as its plugin runtime (`org.pf4j.PluginManager`, `org.pf4j.ExtensionPoint`),\
  \ visible in `ExecutorFactory.groovy` and `PluginExtensionPoint.groovy`. The core\
  \ defines three formal extension points via `PluginExtensionPoint`: `@Factory` (new\
  \ channel factories), `@Operator` (new channel operators), and `@Function` (new\
  \ DSL functions). Ten independently versioned plugin projects are declared in `settings.gradle`:\
  \ `nf-amazon`, `nf-google`, `nf-azure`, `nf-k8s`, `nf-tower`, `nf-wave`, `nf-cloudcache`,\
  \ `nf-codecommit`, `nf-console`, `nf-seqera`. `ExecutorFactory` discovers `Executor`\
  \ subclasses from the PF4J plugin manager at runtime. ADR `adr/20250922-plugin-spec.md`\
  \ formalises a JSON schema-based plugin specification so external tools (language\
  \ servers, registries) can introspect plugin capabilities without loading them into\
  \ the JVM -- a canonical microkernel design pattern.\n\n### Secondary Style: Modular\
  \ Monolith\n\n**MODULAR MONOLITH (secondary, 0.84):** The repository is a Gradle\
  \ multi-project monorepo with five internal modules (`nextflow`, `nf-commons`, `nf-httpfs`,\
  \ `nf-lang`, `nf-lineage`) and ten plugin sub-projects, all declared in `settings.gradle`.\
  \ `nf-lang` isolates the DSL parser, type system, and process/workflow AST; `nf-lineage`\
  \ implements data provenance tracking as an isolated `TraceObserverV2` implementation;\
  \ `nf-commons` provides shared utilities. These modules share the same JVM process\
  \ at runtime and communicate through direct object references and the GPars dataflow\
  \ bus, not over a network -- making this a modular monolith rather than microservices.\n\
  \n### What Was Rejected and Why\n\n**Not Microservices:** All modules and plugins\
  \ run in a single JVM process. There are no independent network services, no separate\
  \ data stores, and no inter-service communication protocols. The executor backends\
  \ (AWS Batch, Kubernetes, Slurm) are remote systems that Nextflow submits jobs to,\
  \ not services Nextflow is composed of.\n\n**Not Event-Driven (primary):** While\
  \ `TraceObserverV2` emits workflow lifecycle events, and GPars dataflow operators\
  \ are reactive to channel data, the primary coordination mechanism is the synchronous\
  \ dataflow pipeline graph -- not an event broker, message bus, or async event queue\
  \ acting as the backbone.\n\n**Not Layered:** Organisation is primarily vertical\
  \ by pipeline stage and plugin, not horizontal by presentation/business/data layers.\
  \ The `executor` and `processor` packages are not tiers in a stack but stages in\
  \ a flow.\n\n### Quality Attributes Evidence\n\n**PORTABILITY:** Abstract `Executor`\
  \ base class decouples pipeline logic from execution backend; 18+ built-in executor\
  \ implementations (local, slurm, sge, lsf, pbs, condor, k8s, etc.); cloud executors\
  \ added via plugins (AWS Batch, GCP Batch, Azure Batch); container runtimes (Docker,\
  \ Singularity, Podman, Apptainer, Charliecloud, Shifter) configured independently\
  \ of pipeline code.\n\n**EXTENSIBILITY:** PF4J plugin system with three formal extension\
  \ points (`@Factory`, `@Operator`, `@Function`); 10 bundled cloud and platform plugins;\
  \ JSON plugin spec schema (`adr/20250922-plugin-spec.md`) enables an open third-party\
  \ plugin ecosystem.\n\n**REPRODUCIBILITY:** Content-addressed task caching via `TaskHasher`\
  \ and `CacheDB`; `CachedTaskHandler` short-circuits re-execution of identical inputs;\
  \ `nf-lineage` module records full data provenance; container and conda/spack environment\
  \ pinning per process.\n\n**SCALABILITY:** Dataflow model naturally parallelises\
  \ all independent processes; `TaskPollingMonitor` and `BatchContext` manage concurrent\
  \ task submission; Kubernetes executor (`nf-k8s`) scales to pod-per-task.\n\n**OBSERVABILITY:**\
  \ `TraceObserverV2` interface for workflow lifecycle events; `TraceFileObserver`,\
  \ `ReportObserver`, `TimelineObserver`, `GraphObserver` produce trace CSV, HTML\
  \ reports, timeline HTML, and DAG SVG; `nf-tower`/`nf-seqera` plugins stream events\
  \ to Seqera Platform.\n\n**COMPOSABILITY:** Named sub-workflows with declared `take:`/`emit:`\
  \ interfaces; module system (`IncludeDef`, `ScriptMeta`) enables reusable, parameterised\
  \ workflow components across repositories."
