review_notes: 'README explicitly states ''based on the dataflow programming model''.
  Core abstraction: Channel.groovy (GPars DataflowQueue/DataflowVariable), ProcessDef.groovy
  and WorkflowDef.groovy implement ChainableDef for pipe composition. DAG.groovy models
  execution as directed acyclic graph of PROCESS/OPERATOR vertices connected by edges.
  Extension package has 37+ stream operators (map, branch, join, merge, mix, split,
  concat, etc.) inspired by RxJava per OperatorImpl.groovy comment. Splitter package
  provides data partitioning filters (Fasta, Fastq, CSV, JSON, Text). Gradle multi-module:
  5 core modules (nextflow, nf-commons, nf-httpfs, nf-lang, nf-lineage) + 10 plugins
  (nf-amazon, nf-google, nf-azure, nf-k8s, etc.). Plugin architecture confirmed by
  ADR (adr/20250922-plugin-spec.md). Single JVM deployable with executor abstraction
  for HPC/cloud backends. Language is Groovy not Java/Kotlin as initially classified.'
