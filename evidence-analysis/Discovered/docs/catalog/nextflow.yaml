review_notes: 'The Nextflow codebase is a sophisticated implementation of a **Microkernel
  (Plugin)** architecture, designed to provide a lightweight core engine that is extended
  through a robust plugin system for platform-specific execution (AWS, Google Cloud,
  Kubernetes) and feature sets.


  ### 1. Primary Style: Microkernel (Plugin)

  The repository demonstrates a classic Microkernel structure where the "core" (found
  in `modules/nextflow` and `modules/nf-commons`) contains the workflow orchestration
  logic, and all external integrations are treated as isolated plugins.

  - **Plugin Isolation:** The `plugins/` directory contains numerous independent projects
  (e.g., `nf-amazon`, `nf-google`, `nf-k8s`, `nf-tower`) each with its own `build.gradle`
  and `VERSION` file.

  - **Plugin Lifecycle & Registry:** As evidenced by `adr/20250922-plugin-spec.md`,
  the system includes a formal specification for plugins (JSON-based metadata) that
  allows the core and external tools (like language servers) to understand extension
  points (ConfigScopes, Functions, Operators) without loading the JVM bytecode.

  - **Dynamic Loading:** The `releaseInfo` task in the root `build.gradle` generates
  a `plugins-info.txt` file, which the core engine uses to manage and validate versioned
  plugin sets at runtime.


  ### 2. Secondary Style: Pipeline (Pipe-and-Filter)

  While "Dataflow" is the domain-specific term used in the README, the internal software
  organization of the execution engine follows the **Pipeline (Pipe-and-Filter)**
  pattern.'
