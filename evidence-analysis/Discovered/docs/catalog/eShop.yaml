one_line_summary: >-
  Official .NET reference e-commerce application built as independently deployable
  Microservices orchestrated by .NET Aspire, integrated via a RabbitMQ event bus
  with transactional outbox, and structured around DDD aggregates in the ordering
  bounded context.
classification_reasoning: |
  ## Architecture Analysis

  ### Primary Style: Microservices

  The eShop repository is a canonical reference implementation of the Microservices
  architecture style. The evidence is conclusive across deployment topology, data
  ownership, and protocol heterogeneity.

  **Independent Deployable Services (10+):**
  The AppHost (`src/eShop.AppHost/Program.cs`) orchestrates distinct services each
  with their own .csproj and Program.cs entry point:
  - `Catalog.API` — REST, PostgreSQL + pgvector, optional AI search
  - `Basket.API` — gRPC (Protobuf), Redis-backed
  - `Ordering.API` — REST, MediatR CQRS, PostgreSQL
  - `Identity.API` — OIDC/IdentityServer, PostgreSQL
  - `Webhooks.API` — REST, PostgreSQL
  - `OrderProcessor` — background event consumer (no HTTP endpoints)
  - `PaymentProcessor` — background event consumer (no HTTP endpoints)
  - `WebApp` — Blazor Server frontend
  - `HybridApp` — .NET MAUI mobile client (via YARP BFF)
  - `WebhookClient` — webhook receiver test app
  - YARP `mobile-bff` — API gateway / Backend-for-Frontend

  **Database-per-Service Pattern:**
  ```csharp
  var catalogDb  = postgres.AddDatabase("catalogdb");
  var identityDb = postgres.AddDatabase("identitydb");
  var orderDb    = postgres.AddDatabase("orderingdb");
  var webhooksDb = postgres.AddDatabase("webhooksdb");
  // Basket.API uses Redis exclusively
  ```

  **Protocol Heterogeneity:**
  - Basket.API exposes gRPC (`Grpc.AspNetCore`, basket.proto)
  - Catalog, Ordering, Webhooks expose versioned REST (Asp.Versioning.Http)
  - Identity.API exposes OIDC endpoints (Duende IdentityServer)
  This heterogeneity is the expected freedom of independently owned services.

  ### Primary Co-Style: Event-Driven Architecture

  Cross-service coordination is entirely asynchronous through an `IEventBus`
  abstraction backed by RabbitMQ. Integration events represent the sole coupling
  surface between services:

  **Event Bus Infrastructure:**
  ```csharp
  var rabbitMq = builder.AddRabbitMQ("eventbus")
      .WithLifetime(ContainerLifetime.Persistent);
  ```

  **Order Lifecycle Choreography (multi-service saga via events):**
  - `OrderStartedIntegrationEvent` published by Ordering.API on order creation
  - `OrderStatusChangedToAwaitingValidationIntegrationEvent` triggers Catalog.API
    stock check
  - `OrderStockConfirmedIntegrationEvent` / `OrderStockRejectedIntegrationEvent`
    returned by Catalog.API
  - `OrderStatusChangedToStockConfirmedIntegrationEvent` consumed by PaymentProcessor
  - `OrderPaymentSucceededIntegrationEvent` / `OrderPaymentFailedIntegrationEvent`
    complete the lifecycle

  **Transactional Outbox Pattern:**
  `IntegrationEventLogService<TContext>` (`src/IntegrationEventLogEF/`) persists
  integration events in the same DB transaction as domain changes before relay to
  RabbitMQ, guaranteeing at-least-once delivery without distributed transactions.
  The `TransactionBehavior` MediatR pipeline behavior coordinates commit + outbox
  flush atomically per command.

  ### Strong Secondary Style: Domain-Driven Design

  The Ordering bounded context is a textbook DDD implementation demonstrating the
  full tactical pattern set:

  **Aggregate Root with Business Invariants:**
  ```csharp
  public class Order : Entity, IAggregateRoot
  ```
  `Order` enforces that items can only be added through `AddOrderItem()`, status
  transitions are guarded by preconditions, and state changes raise domain events.

  **Domain Events:**
  7 domain events in `src/Ordering.Domain/Events/`: OrderStartedDomainEvent,
  OrderCancelledDomainEvent, OrderShippedDomainEvent,
  OrderStatusChangedToAwaitingValidationDomainEvent, etc.

  **Value Objects:**
  `Address` is a Value Object persisted as an EF Core owned entity with structural
  equality semantics.

  **Separated Domain/Infrastructure/Application Layers:**
  - `Ordering.Domain` — zero infrastructure dependencies
  - `Ordering.Infrastructure` — EF Core repositories, UnitOfWork, domain event dispatch
  - `Ordering.API` — application layer (CQRS commands, queries, domain event handlers)

  **Domain Event → Integration Event Bridge:**
  `OrderCancelledDomainEventHandler` (and peers) translate internal domain events
  into outbound integration events, maintaining the bounded context boundary.

  **Repository Pattern:**
  `IOrderRepository` / `IBuyerRepository` defined in the domain layer; EF Core
  implementations in Infrastructure satisfy the ports.

  ### CQRS (Service-Internal Pattern, Not Primary Style)

  Ordering.API applies CQRS internally:
  - Write side: 9 MediatR command/handler pairs in `Application/Commands/`
  - Read side: `IOrderQueries` / `OrderQueries` with raw Dapper-style SQL projections

  This is a service-level structural pattern, not a system-level architecture.
  It is evidence supporting DDD depth rather than a standalone primary classification.

  ### Rejected Styles

  - **Modular Monolith:** Multiple processes with isolated databases. Not a single
    deployable unit.
  - **Layered:** No horizontal layer model spanning services.
  - **Service-Based:** Services do not share a monolithic database; each owns its
    store (the key Microservices distinction).
  - **Pipeline:** Event flows are choreography-based saga, not extract-transform-load
    pipeline processing.
  - **Microkernel:** No plug-in host / core + extension registry model.
  - **Serverless:** Services are long-running containers, not FaaS.
  - **Space-Based:** No distributed grid or tuple-space pattern.
  - **Hexagonal Architecture:** Port/adapter repository interfaces are a DDD tactic
    within Ordering, not the primary framing of the overall system.
  - **Multi-Agent:** Optional OpenAI/Ollama catalog AI search is additive and does
    not constitute an agent orchestration architecture.
