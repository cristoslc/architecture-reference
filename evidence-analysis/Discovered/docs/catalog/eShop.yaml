classification_reasoning: "## Architecture Analysis\n\n### Primary Style: Microservices\n\
  \nThe eShop repository implements a textbook **Microservices architecture** with\
  \ the following evidence:\n\n**Multiple Independently Deployable Services:**\nThe\
  \ AppHost (`src/eShop.AppHost/Program.cs`) orchestrates 10+ distinct services:\n\
  - `Basket.API` - Shopping basket service (gRPC, Redis-backed)\n- `Catalog.API` -\
  \ Product catalog service (PostgreSQL-backed)\n- `Ordering.API` - Order management\
  \ service (PostgreSQL-backed)\n- `Identity.API` - Authentication/identity service\n\
  - `Webhooks.API` - Webhook management service\n- `PaymentProcessor` - Background\
  \ payment processing worker\n- `OrderProcessor` - Background order processing worker\n\
  - `WebApp` - Web frontend (Blazor)\n- `WebhookClient` - Webhook client application\n\
  - YARP-based mobile BFF (reverse proxy)\n\n**Database Per Service Pattern:**\nEach\
  \ service owns its data with separate databases:\n```\nvar catalogDb = postgres.AddDatabase(\"\
  catalogdb\");\nvar identityDb = postgres.AddDatabase(\"identitydb\");\nvar orderDb\
  \ = postgres.AddDatabase(\"orderingdb\");\nvar webhooksDb = postgres.AddDatabase(\"\
  webhooksdb\");\n```\nBasket.API uses Redis for its state, not shared with other\
  \ services.\n\n**Independent Technology Choices:**\n- Basket.API uses gRPC (`builder.Services.AddGrpc()`)\n\
  - Ordering.API uses REST with API versioning\n- Services can be deployed and scaled\
  \ independently via .NET Aspire\n\n### Secondary Style: Event-Driven Architecture\n\
  \nServices communicate asynchronously through **integration events** via RabbitMQ:\n\
  \n**Event Bus Infrastructure:**\n```\nvar rabbitMq = builder.AddRabbitMQ(\"eventbus\"\
  )\n```\n(`src/eShop.AppHost/Program.cs`, lines 8-9)\n\n**Integration Events Flow:**\n\
  - `OrderStartedIntegrationEvent` - published by Ordering.API when order created\n\
  - `OrderStatusChangedToAwaitingValidationIntegrationEvent` - triggers stock validation\
  \ in Catalog.API\n- `OrderStockConfirmedIntegrationEvent` / `OrderStockRejectedIntegrationEvent`\
  \ - catalog stock validation results\n- `OrderPaymentSucceededIntegrationEvent`\
  \ / `OrderPaymentFailedIntegrationEvent` - payment processing results\n\n**Event\
  \ Handlers Subscribed via Event Bus:**\n```csharp\n// PaymentProcessor/Program.cs\n\
  builder.AddRabbitMqEventBus(\"EventBus\")\n    .AddSubscription<OrderStatusChangedToStockConfirmedIntegrationEvent,\
  \ \n                      OrderStatusChangedToStockConfirmedIntegrationEventHandler>();\n\
  ```\n\n**Outbox Pattern Implementation:**\nThe `IntegrationEventLogService` (`src/IntegrationEventLogEF/`)\
  \ implements reliable event publishing with transactional integrity - events are\
  \ stored atomically with domain changes before being published.\n\n### Secondary\
  \ Style: Domain-Driven Design\n\nStrong DDD tactical patterns in the Ordering bounded\
  \ context:\n\n**Bounded Context Structure:**\n- `Ordering.Domain` - Pure domain\
  \ model, no infrastructure dependencies\n- `Ordering.Infrastructure` - Repository\
  \ implementations, EF Core context\n- `Ordering.API` - Application layer with CQRS\
  \ handlers\n\n**Aggregate Roots with IAggregateRoot Marker:**\n```csharp\n// Ordering.Domain/AggregatesModel/OrderAggregate/Order.cs\n\
  public class Order : Entity, IAggregateRoot\n```\n\n**Value Objects:**\n```csharp\n\
  // Ordering.Domain/AggregatesModel/OrderAggregate/Address.cs\n// Persisted as EF\
  \ Core owned entity\npublic class Address : ValueObject\n```\n\n**Domain Events:**\n\
  The domain layer contains 8 domain events (`src/Ordering.Domain/Events/`):\n- `OrderStartedDomainEvent`\n\
  - `OrderShippedDomainEvent`\n- `OrderCancelledDomainEvent`\n- `OrderStatusChangedToAwaitingValidationDomainEvent`\n\
  - etc.\n\n**Entity Base Class with Domain Events:**\n```csharp\n// Ordering.Domain/SeedWork/Entity.cs\n\
  private List<INotification> _domainEvents;\npublic IReadOnlyCollection<INotification>\
  \ DomainEvents => _domainEvents?.AsReadOnly();\npublic void AddDomainEvent(INotification\
  \ eventItem) { ... }\n```\n\n**Invariants Protected in Aggregates:**\n```csharp\n\
  // Order.cs - business rules enforced through methods\npublic void SetShippedStatus()\n\
  {\n    if (OrderStatus != OrderStatus.Paid)\n    {\n        StatusChangeException(OrderStatus.Shipped);\n\
  \    }\n    OrderStatus = OrderStatus.Shipped;\n    AddDomainEvent(new OrderShippedDomainEvent(this));\n\
  }\n```\n\n### Rejected Styles\n\n**Not Layered Monolith:** Services are independently\
  \ deployable with separate databases, not horizontal layers in a single deployable.\
  \ Each service has its own Program.cs entry point.\n\n**Not Modular Monolith:**\
  \ The solution has multiple deployable units (.csproj projects that become separate\
  \ containers), not a single deployable with enforced module boundaries.\n\n**Not\
  \ Serverless:** Services are deployed as containers orchestrated by .NET Aspire,\
  \ not as individual functions triggered by events. PaymentProcessor and OrderProcessor\
  \ are background workers, not Azure Functions.\n\n**Not CQRS (primary):** While\
  \ MediatR is used for commands/queries in Ordering.API, this is an application pattern\
  \ within the microservice, not the primary architectural characteristic. The read/write\
  \ separation is not at the system level\n\n[truncated]"
