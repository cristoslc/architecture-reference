review_notes: "Microservices: 7+ independently deployable services (Basket.API, Catalog.API, Ordering.API, Identity.API, OrderProcessor, PaymentProcessor, Webhooks.API) orchestrated via .NET Aspire AppHost (src/eShop.AppHost/Program.cs). Each service has own database (catalogdb, identitydb, orderingdb, webhooksdb). Event-Driven: RabbitMQ-backed integration event bus (src/EventBus/, src/EventBusRabbitMQ/RabbitMQEventBus.cs) with integration events across services; PaymentProcessor subscribes to OrderStatusChangedToStockConfirmed and publishes payment results (src/PaymentProcessor/IntegrationEvents/); Ordering.API publishes/consumes 10+ integration events (src/Ordering.API/Application/IntegrationEvents/). DDD: Ordering bounded context with full tactical DDD — Aggregate Roots (Order, Buyer), Value Objects (Address), Entities, Repository pattern (src/Ordering.Domain/AggregatesModel/), SeedWork base classes (Entity, IAggregateRoot, IUnitOfWork, ValueObject at src/Ordering.Domain/SeedWork/), domain events (7 domain event types at src/Ordering.Domain/Events/), and rich domain model with encapsulated state transitions (Order.SetPaidStatus, SetShippedStatus etc.). CQRS: Explicit command/query separation in Ordering — Commands via MediatR IRequest handlers (src/Ordering.API/Application/Commands/ with CreateOrderCommand, CancelOrderCommand, ShipOrderCommand etc.) and separate Query objects bypassing domain model (src/Ordering.API/Application/Queries/OrderQueries.cs uses direct EF Core projections). CreateOrderCommand explicitly references CQRS pattern in code comments."