review_notes: 'The eShop repository is a canonical reference implementation of a **Microservices**
  architecture using .NET Aspire. The system is composed of multiple independently
  deployable services (Catalog.API, Basket.API, Ordering.API, Identity.API, Webhooks.API)
  and background workers (OrderProcessor, PaymentProcessor).


  ### Primary Style: Microservices

  The architecture exhibits the core characteristics of microservices through technical
  and organizational boundaries:

  - **Independent Deployment Units:** Each service has its own `.csproj` (e.g., `src/Catalog.API/Catalog.API.csproj`)
  and entry point (`Program.cs`).

  - **Data Sovereignty:** The `src/eShop.AppHost/Program.cs` file confirms that services
  own their respective data stores (e.g., `catalogdb`, `identitydb`, `orderingdb`,
  `webhooksdb`) and a shared Redis instance for caching/state.

  - **Service Orchestration:** .NET Aspire (`AppHost`) manages service discovery and
  lifecycle, abstracting the complexity of inter-service communication.

  - **API Gateway/BFF:** The use of YARP as a "mobile-bff" (`builder.AddYarp("mobile-bff")`
  in `AppHost`) demonstrates the Backend-for-Frontends pattern used to aggregate service
  calls for clients.


  ### Secondary Style: Event-Driven'
