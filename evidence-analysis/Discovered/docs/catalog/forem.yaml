classification_reasoning: "## Architecture Analysis\n\n**Forem** is a classic **Layered\
  \ Architecture** with Event-Driven elements for background processing.\n\n### Primary\
  \ Style: Layered\n\nThe codebase exhibits clear horizontal layering characteristic\
  \ of Rails MVC applications:\n\n1. **Presentation Layer** (`app/views/`, `app/decorators/`,\
  \ `app/helpers/`) - 55+ view directories with templates, decorators for view-specific\
  \ logic, and helper modules\n2. **Controller Layer** (`app/controllers/`) - 91+\
  \ controllers organized by domain (articles, comments, users, admin, api/v0, api/v1)\n\
  3. **Service/Business Logic Layer** (`app/services/`) - 268 service objects organized\
  \ into domain namespaces like `Articles::Creator`, `Notifications::NewFollower::Send`,\
  \ `Users::Update`\n4. **Data Access Layer** (`app/models/`) - 119 ActiveRecord models\
  \ including Article, User, Comment, Organization with relationships and data validations\n\
  5. **Policy Layer** (`app/policies/`) - Authorization using Pundit with ApplicationPolicy\
  \ and domain-specific policies\n\nEvidence:\n- Standard Rails directory structure:\
  \ `app/{controllers,models,views,services,policies,decorators,helpers}`\n- ApplicationController\
  \ inherits from ActionController::Base (app/controllers/application_controller.rb:1)\n\
  - ApplicationRecord as base model class (app/models/application_record.rb)\n- Service\
  \ objects follow pattern: `Module::Class.call(...)` (app/services/articles/creator.rb:3-4)\n\
  \n### Secondary Style: Event-Driven\n\nForem uses background job processing extensively\
  \ via Sidekiq:\n\n**Evidence:**\n- `app/workers/` contains 48 worker directories\
  \ with namespaced workers\n- Workers use `include Sidekiq::Job` (app/workers/notifications/new_follower_worker.rb:3)\n\
  - Priority queue configuration (config/sidekiq.yml:1-6):\n  ```yaml\n  :queues:\n\
  \    - [\"default\", 1]\n    - [\"low_priority\", 10]\n    - [\"medium_priority\"\
  , 100]\n    - [\"high_priority\", 1000]\n    - [\"scheduler\", 1000]\n    - [\"\
  mailers\", 1000]\n  ```\n- Scheduled jobs via sidekiq-cron (config/schedule.yml)\
  \ for feeds import, metrics recording, badge awards\n- Event-driven notification\
  \ system (`Notifications::NewFollowerWorker`, `Notifications::NewCommentWorker`,\
  \ etc.)\n- Redis for job queueing (docker-compose.yml:111-122)\n\n### What It's\
  \ NOT\n\n**Not Microservices**: Single Dockerfile, single deployment unit, one PostgreSQL\
  \ database, one Redis instance. All code runs in one Rails application.\n\n**Not\
  \ Modular Monolith**: While organized by domain concepts (articles, users, notifications),\
  \ there are no enforced module boundaries. Models directly associate with each other\
  \ without module-scoped isolation. The `app/services/` and `app/models/` directories\
  \ use namespace organization but share the same database and don't have strict boundaries.\n\
  \n**Not Microkernel/Plugin**: The Liquid tag system (62 liquid tags in app/liquid_tags/)\
  \ provides content embedding extensibility, but this is user-facing content functionality,\
  \ not a plugin architecture for extending the core system. Liquid tags are registered\
  \ at build time via `Liquid::Template.register_tag()`.\n\n**Not Hexagonal Architecture**:\
  \ While services encapsulate business logic, the architecture doesn't have explicit\
  \ ports/adapters pattern. Controllers directly use models and services without an\
  \ application core isolated by interfaces.\n\n**Not CQRS**: Single model per domain\
  \ concept; no separate read/write models. Models handle both reading and writing.\n\
  \n### Key Architectural Features\n\n1. **Service Object Pattern**: Business logic\
  \ extracted into service objects (app/services/) following `Module::Class.call(...)`\
  \ pattern\n2. **Policy-based Authorization**: Pundit policies (app/policies/) for\
  \ authorization\n3. **Background Jobs**: Extensive use of Sidekiq workers for async\
  \ processing\n4. **Liquid Templating**: User content supports embedded liquid tags\
  \ for external content\n5. **API Versioning**: REST API with v0 and v1 versions\
  \ (app/controllers/api/v0/, app/controllers/api/v1/)\n6. **Admin Interface**: Comprehensive\
  \ admin controllers under `Admin::` namespace\n\n### Deployment\n\n- Single Rails\
  \ application container (Dockerfile)\n- PostgreSQL 13 for database\n- Redis 7 for\
  \ caching and job queues\n- Puma as web server\n- Sidekiq for background job processing"
