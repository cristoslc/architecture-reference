review_notes: 'Evidence: (1) Single Dockerfile with multi-stage builds (production,
  testing, development) confirms monolithic deployment; (2) docker-compose.yml shows
  single forem image used across all services (web, sidekiq, rails) with no Kubernetes/Helm;
  (3) Classic Rails layered structure: app/models (1003 rb files), app/forms, app/queries,
  app/mailers, plus 730 erb view templates; (4) Modular organization via namespaced
  model directories: app/models/articles/, app/models/users/, app/models/settings/,
  app/models/ahoy/, app/models/concerns/; (5) Query objects organized by domain: app/queries/articles/,
  app/queries/users/, app/queries/organizations/; (6) Event-driven component: sidekiq
  service in docker-compose.yml with Redis for background job processing'
