review_notes: "Layered: Standard Rails MVC with app/models/ (116 files), app/controllers/ (89 files), app/views/, app/services/ (83 files), app/queries/ (10 dirs), app/policies/ (Pundit authorization), app/decorators/, app/serializers/, app/validators/, app/forms/. Clear presentation-logic-data separation following Rails conventions. Event-Driven: Extensive Sidekiq background workers in app/workers/ (46 dirs/files) covering notifications, feeds, emails, cache busting, metrics, badge awards, and scheduled automations. config/schedule.yml defines 30+ cron jobs via sidekiq-cron. ActionCable via config/cable.yml for real-time WebSocket messaging. Webhook receivers in app/controllers/incoming_webhooks/ (Stripe, Mailchimp). Redis used as both job queue (Sidekiq) and pub/sub (ActionCable). NOT Modular Monolith: despite organized service objects, there are no enforced module boundaries, no module-level namespacing with explicit public APIs, and models share a single flat namespace in app/models/."