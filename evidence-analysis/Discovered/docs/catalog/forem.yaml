review_notes: 'Forem is a classic example of a **Layered** architecture, specifically
  following the standard Ruby on Rails pattern but extended with high-scale enterprise
  patterns. While it contains a vast number of features, it remains a single deployment
  unit (monolith) organized horizontally.


  ### 1. Primary Style: Layered

  The codebase follows the strict "Model-View-Controller" (MVC) layering common to
  Rails, but introduces additional sub-layers to manage complexity:

  - **Presentation Layer**: Controllers and "Decorators" (`app/decorators`) for view-specific
  logic. It is transitioning to a Preact frontend but still utilizes Rails views/helpers.

  - **Business Logic (Service) Layer**: An extensive `app/services` directory houses
  the bulk of the system''s domain logic (e.g., `app/services/articles/creator.rb`,
  `app/services/badges/award.rb`). This separates complex orchestration from the models.

  - **Query Layer**: Dedicated `app/queries` (e.g., `app/queries/articles/api_search_query.rb`)
  extract complex SQL/ActiveRecord logic from the models to maintain maintainability.

  - **Data Access Layer**: Handled by `app/models` using ActiveRecord, with heavy
  use of "Concerns" to share behavior across models.


  ### 2. Secondary Style: Event-Driven'
