review_notes: "README states 'runs as a single Linux binary'. Server has clear layered architecture: api4/ and wsapi/ (presentation), app/ (business logic, documented as 'pure functional component providing business logic'), store/ (data access with Store interface in store.go and implementations in sqlstore/). Store uses decorator pattern with localcachelayer/, searchlayer/, retrylayer/, timerlayer/ wrapping the core store. Modular monolith signals: server/channels/ (core product), server/platform/ (shared services/shared), server/public/ (SDK/plugin API), with separate Go modules enforcing boundaries. Enterprise features abstracted via einterfaces/ interfaces. Jobs system (export, import, migrations) runs in-process. docker-compose.yaml shows leader/follower clustering of the same binary, not separate microservices. GitHub topics include 'monorepo'. Heuristic's Microservices classification was incorrect -- docker-compose contains only infrastructure dependencies (postgres, elasticsearch, redis, minio), not separate application services."