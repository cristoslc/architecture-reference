one_line_summary: >-
  Open-core self-hosted team collaboration platform built as a modular Go
  monolith with a microkernel plugin system and clustered WebSocket event
  delivery.
classification_reasoning: >-
  Mattermost's server is a single deployable binary organised into four
  enforced horizontal layers — HTTP/WS API handlers (channels/api4, channels/wsapi),
  application business logic (channels/app), platform infrastructure services
  (channels/app/platform, platform/services), and a decorated store chain
  (sqlstore wrapped by localcachelayer, searchlayer, retrylayer, timerlayer) —
  making Modular Monolith the dominant style. The App struct is explicitly
  documented as a request-scoped pure functional component with no state of its
  own, delegating to Channels and Server. A comprehensive microkernel pattern
  co-exists: 49 plugin hook points (OnActivateID through TotalHooksID) dispatch
  to isolated subprocess plugins via RPC bridge, and enterprise capabilities are
  injected through explicit einterfaces contracts (ClusterInterface,
  ComplianceInterface, LdapInterface, DataRetentionInterface, etc.) compiled
  into the binary at link time. WebSocket event broadcast (Hub struct, ~50
  WebSocketEvent types published via platform.Publish) and a persistent
  background job framework (~25 worker types) are significant internal
  mechanisms but subordinate to the monolith decomposition. The React webapp
  follows a layered Redux architecture with a client-side plugin registry
  mirroring the server microkernel. Single binary deployment confirmed by README
  and cmd/mattermost/main.go entry point.
