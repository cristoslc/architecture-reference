review_notes: "HashiCorp Vault is a classic implementation of a **Microkernel (Plugin)**\
  \ architecture. The system is designed around a minimal \"Core\" (found in the `vault/`\
  \ directory) that manages the lifecycle of the system (sealing/unsealing, security\
  \ barriers, and routing) while delegate all functional logic—auth methods, secret\
  \ engines, and storage backends—to a rich plugin ecosystem.\n\n### Architectural\
  \ Evidence\n\n1.  **Plugin-Based Core (Microkernel)**:\n    -   The `sdk/plugin/`\
  \ and `vault/plugincatalog/` directories define the contract and registry for extending\
  \ Vault.\n    -   Vault differentiates between **Built-in Plugins** (`builtin/`)\
  \ and **External Plugins**. External plugins are isolated processes that communicate\
  \ with the core via gRPC (evidenced by `sdk/plugin/grpc_backend.go` and `vault/external_plugin_test.go`).\n\
  \    -   The `sdk/logical/` package defines the standard interface (`Backend`) that\
  \ every secret engine (e.g., KV, PKI, Transit) and auth method must implement to\
  \ be \"plugged in.\"\n\n2.  **Explicit SDK/Core Separation**:"
