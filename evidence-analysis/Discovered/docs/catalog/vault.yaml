classification_reasoning: "## Analysis\n\nVault implements a classic **Microkernel\
  \ (Plugin)** architecture with a single deployable core system extended through\
  \ a well-defined plugin contract.\n\n### Core System Evidence\n\n**Single Deployable:**\n\
  - `main.go` is the sole entry point, delegating to `command.Run()`\n- Single `Dockerfile`\
  \ produces a single `vault` binary\n- Single `go.mod` at repository root - no multi-module\
  \ workspace\n\n**Core Orchestrator (`vault/core.go`):**\nThe `Core` struct (line\
  \ 265) is the central coordinator containing:\n- `router *Router` - routes requests\
  \ to mounted backends\n- `logicalBackends map[string]logical.Factory` - registered\
  \ secrets engines\n- `credentialBackends map[string]logical.Factory` - registered\
  \ auth methods\n- `pluginCatalogPath = \"core/plugin-catalog/\"` - plugin registry\
  \ storage\n\n### Plugin Contract Evidence\n\n**Interface Definition (`sdk/logical/logical.go`):**\n\
  ```go\ntype Backend interface {\n    Initialize(context.Context, *InitializationRequest)\
  \ error\n    HandleRequest(context.Context, *Request) (*Response, error)\n    SpecialPaths()\
  \ *Paths\n    System() SystemView\n    Logger() log.Logger\n    HandleExistenceCheck(context.Context,\
  \ *Request) (bool, bool, error)\n    Cleanup(context.Context)\n    InvalidateKey(context.Context,\
  \ string)\n    Setup(context.Context, *BackendConfig) error\n    Type() BackendType\n\
  }\n\ntype Factory func(context.Context, *BackendConfig) (Backend, error)\n```\n\n\
  This interface is the **plugin contract** - all backends must implement it.\n\n\
  ### Plugin Loading Infrastructure\n\n**Builtin Plugin Registry (`helper/builtinplugins/registry.go`):**\n\
  ```go\nvar Registry = newRegistry()\n\nfunc newMinimalRegistry() *registry {\n \
  \   return &registry{\n        credentialBackends: map[string]credentialBackend{\n\
  \            \"approle\":  {Factory: credAppRole.Factory},\n            \"cert\"\
  :     {Factory: credCert.Factory},\n            \"userpass\": {Factory: credUserpass.Factory},\n\
  \        },\n        logicalBackends: map[string]logicalBackend{\n            \"\
  kv\":      {Factory: logicalKv.Factory},\n            \"pki\":     {Factory: logicalPki.Factory},\n\
  \            \"transit\": {Factory: logicalTransit.Factory},\n        },\n    }\n\
  }\n```\n\nBuiltin plugins are registered at compile-time but follow the same contract.\n\
  \n**External Plugin Loading (`sdk/plugin/plugin.go`, `sdk/plugin/serve.go`):**\n\
  ```go\n// Serve is a helper function used to serve a backend plugin.\nfunc Serve(opts\
  \ *ServeOpts) error {\n    pluginSets := map[int]plugin.PluginSet{\n        5: {\n\
  \            \"backend\": &GRPCBackendPlugin{\n                Factory: opts.BackendFactoryFunc,\n\
  \            },\n        },\n    }\n    serveOpts := &plugin.ServeConfig{\n    \
  \    HandshakeConfig:  HandshakeConfig,\n        VersionedPlugins: pluginSets,\n\
  \        ...\n    }\n    plugin.Serve(serveOpts)\n}\n\nvar HandshakeConfig = plugin.HandshakeConfig{\n\
  \    MagicCookieKey:   \"VAULT_BACKEND_PLUGIN\",\n    MagicCookieValue: \"6669da05-b1c8-4f49-97d9-c8e5bed98e20\"\
  ,\n}\n```\n\nUses `github.com/hashicorp/go-plugin` for out-of-process plugin execution\
  \ via gRPC.\n\n**Plugin Catalog (`vault/plugincatalog/plugin_catalog.go`):**\n```go\n\
  type PluginCatalog struct {\n    builtinRegistry BuiltinRegistry\n    catalogView\
  \     logical.Storage\n    directory       string\n    externalPlugins map[externalPluginsKey]*externalPlugin\n\
  }\n```\n\nManages both builtin and external plugins, handling lifecycle, versioning,\
  \ and multiplexing.\n\n### Plugin Implementation Examples\n\n**AppRole Auth Method\
  \ (`builtin/credential/approle/backend.go`):**\n```go\ntype backend struct {\n \
  \   *framework.Backend\n    salt      *salt.Salt\n    view      logical.Storage\n\
  \    roleLocks []*locksutil.LockEntry\n}\n\nfunc Factory(ctx context.Context, conf\
  \ *logical.BackendConfig) (logical.Backend, error) {\n    b, err := Backend(conf)\n\
  \    if err != nil {\n        return nil, err\n    }\n    if err := b.Setup(ctx,\
  \ conf); err != nil {\n        return nil, err\n    }\n    return b, nil\n}\n```\n\
  \n**PKI Secrets Engine (`builtin/logical/pki/backend.go`):**\nSimilarly implements\
  \ the `logical.Backend` interface via `framework.Backend`.\n\n### Router-Based Dispatch\
  \ (`vault/router.go`):\n```go\ntype Router struct {\n    root               *radix.Tree\n\
  \    storagePrefix      *radix.Tree\n    mountUUIDCache     *radix.Tree\n}\n\ntype\
  \ routeEntry struct {\n    backend     logical.Backend\n    mountEntry  *MountEntry\n\
  \    storageView logical.Storage\n}\n```\n\nRequests are routed to mounted plugin\
  \ backends based on path prefix.\n\n### What Was Rejected\n\n**Not Microservices:**\n\
  - Single binary deployment\n- No inter-service communication\n- No independent deployability\
  \ of components\n\n**Not Modular Monolith:**\n- No enforced module boundaries in\
  \ code structure\n- Plugins can be loaded externally, not just internal modules\n\
  - The extension mechanism is the primary architectural feature, not a secondary\
  \ concern\n\n**Not Layered:**\n- No horizontal layering (presentation/business/data\
  \ access)\n- The `vault/`, `sdk/`, `api/` structure is about plugin development,\
  \ not horizontal separation\n- Core functionality and plugins operate at the same\
  \ \n\n[truncated]"
