one_line_summary: Rails e-commerce platform structured as four gem-module engines sharing a single PostgreSQL database, coordinated
  through a first-class async event bus and a 60-injection-point service layer with a uniform Result contract.
classification_reasoning: 'Spree is classified as Modular Monolith (primary), Event-Driven (secondary), and Hexagonal Architecture
  (secondary). The backend deploys as a single Rails process mounting four gem-scoped Rails Engines (spree_core, spree_api,
  spree_admin, spree_emails) against a unified PostgreSQL database with a 2012-line shared schema — the canonical Modular
  Monolith structure. There is no inter-process communication between engines. The Event-Driven classification is earned by
  Spree::Events, a purpose-built pub-sub system backed by ActiveSupport::Notifications with a pluggable adapter interface,
  wildcard subscriber patterns, an async dispatch path via Spree::Events::SubscriberJob (Sidekiq-backed ActiveJob), and outbound
  webhook delivery (WebhookEndpoint/WebhookDelivery models). Cross-cutting concerns — emails, exports, analytics, webhooks
  — are decoupled from business operations exclusively through this bus. The Hexagonal Architecture secondary classification
  reflects the service layer in spree/core/app/services/spree/: 29 domain service namespaces each implement Spree::ServiceModule::Base,
  returning success(value) or failure(value, error) with a run() pipeline-composition DSL. Sixty named injection points in
  Spree::Core::Dependencies let any service or finder be replaced without modifying core. Discrete finder objects (Addresses::Find,
  Products::Find, Taxons::Find, Variants::Find, etc.) separate read operations from ActiveRecord models. The Hexagonal label
  is secondary because ActiveRecord domain models are not persistence-agnostic — there is no repository port at the database
  boundary. The system is NOT CQRS (no separate read/write model or command bus), NOT Microservices (shared database, no network
  boundary between engines), and NOT Microkernel (payment/shipping registration uses Rails engine conventions and ActiveRecord
  STI rather than a formal kernel/plugin protocol).'
