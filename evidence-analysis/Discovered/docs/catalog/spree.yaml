review_notes: "The Spree repository is structured as a **Modular Monolith** using\
  \ the Ruby on Rails \"Engine\" pattern. While it appears to be a standard Rails\
  \ application at first glance (due to the `server/` directory), the core logic is\
  \ actually partitioned into distinct, decoupled packages (engines) that are composed\
  \ at boot time via the `Gemfile`.\n\n### 1. Modular Monolith (Primary Style)\nThe\
  \ system is composed of several high-level modules that maintain strict boundaries\
  \ despite running in a single process. Evidence from the `server/Gemfile` shows\
  \ that the application is built by combining `spree` (the core engine containing\
  \ models and business logic), `spree_emails`, and `spree_admin`. \n- **Internal\
  \ Boundaries**: The architecture documentation (`docs/developer/core-concepts/architecture.mdx`)\
  \ describes the system as \"distributed as a set of packages.\"\n- **Engine Isolation**:\
  \ The `server/config/initializers/spree.rb` file references `config.disable_migration_check\
  \ = true` because \"migrations live in engines,\" acknowledging that schemas and\
  \ logic are defined within the module boundaries rather than the host application.\n\
  \n### 2. Hexagonal Architecture (Secondary Style)\nSpree demonstrates strong characteristics\
  \ of **Hexagonal Architecture (Ports and Adapters)** through its \"Dependencies\"\
  \ and \"Calculators\" systems.\n- **Dependency Injection**: In `server/config/initializers/spree.rb`,\
  \ the `Spree.dependencies` block allows developers to swap out core business logic\
  \ (e.g., `cart_add_item_service`) with custom implementations without modifying\
  \ the core."
