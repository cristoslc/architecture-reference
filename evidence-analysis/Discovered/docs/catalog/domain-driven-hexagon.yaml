review_notes: "Evidence: README.md explicitly states 'This is an attempt to combine multiple architectural patterns: Domain-Driven Design, Hexagonal (Ports and Adapters) Architecture, Clean Architecture, Onion Architecture'. src/libs/ddd/ contains base classes for Entity, AggregateRoot, ValueObject, DomainEvent, Command, Query. src/libs/ports/ defines port interfaces (e.g., LoggerPort, RepositoryPort). src/modules/user/database/user.repository.port.ts is a hexagonal port; user.repository.ts is the adapter. src/modules/user/commands/ and src/modules/user/queries/ implement CQS separation; package.json includes @nestjs/cqrs. Domain events propagate across aggregates (UserCreatedDomainEvent triggers CreateWalletWhenUserIsCreatedDomainEventHandler). .dependency-cruiser.js enforces layer dependency rules (domain cannot depend on api/infra/application layers). This is a teaching/reference repo, not a production app."