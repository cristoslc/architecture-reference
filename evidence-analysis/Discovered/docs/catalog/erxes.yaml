review_notes: 'This repository is a textbook example of a **Microservices** architecture
  managed within an **Nx Monorepo**. It utilizes **GraphQL Federation** for the backend
  and **Module Federation** for the frontend (Micro-frontends) to maintain a decoupled,
  yet integrated system.


  ### Evidence of Microservices

  - **Independent Deployment Units**: Each directory under `backend/plugins/` (e.g.,
  `sales_api`, `payment_api`, `frontline_api`) and `frontend/plugins/` contains its
  own `Dockerfile`, `project.json` (Nx configuration), and `package.json`.

  - **Infrastructure**: The README explicitly describes a topology involving an **API
  Gateway** (Apollo Router) that performs service discovery and routes requests to
  various "Plugin APIs" (Microservices) on different ports (e.g., Core API on 3300,
  Gateway on 4000).

  - **Technology Choice**: Use of **GraphQL Federation** is a specific technical solution
  for composing multiple independent microservice schemas into a single graph.


  ### Evidence of Microkernel (Plugin) Architecture

  - The system divides itself into "Core" and "Plugins". The core (found in `backend/erxes-api-shared`
  and `frontend/core-ui`) provides the fundamental lifecycle management, while specific
  business domains (Sales, CRM, Finance) are implemented as plugins.

  - The repository includes a `pnpm create-plugin` CLI tool to scaffold new services,
  adhering to a strict plugin contract so they can be registered by the Core Gateway.'
