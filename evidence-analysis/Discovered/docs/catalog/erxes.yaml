review_notes: "Microservices: Each plugin (sales_api, frontline_api, operation_api, etc.) runs as an independent service on its own port with its own Dockerfile (backend/plugins/*/Dockerfile). Gateway at backend/gateway/ uses Apollo Router for GraphQL Federation (supergraph-compose.ts) to compose subgraph schemas. Service discovery via Redis in erxes-api-shared/src/utils/service-discovery.ts (joinErxesGateway/leaveErxesGateway). Inter-service communication via tRPC in erxes-api-shared/src/utils/trpc/utils.ts (sendTRPCMessage creates untyped client to remote plugin address). Frontend uses Module Federation (frontend/core-ui/module-federation.config.ts, frontend/plugins/*/module-federation.config.ts) for micro-frontend composition. Event-Driven: BullMQ queues handle async work in erxes-api-shared/src/utils/mq-worker.ts (createMQWorkerWithListeners, sendWorkerMessage). Event dispatcher in erxes-api-shared/src/core-modules/common/eventDispatcher.ts fires DB change events and automation triggers via queues. Automation triggers sent via BullMQ in erxes-api-shared/src/core-modules/automations/sendAutomationMessage.ts. Gateway MQ workers in backend/gateway/src/mq/workers/workers.ts."