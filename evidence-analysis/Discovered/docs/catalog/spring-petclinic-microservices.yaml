review_notes: 'README title: ''Distributed version of the Spring PetClinic Sample
  Application built with Spring Cloud''. 8 independent Maven modules each with own
  pom.xml and Spring Boot main class: customers-service, vets-service, visits-service,
  genai-service, api-gateway, config-server, discovery-server, admin-server. docker-compose.yml
  defines 11 separate containers with health-check-based dependency ordering. Eureka
  service discovery (@EnableEurekaServer), Spring Cloud Config for centralized config,
  Spring Cloud Gateway for API routing. Inter-service communication via REST (WebClient
  in VisitsServiceClient calls http://visits-service/). Circuit breaker via Resilience4j.
  Distributed tracing with Zipkin/OpenTelemetry. Each business service has its own
  data model and repository layer. Monitoring via Prometheus + Grafana. This is the
  canonical Spring Cloud microservices reference application.'
