classification_date: '2026-03-11T00:00:00Z'
classification_reasoning: "Spring PetClinic Microservices is a textbook Microservices\
  \ implementation, designed explicitly as a Spring Cloud reference application. The\
  \ README states: 'This microservices branch was initially derived from the AngularJS\
  \ version to demonstrate how to split sample Spring application into microservices.'\n\
  \nKey evidence:\n\n1. Eight independently deployable services: admin-server, customers-service,\
  \ vets-service, visits-service, genai-service, config-server, discovery-server,\
  \ api-gateway — each a separate Spring Boot application with its own Maven module,\
  \ Docker image, and container lifecycle (docker-compose.yml confirms 12-container\
  \ deployment).\n\n2. Database-per-service pattern strictly enforced: customers-service\
  \ owns owners/pets/types tables; vets-service owns vets/specialties/vet_specialties\
  \ tables; visits-service owns visits table. No shared database or cross-service\
  \ schema references exist.\n\n3. Synchronous REST communication via Eureka service\
  \ discovery. API gateway uses lb:// URIs routing to lb://customers-service, lb://vets-service,\
  \ lb://visits-service, lb://genai-service. ApiGatewayController composes owner\
  \ details from CustomersServiceClient + VisitsServiceClient reactively.\n\n4. Full\
  \ Spring Cloud infrastructure: Config Server (centralized config from Git repo),\
  \ Eureka Discovery Server (service registry), Spring Cloud Gateway (single ingress,\
  \ circuit breaker, retry filters), Resilience4j circuit breakers on all service\
  \ calls.\n\n5. GenAI service integrates Spring AI with LLM function-calling via\
  \ @Tool-annotated PetclinicTools methods, ChatClient with MessageChatMemoryAdvisor,\
  \ and SimpleVectorStore RAG for vet lookups — an AI-augmented microservice, not\
  \ a separate architectural style.\n\n6. Full observability: Zipkin distributed tracing\
  \ via OpenTelemetry/Micrometer Tracing, Prometheus metrics with custom @Timed annotations,\
  \ Grafana dashboard, Spring Boot Admin.\n\nNo event-driven patterns (no Kafka, RabbitMQ,\
  \ or message channels found). No shared database (ruling out Service-Based). No\
  \ single deployable unit (ruling out Modular Monolith). No ports-and-adapters structure\
  \ (ruling out Hexagonal). No DDD aggregates or domain events."
review_notes: "This repository is the canonical Spring Cloud microservices reference\
  \ implementation, explicitly designed to demonstrate decomposition of the monolithic\
  \ Spring PetClinic application. All eight modules are independently deployable Spring\
  \ Boot applications with separate database schemas, Eureka registration, and Docker\
  \ containers. The genai-service (Spring AI + OpenAI function calling + vector store\
  \ RAG) is a notable recent addition that extends the microservices composition without\
  \ altering the architectural style. Classification: Microservices, confidence 0.97."
