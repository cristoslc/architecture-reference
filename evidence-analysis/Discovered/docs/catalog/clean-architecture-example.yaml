classification_reasoning: "## Analysis\n\nThis repository is a **textbook implementation\
  \ of Hexagonal Architecture (Ports and Adapters)**, with **Modular Monolith** as\
  \ a secondary style due to its single deployable with enforced module boundaries.\n\
  \n### Evidence for Hexagonal Architecture\n\n**1. Core Module with Application Business\
  \ Logic**\nThe `application/core` module contains:\n- **Entities**: Plain Java objects\
  \ (`BroadbandAccessDevice`, `Exchange`, `DeviceType`) with zero framework dependencies\n\
  - **Use Cases**: Business logic classes (`GetBroadbandAccessDeviceDetailsUseCase`,\
  \ `ReconcileBroadbandAccessDevicesUseCase`) that orchestrate business operations\n\
  - **Port Interfaces**: Defined in use case packages - e.g., `GetDeviceDetails`,\
  \ `GetAllDeviceHostnames`, `GetSerialNumberFromModel`, `UpdateSerialNumberInModel`\n\
  \nFrom `application/core/build.gradle`:\n```gradle\ndependencies {\n    compile\
  \ libs.string_utils  // Only utility library - NO frameworks!\n    testCompile libs.unit_tests\n\
  }\n```\n\n**2. Port Interfaces Defined in Core**\nThe use case `GetBroadbandAccessDeviceDetailsUseCase`\
  \ depends on an interface it defines:\n```java\npublic class GetBroadbandAccessDeviceDetailsUseCase\
  \ {\n    private final GetDeviceDetails getDeviceDetails;  // Interface defined\
  \ in same package\n    \n    public BroadbandAccessDevice getDeviceDetails(String\
  \ hostname) {\n        BroadbandAccessDevice device = getDeviceDetails.getDetails(hostname);\n\
  \        // business logic...\n    }\n}\n```\n\nThe interface `GetDeviceDetails`\
  \ lives in core:\n```java\npackage com.clean.example.core.usecase.broadbandaccessdevice.getdetails;\n\
  \npublic interface GetDeviceDetails {\n    BroadbandAccessDevice getDetails(String\
  \ hostname);\n}\n```\n\n**3. Adapters Implement Core Interfaces**\n`BroadbandAccessDeviceDatabaseDataProvider`\
  \ in the `dataproviders` module implements multiple core interfaces:\n```java\n\
  public class BroadbandAccessDeviceDatabaseDataProvider implements GetAllDeviceHostnames,\
  \ \n        GetSerialNumberFromModel, UpdateSerialNumberInModel, GetDeviceDetails,\
  \ \n        GetAvailablePortsOfAllDevicesInExchange {\n    // Uses Spring JDBC -\
  \ framework isolated to adapter layer\n}\n```\n\n**4. Entrypoints as Inbound Adapters**\n\
  REST controllers in `entrypoints` call use cases without knowing implementation\
  \ details:\n```java\npublic class GetBroadbandAccessDeviceEndpoint {\n    private\
  \ GetBroadbandAccessDeviceDetailsUseCase getBroadbandAccessDeviceDetailsUseCase;\n\
  \    // Controller invokes use case, doesn't know about database\n}\n```\n\n**5.\
  \ Configuration Module Wires Everything**\n`UseCaseConfiguration` injects adapters\
  \ into use cases:\n```java\n@Bean\npublic GetBroadbandAccessDeviceDetailsUseCase\
  \ getBroadbandAccessDeviceDetailsUseCase(GetDeviceDetails getDeviceDetails) {\n\
  \    return new GetBroadbandAccessDeviceDetailsUseCase(getDeviceDetails);\n}\n```\n\
  \n**6. Dependency Inversion Enforced by Build System**\nThe Gradle dependency structure\
  \ is critical:\n- `core` → NO application dependencies (only string_utils)\n- `dataproviders`\
  \ → depends on `core`\n- `entrypoints` → depends on `core`  \n- `configuration`\
  \ → depends on ALL modules (wiring layer)\n\nThis enforces **dependency inversion**\
  \ - the core defines interfaces, outer layers implement them.\n\n### Evidence for\
  \ Modular Monolith (Secondary)\n\n**Single Deployable**: The `configuration` module\
  \ produces a single Spring Boot JAR:\n```gradle\njar {\n    archiveName = \"clean-architecture-example.jar\"\
  \n}\n```\n\n**Enforced Module Boundaries**: Gradle subprojects (`core`, `dataproviders`,\
  \ `entrypoints`, `configuration`) prevent incorrect dependencies at compile time.\
  \ If `core` tried to import from `dataproviders`, compilation would fail.\n\n**Clear\
  \ Separation**: Each module has a distinct purpose aligned with Clean Architecture\
  \ layers.\n\n### What This Is NOT\n\n- **NOT Layered Architecture**: In Layered,\
  \ dependencies flow downward (Presentation → Business → Data). Here, the dependency\
  \ direction is **inverted** - core defines interfaces, outer layers implement them.\
  \ This is the defining difference.\n\n- **NOT Domain-Driven Design**: No bounded\
  \ contexts, aggregates, repositories (DDD pattern), or ubiquitous language. Entities\
  \ are simple POJOs, not rich domain models with invariants.\n\n- **NOT Microservices**:\
  \ Single deployable, shared database, no inter-service communication.\n\n- **NOT\
  \ Microkernel/Plugin**: No plugin loading mechanism or extension points. The adapters\
  \ are wired at compile time, not dynamically discovered.\n\nThe README explicitly\
  \ references Clean Architecture (Uncle Bob's variant of Hexagonal), and the implementation\
  \ matches perfectly - the \"screaming architecture\" where package structure reveals\
  \ intent, interfaces in core with implementations in outer layers, and frameworks\
  \ isolated to adapter modules."
