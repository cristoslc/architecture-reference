review_notes: "Evidence: README.md explicitly describes Clean Architecture pattern and links Hexagonal Architecture. settings.gradle defines four modules: core (entities + use cases, zero external deps), dataproviders (driven adapters implementing core interfaces), entrypoints (driving adapters: REST + scheduled jobs), configuration (wiring). Core interfaces like GetDeviceDetails serve as ports; BroadbandAccessDeviceDatabaseDataProvider implements multiple ports as an adapter. Dependency arrows point strictly inward per build.gradle: core has no module deps, dataproviders/entrypoints depend only on core, configuration depends on all three."