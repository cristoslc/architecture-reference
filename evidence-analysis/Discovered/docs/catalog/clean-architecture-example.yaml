classification_reasoning: "The repository is a textbook implementation of **Hexagonal\
  \ Architecture** (also known as Ports and Adapters), specifically under the \"Clean\
  \ Architecture\" branding. The physical structure of the repository is designed\
  \ to enforce the dependency rule where dependencies point inwards toward the domain\
  \ core.\n\n### Evidence of Hexagonal Architecture\nThe project is split into distinct\
  \ modules that represent the core and its adapters:\n1.  **Core (`application/core`)**:\
  \ Contains the Domain Entities and Use Cases. The README explicitly states this\
  \ should have \"no frameworks, no annotations\" and defines interfaces for data\
  \ requirements.\n2.  **Adapters (Entrypoints and Dataproviders)**: \n    *   `application/entrypoints`:\
  \ Acts as the \"Driving Adapters\" (REST APIs, Scheduled Jobs).\n    *   `application/dataproviders`:\
  \ Acts as the \"Driven Adapters\" (Database, external services).\n3.  **Dependency\
  \ Inversion**: The Core defines interfaces (Ports) which the Dataproviders implement.\
  \ The `application/configuration` module acts as the \"Composition Root\" that wires\
  \ these implementations together using a Dependency Injection framework, ensuring\
  \ the Core remains decoupled from technical details.\n\n### Evidence of Modular\
  \ Monolith\nThe repository is structured as a single Gradle multi-project build.\
  \ While it is organized into high-level technical modules (core, dataproviders,\
  \ etc.), it compiles into a single deployable unit (`java -jar application/build/clean-architecture-example.jar`).\
  \ The README notes it is a \"Good monolith with clear use cases that you can split\
  \ in microservices later,\" confirming its status as a modular monolith.\n\n###\
  \ Evidence of Domain-Driven Design (DDD)\nThe architecture is heavily influenced\
  \ by DDD principles:\n*   **Entities**: Logic is encapsulated within domain objects.\n\
  *   **Bounded Contexts**: Although small, the code is organized around the \"Network\
  \ Inventory\" domain.\n*   **Ubiquitous Language**: The README and directory structure\
  \ use domain-specific terms like `BroadbandAccessDevice` and `Reconcile devices`.\n\
  \n### Style Rejections\n*   **Layered**: Rejected as the primary style because the\
  \ dependency flow is not traditional horizontal layering (UI -> Service -> DB).\
  \ Instead, both UI and DB depend on the Core (Dependency Inversion), which is the\
  \ hallmark of Hexagonal/Clean architecture.\n*   **Microservices**: Explicitly rejected\
  \ by the README, which describes the project as a monolith intended to demonstrate\
  \ how to structure code before needing to split into services."
