one_line_summary: Textbook Java implementation of Hexagonal Architecture (Clean Architecture)
  with compile-enforced module boundaries in a single Spring Boot deployable.
classification_reasoning: "## Analysis\n\nThis repository is an unambiguous **Hexagonal\
  \ Architecture (Ports and Adapters)** implementation with **Modular Monolith** as\
  \ a secondary style, both demonstrably enforced at compile time through Gradle subproject\
  \ dependency rules.\n\n### Evidence for Hexagonal Architecture\n\n**1. Core Module\
  \ — Zero Framework Dependencies**\nThe `application/core` Gradle module lists only\
  \ `commons-lang3` as a compile dependency. No Spring, no JDBC, no HTTP libraries.\
  \ This isolation is structural, not conventional — importing a framework into core\
  \ fails the build.\n\n**2. Port Interfaces Defined in Core**\nAll external collaboration\
  \ is expressed through interfaces defined within the use case packages:\n- `GetDeviceDetails`\
  \ — port for fetching device data\n- `GetAllDeviceHostnames`, `GetSerialNumberFromModel`,\
  \ `GetSerialNumberFromReality`, `UpdateSerialNumberInModel` — ports for the reconcile\
  \ use case\n- `DoesExchangeExist`, `GetAvailablePortsOfAllDevicesInExchange` — ports\
  \ for exchange capacity\n\n**3. Driven Adapters Implement Core Ports**\n`BroadbandAccessDeviceDatabaseDataProvider`\
  \ implements five core port interfaces simultaneously using Spring JDBC, confining\
  \ all framework code to the `dataproviders` adapter module.\n\n**4. Driving Adapters\
  \ in Entrypoints**\nREST controllers (`GetBroadbandAccessDeviceEndpoint`, `GetCapacityForExchangeEndpoint`)\
  \ and a scheduled job (`ReconcileBroadbandAccessDeviceJob`) invoke use cases without\
  \ any knowledge of implementation details — classic driving adapter pattern.\n\n\
  **5. Composition Root in Configuration**\n`UseCaseConfiguration` is a Spring `@Configuration`\
  \ class that manually wires adapter implementations into use cases. Use cases are\
  \ instantiated with plain `new`, keeping domain objects annotation-free.\n\n**6.\
  \ Gradle Dependency Graph Enforces the Dependency Rule**\n- `core` \u2192 no project\
  \ dependencies\n- `dataproviders` \u2192 depends on `core`\n- `entrypoints` \u2192\
  \ depends on `core`\n- `configuration` \u2192 depends on all modules (wiring layer)\n\
  \nAll dependencies point inward; the dependency rule is mechanically enforced.\n\
  \n### Evidence for Modular Monolith (Secondary)\n\nA single Spring Boot JAR (`clean-architecture-example.jar`)\
  \ is produced by the `configuration` module build. The README explicitly calls it\
  \ a 'good monolith' and frames it as a stepping stone to microservices once use\
  \ cases are well-understood. The four Gradle submodules impose compile-time module\
  \ boundaries — each with a distinct, bounded responsibility.\n\n### What This Is\
  \ NOT\n\n- **NOT Layered Architecture**: Dependency direction is inverted — the\
  \ core defines interfaces that the data layer implements, not the other way around.\n\
  - **NOT Domain-Driven Design**: No bounded contexts, aggregates, value objects,\
  \ domain events, or ubiquitous language patterns. Entities are plain POJOs.\n- **NOT\
  \ Microservices**: Single process, single JAR, shared H2 in-memory database.\n-\
  \ **NOT CQRS**: No command/query model separation or separate read/write stores.\n\
  - **NOT Event-Driven**: No message broker or asynchronous event channels. The scheduled\
  \ job triggers synchronously on a timer."
