one_line_summary: >-
  CDC platform built on a Microkernel/Plugin architecture (stable core SPI + interchangeable
  connector JARs) with an internal Pipeline pattern routing database log events through
  a bounded queue to Kafka topics or embedded consumers.
classification_reasoning: |
  ## Primary Style: Microkernel (Plugin)

  Debezium is a Maven multi-module mono-repo where a stable kernel
  (`debezium-api`, `debezium-core`) defines all extension contracts
  (SPIs) and a set of database-specific connector JARs are independently
  loadable plugins. Evidence:

  1. **Java ServiceLoader throughout**: Every connector registers itself
     via `META-INF/services/org.apache.kafka.connect.source.SourceConnector`.
     Additional ServiceLoader files cover `Snapshotter`, `SnapshotLock`,
     `SnapshotQuery`, `SignalChannelReader`, `NotificationChannel`,
     `SignalActionProvider`, `PostProcessor`, `HeaderConverter`, and
     `CloudEventsProvider`.

  2. **Explicit SPI module (`debezium-api`)**: Defines `Snapshotter`,
     `CustomConverter`, `PostProcessor`, `TopicNamingStrategy`, and
     `DataCollectionId`. The API module has no dependency on any connector.

  3. **Strict anti-reversal dependency hierarchy**: `debezium-api` ←
     `debezium-core` ← `debezium-connector-*`. Connectors are always leaf
     modules.

  4. **Multi-dimensional pluggability**: Storage backends (8 modules),
     snapshot strategies (9 built-in Snapshotter impls + user-provided),
     signal channels (File, Kafka, JMX, Process, Source), notification
     channels, AI embedding providers (Ollama, HuggingFace, Voyage AI,
     MiniLM), and SMTs (Single Message Transforms).

  5. **Two host runtimes acting as the kernel**: Kafka Connect (distributed,
     fault-tolerant) and the Debezium Embedded Engine
     (`debezium-embedded`), both accepting the same connector JARs.

  ## Secondary Style: Pipeline (Pipe-and-Filter)

  Within every connector the event-processing model is a deterministic
  sequential pipeline:

  ```
  DB log / change stream
  → StreamingChangeEventSource.execute()
  → EventDispatcher.dispatchDataChangeEvent()   [filter, heartbeat, watermarks]
  → ChangeEventQueue.enqueue()                  [bounded, back-pressure]
  → BaseSourceTask.poll()                        [SMTs, PostProcessors]
  → Kafka topic / embedded consumer
  ```

  `ChangeEventSourceCoordinator` sequences the snapshot phase then
  hands off to streaming; `ChangeEventQueue` is a bounded blocking
  queue that decouples producer and consumer threads; `EventDispatcher`
  is the central filter/routing node applying include/exclude lists,
  transaction metadata, and heartbeats.

  ## Why Not Other Styles

  - **Not Microservices**: All connectors are library JARs sharing a
    single JVM within Kafka Connect, not independent network services.
  - **Not Event-Driven (as primary)**: Internal communication is via
    direct method calls and an in-process queue, not an event bus.
  - **Not Hexagonal**: SPIs provide extensibility (new DB types, new
    storage backends), not left-port / right-port isolation of a
    domain core for testability.
  - **Not DDD**: Boundaries follow technical roles (api, core, connector
    type, storage backend), not business bounded contexts.
