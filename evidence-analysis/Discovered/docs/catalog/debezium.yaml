classification_reasoning: "## Analysis\n\n### Primary Style: Microkernel (Plugin)\n\
  \nDebezium exhibits a clear **Microkernel/Plugin architecture** where a core framework\
  \ provides extension points for pluggable connectors:\n\n**Evidence of plugin infrastructure:**\n\
  1. **Java ServiceLoader mechanism** extensively used for runtime plugin discovery:\n\
  \   - `META-INF/services/org.apache.kafka.connect.source.SourceConnector` in every\
  \ connector module\n   - `META-INF/services/io.debezium.spi.snapshot.Snapshotter`\
  \ for pluggable snapshot strategies\n   - `META-INF/services/io.debezium.pipeline.signal.actions.SignalActionProvider`\
  \ for signal handlers\n   - `META-INF/services/io.debezium.pipeline.notification.channels.NotificationChannel`\
  \ for notification channels\n   - `META-INF/services/io.debezium.ai.embeddings.EmbeddingsModelFactory`\
  \ for AI embedding providers\n\n2. **Explicit SPI interfaces** in `debezium-api`\
  \ module:\n   - `Snapshotter` interface for custom snapshot behavior\n   - `CustomConverter`\
  \ interface for value conversion customization\n   - `PostProcessor` interface for\
  \ event post-processing\n   - `TopicNamingStrategy` for custom topic naming\n\n\
  3. **Connector abstraction hierarchy**:\n   - `BaseSourceConnector` → `RelationalBaseSourceConnector`\
  \ → `BinlogConnector` → concrete implementations (MySqlConnector, MariaDBConnector)\n\
  \   - Each connector module is independently deployable as a JAR that plugs into\
  \ the Kafka Connect runtime\n\n4. **Storage plugin modules**:\n   - `debezium-storage-kafka`,\
  \ `debezium-storage-file`, `debezium-storage-s3`, `debezium-storage-azure-blob`,\
  \ etc. - all pluggable storage backends\n\n### Secondary Style: Layered\n\nThe codebase\
  \ also exhibits horizontal layering:\n\n**Layer structure:**\n1. **API Layer** (`debezium-api`):\
  \ Defines SPIs, interfaces, and contracts\n2. **Core Layer** (`debezium-core`):\
  \ Common implementation shared across connectors\n3. **Implementation Layer** (`debezium-connector-*`):\
  \ Concrete connector implementations\n4. **Support Layer** (`debezium-transforms`,\
  \ `debezium-embedded`): Cross-cutting concerns\n\n**Dependency direction:** Connectors\
  \ depend on core, core depends on api - never reversed.\n\n### Why Not Other Styles\n\
  \n- **Not Event-Driven**: While Debezium *produces* change events as its business\
  \ function, the internal architecture doesn't use event-based communication between\
  \ components. Components call each other directly, not through message brokers.\n\
  \n- **Not Microservices**: All connector modules are library JARs, not independently\
  \ deployed services. They run within Kafka Connect's runtime, not as separate processes.\n\
  \n- **Not Domain-Driven Design**: The code organization follows technical boundaries\
  \ (API, core, connectors by database type) rather than business domains/bounded\
  \ contexts.\n\n- **Not Hexagonal Architecture**: While there are interfaces (SPIs),\
  \ they're designed for extensibility rather than isolating the application core\
  \ from external concerns via ports and adapters.\n\n### Key Files Referenced\n\n\
  - `pom.xml` - Maven multi-module aggregator with 30+ modules\n- `debezium-api/src/main/java/io/debezium/spi/snapshot/Snapshotter.java`\
  \ - SPI interface\n- `debezium-api/src/main/java/io/debezium/spi/converter/CustomConverter.java`\
  \ - Customization SPI\n- `debezium-core/src/main/java/io/debezium/connector/common/BaseSourceConnector.java`\
  \ - Core abstraction\n- `debezium-connector-mysql/src/main/java/io/debezium/connector/mysql/MySqlConnector.java`\
  \ - Concrete plugin implementation\n- `META-INF/services/*` - Service loader registration\
  \ files across modules"
