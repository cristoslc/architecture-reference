review_notes: "The Debezium repository is structured as a **Microkernel (Plugin)**\
  \ architecture. The system's core design is built around the Kafka Connect framework,\
  \ where the \"kernel\" provides the runtime environment (lifecycle management, configuration,\
  \ and offset storage) and the individual \"plugins\" are the database-specific connectors.\n\
  \n### Evidence of Microkernel (Plugin) Style:\n1.  **Strict Plugin Boundaries:**\
  \ The repository is a mono-repo containing dozens of independent modules (`debezium-connector-postgres`,\
  \ `debezium-connector-mysql`, `debezium-connector-oracle`, etc.). These modules\
  \ are not \"services\" in the traditional sense; they are JARs intended to be loaded\
  \ into a host runtime (Kafka Connect or the Debezium Embedded engine).\n2.  **Shared\
  \ Core Framework:** The `debezium-core` and `debezium-common` modules define the\
  \ SPI (Service Provider Interface) and common abstractions that every connector\
  \ must implement.\n3.  **Extensibility via Transforms and Storage:** Aside from\
  \ connectors, the repository includes `debezium-transforms` and `debezium-storage`.\
  \ These represent additional plugin types (SMTs - Single Message Transforms) that\
  \ can be plugged into the data pipeline without modifying the core engine.\n4. \
  \ **Runtime Hosting:** The README explicitly mentions two ways to run these plugins:\n\
  \    *   **Kafka Connect:** A distributed host for these plugins.\n    *   **Debezium\
  \ Embedded:** A lightweight wrapper that allows the same plugins to run inside a\
  \ custom Java application."
