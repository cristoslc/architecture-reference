review_notes: "The `eShopOnWeb` repository is a reference implementation of a **Layered\
  \ Architecture** (specifically a 3-tier or \"N-Tier\" approach) that incorporates\
  \ **Hexagonal (Ports and Adapters)** and **Domain-Driven Design (DDD)** patterns.\
  \ \n\n### Primary Style: Layered Architecture\nThe codebase is explicitly divided\
  \ into three primary horizontal layers as described in its accompanying eBook and\
  \ reflected in the `src/` directory structure:\n\n1.  **ApplicationCore (`src/ApplicationCore`):**\
  \ The central layer containing business logic, entities, and interfaces. It has\
  \ zero dependencies on external frameworks or the infrastructure layer.\n2.  **Infrastructure\
  \ (`src/Infrastructure`):** Implementation details such as data access (Entity Framework\
  \ Core), logging, and identity services. It implements interfaces defined in the\
  \ Core.\n3.  **UI/Presentation (`src/Web` and `src/PublicApi`):** The entry points\
  \ of the application. `Web` handles the MVC/Razor Pages front-end, while `PublicApi`\
  \ provides a RESTful interface for the Blazor admin panel.\n\n### Secondary Style:\
  \ Hexagonal Architecture (Ports and Adapters)"
