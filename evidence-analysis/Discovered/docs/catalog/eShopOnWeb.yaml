classification_reasoning: "## Architecture Classification: Layered with Hexagonal\
  \ Architecture (Clean Architecture)\n\n### Primary Style: Layered Architecture\n\
  \nThe repository exhibits a classic **layered architecture** with clear horizontal\
  \ separation:\n\n**Layer Structure:**\n```\nsrc/\n├── ApplicationCore/     ← Domain\
  \ Layer (entities, interfaces, specifications, domain services)\n├── Infrastructure/\
  \      ← Data Access Layer (EF Core, repositories, identity, logging)\n├── Web/\
  \                 ← Presentation Layer (MVC controllers, Razor Pages, ViewModels)\n\
  └── PublicApi/           ← API Layer (Minimal API endpoints)\n```\n\n**Evidence\
  \ from dependency analysis:**\n- `Web.csproj` → references ApplicationCore and Infrastructure\n\
  - `Infrastructure.csproj` → references ApplicationCore only\n- `ApplicationCore.csproj`\
  \ → has NO project references (fully independent)\n\nThis demonstrates the classic\
  \ layered dependency flow: **Presentation → Infrastructure → Core**\n\n**README\
  \ confirmation:**\n> \"Sample ASP.NET Core reference application... demonstrating\
  \ a **single-process (monolithic) application architecture** and deployment model.\"\
  \n\n### Secondary Style: Hexagonal Architecture (Clean Architecture)\n\nStrong evidence\
  \ of **Hexagonal Architecture** patterns:\n\n**Ports (Interfaces in ApplicationCore):**\n\
  - `IRepository<T>`, `IReadRepository<T>` - repository ports\n- `IBasketService`,\
  \ `IOrderService` - service ports  \n- `IAppLogger<T>`, `IEmailSender` - infrastructure\
  \ ports\n- `IUriComposer`, `ITokenClaimsService` - utility ports\n\n**Adapters (Implementations\
  \ in Infrastructure):**\n```csharp\n// Infrastructure/Data/EfRepository.cs\npublic\
  \ class EfRepository<T> : RepositoryBase<T>, IReadRepository<T>, IRepository<T>\
  \ \n    where T : class, IAggregateRoot\n```\n\n**Core isolation principle:**\n\
  - ApplicationCore has **zero dependencies** on Infrastructure or Presentation\n\
  - All dependencies point **inward** toward the domain core\n- The `Dependencies.cs`\
  \ file wires up implementations to interfaces\n\n### Domain-Driven Design Elements\
  \ (Within Layers)\n\nDDD tactical patterns are present within the ApplicationCore\
  \ layer:\n\n**Aggregates with IAggregateRoot marker:**\n```csharp\npublic class\
  \ Basket : BaseEntity, IAggregateRoot { ... }\npublic class Order : BaseEntity,\
  \ IAggregateRoot { ... }\n```\n\n**Encapsulated collections (DDD pattern):**\n```csharp\n\
  private readonly List<OrderItem> _orderItems = new List<OrderItem>();\npublic IReadOnlyCollection<OrderItem>\
  \ OrderItems => _orderItems.AsReadOnly();\n```\n\n**Specifications pattern for queries:**\n\
  - `BasketWithItemsSpecification`\n- `CatalogFilterSpecification`\n- `CustomerOrdersWithItemsSpecification`\n\
  \n### Deployment Topology\n\nThe **docker-compose.yml** reveals a service-based\
  \ deployment:\n```yaml\nservices:\n  eshopwebmvc:      ← Web MVC application\n \
  \ eshoppublicapi:   ← Public API  \n  sqlserver:        ← Shared database\n```\n\
  \nBoth services share the same SQL Server database with identical connection strings\
  \ - confirming this is **NOT microservices** but a **Service-Based architecture**\
  \ (2 coarse-grained services sharing data).\n\n### Rejected Styles\n\n**NOT Microservices:**\n\
  - Explicitly described as \"monolithic\" in README\n- Both services share the same\
  \ database (CatalogConnection, IdentityConnection)\n- No independent data ownership\
  \ per service\n\n**NOT Modular Monolith:**\n- No enforced module boundaries (no\
  \ vertical slices with isolated schemas)\n- Standard horizontal layering, not vertical\
  \ module separation\n\n**NOT Event-Driven:**\n- No message broker configuration\
  \ (RabbitMQ, Kafka, etc.)\n- No event handlers or domain events\n- Synchronous request-response\
  \ communication\n\n**NOT CQRS:**\n- No separate read/write models\n- MediatR is\
  \ used minimally for query dispatch (not full CQRS)\n- Same database and repositories\
  \ for all operations\n\n### Summary\n\nThis is a **well-structured Layered Architecture**\
  \ that embraces **Hexagonal Architecture** principles to keep the domain core isolated\
  \ from infrastructure concerns. DDD tactical patterns (aggregates, specifications)\
  \ are employed within the domain layer. The deployment is a simple service-based\
  \ topology with two applications sharing a database - aligned with the stated goal\
  \ of demonstrating monolithic architecture patterns for ASP.NET Core."
