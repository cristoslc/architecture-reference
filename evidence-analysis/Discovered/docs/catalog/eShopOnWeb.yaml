one_line_summary: Microsoft ASP.NET Core 8 reference application demonstrating a monolithic Layered Architecture with Hexagonal
  (Ports and Adapters) dependency inversion and DDD tactical patterns in the domain core.
classification_reasoning: |-
  ## Architecture Classification: Layered + Hexagonal Architecture + Domain-Driven Design

  ### Primary Style: Layered Architecture

  The repository is explicitly a horizontal three-layer monolith (stated in README as "single-process (monolithic) application architecture"). Layers map directly to top-level projects:

  ```
  src/
  ├── ApplicationCore/   ← Domain Layer (entities, interfaces, specifications, domain services)
  ├── Infrastructure/    ← Data/Adapter Layer (EF Core, Identity, logging)
  ├── Web/               ← Presentation Layer (MVC, Razor Pages, Blazor WASM host)
  └└── PublicApi/         ← API Layer (Minimal API for Blazor admin)
  ```

  Dependency direction: Presentation → Infrastructure → ApplicationCore. ApplicationCore has zero project references to any other layer.

  ### Secondary Style: Hexagonal Architecture (Ports and Adapters)

  Systematic dependency inversion enforced via interface contracts in ApplicationCore/Interfaces/:

  - Ports: IRepository<T>, IReadRepository<T>, IBasketService, IOrderService, IBasketQueryService, IAppLogger<T>, IEmailSender, ITokenClaimsService, IUriComposer
  - Adapters in Infrastructure: EfRepository<T> (repository), BasketQueryService (query), LoggerAdapter<T>, IdentityTokenClaimService, EmailSender

  The domain core is fully isolated from all infrastructure concerns and testable without any framework dependencies.

  ### Tertiary Style: Domain-Driven Design (tactical patterns)

  DDD tactical patterns applied throughout ApplicationCore:

  - Aggregates with IAggregateRoot marker: Basket, Order
  - Encapsulated collections enforcing aggregate boundaries (private List<T>, public IReadOnlyCollection<T>)
  - Repository-per-aggregate: IRepository<T> constrained to IAggregateRoot
  - Specification pattern for composable queries (Ardalis.Specification): BasketWithItemsSpecification, CustomerOrdersSpecification, CatalogFilterSpecification, etc.
  - Domain Services: BasketService, OrderService for cross-aggregate logic
  - Value Objects: Address, CatalogItemOrdered

  ### MediatR usage (not CQRS)

  MediatR is used in Web/Features/ for in-process request dispatch (GetMyOrders, GetOrderDetails). This is query dispatch, not full CQRS: no separate read/write models, no distinct query stores, no command segregation.

  ### Deployment

  docker-compose.yml runs two processes (eshopwebmvc, eshoppublicapi) sharing the same SQL Server database with identical connection strings. This confirms a monolithic data model with no service-level data isolation.

  ### Rejected Styles

  - NOT Microservices: README explicitly says monolithic; both services share database schema
  - NOT Modular Monolith: no vertical module boundaries; purely horizontal layering
  - NOT Event-Driven: no message broker, no domain events, synchronous communication throughout
  - NOT CQRS: MediatR is dispatch-only; same repositories for reads and writes
  - NOT Service-Based: the two Docker processes are not independent business capabilities; they share all data and exist only to support Blazor WebAssembly's cross-origin requirement
