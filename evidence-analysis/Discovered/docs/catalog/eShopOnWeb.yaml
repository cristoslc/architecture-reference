review_notes: "Layered: strict 3-layer dependency chain - ApplicationCore (no infra deps per ApplicationCore.csproj), Infrastructure (references ApplicationCore per Infrastructure.csproj), Web/PublicApi (reference both per Web.csproj). DDD: aggregate root marker interface (src/ApplicationCore/Interfaces/IAggregateRoot.cs), aggregate folders (src/ApplicationCore/Entities/OrderAggregate/, BasketAggregate/, BuyerAggregate/), encapsulated collections with private backing fields in Order.cs and Basket.cs, Value Object pattern in Address.cs, Repository constrained to IAggregateRoot (IRepository.cs), Specification pattern (src/ApplicationCore/Specifications/), domain services (src/ApplicationCore/Services/OrderService.cs). Automated classifier incorrectly suggested Microservices/Event-Driven; README explicitly states single-process monolithic architecture."