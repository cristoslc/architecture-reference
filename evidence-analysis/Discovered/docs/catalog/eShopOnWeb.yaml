one_line_summary: Microsoft ASP.NET Core 8 reference application demonstrating a
  monolithic Layered Architecture with Hexagonal (Ports and Adapters) dependency
  inversion and DDD tactical patterns in the domain core.
classification_reasoning: "## Architecture Classification: Layered + Hexagonal Architecture\
  \ + Domain-Driven Design\n\n### Primary Style: Layered Architecture\n\nThe repository\
  \ is explicitly a horizontal three-layer monolith (stated in README as \"single-process\
  \ (monolithic) application architecture\"). Layers map directly to top-level projects:\n\
  \n```\nsrc/\n\u251C\u2500\u2500 ApplicationCore/   \u2190 Domain Layer (entities,\
  \ interfaces, specifications, domain services)\n\u251C\u2500\u2500 Infrastructure/\
  \    \u2190 Data/Adapter Layer (EF Core, Identity, logging)\n\u251C\u2500\u2500\
  \ Web/               \u2190 Presentation Layer (MVC, Razor Pages, Blazor WASM host)\n\
  \u2514\u2514\u2500\u2500 PublicApi/         \u2190 API Layer (Minimal API for Blazor\
  \ admin)\n```\n\nDependency direction: Presentation \u2192 Infrastructure \u2192\
  \ ApplicationCore. ApplicationCore has zero project references to any other layer.\n\
  \n### Secondary Style: Hexagonal Architecture (Ports and Adapters)\n\nSystematic\
  \ dependency inversion enforced via interface contracts in ApplicationCore/Interfaces/:\n\
  \n- Ports: IRepository<T>, IReadRepository<T>, IBasketService, IOrderService, IBasketQueryService,\
  \ IAppLogger<T>, IEmailSender, ITokenClaimsService, IUriComposer\n- Adapters in\
  \ Infrastructure: EfRepository<T> (repository), BasketQueryService (query), LoggerAdapter<T>,\
  \ IdentityTokenClaimService, EmailSender\n\nThe domain core is fully isolated from\
  \ all infrastructure concerns and testable without any framework dependencies.\n\n\
  ### Tertiary Style: Domain-Driven Design (tactical patterns)\n\nDDD tactical patterns\
  \ applied throughout ApplicationCore:\n\n- Aggregates with IAggregateRoot marker:\
  \ Basket, Order\n- Encapsulated collections enforcing aggregate boundaries (private\
  \ List<T>, public IReadOnlyCollection<T>)\n- Repository-per-aggregate: IRepository<T>\
  \ constrained to IAggregateRoot\n- Specification pattern for composable queries\
  \ (Ardalis.Specification): BasketWithItemsSpecification, CustomerOrdersSpecification,\
  \ CatalogFilterSpecification, etc.\n- Domain Services: BasketService, OrderService\
  \ for cross-aggregate logic\n- Value Objects: Address, CatalogItemOrdered\n\n###\
  \ MediatR usage (not CQRS)\n\nMediatR is used in Web/Features/ for in-process request\
  \ dispatch (GetMyOrders, GetOrderDetails). This is query dispatch, not full CQRS:\
  \ no separate read/write models, no distinct query stores, no command segregation.\n\
  \n### Deployment\n\ndocker-compose.yml runs two processes (eshopwebmvc, eshoppublicapi)\
  \ sharing the same SQL Server database with identical connection strings. This confirms\
  \ a monolithic data model with no service-level data isolation.\n\n### Rejected\
  \ Styles\n\n- NOT Microservices: README explicitly says monolithic; both services\
  \ share database schema\n- NOT Modular Monolith: no vertical module boundaries;\
  \ purely horizontal layering\n- NOT Event-Driven: no message broker, no domain\
  \ events, synchronous communication throughout\n- NOT CQRS: MediatR is dispatch-only;\
  \ same repositories for reads and writes\n- NOT Service-Based: the two Docker processes\
  \ are not independent business capabilities; they share all data and exist only\
  \ to support Blazor WebAssembly's cross-origin requirement"
