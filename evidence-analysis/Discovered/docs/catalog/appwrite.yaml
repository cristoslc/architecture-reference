classification_reasoning: "## Architecture Classification: Modular Monolith with Event-Driven\
  \ Communication\n\n### Evidence for Modular Monolith (Primary)\n\n**Single Deployable\
  \ Unit with Internal Modules:**\n- The entire backend is built as a **single PHP\
  \ codebase** (`appwrite-dev` image) that runs in different modes based on entrypoint\n\
  - All services share the same `composer.json` and are deployed from one image\n\
  - From `docker-compose.yml`, multiple containers run the same image with different\
  \ entrypoints:\n  - `appwrite` → `app/http.php` (HTTP API)\n  - `appwrite-realtime`\
  \ → `realtime` entrypoint (WebSocket server)\n  - `appwrite-worker-*` → Various\
  \ queue workers (8+ workers)\n  - `appwrite-task-*` → Scheduled tasks\n\n**Enforced\
  \ Module Boundaries:**\n- Clear module structure in `src/Appwrite/Platform/Modules/`:\n\
  \  - `Account/` - Authentication, MFA, OAuth\n  - `Databases/` - Database operations\
  \  \n  - `Functions/` - Serverless function execution\n  - `Projects/` - Project\
  \ management\n  - `Console/` - Admin console\n  - `Sites/` - Static site hosting\n\
  \  - `Proxy/` - Proxy/domain management\n  - `Tokens/` - Token management\n- Each\
  \ module follows consistent structure: `Module.php`, `Http/`, `Services/`\n- The\
  \ `Appwrite.php` platform class orchestrates module registration:\n  ```php\n  $this->addModule(new\
  \ Account\\Module());\n  $this->addModule(new Databases\\Module());\n  $this->addModule(new\
  \ Functions\\Module());\n  // etc.\n  ```\n\n**Shared Infrastructure:**\n- Single\
  \ shared MariaDB database instance (`mariadb` container)\n- Single shared Redis\
  \ instance for caching and queuing\n- All modules use common database pools and\
  \ connections\n\n### Evidence for Event-Driven (Secondary)\n\n**Queue-Based Architecture:**\n\
  - Redis serves as the message broker for all async operations\n- `Event.php` defines\
  \ 12+ distinct queue names for different event types:\n  - `DATABASE_QUEUE_NAME\
  \ = 'v1-database'`\n  - `FUNCTIONS_QUEUE_NAME = 'v1-functions'`\n  - `MAILS_QUEUE_NAME\
  \ = 'v1-mails'`\n  - `WEBHOOK_QUEUE_NAME = 'v1-webhooks'`\n  - `AUDITS_QUEUE_NAME\
  \ = 'v1-audits'`\n  - etc.\n\n**Dedicated Worker Processes:**\n- Separate container\
  \ deployments for each worker type:\n  - `appwrite-worker-audits` - Processes audit\
  \ events\n  - `appwrite-worker-functions` - Executes serverless functions\n  - `appwrite-worker-mails`\
  \ - Sends emails\n  - `appwrite-worker-databases` - Handles database events\n  -\
  \ `appwrite-worker-webhooks` - Dispatches webhooks\n- Workers pull from specific\
  \ queues and process asynchronously\n- Real-time WebSocket server (`appwrite-realtime`)\
  \ pushes events to clients\n\n### What This Is NOT\n\n**Not Microservices:**\n-\
  \ Single deployable artifact (one image)\n- Shared database (not database-per-service)\n\
  - All modules are in the same codebase with tight integration\n- Workers are scaling\
  \ replicas of the same monolith, not independent services\n\n**Not Layered Architecture:**\n\
  - No traditional controller/service/repository layering\n- Modules are organized\
  \ by **domain/bounded context** (Account, Databases, Functions) not by technical\
  \ layer\n- Each module contains its own HTTP actions and business logic\n\n**Not\
  \ Service-Based:**\n- More than 2-5 coarse-grained services (has 8+ module domains)\n\
  - Workers are lightweight processes, not full services\n\n**Not Hexagonal:**\n-\
  \ No explicit ports/adapters pattern\n- Infrastructure concerns (database, Redis)\
  \ are injected directly\n\n### Deployment Characteristics\n\nThe architecture enables\
  \ **independent scaling** of different processing modes:\n- HTTP API servers can\
  \ scale independently of workers\n- Real-time WebSocket connections can scale separately\n\
  - Heavy background processing (functions, builds) uses dedicated workers\n- All\
  \ share the same codebase and can be deployed from a single image\n\nThis is a **well-executed\
  \ modular monolith** that achieves many benefits of microservices (independent scaling,\
  \ clear boundaries, async processing) without the operational complexity of distributed\
  \ services."
