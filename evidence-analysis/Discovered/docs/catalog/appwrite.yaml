review_notes: 'Public knowledge: Appwrite is a well-known open-source BaaS with a
  Docker Compose-based multi-service deployment (appwrite core, workers, realtime,
  executor, etc.), each service handling distinct responsibilities (auth, database,
  storage, functions, realtime). This aligns with Microservices signals (container_orchestration:
  3, package_manifests: 4) and Event-Driven signals (messaging: 3) from the catalog.
  Workers consume queue-based events for async processing (emails, webhooks, builds).
  Within the PHP monorepo, code is organized into well-defined modules/domains (directory_structure:
  4), supporting Modular Monolith as a secondary style. Heuristic candidates corroborate:
  Modular Monolith (0.7), Event-Driven (0.3). The ''Layered'' and ''Pipe-and-Filter''
  candidates are lower-confidence secondary patterns within individual services rather
  than primary architectural styles.'
