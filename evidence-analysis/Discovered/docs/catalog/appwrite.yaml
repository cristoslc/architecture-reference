review_notes: 'Appwrite is structured as a **Microservices** architecture, heavily
  reliant on an **Event-Driven** backbone for asynchronous processing.


  ### 1. Primary Style: Microservices

  The system is explicitly designed to be deployed as multiple independent units via
  Docker.

  - **Service Separation**: The codebase provides individual entry points for different
  operational roles. `app/http.php` serves as the primary API gateway/server, while
  `app/worker.php` acts as the entry point for various background services.

  - **Independent Scalability**: In `app/http.php`, there is logic to categorize requests
  as "safe" or "risky" (e.g., synchronous executions) and route them to specific subsets
  of workers (`_APP_RISKY_WORKERS_PERCENT`).

  - **Infrastructure**: The README and `app/views/install/compose.phtml` indicate
  that the system is "packaged as a set of Docker microservices," typically including
  separate containers for the API, database (MariaDB), cache (Redis), and specific
  background workers (e.g., mail, functions, audits).


  ### 2. Secondary Style: Event-Driven

  The internal communication between the API layer and the heavy-lifting logic is
  strictly decoupled using a Message Broker (Redis/Utopia Queue).'
