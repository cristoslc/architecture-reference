one_line_summary: "A Backend-as-a-Service platform built as a modular monolith (single PHP image, 8 domain modules) with an event-driven async backbone powered by 12 Redis queues and 10 dedicated worker containers."
classification_reasoning: "Appwrite exhibits a two-style composition: Modular Monolith as primary, Event-Driven as secondary.\n\nMODULAR MONOLITH (primary, 0.92): The entire backend is a single PHP codebase compiled into one Docker image (`appwrite-dev`) that is deployed in multiple roles by switching the entrypoint: `app/http.php` (Swoole HTTP API), `app/realtime.php` (WebSocket server), `app/worker.php` (queue workers). The `Appwrite` platform class in `src/Appwrite/Platform/Appwrite.php` registers eight domain modules via `addModule()`: Account, Databases, Functions, Sites, Console, Proxy, Tokens, and Compute. Each module in `src/Appwrite/Platform/Modules/` follows a consistent vertical-slice structure: `Module.php`, `Http/` (route actions), `Services/`. All modules share a single MariaDB instance and a single Redis instance â€” the defining characteristic that distinguishes this from microservices. The `Workers.php` service aggregates 10 named worker Action classes (Audits, Certificates, Deletes, Functions, Mails, Messaging, Migrations, StatsResources, StatsUsage, Webhooks), all deployed from the same image.\n\nEVENT-DRIVEN (secondary, 0.90): Redis via Utopia Queue acts as the message broker. The `Event` class in `src/Appwrite/Event/Event.php` declares 12 named queues as constants: `v1-database`, `v1-deletes`, `v1-audits`, `v1-mails`, `v1-functions`, `v1-webhooks`, `v1-certificates`, `v1-builds`, `v1-messaging`, `v1-migrations`, `v1-stats-resources`, `v1-stats-usage`. API controllers inject typed queue publishers (`queueForEvents`, `queueForFunctions`, `queueForWebhooks`, `queueForRealtime`, `queueForMails`, `queueForStatsUsage`) and enqueue work asynchronously. Ten dedicated `appwrite-worker-*` containers each subscribe to one or more queues and process events independently. The `appwrite-realtime` container implements a WebSocket push channel via `src/Appwrite/PubSub/` (Redis PubSub adapter), subscribing to internal events and broadcasting to connected clients. Workers use a `Commit`/`NoCommit` result pattern for explicit message acknowledgment.\n\nSCALABILITY evidence: Swoole HTTP server with configurable `_APP_WORKER_PER_CORE` and `_APP_CPU_NUM` env vars; safe/risky dispatch routing in `app/http.php` for load isolation; each worker-type container is independently scalable; Redis queue prefetch count tunable via `_APP_QUEUE_PREFETCH_COUNT`.\n\nMODULARITY evidence: Eight domain modules with consistent Module/Http/Services layout in `src/Appwrite/Platform/Modules/`; 12 separate Event classes in `src/Appwrite/Event/`; 10 worker Action classes each handling one queue domain.\n\nDEPLOYABILITY evidence: Single Docker image deployed across all roles; Docker Compose orchestrates 20+ containers; `openruntimes-executor` (openruntimes/executor:0.11.4) and `openruntimes-proxy` (openruntimes/proxy:0.5.5) as isolated sidecars; Traefik 2.11 handles gateway and TLS; `appwrite-coredns` for internal DNS resolution.\n\nFAULT TOLERANCE evidence: Queue-based async decoupling prevents HTTP failures propagating to workers; `critical: bool` flag on Event class allows non-critical enqueue failures to be suppressed; `QueueRetry` task in `src/Appwrite/Platform/Tasks/`; `Commit`/`NoCommit` result types in worker `action()` methods for explicit ACK control; batch aggregation interval in Audits worker.\n\nEVOLVABILITY evidence: New platform modules can be added by implementing Module/Http/Services and registering in `Appwrite.php::addModule()`; separate Tasks (cron-scheduled) and Workers (queue-driven) layers; modular event types with dedicated Event subclasses.\n\nOBSERVABILITY evidence: `/health` controller exposes per-subsystem health endpoints; Utopia Logger integration in workers and API; per-worker group labels (->groups()) for selective deployment; structured logging via Console class.\n\nRULED OUT - Microservices: Single deployable image for all backend roles; shared MariaDB database (not database-per-service); all modules in one codebase with shared `composer.json`; workers are scaling replicas of the same monolith, not independent services.\n\nRULED OUT - Serverless (as primary): The `openruntimes-executor` sidecar does provide sandboxed function execution, but this is a subordinate capability within the BaaS platform, not the structural organizing principle.\n\nRULED OUT - Layered: Organization is vertical by domain (Account, Databases, Functions) not horizontal by technical layer. Each module contains its own HTTP actions and business logic without strict controller/service/repository separation."
