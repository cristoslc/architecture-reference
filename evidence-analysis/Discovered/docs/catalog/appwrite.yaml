review_notes: "CONTRIBUTING.md explicitly states 'combination of both Monolithic and Microservice architectures'. Single Dockerfile builds one image reused across all services. docker-compose.yml defines ~20 service containers: appwrite (API), appwrite-realtime (WebSocket), 10+ appwrite-worker-* (audits, webhooks, deletes, databases, builds, certificates, functions, mails, messaging, migrations), appwrite-task-* (maintenance, stats, scheduler-functions, scheduler-executions, scheduler-messages). All containers run from the same PHP codebase with different entrypoints (app/http.php, app/worker.php, app/realtime.php). Workers consume from Redis queues via utopia-php/queue -- see src/Appwrite/Event/ (Audit.php, Build.php, Certificate.php, Database.php, Delete.php, Func.php, Mail.php, Messaging.php, Migration.php, Realtime.php, StatsUsage.php, Webhook.php). Platform is modularized into domain modules via src/Appwrite/Platform/Modules/ (Account, Compute, Console, Databases, Functions, Projects, Proxy, Sites, Tokens) registered in src/Appwrite/Platform/Appwrite.php. API controllers organized by domain in app/controllers/api/ (account.php, storage.php, users.php, messaging.php, etc.). composer.json confirms PHP with utopia-php framework ecosystem. Service-Based because independent deployment units share one codebase but run as separate processes. Event-Driven because workers process domain events through Redis message queues. Modular Monolith because the codebase is organized into cohesive domain modules within a single deployable artifact."