classification_reasoning: "## Analysis\n\n**Primary Classification: Modular Monolith**\n\
  \nksqlDB is a single deployable application with strongly enforced internal module\
  \ boundaries. The evidence:\n\n1. **Single deployable unit**: The `ksqldb-rest-app`\
  \ module produces the main server application (`KsqlRestApplication`), while `ksqldb-cli`\
  \ provides a command-line client. The `docker-compose.yml` shows horizontal scaling\
  \ of the same server image, not multiple different services.\n\n2. **29 Maven modules\
  \ with enforced boundaries**: The root `pom.xml` defines a multi-module Maven project\
  \ with clear module separation:\n   - `ksqldb-parser` - SQL parsing (ANTLR-based)\n\
  \   - `ksqldb-metastore` - metadata management\n   - `ksqldb-execution` - query\
  \ execution planning\n   - `ksqldb-engine` - core business logic\n   - `ksqldb-rest-app`\
  \ - REST API layer\n   - `ksqldb-rest-client` - HTTP client\n   - `ksqldb-serde`\
  \ - serialization\n   - `ksqldb-udf` - user-defined function support\n   - Plus\
  \ utility, testing, and tooling modules\n\n3. **Controlled dependency hierarchy**:\
  \ Maven POMs enforce unidirectional dependencies. For example:\n   - `ksqldb-rest-app`\
  \ depends on `ksqldb-engine`\n   - `ksqldb-engine` depends on `ksqldb-parser`, `ksqldb-metastore`,\
  \ `ksqldb-execution`\n   - `ksqldb-metastore` depends on `ksqldb-common`\n   \n\
  \   This prevents circular dependencies and maintains architectural integrity.\n\
  \n4. **No service boundary separation**: Despite using Kafka for stream processing,\
  \ all code deploys as one application. There are no separate microservices, no inter-service\
  \ communication protocols, no API gateways between internal components.\n\n**Secondary\
  \ Style: Layered**\n\nHorizontal layering is evident in the module organization:\n\
  \n- **Presentation Layer**: `ksqldb-rest-app` (REST resources: `KsqlResource`, `ClusterStatusResource`,\
  \ etc.), `ksqldb-cli`\n- **Business Logic Layer**: `ksqldb-engine` (`KsqlEngine`,\
  \ `KsqlExecutionContext`)\n- **Query Processing Layer**: `ksqldb-parser`, `ksqldb-execution`,\
  \ `ksqldb-streams`\n- **Data/Metadata Layer**: `ksqldb-metastore`, `ksqldb-serde`\n\
  \nThe `KsqlExecutionContext` interface (in `ksqldb-engine/src/main/java/io/confluent/ksql/KsqlExecutionContext.java`)\
  \ defines the core execution contract, with methods for parsing, preparing, and\
  \ executing statements—classic layer abstraction.\n\n**Secondary Style: Microkernel\
  \ (Plugin)**\n\nksqlDB has a sophisticated plugin architecture for user-defined\
  \ functions:\n\n1. **Extension API via annotations**: \n   - `@UdfDescription` -\
  \ marks a class as a UDF provider\n   - `@Udf` - marks methods as scalar functions\n\
  \   - `@UdafDescription` - marks aggregate functions\n   - `@UdtfDescription` -\
  \ marks table functions\n\n2. **Plugin loading infrastructure**:\n   - `UserFunctionLoader`\
  \ (line 45-169) scans JAR files in the extension directory\n   - `UdfClassLoader`\
  \ provides isolated class loading for plugins\n   - `UdfLoader` dynamically registers\
  \ functions with the `MutableFunctionRegistry`\n   - Security sandboxing via `ExtensionSecurityManager`\n\
  \n3. **Runtime discovery**: Uses ClassGraph to scan for annotated classes at runtime:\n\
  \   ```java\n   try (ScanResult scan = classGraph.enableAnnotationInfo().scan())\
  \ {\n     for (ClassInfo udf : scan.getClassesWithAnnotation(UdfDescription.class.getName()))\
  \ {\n       udfLoader.loadUdfFromClass(udf.loadClass(), pathLoadedFrom);\n     }\n\
  \   }\n   ```\n\n**Rejected Classifications:**\n\n- **Not Microservices**: All functionality\
  \ is packaged as a single server. The `docker-compose.yml` scales the same `ksqldb-server`\
  \ image, not different services with distinct codebases.\n\n- **Not Event-Driven**:\
  \ While ksqlDB processes Kafka streams (business domain), internal module communication\
  \ is synchronous via direct method calls, not event-based. The REST API follows\
  \ request-response patterns.\n\n- **Not Domain-Driven Design**: Modules are organized\
  \ by technical capability (parser, execution, metastore), not business bounded contexts.\
  \ No aggregates, entities, or value objects patterns.\n\n- **Not Hexagonal Architecture**:\
  \ No ports-and-adapters pattern. The `KsqlResource` directly references `KsqlEngine`\
  \ without intermediate port interfaces. Service context is injected but not through\
  \ adapter pattern.\n\n- **Not CQRS**: While push queries and pull queries exist\
  \ as concepts, there's no separate read/write model architecture in the codebase\
  \ organization."
