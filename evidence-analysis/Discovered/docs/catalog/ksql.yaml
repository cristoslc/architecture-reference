review_notes: "The ksqlDB repository is structured as a **Layered** system (specifically\
  \ following the architectural pattern of a database engine) but is fundamentally\
  \ built to support and operate within **Event-Driven** ecosystems. \n\n### 1. Primary\
  \ Style: Layered (Database Architecture)\nThe repository is a Java-based monorepo\
  \ where the core logic is partitioned into horizontal functional layers typical\
  \ of a database engine:\n- **Parser Layer (`ksqldb-parser`):** Contains the ANTLR4\
  \ grammar and logic to transform SQL strings into Abstract Syntax Trees (AST).\n\
  - **Service/Execution Layer (`ksqldb-streams`):** This is the core \"Business Logic\"\
  \ of the system, where SQL queries are translated into Kafka Streams topologies.\n\
  - **Transport/Interface Layer (`ksqldb-rest-app`, `ksqldb-rest-model`):** Handles\
  \ the external API surfacing the engine via REST.\n- **Client Layer (`ksqldb-cli`,\
  \ `ksqldb-api-client`):** Independent modules for user interaction.\n\nWhile the\
  \ deployment unit (the ksqlDB Server) is a single process, the internal code organization\
  \ strictly separates the SQL frontend from the streaming backend."
