one_line_summary: ksqlDB is a single-process, horizontally scalable stream processing database engine built on Kafka Streams, organized as a tightly layered modular monolith with a Microkernel-style plugin system for user-defined functions.
classification_reasoning: >-
  ksqlDB is architecturally a Modular Monolith first. The defining characteristic is deployment: one
  Docker image, one Java process, 29+ Maven modules all compiled into a single server artifact. The
  docker-compose.yml scales identical ksqldb-server instances horizontally; the Kafka command topic
  (CommandStore/CommandRunner) is the coordination mechanism for cluster-wide state consistency, not
  an inter-service message bus. There is no service mesh, no API gateway between internal components,
  and no independent deployability of subsystems.

  Within that monolith, the internal organization is strongly Layered. The dependency chain runs from
  the Vert.x-based REST layer (ksqldb-rest-app) through the engine (KsqlEngine/KsqlExecutionContext)
  into an analysis and planning pipeline (QueryAnalyzer -> LogicalPlanner -> physicalplanner) and
  then into an abstract execution plan DAG (ksqldb-execution) which is finally translated into a
  concrete Kafka Streams topology by KSPlanBuilder (ksqldb-streams). This hierarchy is acyclic and
  enforced at the Maven build level. KLIP-6 documents the intentional separation of the abstract
  execution plan from the Kafka Streams runtime to enable backend portability.

  The Microkernel classification is warranted by the UDF/UDAF/UDTF plugin subsystem. UserFunctionLoader
  scans a configurable pluginDir for annotated JARs at startup using ClassGraph, with UdfClassLoader
  providing isolated classloading per JAR and ExtensionSecurityManager sandboxing plugin code. The
  MutableFunctionRegistry acts as the stable microkernel core. The Endpoints SPI and
  KsqlSecurityExtension provide additional plugin points for API behavior and security.

  Rejected: Event-Driven (internal communication is synchronous method calls; the command topic is a
  coordination log, not a general event bus), CQRS (no separate read/write data models in the codebase
  architecture sense), Microservices (single JVM process), Hexagonal Architecture (no ports-and-adapters
  pattern; KsqlResource directly references KsqlEngine), Pipeline (the SQL compilation workflow is
  pipeline-like but does not define the overall system architecture).
