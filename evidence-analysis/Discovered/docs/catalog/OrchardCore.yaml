classification_reasoning: "## Architecture Classification: Modular Monolith with Microkernel/Plugin\
  \ Architecture\n\n### Primary Evidence for Modular Monolith\n\n**Single Deployable\
  \ Unit:**\n- One web application project (`src/OrchardCore.Cms.Web/OrchardCore.Cms.Web.csproj`)\
  \ serves as the sole entry point\n- Single Dockerfile producing one container image\n\
  - All modules compile into the same application via MSBuild targets\n\n**92+ Modules\
  \ with Enforced Boundaries:**\n- Located in `src/OrchardCore.Modules/` with consistent\
  \ structure\n- Each module has `Manifest.cs` declaring metadata and dependencies:\n\
  ```csharp\n[assembly: Module(\n    Name = \"Admin\",\n    Dependencies = [\"OrchardCore.Settings\"\
  ]\n)]\n```\n- Each module has `Startup.cs` extending `StartupBase` to register services\
  \ and configure pipelines\n- Module dependencies are explicitly declared and resolved\
  \ by the `ExtensionManager`\n\n**Feature-Based Enablement System:**\n- Modules can\
  \ define multiple features via `[Feature]` attributes\n- Features have explicit\
  \ dependencies managed through `IFeatureInfo.Dependencies`\n- `IShellFeaturesManager`\
  \ enables/disables features per tenant\n- Services can be conditionally registered\
  \ using `[RequireFeatures]` attribute\n- `FeatureAttribute` associates services\
  \ with specific features for conditional activation\n\n### Secondary Evidence for\
  \ Microkernel (Plugin)\n\n**Dynamic Module Discovery and Loading:**\n- `AssemblyAttributeModuleNamesProvider`\
  \ discovers modules via assembly attributes\n- `ModularApplicationContext` loads\
  \ all modules at startup\n- `Module` class encapsulates assembly metadata and embedded\
  \ resources\n- Core system (`OrchardCore` libraries) provides extension points that\
  \ modules plug into\n\n**Extension Points Pattern:**\n- `IStartup` interface for\
  \ module initialization\n- `IShellPipeline` for request pipeline customization\n\
  - `IDisplayDriver<T>` for UI extensibility\n- `IFeatureValidationProvider` for feature\
  \ validation hooks\n- `IShellContextEvents` for lifecycle hooks\n\n**Theme Plugin\
  \ System:**\n- Themes are specialized plugins with `[assembly: Theme(...)]` attribute\n\
  - Theme selection via `IThemeSelector` interface\n- Themes can override shapes and\
  \ templates\n\n### Multi-Tenancy Architecture\n\n**Shell-Based Tenant Isolation:**\n\
  - `ShellHost` manages multiple `ShellContext` instances (one per tenant)\n- Each\
  \ tenant has its own `IServiceProvider` created by `IShellContainerFactory`\n- `RunningShellTable`\
  \ routes requests to appropriate tenant by host/path matching\n- `ModularTenantContainerMiddleware`\
  \ and `ModularTenantRouterMiddleware` handle tenant resolution\n\n```csharp\npublic\
  \ class ShellContext {\n    public ShellSettings Settings { get; set; }\n    public\
  \ IServiceProvider ServiceProvider { get; set; }\n    public ShellBlueprint Blueprint\
  \ { get; set; }\n    public IShellPipeline Pipeline { get; set; }\n}\n```\n\n###\
  \ What This Is NOT\n\n**Not Microservices:**\n- Single deployable application, not\
  \ distributed services\n- All modules run in the same process\n- Single database\
  \ connection string per tenant (not service-specific databases)\n\n**Not Traditional\
  \ Layered:**\n- No horizontal separation into presentation/business/data layers\n\
  - Modules are vertical feature slices (e.g., `OrchardCore.Admin`, `OrchardCore.Media`)\n\
  - Each module contains its own controllers, services, views, and migrations\n\n\
  **Not Event-Driven Architecture:**\n- While modules can use background tasks and\
  \ events, the primary communication is through dependency injection and service\
  \ interfaces\n- No message broker infrastructure for inter-module communication\n\
  \n**Not Domain-Driven Design:**\n- No explicit aggregate roots, value objects, or\
  \ bounded context patterns\n- Feature-based organization doesn't map directly to\
  \ domain concepts\n- No ubiquitous language enforcement\n\n### Key Architecture\
  \ Files\n\n| Component | File Path |\n|-----------|-----------|\n| Shell Host |\
  \ `src/OrchardCore/OrchardCore/Shell/ShellHost.cs` |\n| Module Loader | `src/OrchardCore/OrchardCore.Abstractions/Modules/Module.cs`\
  \ |\n| Extension Manager | `src/OrchardCore/OrchardCore/Extensions/ExtensionManager.cs`\
  \ |\n| Feature System | `src/OrchardCore/OrchardCore.Abstractions/Extensions/Features/IFeatureInfo.cs`\
  \ |\n| Tenant Middleware | `src/OrchardCore/OrchardCore/Modules/ModularTenantContainerMiddleware.cs`\
  \ |\n\n### Conclusion\n\nOrchardCore is a textbook example of a **Modular Monolith**\
  \ with a sophisticated **Microkernel/Plugin** extension mechanism. The architecture\
  \ achieves:\n\n1. **Enforced module boundaries** through explicit dependency declarations\n\
  2. **Feature-level enablement** allowing fine-grained control over functionality\n\
  3. **Multi-tenant isolation** with separate DI containers per tenant\n4. **Extensibility**\
  \ through well-defined plugin contracts\n\nThe system demonstrates that a monolithic\
  \ deployment can still maintain clean architectural boundaries through disciplined\
  \ use of module manifests, feature dependencies, and dynamic loading—all while supporting\
  \ multi-tenancy within a single application instance."
