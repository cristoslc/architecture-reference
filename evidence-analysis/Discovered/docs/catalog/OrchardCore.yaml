review_notes: README explicitly describes itself as 'modular, multi-tenant application
  framework.' src/OrchardCore.Modules/ contains 90+ modules each with Manifest.cs
  (assembly-level [Module] attributes declaring dependencies) and Startup.cs extending
  StartupBase. ShellHost/ShellContainerFactory in src/OrchardCore/OrchardCore/Shell/
  creates per-tenant service containers. Extensive Abstractions projects (ContentManagement.Abstractions,
  Data.Abstractions, etc.) enforce module boundaries through shared contracts. ExtensionManager
  dynamically loads and manages module features. All modules compile into single deployable
  (OrchardCore.Cms.Web). Module isolation is architectural but runtime is single-process
  monolith.
