classification_reasoning: "## Architecture Classification: Microservices (with DDD\
  \ and Event-Driven patterns)\n\nThe **ftgo-application** repository implements a\
  \ **Microservices Architecture** as its primary architecture style, with strong\
  \ **Domain-Driven Design** and **Event-Driven** patterns.\n\n### Primary Evidence\
  \ for Microservices\n\n**Multiple Independently Deployable Services:**\n- 7+ distinct\
  \ services: `ftgo-order-service`, `ftgo-kitchen-service`, `ftgo-accounting-service`,\
  \ `ftgo-consumer-service`, `ftgo-restaurant-service`, `ftgo-delivery-service`, `ftgo-order-history-service`\n\
  - Each service has its own `Dockerfile` and can be deployed independently\n- Services\
  \ are orchestrated via `docker-compose.yml` and Kubernetes manifests in `deployment/kubernetes/`\n\
  \n**Database-per-Service Pattern:**\n```\nSPRING_DATASOURCE_URL: jdbc:mysql://mysql/ftgo_order_service\n\
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql/ftgo_kitchen_service\nSPRING_DATASOURCE_URL:\
  \ jdbc:mysql://mysql/ftgo_consumer_service\n...\n```\nEach service has its own MySQL\
  \ schema, enforcing data ownership boundaries.\n\n**API Gateway Pattern:**\n- Dedicated\
  \ `ftgo-api-gateway` service using Spring Cloud Gateway\n- Proxies requests to underlying\
  \ services via `OrderServiceProxy`, `ConsumerServiceProxy`, etc.\n- External clients\
  \ interact only through the gateway\n\n**Service Decomposition by Domain:**\nEach\
  \ service owns a distinct business capability (Order, Kitchen, Accounting, Consumer,\
  \ Restaurant, Delivery, Order History).\n\n### Secondary Evidence for Domain-Driven\
  \ Design\n\n**Aggregates as Primary Modeling Pattern:**\nEvery service uses DDD\
  \ aggregates:\n- `Order` aggregate (`ftgo-order-service/src/main/java/.../domain/Order.java`)\
  \ - JPA entity with domain events\n- `Ticket` aggregate (`ftgo-kitchen-service/src/main/java/.../domain/Ticket.java`)\n\
  - `Consumer` aggregate (`ftgo-consumer-service/src/main/java/.../domain/Consumer.java`)\n\
  - `Account` aggregate (using event sourcing in `ftgo-accounting-service`)\n\n**Domain\
  \ Events:**\nServices emit domain events like `OrderCreatedEvent`, `OrderAuthorized`,\
  \ `OrderCancelled`, `TicketCreatedEvent`, propagating state changes across bounded\
  \ contexts.\n\n**Bounded Context Alignment:**\nService boundaries align with DDD\
  \ bounded contexts - each service has its own domain model, repositories, and invariants.\n\
  \n**Package Structure:**\nConsistent DDD-inspired package structure per service:\n\
  - `domain` - aggregates, entities, value objects\n- `messaging` - event handlers/adapters\n\
  - `web` - REST controllers (adapters)\n- `main` - application entry point\n\n###\
  \ Secondary Evidence for Event-Driven Architecture\n\n**Apache Kafka as Message\
  \ Broker:**\n```yaml\nkafka:\n  image: \"eventuateio/eventuate-kafka...\"\n  ports:\n\
  \    - 9092:9092\n```\nAll services communicate via Kafka through the Eventuate\
  \ Tram framework.\n\n**Event Handlers for Cross-Service Communication:**\n- `OrderEventConsumer`\
  \ subscribes to `RestaurantCreated` events from Restaurant Service\n- `OrderHistoryEventHandlers`\
  \ subscribes to `OrderCreatedEvent`, `OrderAuthorized` events to update the CQRS\
  \ read model\n\n**Saga Pattern for Distributed Transactions:**\n```java\n// CreateOrderSaga.java\
  \ - orchestrates across 4 services\nstep()\n  .withCompensation(orderService.reject,\
  \ ...)\n  .step()\n    .invokeParticipant(consumerService.validateOrder, ...)\n\
  \  .step()\n    .invokeParticipant(kitchenService.create, ...)\n  .step()\n    .invokeParticipant(accountingService.authorize,\
  \ ...)\n```\nSagas coordinate transactions across Order, Consumer, Kitchen, and\
  \ Accounting services.\n\n### Why Not Other Styles\n\n- **Not Modular Monolith**:\
  \ Services are independently deployable with separate databases, not modules within\
  \ a single deployment unit\n- **Not Layered**: Services are decomposed vertically\
  \ by business capability, not horizontally by technical layer\n- **Not Service-Based**:\
  \ 7+ fine-grained services with independent databases, not 2-5 coarse-grained services\
  \ sharing a database\n- **Not Hexagonal**: While services use ports/adapters pattern,\
  \ the primary architectural characteristic is service decomposition\n- **CQRS applies\
  \ only to Order History Service**: Not the dominant pattern across the entire system\n\
  \n### Conclusion\n\nThis is a textbook microservices implementation from the \"\
  Microservices Patterns\" book, demonstrating:\n- Independent service deployment\
  \ with database-per-service\n- Inter-service communication via events and sagas\n\
  - API Gateway for external access\n- DDD tactical patterns (aggregates, domain events)\
  \ within each bounded context"
