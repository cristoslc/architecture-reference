one_line_summary: 'Canonical reference implementation of the Microservices Patterns book: seven independently deployable food
  delivery services communicating via Apache Kafka sagas and a CQRS order history read model, with DDD aggregates and event
  sourcing in the Accounting Service.'
classification_reasoning: |-
  ## Architecture Classification: Microservices (primary), Event-Driven and Domain-Driven Design (secondary)

  The ftgo-application is a deliberately constructed reference implementation for Chris Richardson's "Microservices Patterns" book. The README states explicitly: "Not surprisingly, this application has a microservice architecture."

  ### Primary: Microservices

  **Seven independently deployable services** each with its own Dockerfile and Spring Boot entry point:
   ftgo-consumer-service, ftgo-order-service, ftgo-kitchen-service, ftgo-accounting-service,
   ftgo-restaurant-service, ftgo-delivery-service, ftgo-order-history-service.

  **Database-per-service:** Eight isolated MySQL schemas (one per service) plus DynamoDB for the
   Order History Service. Enforced at the infrastructure level via separate SPRING_DATASOURCE_URL
   environment variables and CDC pipeline configurations per schema in docker-compose.yml.

  **API Gateway:** ftgo-api-gateway (Spring WebFlux) is the sole external entry point, using
   reactive Mono.zip() to aggregate responses from Order, Kitchen, Delivery, and Accounting
   services in parallel. A GraphQL variant (Node.js/TypeScript) provides an alternative facade.

  **Service decomposition by business capability:** Consumer, Order, Kitchen, Accounting, Restaurant,
   Delivery, Order History — each with its own domain model, repository, and lifecycle.

  ### Secondary: Event-Driven

  Apache Kafka is the primary inter-service integration fabric via the Eventuate Tram framework.
   The cdc-service implements the transactional outbox pattern (MySQL binary log reading) to publish
   domain events reliably without two-phase commit.

  Three saga orchestrations (CreateOrderSaga, CancelOrderSaga, ReviseOrderSaga) coordinate
   distributed transactions across up to four services with compensating transaction support:
  ```java
  step().invokeParticipant(consumerService.validateOrder, ...)
  .step().invokeParticipant(kitchenService.create, ...)
    .withCompensation(kitchenService.cancel, ...)
  .step().invokeParticipant(accountingService.authorize, ...)
  ```

  The Order History Service subscribes to OrderCreatedEvent, OrderAuthorized, OrderCancelled,
   and OrderRejected events from the Order aggregate to maintain a DynamoDB-backed CQRS read model.

  ### Secondary: Domain-Driven Design

  Every service uses DDD aggregates with state machine enforcement and domain event emission:
  - Order (JPA, ftgo-order-service)
  - Account (event-sourced via Eventuate Client, ftgo-accounting-service)
  - Ticket (JPA, ftgo-kitchen-service)
  - Consumer (JPA, ftgo-consumer-service)
  - Restaurant (JPA, ftgo-restaurant-service)

  Consistent package structure per service: domain / messaging / web / main.
  Bounded context interfaces enforced through dedicated ftgo-*-api Gradle modules (events, commands, replies).
  Spring Cloud Contract stubs (ftgo-*-contracts) enable consumer-driven contract testing.

  ### Ruled Out

  - Modular Monolith: services are independently deployable containers, not modules in a single artifact
  - Service-Based: seven fine-grained services with strict database-per-service exceeds the 2-5 coarse-grained
    services sharing a database that characterize Service-Based architecture
  - Layered: organization is vertical by business capability, not horizontal by technical layer
  - Hexagonal: ports-and-adapters patterns exist within services but are not the primary organizing principle
