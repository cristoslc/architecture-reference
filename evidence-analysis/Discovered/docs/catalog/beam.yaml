review_notes: 'Evidence: Beam''s core model is explicitly Pipe-and-Filter - PTransforms
  transform input PCollections into output PCollections. The README states ''PTransform:
  represents a computation that transforms input PCollections into output PCollections.''
  Multiple SDKs (Java/Python/Go) and runners (Flink/Spark/Dataflow) are libraries,
  not independently deployed microservices. No evidence of bounded contexts (DDD)
  or port/adapter isolation (Hexagonal).'
