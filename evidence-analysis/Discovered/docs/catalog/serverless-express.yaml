review_notes: 'README L46: ''Run REST APIs and other web applications using your existing
  Node.js application framework on top of AWS Lambda and Amazon API Gateway or Azure
  Function.'' src/event-sources/ contains adapters for AWS_API_GATEWAY_V1, V2, ALB,
  Lambda@Edge, DynamoDB, SNS, SQS, EventBridge, Kinesis, S3, Step Functions, Kafka,
  VPC Lattice, plus Azure Functions V3/V4. src/frameworks/ auto-detects Express/Koa/Hapi.
  Clean layered design: event-sources layer -> transport.js -> frameworks layer ->
  request/response mock objects. SCOPE.txt confirms goal is running Node.js HTTP apps
  on AWS Lambda. Not a serverless app itself but a serverless enablement library --
  classified as Serverless because that is what it IS (a serverless adapter/runtime).'
