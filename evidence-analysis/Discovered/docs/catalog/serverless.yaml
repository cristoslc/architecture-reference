review_notes: 'LLM review of github.com/serverless/serverless. This is the Serverless
  Framework itself -- a CLI tool for deploying serverless apps, NOT a serverless application.
  Classifying what the repo IS, not what it enables. AGENTS.md confirms: ''command-line
  tool for deploying serverless applications to AWS Lambda.'' Structure: npm workspaces
  monorepo (packages/sf-core, packages/serverless, packages/engine, packages/mcp,
  packages/util, packages/standards). Core architecture in packages/serverless/lib/serverless.js
  is a classic modular monolith: single Serverless class orchestrating PluginManager,
  Service, Config, CLI, and ConfigSchemaHandler classes. Plugin system (packages/serverless/lib/classes/plugin-manager.js)
  loads 60+ internal plugins covering AWS provider, packaging, deployment, events
  compilation, etc. Router pattern in packages/sf-core/src/lib/router.js dispatches
  to specialized runners (TraditionalRunner, CfnRunner, ComposeRunner, ServerlessContainerFrameworkRunner,
  ServerlessAiFrameworkRunner). Pipe-and-Filter secondary style: command processing
  flows through lifecycle hooks -- init() loads config then plugins, run() validates
  then merges arrays then sets function names then validates service then triggers
  plugin lifecycle via pluginManager.run(). Event compilation plugins form a processing
  pipeline: each compile plugin (schedule, s3, api-gateway, websockets, sns, stream,
  kafka, sqs, cloudfront, http-api, etc.) transforms configuration into CloudFormation
  resources in sequence. The packages/ workspace structure provides module boundaries
  but all packages deploy as a single CLI tool.'
