review_notes: "README states 'At Akka core is the actor model' for concurrent/distributed systems. build.sbt defines ~25 tightly-coupled SBT subprojects (akka-actor, akka-stream, akka-cluster, akka-persistence, akka-remote, etc.) versioned together as a modular monolith library. Event-Driven: akka-persistence/ has Eventsourced.scala, JournalProtocol.scala, PersistentActor.scala; akka-actor/event/ has EventBus.scala, EventStream.scala; akka-persistence-typed/ has EventSourcedSignal.scala, EventAdapter.scala. Pipe-and-Filter: akka-stream/ implements Reactive Streams with Source.scala, Flow.scala, Sink.scala, Graph.scala, FanInShape.scala, FanOutShape.scala, BidiFlow.scala. Multi-Agent: core actor model with Actor.scala, ActorRef.scala, ActorSystem.scala, ActorCell.scala; typed actors with Behavior.scala, SpawnProtocol.scala; distributed via akka-cluster/, akka-cluster-sharding/, akka-distributed-data/. Language is Scala (not Java/Kotlin). No docker-compose.yml or ARCHITECTURE.md found."