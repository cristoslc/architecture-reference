review_notes: "README.md explicitly states: 'framework for building evolutionary, event-driven microservice systems based on the principles of DDD, CQRS, and Event Sourcing.' pom.xml description: 'plumbing and wiring required to build a CQRS architecture.' GitHub topics include cqrs, ddd, domain-driven-design, event-sourcing, message-driven. Module structure directly implements these patterns: messaging/ contains commandhandling/ (CommandBus, CommandHandler, CommandMessage), queryhandling/ (QueryBus, QueryHandler, QueryMessage), and eventhandling/ (EventBus, EventHandler) - the three bus types are the core CQRS separation. eventsourcing/ module provides EventStore, EventSourcingRepository, and SourcingCondition. modelling/ provides DDD building blocks: Repository pattern (Repository.java, InMemoryRepository), Entity modeling (EntityMetamodel, EntityEvolver), and aggregate lifecycle management. axon-5/design-principles.md documents architectural rules (no ThreadLocals, reactive support, UnitOfWork lifecycle). messaging/core/ provides MessageStream, UnitOfWork, correlation data - the messaging backbone. Distributed support via commandhandling/distributed/DistributedCommandBus. Dead letter queue support in messaging/deadletter/. Classified as what the framework IS (a CQRS+ES+DDD framework), not what it enables (microservices)."