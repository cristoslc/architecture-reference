review_notes: 'Monorepo: lerna.json defines packages/* with 9 packages (common, core,
  microservices, platform-express, platform-fastify, platform-socket.io, platform-ws,
  testing, websockets). Module system: packages/core/injector/module.ts manages _imports/_providers/_controllers/_exports
  as core organizational unit. DependenciesScanner (packages/core/scanner.ts) builds
  module dependency graph. Layered pipeline: packages/core/guards/, packages/core/interceptors/,
  packages/core/pipes/, packages/core/middleware/, packages/core/router/ form distinct
  request-processing layers. Adapter pattern: packages/core/adapters/http-adapter.ts
  defines AbstractHttpAdapter port; platform-express and platform-fastify provide
  concrete adapters. The microservices package enables microservice patterns for users
  but the framework itself ships as a single coordinated monorepo.'
