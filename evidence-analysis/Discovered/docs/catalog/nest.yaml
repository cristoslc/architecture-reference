review_notes: 'This is the nestjs/nest framework repository itself — a well-known
  TypeScript framework for building server-side Node.js applications. Key signals:
  51 package manifests suggesting a monorepo with multiple internal packages (e.g.,
  @nestjs/core, @nestjs/common, @nestjs/microservices, @nestjs/graphql etc.), 4 directory
  structure signals consistent with modular boundaries, heuristic top candidate is
  Modular Monolith (0.7). The presence of Kafka, RabbitMQ, NATS, gRPC, GraphQL in
  key technologies reflects framework adapters/modules bundled within the monorepo
  rather than runtime infrastructure the framework itself depends on. The framework
  itself promotes Layered (controllers/services/repositories), Pipe-and-Filter (middleware/interceptors/pipes/guards
  pipeline), and Event-Driven patterns as architectural options for end-users, but
  the framework codebase is structured as a Modular Monolith with well-defined package
  boundaries deployed as a single versioned unit.'
