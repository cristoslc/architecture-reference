  ### 1. Primary Style: Layered (Horizontal)

  The codebase is organized into functional layers typical of high-performance systems
  programming, though they coexist in a flat directory structure. The layers are characterized
  by:

  *   **Networking/Interface Layer**: Handled primarily by `memcached.c` (the main
  entry point), `proto_text.h`, `proto_bin.h`, and `proto_parser.c`. This layer manages
  the event loop (via `libevent`) and translates wire protocols into internal commands.

  *   **Logical Command/Orchestration Layer**: Found in `items.c`, `assoc.c`, and
  `storage.c`, which bridge the gap between network requests and the physical memory
  management.

  *   **Data/Memory Management Layer**: This is the core of Memcached. Files like
  `slabs.c`, `slab_automove.c`, and `extstore.c` manage the physical allocation of
  RAM and disk (extstore), handling the low-level details of the Slab Allocator.

  *   **Utility/Infrastructure**: `util.c`, `hash.c`, `bipbuffer.c`, and `logger.c`
  provide cross-cutting concerns used by all layers.


  ### 2. Secondary Style: Microkernel (Plugin)

  The repository has introduced a sophisticated "Proxy" architecture (enabled via
  `--enable-proxy`). This moves Memcached from a rigid monolith toward a **Microkernel**
  style:

  *   **Core**: The basic K/V storage and slab management.

  *   **Plugins/Extensions**: The proxy system (seen in `proxy_lua.c`, `proxy_network.c`,
  and various `t/*.lua` files) allows the core''s behavior to be extended and scripted
  using Lua without modifying the underlying storage engine. The `vendor/` directory
  logic and `proxy_*.c` files indicate a pluggable routing and filtering layer that
  is conceptually separate from the primary data path.


  ### 3. Architecture Signifiers

  *   **Separation of Concerns**: Files like `slabs.c` (memory management) are strictly
  isolated from `proto_text.c` (protocol parsing), communicating through defined headers
  (`slabs.h`, `items.h`).

  *   **Event-Driven (Internal)**: While the README mentions "event-based," this refers
  to the IO model (libevent) rather than an Event-Driven Architecture (EDA) style
  of decoupled service communication.

  *   **Threaded Design**: `thread.c` demonstrates a "Worker" pattern where the system
  splits the Layered architecture across multiple threads (Dispatch vs. Worker threads),
  but the code structure remains horizontally layered.


  ### 4. Rejected Styles

  *   **Microservices**: Although used *in* distributed systems, the repo produces
  a single binary (`memcached`).

  *   **Hexagonal**: While it separates protocol logic from storage, it does not use
  the formal "Ports and Adapters" abstractions (interfaces/dependency injection) typical
  of modern Hexagonal implementations; it uses direct C function calls and shared
  headers.

  *   **Modular Monolith**: While modular, C projects of this era lack the formal
  encapsulation (private visibilities) required to strictly "enforce" module boundaries
  beyond convention.'
