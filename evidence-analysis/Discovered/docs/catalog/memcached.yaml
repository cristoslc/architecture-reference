classification_reasoning: "## Architecture Classification: Layered\n\nMemcached implements\
  \ a classic **Layered Architecture** organized as a single deployable binary with\
  \ horizontal separation of concerns.\n\n### Evidence for Layered Architecture\n\n\
  **1. Single Deployable Unit**\n- The `Makefile.am` defines a single `memcached`\
  \ binary (`bin_PROGRAMS = memcached`)\n- All source files compile into one executable\
  \ (~40,000 lines of C code across 56 `.c` files)\n- No module boundaries, package\
  \ structure, or independent deployment units\n\n**2. Clear Horizontal Layering**\n\
  \n**Protocol/Presentation Layer:**\n- `proto_text.c` (53,764 lines) - Text protocol\
  \ handler\n- `proto_bin.c` (44,152 lines) - Binary protocol handler  \n- `proto_parser.c`\
  \ (60,970 lines) - Protocol parsing\n- `proto_proxy.c` (61,293 lines) - Proxy protocol\
  \ (optional)\n\n**Business Logic Layer:**\n- `items.c` (62,307 lines) - Core caching\
  \ logic: item allocation, LRU management, storage/retrieval\n- `assoc.c` - Hash\
  \ table implementation for key lookups\n- `crawler.c` (30,589 lines) - Background\
  \ expiration/crawling\n\n**Data Access/Storage Layer:**\n- `slabs.c` (829 lines)\
  \ - Slab allocator for memory management\n- `extstore.c` (31,784 lines) - External\
  \ storage tier (flash/SSD)\n- `storage.c` (1,601 lines) - Storage abstraction\n\n\
  **3. State Machine Request Processing**\nThe `memcached.c` main file (225,788 lines)\
  \ orchestrates:\n- Event-driven I/O via libevent (`event_handler`, `event_base`)\n\
  - Connection state machine (`drive_machine`)\n- Request routing to appropriate protocol\
  \ handlers\n\n**4. Shared Global State**\n`globals.c` exports shared state across\
  \ layers:\n```c\nvolatile rel_time_t current_time;\nstruct stats stats;\nstruct\
  \ stats_state stats_state;\nstruct settings settings;\n```\n\n### What This Is NOT\n\
  \n**Not Modular Monolith:** No enforced module boundaries. All source files directly\
  \ access shared global state (hash tables, LRU lists, slab classes). The codebase\
  \ uses direct function calls and shared memory rather than module-scoped APIs.\n\
  \n**Not Event-Driven Architecture:** While memcached uses libevent for I/O multiplexing,\
  \ internal components communicate via direct function calls, not event publication/subscription.\
  \ The event loop handles network I/O, but the architecture doesn't use events for\
  \ inter-component communication.\n\n**Not Microservices:** Single binary, single\
  \ process, shared memory space. No service decomposition.\n\n**Not Hexagonal Architecture:**\
  \ No ports/adapters pattern. Protocol handlers directly call business logic functions\
  \ (`item_get`, `store_item`) which directly access data structures. No dependency\
  \ inversion or interface abstraction layers.\n\n**Not CQRS:** Read and write operations\
  \ share the same item data structures and code paths.\n\n### Threading Model\n\n\
  The threading model (documented in `doc/threads.txt`) supports the layered design:\n\
  - Listener thread accepts connections\n- N worker threads run libevent loops, handle\
  \ protocol parsing and data transfer\n- Background threads for LRU maintenance,\
  \ storage compaction, crawling\n- Fine-grained locks (`item_locks`, `lru_locks`,\
  \ `slabs_lock`) protect shared resources across threads\n\nThis is a performance-optimized\
  \ layered architecture designed for high-throughput key-value caching, with clear\
  \ separation between protocol handling, caching logic, and memory/storage management."
