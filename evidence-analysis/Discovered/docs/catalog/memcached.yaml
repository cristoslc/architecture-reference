review_notes: "README.md explicitly states 'multithreaded event-based key/value cache store'. Event-Driven: memcached.h includes <event.h> (libevent); memcached.c defines event_handler() callback and drive_machine() state machine over enum conn_states (16 states: conn_listening, conn_read, conn_parse_cmd, conn_write, etc.); doc/threads.txt describes 'one listener thread, N event worker threads' each running their own epoll loop; thread.c implements worker thread pool with connection queue dispatch. Modular Monolith: single binary with well-separated modules -- protocol handling (proto_text.c, proto_bin.c, proto_parser.c, proto_proxy.c), storage subsystem (slabs.c, items.c, assoc.c, extstore.c, storage.c), a large proxy subsystem (proxy.h, proxy_config.c, proxy_lua.c, proxy_network.c, proxy_request.c -- 14 proxy_* files), background workers (crawler.c, slab_automove.c, logger.c), and utility modules (hash.c, cache.c, tls.c, crc32c.c). Clear internal boundaries but compiled and deployed as a single daemon."