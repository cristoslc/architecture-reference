one_line_summary: High-performance in-memory key-value cache built on a strict horizontal
  layer stack (protocol -> thread-dispatch -> item-LRU -> slab-allocator) driven end-to-end
  by a libevent non-blocking event loop with async callback chains for extstore and
  proxy subsystems.
