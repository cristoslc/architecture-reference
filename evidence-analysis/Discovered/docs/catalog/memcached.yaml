classification_reasoning: "## Architecture Classification Analysis\n\n### Primary
  Styles: Layered + Event-Driven\n\n**LAYERED (primary, 0.93):** Memcached organises
  its internals into clearly delineated horizontal layers with strict downward dependencies
  and documented lock ordering. The outermost layer is the network and protocol layer:
  `proto_text.c`, `proto_bin.c`, and `proto_parser.c` parse ASCII and binary protocol
  commands and build response objects (`mc_resp`); `proto_proxy.c`/`proxy_network.c`
  handle the optional Lua-driven proxy protocol. Below that is the threading and I/O
  dispatch layer: `thread.c` manages the dispatcher thread and N libevent worker threads,
  each owning an independent `event_base`. Below that is the item and LRU management
  layer: `items.c` owns HOT/WARM/COLD/TEMP segmented LRU lists with per-LRU locks,
  reference counting, and TTL logic; `crawler.c` provides a background LRU-crawl thread;
  `assoc.c` manages the lock-striped hash table. At the base is the memory allocation
  layer: `slabs.c` implements the slab allocator (fixed-class memory pools), `slabs_mover.c`
  drives background page reassignment, and `slab_automove.c` adaptively rebalances
  classes. The optional `extstore.c`/`storage.c` provides an async flash/disk tier
  below RAM. Lock ordering is explicitly documented in `doc/threads.txt` as `item_lock
  -> lru_lock -> slabs_lock`, confirming the layered dependency direction.\n\n**EVENT-DRIVEN
  (primary, 0.88):** The entire request-handling path is structured around non-blocking
  I/O events dispatched by libevent. The main thread runs one `event_base` for listener
  sockets; each worker thread runs its own `event_base` with an `EV_READ|EV_PERSIST`
  event per client connection. The `event_handler()` callback is the sole entry point
  for new I/O readiness, invoking `drive_machine()` which implements a 16-state FSM
  (`conn_states` enum in `memcached.h:202-218`) rather than blocking call stacks.
  Background subsystems communicate back to worker threads through lightweight notification
  channels: a pipe or `eventfd` per thread (`thread_notify` struct) wakes a worker
  when async work completes. The `io_queue_t` mechanism stacks pending async IO descriptors
  and fires `submit_cb`/`return_cb` callbacks when extstore IO threads or proxy threads
  finish. The logger uses a lock-free bipbuffer per thread with a watcher thread for
  non-blocking log emission. Every long-latency operation is offloaded from the event
  loop via callback (`conn_resp_suspend`/`conn_resp_unsuspend` macros gate transmit
  on async completion).\n\n### What Was Rejected and Why\n\n**Not Microservices /
  Service-Based:** Memcached is a single OS process. All subsystems compile into one
  binary with no service boundaries, no inter-service protocols, and no independently
  deployable units.\n\n**Not Microkernel:** The proxy extension uses compile-time
  `#ifdef PROXY` guards rather than a plugin registration mechanism or stable binary
  extension API. There is no plugin loader or kernel/plugin contract.\n\n**Not Pipeline:**
  The receive->parse->execute->respond sequence is a synchronous per-request call sequence
  within a single event callback, not a staged dataflow architecture with distinct
  pipeline components.\n\n**Not CQRS:** Reads and writes share the same item/slab
  subsystem and thread model; there is no separate read model or write model.\n\n###
  Quality Attributes Evidence\n\n**PERFORMANCE:** Non-blocking I/O via libevent, per-thread
  event loops, slab allocator eliminating heap fragmentation, lock-striped hash table
  for parallel item access, lock-free per-thread LRU bump buffers, async extstore
  reads, and NAPI ID CPU pinning for NUMA locality.\n\n**SCALABILITY:** Linear horizontal
  scaling via independent processes with no shared state between instances; configurable
  worker thread count; UDP support for stateless fan-out queries.\n\n**RELIABILITY:**
  Reference-counted items prevent use-after-free; slab allocator avoids general-purpose
  heap fragmentation; warm restart (`restart.c`) serialises memory to disk for safe
  daemon restarts without cache flush; SASL authentication and TLS encryption.\n\n**EVOLVABILITY:**
  Protocol-specific logic isolated in `proto_*.c` files; extstore and proxy are compile-time
  optional subsystems; `io_queue_t` abstraction decouples async backends from worker
  threads; Lua scripting in the proxy layer allows routing logic changes without recompilation.\n\n**OBSERVABILITY:**
  Rich `stats` command with per-thread, per-slab, and global counters; structured
  logger with per-event-type handlers and watcher-based streaming; DTrace probes (`memcached_dtrace.d`);
  `stats_prefix` for key-prefix-level statistics."
