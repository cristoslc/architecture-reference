  \ system abstractions, and HTTP clients used by the upper layers.\n\n### Evidence\
  \ of Modular Monolith:\nWhile the primary organization is layered, the system exhibits\
  \ characteristics of a **Modular Monolith**. \n- **Internal Boundaries**: The code\
  \ is separated into logical \"services\" within `NzbDrone.Core`. These are not independently\
  \ deployable (they all compile into a single executable), but they maintain loose\
  \ coupling through an internal event bus (likely using a `Mediator` pattern or similar\
  \ `IEventAggregator` found in this codebase's lineage).\n- **Single Deployment Unit**:\
  \ The absence of a `docker-compose.yml` or multiple service manifests, combined\
  \ with the single `Lidarr.sln` solution file, confirms that the system is deployed\
  \ as a single application instance, not microservices.\n\n### Why not other styles:\n\
  - **Microservices**: Rejected because all logic resides within a single solution\
  \ and is deployed as a single process.\n- **Microkernel (Plugin)**: Although Lidarr\
  \ supports various indexers and download clients, these are typically integrated\
  \ as polymorphic implementations of internal interfaces within the `Core` project\
  \ rather than dynamically loaded external plugins.\n- **Hexagonal**: While there\
  \ is some separation (especially in `NzbDrone.Common`), the core logic is heavily\
  \ coupled to the internal framework and models rather than being an isolated \"\
  inside\" protected by strict ports and adapters."
