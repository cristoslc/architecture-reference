classification_reasoning: "## Architecture Classification: Lidarr Repository\n\n###\
  \ Primary Style: Modular Monolith\n\nLidarr is architected as a **Modular Monolith**\
  \ - a single deployable application with well-defined internal module boundaries\
  \ enforced through separate .NET assemblies.\n\n**Evidence:**\n\n1. **Single Deployable\
  \ Unit**: The application builds to a single executable (`Lidarr`/`NzbDrone.Console`),\
  \ confirmed by the solution structure showing multiple projects that compile into\
  \ one application:\n   - `src/NzbDrone/Lidarr.csproj` - Main executable entry point\n\
  \   - `src/NzbDrone.Host/Lidarr.Host.csproj` - ASP.NET Core web host\n   - `src/NzbDrone.Core/Lidarr.Core.csproj`\
  \ - Core business logic\n   - `src/Lidarr.Api.V1/Lidarr.Api.V1.csproj` - REST API\
  \ layer\n\n2. **Enforced Module Boundaries via Projects**: The solution (`src/Lidarr.sln`)\
  \ contains ~25 distinct .NET projects with clear separation:\n   - **Core**: `NzbDrone.Core`\
  \ - Domain logic, data access, services\n   - **API**: `Lidarr.Api.V1`, `Lidarr.Http`\
  \ - HTTP/REST layer\n   - **Platform**: `NzbDrone.Windows`, `NzbDrone.Mono` - Platform-specific\
  \ implementations\n   - **Infrastructure**: `NzbDrone.Common` - Cross-cutting concerns\n\
  \   - **SignalR**: `NzbDrone.SignalR` - Real-time communication\n\n3. **Project\
  \ References Define Dependency Graph**: From `Lidarr.Host.csproj`:\n   ```xml\n\
  \   <ProjectReference Include=\"..\\Lidarr.Api.V1\\Lidarr.Api.V1.csproj\" />\n \
  \  <ProjectReference Include=\"..\\NzbDrone.Core\\Lidarr.Core.csproj\" />\n   <ProjectReference\
  \ Include=\"..\\NzbDrone.Common\\Lidarr.Common.csproj\" />\n   ```\n\n4. **Clear\
  \ Module Boundaries in Core**: The `NzbDrone.Core` project organizes functionality\
  \ into distinct bounded modules:\n   - `Indexers/` - External indexer integrations\n\
  \   - `Download/` - Download client management\n   - `Notifications/` - Notification\
  \ providers\n   - `ImportLists/` - Import list services\n   - `Music/` - Artist/album/track\
  \ domain\n   - `Datastore/` - Database access layer\n\n### Secondary Style: Event-Driven\n\
  \nThe architecture employs significant **Event-Driven** patterns for internal module\
  \ communication.\n\n**Evidence:**\n\n1. **Event Aggregator Pattern** (`src/NzbDrone.Core/Messaging/Events/EventAggregator.cs`):\n\
  \   ```csharp\n   public class EventAggregator : IEventAggregator\n   {\n      \
  \ public void PublishEvent<TEvent>(TEvent @event) where TEvent : class, IEvent\n\
  \       {\n           // Routes events to sync and async handlers\n       }\n  \
  \ }\n   ```\n\n2. **Event Handler Interfaces** (`src/NzbDrone.Core/Messaging/Events/IHandle.cs`):\n\
  \   ```csharp\n   public interface IHandle<TEvent> : IProcessMessage<TEvent> where\
  \ TEvent : IEvent\n   {\n       void Handle(TEvent message);\n   }\n   public interface\
  \ IHandleAsync<TEvent> : IProcessMessageAsync<TEvent> where TEvent : IEvent\n  \
  \ {\n       void HandleAsync(TEvent message);\n   }\n   ```\n\n3. **Extensive Event\
  \ Usage**: Found across the codebase:\n   - `DownloadEventHub : IHandle<DownloadFailedEvent>,\
  \ IHandle<DownloadCompletedEvent>, IHandle<DownloadCanBeRemovedEvent>`\n   - `ArtistAddedHandler\
  \ : IHandle<ArtistAddedEvent>, IHandle<ArtistsImportedEvent>`\n   - `SeedConfigProvider\
  \ : IHandle<ProviderUpdatedEvent<IIndexer>>`\n\n### Notable Pattern: Plugin-like\
  \ Provider System\n\nLidarr implements a sophisticated **Provider/Plugin pattern**\
  \ via `ThingiProvider` infrastructure:\n\n**Evidence:**\n\n1. **Provider Contract**\
  \ (`src/NzbDrone.Core/ThingiProvider/IProvider.cs`):\n   ```csharp\n   public interface\
  \ IProvider\n   {\n       string Name { get; }\n       Type ConfigContract { get;\
  \ }\n       IEnumerable<ProviderDefinition> DefaultDefinitions { get; }\n      \
  \ ProviderDefinition Definition { get; set; }\n       ValidationResult Test();\n\
  \   }\n   ```\n\n2. **Provider Factory for Dynamic Loading** (`src/NzbDrone.Core/ThingiProvider/ProviderFactory.cs`):\n\
  \   ```csharp\n   public abstract class ProviderFactory<TProvider, TProviderDefinition>\
  \ : IProviderFactory<TProvider, TProviderDefinition>, \n       IHandle<ApplicationStartedEvent>\n\
  \   {\n       // Discovers and instantiates providers dynamically\n       public\
  \ TProvider GetInstance(TProviderDefinition definition)\n       {\n           var\
  \ type = GetImplementation(definition);\n           var instance = (TProvider)_container.GetRequiredService(type);\n\
  \           // ...\n       }\n   }\n   ```\n\n3. **Concrete Implementations** extend\
  \ base classes:\n   - `IndexerBase<TSettings>`, `DownloadClientBase<TSettings>`,\
  \ `NotificationBase<TSettings>`, `ImportListBase<TSettings>`\n   - Each provider\
  \ type has many implementations (e.g., 20+ download clients: Sabnzbd, Transmission,\
  \ qBittorrent, etc.)\n\n### What Was Rejected\n\n- **Not Microservices**: Single\
  \ deployable unit, not distributed services. All modules run in one process.\n-\
  \ **Not Serverless**: Self-hosted ASP.NET Core application, not function-based.\n\
  - **Not CQRS**: No separate read/write models; uses standard repository pattern\
  \ with `BasicRepository<T>`.\n- **Not Hexagonal Architecture**: While there's dependency\
  \ injection and interfaces, no formal ports/adapters isolation. The `ThingiProvider`\
  \ system \n\n[truncated]"
