review_notes: 'Lidarr follows a **Layered** architecture, which is the standard architectural
  pattern for the "Servarr" family of applications (derived from the original NzbDrone/Sonarr
  codebase). The system is organized into distinct horizontal layers that separate
  concerns between the host/entry point, the API, and the core business logic.


  ### Evidence of Layered Architecture:

  The backend (C#/.NET) is split into several projects that represent the classic
  horizontal layers:

  1.  **Host/Presentation Layer (`src/NzbDrone.Host`, `src/NzbDrone.Console`)**: These
  projects handle the application startup, web server hosting (Kestrel), and the integration
  with the underlying operating system (Windows Services, Mono/Linux daemons).

  2.  **API Layer (`src/Lidarr.Api.V1`)**: This layer handles RESTful endpoints, request/response
  mapping, and authentication, acting as the gateway for the React-based frontend.

  3.  **Application/Core Layer (`src/NzbDrone.Core`)**: This is the largest project
  and contains the "fat" middle layer. It houses the business logic, domain models,
  and service classes that orchestrate data between indexers, download clients, and
  the database.

  4.  **Infrastructure/Common Layer (`src/NzbDrone.Common`, `src/Lidarr.Http`)**:
  Provides shared utilities, file system abstractions, and HTTP clients used by the
  upper layers.


  ### Evidence of Modular Monolith:'
