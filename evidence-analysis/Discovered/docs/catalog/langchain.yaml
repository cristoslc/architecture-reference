review_notes: "EVIDENCE: libs/README.md confirms monorepo structure with core/, langchain/, langchain_v1/, partners/, text-splitters/, standard-tests/ as independently versioned packages. libs/core/langchain_core/runnables/base.py defines Runnable(ABC, Generic[Input, Output]) with .pipe() method and | operator for chaining -- RunnableSequence (line 2817) is described as 'the most important composition operator in LangChain' where 'output of one is the input of the next'. RunnableParallel (line 3565) enables fan-out. runnables/router.py provides RouterRunnable for conditional routing between Runnables. This is textbook Pipe-and-Filter: typed Input->Output components composed into processing pipelines. Modular Monolith: libs/ contains 7+ independently packaged modules (core, langchain, langchain_v1, partners/*, text-splitters, standard-tests, model-profiles) each with own pyproject.toml and version. Partners dir has 15+ provider packages (openai, anthropic, ollama, etc.) as separate pip-installable modules sharing langchain-core interfaces. Callback system in callbacks/base.py provides event hooks (on_llm_new_token, on_retriever_end, etc.) but this is an internal observability mechanism, not the primary architectural pattern. No docker-compose.yml, no ARCHITECTURE.md, no messaging infrastructure."