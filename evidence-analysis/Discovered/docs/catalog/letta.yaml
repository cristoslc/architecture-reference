review_notes: 'The Letta (formerly MemGPT) repository is organized as a **Layered**
  system with significant **Microkernel (Plugin)** and **Domain-Driven Design (DDD)**
  influences. The codebase serves a platform for stateful AI agents, where the structural
  boundaries are defined by horizontal technical layers and vertical domain concepts.


  ### 1. Primary Style: Layered

  The system follows a classic horizontal layering pattern, visible in the directory
  structure under `letta/`:

  - **Presentation/API Layer**: `letta/server/rest_api/routers` and `letta/server/ws_api`.
  This layer handles HTTP/WebSocket communication, authentication, and request/response
  mapping via Pydantic/Marshmallow schemas (found in `letta/schemas/` and `letta/serialize_schemas/`).

  - **Application/Service Layer**: Logic for managing the "life cycle" of agents,
  conversation flows, and multi-agent coordination is found in `letta/server/server.py`
  and the various `letta/groups/` managers.

  - **Domain Layer**: The core logic of "what an agent is" and how it processes information
  resides in `letta/agents/` (e.g., `letta_agent_v2.py`, `base_agent.py`).

  - **Data Access/Infrastructure Layer**: Database interactions are centralized in
  `letta/server/db.py`, `letta/database_utils.py`, and managed via Alembic migrations.


  ### 2. Secondary Style: Microkernel (Plugin)'
