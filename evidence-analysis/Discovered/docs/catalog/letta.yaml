review_notes: 'Evidence against Microservices/Event-Driven: dev-compose.yaml shows
  exactly 2 containers (letta_db + letta_server) — a single app server and its database,
  with no Kafka, RabbitMQ, or messaging broker present whatsoever. The automated classifier''s
  Kafka/RabbitMQ signals appear to be false positives (possibly from test files or
  CI config). Evidence for Modular Monolith + Layered: single Dockerfile, single pyproject.toml,
  single deployable service; clear internal module boundaries: letta/server/rest_api
  (presentation), letta/agents (business logic), letta/schemas (domain models), letta/groups
  (multi-agent coordination), letta/server/server.py (application server), letta/server/db.py
  (data access); letta/otel/ for observability; letta/server/rest_api/routers + letta/server/ws_api
  for API layer. The structure is a well-organized monolith with domain-aligned modules
  (agents, groups, schemas, managers) following a layered pattern (REST routers →
  server/business logic → DB).'
