one_line_summary: Stateful AI agent platform built as a layered monolith with first-class multi-agent orchestration, an extensible plugin/tool-executor subsystem, and a streaming REST/WebSocket API.
classification_reasoning: "Letta (formerly MemGPT) is classified primarily as Layered\
  \ and Multi-Agent, with Microkernel as a secondary style.\n\n**Layered (primary):**\
  \ The codebase follows strict horizontal layering across all 30+ resource types.\
  \ Presentation layer: `letta/server/rest_api/routers/v1/` (30+ FastAPI route files)\
  \ and `letta/server/ws_api/`. Application/Service layer: `letta/services/` (~30\
  \ manager classes: AgentManager, MessageManager, GroupManager, StreamingService,\
  \ LLMBatchManager, etc.). Domain/Agent layer: `letta/agents/` (BaseAgent +\
  \ LettaAgent v1/v2/v3, VoiceAgent, EphemeralAgent) and `letta/groups/`. Infrastructure\
  \ layer: `letta/orm/` (SQLAlchemy + pgvector), `letta/llm_api/`, `letta/adapters/`.\
  \ Dependencies flow strictly downward. This is a single deployable monolith (one\
  \ Dockerfile, one letta_server container, one PostgreSQL database) confirmed by\
  \ compose.yaml.\n\n**Multi-Agent (primary):** The platform's core product identity\
  \ is multi-agent orchestration. `letta/groups/` implements four concrete multi-agent\
  \ topologies: RoundRobinMultiAgent, SleeptimeMultiAgent (background processing),\
  \ DynamicMultiAgent (manager selects next speaker), and SupervisorMultiAgent. The\
  \ LettaMultiAgentToolExecutor exposes inter-agent messaging as first-class callable\
  \ agent tools: `send_message_to_agent_and_wait_for_reply`, `send_message_to_agent_async`,\
  \ and `send_message_to_agents_matching_tags`. The AgentType enum includes dedicated\
  \ entries for group/sleeptime/voice coordination. Agents carry persistent stateful\
  \ memory (core blocks, archival passages, filesystem memory, summary blocks) enabling\
  \ self-improvement loops.\n\n**Microkernel (secondary):** A protocol-based plugin\
  \ registry in `letta/plugins/plugins.py` provides runtime-swappable extension points:\
  \ pluggable summarizers via SummarizerProtocol, a ToolExecutorFactory dispatching\
  \ across seven executor implementations by ToolType (core, memory-core, sleeptime-core,\
  \ multi-agent-core, builtin, files-core, external-MCP), an LLMClient factory selecting\
  \ from 15+ provider backends, and MCP (Model Context Protocol) integration for external\
  \ tool servers. This pattern is present but scoped to extension infrastructure rather\
  \ than the overall system structure.\n\n**Excluded styles:** NOT Microservices (single\
  \ deployable unit, shared database). NOT Event-Driven (no message broker; webhook\
  \ and Redis SSE are auxiliary, not the primary interaction model). NOT Domain-Driven\
  \ Design (no bounded contexts, aggregates, or domain events in the DDD sense). NOT\
  \ Pipeline (file processing pipeline in letta/services/file_processor/ is a minor\
  \ subsystem, not the governing style). Confidence: 0.92."
