classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Style: **Layered Architecture**\n\nThe Letta repository exhibits a clear **horizontal\
  \ layered architecture** with well-defined separation of concerns:\n\n**Presentation/Interface\
  \ Layer:**\n- `letta/server/rest_api/routers/` — FastAPI REST endpoints organized\
  \ by resource (agents, blocks, messages, tools, etc.)\n- `letta/server/ws_api/`\
  \ — WebSocket API for real-time streaming\n- `letta/cli/` — Command-line interface\n\
  - `letta/interfaces/` — Streaming interface abstractions for different LLM providers\
  \ (Anthropic, OpenAI, Gemini)\n\n**Service/Business Logic Layer:**\n- `letta/services/`\
  \ — Core business services: `AgentManager`, `MessageManager`, `BlockManager`, `PassageManager`,\
  \ `GroupManager`, `FileManager`, `ToolManager`, etc.\n- Services orchestrate domain\
  \ operations and encapsulate business rules\n\n**Domain/Agent Layer:**\n- `letta/agents/`\
  \ — Agent implementations (`LettaAgent`, `LettaAgentV2`, `LettaAgentV3`, `VoiceAgent`,\
  \ `EphemeralAgent`)\n- `letta/groups/` — Multi-agent coordination patterns\n- `letta/functions/`\
  \ — Tool/function schema generation and parsing\n\n**Data Access Layer:**\n- `letta/orm/`\
  \ — SQLAlchemy ORM models for persistence (Agent, Block, Message, Group, etc.)\n\
  - `letta/schemas/` — Pydantic data transfer objects\n\n**Infrastructure/Adapters\
  \ Layer:**\n- `letta/llm_api/` — LLM client adapters for multiple providers\n- `letta/services/mcp/`\
  \ — Model Context Protocol client implementations\n- `letta/adapters/` — Request/response\
  \ adapters\n\n### Secondary Style: **Microkernel (Plugin)**\n\nThe codebase demonstrates\
  \ a microkernel pattern through its extensible plugin system:\n\n**Evidence from\
  \ `letta/plugins/plugins.py`:**\n```python\n@runtime_checkable\nclass SummarizerProtocol(Protocol):\n\
  \    \"\"\"What a summarizer must implement\"\"\"\n    async def summarize(self,\
  \ text: str) -> str: ...\n    def get_name(self) -> str: ...\n\ndef get_plugin(plugin_type:\
  \ str):\n    \"\"\"Get a plugin instance\"\"\"\n    plugin_register = dict(DEFAULT_PLUGINS,\
  \ **settings.plugin_register_dict)\n    ...\n    module = importlib.import_module(module_path)\n\
  \    plugin = getattr(module, name)\n```\n\n**Extension Points:**\n1. **Summarizers**\
  \ — Pluggable summarization implementations\n2. **Tool Executors** (`letta/services/tool_executor/`)\
  \ — Multiple backends: `BuiltinToolExecutor`, `MCPToolExecutor`, `SandboxToolExecutor`,\
  \ `ComposioToolExecutor`\n3. **LLM Clients** (`letta/llm_api/llm_client.py`) — Factory\
  \ pattern selecting from 15+ provider implementations (OpenAI, Anthropic, Google,\
  \ Azure, Bedrock, etc.)\n4. **Streaming Interfaces** — Provider-specific streaming\
  \ implementations\n\n### What This Is NOT\n\n**NOT Microservices:**\n- Single deployable\
  \ artifact (one Dockerfile, one `letta_server` container)\n- Single monolithic codebase\
  \ (`pyproject.toml` defines one package)\n- Single shared PostgreSQL database with\
  \ pgvector\n\n**NOT Event-Driven:**\n- No message broker configuration in `compose.yaml`\n\
  - Synchronous REST API as primary interface\n- Direct method calls between layers\n\
  \n**NOT Domain-Driven Design:**\n- No bounded context separation\n- No aggregate/value\
  \ object patterns in domain model\n- Layered organization by technical concern,\
  \ not domain boundaries\n\n**NOT Multi-Agent Architecture:**\n- While the system\
  \ manages AI agents, the repository structure itself is not organized around autonomous\
  \ agent coordination — the agent classes are domain objects within a layered system\n\
  \n### Deployment Evidence\n\nFrom `compose.yaml`:\n- Single `letta_server` service\n\
  - Single PostgreSQL database with pgvector extension\n- Optional nginx reverse proxy\n\
  - All components in one deployable unit\n\n### Confidence Rationale\n\n**0.90 confidence**\
  \ — The layered pattern is unmistakable with clear horizontal separation. The microkernel/plugin\
  \ pattern is well-evidenced through Protocol interfaces, dynamic plugin loading,\
  \ and multiple interchangeable implementations for tool execution and LLM providers.\
  \ The single-deployable monolith structure eliminates microservices as a consideration."
