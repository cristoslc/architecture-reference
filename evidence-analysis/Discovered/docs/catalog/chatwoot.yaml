review_notes: "Evidence: README.md describes a single self-hosted customer support platform (not microservices). app/ follows standard Rails MVC layering: controllers/, models/, views/, services/, builders/, finders/, policies/, presenters/, jobs/, mailers/. lib/events/types.rb defines ~30 domain event constants (CONVERSATION_CREATED, MESSAGE_CREATED, etc.). app/dispatchers/ implements pub/sub via Wisper gem (BaseDispatcher includes Wisper::Publisher); SyncDispatcher and AsyncDispatcher fan out events to 11+ listener classes in app/listeners/ (AutomationRuleListener, WebhookListener, NotificationListener, etc.). AsyncDispatcher routes through Sidekiq (EventDispatcherJob). docker-compose.yaml runs rails, sidekiq, postgres, redis as co-deployed processes of a single app, not independent services. Gemfile confirms Rails 7.1, Sidekiq, Wisper 2.0, Pundit (policy objects), Devise (auth). enterprise/ directory provides an overlay module pattern but does not change the monolithic deployment. config/sidekiq.yml defines 14 priority queues. Procfile shows web + worker processes (single codebase). No microservices boundaries, no CQRS separation, no hexagonal ports/adapters."