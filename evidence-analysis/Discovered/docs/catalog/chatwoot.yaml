review_notes: "The Chatwoot repository follows a classic **Layered Architecture**,\
  \ primarily driven by the Ruby on Rails framework conventions, with a strong secondary\
  \ **Event-Driven** component for handling real-time communications and asynchronous\
  \ processing.\n\n### 1. Layered Architecture (Primary)\nThe codebase is organized\
  \ into distinct horizontal layers that separate concerns from the UI down to the\
  \ database:\n- **Presentation Layer**: Handled by the Rails views and a heavy frontend\
  \ presence in `app/javascript/`. Specifically, `app/javascript/dashboard`, `app/javascript/widget`,\
  \ and `app/javascript/portal` indicate separate frontend applications for different\
  \ user roles.\n- **API/Controller Layer**: (Implicit in Rails standard `app/controllers`,\
  \ though not fully expanded in the tree, the presence of `app/policies` and `app/presenters`\
  \ confirms a robust request/response handling layer).\n- **Business Logic Layer**:\
  \ Unlike \"skinny\" Rails apps, Chatwoot uses several auxiliary patterns to isolate\
  \ logic:\n    - **Builders**: (`app/builders/`) Logic for constructing complex objects\
  \ like `AccountBuilder`, `MessageBuilder`, and `ConversationBuilder`.\n    - **Actions**:\
  \ (`app/actions/`) Service-object style patterns for specific business operations\
  \ like `ContactMergeAction`.\n    - **Finders**: (`app/finders/`) Encapsulated query\
  \ logic (e.g., `ConversationFinder`)."
