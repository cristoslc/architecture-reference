review_notes: 'Evidence for Modular Monolith: single Dockerfile (docker/dockerfiles/rails.Dockerfile),
  single docker-compose.yaml, app/ directory with well-defined internal subdirectories
  (builders/, finders/, presenters/, dispatchers/, policies/, actions/, mailboxes/).
  Evidence for Layered: classic Rails MVC — app/models/, app/controllers (implied),
  app/mailers/, app/jobs/, app/policies/. Evidence for Event-Driven: app/dispatchers/
  (base_dispatcher.rb, async_dispatcher.rb, sync_dispatcher.rb, dispatcher.rb) and
  app/jobs/event_dispatcher_job.rb signal an internal event/pub-sub system; app/jobs/
  directory indicates background job processing (Sidekiq). No multiple service directories,
  no API gateway, no service discovery — ruling out Microservices as a primary style.'
