review_notes: 'docker-compose.yaml defines 10 services: (1) auth (nhost/auth, Go,
  port 4000) — user authentication, JWT, password management; (2) storage
  (nhost/storage, Go, port 5000) — file uploads with S3/MinIO backend; (3) graphql
  (Hasura, port 8080) — instant GraphQL API over PostgreSQL; (4) functions
  (nhost/functions, Node.js, port 3000) — serverless functions runtime; (5) postgres
  (port 5432) — central relational database; (6) minio — S3-compatible object
  storage; (7) traefik — API gateway routing all service traffic; (8) mailhog —
  email service; (9) dashboard — admin control panel; (10) console — schema
  management UI. Auth, storage, and functions services call GraphQL service for data
  operations. JWT-based inter-service authentication via HASURA_GRAPHQL_JWT_SECRET.
  Service discovery via environment variables (AUTH_URL, STORAGE_URL, FUNCTIONS_URL).
  Service-Based because 10 coarse-grained services with distinct business
  capabilities coordinate via REST/GraphQL APIs through shared Traefik gateway.'
