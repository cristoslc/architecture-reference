review_notes: "The Nhost repository is structured as a **Microservices** architecture.\
  \ It functions as a monorepo containing multiple independently deployable services\
  \ that together form the Nhost cloud platform.\n\n### Evidence of Microservices\n\
  1.  **Independent Service Directories**: The `services/` directory contains distinct,\
  \ autonomous applications:\n    *   `services/auth`: A Go/TypeScript-based authentication\
  \ service.\n    *   `services/storage`: A Go-based storage management service.\n\
  \    *   `services/functions`: A serverless execution environment.\n2.  **Polyglot\
  \ Implementation**: Different services use different technology stacks (e.g., Go\
  \ for Storage and Auth core, Node.js/Bun for others), a hallmark of microservice\
  \ independence.\n3.  **Deployment Orchestration**: The `examples/docker-compose/docker-compose.yaml`\
  \ confirms that these services operate as distinct containers:\n    *   They communicate\
  \ over the network (e.g., `auth` connects to `graphql` at `http://graphql:8080/v1/graphql`)."
