review_notes: 'This repository is the main Supabase monorepo containing the Studio
  dashboard (Next.js app in apps/studio) and development utilities. Evidence: root-level
  package.json, turbo.json, pnpm-lock.yaml indicate a monorepo. The docker/ directory
  contains local development configurations. The apps/ directory contains the Studio
  dashboard application. This is NOT the backend services themselves - those are separate
  repositories (gotrue, postgrest, realtime, storage, etc.). The existing classification
  of Microservices/Event-Driven/DDD is incorrect - there are no Kubernetes manifests,
  service discovery, event brokers, or domain-driven design patterns in this repository.'
