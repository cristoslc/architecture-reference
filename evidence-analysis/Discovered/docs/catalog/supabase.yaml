classification_reasoning: '## Architecture Classification: Microservices + Service-Based
  + Pipeline


  ### Primary: Microservices (0.92)

  The docker/docker-compose.yml defines 13 independently deployable services, each
  with a distinct Docker image, technology stack, health check, and restart policy:
  studio (Next.js), kong (Kong 2.8.1), auth (GoTrue/Go), rest (PostgREST/Haskell),
  realtime (Elixir), storage (Node.js/TS), imgproxy (Go), meta (postgres-meta/Node.js),
  functions (Deno edge-runtime), analytics (Logflare/Elixir), db (Postgres 15),
  vector (Vector/Rust), supavisor (Erlang/Elixir). Each service is developed in
  a separate upstream repository and consumed as a pre-built image. Kong (docker/volumes/api/kong.yml)
  routes by path prefix to seven backend services, enforcing JWT key-auth and ACL
  per route. Services communicate exclusively via HTTP/WebSocket through the gateway
  — no shared in-process calls.


  ### Secondary: Service-Based (0.80)

  Despite independent deployment, all backend services connect to the same PostgreSQL
  cluster via distinct DB users (supabase_auth_admin, supabase_storage_admin, supabase_admin).
  Initialization scripts (realtime.sql, webhooks.sql, roles.sql, logs.sql, pooler.sql)
  install shared schemas and extensions into a single database instance. This shared-database
  topology is the canonical Service-Based qualifier that distinguishes this from
  pure Microservices.


  ### Supporting: Pipeline (0.82)

  docker/volumes/logs/vector.yml defines a fully structured ETL log pipeline: a
  docker_host source collects stdout/stderr from all containers; a project_logs
  transform normalizes metadata; a router transform fans events to per-service channels;
  seven per-service transforms (kong_logs, auth_logs, rest_logs, realtime_logs,
  storage_logs, functions_logs, db_logs) parse and enrich each stream; six HTTP
  sinks deliver structured JSON to Logflare analytics. A secondary pipeline operates
  at the database layer: the pg_net extension + supabase_functions.http_request()
  trigger (docker/volumes/db/webhooks.sql) forms a Postgres-event-to-HTTP pipeline
  for webhooks.


  ### Rejected Styles

  Modular Monolith: services are separate containers with separate images, not internal
  modules of a single deployable. Event-Driven: no message broker or event bus;
  service-to-service communication is synchronous HTTP through Kong. Serverless:
  the edge-runtime container is long-running (restart: unless-stopped), not on-demand;
  user functions run inside it but the platform itself is not serverless. Layered:
  no horizontal presentation/business/data layer decomposition across the system.'
