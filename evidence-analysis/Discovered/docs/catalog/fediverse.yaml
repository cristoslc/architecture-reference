emergent_architecture: >-
  Federated Service-Based social platform. Four independently developed
  and deployed services interoperate through the W3C ActivityPub protocol:
  Mastodon (microblogging), Discourse (forum discussions), Forem
  (community publishing, powering dev.to), and Lemmy (link aggregation,
  Reddit-like). Each service is a complete application with its own
  database, authentication, and user management. The federation protocol
  (ActivityPub over HTTPS with JSON-LD payloads) enables cross-instance
  and cross-platform interaction — a Mastodon user can follow a Lemmy
  community or boost a Forem post. Each instance operates autonomously,
  with federation being opt-in and asynchronous. The shared protocol
  (ActivityPub) defines the integration contract: Actor, Activity, and
  Object types with inbox/outbox endpoints. This is Service-Based with a
  federated distribution model — each instance is a coarse-grained
  service, and multiple instances form a distributed network without
  central coordination.
composition_pattern: federated protocol-based service interoperation
review_notes: >-
  The Fediverse is unique in the catalog as a protocol-defined ecosystem
  rather than a vendor-defined one. Individual members have varied
  architectures (Mastodon is Layered + Event-Driven, Discourse is
  Modular Monolith + Microkernel, Forem is Layered, Lemmy is
  Service-Based). The emergent Service-Based + federated pattern appears
  only when examining the ActivityPub integration — each application is
  independently deployed and communicates via a standardized protocol.
  The federated qualifier (per ADR-006) captures the distribution model
  that distinguishes this from centralized Service-Based ecosystems.
