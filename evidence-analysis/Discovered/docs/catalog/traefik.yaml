review_notes: 'Traefik follows a **Microkernel** (or Plugin-based) architecture, where
  the core system provides a basic request-handling lifecycle that is extended by
  dynamic "Providers" and "Middlewares."


  ### Primary Style: Microkernel (Plugin)

  The core of Traefik is a minimal engine that manages the lifecycle of entrypoints
  and servers, while the actual logic for discovering infrastructure and handling
  requests is delegated to modular components:

  1.  **Providers (`pkg/provider/`):** Traefik uses a provider-based system to discover
  configurations. Every external integration (Docker, Kubernetes, Consul, File) is
  a separate module that satisfies a provider interface. The code in `cmd/traefik/traefik.go`
  shows a `ProviderAggregator` that collects these sources and feeds dynamic configuration
  changes back to the core.

  2.  **Explicit Plugin Support (`pkg/plugins/`):** Traefik specifically includes
  a plugin manager and builder that allows loading WebAssembly (Wasm) or Yaegi-interpreted
  Go code at runtime to extend the system''s capabilities without modifying the core
  binary.

  3.  **Isolation:** The core `pkg/server/server.go` serves as the orchestrator (Microkernel)
  that manages entrypoints without knowing the specific implementation details of
  where the routing rules come from.


  ### Secondary Style: Pipeline (Pipe-and-Filter)

  The request-handling logic is a classic **Pipeline**. '
