review_notes: 'Review of github.com/traefik/traefik. Traefik IS a reverse proxy --
  classifying what it IS, not what it enables. Core evidence: pkg/server/middleware/middlewares.go
  uses alice library to BuildMiddlewareChain() composing 30+ independent filters (auth,
  compress, ratelimit, circuitbreaker, headers, retry, etc.) from pkg/middlewares/.
  Each filter implements http.Handler wrapping next handler. Request flow: EntryPoints
  -> Router -> MiddlewareChain -> BackendService. pkg/server/router/router.go matches
  routes then delegates through middleware pipeline. pkg/middlewares/response_modifier.go
  modifies responses flowing back through the chain. pkg/provider/ interface feeds
  dynamic config from Docker/K8s/Consul through ConfigurationWatcher channel (another
  pipe pattern). Separate parallel pipelines for TCP/UDP/HTTP in pkg/server/. Single
  binary, not microservices. Confidence 0.92: clear pipe-and-filter signals throughout,
  not quite 0.95 because the provider aggregation and dynamic config watching add
  complexity beyond pure pipe-and-filter.'
