one_line_summary: "Open-source observability and visualization platform with a formal\
  \ plugin registry as its primary integration seam for datasources, panels, and apps."
review_notes: "Grafana is a **Microkernel** architecture with a **Modular Monolith**\
  \ backend. The plugin registry (`pkg/plugins/manager/registry/in_memory.go`) is\
  \ the load-bearing integration seam: all datasource connectivity and visualization\
  \ extensibility flows through a 5-stage plugin load pipeline (Discovery \u2192 Bootstrap\
  \ \u2192 Validation \u2192 Initialization \u2192 Termination). Backend plugins run\
  \ as separate OS processes communicating over gRPC via `hashicorp/go-plugin`. The\
  \ backend is a single Go binary assembled by Google Wire from 74 domain-scoped service\
  \ packages sharing a unified SQL database. A `pkg/modules/` dskit-based system\
  \ allows StorageServer, SearchServer, and ZanzanaServer to be deployed as standalone\
  \ gRPC targets, but the default mode (`target = all`) runs everything in one process."
