review_notes: "Grafana is a classic example of a **Microkernel (Plugin)** architecture,\
  \ where a stable core (the \"kernel\") provides the essential infrastructure (authentication,\
  \ data routing, web serving) while almost all functional capabilities (visualizations,\
  \ data sources, alerting integrations) are implemented as plugins.\n\n### 1. Microkernel\
  \ (Plugin)\nThe system is designed around a strictly defined extension API. \n-\
  \ **Plugin Registry:** In `pkg/server/server.go`, the server initializes a `backgroundServiceRegistry`,\
  \ which manages the lifecycle of various internal and external components.\n- **Pluggability\
  \ of Core Logic:** The `pkg/plugins` directory contains the orchestration logic\
  \ for loading both frontend (JS/TS) and backend (Go) plugins. Backend plugins often\
  \ run as separate processes communicating over gRPC (seen in `pkg/plugins/backendplugin`).\n\
  - **Data Sources as Plugins:** The directory `pkg/tsdb` contains numerous sub-packages\
  \ (e.g., `loki`, `prometheus`, `mysql`), each acting as an adapter. The README explicitly\
  \ highlights that \"Panel plugins offer many different ways to visualize\" and \"\
  mixed data sources\" are supported via custom providers.\n\n### 2. Modular Monolith\n\
  While Grafana supports out-of-process plugins, the core repository is shipped as\
  \ a single binary (`grafana-server`). "
