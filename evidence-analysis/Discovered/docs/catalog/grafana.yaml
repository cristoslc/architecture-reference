notable_strengths:
- Plugin system is the load-bearing integration seam enabling 1000+ community plugins
  without core modification
- Formal 5-stage plugin load pipeline with signature verification and OS-process isolation
  via gRPC
- Google Wire compile-time DI graph eliminates runtime reflection overhead for 74
  services
- dskit module system enables optional horizontal scaling of storage and search without
  architectural refactoring
- OpenFGA/Zanzana as optional authorization backend for relationship-based RBAC at
  scale
notable_gaps:
- Shared SQL database couples 74 services with no per-domain schema decomposition
- No formal module boundary enforcement tooling (unlike GitLab bounded_contexts.yml)
- Plugin contract is split across Go/gRPC (backend) and TypeScript (frontend) with
  no unified cross-tier specification
- apps/ operator pattern is nascent and not yet the primary module delivery mechanism
