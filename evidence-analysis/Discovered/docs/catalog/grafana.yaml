classification_reasoning: "## Architecture Classification: Grafana\n\n**Primary Style:\
  \ Microkernel** with **Modular Monolith** as the secondary deployment structure.\n\
  \n### Evidence for Microkernel\n\n**1. Plugin Registry as Primary Integration Seam**\n\
  \n`pkg/plugins/manager/registry/in_memory.go` maintains the runtime plugin registry\
  \ keyed by plugin ID. All datasources, panels, and apps enter the system through\
  \ this registry. The host's query service (`pkg/services/query/`) fans out to plugins\
  \ via `plugins.BackendFactoryProvider` \u2014 no direct SQL or external API calls\
  \ exist in the core query path.\n\n**2. Formal 5-Stage Plugin Load Pipeline**\n\
  \n`pkg/plugins/manager/pipeline/doc.go` documents: Discovery \u2192 Bootstrap \u2192\
  \ Validation \u2192 Initialization \u2192 Termination. This is a structured lifecycle\
  \ contract managed by the host, not by plugins.\n\n**3. gRPC Process Isolation\
  \ for Backend Plugins**\n\n`pkg/plugins/backendplugin/grpcplugin/grpc_plugin.go`\
  \ uses `hashicorp/go-plugin` (confirmed in `go.mod`) to launch backend plugin binaries\
  \ as separate OS processes and communicate over gRPC. Plugin boundary is a physical\
  \ process isolation point.\n\n**4. Built-in Plugins Use Same Registry Interface**\n\
  \nThe 20 built-in datasources in `pkg/tsdb/` (prometheus, loki, cloudwatch, elasticsearch,\
  \ etc.) are registered through the same `PluginSource` \u2192 `InMemory` registry\
  \ as external community plugins \u2014 no privileged core code path.\n\n**5. Frontend\
  \ Plugin SDK**\n\n`packages/grafana-runtime/` exposes a formal SDK to frontend plugins.\
  \ `public/app/extensions/` provides extension point registry for panel-to-panel\
  \ and app-to-panel UI extension slots.\n\n### Evidence for Modular Monolith\n\n\
  **1. Single Binary, Shared Database**\n\nSingle entrypoint: `pkg/cmd/grafana/main.go`.\
  \ Google Wire assembles all 74 services into one DI graph (`pkg/server/wire_gen.go`).\
  \ All services share one SQL database (`pkg/infra/db.DB` via xorm) and Redis cache.\n\
  \n**2. 74 Domain-Scoped Service Packages**\n\n`pkg/services/` contains 74 packages\
  \ (accesscontrol, authn, authz, dashboards, datasources, ngalert, live, query, sqlstore,\
  \ featuremgmt, grpcserver, provisioning, secrets, etc.) \u2014 domain-vertical organization.\n\
  \n**3. dskit Module System as Optional Scaling**\n\n`pkg/modules/dependencies.go`\
  \ defines 12 module constants. Default target `All \u2192 {Core}` runs the full\
  \ HTTP server as one process. StorageServer, SearchServer, ZanzanaServer are optional\
  \ standalone targets \u2014 not the architectural model.\n\n**4. Enterprise Extension\
  \ via ModuleRegisterer**\n\n`pkg/server/module_registerer.go` defines a `ModuleRegisterer`\
  \ interface. Enterprise builds inject additional modules via `s.moduleRegisterer.RegisterModules(m)`.\n\
  \n### What This Is NOT\n\n- **Not Microservices**: All 74 services share one database.\
  \ Default mode is one process.\n- **Not Layered**: Service organization is domain-vertical,\
  \ not horizontal layer separation.\n- **Not Service-Based**: Optional module targets\
  \ share unified storage backend, not independent databases.\n- **Not Event-Driven**:\
  \ `InProcBus` covers side-effect notifications only; primary integration is synchronous\
  \ Wire-injected Go calls."
