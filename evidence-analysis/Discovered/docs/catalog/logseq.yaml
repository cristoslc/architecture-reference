classification_reasoning: "## Analysis\n\n### Primary: Microkernel (Plugin)\n\nLogseq\
  \ has a **substantial plugin architecture** that is central to its design. The evidence\
  \ is compelling:\n\n**Plugin Infrastructure (`libs/src/`):**\n- **`LSPlugin.core.ts`**\
  \ (~1,673 lines) - Complete plugin runtime with:\n  - `PluginLocal` class managing\
  \ individual plugin lifecycle (load, init, settings, dispose)\n  - `LSPluginCore`\
  \ class as the plugin manager coordinating all plugins\n  - Plugin loading from\
  \ filesystem (`DIR_PLUGINS = 'plugins'`)\n  - Isolated execution contexts (shadow\
  \ DOM and iframe modes)\n  - Event-based communication between plugins and host\
  \ application\n\n- **`LSPlugin.user.ts`** - Rich user-facing plugin API:\n  - `logseq.Editor`\
  \ proxy for editor operations\n  - `logseq.App` proxy for application operations\
  \  \n  - `logseq.DB` proxy for database queries\n  - Hook registration (`onBlockChanged`,\
  \ `onPageChanged`, etc.)\n  - UI injection capabilities\n\n- **`callable.apis.ts`**\
  \ - Host-exported APIs that plugins can invoke\n\n**Plugin API (`src/main/logseq/api.cljs`):**\n\
  - ClojureScript API exposing 100+ functions for plugins\n- Organized by domain:\
  \ `api/app.cljs`, `api/block.cljs`, `api/db.cljs`, `api/editor.cljs`, `api/plugin.cljs`\n\
  - Hook installation/uninstallation: `install_plugin_hook`, `uninstall_plugin_hook`\n\
  \n**Plugin Handler (`src/main/frontend/handler/plugin.cljs`):**\n- Plugin lifecycle\
  \ management\n- Hook system for plugin integration\n- External plugin validation\
  \ and loading\n\n### Secondary: Layered\n\nThe codebase exhibits clear horizontal\
  \ layering in `src/main/frontend/`:\n\n1. **Components Layer** (`frontend/components/`)\
  \ - UI components (80+ files)\n2. **Handler Layer** (`frontend/handler/`) - Business\
  \ logic/controllers  \n3. **DB Layer** (`frontend/db/`) - Data access and queries\n\
  \nFrom `CODEBASE_OVERVIEW.md`: *\"Directories and files inside are organized by\
  \ features or functions\"*, specifically calling out `frontend/components/` for\
  \ UI and `frontend/handler/` for \"system component like code.\"\n\nThe handler\
  \ namespace (`frontend/handler.cljs`) acts as an application coordinator, orchestrating\
  \ startup, initialization, and cross-cutting concerns.\n\n### Secondary: Modular\
  \ Monolith\n\nLogseq enforces internal module boundaries through the `deps/` directory:\n\
  \n```\ndeps/\n├── cli/         # CLI tools\n├── common/      # Shared utilities\n\
  ├── db/          # Database library\n├── db-sync/     # Sync server\n├── graph-parser/\
  \ # Graph parsing\n├── outliner/    # Outliner operations\n├── publish/     # Publishing\
  \ tools\n├── publishing/  # Publishing utilities\n└── shui/        # UI component\
  \ library\n```\n\nEach module has its own `deps.edn` and `package.json` with explicit\
  \ dependencies via `:local/root`. For example, `deps/outliner/deps.edn`:\n```clojure\n\
  {:deps\n {logseq/db {:local/root \"../db\"}\n  logseq/graph-parser {:local/root\
  \ \"../graph-parser\"}}}\n```\n\nThis creates a clear module dependency graph with\
  \ enforced boundaries, making it a **modular monolith** - single deployable with\
  \ internal module isolation.\n\n### Why NOT Other Styles\n\n- **NOT Microservices**:\
  \ Single deployable. `deps/` are libraries, not independent services. The Dockerfile\
  \ builds one static web app.\n\n- **NOT Event-Driven**: While plugins use EventEmitter,\
  \ the core application uses synchronous/direct calls. State flows through atoms\
  \ and React reactivity, not an event bus.\n\n- **NOT CQRS**: No separation of read/write\
  \ models. DataScript handles both.\n\n- **NOT DDD**: No bounded contexts, aggregates,\
  \ or ubiquitous language patterns.\n\n- **NOT Hexagonal**: No ports/adapters isolation.\
  \ Handlers directly access DB and UI.\n\n### Architecture Summary\n\nLogseq is a\
  \ **knowledge management desktop/mobile/web application** built as a layered monolith\
  \ with:\n- A comprehensive plugin system (Microkernel pattern) for extensibility\n\
  - Horizontal layers (Components → Handlers → DB)\n- Internal module boundaries (`deps/`\
  \ libraries)\n- DataScript as the in-memory database with Datalog queries\n- Web\
  \ Workers for background database operations\n- Electron wrapper for desktop deployment\n\
  - Capacitor for mobile deployment"
