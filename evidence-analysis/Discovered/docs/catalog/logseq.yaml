classification_reasoning: 'The Logseq codebase is a sophisticated **Microkernel (Plugin)**
  architecture built within a **Modular Monolith** structure using ClojureScript.


  ### 1. Primary Style: Microkernel (Plugin)

  The system is designed to be highly extensible through a formalized plugin API.
  This is evidenced by:

  - **Plugin SDK and Contracts:** The `libs/src/modules` directory contains TypeScript
  definitions for internal service interfaces (`LSPlugin.Search.ts`, `LSPlugin.Storage.ts`,
  `LSPlugin.Request.ts`). These act as the "contract" between the core kernel and
  external extensions.

  - **Runtime Plugin Loading:** The `resources/js/lsplugin.core.js` and `lsplugin.user.js`
  files, alongside references in `shadow-cljs.edn` (e.g., `frontend.config/ENABLE-PLUGINS`),
  indicate a system that loads and executes third-party code within a sandboxed or
  managed environment.

  - **Cross-Boundary Communication:** The presence of `libs/src/postmate/index.ts`
  suggests the use of [Postmate](https://github.com/dollarshaveclub/postmate), a library
  for secure iFrame-based communication, which is a common implementation detail for
  microkernel systems that need to isolate plugins while providing an RPC-like bridge
  to the core.


  ### 2. Secondary Style: Modular Monolith

  While the repository produces multiple deployment artifacts (Desktop/Electron, Web,
  Mobile), the internal logic is managed as a modular monolith with strictly defined
  boundaries:

  - **Dependency Isolation:** The `deps.edn` file uses `:local/root` to include several
  sub-modules (e.g., `logseq/graph-parser`, `logseq/db-sync`, `logseq/outliner`, `logseq/shui`).
  This structure enforces clear boundaries where shared logic is abstracted into internal
  libraries that the main applications consume.

  - **Service Segregation:** The `shadow-cljs.edn` configuration defines separate
  builds for the `:app`, `:db-worker`, and `:inference-worker`. This offloads heavy
  lifting (database indexing and machine learning) to web workers, following a "service-based"
  organization within the client-side monolith.

  - **Multi-Platform Adapters:** The code is split into `src/main/frontend`, `src/main/mobile`,
  and `src/main/electron`, allowing a shared core to run across different environments
  by providing platform-specific implementations of the host environment.


  ### 3. Execution Model

  The system relies heavily on a specialized persistence layer (DataScript), treating
  the document graph as a database. This infrastructure supports the "kernel" by providing
  a unified reactive data bus that all modules and plugins can query via Datalog,
  further reinforcing the microkernel pattern where the core''s primary job is state
  management and plugin coordination.'
