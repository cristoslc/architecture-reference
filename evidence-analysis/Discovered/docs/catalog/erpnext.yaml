classification_reasoning: "## Analysis\n\nERPNext exhibits a classic **Layered Architecture**\
  \ built on top of the Frappe Framework.\n\n### Key Evidence\n\n**1. Horizontal Layer\
  \ Separation:**\n\nThe codebase shows clear horizontal layering with a well-defined\
  \ controller inheritance chain:\n\n```\nTransactionBase (utilities/transaction_base.py)\n\
  \    ↓\nAccountsController (controllers/accounts_controller.py)\n    ↓\nStockController\
  \ (controllers/stock_controller.py)\n    ↓\nSellingController / BuyingController\
  \ / SubcontractingController\n    ↓\nConcrete doctypes (SalesOrder, PurchaseOrder,\
  \ etc.)\n```\n\nEach layer builds upon the previous:\n- `TransactionBase` handles\
  \ basic validation and status updates\n- `AccountsController` adds accounting/ledger\
  \ logic\n- `StockController` adds inventory/warehouse management\n- `SellingController`/`BuyingController`\
  \ add domain-specific validations\n\n**2. Presentation Layer:**\n\nEach domain entity\
  \ has the trio of files:\n- `doctype/*.json` - Schema/UI definitions\n- `doctype/*.js`\
  \ - Frontend behavior\n- `doctype/*.py` - Business logic\n\nFor example, `erpnext/selling/doctype/sales_order/`\
  \ contains:\n- `sales_order.json` (DocType schema)\n- `sales_order.js` (UI behavior)\n\
  - `sales_order.py` (server logic)\n\n**3. Business Logic Layer:**\n\nControllers\
  \ contain the core business rules:\n- `erpnext/controllers/accounts_controller.py`\
  \ - 1000+ lines of accounting logic\n- `erpnext/controllers/taxes_and_totals.py`\
  \ - tax calculations\n- Domain services like `erpnext/accounts/party.py`, `erpnext/stock/utils.py`\n\
  \n**4. Data Access Layer:**\n\nAll database operations go through the Frappe ORM\
  \ abstraction:\n- `frappe.get_doc()` - document retrieval\n- `frappe.db.get_value()`\
  \ / `frappe.db.get_all()` - queries\n- `frappe.db.exists()` - existence checks\n\
  \n**5. Module Organization (Not Enforced Boundaries):**\n\nWhile code is organized\
  \ into modules (accounts, selling, buying, stock, manufacturing), these are **package-organizational,\
  \ not architectural boundaries**. Cross-module imports are pervasive:\n\n```python\n\
  # selling/doctype/sales_order/sales_order.py\nfrom erpnext.accounts.doctype.sales_invoice.sales_invoice\
  \ import ...\nfrom erpnext.accounts.party import get_party_account\nfrom erpnext.controllers.selling_controller\
  \ import SellingController\nfrom erpnext.manufacturing.doctype.blanket_order.blanket_order\
  \ import ...\nfrom erpnext.stock.doctype.item.item import get_item_defaults\nfrom\
  \ erpnext.stock.stock_balance import get_reserved_qty\n```\n\nThis is a key distinction\
  \ from **Modular Monolith** - there are no enforced boundaries between modules.\n\
  \n### What This Is NOT\n\n- **Not Microservices**: Single deployable unit (`pyproject.toml`\
  \ defines one package). No separate services, no inter-service communication patterns.\n\
  \n- **Not Modular Monolith**: While modules exist, they lack enforced boundaries.\
  \ Cross-module imports are unrestricted and pervasive. No module-specific schemas\
  \ or internal APIs.\n\n- **Not Event-Driven**: No message broker configurations,\
  \ no event handlers pattern. Uses direct method calls and Frappe's hook system for\
  \ extensibility.\n\n- **Not DDD**: No bounded contexts, aggregates, or domain isolation.\
  \ Modules freely import from each other.\n\n- **Not Hexagonal/Clean Architecture**:\
  \ No ports/adapters pattern. Business logic directly depends on Frappe's ORM and\
  \ framework APIs.\n\n### Secondary Characteristics\n\nThe **Frappe Framework** itself\
  \ provides infrastructure-as-code via:\n- `hooks.py` - extension points and lifecycle\
  \ callbacks\n- DocType system - schema-first entity definitions\n- `@frappe.whitelist()`\
  \ - API endpoint declarations\n\nThis creates a framework-integrated layered architecture\
  \ where the framework handles much of the infrastructure layer (persistence, API\
  \ routing, authentication).\n\n### Conclusion\n\nERPNext is a textbook **Layered\
  \ Architecture** - a monolithic application organized into horizontal layers (presentation\
  \ → business logic → data access) with clear separation of concerns. The module\
  \ structure reflects functional organization (accounts, selling, stock) rather than\
  \ architectural boundaries."
