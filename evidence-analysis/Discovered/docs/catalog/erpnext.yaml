one_line_summary: >-
  ERPNext is a Modular Monolith ERP application organized into 20+ functional
  domain modules (Accounts, Stock, Manufacturing, Selling, etc.) sharing a single
  Python package and database, layered via a deep controller inheritance hierarchy,
  and plugged into the Frappe framework via a microkernel hooks manifest.
classification_reasoning: >-
  ## Analysis


  ERPNext exhibits a **Modular Monolith** as its primary architectural style,
  supported by a strong **Layered** controller hierarchy and a **Microkernel**
  plugin relationship with the Frappe framework.


  ### Primary Style: Modular Monolith


  `erpnext/modules.txt` enumerates 20 named functional modules (Accounts, CRM,
  Buying, Selling, Stock, Manufacturing, Support, Projects, Quality Management,
  Subcontracting, EDI, etc.). Each module under `erpnext/<module>/` follows a
  consistent internal structure: `doctype/` for schema-first entity definitions,
  `report/` for read-side queries, `workspace/` for UI layout, and `page/` for
  full-page views. All modules are co-deployed in a single Python package
  (`pyproject.toml` defines one package: `erpnext`), share the same MariaDB
  database instance, and run in the same process.


  Module boundaries are organizational (filesystem conventions), not enforced at
  runtime. Cross-module imports are pervasive and unrestricted — for example,
  `erpnext/selling/doctype/sales_order/sales_order.py` contains 31 intra-package
  imports drawing from `accounts`, `stock`, `manufacturing`, and `setup` modules.
  This is characteristic of a Modular Monolith rather than either a true monolith
  (no internal structure) or a Microservices/Service-Based architecture (no runtime
  boundary enforcement).


  ### Secondary Style: Layered


  A rigid horizontal inheritance chain provides the clearest layered signal:


  ```
  frappe.model.document.Document
      └── StatusUpdater          (controllers/status_updater.py)
          └── TransactionBase    (utilities/transaction_base.py)
              └── AccountsController  (controllers/accounts_controller.py)
                  └── StockController  (controllers/stock_controller.py)
                      ├── SellingController
                      └── SubcontractingController
                          └── BuyingController
  ```


  Each layer adds a distinct concern: lifecycle state, posting-date/UOM
  validation, GL entry creation and tax calculations, inventory ledger writes, and
  finally domain-specific selling/buying validation. Concrete DocTypes (SalesOrder,
  PurchaseOrder, StockEntry, etc.) inherit from the appropriate controller layer.
  This is textbook horizontal layering applied consistently across the domain
  entity hierarchy.


  ### Tertiary Style: Microkernel


  ERPNext deploys as a "plugin" onto the Frappe framework kernel via the Bench
  tool. `erpnext/hooks.py` is the app manifest wired into Frappe's extension
  system, providing: `doc_events` (lifecycle hook registrations), `scheduler_events`
  (cron/daily/hourly background job registrations), `regional_overrides` (country-
  specific function substitutions for Italy, UAE, Saudi Arabia, France),
  `override_whitelisted_methods` (replacing Frappe core HTTP endpoints), and
  `extend_doctype_class` (subclassing Frappe base DocTypes). This mirrors a
  microkernel model where Frappe supplies the kernel (ORM, router, background
  scheduler, authentication, multi-tenancy) and ERPNext is the primary plugin.
  Third-party apps can further layer on top using the same mechanism.


  ### What This Is Not


  - **Not Event-Driven**: No message broker (Kafka, RabbitMQ, Celery). Background
    jobs via Frappe's Redis-backed `frappe.enqueue()` are operational queuing, not
    an event-driven architecture. No event bus, event sourcing, or domain event
    pattern found.

  - **Not CQRS**: GL Entry and Stock Ledger Entry use an append-only write pattern
    with an optional immutable ledger setting (`is_immutable_ledger_enabled()`), but
    there is no separate read model or command/query bus. Reports query the same
    write tables via the Frappe ORM.

  - **Not DDD**: No bounded contexts, aggregates, value objects, or repository
    abstraction. Modules import each other's internal DocType implementations
    directly.

  - **Not Hexagonal**: Controller business logic directly calls `frappe.db.*` ORM
    APIs. No ports/adapters abstraction layer between domain logic and persistence.

  - **Not Microservices / Service-Based**: Single deployable Python package, single
    database, single runtime process. No inter-service communication patterns.


  ### Conclusion


  The dominant architectural signal is the Modular Monolith — large-scale ERP
  domain decomposed into 20+ named modules sharing a single deployment unit and
  database, with file-system-level (not runtime-enforced) boundaries. The layered
  controller inheritance stack is a secondary structural characteristic that spans
  all transactional modules. The Frappe plugin hooks manifest adds a tertiary
  microkernel extensibility dimension. Confidence is 0.92; the modular vs. layered
  distinction is clear from the file organization and the explicit controller
  inheritance chain.
