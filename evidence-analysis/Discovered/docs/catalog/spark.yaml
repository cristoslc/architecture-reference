one_line_summary: "Unified distributed analytics engine organized as a multi-stage query compilation pipeline (Catalyst) over a DAG-scheduled execution runtime, with a layered module hierarchy and six distinct microkernel extension point systems."
classification_reasoning: >
  Pipeline is the primary style at two levels: (1) the SQL/DataFrame compilation
  pipeline — parse → analyze → optimize → physical plan → execute — implemented
  via Catalyst's RuleExecutor batch framework (sql/catalyst/rules/RuleExecutor.scala)
  and exposed as named checkpoints in QueryExecution; (2) the DAGScheduler runtime
  pipeline, which decomposes jobs into ShuffleMapStage and ResultStage sequences with
  data flowing forward through shuffle boundaries. The sql/pipelines/ module
  (Declarative Pipelines) formalizes this further with DataflowGraph, FlowPlanner,
  and PipelineExecution. Layered is a strong secondary style: the module hierarchy
  enforces strict downward dependencies — APIs → SQL → Catalyst → core → common —
  and the sql/catalyst module explicitly does not depend on core, a documented design
  decision that allows the optimizer to run independently. Microkernel is the third
  co-present style: six formal SPI/extension systems are defined — SparkPlugin
  (DriverPlugin + ExecutorPlugin Java SPI), ShuffleManager SPI, ExternalClusterManager
  SPI, SparkSessionExtensions rule injection (analyzer/optimizer/parser/columnar/AQE
  rules), DataSourceV2 SPI, and ResourceDiscoveryPlugin — enabling Delta Lake, Iceberg,
  third-party shuffle services, profilers, and custom cluster managers to integrate
  without modifying core. The LiveListenerBus provides event-driven internal
  observability but is an implementation mechanism, not the primary organizing
  principle. The system deploys as a single driver JVM plus per-application executor
  processes, not as independent microservices.
review_notes: >
  46 Maven modules; DAGScheduler stage graph is the runtime pipeline engine; Catalyst
  RuleExecutor applies 43+ optimizer rule files in named batches; QueryExecution
  exposes analyzed/optimizedPlan/sparkPlan/executedPlan as pipeline checkpoints;
  SparkSessionExtensions supports injection of 9 rule categories; SparkPlugin SPI
  has been stable since Spark 3.0; Spark Connect (sql/connect/) adds a gRPC client
  protocol boundary but does not decompose internals into microservices. Primary
  language is Scala, not Python — PySpark is the Python binding.
