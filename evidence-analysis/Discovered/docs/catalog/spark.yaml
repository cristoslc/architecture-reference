review_notes: 'Apache Spark is a classic example of a **Modular Monolith** designed
  as a unified engine. While it is used to build and coordinate distributed systems
  at runtime, the repository itself is structured as a collection of strongly decoupled
  modules within a single build boundary.


  ### Primary Style: Modular Monolith

  The codebase is organized into several top-level modules (e.g., `/core`, `/sql`,
  `/mllib`, `/graphx`, `/launcher`, `/resource-managers`). These modules are distinct
  Maven projects with their own `pom.xml` files, allowing for internal dependency
  management.

  - **Enforced Boundaries:** The separation between `core` and high-level tools (like
  `sql` or `mllib`) is strict. `core` contains the fundamental RDD abstractions and
  scheduling logic, while other modules depend on `core`.

  - **Single Build System:** All components are versioned together and typically released
  as a single unified framework, even though they can be included as separate dependencies
  by users.


  ### Secondary Style: Pipeline (Pipe-and-Filter)

  At its architectural heart, Spark’s internal execution model and the way it structures
  its data processing logic follow the **Pipeline** pattern.

  - **DAG Execution:** Spark transforms data through sequential stages (filters, maps,
  joins).'
