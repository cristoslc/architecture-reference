review_notes: 'The InvenTree repository is a classic **Layered** architecture, specifically
  built on the Django framework. According to the `docs/docs/develop/architecture.md`,
  it follows a "classical Django Application" structure. The system is organized into
  a Python/Django backend (located in `src/backend/InvenTree`) and a React-based Single
  Page Application (SPA) frontend.


  ### Primary Style: Layered

  The codebase follows the horizontal layering typical of Django/DRF (Django Rest
  Framework) applications:

  - **Presentation Layer**: A React SPA frontend served as static files, communicating
  with the backend via a RESTful API.

  - **Business Logic Layer**: Implemented within Django apps, utilizing services and
  background workers (Django Q2) for long-running tasks.

  - **Data Access Layer**: Uses Django‚Äôs ORM to abstract interactions with PostgreSQL,
  MySQL, or SQLite.

  - **Infrastructure**: Employs Redis for caching and session management and Gunicorn
  as the WSGI server.


  The architecture emphasizes a "modular" monolith approach where concerns are separated
  into Django apps, but they are deployed as a single unit (as evidenced by the `docker-compose.yml`
  and the architecture diagram showing a single `inventree/inventree` image containing
  the Django server processes).'
