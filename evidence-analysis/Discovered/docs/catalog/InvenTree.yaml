classification_reasoning: "## Architecture Analysis: InvenTree\n\n### Primary Style:\
  \ Microkernel (Plugin)\n\nInvenTree implements a **Microkernel architecture** centered\
  \ on a sophisticated plugin system that allows the core system to be extended at\
  \ runtime.\n\n**Key Evidence:**\n\n1. **Plugin Registry** (`src/backend/InvenTree/plugin/registry.py`):\n\
  \   - Central `PluginsRegistry` class that discovers, loads, and manages plugins\n\
  \   - Maintains lists of active/inactive plugin instances\n   - Thread-safe loading\
  \ with locks\n   - Dynamic URL and app registration\n\n2. **Plugin Base Class**\
  \ (`src/backend/InvenTree/plugin/plugin.py`):\n   - `InvenTreePlugin` base class\
  \ that all plugins extend\n   - `PluginMixinEnum` defining 20+ extension points\
  \ (ACTION, API_CALL, BARCODE, LABELS, REPORT, VALIDATION, EVENTS, etc.)\n\n3. **Plugin\
  \ Mixin System** (`src/backend/InvenTree/plugin/base/`):\n   - `SettingsMixin` -\
  \ plugins can define custom settings\n   - `AppMixin` - plugins can register as\
  \ full Django apps with models\n   - `UrlsMixin` - plugins can expose custom URL\
  \ endpoints\n   - `NavigationMixin` - plugins can add navigation items\n   - `ReportMixin`,\
  \ `LabelMixin` - plugins can provide report/label generation\n   - `ValidationMixin`\
  \ - plugins can hook into data validation\n   - `EventMixin` - plugins can respond\
  \ to system events\n\n4. **Builtin Plugins** (`src/backend/InvenTree/plugin/builtin/`):\n\
  \   - Core functionality implemented as plugins: barcode, exporters, labels, notifications,\
  \ currency exchange\n   - `MANDATORY_PLUGINS` list for plugins that provide essential\
  \ functionality\n\n5. **Sample Plugins** (`src/backend/InvenTree/plugin/samples/`):\n\
  \   - Demonstrates extension points with working examples\n\n### Secondary Style:\
  \ Layered\n\nWithin each Django app module, the code follows a classic **Layered\
  \ architecture** (MVC pattern):\n\n- **Data Layer**: `models.py` - Django ORM models\n\
  - **API/Controller Layer**: `api.py` - Django REST Framework views\n- **Serialization\
  \ Layer**: `serializers.py` - Data transformation\n- **Admin Layer**: `admin.py`\
  \ - Admin interface configuration\n- **Presentation Layer**: `templates/` - HTML\
  \ templates\n\n**Example** (`src/backend/InvenTree/part/`):\n```\npart/\n‚îú‚îÄ‚îÄ models.py\
  \      # Data layer - Part, PartCategory, BomItem models\n‚îú‚îÄ‚îÄ api.py         # API\
  \ views - CategoryList, PartList endpoints\n‚îú‚îÄ‚îÄ serializers.py # DRF serializers\
  \ for JSON serialization\n‚îú‚îÄ‚îÄ admin.py       # Django admin configuration\n‚îú‚îÄ‚îÄ filters.py\
  \     # Query filtering\n‚îî‚îÄ‚îÄ tests.py       # Test layer\n```\n\n### What This Is\
  \ NOT\n\n- **Not Microservices**: Single deployable unit (`inventree/inventree`\
  \ Docker image), single database, shared codebase\n- **Not Modular Monolith**: While\
  \ organized into Django apps, there are no enforced module boundaries, separate\
  \ schemas, or bounded contexts. The apps share the same database and can import\
  \ each other freely\n- **Not Hexagonal Architecture**: No ports/adapters pattern;\
  \ uses Django ORM directly throughout\n- **Not Event-Driven Architecture**: While\
  \ there's an event system for plugins, synchronous REST API calls are the primary\
  \ communication pattern\n\n### Deployment Topology\n\nFrom `contrib/container/docker-compose.yml`:\n\
  - Single `inventree-server` container (gunicorn)\n- Background `inventree-worker`\
  \ container (django-q, same codebase)\n- Shared PostgreSQL database\n- Redis cache\n\
  - Caddy reverse proxy\n\nThis is a **monolithic deployment** with a background worker\
  \ process - typical for Django applications with async task requirements."
