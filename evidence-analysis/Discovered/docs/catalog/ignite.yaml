review_notes: "README describes 'distributed database for high-performance computing with in-memory speed' with multi-tier storage (memory + disk). Core architecture: GridKernalContext orchestrates 46+ GridProcessor subsystems and 12+ GridManager subsystems via GridComponent interface. SPI layer provides pluggable discovery (spi/discovery/), communication (spi/communication/), failover, load balancing. Data partitioned via affinity processor (internal/processors/affinity/). 35+ Maven modules compile into single runtime per node. Space-based signals: in-memory data grid, data partitioning/replication, co-located compute (IgniteCompute), distributed data structures (AtomicLong, Queue, Set, CountDownLatch). Not microservices -- single process per node. Not event-driven as primary style -- events are internal mechanism only."