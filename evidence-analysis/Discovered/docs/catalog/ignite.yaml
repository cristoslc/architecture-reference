notable_strengths:
- Nine-category SPI system allows swapping discovery, transport, collision, indexing independently
- ServiceLoader plugin API enables third-party extensions without modifying core
- Affinity colocation routes compute to data partition, minimizing network hops
- Native WAL persistence enables crash recovery without shared storage infrastructure
- Rich client ecosystem — Java, .NET, C++, Python, JDBC, ODBC, REST
notable_gaps:
- Module boundary enforcement is package-convention-based, not Gradle build-system enforced
- No ADR directory — design decisions in Apache JIRA/Confluence
- Ignite 3 exists as a parallel, architecturally evolved successor (stricter module model)
