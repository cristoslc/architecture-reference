classification_reasoning: |
  ## Architecture Classification: Microkernel + Modular Monolith + Space-Based

  ### Primary: Microkernel

  IgniteKernal.java is the central coordinator ("kernal") that orchestrates the
  lifecycle of all system components without containing business logic itself.
  IgniteUtils.allPluginProviders() uses ServiceLoader to discover PluginProvider
  implementations at startup; plugins can also be registered via
  IgniteConfiguration.setPluginProviders().

  Nine SPI categories define the formal extension contracts:
  discovery, communication, checkpoint, collision, failover,
  loadbalancing, eventstorage, deployment, indexing.
  Each has a GridManager facade that decouples the kernal from concrete implementations.

  IgnitePluginProcessor manages the complete plugin lifecycle:
  initialization, typed Extension/ExtensionRegistry wiring, discovery data exchange,
  and teardown. CachePluginProvider extends the plugin model to per-cache scopes.

  Optional feature modules (ZooKeeper discovery, Calcite SQL, OpenCensus tracing,
  Kubernetes discovery, .NET/C++ platforms) integrate via the same SPI/plugin mechanism,
  making them swappable without modifying core.

  ### Secondary: Modular Monolith

  36 Maven modules under a single parent POM, assembled into one apache-ignite
  binary distribution (assembly/release-apache-ignite.xml). All modules run in one JVM
  process per node. Module boundaries are enforced by Maven POM dependency declarations
  and a BOM (modules/bom/pom.xml) for version alignment.

  GridKernalContext provides centralized access to ~45 Processors and ~15 Managers
  organized by functional domain (storage, query, compute, services, cluster, connectivity,
  streaming). All share one context — a Modular Monolith, not Microservices.

  Internal boundary enforcement is by package convention (org.apache.ignite.internal.*)
  rather than Gradle build-system visibility rules (contrast with Ignite 3's stricter
  -api/-impl module split).

  ### Tertiary: Space-Based

  Runtime nodes form a classic data grid: each peer node owns a DHT partition subset
  of the distributed in-memory dataset. GridAffinityProcessor maps cache keys to partition
  owners. IgniteCompute.affinityRun/affinityCall routes computation to the node holding
  the target key — move compute to data, not data to compute.

  Native persistence via FileWriteAheadLogManager and GridCacheDatabaseSharedManager
  enables crash recovery on local disk per node without shared storage (shared-nothing).
  CDC (CdcMain + WalRecordsConsumer) adds event streaming over WAL records.

  ### Not Microservices
  Single JVM process per node; homogeneous peer topology; no cross-service network
  boundaries within a node; all components share GridKernalContext.

  ### Not Layered (primary)
  The dominant structure is the Microkernel plugin system, not horizontal
  presentation/business/data layers.

  ### Not Event-Driven (primary)
  IgniteMessaging, IgniteEvents, Continuous Queries, and CDC are feature capabilities
  attached to the data grid, not the primary coordination mechanism.
key_technologies:
- TcpCommunicationSpi (custom NIO binary protocol)
- TcpDiscoverySpi (ring topology) / ZookeeperDiscoverySpi (optional)
- Apache H2 (default SQL) / Apache Calcite (optional module)
- Custom page-memory storage with Write-Ahead Log
- Custom 2PC distributed transactions with MVCC
- ServiceLoader (plugin discovery)
- Maven multi-module build
