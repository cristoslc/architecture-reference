  ### Secondary Styles:

  *   **Layered:** Within the core and managers, Ignite uses a traditional horizontal
  layering. The `GridManager` classes act as a facade/abstraction layer over the **SPI
  (Service Provider Interface)** layer, which contains the actual implementations
  (e.g., `TcpDiscoverySpi`). This ensures that the kernel logic is independent of
  the underlying network or storage implementation.

  *   **Space-Based:** While this describes the deployment topology (distributed in-memory
  data grid), the *code structure* supports this via specialized processors for affinity,
  distributed data structures, and the "Durable Memory" architecture referenced in
  the documentation. The architecture is specifically organized to handle tuple-space-like
  interactions (MapReduce, distributed closures) across a cluster.


  ### Rejection of Other Styles:

  *   **Microservices:** Although many modules exist, they are designed to be compiled
  and run within a single JVM process (a "Node"). They are not independently deployable
  services but rather modular components of a single distributed system.

  *   **Modular Monolith:** While it is a single deployable unit with modules, the
  term "Microkernel" is more precise here because of the explicit "Kernel + Plugin"
  loading mechanism and the SPI (Service Provider Interface) pattern used to swap
  core behaviors at runtime.'
