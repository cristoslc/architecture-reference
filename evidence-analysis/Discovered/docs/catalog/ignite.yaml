review_notes: 'Apache Ignite 2.x is fundamentally structured using a **Microkernel
  (Plugin)** architecture. The system’s "kernel" (implemented in `IgniteKernal.java`)
  acts as a central coordinator that manages the lifecycle of various pluggable components,
  referred to internally as "Processors" and "Managers."


  ### Evidence for Microkernel (Plugin) Style:

  1.  **Central Dispatcher/Kernel:** The `IgniteKernal.java` file (found in `modules/core`)
  is the heart of the system. Its primary role is to initialize the `GridKernalContext`,
  which aggregates various internal components. As seen in the provided code, it orchestrates
  the `start()` and `stop()` sequences for a wide array of specialized modules (e.g.,
  `GridCacheProcessor`, `GridQueryProcessor`, `GridDiscoveryManager`).

  2.  **Explicit Plugin Contract:** The `PluginProvider.java` interface defines a
  strict contract for extending the system. It includes lifecycle hooks (`start`,
  `stop`, `onIgniteStart`), extension registration (`initExtensions`), and the ability
  to contribute to the discovery protocol (`provideDiscoveryData`).

  3.  **Component Loading:** The system distinguishes between "Processors" (which
  implement core logic like SQL or Caching) and "Managers" (which provide a layer
  of indirection over SPIs, like Discovery or Communication). The README and code
  paths confirm that these can be swapped or added via the `ServiceLoader` or explicit
  configuration in `IgniteConfiguration`.

  4.  **Separation of Core and Extensions:** The `modules/` directory shows a clear
  split. `modules/core` contains the kernel and base abstractions, while high-level
  features like `modules/indexing` (SQL via H2/Lucene), `modules/spring`, and `modules/zookeeper`
  are decoupled from the core and loaded as optional modules.


  ### Secondary Styles:

  *   **Layered:** Within the core and managers, Ignite uses a traditional horizontal
  layering. The `GridManager` classes act as a facade/abstraction layer over the **SPI
  (Service Provider Interface)** layer, which contains the actual implementations
  (e.g., `TcpDiscoverySpi`). This ensures that the kernel logic is independent of
  the underlying network or storage implementation.'
