review_notes: "Redpanda is structured as a **Modular Monolith**. While it serves as\
  \ a distributed system, the codebase itself is organized into a single high-performance\
  \ C++ executable (the Redpanda broker) comprising several highly decoupled modules\
  \ with strict ownership boundaries.\n\n### Core Architectural Analysis\n\n1.  **Modular\
  \ Monolith**:\n    The directory structure under `src/v/` represents a vertical\
  \ decomposition of the system's concerns. Each subdirectory acts as a self-contained\
  \ module with its own domain logic:\n    *   `src/v/storage`: The log-structured\
  \ persistence engine.\n    *   `src/v/raft`: The consensus algorithm implementation.\n\
  \    *   `src/v/kafka`: The protocol facade that makes Redpanda Kafka-compatible.\n\
  \    *   `src/v/cluster`: Logic for membership, partition balancing, and metadata\
  \ management."
