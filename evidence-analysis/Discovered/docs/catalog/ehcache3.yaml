review_notes: "LAYERED: Clear vertical layering visible in module dependency chain: ehcache-api (public API contracts: Cache.java, CacheManager.java, Service.java SPI interfaces) -> ehcache-core (internal SPI: ServiceLocator.java, Store.java, tiering interfaces AuthoritativeTier.java/CachingTier.java) -> ehcache-impl (concrete implementations: OnHeapStore, OffHeapStore, OffHeapDiskStore, TieredStore in ehcache-impl/src/main/java/org/ehcache/impl/internal/store/). The tiering subsystem itself is layered: CachingTier (heap/offheap) sits above AuthoritativeTier (disk/clustered), composed by TieredStore.java. MODULAR MONOLITH: Multi-module Gradle build (settings.gradle defines 25+ modules) with strict module boundaries enforced by SPI: ehcache-api, ehcache-core, ehcache-impl, ehcache-107 (JSR-107), ehcache-xml, ehcache-management, ehcache-transactions, clustered/*. Java ServiceLoader used for plugin discovery (META-INF/services/org.ehcache.core.spi.service.ServiceFactory lists 26 factory implementations). ServiceLocator.java manages dependency-ordered startup/shutdown of services. The ehcache module (build.gradle) is a packaging module that bundles api+core+impl+107+xml into a single deployable jar. All modules share a single process boundary — this is a library, not a distributed system."