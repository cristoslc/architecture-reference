one_line_summary: Netflix service registry organized as a Layered WAR application (REST resources → registry business logic → in-memory lease store) extended by a Microkernel adapter layer for swappable HTTP transport, configuration, and DI bootstrap modules.
classification_reasoning: "## Architecture Analysis: Netflix Eureka\n\n### Primary Classification:\
  \ Layered + Microkernel\n\nEureka produces a single WAR file (`eureka-server`) from a Gradle\
  \ multi-project build. The server-side codebase is strictly **Layered** with three horizontal\
  \ tiers:\n\n1. **REST / Presentation Layer** (`eureka-core/resources/`): JAX-RS annotated\
  \ classes (`ApplicationsResource`, `InstanceResource`, `VIPResource`, `PeerReplicationResource`,\
  \ `StatusResource`). Zero business logic — delegates all operations to `PeerAwareInstanceRegistry`\
  \ via `EurekaServerContext`.\n\n2. **Business Logic / Registry Layer** (`eureka-core/registry/`,\
  \ `cluster/`, `aws/`): `AbstractInstanceRegistry` implements register, renew, cancel, eviction,\
  \ and delta computation. `PeerAwareInstanceRegistryImpl` adds peer replication.\
  \ `PeerEurekaNodes` manages HTTP replication to sibling servers.\n\n3. **Data / State Layer**:\
  \ `ConcurrentHashMap<String, Map<String, Lease<InstanceInfo>>>` in `AbstractInstanceRegistry`;\
  \ `ResponseCacheImpl` (Guava cache); `Lease<T>` model. No persistent database — intentionally\
  \ in-memory only.\n\nLayered dependency chain: `ApplicationsResource \u2192 PeerAwareInstanceRegistry\
  \ \u2192 ConcurrentHashMap registry`. No cross-layer violations — `AbstractInstanceRegistry`\
  \ contains zero JAX-RS imports; `ApplicationsResource` contains zero registry data structures.\n\n\
  ### Microkernel (co-primary)\n\nThe stable kernel (`eureka-core`, `eureka-client`) exposes\
  \ explicit extension points formalized as separate Gradle modules:\n\n- **Transport adapters**:\
  \ `EurekaHttpClient` port interface; Jersey 1 default (`JerseyApplicationClient`); Jersey 2\
  \ replacement in `eureka-client-jersey2` module.\n- **Configuration adapters**: Archaius 1.x\
  \ default (`DefaultEurekaClientConfig`); Archaius 2.x replacement in `eureka-client-archaius2`\
  \ module.\n- **DI/Bootstrap adapters**: `eureka-server` (Jersey 1 + manual bootstrap);\
  \ `eureka-server-governator` (Netflix Governator DI) as an alternate WAR.\n- **AWS binding\
  \ adapters**: `AwsBinder` port with `AwsBinderDelegate`; EIP, ENI, Route53 binder implementations\
  \ in `eureka-core/aws/`.\n- **Decorator chain**: `EurekaHttpClientDecorator` enables wrapping\
  \ transport with retry, sessions, redirects, metrics without modifying the core.\n\nThe Guice\
  \ `EurekaModule.configure()` uses `Modules.override()` as the runtime extension mechanism:\
  \ `bind(EurekaClient.class).to(DiscoveryClient.class)` is the default wiring, overridable\
  \ per-deployment.\n\n### What This Is NOT\n\n- **NOT Microservices**: Single WAR deployment;\
  \ `eureka-client` is a library embedded in both the server and client applications.\n- **NOT\
  \ Modular Monolith**: Module boundaries are technical adapter swaps, not domain-bounded contexts.\
  \ Eureka has one domain (service registration); no domain modules exist.\n- **NOT Hexagonal**:\
  \ Servo metrics imports permeate the registry layer; dependencies do not point strictly inward.\
  \ The `EurekaMonitors` cross-cutting concern exists at the business logic tier.\n- **NOT\
  \ Event-Driven**: All communication is synchronous REST. Peer replication is HTTP batch\
  \ requests (`ReplicationTaskProcessor`); no message brokers or event buses.\n\n### Confidence\
  \ Rationale: 0.90\n\n- Layered classification is unambiguous from direct code inspection:\
  \ zero cross-tier coupling violations across all three layers.\n- Microkernel classification\
  \ is strongly supported by explicit multi-module adapter structure and `Modules.override()`\
  \ design. Build-time rather than runtime plugin loading is a recognized Microkernel variant.\n\
  - The prior classification (Layered + Hexagonal) is revised: Hexagonal requires the domain\
  \ layer to have zero external imports, which Eureka violates via Servo metrics throughout\
  \ `AbstractInstanceRegistry`. The Microkernel pattern better describes the deliberate\
  \ adapter-module architecture."
