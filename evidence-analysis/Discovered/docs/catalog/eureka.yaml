review_notes: "Layered: Classic 3-layer architecture within a servlet WAR. Presentation layer = JAX-RS/Jersey REST resources in eureka-core/src/.../resources/ (ApplicationsResource, InstanceResource, PeerReplicationResource). Business/service layer = registry package (AbstractInstanceRegistry, PeerAwareInstanceRegistryImpl) handling register/renew/cancel/evict operations, plus cluster/ package for peer replication (PeerEurekaNode, ReplicationTaskProcessor). Data layer = in-memory ConcurrentHashMap registry with ResponseCacheImpl (Guava LoadingCache) for read caching. Bootstrap via ServletContextListener (EurekaBootStrap) wiring layers together. web.xml defines filter chain (StatusFilter, ServerRequestAuthFilter, RateLimitingFilter, GzipEncodingEnforcingFilter) before Jersey dispatch. Service-Based: Multi-module Gradle project (settings.gradle) with eureka-client, eureka-core, eureka-server as independently versionable JARs sharing the same deployment. eureka-core depends on eureka-client; eureka-server (WAR) depends on both. Client transport layer (shared/transport/decorator/) uses decorator pattern with RetryableEurekaHttpClient, SessionedEurekaHttpClient, RedirectingEurekaHttpClient for resilient HTTP communication between client and server nodes. Cluster replication in eureka-core/cluster/ implements peer-to-peer service-based communication via batched HTTP (ReplicationList/ReplicationListResponse protocol objects). Not Microservices because client and server share code modules and the entire server is a single WAR deployment."