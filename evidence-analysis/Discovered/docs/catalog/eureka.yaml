review_notes: 'The Netflix Eureka repository follows a **Layered** architecture at
  its core, but it is specifically designed as a **Service-Based** infrastructure
  component that utilizes a **Microkernel (Plugin)** approach for extensibility (especially
  regarding cloud provider integrations).


  ### 1. Primary Style: Layered

  The codebase is structured around traditional horizontal layers. Despite the complex
  distribution logic, the internal organization of modules like `eureka-core` and
  `eureka-client` relies on standard Java patterns for separation of concerns:

  - **API/Resources Layer:** Found in `eureka-resources` and the `webapp` directories
  in `eureka-server`, handling RESTful interactions.

  - **Service/Logic Layer:** `DiscoveryClient.java` and associated classes in `eureka-core`
  handle the orchestration of registration, heartbeats, and registry fetches.

  - **Data/Registry Layer:** The `com.netflix.eureka.registry` package (implied by
  references in `EurekaServerConfig.java`) manages the in-memory state of service
  instances.


  ### 2. Secondary Style: Microkernel (Plugin)

  Eureka is built to be extended via "Adapters" or "Plugins," a necessity for supporting
  multiple cloud environments (AWS being the primary one) while keeping the core logic
  environment-agnostic.'
