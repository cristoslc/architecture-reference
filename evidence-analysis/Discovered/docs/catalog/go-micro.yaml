review_notes: "Every core package defines a Go interface (port) with swappable implementations (adapters): broker/broker.go (Broker interface) with http.go, nats/, rabbitmq/ adapters; registry/registry.go (Registry interface) with mdns_registry.go, consul/, etcd/, nats/ adapters; transport/transport.go (Transport interface) with http_transport.go, grpc/, nats/ adapters; client/client.go (Client interface) with rpc_client.go and grpc/ adapters; server/server.go (Server interface) with rpc_server.go and grpc/ adapters; store/store.go (Store interface) with file.go, memory.go, mysql/, postgres/, nats-js-kv/ adapters; codec/codec.go (Codec interface) with json/, proto/, grpc/ codecs; auth/auth.go (Auth interface) with jwt/ and noop/ adapters; config/config.go (Config interface) with source/loader/reader subsystems. profile/profile.go bundles adapter selections into named profiles (LocalProfile, NatsProfile). service/service.go composes all interfaces into a unified service. gateway/ provides API and MCP gateway capabilities."