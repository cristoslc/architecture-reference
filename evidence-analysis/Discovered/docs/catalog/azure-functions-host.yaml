review_notes: "README: 'runtime host used by the Azure Functions service' built on Azure WebJobs SDK. Event-Driven: src/WebJobs.Script/Eventing/ has ScriptEventManager using System.Reactive.Subjects with pub/sub (HostRestartEvent, WorkerErrorEvent, RpcChannelEvent, InboundGrpcEvent/OutboundGrpcEvent in src/WebJobs.Script.Grpc/Eventing/). Layered: 4-project dependency chain -- Abstractions (contracts) -> Script (core runtime: Host/, Binding/, Workers/, Scale/) -> Grpc (out-of-process worker channels) -> WebHost (ASP.NET Core Controllers/, Security/, Routing/). Pipe-and-Filter: src/WebJobs.Script.WebHost/Middleware/ has 25+ middleware components (FunctionInvocationMiddleware, HttpThrottleMiddleware, ExceptionMiddleware, HostAvailabilityCheckMiddleware). The repo IS a serverless runtime host, not a serverless app itself. Trigger/binding system in src/WebJobs.Script/Binding/ dispatches to language workers via gRPC (src/WebJobs.Script.Grpc/Channel/GrpcWorkerChannel.cs)."