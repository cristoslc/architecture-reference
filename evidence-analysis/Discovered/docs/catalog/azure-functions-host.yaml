classification_reasoning: "## Analysis\n\nThe **azure-functions-host** repository\
  \ implements the **Azure Functions runtime host** - the core execution engine that\
  \ runs Azure Functions. This is the infrastructure that *hosts* serverless functions,\
  \ not the functions themselves.\n\n### Primary Style: Microkernel (Plugin)\n\nThe\
  \ architecture exhibits strong microkernel/plugin characteristics:\n\n**Core System\
  \ with Plugin Extension Points:**\n\n1. **Extension Loading Infrastructure:**\n\
  \   - `ScriptStartupTypeLocator` dynamically discovers and loads extension startup\
  \ types from extension bundles or NuGet packages\n   - `ExtensionBundleManager`\
  \ resolves and downloads extension bundles at runtime\n   - `FunctionAssemblyLoadContext`\
  \ provides isolated assembly loading for extensions and user functions (src/WebJobs.Script/Description/DotNet/FunctionAssemblyLoadContext.cs)\n\
  \n2. **Pluggable Binding Providers:**\n   - `IScriptBindingProvider` interface defines\
  \ the plugin contract for bindings\n   - `ScriptBindingProvider` base class with\
  \ `TryCreate()` pattern for extension implementations\n   - `GeneralScriptBindingProvider`\
  \ enables all SDK extensions to work via metadata\n   - Multiple built-in providers:\
  \ `CoreExtensionsScriptBindingProvider`, `WebJobsCoreScriptBindingProvider`\n\n\
  3. **Pluggable Function Descriptor Providers:**\n   - `FunctionDescriptorProvider`\
  \ abstract base class\n   - `DotNetFunctionDescriptorProvider` for .NET functions\n\
  \   - `RpcFunctionDescriptorProvider` for RPC-based language workers\n   - `HttpFunctionDescriptorProvider`\
  \ for HTTP-based custom handlers\n   - `IWorkerFunctionDescriptorProviderFactory`\
  \ creates appropriate providers dynamically\n\n4. **Pluggable Language Workers:**\n\
  \   - `IWorkerChannel` interface for worker communication\n   - `IRpcWorkerChannelFactory`\
  \ creates gRPC worker channels\n   - `IFunctionInvocationDispatcher` dispatches\
  \ invocations to workers\n   - Workers run as separate processes (Python, Java,\
  \ Node.js, PowerShell, etc.)\n   - Worker configurations loaded from `runtimes.json`\
  \ and `RpcWorkerConfig`\n\n5. **Extension Bundle System:**\n   - Extensions packaged\
  \ as bundles that can be downloaded and loaded dynamically\n   - Runtime resolution\
  \ of extension requirements\n   - `ExtensionsManager` handles adding/removing extensions\n\
  \n**Evidence from code:**\n```csharp\n// ScriptStartupTypeLocator.cs - Discovers\
  \ and loads extension startup types\npublic async Task<IEnumerable<Type>> GetExtensionsStartupTypesAsync()\n\
  {\n    // Dynamically resolves extensions from bundles or assemblies\n    ExtensionBundleDetails\
  \ bundleDetails = await _extensionBundleManager.GetExtensionBundleDetails();\n \
  \   // ... loads types dynamically\n}\n```\n\n```csharp\n// FunctionAssemblyLoadContext.cs\
  \ - Isolated loading for extensions\npublic partial class FunctionAssemblyLoadContext\
  \ : AssemblyLoadContext\n{\n    // Provides assembly isolation for plugins\n}\n\
  ```\n\n### Secondary Style: Layered\n\nThe codebase exhibits clear horizontal layering:\n\
  \n1. **Abstractions Layer:** `WebJobs.Script.Abstractions` - Core interfaces like\
  \ `IFunctionProvider`, `BindingMetadata`\n2. **Core Runtime Layer:** `WebJobs.Script`\
  \ - Script host, function descriptors, binding infrastructure, extension management\n\
  3. **Worker Communication Layer:** `WebJobs.Script.Grpc` - gRPC channels, worker\
  \ invocation dispatch\n4. **Hosting Layer:** `WebJobs.Script.WebHost` - ASP.NET\
  \ Core hosting, HTTP routing, web host service\n\n```\nWebJobs.Script.Abstractions\
  \ (Interfaces)\n        ↓\nWebJobs.Script (Core Runtime)\n        ↓\nWebJobs.Script.Grpc\
  \ (Worker Communication)\n        ↓\nWebJobs.Script.WebHost (Web Hosting)\n```\n\
  \n### What This Is NOT\n\n- **NOT Microservices:** Single deployable unit (the host),\
  \ not multiple independently deployable services\n- **NOT Serverless:** This IS\
  \ the serverless *platform infrastructure*, not serverless *functions*\n- **NOT\
  \ Event-Driven (primary):** Internal event manager exists (`ScriptEventManager`\
  \ with Rx) for host lifecycle coordination, but this is internal plumbing, not the\
  \ defining architecture\n- **NOT CQRS:** No separate read/write models\n- **NOT\
  \ DDD:** No aggregates, entities, or bounded contexts\n- **NOT Modular Monolith:**\
  \ Plugins are truly dynamic and isolated, not compile-time modules\n\n### Key Distinctions\n\
  \nThe plugin architecture here is particularly sophisticated:\n- Extensions loaded\
  \ from external bundles (not just assemblies)\n- Custom `AssemblyLoadContext` for\
  \ isolation\n- Out-of-process workers communicate via gRPC\n- Multiple plugin contracts:\
  \ bindings, function providers, workers, startup configurations"
