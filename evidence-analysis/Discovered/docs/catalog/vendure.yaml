one_line_summary: "An open-source headless commerce framework built on NestJS/TypeScript
  whose primary architecture is a Microkernel (Plugin) system — a minimal core kernel
  extended at runtime through the @VendurePlugin contract across 40+ strategy slots
  and 58 domain events — layered internally in a strict API→Service→Data hierarchy
  and supported by an RxJS EventBus and pluggable JobQueue for event-driven plugin
  integration."
classification_reasoning: "Vendure exhibits a three-style composition: Microkernel\
  \ as primary, Layered and Event-Driven as secondary.\n\nMICROKERNEL (primary, 0.93):\
  \ The entire framework is designed around a formal plugin contract. The @VendurePlugin\
  \ decorator (packages/core/src/plugin/vendure-plugin.ts) extends NestJS @Module\
  \ with Vendure-specific metadata: configuration (PluginConfigurationFn to mutate\
  \ VendureConfig before bootstrap), shopApiExtensions/adminApiExtensions (GraphQL\
  \ schema and resolver injection), entities (TypeORM entity registration), and compatibility\
  \ (semver version checking). PluginModule.forRoot() dynamically spreads getConfig().plugins\
  \ into the NestJS AppModule imports array at runtime. The bootstrap pipeline (packages/core/src/bootstrap.ts)\
  \ runs plugin configuration functions sequentially, merges plugin entities into\
  \ the entity registry (with name-conflict detection), and validates semver compatibility.\
  \ The VendureConfig interface exposes 40+ strategy interfaces as kernel extension\
  \ points: AuthenticationStrategy, AssetStorageStrategy, OrderMergeStrategy, JobQueueStrategy,\
  \ PaymentMethodHandler, FulfillmentHandler, TaxZoneStrategy, SchedulerStrategy,\
  \ InstrumentationStrategy, and 31 others. Every significant production capability\
  \ is implemented as a first-party plugin: AssetServerPlugin (asset storage and transformation),\
  \ EmailPlugin (EventBus subscription + JobQueue dispatch), AdminUiPlugin (Angular/React\
  \ admin), ElasticsearchPlugin (search), JobQueuePlugin/BullMQ (Redis-backed queues),\
  \ PaymentsPlugin (Stripe, Mollie, Braintree), HardenPlugin (security), SentryPlugin\
  \ (error/instrumentation strategy), StellatePlugin (CDN cache invalidation). This\
  \ is textbook Microkernel: a stable minimal kernel with formal extension contracts\
  \ and externalized, interchangeable plug-in components.\n\nLAYERED (secondary, 0.88):\
  \ Within packages/core/src/, there is rigorous three-layer organisation with unidirectional\
  \ dependency flow. API Layer (api/) contains GraphQL resolvers split into admin/\
  \ and shop/ subdirectories (20+ resolvers each), GraphQL schema definitions, guards\
  \ (AuthGuard), interceptors (IdInterceptor, CustomFieldProcessingInterceptor, TranslateErrorResultInterceptor),\
  \ and middleware. The api.module.ts imports ServiceModule and ConnectionModule —\
  \ never the reverse. Service Layer (service/) contains 20+ domain services (OrderService,\
  \ ProductService, CustomerService, PaymentService, FulfillmentService) plus helpers\
  \ (OrderCalculator, OrderStateMachine, OrderModifier). Services follow Transaction\
  \ Script style: each method is a complete business transaction coordinating repositories,\
  \ strategies, and event publishing. ErrorResultUnion<T, R> return types replace\
  \ exception-based control flow for domain errors. Data Layer (entity/, connection/)\
  \ contains 60+ TypeORM entity classes. TransactionalConnection wraps TypeORM, carrying\
  \ transaction scope via RequestContext; withTransaction() provides explicit boundaries\
  \ for non-request contexts (JobQueue, scripts). No upward dependencies — the pattern\
  \ is enforced consistently.\n\nEVENT-DRIVEN (secondary, 0.78): An RxJS-based EventBus\
  \ (packages/core/src/event-bus/event-bus.ts) uses a Subject<VendureEvent> stream.\
  \ publish() emits to all subscribers; ofType() filters by class type. Transaction-awareness\
  \ is built in: subscribers are only called after active DB transactions complete,\
  \ preventing dirty reads. Blocking handlers execute synchronously within the publishing\
  \ transaction with dependency-ordered sequencing. 58 named domain events exist in\
  \ event-bus/events/: OrderEvent, OrderPlacedEvent, OrderStateTransitionEvent, PaymentStateTransitionEvent,\
  \ FulfillmentEvent, ProductEvent, CustomerEvent, LoginEvent, AccountRegistrationEvent,\
  \ PasswordResetEvent, StockMovementEvent, and 47 others. Plugins subscribe via the\
  \ ofType() pattern (EmailPlugin example: for each handler, eventBus.ofType(handler.event).subscribe(event\
  \ => handleEvent(handler, event))). JobQueue (packages/core/src/job-queue/) is strategy-backed:\
  \ JobQueueStrategy allows in-memory, database, or BullMQ/Redis. Optional worker\
  \ process (packages/core/src/worker/) polls queues independently for horizontal\
  \ scaling. Event-driven is secondary because the synchronous GraphQL request-response\
  \ flow is primary; events are side-effect notifications propagated to plugins.\n\n\
  RULED OUT - Modular Monolith: No enforced bounded-context module boundaries isolating\
  \ domain concerns from each other. The core is a cohesive ServiceModule containing\
  \ all services. Plugin packages are external extensions, not bounded-context modules.\
  \ This contrasts with Medusa (35 DI-container-wired bounded-context modules with\
  \ RemoteJoiner federation) and Shopware (13 subdomain namespaces with @Package annotations).\n\
  \nRULED OUT - Microservices: Single deployable Node.js process per role (server,\
  \ worker). No inter-service HTTP calls, no service registry, no independent deployment\
  \ per domain. The server/worker split is an operational scaling optimisation sharing\
  \ a common database and configuration.\n\nRULED OUT - DDD (as style): No bounded\
  \ contexts, no aggregates, no ubiquitous language organisation. Services are named\
  \ by entity type (OrderService, ProductService), not domain subdomain. Entities are\
  \ anemic TypeORM classes; business logic lives in Transaction Script services. Domain\
  \ events exist but serve the plugin bus, not aggregate lifecycle management.\n\n\
  QUALITY ATTRIBUTES evidence: Extensibility — 40+ strategy slots; @VendurePlugin\
  \ GraphQL/entity/config/UI extension; 58 domain events for plugin reactions; custom\
  \ fields on any entity; semver compatibility checking. Modularity — plugin packages\
  \ are independently versioned npm packages; first-party plugins demonstrate clear\
  \ kernel/extension separation. Maintainability — NestJS DI enforces interface-based\
  \ dependencies; TypeScript throughout; per-resolver and per-service separation.\
  \ Scalability — stateless server replicas; BullMQ/Redis worker pool for horizontal\
  \ job scaling; Redis-backed cache and session strategies via strategy pattern. Testability\
  \ — packages/testing provides TestServer utilities; strategy pattern allows mock\
  \ implementations. Reliability — transaction-aware event delivery; state machine\
  \ enforcement for order/payment/fulfillment; pessimistic locking in order concurrency\
  \ paths. Security — AuthGuard on all API layers; separate admin/shop API schemas\
  \ with distinct permissions; strategy-abstracted authentication. Developer Experience\
  \ — NestJS DI; TypeScript-first; GraphQL code-first; @VendurePlugin decorator pattern."
architecture_qualifiers:
- type: design-approach
  value: strategy-pattern
  note: Pervasive GoF Strategy pattern — 40+ strategy interfaces in VendureConfig form the kernel extension points; not a Hexagonal ports-and-adapters structure
- type: design-approach
  value: transaction-script
  note: Service layer uses Transaction Script style — business logic lives in service methods (OrderService, ProductService), not in anemic entity classes
- type: design-approach
  value: state-machine
  note: OrderStateMachine, PaymentStateMachine, and FulfillmentStateMachine enforce valid state transitions; configurable via OrderProcess/PaymentProcess/FulfillmentProcess strategy interfaces
