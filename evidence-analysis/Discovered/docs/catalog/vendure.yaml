classification_reasoning: "## Analysis\n\n### Primary Style: Microkernel (Plugin)\n\
  \nVendure is architected as a **plugin-based system** where a core framework is\
  \ extended through a well-defined plugin contract. The evidence is substantial:\n\
  \n**Plugin Infrastructure:**\n- The `@VendurePlugin` decorator (`packages/core/src/plugin/vendure-plugin.ts`)\
  \ is the central extension mechanism, built on top of NestJS modules but with Vendure-specific\
  \ metadata\n- Plugins can extend the GraphQL API (`shopApiExtensions`, `adminApiExtensions`),\
  \ add database entities, modify configuration, and provide controllers/services\n\
  - The `PluginModule.forRoot()` dynamically loads all configured plugins at bootstrap\
  \ time\n\n**Plugin Metadata Contract** (from `vendure-plugin.ts`):\n```typescript\n\
  export interface VendurePluginMetadata extends ModuleMetadata {\n    configuration?:\
  \ PluginConfigurationFn;\n    shopApiExtensions?: APIExtensionDefinition;\n    adminApiExtensions?:\
  \ APIExtensionDefinition;\n    entities?: Array<Type<any>> | (() => Array<Type<any>>);\n\
  \    compatibility?: string;  // semver version checking\n}\n```\n\n**Official Plugins\
  \ Demonstrating the Pattern:**\n- `AssetServerPlugin` - serves and transforms assets\n\
  - `EmailPlugin` - handles transactional emails via EventBus\n- `AdminUiPlugin` -\
  \ serves the admin UI with metrics extensions\n- `PaymentsPlugin` - Stripe, Mollie,\
  \ Braintree, PayPal integrations\n- `ElasticsearchPlugin` - search indexing\n- `SentryPlugin`,\
  \ `HardenPlugin`, `StellatePlugin` - cross-cutting concerns\n\nEach plugin follows\
  \ the same pattern: `@VendurePlugin({...})` decorator, `init()` static method for\
  \ configuration, and integration with the core via well-defined extension points.\n\
  \n### Secondary Style: Layered\n\nWithin the core package, there's clear horizontal\
  \ layering:\n\n1. **API Layer** (`packages/core/src/api/`): GraphQL resolvers (admin/shop),\
  \ middleware, schema definitions\n2. **Service Layer** (`packages/core/src/service/`):\
  \ Business logic services like `OrderService`, `ProductService`, `CustomerService`\n\
  3. **Data Layer** (`packages/core/src/entity/`, `packages/core/src/connection/`):\
  \ TypeORM entities, transaction management\n\nThe `ApiModule` imports (`packages/core/src/api/api.module.ts`):\n\
  ```typescript\nimports: [\n    ServiceModule,        // Business logic\n    ConnectionModule,\
  \     // Data access\n    AdminApiModule,       // Admin resolvers\n    ShopApiModule,\
  \        // Shop resolvers\n    // ...\n]\n```\n\n### What This Is NOT\n\n- **Not\
  \ Microservices**: Vendure is a single deployable unit (a Node.js/NestJS application).\
  \ The worker mode for job processing is an optimization, not a service boundary.\n\
  - **Not Modular Monolith**: While it's a monolith, the extension mechanism is external\
  \ plugins, not enforced internal module boundaries. The `ServiceModule` is a single\
  \ cohesive layer.\n- **Not Hexagonal Architecture**: There's no ports-and-adapters\
  \ pattern. Strategies are configuration-based, not port interfaces.\n- **Not DDD**:\
  \ No bounded contexts, aggregates, or ubiquitous language organization. Services\
  \ are organized by entity type (OrderService, ProductService), not domain boundaries.\n\
  \n### Additional Architectural Elements\n\n**Strategy Pattern for Extensibility**:\
  \ Vendure uses numerous strategy interfaces for customization points:\n- `JobQueueStrategy`\
  \ (Redis, in-memory, database-backed)\n- `PaymentMethodHandler` (with `createPayment`,\
  \ `settlePayment`, etc.)\n- `AssetStorageStrategy` (local, S3)\n- `AuthenticationStrategy`,\
  \ `TaxZoneStrategy`, `OrderProcess`, etc.\n\n**Event-Driven Elements**: \n- `EventBus`\
  \ with RxJS observables for domain events\n- `JobQueue` for background processing\n\
  - Worker process for async job execution\n\nHowever, these are implementation mechanisms\
  \ within the plugin architecture, not defining architectural characteristics. The\
  \ EventBus is primarily used by plugins to react to domain events, reinforcing the\
  \ microkernel pattern.\n\n### Conclusion\n\nVendure is a textbook example of a **Microkernel\
  \ (Plugin) architecture** - a core system designed to be extended through plugins\
  \ loaded at runtime. The layered structure within the core is a subordinate organizing\
  \ principle. The extensive use of strategies and events are mechanisms that support\
  \ the plugin extensibility model."
