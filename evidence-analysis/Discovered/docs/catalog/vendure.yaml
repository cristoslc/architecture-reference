review_notes: 'Vendure Core is architected as a **Microkernel (Plugin)** system, designed
  specifically for extreme extensibility while maintaining a stable core. It is built
  on the NestJS framework and follows a monorepo structure using Lerna.


  ### 1. Microkernel (Plugin) Architecture

  The defining characteristic of Vendure is its plugin system. As seen in `packages/core/src/plugin/plugin.module.ts`,
  the system dynamically injects functionality via `PluginModule.forRoot()`, which
  spreads `...getConfig().plugins` into the main application imports.

  - **Plugin Contract:** The README and docs highlight that almost every aspect (GraphQL
  schema, database entities, background tasks) can be extended via plugins.

  - **Evidence:** The `app.module.ts` depends on a `PluginModule` that acts as the
  registry and lifecycle manager for externalized logic.


  ### 2. Layered Architecture

  Within the core package, Vendure follows a traditional horizontal layering (standard
  for NestJS applications):

  - **API Layer:** Found in `packages/core/src/api`, focusing on GraphQL resolvers,
  guards, and interceptors. It is strictly separated into `admin` and `shop` contexts.'
