classification_reasoning: "## Analysis\n\n### Primary: Microkernel (Plugin) Architecture\n\
  \nPrefect exhibits a clear **Microkernel (Plugin)** architecture with strong evidence:\n\
  \n**1. Plugin Discovery System** (`src/prefect/plugins.py`):\n```python\ncollection_entrypoints:\
  \ EntryPoints = entry_points(group=\"prefect.collections\")\n```\nThe core system\
  \ discovers and loads extensions via Python entry points, a standard plugin mechanism.\n\
  \n**2. Integration Packages** (`src/integrations/`):\nEach integration (prefect-aws,\
  \ prefect-kubernetes, prefect-docker, etc.) defines entry points:\n```toml\n[project.entry-points.\"\
  prefect.collections\"]\nprefect_aws = \"prefect_aws\"\n[project.entry-points.\"\
  prefect.plugins\"]\naws = \"prefect_aws.plugins\"\n```\nThese are separate Python\
  \ packages that extend the core without modifying it.\n\n**3. Dynamic Dispatch Registry**\
  \ (`src/prefect/utilities/dispatch.py`):\n- `_TYPE_REGISTRIES` maintains a global\
  \ registry mapping dispatch keys to types\n- `@register_base_type` decorator marks\
  \ base types for extension\n- `lookup_type(Base, key)` dynamically retrieves registered\
  \ implementations\n\n**4. Extensible Base Types**:\n\n`Block` class (`src/prefect/blocks/core.py:315`):\n\
  ```python\n@register_base_type\nclass Block(BaseModel, ABC):\n    \"\"\"A base class\
  \ for implementing a block that wraps an external service.\"\"\"\n```\n\n`BaseWorker`\
  \ class (`src/prefect/workers/base.py:533`):\n```python\n@register_base_type\nclass\
  \ BaseWorker(abc.ABC, Generic[C, V, R]):\n    type: str\n    job_configuration:\
  \ Type[C] = BaseJobConfiguration\n```\n\nIntegration packages provide concrete implementations:\n\
  - `prefect-aws/prefect_aws/workers/ecs_worker.py` → `ECSWorker(BaseWorker)`\n- `prefect-aws/prefect_aws/s3.py`\
  \ → `S3Bucket(Block)`\n- `prefect-aws/prefect_aws/credentials.py` → `AwsCredentials(Block)`\n\
  \n**5. Core System Isolation**:\nThe core `src/prefect/` package defines interfaces\
  \ (abstract base classes) that integrations implement. The core knows about Blocks\
  \ and Workers abstractly, but concrete implementations live in integration packages.\n\
  \n### Secondary: Layered Architecture\n\nWithin the server component, there's clear\
  \ horizontal layering (`src/prefect/server/`):\n\n- **Presentation Layer**: `server/api/`\
  \ - FastAPI REST endpoints (flows.py, deployments.py, flow_runs.py)\n- **Service\
  \ Layer**: `server/services/` - Background services (scheduler, late_runs, foreman)\n\
  - **Model Layer**: `server/models/` - ORM models for database entities\n- **Database\
  \ Layer**: `server/database/` - SQLAlchemy interfaces, Alembic migrations\n\nEach\
  \ layer has limited dependencies on lower layers, following traditional layered\
  \ architecture patterns.\n\n### Secondary: Event-Driven Components\n\nEvent-driven\
  \ architecture is present but scoped to specific subsystems:\n\n**Event System**\
  \ (`src/prefect/events/`):\n- `emit_event()` for publishing events\n- `Event`, `ReceivedEvent`\
  \ schemas\n- Event filters and subscribers\n\n**Server-Side Event Processing** (`src/prefect/server/events/`):\n\
  - Event persister service\n- Trigger evaluation service\n- Action execution service\n\
  \n**Automations** (`src/prefect/events/actions.py`):\n```python\nclass RunDeployment(DeploymentAction):\n\
  \    \"\"\"Runs the given deployment with the given parameters\"\"\"\nclass CancelFlowRun(Action):\n\
  \    \"\"\"Cancel a flow run when triggered\"\"\"\n```\n\nEvents trigger actions\
  \ via automations, but the core flow/task execution model is not primarily event-driven\
  \ - events are specifically for automation triggers and external integrations.\n\
  \n### What This Is NOT\n\n- **Not Microservices**: Single deployable server (`Dockerfile`),\
  \ one main package. Workers communicate with one server, not multiple independent\
  \ services.\n\n- **Not Service-Based (in the coarse-grained sense)**: While there's\
  \ a client-server separation, the server is monolithic with internal services, not\
  \ 2-5 separate services sharing a database.\n\n- **Not CQRS**: No separation between\
  \ read and write models; the same ORM models serve both.\n\n- **Not DDD**: No bounded\
  \ contexts, aggregates, or domain-driven organizational structure.\n\n- **Not Hexagonal**:\
  \ While `Block` abstracts external services, there's no formal ports-and-adapters\
  \ isolation layer.\n\n- **Not Serverless**: Workers are long-running processes (see\
  \ `runner/runner.py`), not ephemeral functions triggered by cloud providers.\n\n\
  ### Deployment Topology\n\nThe architecture supports two deployment modes:\n1. **Self-hosted\
  \ server**: Single Docker container with FastAPI server + background services\n\
  2. **Prefect Cloud**: Client connects to managed server\n\nBoth modes use the same\
  \ plugin mechanism for integrations - packages are installed into the environment\
  \ and discovered via entry points at import time."
