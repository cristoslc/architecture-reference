review_notes: 'The Prefect repository is primarily structured using a **Layered**
  architecture, though it functions as a sophisticated framework that incorporates
  **Microkernel (Plugin)** and **Event-Driven** patterns to manage its extensibility
  and distributed nature.


  ### 1. Primary Style: Layered

  The codebase follows a clear horizontal separation of concerns, particularly within
  the `src/prefect/server` and `src/prefect/client` directories.

  - **Presentation/API Layer**: `src/prefect/server/api/server.py` defines a FastAPI
  application that aggregates multiple routers (`api.flows`, `api.tasks`, etc.). Reference:
  `API_ROUTERS` in `server.py`.

  - **Domain/Logic Layer**: The business logic is encapsulated in "models" and "orchestration"
  logic within `src/prefect/server/models` and `src/prefect/server/orchestration`.

  - **Data Access Layer**: Persistence is abstracted via SQLAlchemy and specific database
  drivers located in `src/prefect/server/database`.

  - **SDK/Client Layer**: The system provides a high-level SDK (`src/prefect/client`)
  that abstracts the REST API communication from the user''s workflow code.


  ### 2. Secondary Style: Microkernel (Plugin)'
