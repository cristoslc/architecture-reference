review_notes: "README title: 'Modular Monolith with DDD'. ADR-0002 explicitly adopts Modular Monolith. 5 modules (Administration, Meetings, Payments, Registrations, UserAccess) each with own composition root, IoC container, separate DB schema. ADR-0012 adopts DDD tactical patterns (Aggregates, Entities, Value Objects, Bounded Contexts). ADR-0007 adopts CQRS per module. ADR-0014 chooses event-driven async communication via in-memory events bus (ADR-0015) with Outbox/Inbox patterns. Clean Architecture within each module (Application/Domain/Infrastructure layers). Event Sourcing used in Payments module. Comprehensive architecture decision log (17 ADRs). C4 model diagrams. Topics include: ddd, cqrs, modular, monolith, event-sourcing, clean-architecture."