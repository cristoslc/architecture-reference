review_notes: "The repository is an explicit reference implementation of a **Modular\
  \ Monolith** using **Domain-Driven Design (DDD)**. The architecture is intentionally\
  \ designed to demonstrate how to maintain strict boundaries within a single deployment\
  \ unit (the .NET API).\n\n### Architecture Breakdown\n\n**1. Modular Monolith (Primary\
  \ Style)**\nThe system is divided into high-level vertical slices (Modules) located\
  \ in `src/Modules/`. Each module (e.g., `Payments`, `Meetings`, `Administration`)\
  \ contains its own logic, data access, and domain models. \n*   **Encapsulation:**\
  \ As per Architecture Decision Record (ADR) `0016`, each module has its own Inversion\
  \ of Control (IoC) container, preventing accidental leakage of dependencies between\
  \ modules.\n*   **Public Interface:** ADR `0006` specifies the use of a Facade between\
  \ the API and each Business Module, ensuring that the API only interacts with a\
  \ well-defined contract.\n\n**2. Domain-Driven Design (DDD)**"
