review_notes: Backend is packages/nocodb built on NestJS with src/controllers/ (50+
  files), src/services/ (50+ files), src/models/ (70+ files), src/db/ for SQL data
  access. All wired into one NocoModule in src/modules/noco.module.ts. Frontend is
  packages/nc-gui (Nuxt.js). Jobs via Bull queue in modules/jobs/. Plugin system for
  storage/notification adapters in src/plugins/. Automated discovery incorrectly flagged
  Microservices and Kafka/RabbitMQ - this is a single deployable monolith with docker
  run for deployment.
