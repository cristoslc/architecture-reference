review_notes: 'The NocoDB repository is a monorepo (managed via `pnpm` and `lerna`)
  that primarily follows a **Layered** architecture within its core backend service,
  while utilizing a **Microkernel (Plugin)** pattern to handle its extensive integration
  ecosystem.


  ### 1. Primary Style: Layered (Horizontal)

  The main backend (`packages/nocodb`) is built on the NestJS framework and follows
  a traditional horizontal layering approach. Evidence from the `packages/nocodb/src`
  directory confirms this:

  - **Presentation/API Layer**: Found in `src/modules` and `src/gateways` (Socket.io),
  providing the interface for the frontend and SDK.

  - **Business Logic Layer**: Services such as `meta.service.ts`, `audit.service.ts`,
  and `mcp.service.ts` handle the application''s core logic.

  - **Data Access Layer**: The `src/models` directory contains entity definitions
  (e.g., `Column.ts`, `Table.ts`, `User.ts`), while `src/db` and `src/dbQueryClient`
  (handling MySQL, Postgres, SQLite) manage the interaction with the underlying databases.


  ### 2. Secondary Style: Microkernel (Plugin)

  NocoDB implements a robust plugin system to support its "App Store" for workflow
  automations (Slack, Discord, S3, SES). '
