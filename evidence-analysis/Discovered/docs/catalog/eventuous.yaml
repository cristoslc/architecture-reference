review_notes: "Event-Driven: Core event sourcing infrastructure in src/Core/src/Eventuous.Persistence/EventStore/ (IEventStore, IEventReader, IEventWriter); event subscriptions with checkpoint tracking in src/Core/src/Eventuous.Subscriptions/ (EventSubscription.cs, Handlers/, Consumers/); producers for Kafka (src/Kafka/), RabbitMQ (src/RabbitMq/), Google Pub/Sub (src/GooglePubSub/); Gateway pattern for cross-system event routing in src/Gateway/src/Eventuous.Gateway/GatewayHandler.cs. CQRS: Explicit command/query separation — command side via CommandService<TAggregate,TState,TId> in src/Core/src/Eventuous.Application/AggregateService/CommandService.cs and functional variant in src/Core/src/Eventuous.Application/FunctionalService/CommandService.cs; read side via event-driven projections (samples/kurrentdb/Bookings/Application/Queries/BookingStateProjection.cs, MyBookingsProjection.cs projecting to MongoDB); separate IEventReader/IEventWriter interfaces enabling distinct read/write stores. DDD: Aggregate base class with state management and change tracking in src/Core/src/Eventuous.Domain/Aggregate.cs; State<T> record type with event handler registration in src/Core/src/Eventuous.Domain/State.cs; strongly-typed Id value objects in src/Core/src/Eventuous.Domain/Id.cs; domain exceptions (DomainException); sample Booking aggregate with value objects (Money, StayPeriod, RoomId) and domain events in samples/kurrentdb/Bookings.Domain/Bookings/. Pipe-and-Filter pattern visible in ConsumePipe with chained IConsumeFilter pipeline (src/Core/src/Eventuous.Subscriptions/Filters/ConsumePipe.cs) but this is a secondary internal mechanism, not the primary architecture."