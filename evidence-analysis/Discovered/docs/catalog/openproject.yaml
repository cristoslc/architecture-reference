classification_reasoning: "## Architecture Classification: Modular Monolith\n\nOpenProject\
  \ is a **Modular Monolith** - a single deployable Rails application with enforced\
  \ internal module boundaries through Rails Engines. The architecture provides a\
  \ plugin infrastructure that allows features to be developed and packaged as discrete\
  \ modules while running as a single application.\n\n### Key Evidence\n\n**1. Rails\
  \ Engines as Module Boundaries**\n\nThe `modules/` directory contains 27+ feature\
  \ modules, each implemented as a proper Rails Engine:\n\n- `modules/costs/`, `modules/webhooks/`,\
  \ `modules/storages/`, `modules/github_integration/`, etc.\n- Each module has its\
  \ own: `app/` (models, controllers, views), `config/routes.rb`, `db/migrate/`, `spec/`\n\
  - All extend `Rails::Engine` and include `OpenProject::Plugins::ActsAsOpEngine`\n\
  \n```ruby\n# modules/costs/lib/costs/engine.rb\nmodule Costs\n  class Engine < ::Rails::Engine\n\
  \    include OpenProject::Plugins::ActsAsOpEngine\n    register \"costs\", author_url:\
  \ \"...\", bundled: true do\n      project_module :costs do\n        permission\
  \ :view_time_entries, ...\n      end\n    end\n  end\nend\n```\n\n**2. Plugin Registration\
  \ and Integration Contract**\n\nThe `ActsAsOpEngine` module (`lib/open_project/plugins/acts_as_op_engine.rb`)\
  \ provides a structured integration contract:\n- `register` block for permissions,\
  \ menus, and module registration\n- `patches` method for extending core classes\
  \ from modules\n- `assets` for asset precompilation registration\n- `override_core_views!`\
  \ for view customization\n\n**3. Controlled Core Extension via Patches**\n\nModules\
  \ extend core functionality through a controlled patching mechanism:\n\n```ruby\n\
  # modules/costs/lib/costs/engine.rb\npatches %i[Project User PermittedParams WorkPackage]\n\
  \n# modules/costs/lib/costs/patches/project_patch.rb\nmodule Costs::Patches::ProjectPatch\n\
  \  def self.included(base)\n    base.class_eval do\n      has_many :rates, class_name:\
  \ \"HourlyRate\"\n    end\n  end\nend\n```\n\n**4. Hook System for Event-Based Extension**\n\
  \nThe `OpenProject::Hook` system (`lib/open_project/hook.rb`) provides a listener\
  \ pattern for plugins to extend core behavior without direct coupling:\n- `ViewListener`\
  \ base class for view extensions\n- `render_on` macro for injecting partials at\
  \ hook points\n- Plugins register listeners that respond to named hooks\n\n**5.\
  \ Module Discovery and Loading**\n\nModules are explicitly defined in `Gemfile.modules`\
  \ as path-based gems:\n```ruby\ngroup :opf_plugins do\n  gem 'openproject-auth_plugins',\
  \ path: 'modules/auth_plugins'\n  gem 'costs', path: 'modules/costs'\n  gem 'openproject-webhooks',\
  \ path: 'modules/webhooks'\n  # ... 24 more modules\nend\n```\n\n**6. Single Deployment\
  \ Unit**\n\nThe architecture produces a single deployable artifact:\n- One `Dockerfile`\
  \ (docker/prod/Dockerfile) builds a monolithic Rails application\n- All modules\
  \ are bundled into the same container\n- Single PostgreSQL database shared across\
  \ all modules\n- docker-compose.yml shows backend + worker processes for the same\
  \ codebase\n\n**7. Shared Database, Independent Migrations**\n\nEach module owns\
  \ its database schema via migrations in `modules/*/db/migrate/`, but all share the\
  \ same database:\n- Migrations are aggregated during initialization\n- Modules can\
  \ extend core models (e.g., `Project`, `User`) through patches\n- No service boundaries\
  \ or inter-service communication\n\n### Architecture Within Modules\n\nEach module\
  \ follows a **Layered** pattern internally:\n- Controllers (presentation)\n- Models\
  \ (data access)\n- Services (business logic)\n- Contracts (validation/policies)\n\
  - Views (templates)\n\nThis is standard Rails MVC layered architecture, but it's\
  \ subordinate to the modular monolith structure.\n\n### What This Is NOT\n\n- **NOT\
  \ Microservices**: Single deployment unit, shared database, no inter-service communication\n\
  - **NOT Service-Based**: No coarse-grained services with separate databases\n- **NOT\
  \ Hexagonal**: No ports/adapters isolation pattern; plugins extend core directly\n\
  - **NOT Just Layered**: The module boundary enforcement via Engines is the primary\
  \ architectural feature\n\n### Confidence Assessment\n\nConfidence: 0.95 (Very High)\n\
  \nThe evidence is unambiguous:\n- 27+ Rails Engines with standardized integration\
  \ via `ActsAsOpEngine`\n- Explicit plugin registration, patching, and hook systems\n\
  - Single deployment artifact\n- Shared database across all modules\n- Module discovery\
  \ via Bundler groups\n\nThis is a textbook example of the Modular Monolith pattern\
  \ in Rails, with mature plugin infrastructure evolved from its Redmine heritage."
