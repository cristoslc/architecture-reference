review_notes: 'OpenProject is a classic example of a **Modular Monolith** built on
  the Ruby on Rails framework. While it utilizes a plugin-like system, the architectural
  intent and deployment model firmly place it in the Modular Monolith category.


  ### 1. Modular Monolith (Primary)

  The codebase is structured into a large "core" application and a significant number
  of internal engines located in the `/modules` directory.

  - **Internal Modules:** There are over 30 modules (e.g., `modules/backlogs`, `modules/costs`,
  `modules/calendar`) that represent specific business domains. These are organized
  as Rails Engines, each containing its own `app/`, `lib/`, `config/`, and `db/` (migrations)
  directories.

  - **Dependency Management:** The main `Gemfile` explicitly loads these modules using
  `eval_gemfile "./Gemfile.modules"`. This indicates that while the code is decoupled
  into logical units, it is compiled and executed as a single deployable unit.

  - **Shared Infrastructure:** The `docker-compose.yml` confirms that the production/dev
  environment consists of a single `backend` service (Rails), a `worker` (GoodJob),
  and a `frontend` (Angular). All modules share the same PostgreSQL database and Memcached
  instance.


  ### 2. Layered (Secondary)

  Within both the core and the modules, OpenProject follows a strict horizontal layering
  pattern that extends the standard Rails MVC:'
