review_notes: 'The AppFlowy repository architecture is primarily a **Microkernel (Plugin)**
  system, specifically designed to bridge a Flutter frontend with a highly modular
  Rust backend via a centralized event dispatcher.


  ### 1. Primary Style: Microkernel (Plugin)

  The core of the system is the `AFPluginDispatcher` (found in `lib-dispatch` and
  initialized in `flowy-core`).

  - **Plugin Registry**: In `flowy-core/src/lib.rs`, the `make_plugins` function aggregates
  various high-level modules (Folder, Database, User, Document, Search, AI) and registers
  them as plugins.

  - **Contract-Based Extension**: Each major feature is a separate crate (`flowy-database2`,
  `flowy-document`, etc.). These are not linked via direct function calls from the
  frontend but are accessed through the dispatcher.

  - **Manifests**: The `Flowy.toml` files found in module roots (e.g., `flowy-database2/Flowy.toml`)
  serve as plugin manifests, defining code generation targets for events and protocol
  buffers.


  ### 2. Secondary Style: Hexagonal Architecture (Ports and Adapters)

  The backend is structured to isolate the core business logic from external drivers
  and driven actors.'
