review_notes: "Shopware 6 is structured as a **Modular Monolith** that heavily utilizes\
  \ a **Microkernel (Plugin)** architecture for extensibility. While the repository\
  \ contains multiple internal `composer.json` files (e.g., `src/Core`, `src/Storefront`),\
  \ they are not independently deployable microservices; instead, they represent logical\
  \ module boundaries within a single unified Symfony application.\n\n### 1. Modular\
  \ Monolith\nThe codebase is clearly divided into high-level modules: `Core`, `Storefront`,\
  \ `Administration`, and `Elasticsearch`. \n- **Internal Boundaries:** The root `composer.json`\
  \ uses the `replace` field to treat internal directories as versioned packages (`shopware/core`,\
  \ etc.). This enforced naming and structural separation allows the platform to maintain\
  \ a \"monorepo\" development style while ensuring that logic remains encapsulated\
  \ within specific domains (e.g., `src/Core/Checkout` vs `src/Core/Content`).\n-\
  \ **Single Deployment:** Despite the internal modularity, the system boots a single\
  \ `Kernel.php` (found in `src/Core/Kernel.php`) and is typically deployed as one\
  \ unit via the `shopware/production` or flex templates.\n\n### 2. Microkernel (Plugin)\n\
  The system is designed around a core \"Kernel\" that supports runtime extensions.\
  \ \n- **Extension Points:** The `src/Core/Framework/Plugin.php` class defines the\
  \ contract for external code to hook into the lifecycle (install, activate, update,\
  \ deactivate)."
