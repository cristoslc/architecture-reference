review_notes: 'LLM review of repo structure. src/ contains 4 top-level Symfony bundles
  each with own composer.json and DependencyInjection: Core, Administration, Storefront,
  Elasticsearch. composer.json replace section confirms separately-publishable packages
  (shopware/core, shopware/storefront, etc.) deployed as single monolith. Core internally
  organized into domain modules: Checkout (Cart, Customer, Order, Payment, Promotion,
  Shipping), Content (Product, Category, CMS, Media, Flow, Seo), System (SalesChannel,
  Currency, Tax, User, StateMachine), Framework (DAL, Plugin, MessageQueue, Event,
  API, Rule). Event-driven: Framework/Event has BusinessEventCollector, BusinessEventRegistry,
  and *Aware interfaces. AGENTS.md states Extension Pattern Priority 1 is Events via
  EventSubscriberInterface. Framework/MessageQueue provides async message handling.
  Content/Flow implements visual Flow Builder for business automation. Custom DAL
  replaces Doctrine ORM with EntityDefinition and EntityRepository classes. 139 ADRs
  in adr/ directory. compose.yaml shows single web service + MariaDB + OpenSearch
  + Valkey. Single Kernel.php extends Symfony HttpKernel.'
