classification_reasoning: "## Analysis\n\nShopware is a **Microkernel (Plugin)** architecture\
  \ with a **Layered** secondary style. Here's the evidence:\n\n### Primary: Microkernel\
  \ (Plugin) Architecture\n\n**Core System with Plugin Extension Points:**\n\n1. **Plugin\
  \ Base Class** (`src/Core/Framework/Plugin.php`):\n   - Plugins extend a `Plugin`\
  \ class which inherits from `Bundle`\n   - Lifecycle hooks: `install()`, `activate()`,\
  \ `deactivate()`, `uninstall()`, `update()`\n   - Plugins are discovered and loaded\
  \ by `KernelPluginLoader` at runtime\n\n2. **Kernel Plugin Loading** (`src/Core/Kernel.php`\
  \ lines 80-118):\n   ```php\n   public function registerBundles(): iterable {\n\
  \       // ... loads core bundles\n       yield from $this->pluginLoader->getBundles($kernelParameters,\
  \ $instantiatedBundleNames);\n   }\n   ```\n   The kernel explicitly loads plugins\
  \ dynamically, enabling extension without modifying core.\n\n3. **Decoration Pattern**\
  \ (ADR from 2020-11-25):\n   - Abstract classes with `getDecorated()` method allow\
  \ plugins to wrap/extend core services\n   - Examples: `AbstractCartLoadRoute`,\
  \ `AbstractAppLifecycle`, `AbstractTranslator`\n   - Static analysis rules enforce\
  \ decoration pattern (`DecorationPatternRule.php`)\n\n4. **App System** (`src/Core/Framework/App/`):\n\
  \   - ADR document explicitly states: \"We need a different extension mechanism\
  \ besides the well known plugins\"\n   - Apps register via manifest files, webhooks,\
  \ custom modules\n   - External apps communicate via API without PHP code execution\
  \ (cloud-compatible)\n\n5. **Extension Directories**:\n   - `custom/plugins/` -\
  \ local plugins\n   - `custom/apps/` - app extensions\n   - `custom/static-plugins/`\
  \ - static plugin bundles\n\n### Secondary: Layered Architecture\n\n**Horizontal\
  \ Layering with Symfony MVC:**\n\n1. **Controller Layer**: \n   - `src/Administration/Controller/`\
  \ - Admin API endpoints\n   - `src/Storefront/Controller/` - Storefront endpoints\n\
  \   - `src/Core/Checkout/Cart/` - Cart controllers\n\n2. **Service/Business Logic\
  \ Layer**:\n   - Services in each domain (e.g., `CartService`, `OrderPersister`)\n\
  \   - Route handlers (`AbstractCartLoadRoute`, `CartLoadRoute`)\n\n3. **Data Access\
  \ Layer**:\n   - **Data Abstraction Layer (DAL)** - consistent ORM-like pattern\n\
  \   - Entity definitions (`ProductDefinition`, `CustomerDefinition`, `OrderDefinition`)\n\
  \   - Repository pattern (`EntityRepository`, `SalesChannelRepository`)\n\n4. **Domain\
  \ Organization** within Core:\n   - `Core/Checkout/` - cart, orders, payments, shipping\n\
  \   - `Core/Content/` - products, categories, CMS, media\n   - `Core/System/` -\
  \ users, languages, configuration\n\n### What This is NOT:\n\n- **Not Microservices**:\
  \ Single monolithic Symfony application with one database. All modules deploy together\
  \ as `shopware/platform`.\n\n- **Not Service-Based**: More than 5 modules; deployed\
  \ as single unit; not coarse-grained services sharing a database.\n\n- **Not Event-Driven\
  \ (primary)**: While Flow system exists for business automation (email, state changes),\
  \ it's secondary to the request-response pattern. Events are processed within the\
  \ same process, not via external message brokers.\n\n- **Not Hexagonal**: Uses Symfony's\
  \ standard MVC pattern, not ports-and-adapters with application core isolated from\
  \ infrastructure.\n\n- **Not DDD (primary)**: While domain modules exist (Checkout,\
  \ Content, System), there's no explicit aggregate/entity/value object pattern enforcement.\
  \ Entity definitions are data models, not domain models with behavior.\n\n### Key\
  \ Architectural Evidence:\n\n- **Single Deployable**: `composer.json` packages everything\
  \ as `shopware/platform`\n- **Symfony Framework**: Built on Symfony 7 with bundles\
  \ (Core, Administration, Storefront, Elasticsearch)\n- **Plugin API**: Comprehensive\
  \ extension points via plugins and apps\n- **Runtime Extension**: Plugins loaded\
  \ dynamically; decoration chain allows wrapping services\n\nThe architecture prioritizes\
  \ extensibility through a well-defined plugin system while maintaining a traditional\
  \ layered structure for the core application."
