review_notes: "README describes 'data pipelines that are reproducible, maintainable, and modular.' kedro/pipeline/pipeline.py: Pipeline is 'a collection of Node objects which can be executed as a Directed Acyclic Graph.' kedro/pipeline/node.py: Node wraps pure functions with typed inputs/outputs (filters). kedro/runner/ contains sequential_runner.py, parallel_runner.py, thread_runner.py (pipeline execution strategies). kedro/io/ provides DataCatalog and AbstractDataset as data connectors (pipes). docs/getting-started/architecture_overview.md explicitly describes kedro.pipeline, kedro.runner, and kedro.io as core library components. Textbook pipe-and-filter: independent processing nodes connected by a data catalog in a DAG."