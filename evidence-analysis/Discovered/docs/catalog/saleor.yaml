review_notes: "The Saleor repository is structured as a **Modular Monolith**. While\
  \ the README emphasizes \"API-only Architecture\" and \"Cloud Native\" capabilities,\
  \ the physical code organization in the provided tree confirms a single deployment\
  \ unit (monolith) with a clear, domain-centric modular structure.\n\n### 1. Modular\
  \ Monolith (Primary)\nThe core of the application resides under the `saleor/` directory,\
  \ which is partitioned into high-level domain modules such as `order`, `webhook`,\
  \ and `thumbnail`. \n- **Domain-based Partitioning:** Each folder (e.g., `saleor/order/`)\
  \ contains its own `models.py`, `utils.py`, `tasks/`, and `migrations/`. This indicates\
  \ that while the system is a single Django project, it is strictly organized into\
  \ functional modules that manage their own logic and data schemas.\n- **Shared Infrastructure:**\
  \ The existence of a single `pyproject.toml`, `Dockerfile`, and global `conftest.py`\
  \ indicates a single build and deployment artifact, rather than independently deployable\
  \ microservices.\n- **Enforced Boundaries (Inferred):** The module structure suggests\
  \ a \"Screaming Architecture\" where the top-level directories represent the business\
  \ capabilities.\n\n### 2. Event-Driven (Secondary)\nThe codebase shows heavy investment\
  \ in asynchronous communication and external integration via events:"
