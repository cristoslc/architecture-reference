review_notes: 'Modular Monolith: Single Django application with 20+ domain-specific
  Django apps in INSTALLED_APPS (saleor/settings.py lines 296-332), each with own
  models.py, tasks.py, migrations/, tests/. Single Dockerfile, single manage.py, single
  database via Django ORM. pyproject.toml describes it as ''A modular, high performance,
  headless e-commerce platform''. Event-Driven: saleor/webhook/event_types.py defines
  100+ WebhookEventAsyncType and WebhookEventSyncType events covering all domains.
  Celery worker for async task processing (saleor/celeryconf.py). webhook/transport/
  has asynchronous/ and synchronous/ subdirectories. Events serve as external extensibility
  mechanism via webhooks to apps. README emphasizes API-only extensibility via webhooks,
  subscription queries, and apps. NOT Microservices despite heuristic suggestion --
  single deployable process, shared database, single Django project.'
