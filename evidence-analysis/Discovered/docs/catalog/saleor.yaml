classification_reasoning: "## Architecture Classification: Saleor\n\n### Primary:\
  \ Microkernel (Plugin)\n\nSaleor implements a sophisticated plugin architecture\
  \ that serves as its primary extension mechanism:\n\n**Core Evidence:**\n\n1. **BasePlugin\
  \ Abstract Class** (`saleor/plugins/base_plugin.py:100`):\n   - Defines 50+ extension\
  \ points as callable hooks\n   - Each method follows the `previous_value` pattern\
  \ where plugins receive and can modify values from preceding plugins in the chain\n\
  \   - Example hooks: `order_created`, `calculate_checkout_total`, `authorize_payment`,\
  \ `account_confirmed`, `webhook_notify`\n\n2. **PluginsManager** (`saleor/plugins/manager.py:89`):\n\
  \   - Central orchestrator that discovers, loads, and chains plugin invocations\n\
  \   - Manages plugin lifecycle and configuration per channel\n\n3. **Dynamic Plugin\
  \ Discovery** (`saleor/plugins/__init__.py:6-16`):\n   - `discover_plugins_modules()`\
  \ function loads plugins via `importlib.metadata.entry_points(group=\"saleor.plugins\"\
  )`\n   - External plugins can be registered via Python entry points\n\n4. **Built-in\
  \ Plugins** (`saleor/settings.py:889-906`):\n   - `WebhookPlugin`, `StripeGatewayPlugin`,\
  \ `BraintreeGatewayPlugin`, `AdyenGatewayPlugin`\n   - `AdminEmailPlugin`, `UserEmailPlugin`,\
  \ `OpenIDConnectPlugin`, `AvataxPlugin`\n   - Each extends `BasePlugin` and implements\
  \ specific hooks\n\n5. **Plugin Configuration Model** (`saleor/plugins/models.py`):\n\
  \   - `PluginConfiguration` stores per-channel plugin settings in database\n   -\
  \ Supports `CONFIGURATION_PER_CHANNEL` for multi-tenant scenarios\n\n### Secondary:\
  \ Modular Monolith\n\nSaleor is deployed as a single application with well-organized\
  \ internal module boundaries:\n\n**Evidence:**\n\n1. **Single Deployable Unit**:\n\
  \   - One `Dockerfile` producing a single container image\n   - Single entry point\
  \ via `saleor.asgi:application`\n\n2. **Django Apps as Modules** (`saleor/settings.py:296-339`):\n\
  \   - ~25 Django apps: `product`, `order`, `checkout`, `account`, `payment`, `discount`,\
  \ `giftcard`, `warehouse`, `webhook`, `app`, etc.\n   - Each app has: `models.py`,\
  \ `migrations/`, `tests/`, `tasks.py`, `apps.py`\n\n3. **Module Structure**:\n \
  \  - Each module owns its database tables (via Django migrations)\n   - Each contributes\
  \ GraphQL schema components (`saleor/graphql/*/schema.py`)\n   - Independent test\
  \ suites per module\n\n4. **Shared Database**:\n   - All modules use the same PostgreSQL\
  \ database\n   - No database-per-module isolation\n\n### Rejected Classifications\n\
  \n**Not Microservices**: Single deployment unit, shared database, synchronous in-process\
  \ function calls between modules.\n\n**Not Event-Driven**: Webhooks are external\
  \ notifications, not internal communication. Celery tasks are background jobs, not\
  \ event-sourced domain events. Modules call each other directly.\n\n**Not Layered**:\
  \ No strict presentation/business/data layer separation. GraphQL resolvers interact\
  \ directly with Django models.\n\n**Not Hexagonal**: No explicit ports/adapters\
  \ pattern. Django ORM models used directly throughout without repository abstractions.\n\
  \n**Not Domain-Driven Design**: No aggregate roots, bounded context isolation, or\
  \ ubiquitous language documentation. Modules share database and can import each\
  \ other freely."
