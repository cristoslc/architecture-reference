review_notes: "Classic Clean Architecture (Uncle Bob) with 4 explicit layers: domain/ (entities: article.go, author.go, errors.go), article/ (use case: Service struct with repository interfaces defined consumer-side), internal/rest/ (delivery: HTTP handlers via Echo framework with ArticleService interface), internal/repository/mysql/ (data access: ArticleRepository, AuthorRepository). Dependency rule strictly enforced: domain has zero imports, article/service.go defines repository interfaces it depends on, internal/rest/article.go defines ArticleService interface it consumes. app/main.go wires all layers via constructor injection. Hexagonal traits: ports defined as Go interfaces at consuming layer (article/service.go declares ArticleRepository/AuthorRepository ports; internal/rest/article.go declares ArticleService port), adapters in internal/repository/mysql/ and internal/rest/. README explicitly references Uncle Bob's Clean Architecture concentric circle diagram."