review_notes: "The repository is a textbook implementation of **Hexagonal Architecture**\
  \ (also known as Ports and Adapters), specifically following the \"Clean Architecture\"\
  \ flavor popularized by Robert C. Martin. \n\n### Core Architectural Evidence:\n\
  1.  **Isolation of the Core (Domain):** The `domain/` directory contains entities\
  \ (e.g., `article.go`, `author.go`) and error definitions that have no dependencies\
  \ on external frameworks or infrastructure. This represents the inner-most circle\
  \ of the architecture.\n2.  **Ports (Interfaces):** The project follows the pattern\
  \ of defining interfaces to describe requirements for external components. Version\
  \ 4 of the project (per the README) explicitly moved to \"declare interfaces to\
  \ the consuming side,\" a hallmark of Hexagonal Architecture where the core defines\
  \ the \"ports\" it needs.\n3.  **Adapters (Infrastructure/Delivery):** \n    * \
  \  **Driving Adapters:** The `internal/rest/` directory contains the HTTP delivery\
  \ logic (using the Echo framework), acting as an entry point to the system.\n  \
  \  *   **Driven Adapters:** The `internal/repository/mysql/` directory contains\
  \ the concrete implementations of the persistence interfaces defined in the domain/service\
  \ layers.\n4.  **Dependency Rule:** Dependencies point inwards. The `app/main.go`\
  \ file acts as the \"Composition Root,\" wire-framing the dependencies by instantiating\
  \ the MySQL repository, passing it to the internal service (Usecase), and finally\
  \ injecting that service into the REST handler."
