review_notes: 'Strict layered deps confirmed via .csproj references: Nop.Core (domain+entities,
  zero refs) -> Nop.Data (data access, refs Core) -> Nop.Services (business logic/BAL,
  refs Core+Data) -> Nop.Web.Framework+Nop.Web (MVC presentation, refs all). 30+ plugins
  extend functionality via IPlugin/BasePlugin+domain-specific PluginManagers. In-process
  EventPublisher uses DI-resolved IConsumer<T> (observer pattern, not event-driven
  arch). Single Nop.Web.dll entrypoint per Dockerfile. No RabbitMQ or message broker
  present (false positive from automated discovery). Docker-compose: one web + one
  MSSQL = classic monolith deployment.'
