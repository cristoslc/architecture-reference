classification_reasoning: "## Architecture Analysis: PostHog\n\n### Primary Style:\
  \ Modular Monolith\n\nPostHog is a **Modular Monolith** with enforced internal boundaries.\
  \ The evidence is compelling:\n\n**1. Single Deployable Django Application**\nThe\
  \ main deployment is a single Django application (`posthog/` + `products/`) with\
  \ Celery workers:\n- `docker-compose.hobby.yml` shows a single `web` and `worker`\
  \ service for the Django app\n- All products share the same database (Postgres +\
  \ ClickHouse)\n- `manage.py` at the root confirms a single Django project\n\n**2.\
  \ Explicit Module Boundaries with Enforcement**\nThe `tach.toml` file defines strict\
  \ import boundaries between 40+ products:\n```toml\n[[modules]]\npath = \"products.feature_flags\"\
  \ndepends_on = [\"ee\", \"posthog\"]\nlayer = \"non_isolated\"\n```\nProducts can\
  \ import from `posthog` and `ee` but not from each other, enforced via the `tach`\
  \ tool.\n\n**3. Facade Pattern for Inter-Module Communication**\nPer `products/architecture.md`,\
  \ each product exposes a public interface:\n```\nproducts/<name>/backend/facade/\n\
  \  api.py           # The ONLY file other products may import\n  contracts.py  \
  \   # Frozen dataclasses (stable DTOs)\n```\nInternal implementation (models, logic)\
  \ is private.\n\n**4. Turborepo for Selective Testing**\n`turbo.json` defines `backend:test`\
  \ tasks per product, enabling:\n- Task-level caching\n- Only affected products need\
  \ retesting when contracts change\n\n**5. Product Structure**\nEach of the 40+ products\
  \ in `products/` follows the pattern:\n```\nproducts/feature_flags/\n  backend/\
  \          # Django app (models, logic, API)\n  frontend/         # React/TypeScript\
  \ scenes\n  manifest.tsx      # Route/scene definitions\n  package.json      # Turborepo\
  \ package\n```\n\n### Secondary Style: Service-Based\n\nPostHog supplements the\
  \ monolith with specialized services:\n\n**Rust Services (High-Performance Ingestion)**\n\
  The `rust/` workspace contains 40+ crates including:\n- `capture` - Event capture\
  \ endpoint (handles `/e`, `/batch` routes)\n- `feature-flags` - Feature flag evaluation\
  \ service\n- `capture-logs` - Log ingestion (OpenTelemetry)\n- `hook-worker/hook-janitor`\
  \ - Webhook processing\n- `cyclotron-*` - Job queue system\n- `kafka-*` - Kafka\
  \ infrastructure services\n\nThese are **not microservices** — they're coarse-grained\
  \ services sharing databases with the monolith.\n\n**Standalone Python Services**\n\
  - `services/llm-gateway/` - LLM proxy (FastAPI, separate deployment)\n- `services/mcp/`\
  \ - MCP server (Cloudflare Workers)\n\n**Node.js Services**\n- `services/oauth-proxy/`\
  \ - OAuth handling (Cloudflare Workers)\n- `services/stripe-app/` - Stripe integration\n\
  \n### What It's NOT\n\n- **NOT Microservices**: Services share databases (Postgres,\
  \ ClickHouse, Redis, Kafka); they're coarse-grained (5-6) not fine-grained; main\
  \ app is monolithic\n- **NOT Layered Architecture**: Products are vertical slices,\
  \ not horizontal layers; each product has its own models/logic/API\n- **NOT Hexagonal**:\
  \ Django ORM models are used directly; no ports/adapters abstraction\n- **NOT Serverless**:\
  \ Uses Docker containers with long-running workers; no FaaS deployment\n\n### Communication\
  \ Patterns\n\n- **Kafka** for event ingestion pipeline (capture services → ClickHouse)\n\
  - **Celery** for async task processing within Django monolith\n- **HTTP/REST** between\
  \ services and main app\n- **gRPC** for some Rust service communication\n\n### Summary\n\
  \nPostHog represents a mature **Modular Monolith** with clear product boundaries\
  \ enforced by tooling (`tach`), facades for inter-module communication (frozen dataclasses),\
  \ and selective testing (Turborepo). It supplements this with specialized **Service-Based**\
  \ deployments for high-throughput ingestion (Rust services) and domain-specific\
  \ needs (LLM gateway, MCP server), but the core application remains a single Django\
  \ deployable with strong internal modularity."
