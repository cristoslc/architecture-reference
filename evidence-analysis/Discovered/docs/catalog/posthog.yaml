one_line_summary: "PostHog is an all-in-one product analytics platform built as a deliberate Modular Monolith (single Django app with 40+ tach-enforced product boundaries and facade contracts) over an Event-Driven Kafka/Redpanda ingestion backbone, supplemented by coarse-grained Service-Based Rust and Node.js workers that share the same PostgreSQL and ClickHouse stores."
classification_reasoning: |
  ## Primary Style: Modular Monolith

  The entire product is a single Django deployment (`posthog/` + `products/` + `ee/`) with one
  `manage.py`, one Celery app, and unified Postgres/ClickHouse migrations. The codebase is
  undergoing active modularization across ~40 product slices under `products/`:

  - `tach.toml` (333 lines) declares a dependency graph for every `products.*` module. Products
    in `layer = "products"` (isolated) expose only `facade/api.py` and `facade/contracts.py`
    as their public surface; all other files are private. Products in `layer = "non_isolated"`
    are in transition toward isolation.
  - Each product follows the structure mandated in `products/architecture.md`: `backend/models.py`,
    `backend/logic.py`, `backend/facade/api.py` (frozen dataclasses, no Django imports),
    `backend/presentation/views.py`, and `backend/tasks/`. Each product is registered as a
    Django `AppConfig` via `apps.py`.
  - Turborepo (`turbo.json`) provides task-level caching so only products whose contracts
    changed need to rerun their test suite.
  - The `ee/` directory adds enterprise features as a peer Django module; `tach.toml` treats
    `ee` as a sibling, not a separate deployment.

  ## Strong Secondary Style: Event-Driven

  Kafka/Redpanda is structurally central to the write path, not peripheral:

  - Rust `capture` service (replacing `/e`, `/batch`, `/s` routes) writes ingested events to
    the `events_plugin_ingestion` Kafka topic.
  - Node.js plugin server (`nodejs/src/ingestion/`) is a Kafka consumer that processes events
    through an ordered pipeline (preprocessing → person resolution → property enrichment) before
    writing to ClickHouse and Postgres.
  - `capture-logs` writes OpenTelemetry logs to `logs_ingestion` topic; `property-defs-rs`
    consumes event topics to maintain property definitions without blocking the ingest path.
  - Celery uses Redis as a separate async task broker (operational tasks), while Temporal
    orchestrates long-running batch export and data import workflows with durable retry semantics.
  - Dagster DAGs handle data engineering operations (ClickHouse backfills, materialized columns).

  ## Secondary Style: Service-Based

  PostHog augments the monolith with coarse-grained specialized services that share
  infrastructure (not database-per-service):

  - Rust services: `capture`, `feature-flags` (low-latency evaluation with Postgres + Redis),
    `cymbal` (error tracking with an internal stage pipeline), `property-defs-rs`, `hook-worker`,
    `cyclotron-janitor`, `kafka-assigner`, `personhog-*` (person identity resolution), and
    `embedding-worker`.
  - Node.js plugin server: Kafka-driven event pipeline, Hog function runtime, and CDP
    transformations — shares all databases with Django.
  - `services/llm-gateway` (FastAPI) and `services/mcp` (Cloudflare Workers) are the only
    fully independent deployments with no shared database access.
  - A Caddy reverse proxy acts as the API gateway dispatching `/e`, `/batch`, `/s`, `/flags`,
    `/i/v0/ai`, and `/i/v1/logs` to the appropriate Rust service; all other paths go to Django.

  ## Notable Internal Patterns

  **Pipeline**: Multiple subsystems use discrete, ordered processing stages —
  `nodejs/src/ingestion/pipelines/` for event enrichment; `rust/cymbal/src/stages/` for error
  processing; Temporal batch export activities; CDP Hog Function execution pipeline.

  **CQRS-light read/write separation**: Write path ends at Kafka → ClickHouse; read path is
  Django DRF → HogQL AST compiler → ClickHouse. The `hogql_queries/` directory contains 40+
  `QueryRunner` implementations as an explicit read-path abstraction.

  **AI Agent (emerging)**: `ee/hogai/` implements LangGraph-based AI agents (`chat_agent`,
  `research_agent`) with a `MaxTool` plugin system auto-discovered from
  `products/*/backend/max_tools.py`.

  ## What This Is NOT

  - **NOT Microservices**: All services share the same PostgreSQL, ClickHouse, Redis, and Kafka
    infrastructure. No database-per-service. Service boundaries are coarse-grained (~8 named
    services), not fine-grained per bounded context.
  - **NOT Hexagonal**: `facade/api.py` is an inter-module boundary, not a ports-and-adapters
    abstraction over external dependencies. Django ORM is exposed directly within modules.
  - **NOT Layered**: Primary organization is vertical product slices, not horizontal tiers.
  - **NOT Serverless**: Long-running Docker containers throughout; Cloudflare Workers in
    `services/mcp` and `services/oauth-proxy` are a minor edge concern.
