review_notes: 'Ghostfolio is structured as a **Modular Monolith** within an Nx workspace.
  While it appears to have a distributed personality due to its use of Redis, BullMQ,
  and background workers, the entire application logic is contained within a single
  deployable unit (`apps/api`) and served from a single Docker container (`ghostfolio`).


  ### Primary Style: Modular Monolith

  The repository uses an **Nx Workspace** to manage its code, but at the deployment
  level (as seen in `docker/docker-compose.yml`), there is only one service for the
  application logic (`ghostfolio`). Internally, the NestJS backend (`apps/api/src/app`)
  is organized into discrete domain-specific modules:

  - `AccountModule`, `AssetModule`, `PortfolioModule`, `UserModule`, `OrderModule`,
  etc.

  - Each module encapsulates its own logic, as evidenced by the `app.module.ts` imports.

  - Use of Prisma as a single ORM across these modules further reinforces the monolithic
  database approach, despite the logical separation of domains in the folder structure.


  ### Secondary Style: Layered

  Within the individual modules and across the shared services, the codebase follows
  a traditional **Layered** architecture:'
