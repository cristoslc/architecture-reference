one_line_summary: "Open-source wealth management PWA built as a NestJS modular monolith (single Docker image serving API + Angular client) with consistent three-tier layering across 30+ feature modules, Redis caching, and a pluggable 9-provider market data abstraction."
classification_reasoning: "Ghostfolio is classified as Modular Monolith (primary) + Layered (co-primary). MODULAR MONOLITH (primary, 0.93): A single NestJS process compiles into one Docker image that serves both the REST API and the built Angular client via ServeStaticModule. docker/docker-compose.yml has exactly one application container. All ~30 feature modules share one DI container, one Prisma/PostgreSQL connection, and one Redis connection — there is no inter-service communication, no service discovery, and no API gateway between backend components. The Nx monorepo (apps/api, apps/client, libs/common, libs/ui) builds to a single deployable artifact. LAYERED (co-primary, 0.88): Layering is system-wide and structural, not just an internal module implementation detail. Every feature module enforces the same three-tier boundary: HTTP controllers (with NestJS guards, interceptors, validation pipes) -> service classes (all business logic) -> PrismaService (data access). PortfolioModule exemplifies this: portfolio.controller.ts (674 lines, HTTP boundary) -> portfolio.service.ts (2247 lines, domain logic) -> Prisma (data). PortfolioCalculatorFactory adds a strategy sub-layer within the domain tier for financial calculation abstraction (MWR, TWR, ROAI, ROI). libs/common and libs/ui form explicit cross-cutting library layers separate from application code. RULED OUT — Event-Driven: Only two @nestjs/event-emitter events exist (PortfolioChangedEvent, AssetProfileChangedEvent), both exclusively for debounced Redis cache invalidation. No broader event mesh or cross-module business logic coordination via events. Bull queues (DataGatheringQueue, PortfolioSnapshotQueue) are infrastructure background processing, not a structural integration mechanism. RULED OUT — Microservices: No @nestjs/microservices usage, no MessagePattern, no gRPC, no independently deployable backend services."
