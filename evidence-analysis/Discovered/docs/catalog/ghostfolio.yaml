review_notes: "Modular Monolith: Nx workspace (nx.json) with apps/api + apps/client + libs/common + libs/ui. Single NestJS process (apps/api/src/app/app.module.ts) imports 30+ feature modules (PortfolioModule, OrderModule, AdminModule, AccountModule, etc.) each with own controller/service/module triad (e.g. apps/api/src/app/portfolio/). Shared libs (libs/common/src/lib/) provide cross-cutting types, helpers, config. Single Dockerfile builds one container; docker-compose.yml runs one app service + postgres + redis. DataProviderInterface (apps/api/src/services/data-provider/interfaces/data-provider.interface.ts) with 10+ implementations (yahoo-finance, coingecko, alpha-vantage, etc.) shows strategy pattern within the monolith. Layered: Clear presentation/business/data layering. Controllers handle HTTP concerns (apps/api/src/app/portfolio/portfolio.controller.ts with guards, interceptors, decorators). Services contain business logic (portfolio.service.ts, order.service.ts). Prisma ORM provides data access layer (prisma/schema.prisma with 15+ models). Interceptors form cross-cutting middleware layer (apps/api/src/interceptors/). Event-driven aspects are lightweight internal glue (apps/api/src/events/ with EventEmitterModule, PortfolioChangedListener invalidates cache) and Bull job queues (apps/api/src/services/queues/data-gathering/) for background data gathering -- these are implementation details within the monolith, not a primary architectural style."