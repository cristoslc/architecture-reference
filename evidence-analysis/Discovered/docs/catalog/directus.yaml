review_notes: "Evidence: README.md describes 'real-time API and App dashboard for managing SQL database content.' pnpm-workspace.yaml defines monorepo with 5 top-level workspaces (api/, app/, sdk/, directus/, packages/*) plus ~30 internal packages under packages/. api/src/ has clear layered structure: controllers/ (38 route handlers), services/ (40+ domain services like items.ts, users.ts, files.ts), middleware/ (auth, cache, rate-limiter, schema), and database/ (migrations, helpers, query AST). Services implement AbstractService interface and follow uniform CRUD pattern with Knex-based data access. api/src/emitter.ts implements a 3-channel EventEmitter2-based event bus (filter/action/init) used throughout for hook-based extensibility. api/src/flows.ts provides a FlowManager with trigger handlers and operation pipelines. packages/ contains well-separated concerns: storage/ with abstract Driver class, storage-driver-{s3,gcs,azure,local,cloudinary,supabase} driver implementations, extensions/ for plugin system, auth/drivers/ with local/oauth2/openid/ldap/saml providers. docker-compose.yml provides dev infrastructure only (7 DB vendors, Redis, Minio, Keycloak). Single deployable artifact via directus/ package which wraps @directus/api."