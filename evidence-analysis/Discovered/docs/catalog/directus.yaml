classification_reasoning: >-
  ## Architecture Analysis: Directus


  ### Primary Style: Microkernel (0.93)


  The defining architectural characteristic of Directus is its extension system — a
  comprehensive microkernel pattern where a stable core is augmented through fourteen
  well-typed plugin categories loaded and managed at runtime.


  **Key Evidence:**


  1. **ExtensionManager** (`api/src/extensions/manager.ts`): Central class that discovers
     extensions from three sources (local filesystem, npm modules, and an external registry),
     compiles them at runtime using Rollup/Rolldown, manages their full lifecycle
     (`initialize()`, `reload()`, `uninstall()`), and broadcasts reload notifications across
     cluster nodes via the Redis-backed message bus. `EXTENSIONS_AUTO_RELOAD` enables
     hot-swap without process restart.


  2. **Fourteen typed extension categories** (`packages/types/src/extensions/`): Hooks
     (filter/action/init/schedule), Endpoints (Express Router mounts), Operations (flow step
     handlers), Interfaces, Displays, Layouts, Modules, Panels, Bundles, and Themes.


  3. **Sandboxed execution** (`api/src/extensions/lib/sandbox/`): API extensions run inside
     `isolated-vm` isolates with a controlled `directus:api` SDK surface, preventing untrusted
     third-party code from escaping the process boundary.


  4. **Plugin driver pattern for infrastructure**: Five interchangeable storage drivers
     (`packages/storage-driver-{local,s3,gcs,azure,cloudinary}/`), five auth providers
     (`api/src/auth/drivers/`: local, oauth2, openid, ldap, saml), and two deployment
     providers (`api/src/deployment/drivers/`: netlify, vercel) are all replaceable plugins.


  5. **Extensions SDK** (`packages/extensions-sdk/`): `directus-extension` CLI with
     scaffold templates and Rollup/Vite build tooling; `@directus/extensions-registry`
     marketplace for third-party plugin discovery.


  ### Secondary Style: Layered (0.90)


  Within the single deployable unit, Directus enforces strict horizontal layering:


  - **HTTP Entry Layer**: Express app (`api/src/app.ts`) composes 30+ routers, one per
    resource type (`controllers/items.ts`, `controllers/graphql.ts`, `controllers/mcp.ts`, etc.)
  - **Service Layer**: Business logic encapsulated in `api/src/services/` — `items.ts`
    (1,239 lines), `fields.ts` (1,043 lines), `collections.ts` (844 lines), etc.
  - **Data Access Layer**: Knex.js in `api/src/database/` abstracts across seven SQL
    engines (PostgreSQL, MySQL, SQLite, OracleDB, CockroachDB, MariaDB, MS-SQL)
  - **Cross-cutting Layer**: `api/src/middleware/` handles authentication, caching, CORS,
    rate limiting, query sanitization, and schema resolution

  Controllers never touch the database; services never emit HTTP responses.


  ### Supporting Style: Pipeline (0.82)


  The Flows subsystem implements a user-configurable data processing pipeline:


  - `packages/types/src/flows.ts` defines `Flow` with a `TriggerType` (`event`, `schedule`,
    `webhook`, `operation`, `manual`) and a linked `Operation` chain with `resolve`/`reject`
    successors forming a DAG.
  - Fifteen built-in operation types in `api/src/operations/` (`condition`, `exec`,
    `item-create`, `item-delete`, `item-read`, `item-update`, `json-web-token`, `log`,
    `mail`, `notification`, `request`, `sleep`, `throw-error`, `transform`, `trigger`).
  - Custom Operation types are an extension point — third-party pipeline steps pluggable
    via the same microkernel extension system.
  - `FlowManager` (`api/src/flows.ts`) uses `useBus()` (Redis pub/sub or local EventEmitter)
    for cluster-wide flow reload coordination.


  ### What Was Rejected


  **NOT Microservices**: Single Dockerfile produces one deployable unit; PM2 cluster mode
  runs multiple Node.js workers sharing a single port; `docker-compose.yml` is a
  multi-database developer test fixture (7 DB engines), not service decomposition.


  **NOT Event-Driven (primary)**: The EventEmitter2-based emitter (`api/src/emitter.ts`)
  and the message bus exist to support the plugin architecture and flow triggers — they are
  mechanisms, not the primary integration pattern. There are no independent event-consuming
  services; all handlers run within the same process.


  **NOT Modular Monolith (DDD sense)**: No bounded contexts or aggregates pattern. Services
  are organized by resource entity (Items, Users, Fields), not by business domain context.
  Frontend "modules" (`app/src/modules/`) are Vue.js routing modules, not backend domain
  boundaries.


  ### Summary


  Directus is a **microkernel architecture** with a layered internal core and a pipeline
  subsystem for user-defined automation. The extension system is the primary architectural
  principle: well-defined plugin contracts, runtime lifecycle management, security isolation
  via `isolated-vm`, and an ecosystem SDK and marketplace. The layered core provides
  predictable change isolation between HTTP, business logic, and data access. The Flows
  pipeline adds configurable automation without custom code.
