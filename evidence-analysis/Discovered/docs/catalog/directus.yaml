classification_reasoning: "## Architecture Analysis: Directus\n\n### Primary Style:\
  \ Microkernel (Plugin)\n\nThe defining architectural characteristic of Directus\
  \ is its **extension system** — a robust microkernel pattern where a core system\
  \ is extended through well-defined plugin interfaces.\n\n**Key Evidence:**\n\n1.\
  \ **Extension Manager** (`api/src/extensions/manager.ts`):\n   - Central `ExtensionManager`\
  \ class that dynamically loads, registers, and unloads extensions at runtime\n \
  \  - Supports three extension sources: local filesystem, npm modules, and external\
  \ registry\n   - Hot-reload capability via `EXTENSIONS_AUTO_RELOAD` environment\
  \ variable\n   - Lifecycle management: `initialize()`, `reload()`, `uninstall()`,\
  \ `broadcastReloadNotification()`\n\n2. **Multiple Extension Types** (`packages/types/src/extensions/`):\n\
  \   - **Hooks** — Filter/action/init/schedule handlers (`hooks.ts`)\n   - **Endpoints**\
  \ — Custom REST API endpoints via Express Router (`endpoints.ts`)\n   - **Operations**\
  \ — Flow operation handlers (`operations.ts`)\n   - **Interfaces** — Form field\
  \ UI components (`interfaces.ts`)\n   - **Displays** — Value display components\
  \ (`displays.ts`)\n   - **Layouts** — Collection view layouts (`layouts.ts`)\n \
  \  - **Modules** — Complete application modules with routes (`modules.ts`)\n   -\
  \ **Panels** — Dashboard panels (`panels.ts`)\n   - **Themes** — Visual theming\
  \ (`themes.ts`)\n\n3. **Extension SDK** (`packages/extensions-sdk/`):\n   - CLI\
  \ tool (`directus-extension`) for scaffolding and building extensions\n   - Templates\
  \ for creating new extensions\n   - Build tooling using Rollup/Vite for bundling\n\
  \n4. **Sandboxed Extension Execution** (`api/src/extensions/lib/sandbox/`):\n  \
  \ - API extensions run in isolated-vm for security\n   - Controlled API surface\
  \ exposed to extensions via `directus:api` module\n   - Request, sleep, log functions\
  \ provided to sandboxed code\n\n5. **Plugin Pattern for Infrastructure**:\n   -\
  \ **Storage Drivers**: `@directus/storage` with pluggable drivers (S3, GCS, Azure,\
  \ Cloudinary, Local, Supabase)\n   - **Auth Providers**: Local, OAuth2, OpenID,\
  \ LDAP, SAML (`api/src/auth/drivers/`)\n   - **Deployment Providers**: Netlify,\
  \ Vercel (`api/src/deployment/drivers/`)\n\n### Secondary Style: Layered\n\nWithin\
  \ the core monolith, Directus employs a traditional layered architecture:\n\n**Layers\
  \ in the API** (`api/src/`):\n- **Controllers** — HTTP request handling (`controllers/*.ts`)\n\
  - **Services** — Business logic (`services/*.ts`)  \n- **Database** — Data access\
  \ with migrations (`database/`)\n- **Middleware** — Cross-cutting concerns (`middleware/`)\n\
  \n**Monorepo Structure**:\n- `api/` — Backend (Express + Knex)\n- `app/` — Frontend\
  \ (Vue.js)\n- `sdk/` — JavaScript SDK\n- `packages/` — 20+ shared packages (types,\
  \ utils, storage, etc.)\n\n### Supporting Pattern: Event-Driven (Minor)\n\nAn event\
  \ emitter system supports cross-cutting concerns:\n- `api/src/emitter.ts` — EventEmitter2-based\
  \ with filter/action/init channels\n- Flows can be triggered by events (`api/src/flows.ts`)\n\
  - Extensions can register hooks for system events\n\nHowever, this event system\
  \ primarily **supports the plugin architecture** rather than being the primary integration\
  \ mechanism.\n\n### What Was Rejected\n\n**NOT Microservices:**\n- Single Dockerfile\
  \ producing one deployable unit\n- One Express server (`api/src/app.ts`)\n- Single\
  \ database connection\n- `docker-compose.yml` is for development only (multiple\
  \ databases for testing)\n\n**NOT Modular Monolith (DDD sense):**\n- No bounded\
  \ contexts or aggregates pattern\n- Frontend \"modules\" (`app/src/modules/`) are\
  \ UI routing modules, not backend domain modules\n- Services are organized by entity\
  \ (Items, Users, Files) not by domain context\n\n**NOT Serverless:**\n- Traditional\
  \ Node.js server deployment\n- PM2 for process management\n- No serverless.yml or\
  \ SAM templates\n\n### Summary\n\nDirectus is a **microkernel architecture** with\
  \ a layered internal structure. The extension system is not an afterthought — it's\
  \ the core architectural principle. The system provides:\n\n1. Well-defined extension\
  \ points via typed APIs\n2. Runtime plugin loading and lifecycle management\n3.\
  \ Security isolation for untrusted extensions\n4. Multiple extension categories\
  \ covering both backend and frontend customization\n5. An ecosystem marketplace\
  \ (`@directus/extensions-registry`)\n\nThis architecture allows Directus to be \"\
  completely extensible\" as stated in its README, enabling white-label CMS customization\
  \ without forking the core."
