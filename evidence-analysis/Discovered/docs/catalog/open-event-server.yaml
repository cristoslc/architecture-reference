one_line_summary: >
  A Flask-based event management backend organized as a layered modular monolith
  with JSON:API REST, GraphQL, Celery async tasks, and PostgreSQL persistence.
classification_reasoning: >
  The codebase is structured into four explicit horizontal layers: API/presentation
  (Flask blueprints, flask-rest-jsonapi ResourceList/Detail/Relationship views),
  serialization (Marshmallow-JSONAPI schemas in app/api/schema/), service/helper
  (cross-cutting concerns in app/api/helpers/ covering auth, mail, payment, tasks,
  storage), and persistence (SQLAlchemy ORM models in app/models/ backed by a
  single PostgreSQL database). This layered separation is consistent across all 93
  resource modules and is enforced structurally. At the same time, each domain
  feature (events, sessions, speakers, tickets, orders, attendees, etc.) is
  self-contained across coordinated route, schema, and model files, making this a
  Modular Monolith — all modules share one process, one database connection pool,
  and one SQLAlchemy session with no inter-service network boundaries. Celery with
  Redis handles background async work (email, PDF generation, exports, scheduled
  notifications), and a separate FastAPI ASGI app provides WebSocket real-time
  support via Redis pub-sub, but neither constitutes a domain-level event-driven or
  service-oriented split. Microservices, Event-Driven, and Service-Based are ruled
  out by the absence of a service mesh, inter-service RPC, or domain event bus.
