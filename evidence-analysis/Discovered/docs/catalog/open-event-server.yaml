review_notes: 'The **Open Event Server** is a classic example of a **Layered Architecture**
  (specifically a Web API Monolith). The codebase is organized into horizontal functional
  layers that separate data definitions, business logic/transports, and configuration.


  ### Primary Style: Layered

  The repository follows a strict horizontal separation of concerns typical of large-scale
  Flask applications:

  1.  **Data Layer (`app/models/`):** A centralized directory containing over 80 SQLAlchemy
  model files (e.g., `event.py`, `user.py`, `ticket.py`). These models define the
  schema and relationships but do not contain significant business logic or service
  boundaries.

  2.  **API/Transport Layer (`app/api/`):** This layer handles the [JSON:API Spec](http://jsonapi.org/)
  compliance. Files like `events.py` and `sessions.py` act as controllers, managing
  request parsing, serialization via schemas, and high-level orchestration.

  3.  **View Layer (`app/views/`):** Handles traditional web concerns, health checks,
  and integrations with external stores like Redis and Elasticsearch.

  4.  **Common Services/Extensions (`app/extensions/`):** Centralized initialization
  of cross-cutting concerns like rate limiting (`limiter.py`) and database connections.


  The deployment model confirmed in `docker-compose.yml` supports this; while there
  is a `web` service and a `celery` service, they both run from the same image (`eventyay/open-event-server:development`)
  and share the same codebase and database, indicating a monolithic deployment where
  different processes simply execute different entry points of the same application.'
