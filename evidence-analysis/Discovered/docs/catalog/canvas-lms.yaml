classification_reasoning: "The Canvas LMS codebase is a high-scale **Modular Monolith**\
  \ built on the Ruby on Rails framework. While it follows traditional Rails horizontal\
  \ layering (Models, Controllers, Views), it employs sophisticated internal modularization\
  \ strategies to manage its massive scale.\n\n### Architecture Breakdown\n\n**1.\
  \ Modular Monolith (Primary Style):**\nThe repository is a single deployable unit,\
  \ but it heavily utilizes a \"local gem\" strategy to enforce module boundaries.\
  \ The `gems/` directory contains over 40 internal libraries (e.g., `gems/event_stream`,\
  \ `gems/lti_outbound`, `gems/canvas_quiz_statistics`). These are not standard third-party\
  \ dependencies; they are decoupled business logic and utility components authored\
  \ specifically for Canvas. \n- **Enforcement:** The `Gemfile` dynamically loads\
  \ these local gems. This separation ensures that core system components (like `canvas_quiz_statistics`)\
  \ have their own test suites and dependency graphs, preventing the \"Big Ball of\
  \ Mud\" often found in large Rails apps.\n- **Code Ownership:** The presence of\
  \ `config/code_ownership.yml` further indicates a modular approach where specific\
  \ teams own discrete sections of the monolithic codebase.\n\n**2. Microkernel /\
  \ Plugin Architecture (Secondary Style):**\nCanvas implements a robust plugin system\
  \ located in `gems/plugins/`.\n- **Evidence:** The directory `gems/plugins/` contains\
  \ optional features like `academic_benchmark`, `moodle_importer`, and `account_reports`.\
  \ \n- **Mechanism:** The `Gemfile` shows logic to evaluate `_before.rb` and `Gemfile.d/*.rb`\
  \ files from these plugins, allowing them to hook into the core system at boot time\
  \ without modifying the core codebase directly. This aligns with the Microkernel\
  \ pattern where a stable core is extended via specialized modules.\n\n**3. Layered\
  \ (Secondary Style):**\nAt its core, it remains a Ruby on Rails application. The\
  \ `app/` directory follows the standard Model-View-Controller (MVC) pattern. \n\
  - **Business Logic:** Much of the core domain logic resides in `app/models` (though\
  \ not shown in full, the standard Rails structure is evident).\n- **Presentation:**\
  \ The `app/messages/` directory shows an extensive set of notification templates\
  \ (`.erb`), and the `ui/` directory indicates a complex frontend layered on top\
  \ of the backend API.\n\n### Significant Design Patterns\n- **Frontend Modularization:**\
  \ The `ui/features/` directory mirrors the modular intent of the backend, organizing\
  \ React/TypeScript code by feature (e.g., `speed_grader`, `calendar`) rather than\
  \ technology.\n- **Service Integration:** While not a microservices architecture,\
  \ the codebase is designed to interact with numerous external services via configuration\
  \ (e.g., `config/amazon_s3.yml`, `config/dynamodb.yml`, `config/sentry.yml`), showing\
  \ a \"Service-Oriented Monolith\" tendency where heavy lifting (like job processing\
  \ or file storage) is offloaded.\n\n### Rejection of Other Styles\n- **Microservices:**\
  \ All core components and \"gems\" are contained within a single repository and\
  \ typically share a primary database (`config/database.yml`), ruling out a true\
  \ Microservices architecture.\n- **Hexagonal:** While the separation into gems provides\
  \ some isolation, the app does not strictly follow the Ports and Adapters pattern;\
  \ models are still heavily coupled to ActiveRecord and the database."
