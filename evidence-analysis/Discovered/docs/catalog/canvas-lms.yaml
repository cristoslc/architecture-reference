classification_reasoning: "## Analysis\n\n**Primary Style: Layered (MVC)**\n\nCanvas\
  \ LMS is a classic Ruby on Rails monolithic application with a traditional layered\
  \ MVC architecture:\n\n- **Controllers Layer** (`app/controllers/`): 220+ controller\
  \ files handling HTTP routing and request processing. The `ApplicationController`\
  \ serves as the base, with controllers like `accounts_controller.rb` (109,918 lines),\
  \ `assignments_controller.rb`, etc.\n  \n- **Models Layer** (`app/models/`): 330+\
  \ ActiveRecord model files (~82,614 total lines of model code) representing domain\
  \ entities like `Account`, `Course`, `Assignment`, `User`, `Enrollment`. Models\
  \ use ActiveRecord ORM with direct database relationships (e.g., `Account` has_many\
  \ `:courses`, `:enrollments`, `:sub_accounts`).\n\n- **Views Layer** (`app/views/`):\
  \ Traditional Rails view templates with ERB files for rendering HTML.\n\n- **Helpers**\
  \ (`app/helpers/`): 75+ helper modules for view logic extraction.\n\n- **Services**\
  \ (`app/services/`): Service objects for complex business operations (e.g., `GradeService`,\
  \ `VideoCaptionService`).\n\n- **Serializers/Presenters**: Additional layers for\
  \ JSON API responses and presentation logic.\n\n**Secondary Style: Microkernel (Plugin)**\n\
  \nCanvas implements a plugin architecture through Rails Engines:\n\n1. **Plugin\
  \ Discovery**: `Gemfile.d/plugins.rb` loads plugins from `gems/plugins/*`\n\n2.\
  \ **Plugin Registration**: Each plugin registers via `Canvas::Plugin.register`:\n\
  \   ```ruby\n   # gems/plugins/qti_exporter/lib/qti_exporter/engine.rb\n   Canvas::Plugin.register\
  \ :qti_converter, :export_system, {\n     name: \"QTI Converter\",\n     settings:\
  \ { worker: \"QtiWorker\", provides: { qti: Qti::Converter } }\n   }\n   ```\n\n\
  3. **Six Bundled Plugins**:\n   - `academic_benchmark` - Academic standards importer\n\
  \   - `account_reports` - Account-level reporting functionality\n   - `moodle_importer`\
  \ - Moodle course migration\n   - `qti_exporter` - QTI quiz format conversion\n\
  \   - `respondus_soap_endpoint` - Respondus integration\n   - `simply_versioned`\
  \ - Versioning support\n\n4. **Plugin Contract**: Each plugin is a Rails Engine\
  \ that:\n   - Defines a `config.to_prepare` block\n   - Registers with the `Canvas::Plugin`\
  \ system with metadata, settings, and capabilities\n   - Can provide views (`app/views/`),\
  \ configuration, and domain logic\n   - Integrates into specific extension points\
  \ (e.g., `:export_system` tag)\n\n5. **Core Plugin System** (`lib/base/canvas/plugin.rb`):\
  \ Manages plugin lifecycle, settings, validation, and discovery via `Canvas::Plugin.find`,\
  \ `Canvas::Plugin.all_for_tag(tag)`.\n\n**What I Rejected:**\n\n- **Microservices**:\
  \ Single deployable Rails app, single PostgreSQL database, no service boundaries.\
  \ Docker Compose shows one `web` service and background `jobs` worker.\n\n- **Modular\
  \ Monolith**: No enforced module boundaries or internal domain separation. While\
  \ internal gems exist (~50 in `gems/`), they're organizational utilities, not bounded\
  \ contexts. The plugin system is for external extensions, not internal modularization.\n\
  \n- **Event-Driven**: `LiveEventsObserver` exists for analytics/integration event\
  \ emission, but events don't drive application flow. The observer pattern is a supplementary\
  \ feature.\n\n- **Domain-Driven Design**: No aggregates, value objects, or bounded\
  \ contexts. Models are ActiveRecord with anemic domain logic focused on database\
  \ persistence.\n\n- **Hexagonal Architecture**: No ports/adapters isolation. ActiveRecord\
  \ models directly couple to the database; controllers directly instantiate models.\n\
  \n**Evidence Summary:**\n- Single `Dockerfile` building one application image\n\
  - 85,000+ lines of controller code, 82,000+ lines of model code in classic MVC layers\n\
  - Plugin system with 6 extensions using `Rails::Engine` + `Canvas::Plugin.register`\n\
  - Single database with migrations in `db/migrate/`\n- `config.ru` runs `CanvasRails::Application`\
  \ as the sole entry point"
