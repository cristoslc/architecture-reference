one_line_summary: >-
  Large-scale Ruby on Rails LMS deploying as a single process, modularised
  through ~55 local gems and a formal Canvas::Plugin microkernel registry for
  runtime extension.
classification_reasoning: >-
  Canvas LMS is classified as a Modular Monolith + Microkernel. It is a single
  deployable Rails application (one Dockerfile, one CanvasRails::Application
  entry point, one PostgreSQL database) that manages internal complexity through
  ~55 local Ruby gems in gems/ (each with independent Gemfile, Rakefile, and
  test suites), mirrored by 234 React feature bundles and 230 shared UI
  libraries as Yarn workspaces. This is an intentional Modular Monolith
  strategy enforced by code ownership files (CODEOWNERS, config/teams/) and
  gem-level dependency declarations. The secondary Microkernel pattern is
  explicit: Canvas::Plugin.register(id, tag, meta) acts as a runtime extension
  registry; six bundled Rails Engine plugins (academic_benchmark,
  account_reports, moodle_importer, qti_exporter, respondus_soap_endpoint,
  simply_versioned) register into tagged extension points (:export_system,
  :account_report, etc.) via config.to_prepare blocks, and plugin pre-routes
  are injected at boot time. LiveEventsObserver emits events for 40+ domain
  models to AWS Kinesis for downstream analytics consumers, but events do not
  drive intra-application flow, so Event-Driven was rejected as a top-level
  style. Microservices, Service-Based, Hexagonal, DDD, and CQRS were all
  rejected: there are no independent deployable services, no ports/adapters
  isolation, no aggregates or bounded contexts in the DDD sense, and no
  segregated command/query pipelines. Confidence is 0.88 rather than higher
  because gem boundaries are soft in Rails (shared ActiveRecord models can
  cross gem lines) and the service-layer extraction in app/services/ is not
  yet architecturally consistent.
