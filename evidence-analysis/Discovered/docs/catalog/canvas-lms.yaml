review_notes: "The Canvas LMS codebase is a high-scale **Modular Monolith** built\
  \ on the Ruby on Rails framework. While it follows traditional Rails horizontal\
  \ layering (Models, Controllers, Views), it employs sophisticated internal modularization\
  \ strategies to manage its massive scale.\n\n### Architecture Breakdown\n\n**1.\
  \ Modular Monolith (Primary Style):**\nThe repository is a single deployable unit,\
  \ but it heavily utilizes a \"local gem\" strategy to enforce module boundaries.\
  \ The `gems/` directory contains over 40 internal libraries (e.g., `gems/event_stream`,\
  \ `gems/lti_outbound`, `gems/canvas_quiz_statistics`). These are not standard third-party\
  \ dependencies; they are decoupled business logic and utility components authored\
  \ specifically for Canvas. \n- **Enforcement:** The `Gemfile` dynamically loads\
  \ these local gems. This separation ensures that core system components (like `canvas_quiz_statistics`)\
  \ have their own test suites and dependency graphs, preventing the \"Big Ball of\
  \ Mud\" often found in large Rails apps.\n- **Code Ownership:** The presence of\
  \ `config/code_ownership.yml` further indicates a modular approach where specific\
  \ teams own discrete sections of the monolithic codebase.\n\n**2. Microkernel /\
  \ Plugin Architecture (Secondary Style):**"
