review_notes: 'README describes "Actor framework for Rust" with typed message passing.
  actix/src/actor.rs defines the Actor trait with Started/Stopping/Stopped lifecycle
  states. actix/src/address/ implements typed addresses (Addr<A>) for location-
  transparent message sending. actix/src/context.rs provides actor execution context
  with mailbox processing. actix/src/supervisor.rs implements supervision trees —
  actors can supervise child actors and restart them on failure. actix/src/arbiter.rs
  manages actor event loops (one per thread). Message handling via Handler<M> trait
  with async support (actix/src/handler.rs). actix/src/registry.rs provides actor
  registry for service location. Each actor is an independent processing unit with
  its own mailbox, state, and lifecycle — the core Space-Based pattern. Event-Driven
  because all inter-actor communication is asynchronous message passing through
  typed mailboxes with backpressure.'
