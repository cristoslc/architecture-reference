one_line_summary: Community forum platform built on a Microkernel plugin system atop a Layered Rails core, where 43+ plugins deliver major features (chat, AI, polls) through ~172 formal extension hooks without touching core source.
classification_reasoning: |
  ## Analysis

  Discourse is a Ruby on Rails community/forum platform whose primary architectural expression is the **Microkernel (Plugin)** style, with **Layered** as a clear and deliberate secondary style.

  ### Primary Style: Microkernel (Plugin)

  The plugin system is the dominant organizational principle, not a convenience mechanism:

  **Plugin API Surface** (`lib/plugin/instance.rb`):
  - 1,662-line `Plugin::Instance` class with 172+ named registration methods
  - Methods include `register_asset`, `add_to_serializer`, `add_admin_route`, `register_modifier`, `after_initialize`, `reloadable_patch`, `register_locale`, `register_svg_icon`, and ~165 more
  - Each hook is a formal, named extension point the core fires and plugins subscribe to

  **Plugin Registry** (`lib/discourse_plugin_registry.rb`):
  - `define_register` / `define_filtered_register` class macros generate typed, plugin-aware registers
  - Filtered registers enforce `plugin.enabled?` at every lookup — runtime enable/disable with no rebuild
  - Covers auth providers, javascripts, stylesheets, custom fields, reviewable types, and more

  **Event Bus** (`lib/discourse_event.rb`):
  - `DiscourseEvent.on(:event_name) { }` / `DiscourseEvent.trigger(:event_name, ...)` pub/sub
  - 102+ trigger sites in app/ — core fires events, plugins subscribe to inject cross-cutting logic

  **Plugin Bootstrap** (`config/application.rb`):
  - Plugin activation is a first-class initialization concern (`Discourse.activate_plugins!`)
  - Plugins can register custom setting providers before main boot via `register_provider.rb`

  **Scale of Feature Delivery via Plugins** (`plugins/`):
  - 43 bundled plugins (chat, discourse-ai, poll, automation, calendar, gamification, etc.)
  - 85 official external plugins listed in `config/official_plugins.json`
  - Major product features — real-time chat, AI assistant, polls, calendar — live entirely in plugins with their own `app/`, `lib/`, `db/`, `config/` structures and database migrations
  - Plugin activation/deactivation is an admin site-setting toggle, not a deployment event

  **Representative Plugin** (`plugins/chat/plugin.rb`):
  ```ruby
  enabled_site_setting :chat_enabled
  after_initialize do
    reloadable_patch do |plugin|
      Guardian.prepend Chat::GuardianExtensions
      UserNotifications.prepend Chat::UserNotificationsExtension
      Category.prepend Chat::CategoryExtension
      # ... more extensions
    end
  end
  ```

  ### Secondary Style: Layered (Rails MVC + Service Layer)

  The core Rails application and each plugin replicate a strict four-layer hierarchy:

  - **Controllers** (86+ files in `app/controllers/`): HTTP boundary, auth enforcement, request/response
  - **Services** (76 service objects in `app/services/`): Business logic via `Service::Base` pipeline DSL (`policy`, `params`, `model`, `step`, `transaction` declarations)
  - **Models** (279 files in `app/models/`): ActiveRecord persistence and domain logic
  - **Serializers** (219 files in `app/serializers/`): API response formatting and field projection

  The `Service::Base` DSL is particularly mature — it enforces explicit data flow, authorization policies, and transactional boundaries in a declarative, testable form. This is not incidental Rails scaffolding; it is a deliberate architectural commitment.

  ### Supporting Mechanisms

  **Event-Driven**: `DiscourseEvent` (in-process, 102+ trigger sites), `MessageBus` (real-time browser delivery via WebSocket/long-poll, 116 publish sites), and Sidekiq (216 background jobs across regular/scheduled/onceoff queues) provide event-driven capabilities within and between layers. These are implementation mechanisms, not a primary organizing style.

  **Background Processing**: Sidekiq with dedicated queues (default, critical, low, ultra_low) for async job execution; 90 regular jobs, 96 scheduled jobs, 30 onceoff jobs.

  **Webhook Integration**: `WebHook`/`WebHookEvent` models + `EmitWebHookEvent` Sidekiq job for outbound event delivery.

  ### What Was Rejected

  **Not Modular Monolith**: Plugins are not compile-time module boundaries — they are runtime-activated extension packages. The architectural unit is the plugin hook API, not a module graph.

  **Not Microservices**: Single Rails process, single Gemfile, single database. All plugins load into the same process and share the same database connection pool.

  **Not Event-Driven (primary)**: DiscourseEvent, MessageBus, and Sidekiq are significant, but they operate as implementation mechanisms within the layered and microkernel structure rather than defining the system's primary decomposition.

  **Not CQRS**: Standard ActiveRecord read/write patterns throughout with no separate read/write model objects.

  **Not Service-Based**: No independent deployable service units; all functionality runs in one Rails process with Sidekiq workers.

  ### Conclusion

  Discourse is a textbook **Microkernel** architecture: a stable, thin core exposes a rich, formal extension surface through which the majority of domain features are delivered. The **Layered** secondary classification reflects the deliberate Rails MVC + Service Layer structure that organizes both the core and each plugin internally. Confidence: 0.93.
