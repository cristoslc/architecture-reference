classification_reasoning: 'Discourse is a definitive example of a **Microkernel (Plugin)**
  architecture built on top of a classic **Layered** Rails foundation. While it follows
  the standard Ruby on Rails directory conventions (controllers, models, views), its
  defining architectural trait is the robust, high-surface-area plugin system that
  allows the core "kernel" to be extended without modifying the base codebase.


  ### 1. Microkernel (Plugin) Evidence

  The architecture is designed to keep the core "Discourse" engine stable while delegating
  significant features (Chat, AI, Polls, Calendar) to independent plugins.

  *   **Plugin Registry:** `lib/discourse_plugin_registry.rb` and `lib/plugin.rb`
  act as the central dispatchers. These manage "hooks" or "events" (`lib/discourse_event.rb`)
  that the core system fires, allowing plugins to inject logic into the lifecycle.

  *   **Sandboxed Data Storage:** `app/models/plugin_store.rb` provides a key-value
  abstraction for plugins to persist data in a standard way (`PluginStoreRow`) without
  needing to manage their own migrations for every small piece of state, effectively
  isolating the plugin''s data concerns from the core schema.

  *   **Dynamic Loading:** `config/application.rb` shows a complex initialization
  sequence where plugins are activated (`Discourse.activate_plugins!`) and can even
  register their own setting providers (`register_provider.rb`) and locales.

  *   **Extensive Plugin Ecosystem:** The `plugins/` directory contains dozens of
  substantial modules (e.g., `discourse-ai`, `chat`) which are structured to be toggled
  on/off.


  ### 2. Layered Architecture (Foundation)

  Beneath the plugin system, the repository follows a strict horizontal layering typical
  of the "Fat Model" Rails pattern:

  *   **Persistence Layer:** Heavy use of ActiveRecord models in `app/models/`.

  *   **Business Logic Layer:** In addition to models, a significant `app/services/`
  directory (e.g., `UserDestroyer`, `PostCreator`) handles complex multi-model transactions
  and domain workflows.

  *   **Infrastructure/Utility Layer:** The massive `lib/` directory contains cross-cutting
  concerns like `S3Helper`, `Search`, `RateLimiter`, and `BackupRestore`.

  *   **Presentation Layer:** A RESTful Rails API serving an Ember.js frontend (as
  noted in the README and `lib/ember_cli.rb`).


  ### 3. Rejected Styles

  *   **Modular Monolith:** While plugins are modular, the core system itself does
  not enforce strict internal boundaries between its own domains (e.g., Topics and
  Users are highly coupled within `app/models`). The separation is primarily between
  "Core" and "Plugins" rather than between internal core modules.

  *   **Microservices:** Although Discourse supports a "Multisite" configuration (`config/application.rb`),
  it is deployed as a single monolithic unit. Communication is internal via method
  calls or a shared Redis-backed `MessageBus`, not over network boundaries between
  services.

  *   **Hexagonal Architecture:** While `lib/` contains many abstractions, the core
  domain (Models) is tightly coupled to the database (ActiveRecord) and the framework,
  rather than being isolated via ports and adapters.'
