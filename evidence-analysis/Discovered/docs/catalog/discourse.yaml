review_notes: "Evidence: README.md states 'Ruby on Rails back end API' with 'Ember.js front end' (line 71-72). app/ has classic Rails MVC layers: controllers/(86), models/(279), views/, serializers/(219), services/, jobs/. lib/ contains 278 domain modules. DiscourseEvent system provides pub/sub event bus with 212 trigger calls across 95 files and 63 listener registrations — used for webhooks, plugin hooks, and cross-cutting concerns (lib/discourse_event.rb, config/initializers/012-web_hook_events.rb). Plugin system (43 plugins in plugins/) enables modular extensions, each with own MVC structure (e.g. plugins/chat/app/ has controllers, models, services, jobs). Gemfile confirms Rails 8, Sidekiq for async jobs, MessageBus for real-time, Redis for caching. Modular Monolith: single deployable with 43 self-contained plugins having independent app/ structures."