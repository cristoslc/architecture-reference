classification_reasoning: "## Analysis\n\nDiscourse is a **Ruby on Rails forum/community\
  \ platform** with a sophisticated plugin architecture as its primary organizational\
  \ pattern.\n\n### Primary Style: Microkernel (Plugin)\n\nThe repository exhibits\
  \ strong evidence of a Microkernel/Plugin architecture:\n\n**Plugin Discovery and\
  \ Loading** (`lib/plugin/instance.rb`):\n- 1,654-line `Plugin::Instance` class with\
  \ 172+ registration methods\n- `Plugin::Instance.find_all(parent_path)` discovers\
  \ plugins via `plugin.rb` files in subdirectories\n- `Plugin::Metadata.parse(source)`\
  \ extracts plugin metadata from plugin.rb files\n\n**Plugin Extension Points** -\
  \ The plugin API allows extensions to:\n- `register_asset` / `register_svg_icon`\
  \ / `register_locale` - Add assets, icons, translations\n- `add_to_serializer` -\
  \ Extend API response serializers\n- `add_admin_route` - Add admin UI routes\n-\
  \ `register_modifier` - Register behavior modifiers\n- `after_initialize` / `reloadable_patch`\
  \ - Hook into Rails initialization and monkey-patch core classes\n\n**Plugin Directory\
  \ Structure** (`plugins/`):\n- 43 official plugins bundled in the repository (chat,\
  \ discourse-ai, discourse-assign, etc.)\n- Each plugin has standardized structure:\
  \ `plugin.rb`, `config/routes.yml`, `config/settings.yml`, `app/`, `lib/`, `db/`\n\
  \n**Plugin Integration Example** (`plugins/chat/plugin.rb` lines 100-115):\n```ruby\n\
  reloadable_patch do |plugin|\n  Guardian.prepend Chat::GuardianExtensions\n  UserNotifications.prepend\
  \ Chat::UserNotificationsExtension\n  Category.prepend Chat::CategoryExtension\n\
  \  Reviewable.prepend Chat::ReviewableExtension\n  # ... more extensions\nend\n\
  ```\n\n**Plugin Registry** (`lib/discourse_plugin_registry.rb`):\n- `define_register`\
  \ / `define_filtered_register` for registration hooks\n- Filters registered values\
  \ by plugin enabled state: `filter_map { |h| h[:value] if h[:plugin].enabled? }`\n\
  - Supports auth providers, javascripts, stylesheets, custom fields, reviewable types,\
  \ etc.\n\n**Plugin Enable/Disable** via site settings:\n- `enabled_site_setting\
  \ :chat_enabled` in plugin.rb creates toggle\n- Plugins check `plugin.enabled?`\
  \ to conditionally include functionality\n\n### Secondary Style: Layered (Rails\
  \ MVC)\n\nThe core application follows standard Rails layered architecture:\n\n\
  - **Controllers** (86 files in `app/controllers/`): Handle HTTP requests, authentication,\
  \ request/response\n- **Services** (60+ files in `app/services/`): Business logic\
  \ layer (e.g., `post_alerter.rb`, `search_indexer.rb`, `badge_granter.rb`)\n- **Models**\
  \ (279 files in `app/models/`): ActiveRecord domain models and data access\n- **Serializers**\
  \ (219 files in `app/serializers/`): API response formatting\n- **Jobs** (`app/jobs/`\
  \ with `regular/`, `scheduled/`, `onceoff/`): Background processing via Sidekiq\n\
  \n### What Was Rejected\n\n**Not Microservices**: Single Rails application with\
  \ one Gemfile, one database. All 43 plugins load into the same process; they're\
  \ not separate deployable units.\n\n**Not Serverless**: Standard Rails deployment\
  \ (Unicorn/Puma web servers) with Sidekiq workers, not Lambda/functions.\n\n**Not\
  \ Event-Driven (primary)**: While the system uses Sidekiq jobs and MessageBus for\
  \ real-time features, these are implementation details within a layered architecture,\
  \ not the primary organizational pattern.\n\n**Not CQRS**: Standard ActiveRecord\
  \ patterns for both reads and writes with no separate read/write models.\n\n**Not\
  \ Modular Monolith**: The plugin system provides runtime extension, not compile-time\
  \ module boundaries. The core is designed to be extended by plugins at runtime,\
  \ not partitioned into internal modules.\n\n### Conclusion\n\nDiscourse is a textbook\
  \ example of a **Microkernel (Plugin) architecture** where a relatively thin core\
  \ provides extension points that plugins use to add major features (chat, AI, calendar,\
  \ etc.). The core handles authentication, database access, and extension loading,\
  \ while plugins add domain-specific functionality through a well-defined plugin\
  \ API with ~172 registration methods. The Rails MVC layered structure is secondary,\
  \ providing the standard web application scaffolding."
