review_notes: 'Discourse is a definitive example of a **Microkernel (Plugin)** architecture
  built on top of a classic **Layered** Rails foundation. While it follows the standard
  Ruby on Rails directory conventions (controllers, models, views), its defining architectural
  trait is the robust, high-surface-area plugin system that allows the core "kernel"
  to be extended without modifying the base codebase.


  ### 1. Microkernel (Plugin) Evidence

  The architecture is designed to keep the core "Discourse" engine stable while delegating
  significant features (Chat, AI, Polls, Calendar) to independent plugins.

  *   **Plugin Registry:** `lib/discourse_plugin_registry.rb` and `lib/plugin.rb`
  act as the central dispatchers. These manage "hooks" or "events" (`lib/discourse_event.rb`)
  that the core system fires, allowing plugins to inject logic into the lifecycle.

  *   **Sandboxed Data Storage:** `app/models/plugin_store.rb` provides a key-value
  abstraction for plugins to persist data in a standard way (`PluginStoreRow`) without
  needing to manage their own migrations for every small piece of state, effectively
  isolating the plugin''s data concerns from the core schema.

  *   **Dynamic Loading:** `config/application.rb` shows a complex initialization
  sequence where plugins are activated (`Discourse.activate_plugins!`) and can even
  register their own setting providers (`register_provider.rb`) and locales.

  *   **Extensive Plugin Ecosystem:** The `plugins/` directory contains dozens of
  substantial modules (e.g., `discourse-ai`, `chat`) which are structured to be toggled
  on/off.


  ### 2. Layered Architecture (Foundation)'
