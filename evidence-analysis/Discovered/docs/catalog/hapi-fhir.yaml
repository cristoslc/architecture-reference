review_notes: "HAPI FHIR is a textbook example of a **Modular Monolith** organized\
  \ as a Maven multi-module project. While it contains components that can be used\
  \ to build distributed systems, the repository itself is structured as a single\
  \ massive codebase with strictly defined module boundaries that are compiled and\
  \ distributed as a set of library and server components.\n\n### 1. Modular Monolith\
  \ (Primary Style)\nThe repository is divided into dozens of highly specific modules\
  \ (e.g., `hapi-fhir-jpaserver-searchparam`, `hapi-fhir-storage`, `hapi-fhir-structures-r4`).\
  \ \n- **Enforced Boundaries:** Each module has its own `pom.xml`, defining clear\
  \ dependency trees. This prevents circular dependencies and forces developers to\
  \ use defined internal APIs to interact with other parts of the system.\n- **Versioned\
  \ Components:** The modules are versions of the FHIR specification (DSTU2, DSTU3,\
  \ R4, R5). This allows consumers to pick and choose specific versions while the\
  \ core remains shared, a hallmark of a robust modular design.\n- **Shared Deployment\
  \ Logic:** While the code is modular, the `hapi-fhir-dist` and `hapi-fhir-deployable-pom`\
  \ suggest the project is intended to be built and released as a unified set of artifacts\
  \ or a single distribution (like the HAPI FHIR CLI or the JPA Server).\n\n### 2.\
  \ Layered (Secondary Style)\nWithin the modules, the project follows a classic horizontal\
  \ layering pattern:"
