one_line_summary: "Kubernetes-native service mesh whose control plane (Istiod) is a self-described modular monolith — single binary, single Go module — with a formal Microkernel extension surface via WasmPlugin, EnvoyFilter CRDs, and a pluggable XDS generator registry."
classification_reasoning: "Istiod is explicitly described in the project's own architecture documentation (architecture/networking/pilot.md) as 'structured as a modular monolith, housing a wide range of functionality from certificate signing, proxy configuration (XDS), traditional Kubernetes controllers, and more.' The control plane is a single binary (pilot-discovery), a single Go module (istio.io/istio), with well-defined interface-based internal boundaries: ConfigStore, ServiceDiscovery, PushContext snapshot model, and a Generators map for per-XDS-type config translation. This was a deliberate architectural choice — previously separate microservices (Pilot, Citadel, Galley, Mixer) were consolidated into istiod. Microkernel is a strong secondary: three formal extension points exist for third-party data-plane extensibility — WasmPlugin (runtime WebAssembly loading into Envoy via CRD), EnvoyFilter (CRD-based runtime patching of arbitrary Envoy config), and the XDS Generator registry (pluggable handlers for each XDS resource type). Internal authn/authz plugin interfaces in pilot/pkg/networking/plugin/ confirm the plugin pattern applies at the control-plane level too. These are not escape hatches but versioned, documented, conformance-tested extension APIs. Event-driven Kubernetes informers + PushQueue are the implementation mechanism for XDS delivery, not a primary style."
review_notes: "Re-classified 2026-03-11 via SPEC-031 (was: Modular Monolith + Microkernel from 2026-03-08 with model openrouter/z-ai/glm-5, confidence 0.92). New classification confirms same styles with higher confidence (0.93), expanded quality_attributes (now non-empty), updated model to claude-sonnet-4-6, method updated to deep-analysis (canonical). Architecture documentation at architecture/networking/pilot.md provides explicit authorial confirmation of Modular Monolith primary. Ztunnel ambient proxy (Rust binary) noted as a separate data-plane component distinct from the Go control plane. XDS Generator registry identified as a third Microkernel extension point beyond WasmPlugin and EnvoyFilter."
