review_notes: 'README describes "a barebones library for agents that think in code."
  src/smolagents/agents.py defines CodeAgent (generates and executes Python code)
  and ToolCallingAgent (uses structured tool calls). src/smolagents/agents.py
  ManagedAgent class enables multi-agent orchestration — a manager agent delegates
  tasks to managed sub-agents that execute independently and return results.
  src/smolagents/tools.py provides the Tool base class for agent capabilities.
  src/smolagents/models.py abstracts LLM backends (HfApiModel, OpenAIServerModel,
  etc.). src/smolagents/memory.py implements agent memory for conversation history.
  Multi-agent pattern is explicit: manager agents create ManagedAgent instances with
  specific roles, then delegate sub-tasks to them via natural language. Each agent
  maintains its own reasoning loop and tool access. Pipe-and-Filter because the
  code execution model passes data through sequential tool invocations as a
  processing pipeline.'
