review_notes: 'The `tutor` codebase is a CLI application that functions as a manager
  and orchestrator for the Open edX ecosystem. Its internal architecture is primarily
  structured as a **Microkernel (Plugin)** system, designed to deploy an external
  **Microservices** architecture.


  ### Reasoning:


  **1. Microkernel (Plugin) Architecture (The internal structure):**

  The repository''s internal code organization revolves around a core "engine" that
  is heavily extended through a custom plugin system.

  - **Plugin Infrastructure:** There is a dedicated directory `tutor/plugins/` containing
  `v1.py`, `v0.py`, `base.py`, and `indexes.py`. This indicates a formal versioned
  API for external extensions.

  - **Hook System:** The presence of `tutor/core/hooks/` (actions.py, filters.py,
  contexts.py) strongly suggests a life-cycle management system where plugins can
  tap into the core execution flow—a hallmark of microkernel systems.

  - **Extensible Configuration:** The `tutor/templates/` directory shows that the
  core provides base templates (like `config/defaults.yml`) which are then augmented
  by plugins to generate the final deployment manifests.

  - **Tests for Extensions:** High-level tests like `tests/test_plugins.py` and `tests/test_plugin_indexes.py`
  confirm that the plugin lifecycle is a first-class concern of the codebase.'
