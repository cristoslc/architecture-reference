classification_reasoning: "## Architecture Classification: Modular Monolith with Plugin\
  \ Extension Points\n\n### Primary Evidence for **Modular Monolith**\n\n**1. Single\
  \ Deployable Unit**\nThe repository builds a single distributable package (`ignite3-db`).\
  \ The docker-compose.yml shows multiple homogeneous node instances, not different\
  \ microservices:\n```yaml\n# All nodes use the same image with different names\n\
  services:\n  node1, node2, node3: # All use apacheignite/ignite:${IGNITE3_VERSION}\n\
  ```\n\n**2. Enforced Internal Module Boundaries**\nThe `modules/README.md` explicitly\
  \ documents strict modularity rules:\n> \"We prohibit cyclic dependencies between\
  \ modules in order to simplify JIGSAW migration in the future.\"\n> \"Each module\
  \ provides an exposed API which should be used by external modules. Not exposed\
  \ APIs must not be used by external modules.\"\n\n**3. Gradle Multi-Module Structure**\n\
  `settings.gradle` defines 70+ internal modules with clear separation of concerns:\n\
  - `ignite-api` - Public API interfaces\n- `ignite-network` - Cluster communication\n\
  - `ignite-raft` - Consensus protocol\n- `ignite-storage-api` / `ignite-storage-rocksdb`\
  \ - Storage abstraction\n- `ignite-sql-engine` - Query processing\n- `ignite-transactions`\
  \ - ACID transactions\n\n**4. Runner as Composition Root**\nThe `ignite-runner`\
  \ module (100+ dependency lines) acts as the single composition root that wires\
  \ all components:\n```gradle\n// ignite-runner/build.gradle\nimplementation project(':ignite-configuration')\n\
  implementation project(':ignite-network')\nimplementation project(':ignite-raft')\n\
  implementation project(':ignite-metastorage')\n// ... 40+ module dependencies\n\
  ```\n\n**5. Acyclic Component Dependency Graph**\nFrom `modules/runner/README.md`:\n\
  > \"Components form an acyclic directed graph that is constructed in topological\
  \ sort order wrt root.\"\n> \"Since metastorage watches can only be added during\
  \ the component startup, the watch notification order is consistent with the component\
  \ initialization order.\"\n\n### Secondary Evidence for **Microkernel (Plugin)**\n\
  \n**1. ServiceLoader-Based Extension Points**\nThe architecture explicitly uses\
  \ `java.util.ServiceLoader` for runtime pluggability:\n\n**Storage Engine Plugin**\
  \ (`DataStorageModule.java`):\n```java\npublic interface DataStorageModule {\n \
  \   String name();\n    StorageEngine createEngine(...);\n}\n```\n\n**Configuration\
  \ Module Plugin** (`ConfigurationModule.java`):\n```java\n// Designed for ServiceLoader\
  \ mechanism\npublic interface ConfigurationModule {\n    ConfigurationType type();\n\
  \    Collection<RootKey<?, ?, ?>> rootKeys();\n    Collection<Class<?>> schemaExtensions();\n\
  }\n```\n\n**2. Polymorphic Configuration Extensions**\nFrom `modules/storage-api/README.md`:\n\
  > \"To add a new data storage you need:\n> - Add a new module\n> - Implement interfaces:\
  \ DataStorageModule, StorageEngine, MvTableStorage...\n> - Add services (loaded\
  \ via ServiceLoader):\n>   - Implementation of DataStorageModule\n>   - Implementation\
  \ of ConfigurationModule\"\n\n**3. Auto-Service Registration**\nImplementation modules\
  \ use `@AutoService` annotation:\n```java\n@AutoService(ConfigurationModule.class)\n\
  public class RocksDbStorageEngineLocalConfigurationModule implements ConfigurationModule\
  \ {\n    @Override\n    public Collection<Class<?>> polymorphicSchemaExtensions()\
  \ {\n        return List.of(RocksDbProfileConfigurationSchema.class);\n    }\n}\n\
  ```\n\n**4. Runtime Component Discovery**\nIn `IgniteImpl.java`:\n```java\nServiceLoader.load(DataStorageModule.class,\
  \ serviceProviderClassLoader)\nServiceLoader.load(ConfigurationModule.class, classLoader)\n\
  ChannelTypeRegistryProvider.loadByServiceLoader(serviceProviderClassLoader)\n```\n\
  \n### What This Architecture Is NOT\n\n**Not Microservices**: Single deployment\
  \ artifact, homogeneous nodes, shared database via Raft consensus. Nodes are replicas,\
  \ not independent services.\n\n**Not Domain-Driven Design**: Modules are organized\
  \ by technical capability (network, storage, sql-engine, transactions) rather than\
  \ domain bounded contexts. No aggregates, entities, or value object patterns.\n\n\
  **Not Layered Architecture**: While there are API modules, the structure is not\
  \ horizontal layering (presentation/business/data). Instead, modules are vertical\
  \ capabilities with their own implementation stacks.\n\n**Not Event-Driven (primary)**:\
  \ While Raft uses messages for consensus and components use metastorage watches,\
  \ the primary interaction is synchronous RPC via Netty, not asynchronous event streams\
  \ through brokers.\n\n### Summary\n\nApache Ignite 3 is a **Modular Monolith** with\
  \ **Microkernel-style plugin extensions**. It enforces strict internal module boundaries\
  \ (acyclic dependencies, exposed APIs only) while building a single deployable artifact.\
  \ The `runner` module serves as the composition root, and extension points like\
  \ storage engines use ServiceLoader for runtime pluggability, making it a well-structured\
  \ hybrid of modular monolith organization with microkernel extensibility patterns."
