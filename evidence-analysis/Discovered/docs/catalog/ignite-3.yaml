review_notes: >-
  Re-classification (deep-analysis) replacing earlier automated-discovery result.
  Primary style confirmed as Modular Monolith: 78+ Gradle submodules, enforced acyclic
  dependency graph, single ignite3-db deployment artifact, ignite-runner composition root.
  Space-Based added as explicit secondary style: data is partitioned across peer nodes via
  Raft-backed distribution zones, compute colocates with data partitions, no shared central
  database. Microkernel tertiary: ServiceLoader-based storage engine and ConfigurationModule
  plugin contracts with @AutoService registration. Compared to Ignite 2.x (Microkernel primary),
  Ignite 3 inverts the hierarchy — strict modular monolith organization dominates.
classification_reasoning: |
  ## Architecture Classification: Modular Monolith + Space-Based + Microkernel

  ### Primary: Modular Monolith

  **Single deployment artifact**
  packaging/docker/docker-compose.yml shows three cluster nodes sharing one image
  (apacheignite/ignite:${IGNITE3_VERSION}) differentiated only by --node-name. All 78+
  internal modules are bundled into a single ignite3-db distribution by packaging/db.

  **Enforced acyclic module boundaries**
  modules/README.md: "We prohibit cyclic dependencies between modules in order to simplify
  JIGSAW migration in the future." Each module exposes a public -api artifact; internal
  implementations may not be used by other modules.

  **API/implementation pairs throughout**
  ignite-network-api / ignite-network, ignite-raft-api / ignite-raft,
  ignite-metastorage-api / ignite-metastorage, ignite-sql-engine-api / ignite-sql-engine,
  ignite-storage-api / ignite-storage-rocksdb+page-memory, ignite-placement-driver-api /
  ignite-placement-driver, ignite-security-api / ignite-security.

  **Runner as composition root**
  ignite-runner/build.gradle declares 40+ direct implementation project() dependencies.
  modules/runner/README.md: "Components form an acyclic directed graph that is constructed
  in topological sort order wrt root." IgniteImpl.java (2274 lines) is the assembly class.

  ### Secondary: Space-Based

  Apache Ignite 3 is explicitly a distributed in-memory data grid:
  - Data partitioned across nodes via distribution zones (ignite-distribution-zones module)
  - Placement Driver (ignite-placement-driver) manages partition-to-node assignments
  - Each partition is a Raft replication group — no shared central database
  - ignite-compute module enables code execution on the node holding the data partition
    (colocated compute — the canonical Space-Based pattern)
  - Dynamic rebalancing when nodes join or leave

  ### Tertiary: Microkernel (storage engine plugin layer)

  IgniteImpl.java uses ServiceLoader.load(DataStorageModule.class, serviceProviderClassLoader).
  modules/storage-api/README.md documents the explicit extension contract: implement
  DataStorageModule + StorageEngine + ConfigurationModule, register via ServiceLoader.
  Default engines (RocksDB, page-memory) use this same mechanism.
  @AutoService(ConfigurationModule.class) wires implementations automatically.
  ChannelTypeRegistryProvider.loadByServiceLoader() extends the network channel type registry.

  ### Not Microservices
  Single deployment artifact, homogeneous peer nodes, data in distributed cluster.

  ### Not Layered
  Modules are vertical technical capabilities (raft, metastorage, sql, compute), not
  horizontal presentation/business/data layers.

  ### Not Event-Driven (primary)
  Primary interface is synchronous RPC via Netty. Raft and metastorage watches are
  message-passing internally but there is no central event broker.
key_technologies:
- JRaft (Raft consensus)
- ScaleCube (gossip cluster membership)
- Netty (networking)
- RocksDB (persistent storage engine)
- Apache Calcite (SQL planning)
- Typesafe HOCON (configuration)
- ServiceLoader (plugin registration)
- Gradle multi-project build
