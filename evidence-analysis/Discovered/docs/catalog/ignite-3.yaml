notable_strengths:
- Strict API/implementation module separation enforced at build time
- Acyclic module dependency graph enables topological initialization ordering
- Pluggable storage engine API (RocksDB, page-memory, extensible to custom engines)
- Raft-native design — every stateful subsystem uses dedicated Raft groups
- First-class native clients for Java, .NET, C++, Python, JDBC, ODBC
notable_gaps:
- CI/CD mostly on Apache internal infrastructure (not visible in repo)
- No ADR directory — design decisions in Apache JIRA/Confluence IEP documents
- Several README files contain TODO links (in-flight documentation)
- Spring Boot auto-configuration thin compared to competitors
architecture_qualifiers:
- type: distribution-model
  value: peer-to-peer
  note: Homogeneous peer nodes — each node is an equal participant in partition ownership
    and Raft group membership; no dedicated master
- type: data-pattern
  value: cqrs
  note: Partition leaseholder handles writes; read replicas and read-only queries can
    route to any replica via Raft read index
