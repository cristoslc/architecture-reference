review_notes: "The repository is a quintessential implementation of **Vertical Slice\
  \ Architecture**, explicitly stated in the README and reflected in the physical\
  \ organization of the source code. Rather than grouping by technical concerns (controllers,\
  \ services, repositories), the system is organized around business features.\n\n\
  ### Primary Style: Vertical Slice\nThe codebase rejects traditional horizontal layering\
  \ (N-Tier) in favor of vertical slices where each slice encapsulates all technical\
  \ requirements for a specific use case.\n- **Feature Folders:** Under `src/App/Vertical.Slice.Template/Products`,\
  \ the code is organized by features (e.g., `CreateProduct`, `GetProductById`). Each\
  \ folder typically contains the endpoint definition (Minimal API), the command/query,\
  \ and the handler.\n- **High Cohesion:** The README explicitly advocates for \"\
  minimizing coupling between slices and maximizing coupling in a slice.\"\n- **Project\
  \ Structure:**\n  - `src/Shared`: Contains cross-cutting concerns (Infrastructure,\
  \ Observability, Persistence abstractions) that act as a foundation for all slices.\n\
  \  - `src/App`: Houses the actual business logic organized by slices."
