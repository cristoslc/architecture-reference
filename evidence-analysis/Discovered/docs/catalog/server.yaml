classification_reasoning: "## Architecture Analysis: Nextcloud Server\n\n### Primary\
  \ Classification: Microkernel (Plugin)\n\nNextcloud Server implements a classic\
  \ **microkernel/plugin architecture** with a well-defined core system extended by\
  \ dynamically loaded applications.\n\n**Key Evidence:**\n\n1. **Core Platform (Microkernel)**:\
  \ The `lib/private/` and `core/` directories form the platform core that provides:\n\
  \   - Dependency injection container (`lib/private/AppFramework/DependencyInjection/DIContainer.php`)\n\
  \   - Application bootstrap coordinator (`lib/private/AppFramework/Bootstrap/Coordinator.php`)\n\
  \   - Event dispatch system (`lib/private/EventDispatcher/EventDispatcher.php`)\n\
  \   - Service container with app-scoped containers\n\n2. **Plugin Contract**: Apps\
  \ implement `IBootstrap` interface (`lib/public/AppFramework/Bootstrap/IBootstrap.php`):\n\
  \   ```php\n   interface IBootstrap {\n       public function register(IRegistrationContext\
  \ $context): void;\n       public function boot(IBootContext $context): void;\n\
  \   }\n   ```\n\n3. **Extension Points**: The `IRegistrationContext` (`lib/public/AppFramework/Bootstrap/IRegistrationContext.php`)\
  \ defines registration methods for:\n   - Services, capabilities, event listeners,\
  \ middleware\n   - Search providers, dashboard widgets, crash reporters\n   - Authentication\
  \ providers, notification handlers, etc.\n\n4. **Dynamic App Loading**: Apps are\
  \ discovered and loaded from `apps/` directory:\n   - Each app has `appinfo/info.xml`\
  \ declaring metadata, dependencies, and extension points\n   - Apps can be enabled/disabled\
  \ at runtime\n   - 31 bundled apps: files, settings, dav, federation, oauth2, etc.\n\
  \n5. **Public API Contract**: `lib/public/` contains stable interfaces (`OCP\\`\
  \ namespace) that apps depend on, insulating them from internal implementation changes.\n\
  \n### Secondary: Layered\n\nWithin both the core and each app, a layered architecture\
  \ is maintained:\n\n- **Controller Layer**: HTTP request handling (`Controller/`\
  \ directories)\n- **Service Layer**: Business logic (`Service/` directories)  \n\
  - **Data Layer**: Database access (`Db/`, `Mapper/` directories)\n\nExample from\
  \ `apps/files/`:\n```\nController/ApiController.php → Service/TagService.php → Db/Mapper/\n\
  ```\n\n### Secondary: Event-Driven\n\nThe system extensively uses events for decoupled\
  \ communication:\n\n- `IEventDispatcher` interface for typed event dispatch\n- Apps\
  \ register listeners via `$context->registerEventListener()`\n- Example: `apps/comments/lib/Activity/Listener.php`\
  \ listens to `CommentsEvent` and publishes activities\n\n### What This Is NOT\n\n\
  - **NOT Microservices**: Single monolithic deployment unit - all apps run in the\
  \ same PHP process. No service boundaries, no separate deployment units, no network\
  \ communication between components.\n\n- **NOT Hexagonal**: While there's a public\
  \ API (`lib/public/`), the pattern is plugin extension rather than ports-and-adapters.\
  \ Apps extend the core, they don't plug into application ports.\n\n- **NOT Domain-Driven\
  \ Design**: No bounded contexts, aggregates, or ubiquitous language organization.\
  \ Apps are feature modules, not domain contexts.\n\n### Summary\n\nNextcloud Server\
  \ is a textbook example of a microkernel architecture: a stable core platform that\
  \ exposes well-defined extension points, with apps as plugins that extend functionality.\
  \ The layered organization within each component and the event-driven communication\
  \ patterns reinforce the modularity and extensibility of the design."
