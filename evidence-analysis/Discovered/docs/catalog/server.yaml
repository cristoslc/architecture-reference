review_notes: "Nextcloud Server is a classic example of a **Microkernel (Plugin)**\
  \ architecture. The codebase is divided into a \"Core\" system (the microkernel)\
  \ and a vast array of \"Apps\" (the plugins) that extend the system's functionality.\n\
  \n### 1. Microkernel (Plugin) Evidence\nThe architecture is explicitly designed\
  \ to be extensible through the `apps/` directory. \n- **Core vs. Extension:** The\
  \ `lib/` directory contains the core platform services (the microkernel), while\
  \ `apps/` contains optional but critical units like `encryption`, `files_trashbin`,\
  \ and `user_ldap`.\n- **Plugin Contracts:** The `lib/public` directory serves as\
  \ the strictly defined **SDK/API surface** for app developers. The presence of numerous\
  \ interfaces (e.g., `lib/public/IAppConfig.php`, `lib/public/IUserManager.php`)\
  \ establishes the contract between the kernel and the plugins.\n- **Plugin Metadata:**\
  \ Each app contains an `appinfo/info.xml` file (e.g., `apps/encryption/appinfo/info.xml`)\
  \ that defines how the app hooks into the core system, including background jobs,\
  \ repair steps, console commands, and settings sections.\n- **Dynamic Loading:**\
  \ The `OC\\AppFramework\\App` class (found in `lib/private/AppFramework/App.php`)\
  \ manages the lifecycle of these apps, handling namespacing (`buildAppNamespace`)\
  \ and dependency injection for each individual module.\n\n### 2. Layered (Secondary\
  \ Style)"
