review_notes: "LLM review: 30+ domain modules in packages/modules/ (cart, order, product, payment, etc.) each with own models/services/migrations. Module SDK loads modules into shared awilix DI container (packages/core/modules-sdk/src/medusa-module.ts). Official architecture docs describe 4-layer stack (API Routes -> Workflows -> Modules -> Data Store) in single app. Event bus is a required core dependency (event-bus-local and event-bus-redis). Most modules declare EVENT_BUS dependency. Subscribers pattern in packages/medusa/src/subscribers/. Workflow engine handles multi-step business processes with saga patterns (packages/core/orchestration/src/workflow/). CLAUDE.md: TypeScript monorepo with 30+ modular commerce packages. No Docker/container orchestration. Single deployable unit."