classification_reasoning: "## Architecture Classification: Modular Monolith with Workflow\
  \ Orchestration\n\n### Primary Style: Modular Monolith\n\nMedusa is architected\
  \ as a **modular monolith** with strongly enforced module boundaries. The evidence\
  \ is compelling:\n\n**Monorepo with Independent Module Packages:**\n- 34 separate\
  \ module packages under `packages/modules/` (product, order, cart, payment, customer,\
  \ inventory, etc.)\n- 15+ provider packages under `packages/modules/providers/`\
  \ (payment-stripe, auth-github, file-s3, notification-sendgrid, etc.)\n- Each module\
  \ is independently versioned and published to npm (`\"name\": \"@medusajs/product\"\
  `)\n- Peer dependency enforcement: modules depend on `@medusajs/framework` rather\
  \ than each other directly\n\n**Module Definition Pattern:**\nEvery module follows\
  \ a consistent structure (`packages/modules/product/src/index.ts`):\n```typescript\n\
  export default Module(Modules.PRODUCT, {\n  service: ProductModuleService,\n})\n\
  ```\n\nEach module includes:\n- Service layer (`services/product-module-service.ts`)\n\
  - Data models (`models/`)\n- Database migrations (`migrations/`)\n- Joiner configuration\
  \ (`joiner-config.ts`) for cross-module relationships\n- Integration tests\n\n**Module\
  \ SDK with Discovery and Loading:**\nThe `packages/core/modules-sdk` provides module\
  \ registration, discovery, and lifecycle management:\n```typescript\n// packages/core/modules-sdk/src/definitions.ts\n\
  export const ModulesDefinition: {\n  [key: string]: ModuleDefinition\n} = {\n  [Modules.PRODUCT]:\
  \ {\n    key: Modules.PRODUCT,\n    defaultPackage: false,\n    label: upperCaseFirst(Modules.PRODUCT),\n\
  \    isRequired: false,\n    isQueryable: true,\n    dependencies: [Modules.EVENT_BUS,\
  \ ContainerRegistrationKeys.LOGGER],\n    defaultModuleDeclaration: {\n      scope:\
  \ MODULE_SCOPE.INTERNAL,\n    },\n  },\n  // ... 30+ module definitions\n}\n```\n\
  \n**Provider Plugin System:**\nModules accept pluggable providers loaded dynamically\
  \ (`packages/core/modules-sdk/src/loaders/module-provider-loader.ts`):\n```typescript\n\
  export async function loadModuleProvider(\n  container: MedusaContainer,\n  provider:\
  \ ModuleProvider,\n  registerServiceFn?: (klass, container, moduleDetails) => Promise<void>\n\
  ) {\n  loadedProvider = await dynamicImport(normalizedPath)\n  // ...registers provider\
  \ services into container\n}\n```\n\nExample: Payment module with Stripe provider\
  \ (`packages/modules/providers/payment-stripe/src/services/stripe-provider.ts`):\n\
  ```typescript\nclass StripeProviderService extends StripeBase {\n  static identifier\
  \ = PaymentProviderKeys.STRIPE\n}\n```\n\n### Secondary Style: Pipeline (Pipe-and-Filter)\n\
  \nMedusa implements a sophisticated **workflow orchestration engine** that embodies\
  \ the Pipeline pattern:\n\n**Workflow SDK (`packages/core/workflows-sdk`):**\n-\
  \ `createStep()` - Define atomic steps with compensation (rollback) handlers\n-\
  \ `createWorkflow()` - Compose steps into pipelines\n- `WorkflowManager` - Register\
  \ and execute workflows\n- Transaction orchestrator for distributed transactions\n\
  \n**Core Flows (`packages/core/core-flows`):**\nPre-built workflow compositions\
  \ for commerce operations:\n```\nsrc/\n├── api-key/steps/ + workflows/\n├── cart/steps/\
  \ + workflows/      # 20+ steps, 15+ workflows\n├── customer/steps/ + workflows/\n\
  ├── fulfillment/steps/ + workflows/\n├── order/steps/ + workflows/\n└── payment/steps/\
  \ + workflows/\n```\n\n**Step Composition Pattern (`packages/core/workflows-sdk/src/utils/composer/create-step.ts`):**\n\
  ```typescript\nexport type InvokeFn<TInput, TOutput, TCompensateInput> = (\n  input:\
  \ TInput,\n  context: StepExecutionContext\n) => StepResponse<TOutput, TCompensateInput>\n\
  \nexport type CompensateFn<T> = (\n  input: T | undefined,\n  context: StepExecutionContext\n\
  ) => unknown | Promise<unknown>\n```\n\n**Workflow Definition Example:**\n```typescript\n\
  const myWorkflow = createWorkflow(\n  \"my-workflow\",\n  (input: WorkflowInput)\
  \ => {\n    const product = createProductStep(input)\n    return new WorkflowResponse(getProductStep(product.id))\n\
  \  }\n)\n```\n\n### What This Is NOT\n\n**Not Microservices:**\n- Single deployable\
  \ application (`packages/medusa/`)\n- Modules share a framework container, not distributed\
  \ communication\n- No API gateways, service mesh, or inter-service HTTP/gRPC\n-\
  \ Event bus is optional (local or Redis), not required for module communication\n\
  \n**Not Service-Based (2-5 coarse services):**\n- 34 fine-grained modules, not 2-5\
  \ coarse services\n- Each module is a separate npm package with clear boundaries\n\
  - Modules define cross-module links via joiner configs, not shared databases\n\n\
  **Not Domain-Driven Design:**\n- No bounded contexts with aggregates/entities/value\
  \ objects pattern\n- No ubiquitous language or domain events (events are infrastructure-level)\n\
  - Modules are organized by commerce feature, not strategic domains\n\n**Not Layered\
  \ Architecture:**\n- No horizontal separation of presentation/business/data layers\n\
  - Each module contains its own full stack (models, services, migrations)\n- Workflow\
  \ engine cuts across layers vertically\n\n### Supporting Evidence\n\n**Workspace\
  \ Configuration (`package.json`):**\n`\n\n[truncated]"
