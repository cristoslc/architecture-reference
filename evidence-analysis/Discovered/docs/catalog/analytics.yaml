review_notes: "Plausible Analytics is structured as a **Modular Monolith** built on\
  \ the Elixir/Phoenix ecosystem. While it follows the traditional Phoenix horizontal\
  \ layering (Web vs. Core), the internal organization of the `lib/plausible` directory\
  \ demonstrates clear vertical boundaries based on domain concerns (e.g., `ingestion`,\
  \ `billing`, `auth`, `shield`, `teams`).\n\n### Architectural Evidence\n\n1.  **Modular\
  \ Monolith**: The codebase is contained within a single Elixir application but is\
  \ partitioned into high-level domain modules. Each module (found in `lib/plausible/`)\
  \ encapsulates its own logic and often its own repository interactions or internal\
  \ caching strategies (e.g., `plausible/shield` for traffic filtering vs. `plausible/billing`\
  \ for subscription management). \n2.  **Layered Architecture**: The top-level separation\
  \ between `lib/plausible` (the domain and business logic) and `lib/plausible_web`\
  \ (the delivery mechanism via Phoenix controllers, views, and LiveView) is a classic\
  \ implementation of a layered monolith. The domain logic is isolated from the HTTP\
  \ handling and UI concerns.\n3.  **Pipeline (Pipe-and-Filter) for Ingestion**: The\
  \ analytics ingestion path constitutes a specialized pipeline. Files like `lib/plausible/ingestion/persistor.ex`,\
  \ `write_buffer.ex`, and `event.ex` indicate a flow where incoming data is processed,\
  \ enriched (geolocation, device detection), buffered, and eventually persisted.\
  \ The use of a \"Persistor\" with backends (as seen in the requested file) suggests\
  \ a pluggable strategy for handling high-volume data streams.\n4.  **Hybrid Persistence**:\
  \ The architecture handles a clear split between relational data (PostgreSQL for\
  \ users, sites, and settings) and analytical data (ClickHouse). This is reflected\
  \ in the repository structure with separate repo modules (`ClickhouseRepo`, `IngestRepo`,\
  \ and the standard `Repo` for Postgres), aligning with a domain-specific data management\
  \ strategy within the monolith.\n\n### Why not other styles?"
