one_line_summary: "A privacy-focused web analytics platform built as a single-release Elixir Modular Monolith (~20 domain modules) over a Phoenix Layered presentation stack, with a discrete 18-step Pipeline for high-throughput event ingestion into a dual PostgreSQL/ClickHouse persistence tier."
classification_reasoning: |
  ## Primary Style: Modular Monolith

  A single OTP application (`:plausible`) ships as one Elixir release â€” one Dockerfile,
  one `mix release plausible`. Internally, `lib/plausible/` is partitioned into ~20 vertical
  domain modules (`auth/`, `billing/`, `teams/`, `sites/`, `stats/`, `ingestion/`, `shield/`,
  `goals/`, `segments/`, `imported/`, `session/`, `plugins/`, `google/`, `s3/`, etc.) each
  encapsulating its own business logic, Ecto schemas, and repository access.
  `Plausible.Application` assembles all supervisors at startup from a single OTP entry point.
  There are no service boundaries, API gateways, or inter-process communication between domains.

  CE/EE edition divergence is handled by `on_ee`/`on_ce` compile-time macros that conditionally
  include code, allowing a single codebase to serve both Community Edition and Enterprise Edition
  without branching.

  ## Secondary Style: Layered

  A clear horizontal three-layer separation runs across the entire codebase:
  - `lib/plausible_web/` â€” presentation (Phoenix controllers, LiveViews, plugs, router, email templates)
  - `lib/plausible/` â€” domain logic and business rules
  - Data-access sublayer: four specialised Ecto repos: `Plausible.Repo` (PostgreSQL),
    `Plausible.ClickhouseRepo` (reads), `Plausible.IngestRepo` (writes), `Plausible.AsyncInsertRepo`

  Each layer calls downward only; web controllers call domain contexts, domain contexts call repos.

  ## Secondary Style: Pipeline

  `Plausible.Ingestion.Event.pipeline/0` defines a named, ordered list of 18 filter/transform
  steps executed by `process_unless_dropped/3` via `Enum.reduce_while/3`, which short-circuits
  on any drop reason:

    drop_verification_agent â†’ drop_datacenter_ip â†’ drop_threat_ip â†’
    drop_shield_rule_hostname â†’ drop_shield_rule_page â†’ drop_shield_rule_ip â†’
    put_geolocation â†’ drop_shield_rule_country â†’ put_user_agent â†’ put_basic_info â†’
    put_source_info â†’ maybe_infer_medium â†’ put_props â†’ put_revenue â†’
    put_salts â†’ put_user_id â†’ validate_clickhouse_event â†’ register_session

  Enriched events flow into `WriteBuffer` GenServers (one for events, one for sessions) that
  batch-flush RowBinary to ClickHouse. The `Persistor` module adds a pluggable backend
  strategy (`Embedded`, `Remote`, `EmbeddedWithRelay`) configurable at runtime with per-user
  hash-based traffic splitting.

  ## What This Is NOT

  - **NOT Microservices**: Single deployment artifact (one release). No service boundaries,
    API gateways, or inter-service communication.
  - **NOT Event-Driven**: Oban provides background job scheduling; `Phoenix.PubSub` is used
    for in-process broadcast. There are no durable event buses, Kafka, or message queues
    forming the primary communication mechanism.
  - **NOT Hexagonal/Ports & Adapters**: No explicit port/adapter abstraction layer; controllers
    call contexts directly; contexts call repos directly.
  - **NOT CQRS**: Although reads (ClickhouseRepo) and writes (IngestRepo) use different repos,
    this is a performance optimisation for the analytics domain (PostgreSQL vs ClickHouse), not
    a CQRS command/query separation pattern.

  ## Quality Attribute Evidence

  - **Deployability**: Single Docker image (Alpine multistage), one mix release; CE and EE
    compiled from the same source via MIX_ENV; self-hostable without external orchestration.
  - **Modularity**: ~20 domain modules in lib/plausible/ with internal encapsulation; four
    Ecto repos for clean data-access boundaries; 21 Oban workers isolated in lib/workers/.
  - **Scalability**: ClickHouse for high-volume event and session storage; WriteBuffer GenServer
    batch-flushing RowBinary reduces write pressure; Persistor per-user hash routing; libcluster
    Erlang host clustering for EE; partitioned Task.Supervisor for UA parsing.
  - **Observability**: OpenTelemetry (Cowboy, Phoenix, Ecto, Oban); PromEx with Prometheus
    metrics; telemetry events for every pipeline step, every buffered/dropped event, and UA
    parse timeouts.
  - **Evolvability**: on_ee/on_ce compile-time macros for safe CE/EE feature divergence;
    fun_with_flags feature flag library; pluggable Persistor backends; 1000+ legacy tracker
    script variants generated from the same source.
  - **Fault Tolerance**: OTP supervision tree (one_for_one root supervisor); WriteBuffer traps
    exits and flushes on shutdown; Plausible.Session.Transfer for session handoff; rate limiting
    via Plausible.RateLimit; Sentry error reporting; Oban job retry semantics.
