classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Style: **Layered**\n\nThe codebase follows a classic Phoenix/Elixir layered architecture\
  \ with clear horizontal separation:\n\n**1. Presentation Layer (`lib/plausible_web/`)**\n\
  - Controllers handle HTTP requests (`controllers/`)\n- Views and templates for rendering\
  \ (`views/`, `templates/`)\n- LiveViews for interactive UI (`live/`)\n- Plugs for\
  \ request processing pipeline (`plugs/`)\n- Router defines HTTP endpoints (`router.ex`)\n\
  \n**2. Business/Domain Layer (`lib/plausible/`)**\n- Domain contexts: `auth/`, `billing/`,\
  \ `teams/`, `sites/`, `stats/`, `ingestion/`, `goals/`, `imported/`, `shield/`,\
  \ etc.\n- Each module encapsulates business logic\n- Example: `Plausible.Stats.Query`\
  \ builds analytics queries; `Plausible.Sites.Index` manages site listings\n\n**3.\
  \ Data Access Layer**\nMultiple specialized repositories:\n- `Plausible.Repo` —\
  \ PostgreSQL (users, sites, teams, billing)\n- `Plausible.ClickhouseRepo` — ClickHouse\
  \ read-only queries  \n- `Plausible.IngestRepo` — ClickHouse writes for event ingestion\n\
  - `Plausible.AsyncInsertRepo` — Async database operations\n\n### Secondary Style:\
  \ **Modular Monolith**\n\n**Evidence for Modular Monolith:**\n1. **Single Deployable**:\
  \ One OTP application (`:plausible`), one Dockerfile artifact\n2. **Organized Domain\
  \ Modules**: Clear separation into domain contexts\n   - `lib/plausible/auth/` —\
  \ authentication, users, sessions\n   - `lib/plausible/billing/` — subscriptions,\
  \ plans, quotas\n   - `lib/plausible/teams/` — team management, memberships\n  \
  \ - `lib/plausible/stats/` — analytics query building and execution\n   - `lib/plausible/ingestion/`\
  \ — event processing pipeline\n3. **Single Entry Point**: `Plausible.Application`\
  \ starts all supervisors and children\n4. **Shared Infrastructure**: Common cache,\
  \ telemetry, and logging infrastructure\n\n### What This Is NOT\n\n**Not Microservices:**\n\
  - Single deployment artifact (one release)\n- No service boundaries, API gateways,\
  \ or inter-service communication\n- Direct function calls between all modules\n\n\
  **Not Event-Driven Architecture:**\n- Uses Oban for background jobs (email reports,\
  \ analytics imports) — standard Elixir pattern\n- WriteBuffer batches ClickHouse\
  \ inserts for performance — not event-based communication\n- Components communicate\
  \ via direct function calls, not events\n\n**Not Service-Based:**\n- Not 2-5 coarse-grained\
  \ services sharing a database\n- Single application with multiple repositories\n\
  \n**Not Hexagonal/Ports & Adapters:**\n- No explicit ports/adapters abstraction\
  \ layer\n- Controllers call contexts directly; contexts call repos directly\n\n\
  **Not Microkernel/Plugin:**\n- `Plausible.PluginsAPI` is an external API for users,\
  \ not a plugin system\n- No runtime extension loading mechanism\n\n### Key Architecture\
  \ Details\n\n**Dual Database Architecture:**\n- PostgreSQL: Transactional data (accounts,\
  \ configuration)\n- ClickHouse: Analytical data (events_v2, sessions_v2 tables)\n\
  \nThis is an optimization for the analytics domain, not a microservices pattern.\n\
  \n**Background Job Processing:**\n- Oban workers in `lib/workers/` for async tasks\n\
  - Email reports, analytics imports, cleanup jobs\n- Standard Phoenix pattern, not\
  \ event-driven architecture\n\n**Edition Feature Toggles:**\n- `on_ee`/`on_ce` macros\
  \ conditionally compile features\n- Single codebase serves both Community Edition\
  \ and Enterprise Edition\n\n### Conclusion\n\nPlausible Analytics is a well-structured\
  \ **Layered Monolith** with **Modular Monolith** characteristics. The Phoenix framework\
  \ naturally enforces the layered pattern (controllers → contexts → repos), while\
  \ the internal organization into domain modules provides clean separation of concerns\
  \ within a single deployable unit. The dual-database architecture (PostgreSQL +\
  \ ClickHouse) is a domain-specific optimization for web analytics, not a distributed\
  \ system pattern."
