review_notes: 'Jellyfin is structured as a **Layered** architecture, which is the
  standard pattern for large .NET applications of its era (descended from Emby). However,
  it exhibits strong **Microkernel** characteristics through its extensive plugin
  system and **Modular Monolith** traits due to its logical separation of concerns
  into distinct assemblies.


  ### 1. Layered Architecture (Primary)

  The codebase follows a horizontal layering strategy common in .NET development:

  - **Presentation/API Layer**: Found in `Jellyfin.Server` and `Jellyfin.Api` (not
  fully visible in the tree but referenced in the README), which handles HTTP requests
  and hosts the web client.

  - **Service/Logic Layer**: Specifically `MediaBrowser.Providers` and `Jellyfin.Server.Implementations`.
  These contain the "Managers" (e.g., `UserManager.cs`, `ProviderManager.cs`, `SubtitleManager.cs`)
  that orchestrate business logic.

  - **Data/Model Layer**: `MediaBrowser.Model` contains Data Transfer Objects (DTOs)
  and core entities used across all layers, providing a shared language but strictly
  separating data definitions from logic.

  - **Infrastructure/Implementation**: `Jellyfin.Server.Implementations` provides
  concrete logic for security, activity logging, and database access.


  ### 2. Microkernel (Plugin) Architecture (Secondary)'
