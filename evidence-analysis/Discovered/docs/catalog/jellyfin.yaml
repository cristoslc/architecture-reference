review_notes: 'Based on public knowledge of the Jellyfin repository: it is structured
  as a single deployable .NET application with multiple C# projects (Jellyfin.Server,
  MediaBrowser.Controller, MediaBrowser.Model, MediaBrowser.Common, Emby.Server.Implementations,
  Jellyfin.Api, Jellyfin.Data) each representing distinct modules with clear layer
  boundaries (API layer, controller/business logic layer, data/model layer). No Kubernetes/Docker
  multi-service orchestration, no message broker configuration. The 42 package manifests
  signal multiple .csproj files (modular project separation), and the single messaging
  signal is consistent with internal eventing rather than external broker. Heuristic
  candidates of Modular Monolith (0.4) and DDD (0.3) from catalog align with the known
  project-per-concern structure.'
