classification_reasoning: "## Analysis\n\n### Primary Style: **Microkernel (Plugin)**\n\
  \nJellyfin exhibits a clear **Microkernel/Plugin architecture** as its dominant\
  \ pattern:\n\n**Evidence:**\n1. **Runtime Plugin Loading**: `PluginManager.cs` (lines\
  \ 56-87) discovers plugins from a filesystem path, loads them via `AssemblyLoadContext`,\
  \ and manages their lifecycle:\n   ```csharp\n   _plugins = Directory.Exists(_pluginsPath)\
  \ ? DiscoverPlugins().ToList() : new List<LocalPlugin>();\n   ```\n\n2. **Plugin\
  \ Isolation**: `PluginLoadContext.cs` uses .NET's `AssemblyLoadContext` to provide\
  \ isolated plugin loading, allowing plugins to be loaded/unloaded independently.\n\
  \n3. **Plugin Contract**: The `IPlugin` interface (`MediaBrowser.Common/Plugins/IPlugin.cs`)\
  \ and `BasePlugin` abstract class define the contract for plugins, including `OnUninstalling()`,\
  \ versioning, and data folder management.\n\n4. **Service Registration Entry Point**:\
  \ `IPluginServiceRegistrator` interface allows plugins to register services with\
  \ the core DI container:\n   ```csharp\n   void RegisterServices(IServiceCollection\
  \ serviceCollection, IServerApplicationHost applicationHost);\n   ```\n\n5. **Composition\
  \ Root with Plugin Integration**: `ApplicationHost.cs` (the \"composition root\"\
  ) integrates plugins during initialization via `GetExportTypes<T>()` and `GetApiPluginAssemblies()`.\n\
  \n6. **Extensibility**: The system is designed for third-party extensions—plugins\
  \ can add new functionality (metadata providers, channels, subtitle providers) without\
  \ modifying core code.\n\n### Secondary Style: **Layered**\n\nThe codebase also\
  \ exhibits strong **Layered architecture** characteristics:\n\n**Evidence:**\n1.\
  \ **Presentation Layer**: `Jellyfin.Api/Controllers/` contains ASP.NET Core API\
  \ controllers that handle HTTP requests/responses.\n\n2. **Business/Service Layer**:\
  \ `Emby.Server.Implementations/` contains service implementations (`LibraryManager`,\
  \ `SessionManager`, `UserManager`, etc.) implementing interfaces from `MediaBrowser.Controller/`.\n\
  \n3. **Data Access Layer**: `Jellyfin.Server.Implementations/Item/` contains repositories\
  \ (`BaseItemRepository`, `PeopleRepository`), and `JellyfinDbContext` handles database\
  \ operations.\n\n4. **Abstraction Layer**: `MediaBrowser.Controller/` defines interfaces\
  \ (`ILibraryManager`, `ISessionManager`, `IUserManager`) that separate layers.\n\
  \n5. **Model Layer**: `MediaBrowser.Model/` and `Jellyfin.Data/` contain DTOs and\
  \ entity definitions.\n\n### What Was Rejected\n\n- **Not Microservices**: Single\
  \ deployable executable, no independent services, no inter-service communication.\n\
  - **Not Modular Monolith**: While there are modules, they don't have enforced compile-time\
  \ boundaries; the plugin system provides runtime modularity.\n- **Not Event-Driven**:\
  \ Uses WebSockets for client push, but components communicate primarily through\
  \ direct method calls, not event buses.\n- **Not Hexagonal**: While interfaces exist,\
  \ they're for layering/extension rather than ports-and-adapters isolation.\n- **Not\
  \ DDD**: No bounded contexts, aggregates, or ubiquitous language patterns visible.\n\
  \nThe architecture effectively combines a layered foundation with a microkernel\
  \ extension mechanism, allowing third-party developers to extend the media server\
  \ through plugins while maintaining clean internal separation."
