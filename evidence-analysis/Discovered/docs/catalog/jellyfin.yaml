review_notes: "Layered: Jellyfin.Api (40+ REST controllers in presentation layer), MediaBrowser.Controller (service/interface layer), Emby.Server.Implementations + Jellyfin.Server.Implementations (business logic), MediaBrowser.Model + Jellyfin.Data (data/model layer), Startup.cs shows ASP.NET middleware pipeline. Modular Monolith: 20 separate .csproj assemblies with interface-implementation separation (MediaBrowser.Controller defines ILibraryManager/ISessionManager etc, Emby.Server.Implementations provides concrete classes), plugin system (IPlugin/IPluginManager/IPluginAssembly in MediaBrowser.Common/Plugins/), domain modules (Jellyfin.LiveTv, Emby.Naming, MediaBrowser.Providers, MediaBrowser.XbmcMetadata), EventManager with IEventConsumer<T> for decoupled cross-module communication. Single deployable server process."