review_notes: 'The PostgREST repository is structured as a **Layered** architecture,
  specifically following a functional request-processing pipeline. While it appears
  to be a simple utility, the internal code organization is strictly divided into
  logical layers that handle the transformation of an HTTP request into a SQL query
  and back into a JSON response.


  ### 1. Primary Style: Layered

  The codebase is organized into distinct functional layers as evidenced by the `src/PostgREST`
  directory and the `postgrest.cabal` file. Each layer has a specific responsibility:

  - **Presentation/Interface Layer**: `Network.hs`, `App.hs`, and `Admin.hs` manage
  the Warp HTTP server and routing.

  - **Request Parsing Layer**: `ApiRequest.hs` and `ApiRequest/*.hs` parse HTTP headers,
  query parameters, and payloads into internal Haskell types.

  - **Logical Planning Layer**: `Plan.hs` and `Plan/*.hs` (ReadPlan, MutatePlan) take
  the parsed request and the `SchemaCache` to create an abstract execution plan.

  - **Data Access/Query Layer**: `Query.hs` and `Query/*.hs` translate the execution
  plan into parameterized SQL statements using the `Hasql` library.

  - **Cross-Cutting Concerns**: `Config.hs`, `Auth.hs`, `Logger.hs`, and `Metrics.hs`
  provide services utilized across multiple layers.'
