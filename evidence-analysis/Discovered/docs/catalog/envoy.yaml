review_notes: 'Envoy is a single monolithic C++ binary (not microservices). The ''api_specs:
  830'' signal represents protocol buffer definitions for Envoy''s xDS configuration
  API, not inter-service APIs. Envoy''s core architecture is a chain of L3/L4 and
  HTTP filters that process requests sequentially - this is the canonical Pipe-and-Filter
  pattern. The internal event-driven behavior (using libevent) is implementation detail
  of network proxies, not a distinct architectural style.'
