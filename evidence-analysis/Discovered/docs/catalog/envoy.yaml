  \     │\n│  cors, jwt)  │  │  otel, wasm)  │  │ Stats Sinks, Matchers, etc.   │\n\
  └─────────────┘  └──────────────┘  └────────────────────────────────┘\n        \
  \                      │\n                    ┌─────────▼─────────┐\n          \
  \          │   Core Kernel     │\n                    │  (source/common/) │\n  \
  \                  │ - HTTP/Network    │\n                    │ - Router       \
  \   │\n                    │ - Upstream        │\n                    └───────────────────┘\n\
  \                              │\n                    ┌─────────▼─────────┐\n  \
  \                  │  Public APIs      │\n                    │  (envoy/ header\
