review_notes: 'This repository is the official reference implementation for Vaughn
  Vernon''s book "Implementing Domain-Driven Design." As such, it is a canonical example
  of **Domain-Driven Design (DDD)** organized into distinct **Bounded Contexts**.


  ### Primary Style: Domain-Driven Design (DDD)

  The repository is structured as a multi-module Gradle project, where each top-level
  directory (excluding `iddd_common`) represents a distinct Bounded Context:

  - `iddd_agilepm`: Agile Project Management context.

  - `iddd_collaboration`: Collaboration context.

  - `iddd_identityaccess`: Identity and Access Management context.


  Each module contains its own internal domain model (Aggregates, Entities, Value
  Objects) and domain services, adhering to the principle of linguistic and conceptual
  boundaries.'
