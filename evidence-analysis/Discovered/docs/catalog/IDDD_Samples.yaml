review_notes: "Official companion code for 'Implementing Domain-Driven Design' by Vaughn Vernon. Four Bounded Contexts (iddd_agilepm, iddd_collaboration, iddd_identityaccess, iddd_common) organized as Gradle subprojects. DDD: Rich domain model with Aggregates (Product, BacklogItem, Forum, Calendar), Value Objects (TenantId, ProductId, EmailAddress, PostalAddress), Domain Events (ProductCreated, ForumStarted, UserRegistered), Repositories (ProductRepository, ForumRepository), Domain Services (AuthenticationService, CollaboratorService), and Application Services with Command objects in iddd_*/application/. CQRS: iddd_collaboration separates write model (EventStore*Repository classes in port/adapter/persistence/repository/) from read model (MySQL*Projection classes in port/adapter/persistence/view/ projecting events into tbl_vw_* tables, queried by *QueryService classes in application/). Event-Driven: Cross-BC integration via RabbitMQ listeners in iddd_agilepm/port/adapter/messaging/rabbitmq/ consuming events from Identity & Access BC (e.g., RabbitMQTeamMemberEnablerListener listens for UserAssignedToRole). Event Sourcing in iddd_collaboration via EventSourcedRootEntity base class and LevelDB/MySQL event stores in iddd_common/port/adapter/persistence/eventsourcing/. Hexagonal Architecture: Clear Ports & Adapters structure across all BCs with domain/model/ (core), application/ (use cases), port/adapter/ (infrastructure adapters for messaging, persistence, REST). iddd_identityaccess uses resource/ package for RESTful adapters (UserResource.java, TenantResource.java) and infrastructure/persistence/ for Hibernate adapters."