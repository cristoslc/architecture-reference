  ### Secondary Style: Modular Monolith

  While it is a single deployable unit (Monolith), it exhibits characteristics of
  a **Modular Monolith**:

  - **Strict Boundary Enforcement:** Using separate `.csproj` files (e.g., `Radarr.Core`,
  `Radarr.Common`, `Radarr.Api`) ensures that the Infrastructure layer cannot accidentally
  depend on the API layer, enforcing a unidirectional dependency flow.

  - **Platform Abstraction:** The code uses a "Ports and Adapters" approach for platform-specific
  logic. Projects like `Radarr.Mono` and `Radarr.Windows` provide implementations
  for disk and OS operations defined by interfaces in `Radarr.Common`.

  - **Internal Messaging:** The presence of `NzbDrone.SignalR` and internal command
  execution logic suggests an event-like system for internal decoupling, although
  it remains within a single process.


  ### Evidence of Classification:

  - **Solution Structure:** The `Radarr.sln` includes distinct logical segments (Host,
  Platform, API, Core).

  - **Dependency Flow:** The backend projects are structured such that `Host` depends
  on `Api` and `Core`, while `Core` depends on `Common`, following classic layering
  rules.

  - **Single Unit of Deployment:** Despite multiple projects, they are compiled into
  a single executable (Radarr.exe or binary), as evidenced by the lack of `docker-compose.yml`
  or microservice orchestration tools in the root.

  - **Testing Archetype:** The repository contains a mirrored test structure (`Radarr.Api.Test`,
  `Radarr.Core.Test`), which is indicative of a modular maintenance strategy within
  a monolith.'
