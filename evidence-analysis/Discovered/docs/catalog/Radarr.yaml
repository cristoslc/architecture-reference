one_line_summary: "An automated movie collection manager built as a Modular Monolith with a Microkernel plugin layer â€” the ThingiProvider framework lets indexers, download clients, notifications, and import lists be added at runtime without touching the core, while an internal EventAggregator and CommandExecutor coordinate all domain workflows within a single ASP.NET Core process."
classification_reasoning: "## Primary Style: Modular Monolith\n\nRadarr is a single deployable ASP.NET Core process bootstrapped in\n`NzbDrone.Host/Bootstrap.cs` using DryIoc (`AutoAddServices(assemblies)`).\nThe `Bootstrap.ASSEMBLIES` list registers 5 assemblies: Radarr.Host, Radarr.Core,\nRadarr.SignalR, Radarr.Api.V3, Radarr.Http â€” all compiled into one binary.\n\nThe solution (`Radarr.sln`) contains ~25 projects. `NzbDrone.Core` contains\n1,538 `.cs` files organized as vertical domain slices:\n\n- `Movies/` â€” Movie, MovieMetadata, Collections, Credits, RefreshMovieService, 13 domain events\n- `Download/` â€” download client abstraction, CompletedDownloadService, DownloadEventHub\n- `Indexers/` â€” indexer request/response pipeline, RSS sync, FetchAndParseRssService\n- `IndexerSearch/` â€” search coordination, SearchCriteriaBase\n- `DecisionEngine/` â€” DownloadDecisionMaker + 20+ IDownloadDecisionEngineSpecification pipeline\n- `Notifications/` â€” notification fanout on grab/import/rename/health events\n- `MediaFiles/` â€” disk scan, video file import/rename, MediaFileService\n- `CustomFormats/` â€” quality scoring ruleset with SpecificationMatchesGroup (Radarr-specific)\n- `Queue/` â€” in-progress download tracking\n- `History/` â€” persistent download/import audit log\n- `ImportLists/` â€” TMDb, Trakt, Plex, Simkl, Radarr list providers\n- `AutoTagging/` â€” automated tag assignment rules\n- `Profiles/` â€” quality, delay, and language profile management\n\nThe system runs against a single SQLite or PostgreSQL database accessed through\n`BasicRepository<T>` (Dapper-based), with 150 ordered migration scripts under\n`Datastore/Migration/`.\n\n## Secondary Style: Microkernel\n\nThe `ThingiProvider` framework (`NzbDrone.Core/ThingiProvider/`) is a generic\nplugin bus. Every extension category implements `IProvider`:\n\n  public interface IProvider\n  {\n      string Name { get; }\n      Type ConfigContract { get; }\n      ProviderMessage Message { get; }\n      IEnumerable<ProviderDefinition> DefaultDefinitions { get; }\n      ProviderDefinition Definition { get; set; }\n      ValidationResult Test();\n      object RequestAction(string stage, IDictionary<string, string> query);\n  }\n\nThe generic `ProviderFactory<TProvider, TProviderDefinition>` resolves\nimplementations from the DryIoc container at runtime and publishes lifecycle\nevents through `EventAggregator`. Concrete plugin counts:\n\n- ~10 indexer types (Newznab, Torznab, HDBits, FileList, Nyaa, PassThePopcorn,\n  IPTorrents, TorrentRss, TorrentPotato) via `HttpIndexerBase`\n- ~21 download client implementations (qBittorrent, Transmission, Deluge, SABnzbd,\n  rTorrent, uTorrent, Flood, Aria2, NZBGet, NzbVortex, DownloadStation, FreeboxDownload,\n  Hadouken, Pneumatic, Vuze, Blackhole, etc.) via `DownloadClientBase<TSettings>`\n- ~26 notification targets (Discord, Slack, Email, Webhook, Pushover, Telegram,\n  Plex, Apprise, Gotify, Join, Mailgun, Notifiarr, Ntfy, PushBullet, Pushcut,\n  Pushsafer, SendGrid, Signal, Simplepush, Synology, Trakt, Twitter, Xbmc, etc.)\n  via `NotificationBase` / `INotification`\n- ~14 import list sources (TMDb, Trakt, IMDb, CouchPotato, Plex, Simkl, Radarr,\n  RadarrList, RadarrList2, StevenLu, RSSImport) via `HttpImportListBase`\n\nAdding a new extension requires zero changes to the factory core; the new\nclass is auto-discovered by DryIoc's `AutoAddServices`.\n\nThe internal event/command infrastructure:\n\n- `EventAggregator.PublishEvent<TEvent>` resolves all `IHandle<TEvent>` +\n  `IHandleAsync<TEvent>` subscribers from the container and dispatches\n  synchronously then asynchronously via `TaskFactory`.\n- `CommandExecutor` resolves `IExecute<TCommand>` handlers from the container\n  and runs them across 2-10 worker threads from a `CommandQueue`.\n\n## What This Is NOT\n\n- NOT Microservices: One binary, one database, no network service boundary.\n  The *arr ecosystem is Service-Based at the ecosystem level, but each member\n  is a self-contained monolith.\n- NOT Layered (horizontal): Organizing principle is vertical domain modules\n  within `NzbDrone.Core`, not horizontal technical tiers.\n- NOT Event-Driven (async messaging): `EventAggregator` is an in-process\n  publish/subscribe mechanism with no Kafka, RabbitMQ, or durable queues.\n- NOT CQRS: No separate read/write models; services read and write through\n  the same `BasicRepository<T>` and service layer.\n\n## Quality Attribute Evidence\n\n- Modularity: 25+ domain folders with own Models/Services/Repositories/Events;\n  `ThingiProvider` plugin contracts enforce separation between core and extensions;\n  DryIoc auto-discovery wires all implementations.\n- Evolvability: 150 ordered DB migrations; adding new indexer/download-client/\n  notification requires no core changes; `CustomFormats` ruleset decouples quality\n  scoring from release parsing logic.\n- Observability: NLog throughout; SignalR `MessageHub` pushes real-time\n  command/event status to React UI; 33 `HealthCheck/Checks/` covering indexer\n  status, download client config, root folder validity, API key, import list\n  status, naming config, mount points, movie collection root folders.\n- Deployability: Cross-platform .NET (Windows service, Linux daemon, Docker);\n  SQLite default, PostgreSQL optional; Kestrel embedded web server; single binary.\n- Fault Tolerance: `CommandExecutor` catches per-command exceptions and marks\n  commands failed without crashing worker threads; `ProviderFactory` removes\n  missing implementations on startup; `DownloadEventHub` tracks failures.\n- Scalability: Single-process, single-host design; vertical scaling only;\n  PostgreSQL support allows external DB for multi-container setups;\n  `CommandQueue` scales worker threads between 2-10 based on load."
