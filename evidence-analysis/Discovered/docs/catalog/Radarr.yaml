  \ modules: `NzbDrone.Windows`, `NzbDrone.Mono`\n\n**Domain-Organized Core**: The\
  \ `NzbDrone.Core` project is organized by domain modules, not technical layers:\n\
  - `Movies/`, `Download/`, `Indexers/`, `Notifications/`, `ImportLists/`, `Backup/`,\
  \ `CustomFormats/`, `Queue/`, `History/`, etc.\n\nEach module contains its own models,\
