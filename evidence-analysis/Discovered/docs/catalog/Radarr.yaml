review_notes: 'Radarr is structured as a **Layered** architecture, which is the standard
  pattern for the NzbDrone/Servarr family of applications. The codebase is organized
  into distinct horizontal responsibility layers across multiple .NET projects within
  a single solution (`Radarr.sln`).


  ### Primary Style: Layered

  The system follows a clear separation of concerns typical of tiered applications:

  1.  **Presentation Layer (Frontend):** A large React/TypeScript application located
  in the `/frontend` directory. It communicates with the backend via a REST API.

  2.  **API Layer (`Radarr.Api.V3`):** Defines the external contract and handles HTTP
  requests.

  3.  **Business Logic Layer (`Radarr.Core` / `NzbDrone.Core`):** This is the heart
  of the application, containing the "Entities" (Movies, Indexers, Download Clients)
  and the services that coordinate them (e.g., searching, importing, renaming).

  4.  **Infrastructure/Common Layer (`Radarr.Common`, `Radarr.Http`, `Radarr.SignalR`):**
  Provides cross-cutting concerns like logging, HTTP clients, disk I/O abstractions,
  and real-time notifications via SignalR.

  5.  **Host/Bootstrapper Layer (`Radarr.Host`, `Radarr.Console`):** Responsible for
  dependency injection (DI) setup, internal service orchestration (using a Custom
  `ServiceFactory` or `ServiceProvider`), and starting the web server.'
