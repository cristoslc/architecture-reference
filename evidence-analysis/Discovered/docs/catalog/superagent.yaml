review_notes: 'Repo is a client-side SDK (TypeScript + Python) for AI safety (guard,
  redact, scan). Core pipeline in sdk/typescript/src/client.ts: input processing ->
  prompt construction -> provider dispatch -> response transformation -> result aggregation.
  Provider strategy pattern in sdk/typescript/src/providers/ with ProviderConfig interface
  (transformRequest/transformResponse/authHeader). Layered: public API (index.ts),
  business logic (prompts/, schemas.ts, chunking in client.ts), infrastructure (providers/).
  Also includes CLI (cli/src/commands/) and MCP server adapter (mcp/src/index.ts).
  No containers, no microservices, no event-driven patterns. docs/ is a Next.js documentation
  site, not part of the core architecture.'
