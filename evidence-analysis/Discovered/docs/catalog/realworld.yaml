review_notes: 'The repo is primarily a specification project (OpenAPI spec, API test
  suites in Bruno/Hurl/Postman, E2E Playwright specs, frontend/backend documentation)
  but also includes a reference backend implementation in apps/api/ built with Nitro
  (server framework) and Prisma ORM on SQLite. The reference API follows a Layered
  architecture: file-based route handlers in server/routes/api/ (presentation/controller
  layer), utility mappers in server/utils/ (article.mapper.ts, author.mapper.ts, profile.utils.ts
  as a mapping/service layer), TypeScript interfaces in server/models/ (domain model
  layer), and Prisma ORM with schema.prisma for data access. Auth middleware (auth-event-handler.ts,
  auth.ts) acts as cross-cutting concern. No service layer abstraction exists - route
  handlers directly call Prisma. The apps/documentation/ directory is an Astro-based
  docs site. Confidence is moderate (0.75) because the actual code implementation
  is a relatively small reference implementation, not a production system, and the
  layering is thin (routes call ORM directly with mapper utilities but no distinct
  service/business-logic layer).'
