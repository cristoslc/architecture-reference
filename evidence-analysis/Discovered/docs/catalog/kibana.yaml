  \ execution, ensuring dependencies are resolved before a plugin's `setup` or `start`\
  \ method is called.\n\n### 2. Secondary Style: Modular Monolith\nWhile the architecture\
  \ is plugin-based, it is a **Modular Monolith** in terms of deployment. \n- **Single\
  \ Unit:** Despite the massive number of internal packages and plugins, Kibana is\
  \ typically built and shipped as a single deployable server and browser bundle.\n\
  - **Internal Dependency Enforcement:** The use of `link:` in `package.json` and\
  \ the `tsconfig` base configurations enforce that internal modules (plugins) respect\
  \ boundaries, preventing \"spaghetti\" dependencies while still running in a shared\
  \ process.\n- **Shared Memory/Runtime:** Unlike Microservices, plugins share the\
  \ same Node.js process on the server and the same memory space in the browser, communicating\
  \ via direct function calls across their exposed APIs rather than over a network.\n\
  \n### Evidence Citing Specific Paths:\n- `src/core/`: Contains the microkernel responsible\
  \ for the \"Kibana Platform\" (Server and Public/Browser parts).\n- `package.json`:\
  \ Shows hundreds of internal dependencies (e.g., `@kbn/alerting-plugin`, `@kbn/canvas-plugin`)\
  \ linked to internal directories, illustrating the modularized plugin structure.\n\
  - `docs/extend/kibana-architecture.md`: Explicitly references the \"Plugin API\"\
  \ and \"Core API\" as the primary way of extending the system.\n- `src/core/server/index.ts`\
  \ and `src/core/public/index.ts`: The entry points for the core services that bootstrap\
  \ the plugin system."
