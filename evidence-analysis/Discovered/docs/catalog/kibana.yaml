review_notes: 'Kibana is a textbook example of a **Microkernel (Plugin)** architecture,
  specifically through its "Kibana Platform" (introduced in version 7.x and finalized
  in 8.x). The architecture separates a minimal system core from extensive application
  functionality implemented as plugins.


  ### 1. Primary Style: Microkernel (Plugin)

  The system is structured around a "Core" (located in `src/core`) which acts as the
  microkernel. This core provides fundamental low-level services (HTTP, logging, UI
  settings, saved objects) and manages the lifecycle of plugins through clearly defined
  stages: **Setup**, **Start**, and **Stop**.


  - **Plugin Contracts:** Every feature in Kibana (from Dashboards to Security) is
  a plugin. Plugins interact with the Core and each other through strictly defined
  "contracts" (TypeScript interfaces). A plugin can "expose" an API during its Setup/Start
  phase for other plugins to consume.

  - **Isolations and Boundaries:** The `package.json` reveals hundreds of `@kbn/*`
  packages linked via `link:src/platform/...` or `link:x-pack/...`. This demonstrates
  physical and logical separation of concerns where features are packaged independently
  but loaded into a single runtime.

  - **Lifecycle Management:** Documentation in `docs/extend/` (specifically `application-service.md`
  and `kibana-platform-plugin-api.md`) confirms that the Core orchestrates plugin
  execution, ensuring dependencies are resolved before a plugin''s `setup` or `start`
  method is called.


  ### 2. Secondary Style: Modular Monolith'
