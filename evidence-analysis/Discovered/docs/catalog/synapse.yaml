classification_reasoning: >-
  ## Architecture Analysis: Synapse (Matrix Homeserver)


  ### Primary Style: Layered


  Every Synapse process — monolith or worker — is structured as a strict three-tier
  horizontal stack. The REST layer (synapse/rest/) handles HTTP parsing and delegates
  to the handler layer (synapse/handlers/, ~50 handler modules) which implements all
  business logic. The handler layer calls the storage layer (synapse/storage/) via
  SQLBaseStore subclasses for all persistence. The docs/architecture.md diagram makes
  this explicit, showing REST ↔ handlers ↔ storage ↔ DB. The HomeServer service
  locator (synapse/server.py) wires all components together via lazy factory methods
  but does not break the downward-only dependency convention.


  ### Primary Style: Service-Based


  Synapse implements an optional worker topology documented in docs/workers.md and
  docs/replication.md. Multiple Python processes are deployed from the same codebase
  with different entry points under synapse/app/. All processes share one PostgreSQL
  database. Communication uses two channels: Redis pub/sub for the internal replication
  stream (named streams: EventsStream, PresenceStream, TypingStream, ReceiptsStream,
  ToDeviceStream, DeviceListsStream, PushRulesStream, CachesStream, etc.), and HTTP
  to the main process's internal replication listener for synchronous operations
  (event persistence, membership changes, presence updates). This is Service-Based
  and not Microservices because the database is shared, workers are from the same
  codebase, decomposition is coarse-grained (~5 service types), and monolith
  deployment is the default recommendation for small instances.


  ### Secondary Style: Microkernel


  synapse/module_api/__init__.py defines the ModuleApi class: a stable, versioned
  extension interface. External Python packages register callbacks at named hook
  points (spam checking, presence routing, password auth, third-party event rules,
  account validity, media upload limits, ratelimit overrides) and can add HTTP
  endpoints via register_web_resource(). Callback registries in
  synapse/module_api/callbacks/ hold lists of callables contributed by all loaded
  modules. This is a textbook Microkernel plugin system: a stable core with defined
  extension points, with extensions not requiring core modification.


  ### Architecture Qualifier: federated


  The Matrix federation protocol is a core architectural concern, not a peripheral
  feature. Every Synapse instance participates as a peer in the global Matrix network.
  FederationServer (synapse/federation/federation_server.py) receives inbound PDUs/EDUs;
  FederationClient and FederationSender handle outbound delivery with retry and
  per-destination backoff. All federated room events form a cryptographically signed
  DAG with auth_events and prev_events links. State Resolution v1/v2 algorithms
  merge divergent DAG branches. This federated distribution model is fundamental to
  what Synapse is.


  ### Architecture Qualifier: cqrs-at-infrastructure-level


  The worker topology implements a read/write separation at the infrastructure level:
  the main process (or designated stream writer) owns event persistence; generic
  workers handle reads. The stream writer assignment configuration allows specific
  named streams to be owned by named worker instances. This is genuine CQRS-style
  separation at the deployment level, but it is an operational concern within the
  Service-Based topology, not a domain-level command/query model with separate
  aggregates.


  ### What Was Rejected


  Not Microservices: shared PostgreSQL, shared codebase, no per-service data ownership.
  Not Event-Driven (primary): Redis pub/sub is a cache invalidation bus, not an
  application event broker between bounded contexts; synchronous HTTP is the primary
  inter-worker coordination channel for writes. Not Modular Monolith: no enforced
  module boundaries; HomeServer allows arbitrary cross-cutting access.
