classification_reasoning: "## Architecture Analysis: Synapse (Matrix Homeserver)\n\
  \n### Primary Style: Layered Architecture\n\nSynapse exhibits a classic **layered\
  \ architecture** with clear horizontal separation of concerns:\n\n**Evidence from\
  \ codebase structure:**\n- **REST Layer** (`synapse/rest/`): HTTP servlets handling\
  \ client, admin, federation, and media endpoints. Files like `synapse/rest/client/_base.py`\
  \ define URL patterns and servlet interfaces.\n- **Handler Layer** (`synapse/handlers/`):\
  \ Business logic components (~50 handlers) including `message.py`, `federation.py`,\
  \ `presence.py`, `room.py`, etc.\n- **Storage Layer** (`synapse/storage/`): Database\
  \ abstraction with `SQLBaseStore` base class and specialized stores (`databases/main/`,\
  \ `databases/state/`).\n- **API Layer** (`synapse/api/`): Constants, errors, filtering,\
  \ and other cross-cutting concerns.\n\n**Architecture diagram from `docs/architecture.md`:**\n\
  ```\nsynapse\n.-----------------------------------------------------.\n|       \
  \                   Notifier                   |\n|                            ^\
  \  |                     |\n|                  .------------|------.           \
  \   |\n|                  | handlers/  |      |              |\n|              \
  \    |            v      |              |\n|                  | Event*Handler <-------->\
  \ rest/* <=> Client\n|                  | Rooms*Handler     |              |\nHS\
  \ <=> federation/* <==> FederationHandler |              |\n...\n|      `-------------->\
  \ storage/*                     |\n'--------------------------|--------------------------'\n\
  \                           v\n                        .----.\n                \
  \        | DB |\n```\n\n### Secondary Style: Service-Based Architecture\n\nSynapse\
  \ supports **horizontal scaling via workers** - independently deployable processes\
  \ that share a common PostgreSQL database:\n\n**Evidence from `docs/workers.md`:**\n\
  > \"For larger instances where performance is a concern it can be helpful to split\
  \ out functionality into multiple separate python processes. These processes are\
  \ called 'workers', and are (eventually) intended to scale horizontally independently.\"\
  \n\n**Worker types** (`synapse/app/`):\n- `homeserver.py` - Main process\n- `generic_worker.py`\
  \ - Handles client/federation requests  \n- `federation_sender.py` - Sends federation\
  \ transactions\n- `pusher.py` - Push notifications\n- `media_repository.py` - Media\
  \ handling\n- `synchrotron.py` - /sync endpoints\n- `user_dir.py` - User directory\n\
  \n**Communication mechanism:**\n- Redis pub/sub for replication streams between\
  \ processes\n- HTTP for synchronous request/response operations\n- All workers share\
  \ the same PostgreSQL database\n\n**Docker compose example** (`contrib/docker_compose_workers/docker-compose.yaml`):\n\
  ```yaml\nsynapse-generic-worker-1:\n  environment:\n    SYNAPSE_WORKER: synapse.app.generic_worker\n\
  synapse-federation-sender-1:\n  environment:\n    SYNAPSE_WORKER: synapse.app.federation_sender\n\
  ```\n\nThis is **Service-Based** (not Microservices) because:\n- 2-5 coarse-grained\
  \ service types (not dozens of microservices)\n- Shared database (PostgreSQL) is\
  \ the norm\n- Workers are optional - monolith deployment is default\n\n### Secondary\
  \ Style: Microkernel (Plugin)\n\nSynapse has a **plugin/module system** for extending\
  \ functionality:\n\n**Evidence from `docs/modules/index.md`:**\n> \"Synapse supports\
  \ extending its functionality by configuring external modules... Each module is\
  \ defined by a path to a Python class as well as a configuration.\"\n\n**Module\
  \ API (`synapse/module_api/__init__.py`):**\n- `register_web_resource()` - Add HTTP\
  \ endpoints\n- `register_spam_checker_callbacks()` - Content moderation hooks\n\
  - `register_presence_router_callbacks()` - Presence routing\n- `register_password_auth_provider_callbacks()`\
  \ - Custom authentication\n- `register_third_party_rules_callbacks()` - Event validation\
  \ hooks\n- Cache management APIs for modules\n\n**Configuration example:**\n```yaml\n\
  modules:\n  - module: my_super_module.MySuperClass\n    config:\n      do_thing:\
  \ true\n```\n\n### What This Is NOT\n\n**Not Microservices:**\n- No independent\
  \ data ownership - all workers share PostgreSQL\n- No API gateways between services\n\
  - Workers are same codebase, different entry points\n- Default deployment is monolithic\n\
  \n**Not Event-Driven:**\n- Matrix protocol handles events (business domain), not\
  \ architectural pattern\n- Redis pub/sub is for data replication, not application\
  \ event routing\n- Synchronous HTTP between workers for most operations\n\n**Not\
  \ Domain-Driven Design:**\n- No bounded contexts, aggregates, or ubiquitous language\n\
  - Organized by technical layers (handlers, storage, rest)\n- No domain event patterns\
  \ or event sourcing\n\n**Not CQRS:**\n- Single unified data model\n- No separate\
  \ read/write models\n- Direct database access from handlers\n\n**Not Hexagonal:**\n\
  - No ports/adapters isolation\n- Handlers directly instantiate and call storage\n\
  - Database is tightly integrated, not abstracted through interfaces\n\n### Conclusion\n\
  \nSynapse is a **Layered monolithic application** with optional **Service-Based**\
  \ scaling capa\n\n[truncated]"
