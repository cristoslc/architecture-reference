review_notes: "Synapse is structured as a **Service-Based** architecture that can\
  \ be deployed either as a monolith or as a set of specialized, coarse-grained services\
  \ (referred to in the codebase as \"workers\"). While it shares some traits with\
  \ Microservices (independent scalability), it is fundamentally service-based because\
  \ all workers typically share a single logical database and are built from the same\
  \ unified codebase using a shared configuration.\n\n### 1. Primary Style: Service-Based\n\
  The \"Worker\" architecture is the defining structural characteristic of Synapse.\
  \ \n- **Shared Codebase & Logic:** The directory `synapse/app/` contains multiple\
  \ entry points like `federation_reader.py`, `pusher.py`, and `client_reader.py`.\
  \ These allow the monolith to be split into functional units that handle specific\
  \ subsets of the Matrix protocol.\n- **Shared Database:** Unlike pure microservices,\
  \ Synapse workers generally operate against a shared PostgreSQL instance. The `synapse/storage`\
  \ layer is designed to be shared across these instances, using a custom replication\
  \ protocol (found in `synapse/replication/`) to keep in-memory caches synchronized\
  \ across processes.\n- **Coarse-Grained Separation:** The separation is based on\
  \ functional areas (Reading vs. Writing, Federation vs. Client API) rather than\
  \ fine-grained domain boundaries.\n\n### 2. Secondary Style: Layered\nInternally,\
  \ each synapse service follows a strict horizontal layering pattern:"
