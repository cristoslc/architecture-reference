review_notes: "domain/ defines port interfaces (TaskRepository, TaskUsecase, LoginUsecase in domain/task.go, domain/login.go, domain/user.go). usecase/ and repository/ provide concrete adapters. mongo/mongo.go defines abstract Database/Collection/Client interfaces wrapping MongoDB driver — a secondary adapter boundary. README documents 5 layers: Router->Controller->Usecase->Repository->Domain. api/route/task_route.go shows manual dependency wiring. cmd/main.go is the composition root via bootstrap/app.go. Dependencies consistently point inward toward domain."