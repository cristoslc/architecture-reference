review_notes: "This repository is a textbook implementation of **Hexagonal Architecture**\
  \ (also known as Ports and Adapters), specifically following the \"Clean Architecture\"\
  \ flavor popularized by Robert C. Martin. \n\n### Evidence of Hexagonal Architecture:\n\
  1.  **Dependency Rule**: The directory structure is organized into concentric layers.\
  \ The `domain/` directory (the core) contains only interfaces and data structures\
  \ (e.g., `domain/user.go`, `domain/task.go`), which act as the \"Ports.\"\n2.  **Decoupled\
  \ Adapters**:\n    *   **Driving Adapters**: Found in `api/controller/` and `api/route/`.\
  \ These handle the delivery mechanism (Gin/HTTP) and depend on the core Usecases.\n\
  \    *   **Driven Adapters**: Found in `repository/` and `mongo/`. These handle\
  \ data persistence and infrastructure details, implementing the interfaces defined\
  \ in the `domain/` layer.\n3.  **Dependency Inversion**: High-level modules (Usecases)\
  \ do not depend on low-level modules (Repositories/MongoDB). Instead, both depend\
  \ on abstractions (the Interfaces in `domain/`).\n4.  **Use of Mocks**: Extensive\
  \ use of `mockery` and the presence of `domain/mocks/` and `mongo/mocks/` confirm\
  \ that components are isolated from their side-effect-producing dependencies during\
  \ testing, a hallmark of Hexagonal systems."
