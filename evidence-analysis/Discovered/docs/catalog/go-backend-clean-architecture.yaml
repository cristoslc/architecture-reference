review_notes: 'Evidence: directory structure shows classic Clean Architecture layering:
  `domain/` (entities/interfaces), `usecase/` (application logic), `repository/` (data
  access), `api/controller/` + `api/route/` + `api/middleware/` (presentation). The
  `domain/` package defines interfaces (mocks generated for TaskRepository, UserRepository,
  use-cases) acting as ports, while `repository/` and `mongo/` are adapters — confirming
  Hexagonal/ports-and-adapters pattern. Single Dockerfile and single docker-compose.yaml
  confirm a single deployable unit. No separate service directories, no message broker,
  no microservices signals.'
