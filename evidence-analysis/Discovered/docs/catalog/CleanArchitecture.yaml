review_notes: 'This repository is a quintessential implementation of **Hexagonal Architecture**
  (also known as Clean, Onion, or Ports-and-Adapters). The project structure is explicitly
  designed to isolate the core business logic from external concerns like databases,
  UI, and third-party services.


  ### Primary Style: Hexagonal Architecture

  The codebase is divided into distinct projects that represent the layers of Clean
  Architecture:

  - **`src/Clean.Architecture.Core` (The Center):** Contains the domain model (entities,
  aggregates, and domain events) and abstractions (interfaces). It has zero dependencies
  on external projects or infrastructure libraries. Citing paths: `src/Clean.Architecture.Core/ContributorAggregate`
  and `src/Clean.Architecture.Core/Interfaces`.

  - **`src/Clean.Architecture.UseCases`:** Sits around the Core. It defines the application
  logic using the Mediator pattern, orchestrating how domain objects interact to fulfill
  specific business requirements. Citing paths: `src/Clean.Architecture.UseCases/Contributors/Create`
  and `src/Clean.Architecture.UseCases/Contributors/List`.

  - **`src/Clean.Architecture.Infrastructure` (Adapters):** Implements the interfaces
  defined in the Core. It contains the data access logic (Entity Framework, Repositories)
  and external services (Email). Citing paths: `src/Clean.Architecture.Infrastructure/Data/EfRepository.cs`
  and `src/Clean.Architecture.Infrastructure/Email/MimeKitEmailSender.cs`.

  - **`src/Clean.Architecture.Web` (Entry Point):** The presentation layer that handles
  HTTP requests. It depends on `Core` and `UseCases`, and wires up the `Infrastructure`
  implementation via Dependency Injection.


  ### Secondary Style: Domain-Driven Design (DDD)'
