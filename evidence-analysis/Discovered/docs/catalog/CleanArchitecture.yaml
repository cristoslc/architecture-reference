classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Style: Hexagonal Architecture (Ports and Adapters)\n\nThis repository implements\
  \ **Hexagonal Architecture** (also known as Ports and Adapters or Clean Architecture),\
  \ which the README explicitly acknowledges:\n\n> \"Clean Architecture is just the\
  \ latest in a series of names for the same loosely-coupled, dependency-inverted\
  \ architecture. You will also find it named hexagonal, ports-and-adapters, or onion\
  \ architecture.\"\n\n**Key Evidence:**\n\n1. **Dependency Inversion with Core at\
  \ Center** (`src/*/Clean.Architecture.*.csproj`):\n   - `Core.csproj` — Zero project\
  \ references; depends only on domain-focused NuGet packages\n   - `UseCases.csproj`\
  \ — References only Core\n   - `Infrastructure.csproj` — References Core and UseCases\n\
  \   - `Web.csproj` — References Infrastructure and UseCases (composition root)\n\
  \n2. **Ports (Interfaces) Defined in Core** (`src/Clean.Architecture.Core/Interfaces/`):\n\
  \   - `IEmailSender` — Abstraction for email delivery\n   - `IDeleteContributorService`\
  \ — Abstraction for domain service\n   - Repository interfaces via `IRepository<T>`\
  \ from Ardalis.SharedKernel\n\n3. **Adapters (Implementations) in Infrastructure**\
  \ (`src/Clean.Architecture.Infrastructure/`):\n   - `MimeKitEmailSender` and `FakeEmailSender`\
  \ implement `IEmailSender`\n   - `EfRepository<T>` implements repository interfaces\n\
  \   - `AppDbContext` implements data persistence adapter\n   - Infrastructure README\
  \ confirms: *\"Infrastructure classes implement interfaces found in the Core (Use\
  \ Cases) project(s).\"*\n\n4. **DI Wire-up at Composition Root** (`src/Clean.Architecture.Web/Configurations/ServiceConfigs.cs`):\n\
  \   ```csharp\n   services.AddScoped<IEmailSender, MimeKitEmailSender>();\n   services.AddScoped(typeof(IRepository<>),\
  \ typeof(EfRepository<>));\n   ```\n\n### Secondary Style: Domain-Driven Design\n\
  \nThe Core project implements DDD tactical patterns:\n\n1. **Aggregates** (`src/Clean.Architecture.Core/ContributorAggregate/Contributor.cs`):\n\
  \   ```csharp\n   public class Contributor(ContributorName name) : EntityBase<Contributor,\
  \ ContributorId>, IAggregateRoot\n   ```\n\n2. **Value Objects** using Vogen library:\n\
  \   - `ContributorId` — Strongly-typed ID with validation\n   - `ContributorName`\
  \ — Value object with length constraints\n   - `PhoneNumber` — Encapsulated phone\
  \ number value\n\n3. **Domain Events** (`src/Clean.Architecture.Core/ContributorAggregate/Events/`):\n\
  \   - `ContributorNameUpdatedEvent`\n   - `ContributorDeletedEvent`\n   - Events\
  \ raised via `RegisterDomainEvent()` on entity base\n\n4. **Domain Event Handlers**\
  \ in Core:\n   ```csharp\n   public class ContributorNameUpdatedEmailNotificationHandler(\n\
  \     ILogger<...> logger, IEmailSender emailSender) \n     : INotificationHandler<ContributorNameUpdatedEvent>\n\
  \   ```\n\n5. **Specifications** (`src/Clean.Architecture.Core/ContributorAggregate/Specifications/ContributorByIdSpec.cs`)\n\
  \n6. **Domain Services** (`src/Clean.Architecture.Core/Services/DeleteContributorService.cs`)\n\
  \n### CQRS Organization\n\nThe UseCases project follows CQRS separation (`src/Clean.Architecture.UseCases/Contributors/`):\n\
  \n- **Commands** (mutate state): `CreateContributorCommand`, `DeleteContributorCommand`,\
  \ `UpdateContributorCommand`\n- **Queries** (read-only): `ListContributorsQuery`,\
  \ `GetContributorQuery`\n- Handlers implement `ICommandHandler<,>` and `IQueryHandler<,>`\n\
  \n### Single Deployable Unit (Not Microservices)\n\nThis is a **modular monolith**\
  \ with enforced internal boundaries:\n- Single executable: `Clean.Architecture.Web.csproj`\
  \ (output type `Exe`)\n- `AspireHost` project is for local development orchestration\
  \ only\n- No Dockerfiles or container deployment manifests\n- All layers compile\
  \ into a single deployment unit\n\n### What Was Rejected\n\n- **Microservices**:\
  \ Rejected — Single deployable web application, not distributed services\n- **Layered\
  \ (traditional)**: Rejected — Traditional layered puts UI at top, business logic\
  \ in middle, data at bottom with dependencies flowing downward. This architecture\
  \ has dependencies flowing **inward** toward Core (dependency inversion principle)\n\
  - **Modular Monolith**: Considered, but the defining characteristic here is the\
  \ **ports-and-adapters pattern with dependency inversion**, not merely having module\
  \ boundaries. The hexagonal pattern is the primary organizing principle\n- **Event-Driven**:\
  \ Rejected — While domain events exist, they're used for in-process coordination\
  \ within the monolith, not asynchronous message broker communication between services\n\
  \n### Summary\n\nThe CleanArchitecture repository is a textbook implementation of\
  \ **Hexagonal Architecture** with strong **Domain-Driven Design** influences. The\
  \ architecture achieves:\n- Dependency inversion pointing toward Core\n- Infrastructure\
  \ as pluggable adapters\n- Domain model isolation from framework concerns\n- Testability\
  \ through port abstractions"
