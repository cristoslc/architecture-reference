  ### Secondary Style: Domain-Driven Design (DDD)

  The architecture strongly incorporates DDD tactical patterns. The business logic
  is organized into **Aggregates** (e.g., `ContributorAggregate`), and it uses **Specifications**
  for querying, **Domain Events** for side effects, and **Value Objects** (like `PhoneNumber.cs`
  and `ContributorName.cs`). The folder structure under `Core` reflects these boundaries.


  ### Secondary Style: Modular Monolith

  While the primary focus is Hexagonal, the project serves as a template for a **Modular
  Monolith**. It uses a `SharedKernel` approach (referenced in the README) and `ServiceDefaults`
  to maintain clean boundaries within a single deployable unit. The repository even
  provides a "Minimal Clean" version (`MinimalClean/` directory) which adopts **Vertical
  Slice Architecture** (organizing by features rather than layers), showing a transition
  between structural styles within the same ecosystem.


  ### Key Evidence

  1.  **Dependency Inversion:** The `Infrastructure` project depends on `Core` interfaces,
  rather than the `Core` depending on the Database.

  2.  **Mediator Pattern:** The use of `MediatorConfig.cs` and the `UseCases` project
  indicates a "Command/Query" approach to handling application requests without coupling
  the Web layer to the Domain logic.

  3.  **Domain Event Dispatching:** The presence of `EventDispatcherInterceptor.cs`
  in the Infrastructure layer demonstrates how domain-level events are translated
  into infrastructure-level actions (like database commits or message sending).'
