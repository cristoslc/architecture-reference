classification_reasoning: |
  ## Architecture Classification — CleanArchitecture (jasontaylordev)

  ### Primary Style: Hexagonal Architecture (confidence 0.96)

  The repository is explicitly organized around the dependency inversion principle.
  Four C# projects form concentric rings: Domain, Application, Infrastructure, and Web.
  Dependency arrows point strictly inward toward the domain.

  Key structural evidence:
  - `src/Domain/Domain.csproj` has zero project references; its README states
    "The Domain layer must not depend on any other project."
  - `src/Application/Common/Interfaces/IApplicationDbContext.cs` defines a port
    (interface) that the Application layer depends on, never on the concrete EF Core
    DbContext.
  - `src/Infrastructure/Data/ApplicationDbContext.cs` implements `IApplicationDbContext`,
    acting as the adapter. Infrastructure's `DependencyInjection.cs` registers:
    `builder.Services.AddScoped<IApplicationDbContext>(provider =>
      provider.GetRequiredService<ApplicationDbContext>());`
  - `src/Web/Program.cs` is the composition root that wires all layers together via
    extension methods: `AddApplicationServices()`, `AddInfrastructureServices()`,
    `AddWebServices()`.
  - Layer READMEs explicitly document the dependency rules, confirming the hexagonal
    intent is architectural policy, not coincidence.

  ### Secondary Style: Domain-Driven Design (confidence 0.90)

  The Domain layer employs DDD tactical patterns:
  - `BaseEntity` carries a domain-event collection with `AddDomainEvent()`,
    `RemoveDomainEvent()`, and `ClearDomainEvents()`.
  - `TodoItem.Done` property setter emits `TodoItemCompletedEvent` when the item
    transitions to done, encapsulating invariant behavior inside the entity.
  - Three domain events exist: `TodoItemCreatedEvent`, `TodoItemCompletedEvent`,
    `TodoItemDeletedEvent`, all extending `BaseEvent : INotification`.
  - `BaseAuditableEntity` tracks created/modified timestamps and user identity.
  - `ValueObject` base class is provided for future value types.
  - `DispatchDomainEventsInterceptor` (EF Core `SaveChangesInterceptor`) harvests
    domain events from all tracked entities after `SaveChangesAsync` and publishes
    them via MediatR, maintaining transactional consistency.
  - Application event handlers (`LogTodoItemCompleted`, `LogTodoItemCreated`) act as
    subscribers to these domain events.

  ### Secondary Style: CQRS (confidence 0.92)

  The Application layer is explicitly divided into `Commands/` and `Queries/` per
  feature area:
  - Commands: `CreateTodoItem`, `UpdateTodoItem`, `UpdateTodoItemDetail`,
    `DeleteTodoItem`, `CreateTodoList`, `UpdateTodoList`, `DeleteTodoList`.
  - Queries: `GetTodoItemsWithPagination`, `GetTodos`, `GetWeatherForecasts`.
  - Commands return minimal values (e.g., `IRequest<int>` for created ID); queries
    return read-optimized DTOs via AutoMapper `ProjectTo<>`.
  - MediatR 14 dispatches both through a composable pipeline of five
    `IPipelineBehavior<,>` implementations: LoggingBehaviour (pre-processor),
    UnhandledExceptionBehaviour, AuthorizationBehaviour, ValidationBehaviour,
    PerformanceBehaviour.
  - This is CQRS at the application-use-case level, not at the database level
    (no separate read/write stores).

  ### Deployment Topology

  Single deployable unit (ASP.NET Core Web + optional Angular/React SPA) targeted
  at Azure App Service. .NET Aspire AppHost provides local multi-service orchestration.
  Azure Developer CLI with Bicep IaC provisions the full cloud environment. The
  repository is primarily a reference template distributed via NuGet.

  ### Rejected Styles

  - **Microservices**: Single deployable artifact; no inter-service communication.
  - **Layered (traditional)**: Dependencies flow inward (inverted), not top-to-bottom.
  - **Event-Driven**: Domain events are in-process via MediatR, not asynchronous
    message brokers across services.
  - **Modular Monolith**: While modular, the defining characteristic is ports-and-adapters
    (hexagonal), not just module boundaries.
