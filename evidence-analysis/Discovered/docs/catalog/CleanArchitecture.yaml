review_notes: "Evidence: README.md explicitly states 'Clean Architecture is just the latest in a series of names for the same loosely-coupled, dependency-inverted architecture. You will also find it named hexagonal, ports-and-adapters, or onion architecture.' src/ has 4 concentric projects: Core (domain model, no external deps) -> UseCases (commands/queries) -> Infrastructure (EF Core, email) -> Web (FastEndpoints). Core/ContributorAggregate/ contains Aggregates, Value Objects (ContributorName, PhoneNumber via Vogen), Domain Events (ContributorDeletedEvent, ContributorNameUpdatedEvent), Specifications, and interfaces -- classic DDD. UseCases/ separates Commands (CreateContributorCommand, DeleteContributorCommand, UpdateContributorCommand) from Queries (GetContributorQuery, ListContributorsQuery) with separate handlers -- explicit CQRS. Infrastructure implements repository abstractions (EfRepository<T>) and query services (ListContributorsQueryService). Dependency flow enforces ports-and-adapters: Core defines interfaces (IDeleteContributorService, IEmailSender), Infrastructure implements them. README Goals section: 'provide a basic solution structure that can be used to build Domain-Driven Design (DDD)-based applications.'"