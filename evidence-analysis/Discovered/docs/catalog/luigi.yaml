classification_reasoning: "## Analysis\n\nLuigi is a **Pipeline (Pipe-and-Filter)**\
  \ architecture for building batch job workflows. This classification is strongly\
  \ supported by the codebase structure and design.\n\n### Primary Evidence for Pipeline\
  \ (Pipe-and-Filter)\n\n**1. Core Abstractions Follow Pipe-and-Filter Pattern:**\n\
  - **Task** (`luigi/task.py`): The fundamental unit of work, equivalent to a \"filter\"\
  \ in pipe-and-filter terminology\n- **Target** (`luigi/target.py`): Represents data\
  \ outputs that flow between tasks (the \"pipes\")\n- The canonical Task interface\
  \ requires three methods that define the pipeline contract:\n  - `requires()` -\
  \ declares upstream dependencies (what \"pipes\" feed into this task)\n  - `output()`\
  \ - declares the output Target (what this filter produces)\n  - `run()` - performs\
  \ the computation\n\n**2. Explicit Dependency Chains:**\nFrom `doc/design_and_limitations.rst`:\n\
  > \"Each task just specifies which inputs it needs and cross-module dependencies\
  \ are trivial.\"\n\nFrom `README.rst`:\n> \"Luigi is a Python package that helps\
  \ you build complex **pipelines** of batch jobs.\"\n\n**3. Example Workflows Show\
  \ Clear Pipeline Structure:**\nIn `examples/wordcount.py` and `examples/top_artists.py`,\
  \ tasks chain together explicitly:\n```\nInputText → WordCount (data flows through\
  \ requires() → input() → run() → output())\nStreams → AggregateArtists → Top10Artists\n\
  ```\n\n**4. Data Flow Through Targets:**\nThe `target.py` defines `Target` as an\
  \ abstract base class with a single method `exists()`. Tasks produce Targets that\
  \ become inputs to downstream tasks via `self.input()`. This is the classic pipe-and-filter\
  \ pattern where filters process data and pass it through pipes.\n\n**5. Scheduler\
  \ Coordinates Pipeline Execution:**\nThe `scheduler.py` and `worker.py` manage task\
  \ execution order based on dependency graphs. The scheduler ensures that a task\
  \ only runs when all its required upstream tasks (pipes) have completed.\n\n###\
  \ Why NOT Other Styles\n\n- **NOT Microservices**: Luigi is a single Python library/package,\
  \ not distributed independently deployable services. The scheduler/worker model\
  \ is for task orchestration within a single workflow, not service decomposition.\n\
  \n- **NOT Event-Driven**: Tasks don't communicate via event publishing/subscription.\
  \ Dependencies are declared explicitly through `requires()` and resolved by the\
  \ scheduler. The pattern is pull-based dependency resolution, not event-driven notification.\n\
  \n- **NOT Layered**: There's no horizontal layering (presentation/business/data\
  \ access). Task/Target/Scheduler are core abstractions, not vertical layers.\n\n\
  - **NOT Modular Monolith**: While there's a `luigi/contrib/` directory with 49 extension\
  \ modules, these aren't enforced module boundaries within a monolith. They're optional\
  \ extensions to the core pipeline framework.\n\n- **NOT Microkernel/Plugin**: Although\
  \ Luigi is extensible (contrib modules for Hadoop, Spark, Postgres, etc.), the primary\
  \ design intent and user interaction model is pipeline definition, not plugin composition.\
  \ The contrib modules are more akin to a standard library of implementations rather\
  \ than a true plugin system where users inject custom extensions at runtime.\n\n\
  - **NOT DDD**: No bounded contexts, aggregates, or domain-driven design patterns\
  \ present.\n\n### Conclusion\n\nLuigi's architecture is fundamentally about **chaining\
  \ tasks into pipelines** where:\n- Each Task is a processing stage (filter)\n- Targets\
  \ are the data that flows between stages (pipes)\n- The `requires()` method explicitly\
  \ declares the pipeline topology\n- The scheduler resolves dependencies and orchestrates\
  \ execution\n\nThis is the canonical Pipe-and-Filter pattern applied to batch data\
  \ processing workflows."
