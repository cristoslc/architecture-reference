review_notes: "README.rst explicitly describes Luigi as a tool to 'build complex pipelines of batch jobs' with 'dependency resolution, workflow management.' Core abstractions are Task (filter) and Target (pipe/connector): each Task defines requires() for input dependencies, run() for processing, and output() for producing Targets consumed downstream. The workflows.rst doc shows the canonical Task->Target->Task chain pattern. The top_artists.py example demonstrates a multi-stage pipeline (ExternalStreams -> Streams -> AggregateArtists -> TopArtists). The design_and_limitations.rst confirms focus on chaining tasks with dependencies. luigi/contrib/ provides 40+ pluggable Task types (hadoop, spark, postgres, s3, etc.) acting as interchangeable pipeline stages. The event.py module provides lifecycle hooks but these are observability, not architectural event-driven patterns. The scheduler.py manages task execution order based on dependency DAGs. Compared to GNU Make per README Philosophy section. Single style classification: Pipe-and-Filter is the defining pattern of what Luigi IS."