one_line_summary: Batch workflow orchestrator that executes task DAGs through a Pipeline
  runtime with a Microkernel plugin system for 50+ pluggable storage and compute backends.
classification_reasoning: "## Architecture Classification Analysis\n\n### Primary Styles:\
  \ Pipeline + Microkernel\n\n**PIPELINE (primary, 0.91):** Luigi's entire programming\
  \ model is the directed acyclic graph of Tasks. Each `Task` subclass declares:\
  \ `requires()` (upstream dependencies — DAG edges), `output()` (Target artifacts\
  \ — the data flowing through the pipe), and `run()` (the filter processing step).\
  \ The authors explicitly compare this to GNU Make — tasks are rules, outputs are\
  \ targets, requires declarations define the build graph. The worker traverses the\
  \ DAG bottom-up, the scheduler sequences task execution by dependency completion,\
  \ and Targets (files, HDFS paths, DB rows) are the artifacts flowing between pipeline\
  \ stages. This is textbook pipe-and-filter / Pipeline architecture. `luigi/worker.py`\
  \ drives the pipeline via a scheduler-poll loop; `luigi/scheduler.py` implements\
  \ the PENDING→RUNNING→DONE|FAILED state machine that governs stage sequencing.\n\
  \n**MICROKERNEL (primary, 0.88):** The `luigi/contrib/` directory contains 50+\
  \ pluggable backend integrations (S3, GCS, Azure Blob, HDFS, Hadoop, Spark, PySpark,\
  \ BigQuery, Dataproc, Postgres, MySQL, MSSQL, Redis, MongoDB, Elasticsearch, Kubernetes,\
  \ Docker, AWS Batch, ECS, SGE, LSF, SSH, FTP, Dropbox, Salesforce, Presto, Hive,\
  \ Pig, Scalding, SparKey, etc.). Each plugin satisfies a stable two-interface contract\
  \ from the core: subclass `Task` (implement run/requires/output) or subclass `Target`\
  \ (implement exists()) and optionally `FileSystem`. The `task_register.Register`\
  \ metaclass in `luigi/task_register.py` is the global plugin registry, auto-capturing\
  \ all Task subclasses at import time. `luigi/metrics.py` adds a second plugin contract\
  \ (MetricsCollector ABC) for observability backends. The core engine (`task.py`,\
  \ `scheduler.py`, `worker.py`, `server.py`) has zero knowledge of any specific storage\
  \ or compute system — all of that is in contrib plugins.\n\n### What Was Rejected\
  \ and Why\n\n**Not Microservices:** `luigid` (the central scheduler daemon) and\
  \ worker processes are two operational roles of the same Python package, not independently\
  \ versioned or independently deployable services. They share the same scheduler\
  \ state through an in-memory or pickled store, not separate databases.\n\n**Not\
  \ Event-Driven (primary):** The `luigi/event.py` Event constants (SUCCESS, FAILURE,\
  \ PROGRESS, etc.) and `set_handler` callbacks are lightweight in-process hooks for\
  \ observability, not a message broker or event bus. Task coordination flows through\
  \ the scheduler's PENDING/RUNNING/DONE state machine via polling (`get_work()`),\
  \ not through event publication/subscription to an external broker.\n\n**Not Layered\
  \ (primary):** While there is a rough CLI → worker → scheduler → tasks → targets\
  \ layering, the dominant organizing principle is the task DAG pipeline execution\
  \ model. The extension axis is vertical (new backends via contrib plugins), not\
  \ horizontal by layer.\n\n**Not CQRS:** The scheduler maintains a single unified\
  \ in-memory state object serving both mutations (task registration, status updates)\
  \ and queries (get_work, graph visualization) from the same store with no read/write\
  \ separation.\n\n### Quality Attributes Evidence\n\n**EXTENSIBILITY:** Task and\
  \ Target ABCs are the stable plugin contracts; `--module` CLI flag dynamically discovers\
  \ tasks from any importable Python module; MetricsCollector ABC enables custom observability\
  \ backends; 50+ contrib integrations demonstrate the breadth of the extension surface.\n\
  \n**IDEMPOTENCY:** Task completeness is determined solely by `output().exists()` —\
  \ already-completed tasks are always skipped on re-run. This is the framework's\
  \ core reliability guarantee.\n\n**RELIABILITY:** Per-task retry policy (`retry_count`,\
  \ `disable_hard_timeout`, `disable_window`) in `luigi/scheduler.py`; each task runs\
  \ in an isolated subprocess (`TaskProcess` in `luigi/worker.py`); batch email notification\
  \ system (`luigi/batch_notifier.py`).\n\n**SIMPLICITY:** Three-method Task contract\
  \ (run/requires/output); single Python package install; optional local-scheduler\
  \ mode eliminates the need for a separate daemon process; no metadata database required\
  \ by default.\n\n**OBSERVABILITY:** Built-in execution summary (`luigi/execution_summary.py`);\
  \ task history with DB backend (`luigi/db_task_history.py`); Tornado-served web\
  \ UI for dependency graph visualization; pluggable Datadog and Prometheus metrics\
  \ in contrib.\n\n**PORTABILITY:** Core has no cloud or platform dependencies; all\
  \ platform-specific code lives in contrib plugins; tasks can orchestrate Hadoop,\
  \ Spark, Kubernetes, cloud storage, RDBMS, or arbitrary subprocesses without touching\
  \ the core engine."
