review_notes: 'Luigi is a framework for building complex pipelines, but its internal
  architecture is a classic example of the **Microkernel (Plugin)** style.


  ### Primary Style: Microkernel (Plugin)

  The repository is structured around a stable core (the "kernel") that handles the
  lifecycle of tasks—dependency resolution, scheduling, and state management—while
  delegating almost all specific functionality to a massive collection of plugins.

  - **The Core (Kernel):** Located in the root of the `luigi/` directory, files like
  `worker.py`, `scheduler.py`, `task.py`, and `parameter.py` define the contract and
  runtime for any workflow.

  - **The Plugins (Contrib):** The `luigi/contrib/` directory contains over 50 isolated
  modules that extend the core. These allow Luigi to interact with external systems
  (e.g., `s3.py`, `kubernetes.py`, `redshift.py`, `hadoop.py`) without the core kernel
  having any knowledge of those specific technologies.

  - **Separation of Concerns:** The core provides the infrastructure (the "plumbing"),
  while the `contrib` modules provide the adapters. This allows the system to be highly
  extensible by third parties without modifying the internal scheduling logic.


  ### Secondary Style: Pipeline (Pipe-and-Filter)

  Luigi is architected specifically to support the **Pipeline** style for the *user''s
  code*. '
