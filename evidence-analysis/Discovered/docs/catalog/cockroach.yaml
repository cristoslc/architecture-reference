review_notes: 'CockroachDB is structured as a **Layered** architecture, specifically
  a "Vertical Hardened Layer" approach where each layer (SQL, KV, Distribution, Replication,
  Storage) provides a clean abstraction for the one above it. While it is a distributed
  system at runtime, the codebase itself is organized as a **Modular Monolith**—a
  single repository that compiles into a single binary (`cockroach`) with strictly
  defined internal boundaries.


  ### 1. Primary Style: Layered (Horizontal/Vertical)

  The codebase follows a clear hierarchy of concerns, which is explicitly documented
  in `pkg/sql/doc.go`. The layers are:

  - **SQL Layer (`pkg/sql`):** Responsible for parsing, query planning, and execution.
  It translates SQL ASTs into transactional Key-Value operations.

  - **KV Layer (`pkg/kv`):** Handles transactional logic and "Key Addressing." It
  provides a `DB` client (`pkg/kv/db.go`) used by the SQL layer to interact with the
  distributed store.

  - **Distribution/Replication Layer (`pkg/kv/kvserver`):** Manages the "Reachable
  Range" of keys, Raft consensus for replication, and node-to-node communication.

  - **Storage Layer (`pkg/storage`):** The bottom of the stack, providing MVCC (Multi-Version
  Concurrency Control) on top of an engine (Pebble/RocksDB).


  ### 2. Secondary Style: Modular Monolith'
