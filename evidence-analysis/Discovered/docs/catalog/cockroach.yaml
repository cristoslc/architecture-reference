  - **Storage Layer (`pkg/storage`):** The bottom of the stack, providing MVCC (Multi-Version
  Concurrency Control) on top of an engine (Pebble/RocksDB).


  ### 2. Secondary Style: Modular Monolith

  Unlike many distributed systems that split into microservices (e.g., a separate
  SQL-proxy service and a separate Storage service), CockroachDB modules are co-located
  and linked into a single executable.

  - **Strict Boundaries:** The `pkg/` structure shows high cohesion (e.g., `pkg/sql`,
  `pkg/kv`, `pkg/storage`).

  - **Dependency Flow:** The documentation and package structure enforce a downward
  dependency flow (SQL -> KV -> Storage).

  - **Tooling:** The use of Bazel (`BUILD.bazel` files throughout the tree) is used
  to manage these internal module boundaries and ensure fast, incremental builds of
  the monolithic codebase.


  ### 3. Secondary Style: Event-Driven

  While not a "Message Bus" architecture in the enterprise sense, the core replication
  and consistency mechanism is internally event-driven.

  - **Raft Consensus:** The `ConnectionClass` enum in `pkg/rpc/rpcpb/rpc.proto` shows
  a dedicated `RAFT` connection class. The system relies on a stream of log entries
  (events) to maintain state across the cluster.

  - **Rangefeeds:** The `pkg/kv/rangefeed` and `pkg/rpc/rpcpb/rpc.proto` (`RANGEFEED`
  class) indicate an internal architecture capable of pushing changes (events) to
  subscribers, which is a hallmark of event-driven internal coordination.


  ### Evidence Summary

  - **Directory Layout:** The `pkg/` subdirectories (`sql`, `kv`, `storage`, `util`)
  map directly to the architectural layers described in the documentation.

  - **`pkg/sql/doc.go`:** "The sql package builds on top of this core system (provided
  by the storage and kv packages) adding parsing, query planning and query execution."

  - **`pkg/storage/doc.go`:** Describes the low-level engine interface, abstracting
  physical storage from the higher-level transactional KV logic.

  - **Unified Binary:** Despite the complexity, `pkg/cmd/cockroach` serves as the
  primary entry point for the entire system, confirming the modular monolith deployment
  unit.'
