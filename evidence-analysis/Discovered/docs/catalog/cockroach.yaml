one_line_summary: Distributed SQL database built as a layered modular monolith — SQL
  over KV over Raft over Pebble — deploying as a single symmetric binary with Raft
  consensus replication and a Cascades-style cost-based distributed query optimizer.
classification_reasoning: "CockroachDB implements a textbook Layered Architecture,\
  \ explicitly documented in docs/design.md: \"CockroachDB implements a layered architecture.\
  \ The highest level of abstraction is the SQL layer... The SQL layer in turn depends\
  \ on the distributed key value store.\" Five distinct horizontal strata are enforced\
  \ via Go package boundaries: Protocol/pgwire \u2192 SQL (cost-based optimizer, DistSQL\
  \ execution) \u2192 KV client \u2192 KV server/Raft replication \u2192 Storage\
  \ (MVCC over Pebble). Dependencies flow strictly downward. Modular Monolith is a\
  \ strong secondary classification: all functionality ships in a single symmetric\
  \ cockroach binary; nodes are homogeneous (design.md: \"homogeneous deployment (one\
  \ binary) with minimal configuration and no required external dependencies\"); internal\
  \ module boundaries are enforced by Go's package system rather than network or process\
  \ boundaries. Commercial features (CCL: multi-region, CDC, OIDC, LDAP) are registered\
  \ via compile-time blank-import init() hooks, not runtime-loadable plugins, ruling\
  \ out Microkernel. Core operation is synchronous Raft-based request/response, ruling\
  \ out Event-Driven as a primary style. Single-binary homogeneous deployment rules\
  \ out Microservices. No separate read/write models at architectural level rules out\
  \ CQRS. The internal DistSQL pipeline (processor DAGs shipping sub-plans over gRPC)\
  \ is an implementation technique within the SQL layer, not a system-wide Pipeline\
  \ architecture."
