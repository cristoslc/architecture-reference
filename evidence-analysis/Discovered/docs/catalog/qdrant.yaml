classification_reasoning: "## Architecture Classification: Modular Monolith with Layered\
  \ Organization\n\n### Primary Style: Modular Monolith\n\nQdrant is a **Modular Monolith**\
  \ - a single deployable Rust application with strictly enforced internal module\
  \ boundaries through the Cargo workspace system.\n\n**Key Evidence:**\n\n1. **Single\
  \ Deployment Unit**: The repository produces one binary (`src/main.rs`) and one\
  \ Docker image. There are no separate services, just one monolithic application.\n\
  \n2. **Strong Module Boundaries via Rust Crates**: The `lib/` directory contains\
  \ **14 internal crates** organized as a Cargo workspace:\n   - `api` - REST and\
  \ gRPC API definitions\n   - `storage` - Storage orchestration and consensus management\
  \  \n   - `collection` - Collection lifecycle and operations\n   - `shard` - Distributed\
  \ sharding logic\n   - `segment` - Core vector storage and indexing\n   - `quantization`,\
  \ `sparse`, `gridstore`, `posting_list`, `gpu` - Specialized data components\n \
  \  - `common`, `macros`, `trififo` - Shared infrastructure\n\n3. **Explicit Dependency\
  \ Enforcement**: Each crate's `Cargo.toml` declares explicit dependencies with path\
  \ references:\n   ```\n   storage → collection → shard → segment → common/quantization/sparse\n\
  \   ```\n   Dependencies flow unidirectionally; higher-level modules depend on lower-level\
  \ ones, never the reverse. Rust's compiler enforces these boundaries at compile\
  \ time.\n\n4. **Single Entry Point**: `src/main.rs` bootstraps the entire application,\
  \ initializing the `Dispatcher`, `TableOfContent`, consensus layer, and both Actix\
  \ (REST) and Tonic (gRPC) servers.\n\n### Secondary Style: Layered\n\nWithin the\
  \ monolith, there's clear horizontal layering:\n\n| Layer | Components | Responsibility\
  \ |\n|-------|------------|----------------|\n| **API Layer** | `src/actix/`, `src/tonic/`\
  \ | HTTP/gRPC request handling, authentication |\n| **Service Layer** | `lib/storage/dispatcher.rs`,\
  \ `lib/storage/content_manager/toc/` | Operation routing, collection management\
  \ |\n| **Domain Layer** | `lib/collection/` | Collection operations, sharding, replication\
  \ |\n| **Data Layer** | `lib/segment/`, `lib/shard/`, `lib/gridstore/` | Vector\
  \ storage, HNSW indices, payload storage |\n| **Infrastructure** | `lib/common/`,\
  \ `lib/quantization/` | Utilities, quantization algorithms |\n\nThe layering follows\
  \ classic patterns: API layer depends on service layer, which depends on domain/data\
  \ layers.\n\n### What This Is NOT\n\n- **Not Microservices**: Single binary, single\
  \ Docker image, single process. Clustered deployment uses Raft consensus for replication,\
  \ but nodes are identical replicas running the same monolith.\n\n- **Not Event-Driven**:\
  \ While Qdrant uses Raft for distributed consensus and has WAL for durability, this\
  \ is synchronous replication for data consistency - not asynchronous event-driven\
  \ messaging. No message brokers (Kafka, RabbitMQ) are involved.\n\n- **Not Microkernel/Plugin**:\
  \ No plugin loading mechanism, no runtime extensions, no dynamic module system.\
  \ All functionality is compiled into the single binary.\n\n- **Not CQRS**: Read\
  \ and write paths share the same segment infrastructure. While there are optimization\
  \ paths, there's no separate read model/write model separation.\n\n- **Not Domain-Driven\
  \ Design**: The codebase is organized around technical concerns (segments, shards,\
  \ storage, API) rather than bounded contexts with aggregates, entities, and value\
  \ objects.\n\n### Strength of Classification\n\n**High confidence (0.92)** because:\n\
  - The Cargo workspace structure with path dependencies is definitive evidence of\
  \ modular monolith architecture\n- Rust's compiler enforces module boundaries at\
  \ compile time - this cannot be circumvented\n- Single `main.rs` and single `Dockerfile`\
  \ confirm single deployment unit\n- The layered organization within is well-documented\
  \ in the crate structure"
