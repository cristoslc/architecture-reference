review_notes: 'LLM review of cloned repo. Single binary (src/main.rs) composes all
  functionality. Workspace has 14 internal crates under lib/ with strict layering:
  segment (low-level vector storage/indexing) -> shard (segment operations) -> collection
  (sharding, replication, consensus-aware) -> storage (content_manager, dispatcher,
  consensus orchestration) -> src/ (actix REST + tonic gRPC servers). Each crate has
  clear single responsibility (e.g., lib/quantization, lib/sparse, lib/posting_list,
  lib/gpu). Consensus (Raft) is embedded in-process, not a separate service. No docker-compose
  orchestration - single Dockerfile builds one binary. The api/ crate defines REST
  and gRPC interfaces consumed by src/actix and src/tonic modules. Storage crate''s
  Dispatcher delegates to TableOfContent which manages collections. This is a textbook
  modular monolith: independently compilable modules with explicit Cargo dependency
  boundaries, all deployed as a single process. Layered architecture is the secondary
  pattern - crate dependencies form a strict DAG from segment up through storage to
  the binary entry point.'
