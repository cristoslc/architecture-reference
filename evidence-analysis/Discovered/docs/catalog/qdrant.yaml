review_notes: 'Qdrant is structured as a **Modular Monolith** organized within a Rust
  workspace. While it serves a distributed system (supporting sharding and replication),
  the codebase itself is maintained as a single unit where logical boundaries are
  strictly enforced through independent internal crates.


  ### 1. Modular Monolith (Primary Style)

  The system is decomposed into highly specialized, decoupled crates located in the
  `lib/` directory. Each crate represents a clear architectural boundary with its
  own `Cargo.toml` and `src/lib.rs`.

  - **`lib/segment`**: The core storage and indexing engine (HNSW, flat indexes).

  - **`lib/collection`**: High-level management of vectors, including sharding logic
  and write-ahead logging.

  - **`lib/storage`**: Handles the persistence layer and global state (e.g., Raft
  consensus state).

  - **`lib/shard`**: Specifically handles the distribution of data across nodes.

  - **`lib/api`**: Separates interface definitions (gRPC/REST) from core logic.'
