classification_reasoning: "The Orbit repository implements a distributed virtual actor\
  \ framework. Its internal architecture is structured as a **Service-Based** system\
  \ that facilitates a **Space-Based** runtime environment, utilizing a **Microkernel**\
  \ approach for extensibility.\n\n### 1. Service-Based (Primary)\nThe system is organized\
  \ into a small number of coarse-grained component types that work together. As evidenced\
  \ by `docker/docker-compose.yml` and the Helm charts (`charts/orbit/templates/`),\
  \ the architecture consists of:\n- **Orbit Server Nodes**: Multiple instances of\
  \ the core processing unit (defined in `src/orbit-server` and packaged via `src/orbit-application`).\n\
  - **Directory Services**: External state providers (etcd) used for `node-directory`\
  \ and `addressable-directory` to track the location of virtual actors. \n- **Mesh\
  \ Proxy**: An HAProxy instance for load balancing traffic across the server nodes.\n\
  \nUnlike a pure microservices architecture where every domain is a separate service,\
  \ Orbit provides a unified \"Server\" and \"Client\" infrastructure aimed at distributed\
  \ computing.\n\n### 2. Microkernel (Plugin) (Secondary)\nThe codebase uses a plugin-based\
  \ architecture to extend core functionality without modifying the \"kernel.\" This\
  \ is explicitly signaled by the directory structure:\n- `src/orbit-server-etcd`:\
  \ Provides the etcd implementation for directory services.\n- `src/orbit-server-prometheus`:\
  \ Provides metrics integration.\n- `src/orbit-client-spring-plugin`: Provides integration\
  \ with the Spring framework.\nThe core server (`src/orbit-server`) acts as the kernel,\
  \ while external concerns like storage, observability, and framework integration\
  \ are handled via separate modules.\n\n### 3. Space-Based (Secondary)\nThe system\
  \ is designed to handle \"Addressables\" (Actors) across a distributed cluster.\
  \ The use of directory services (`node.proto`, `addressable_management.proto`) to\
  \ manage state and location of objects across a shared \"space\" of nodes is a hallmark\
  \ of Space-Based architectures. It aims to eliminate centralized database bottlenecks\
  \ by distributing the \"Addressable\" state across the cluster.\n\n### Structural\
  \ Evidence\n- **Defined Interfaces**: `src/orbit-proto` contains the gRPC/Protobuf\
  \ definitions (`node.proto`, `addressable.proto`) that define the contract between\
  \ the Client and Server, and between Server nodes.\n- **Separation of Concerns**:\
  \ The repo differentiates between `orbit-client` (the SDK for users), `orbit-server`\
  \ (the coordination logic), and `orbit-application` (the deployable wrapper).\n\
  - **Deployment Topology**: The Helm charts (`node-directory-deployment.yaml`, `server-deployment.yaml`)\
  \ confirm that the system is intended to be deployed as a set of interacting services."
