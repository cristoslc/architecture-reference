classification_reasoning: "## Analysis\n\nThe Orbit repository implements a **distributed\
  \ actor mesh system** (developed by Electronic Arts) with a clear Pipeline architecture\
  \ at its core, complemented by a Microkernel-style plugin system.\n\n### Primary\
  \ Style: Pipeline (Pipe-and-Filter)\n\nThe server's message processing is organized\
  \ around a classic pipeline pattern:\n\n**Evidence:**\n1. **`src/orbit-server/src/main/kotlin/orbit/server/pipeline/Pipeline.kt`**\
  \ - Central orchestrator that pushes messages through a channel-based processing\
  \ system using `RailWorker` for parallel rails.\n\n2. **`src/orbit-server/src/main/kotlin/orbit/server/pipeline/step/PipelineStep.kt`**\
  \ - Defines the filter interface:\n   ```kotlin\n   interface PipelineStep {\n \
  \      suspend fun onOutbound(context: PipelineContext, msg: Message): Unit = context.next(msg)\n\
  \       suspend fun onInbound(context: PipelineContext, msg: Message): Unit = context.next(msg)\n\
  \   }\n   ```\n\n3. **`src/orbit-server/src/main/kotlin/orbit/server/pipeline/PipelineSteps.kt`**\
  \ - Explicitly wires the sequence:\n   ```kotlin\n   val steps: Array<PipelineStep>\
  \ = arrayOf(\n       identityStep,\n       routingStep,\n       placementStep,\n\
  \       verifyStep,\n       authStep,\n       transportStep\n   )\n   // inbound\
  \ is up, outbound is down\n   ```\n\n4. Each step independently processes messages\
  \ and calls `context.next(msg)` to pass data to the next filter — the canonical\
  \ pipe-and-filter pattern.\n\n5. Concrete steps like `RoutingStep`, `TransportStep`,\
  \ `PlacementStep` each handle a single responsibility in the message flow.\n\n###\
  \ Secondary Style: Microkernel (Plugin)\n\nThe system provides extensibility through\
  \ a plugin/dependency-injection mechanism:\n\n**Evidence:**\n1. **`src/orbit-util/src/main/kotlin/orbit/util/di/ComponentContainer.kt`**\
  \ - Custom DI container with `ExternallyConfigured<T>` interface enabling runtime\
  \ configuration of implementations.\n\n2. **Pluggable Directory Implementations:**\n\
  \   - `NodeDirectory` and `AddressableDirectory` interfaces (`src/orbit-server/src/main/kotlin/orbit/server/mesh/`)\n\
  \   - `LocalNodeDirectory`, `LocalAddressableDirectory` (core)\n   - `EtcdNodeDirectory`,\
  \ `EtcdAddressableDirectory` (separate module: `src/orbit-server-etcd/`)\n\n3. **Pluggable\
  \ Addressable Construction:**\n   - `AddressableConstructor` interface (`src/orbit-client/src/main/kotlin/orbit/client/addressable/AddressableConstructor.kt`)\n\
  \   - `DefaultAddressableConstructor` (core)\n   - `SpringAddressableConstructor`\
  \ (separate module: `src/orbit-client-spring-plugin/`) for Spring integration\n\n\
  4. **Pluggable Metrics:**\n   - `PrometheusMetrics` as a separate module (`src/orbit-server-prometheus/`)\n\
  \n5. **Container Overrides Hook** - Both `OrbitClientConfig` and `OrbitServerConfig`\
  \ expose `containerOverrides` allowing external configuration of implementations.\n\
  \n### What Was Rejected\n\n- **Not Microservices**: Single deployable artifact (`orbit-application`),\
  \ one Dockerfile, one Helm chart. Multiple runtime instances form a cluster, but\
  \ this is horizontal scaling, not service decomposition.\n\n- **Not Layered**: No\
  \ horizontal layering (presentation/business/data). The modules are organized by\
  \ technical capability (proto, client, server, util) not by layers.\n\n- **Not Event-Driven**:\
  \ No message broker (Kafka, RabbitMQ, etc.). Messages flow synchronously through\
  \ the processing pipeline. The system is request-response based via gRPC.\n\n- **Not\
  \ Modular Monolith**: The modules are technical components (util, proto, shared)\
  \ rather than business domain boundaries. There's no domain-driven decomposition.\n\
  \n- **Not Hexagonal**: While there's dependency injection, there's no explicit ports/adapters\
  \ separation pattern. The plugin system serves a different purpose.\n\n### Deployment\
  \ Topology\n\nThe system deploys as a single application with cluster capabilities:\n\
  - Docker Compose runs multiple `orbit-server` instances with etcd for distributed\
  \ state\n- Kubernetes deployment via Helm chart (`charts/orbit/`)\n- gRPC-based\
  \ communication between mesh nodes"
