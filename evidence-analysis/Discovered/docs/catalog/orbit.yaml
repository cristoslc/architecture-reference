review_notes: 'Primary: Space-Based - distributed virtual actor runtime with mesh
  clustering (ClusterManager.kt using Dijkstra routing via jgrapht), transparent actor
  placement (PlacementStep.kt, AddressableManager.locateOrPlace), distributed directories
  backed by etcd (orbit-server-etcd module), node/addressable leasing with TTLs, HAProxy
  load balancing across server nodes (docker-compose.yml). Secondary: Pipe-and-Filter
  - explicit Pipeline class with ordered PipelineStep array (IdentityStep->RoutingStep->PlacementStep->VerifyStep->AuthStep->TransportStep
  in PipelineSteps.kt), bidirectional message flow via pointer-based traversal (PipelineContext.kt
  onInbound/onOutbound). Documentation confirms: virtual actors activated/deactivated
  transparently across server pool, at-most-once delivery, single-activation guarantee
  per actor identity.'
