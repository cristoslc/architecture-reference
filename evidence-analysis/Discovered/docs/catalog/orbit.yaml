review_notes: "The Orbit repository implements a distributed virtual actor framework.\
  \ Its internal architecture is structured as a **Service-Based** system that facilitates\
  \ a **Space-Based** runtime environment, utilizing a **Microkernel** approach for\
  \ extensibility.\n\n### 1. Service-Based (Primary)\nThe system is organized into\
  \ a small number of coarse-grained component types that work together. As evidenced\
  \ by `docker/docker-compose.yml` and the Helm charts (`charts/orbit/templates/`),\
  \ the architecture consists of:\n- **Orbit Server Nodes**: Multiple instances of\
  \ the core processing unit (defined in `src/orbit-server` and packaged via `src/orbit-application`).\n\
  - **Directory Services**: External state providers (etcd) used for `node-directory`\
  \ and `addressable-directory` to track the location of virtual actors. \n- **Mesh\
  \ Proxy**: An HAProxy instance for load balancing traffic across the server nodes.\n\
  \nUnlike a pure microservices architecture where every domain is a separate service,\
  \ Orbit provides a unified \"Server\" and \"Client\" infrastructure aimed at distributed\
  \ computing."
