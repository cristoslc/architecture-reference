  \ the filter pipeline.\n\n**Not Hexagonal Architecture**: While there are interfaces\
  \ (`FilterFactory`, `FilterLoader`), there's no explicit ports-and-adapters pattern\
  \ with application core isolation.\n\n### Module Structure\n\nThe Gradle multi-module\
