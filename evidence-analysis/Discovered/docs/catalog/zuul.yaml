  \ to auto-register custom filters\n\n**Evidence from filter base classes**:\n- `ZuulFilter<I,\
  \ O>` interface defines the plugin contract\n- `BaseFilter`, `BaseSyncFilter`, `Endpoint`\
  \ provide extension points\n- `HttpInboundSyncFilter`, `HttpOutboundFilter`, `HttpSyncEndpoint`\
  \ are specialized filter types developers extend\n\n### What This Architecture Is\
  \ NOT\n\n**Not Layered Architecture**: While there are packages like `netty/`, `filters/`,\
  \ `origins/`, the primary organization is around the processing pipeline, not horizontal\
  \ layers like presentation/business/data access.\n\n**Not Microservices**: Zuul\
  \ is a single deployable unit (a library/JAR). It's an API gateway that fronts microservices\
  \ but is not itself architected as microservices.\n\n**Not Event-Driven**: While\
  \ Zuul uses RxJava Observables for async processing, components don't communicate\
