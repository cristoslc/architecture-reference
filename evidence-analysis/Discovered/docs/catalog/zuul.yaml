one_line_summary: Async non-blocking L7 API gateway whose every request traverses
  a strict three-stage filter pipeline (INBOUND→ENDPOINT→OUTBOUND) over a Microkernel
  core that provides the Netty execution engine and filter-plugin infrastructure.
