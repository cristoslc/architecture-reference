quality_attributes:
  performance: Non-blocking Netty event loop with native epoll/io_uring; RxJava async
    filter execution; per-server connection pools; JMH-benchmarked core paths.
  extensibility: Formal @Filter annotation plugin model; compile-time annotation-processor
    discovery (META-INF/zuul/allfilters); runtime DynamicFilterLoader class loading;
    injectable FilterFactory; @ApplyAfter/@ApplyBefore declarative ordering.
  resilience: Per-origin concurrency limits; ProxyEndpoint retry with RequestAttempts;
    OriginThrottledException circuit-breaker hook; graceful shutdown via ClientConnectionsShutdown;
    idle-timeout and connection-expiry handlers.
  observability: Spectator metrics (HttpMetricsChannelHandler, ConnectionPoolMetrics,
    PerEventLoopMetricsChannelHandler); CurrentPassport per-request lifecycle stamping;
    access log publishing; ZuulStatusCategory error taxonomy.
  security: Mutual TLS (Http1MutualSslChannelInitializer); TLS-PSK (TlsPskHandler);
    StripUntrustedProxyHeadersHandler; SslClientCertCheck extension point; ELB and
    HAProxy proxy-protocol support.
  scalability: Stateless filter chain per request; DynamicServerResolver tracks Eureka
    server lists dynamically; per-event-loop connection pools prevent cross-thread
    contention.
  maintainability: Single Gradle multi-project build (5 modules); clear package separation
    by concern; extensive JUnit 5 test coverage; ZuulServerExtension integration test
    harness.
  interoperability: HTTP/1.1, HTTP/2, WebSocket, SSE, TLS-PSK; Eureka service discovery;
    Ribbon client load-balancing; Archaius dynamic configuration; Spectator/Atlas
    metrics.
classification_reasoning: "## Analysis\n\nZuul 2 is an L7 application gateway built\
  \ on Netty deployed as a single JVM application. Its defining architectural principle\
  \ is the three-stage Pipeline (pipe-and-filter): INBOUND filters \u2192 ENDPOINT\
  \ filter (ProxyEndpoint) \u2192 OUTBOUND filters. This is not an incidental implementation\
  \ choice but the explicit public API that Zuul\u2019s adopters program against.\n\
  \n### Pipeline (Primary)\n\nFilterType.java defines exactly INBOUND, ENDPOINT, and\
  \ OUTBOUND. BaseZuulChannelInitializer.addZuulFilterChainHandler() assembles them\
  \ in mandatory order: requestFilterChain \u2192 endPoint \u2192 responseFilterChain.\
  \ ZuulFilterChainRunner.runFilters() iterates an ordered ZuulFilter<T,T>[] array\
  \ sequentially, with AtomicInteger position tracking, Pending/Complete state per\
  \ filter, and SessionContext as the shared state carrier (the pipe). ZuulFilterChainHandler\
  \ coordinates the bidirectional (request + response) pipeline. Filters are ordered\
  \ by filterOrder() integer. Every line of Zuul\u2019s operational code implements\
  \ this pipeline.\n\n### Microkernel (Secondary)\n\nzuul-core is the microkernel:\
  \ it provides the Netty server, filter execution engine, connection pooling, metrics,\
  \ and SSL infrastructure but no routing or business logic. The plugin system has\
  \ formal contracts (ZuulFilter interface + @Filter annotation), compile-time discovery\
  \ (zuul-processor annotation processor generates META-INF/zuul/allfilters), runtime\
  \ loading (DynamicFilterLoader.putFiltersForClasses()), and injectable instantiation\
  \ (FilterFactory). @Filter.ApplyAfter and @ApplyBefore support declarative ordering\
  \ relative to named filters. Netflix runs hundreds of internal filters not present\
  \ in the open-source repo through this mechanism.\n\n### Gateway qualifier\n\nThe\
  \ explicit deployment topology: Zuul terminates client connections and proxies to\
  \ upstream origins via ProxyEndpoint + OriginManager + DefaultClientChannelManager\
  \ (Ribbon/Eureka). The README describes it as an \u2018L7 application gateway.\u2019\
  \ WebSocket and SSE push via PushConnectionRegistry extend the gateway beyond HTTP\
  \ request-response.\n\n### Rejected styles\n\nNot Microservices (single JAR, five\
  \ build modules are compile-time, no inter-process communication). Not Layered (packages\
  \ are by concern but the primary organizing principle is the pipeline execution model).\
  \ Not Event-Driven (RxJava Observable is a concurrency mechanism within the pipeline,\
  \ not an architectural event-broker pattern). Not Modular Monolith (module separation\
  \ is shallow; the primary decomposition is filter-level, not module-level).\n\n\
  Confidence 0.93. The Pipeline + Microkernel classification is unambiguous; both\
  \ patterns are simultaneously present, mutually reinforcing, and explicitly reflected\
  \ in the public API. Small gap for the theoretical Layered argument on zuul-core\
  \ internals."
