  \ annotation processor for filter discovery\n- **zuul-discovery**: Service discovery\
  \ integration (separate concern)\n- **zuul-sample**: Example application showing\
  \ how to extend the core with custom filters\n- **zuul-integration-test**: Integration\
  \ testing\n\n### Summary\n\nZuul is a textbook implementation of **Pipeline (Pipe-and-Filter)**\
