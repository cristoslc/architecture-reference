review_notes: 'README states Zuul is an L7 application gateway for dynamic routing,
  monitoring, resiliency, and security. Core architecture is a three-stage pipeline:
  INBOUND->ENDPOINT->OUTBOUND (FilterType.java). ZuulFilterChainRunner iterates ordered
  ZuulFilter[] arrays, passing ZuulMessage through each filter sequentially. ZuulFilterChainHandler
  wires request and response filter chains. Filter.java annotation defines order,
  type (INBOUND/ENDPOINT/OUTBOUND), category, and sync type. FilterCategory.java enumerates
  cross-cutting concerns applied as pipeline stages: abuse, access, routing, observability,
  context-decorator, etc. Sample app demonstrates: inbound filters (Routes, DebugRequest)
  -> endpoint (ProxyEndpoint/Healthcheck) -> outbound filters (ZuulResponseFilter).
  Each filter implements shouldFilter()+apply() pattern, transforming the message
  before passing it to the next stage. This is a canonical Pipe-and-Filter implementation.'
