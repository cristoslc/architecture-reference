  ```java\npublic enum FilterType {\n    INBOUND(\"in\"),\n    ENDPOINT(\"end\"),\n\
  \    OUTBOUND(\"out\");\n```\n\nRequests flow through three distinct pipeline stages:\n\
  1. **INBOUND**: Pre-processing filters (routing decisions, authentication, etc.)\n\
  2. **ENDPOINT**: The processing stage (typically `ProxyEndpoint` for routing to\
  \ origins)\n3. **OUTBOUND**: Post-processing filters (response transformation, logging,\
  \ etc.)\n\n**Evidence from `ZuulFilterChainRunner.java`** (`zuul-core/src/main/java/com/netflix/zuul/netty/filter/ZuulFilterChainRunner.java`):\n\
  - Filters are stored in an ordered array: `private final ZuulFilter<T, T>[] filters;`\n\
  - Sequential processing via `runFilters()` method\n- Each filter receives input,\
  \ processes it, and passes to the next filter\n- Filter ordering controlled by `filterOrder()`\
  \ with explicit ordering semantics\n\n**Evidence from `ZuulFilterChainHandler.java`**:\n\
  - Coordinates two separate pipelines: `requestFilterChain` and `responseFilterChain`\n\
  - `SessionContext` carries state through the pipeline (acts as the \"pipe\" data)\n\
  - Chain of responsibility pattern where each filter can modify or short-circuit\
  \ the flow\n\n**Evidence from sample filters** (`zuul-sample/src/main/java/com/netflix/zuul/sample/filters/inbound/Routes.java`):\n\
  - `Routes` filter (order 0) sets the endpoint destination\n- Filters are explicitly\
  \ ordered and composed sequentially\n\n### Microkernel (Plugin) - Secondary Style\n\
  \nZuul implements a plugin architecture where the core system is extended through\
  \ dynamically loaded filters:\n\n**Evidence from filter loading infrastructure**:\n\
  - `FilterLoader` interface (`zuul-core/src/main/java/com/netflix/zuul/FilterLoader.java`):\
  \ \"This class is one of the core classes in Zuul. It compiles, loads from a File,\
  \ and checks if source code changed.\"\n- `FilterRegistry` interface and `MutableFilterRegistry`\
  \ implementation for runtime filter management\n- `FilterFactory` interface for\
  \ instantiating filter plugins\n\n**Evidence from `DynamicFilterLoader.java`**:\n\
  - Dynamic loading of filters by class name: `putFiltersForClasses(String[] classNames)`\n\
  - Runtime filter registration and hot-reload capability\n\n**Evidence from annotation-based\
