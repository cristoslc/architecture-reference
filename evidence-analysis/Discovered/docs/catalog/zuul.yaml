review_notes: 'Pipe-and-Filter: Zuul''s core design is a ZuulFilter chain for request/response
  processing (routing, auth, rate-limiting, monitoring) — this is the defining architectural
  pattern. Modular Monolith: single Gradle build with multiple internal modules (zuul-core,
  zuul-processor, zuul-discovery, zuul-sample, zuul-integration-test) in a multi-project
  Gradle structure (settings.gradle), no separate Dockerfiles per service, no Kubernetes/container
  orchestration. Service-Based is not applicable here — Zuul itself is a library/framework,
  not a deployed service cluster. The 4 messaging signals likely reflect Netty/async
  I/O internals rather than an event-driven architecture.'
