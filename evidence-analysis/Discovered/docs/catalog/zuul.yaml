review_notes: '### Analysis


  Netflix Zuul is architecturally structured as a **Microkernel (Plugin)** system,
  specifically designed around a "Filter" chain mechanism. While it functions as a
  gateway, its internal code organization is defined by a stable core that manages
  the lifecycle of request/response cycles and a set of dynamically loadable or pluggable
  filters that implement the actual logic.


  #### 1. Microkernel (Plugin)

  The core of the system (`zuul-core`) provides the infrastructure for request handling,
  session management, and metric collection, but it contains very little hardcoded
  business or routing logic. The primary extension point is the **Zuul Filter**.

  - **`zuul-core`**: Acts as the microkernel. It manages the Netty pipeline, connection
  pooling, and the execution engine for filters.

  - **`zuul-processor`**: Likely handles the annotation processing or compilation
  of filters (Zuul is famous for its ability to load Groovy filters from disk at runtime
  without restarting).

  - **Extensibility**: The README and linked Wiki documentation emphasize that almost
  all functionality (auth, routing, logging, throttling) is implemented as individual
  filters that plug into the core''s lifecycle hooks.'
