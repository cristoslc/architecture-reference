  \ documentation emphasize that almost all functionality (auth, routing, logging,\
  \ throttling) is implemented as individual filters that plug into the core's lifecycle\
  \ hooks.\n\n#### 2. Pipeline (Pipe-and-Filter)\nThe execution model within the microkernel\
  \ follows a strict **Pipeline** pattern. \n- Requests flow through a series of \"\
  Inbound\" filters.\n- They reach an \"Endpoint\" filter (the \"Origin\" call).\n\
  - Responses flow back through \"Outbound\" filters.\n- This is a classic \"Chain\
  \ of Responsibility\" or \"Interceptor\" pattern applied at a macro architectural\
  \ scale, where the data (the request context) is transformed sequentially by discrete,\
  \ independent stages.\n\n#### 3. Evidence of Structure\n- **`zuul-core/src/main/java`**:\
  \ Contains the `FilterProcessor`, `ZuulFilter`, and `FilterLoader` which are the\
  \ heart of the plugin architecture.\n- **`zuul-sample`**: Demonstrates how to instantiate\
  \ the \"kernel\" and register custom filters to create a functional gateway.\n-\
  \ **`zuul-discovery`**: Provides a pluggable mechanism for service discovery (likely\
  \ integrating with Eureka), following the pattern of a core system being extended\
  \ by environment-specific modules.\n\n#### 4. Rejection of Other Styles\n- **Not\
  \ Microservices**: While Zuul is *used* in microservice environments, the repository\
  \ itself is a library/framework codebase organized as a set of modules that build\
  \ into a single functional unit or library, not a collection of independently deployable\
  \ services.\n- **Not Layered**: While it has internal packages, the defining characteristic\
  \ is the vertical plugin-interceptor model, not horizontal database/logic/UI layers.\n\
  - **Not Modular Monolith**: Although it is modular, the architectural intent is\
  \ not to separate business domains into modules, but to provide a generic engine\
  \ with a plugin SPI."
