review_notes: "### Analysis\n\nNetflix Zuul 2 is architecturally structured as a\
  \ **Pipeline (Pipe-and-Filter)** system with a **Microkernel (Plugin)** core.\n\n\
  #### 1. Pipeline (Primary)\n\nFilterType.java defines INBOUND, ENDPOINT, and OUTBOUND\
  \ as the three mandatory pipeline stages. ZuulFilterChainRunner executes each stage\
  \ as an ordered filter array. ZuulFilterChainHandler coordinates the bidirectional\
  \ request/response pipeline. SessionContext is the shared state carrier.\n\n####\
  \ 2. Microkernel (Secondary)\n\nzuul-core is the microkernel: it provides the Netty\
  \ execution engine, filter runner, connection pools, and SSL — but no business logic.\
  \ The @Filter annotation + zuul-processor annotation processor + DynamicFilterLoader\
  \ constitute a formal plugin system. All routing, auth, throttling, and response\
  \ logic is implemented as filter plugins.\n\n#### Gateway Topology\n\nProxyEndpoint\
  \ + OriginManager + DefaultClientChannelManager implement the L7 proxy behavior.\
  \ Eureka/Ribbon provide dynamic origin discovery."
