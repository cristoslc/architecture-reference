classification_reasoning: "## Architecture Analysis\n\n### Primary Style: Service-Based\n\
  \nThe Plane repository exhibits a **Service-Based Architecture** with the following\
  \ evidence:\n\n**Multiple coarse-grained deployable services** (from `docker-compose.yml`):\n\
  - **web** (React Router frontend - main UI)\n- **admin** (Admin dashboard frontend)\n\
  - **space** (Public/shared UI frontend)\n- **api** (Django REST API backend)\n-\
  \ **worker** + **beat-worker** (Celery background task processors)\n- **live** (WebSocket\
  \ collaboration server using HocusPocus)\n- **proxy** (Caddy reverse proxy)\n\n\
  **Shared database** - All services use a single PostgreSQL instance (`plane-db`):\n\
  ```yaml\nplane-db:\n  image: postgres:15.7-alpine\n```\n\n**Shared caching/messaging\
  \ infrastructure**:\n- `plane-redis` (Valkey/Redis) for caching and Celery broker\n\
  - `plane-mq` (RabbitMQ) for message queuing\n\n**Monolithic backend** - The `apps/api`\
  \ Django application is internally organized as a monolith with layered components:\n\
  - Views (`apps/api/plane/app/views/`)\n- Serializers (`apps/api/plane/app/serializers/`)\n\
  - Models (`apps/api/plane/db/models/`)\n- Django apps: `analytics`, `api`, `app`,\
  \ `authentication`, `bgtasks`, `db`, `license`, `space`, `web`\n\nThis matches the\
  \ Service-Based pattern: 2-5 coarse-grained services sharing a database, where the\
  \ backend is monolithic and frontends are separate deployment units.\n\n### Secondary\
  \ Style: Event-Driven\n\nThe system incorporates **Event-Driven** patterns via Celery\
  \ background tasks:\n\nFrom `apps/api/plane/celery.py`:\n```python\napp.conf.beat_schedule\
  \ = {\n    \"check-every-five-minutes-to-send-email-notifications\": {...},\n  \
  \  \"check-every-day-to-delete-hard-delete\": {...},\n    ...\n}\n```\n\nBackground\
  \ tasks handle:\n- Email notifications (`email_notification_task`)\n- Issue activities\
  \ tracking (`issue_activities_task`)\n- Webhook dispatches (`webhook_task`)\n- Cleanup\
  \ tasks (`cleanup_task`)\n\nThe `live` service uses WebSockets for real-time collaborative\
  \ editing (HocusPocus/Yjs), enabling event-driven real-time updates.\n\n### What\
  \ This Is NOT\n\n- **Not Microservices**: Single shared database, coarse-grained\
  \ services, no clear bounded contexts with independent data ownership\n- **Not Modular\
  \ Monolith**: Multiple independently deployable services, not a single deployment\
  \ unit\n- **Not pure Layered**: Multiple deployment units break horizontal layering;\
  \ frontends are separate from backend\n- **Not Hexagonal**: No ports/adapters pattern;\
  \ Django ORM directly couples to PostgreSQL\n\n### Frontend Monorepo Structure\n\
  \nThe frontend uses a **pnpm workspace** (`pnpm-workspace.yaml`) with:\n- 4 applications\
  \ (`apps/web`, `apps/admin`, `apps/space`, `apps/live`)\n- 14 shared packages (`@plane/types`,\
  \ `@plane/services`, `@plane/ui`, `@plane/editor`, etc.)\n\nThis is a **monorepo\
  \ with shared component libraries**, supporting the Service-Based architecture with\
  \ reusable code across frontends.\n\n### Summary\n\nPlane is a **Service-Based Architecture**\
  \ with **Event-Driven** secondary characteristics:\n- 5+ deployable services sharing\
  \ infrastructure\n- Single monolithic Django backend with layered internals\n- Multiple\
  \ frontend applications for different user contexts\n- Background task processing\
  \ via Celery for async operations\n- Real-time collaboration via dedicated WebSocket\
  \ server"
