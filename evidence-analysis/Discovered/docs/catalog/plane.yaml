review_notes: 'The Plane repository follows a **Service-Based** architecture, characterized
  by a few coarse-grained services that collaborate to form the application, while
  sharing a common backing data store.


  ### Primary Style: Service-Based

  Unlike a pure Microservices architecture where each service owns its database, Plane''s
  `docker-compose.yml` reveals that the core functional components (`api`, `worker`,
  `beat-worker`, `migrator`) all connect to the same PostgreSQL instance (`plane-db`)
  and Redis instance (`plane-redis`). These services are essentially specialized deployments
  of the same codebase (the `apps/api` Django application), separated to handle different
  concerns:

  - **`api`**: Synchronous HTTP/REST request handling.

  - **`worker`/`beat-worker`**: Asynchronous background task processing and scheduled
  jobs.

  - **`live`**: A separate Node.js service (likely utilizing Hocuspocus/Yjs for real-time
  collaboration) that handles socket-based traffic.

  - **`web`/`admin`/`space`**: Frontend applications deployed as independent units
  but acting as consumers of the unified API.


  ### Secondary Style: Event-Driven'
