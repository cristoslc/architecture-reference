classification_reasoning: "## Architecture Analysis: HashiCorp Consul\n\n### Primary\
  \ Classification: Layered Architecture\n\nConsul implements a classic **Layered\
  \ Architecture** with clear horizontal separation of concerns:\n\n**1. API/Presentation\
  \ Layer** (`agent/*_endpoint.go`, `agent/grpc-external/`, `agent/dns/`, `command/`)\n\
  - HTTP REST endpoints for catalog, ACL, health, coordinate, config operations\n\
  - gRPC external services (`agent/grpc-external/services/`)\n- DNS interface for\
  \ service discovery\n- CLI commands in `command/` directory (40+ subdirectories\
  \ for different command groups)\n\n**2. Business Logic/Service Layer** (`agent/consul/server.go`,\
  \ `agent/consul/client.go`)\n- Core `Server` struct (~2025 lines) handling Raft-based\
  \ consensus\n- `Client` struct for agent-to-server communication\n- Domain-specific\
  \ handlers: `Catalog`, `ACL`, `Health`, `Connect`, `PreparedQuery`\n- Controller\
  \ pattern in `internal/controller/` for Kubernetes-style reconciliation\n\n**3.\
  \ State/Data Layer** (`agent/consul/fsm/`, `agent/consul/state/`)\n- FSM (Finite\
  \ State Machine) for Raft log application\n- MemDB-based state store with tables\
  \ for nodes, services, ACLs, sessions, etc.\n- Snapshot/restore capabilities\n-\
  \ Event publishing for state change notifications\n\n**Evidence from code:**\n```\n\
  agent/consul/catalog_endpoint.go:76-80\ntype Catalog struct {\n    srv    *Server\n\
  \    logger hclog.Logger\n}\n```\n\nEndpoints depend on the Server, which depends\
  \ on the State Store - classic layered dependency.\n\n### Secondary Style: Modular\
  \ Monolith\n\nConsul exhibits **Modular Monolith** characteristics with enforced\
  \ internal boundaries:\n\n**Single Deployable:**\n- One `main.go` entry point\n\
  - Single binary built via Dockerfile\n- Go module with replace directives for internal\
  \ packages (`api/`, `sdk/`, `proto-public/`)\n\n**Organized Module Structure (~708\
  \ Go files in agent/ alone):**\n- `acl/` - Access control logic\n- `agent/` - Core\
  \ agent with endpoints\n- `agent/cache/` - Caching layer\n- `agent/consul/` - Server/client\
  \ logic, Raft integration\n- `agent/structs/` - Domain objects\n- `internal/controller/`\
  \ - Reconciliation controllers\n- `internal/storage/` - Storage backends\n- `command/`\
  \ - CLI interface\n\n**Module Boundary Evidence:**\n- `agent/consul/state/store.go`\
  \ encapsulates all state operations\n- `internal/controller/controller.go` implements\
  \ independent controller pattern\n- Clear separation between packages with explicit\
  \ interfaces\n\n**Enterprise/OSS Boundary:**\n- `*_ce.go` files define Community\
  \ Edition stubs (e.g., `agent/setup_ce.go`, `agent/consul/server_ce.go`)\n- Build\
  \ tags separate enterprise features\n\n### What This is NOT:\n\n- **NOT Microservices**:\
  \ Single binary deployed across all nodes (servers and clients run the same binary\
  \ with different configurations)\n  \n- **NOT Event-Driven Architecture**: While\
  \ Consul has event mechanisms (Serf gossip, event publishers in `agent/consul/stream/`),\
  \ the core architecture is **synchronous request-response with Raft consensus**,\
  \ not event-sourced. Writes go through Raft log replication.\n\n- **NOT CQRS**:\
  \ Single MemDB state store; no separate read/write models\n\n- **NOT Hexagonal/Ports-Adapters**:\
  \ Direct package coupling without ports/adapters abstraction. Internal packages\
  \ import each other directly.\n\n- **NOT Microkernel/Plugin**: No runtime plugin\
  \ loading. Extension is via build-time enterprise integration.\n\n### Key Architectural\
  \ Elements:\n\n1. **Raft Consensus**: Distributed state management via `github.com/hashicorp/raft`\
  \ with FSM implementation\n   ```\n   fsm/fsm.go:48-68 - FSM struct with state store\
  \ and event publisher\n   ```\n\n2. **Serf Gossip**: Member discovery and health\
  \ checking via `github.com/hashicorp/serf`\n\n3. **Controller Pattern**: Kubernetes-inspired\
  \ reconciliation loops in `internal/controller/manager.go`\n\n4. **State Management**:\
  \ MemDB (in-memory database) with ~30+ table schemas for different entity types\n\
  \n### Confidence Rationale: 0.90\n\n- **Clear layered structure** evident from directory\
  \ organization and dependency flow\n- **Single deployable** confirmed via `main.go`,\
  \ Dockerfile, and go.mod\n- **Module boundaries** enforced through Go package structure\n\
  - **Not ambiguous**: Clear separation between API, business logic, and state layers\n\
  - Minor complexity from distributed consensus mechanisms doesn't change the fundamental\
  \ layered organization"
