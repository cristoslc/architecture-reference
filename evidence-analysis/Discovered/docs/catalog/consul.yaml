one_line_summary: Single-binary service discovery and service mesh platform organized as a Modular Monolith with strict Layered separation from CLI/API through Raft consensus to MemDB state store.
classification_reasoning: "## Architecture Analysis: HashiCorp Consul\n\n### Primary\
  \ Classification: Modular Monolith + Layered\n\nConsul produces a single Go binary\
  \ (`consul`) from a single Go module with internal replace directives for versioned\
  \ sub-modules (`api/`, `sdk/`, `proto-public/`). All subsystems\u2014service\
  \ discovery, K/V store, ACL, Connect service mesh, DNS, federation\u2014coexist\
  \ in shared memory within a single process, sharing a Raft-replicated MemDB state\
  \ store. This is a textbook Modular Monolith: one deployable, many well-bounded\
  \ internal packages.\n\nThe codebase simultaneously exhibits a strict Layered pattern\
  \ with one-direction dependencies across four horizontal tiers:\n1. **Interface\
  \ layer**: `command/` (CLI), `agent/*_endpoint.go` (HTTP REST), `agent/grpc-external/`\
  \ (gRPC public API), `agent/dns/` (DNS).\n2. **Agent/RPC layer**: `agent/consul/server.go`,\
  \ `agent/consul/client.go`, RPC dispatch, ACL resolution, blocking queries, cache.\n\
  3. **Consensus/FSM layer**: `agent/consul/fsm/` applying Raft log entries; Serf\
  \ gossip event channels; Autopilot.\n4. **State layer**: `agent/consul/state/`\
  \ (MemDB tables), `internal/storage/` (V2 resource backends).\n\nClassic layered\
  \ dependency: `catalog_endpoint.go \u2192 Server \u2192 state.Store`.\n\nThe docs/README.md\
  \ self-describes the architecture as organized into 'significant architectural\
  \ layers'. Community Edition vs Enterprise variants are separated by build-tagged\
  \ `_ce.go` files, not separate deployables.\n\n### Secondary Styles\n\n**Controller/Reconciliation**:\
  \ `internal/controller/` implements a Kubernetes-inspired watch-reconcile loop\
  \ for the V2 resource model (introduced in Consul 1.16+). Controllers run on\
  \ Raft leaders, watch `pbresource.Resource` types via gRPC Resource Service.\n\n\
  **Event-Driven (internal)**: Serf gossip events flow via `eventChLAN`/`eventChWAN`\
  \ channels. `agent/consul/stream/event_publisher.go` provides topic-keyed incremental\
  \ event subscriptions downstream of FSM commits. Neither replaces the synchronous\
  \ Raft write path.\n\n### What This Is NOT\n\n- **NOT Microservices**: Single\
  \ binary deployed across all nodes (servers and clients use the same binary with\
  \ different config flags).\n- **NOT CQRS**: Single MemDB state store; no separate\
  \ read/write models.\n- **NOT Microkernel**: No runtime plugin loading; enterprise\
  \ extension is build-time only.\n- **NOT Hexagonal**: Direct package coupling\
  \ without ports/adapters abstraction throughout the agent tier.\n- **NOT Event-Driven\
  \ (primary)**: Core write path is synchronous Raft consensus; events are downstream\
  \ notification only.\n\n### Confidence Rationale: 0.92\n\n- Single binary confirmed\
  \ via `main.go`, Dockerfile, and go.mod.\n- Layered dependency chain is unambiguous\
  \ and self-documented.\n- Module boundaries enforced through Go package structure\
  \ with build-tagged CE/Enterprise split.\n- V2 controller architecture is an additive\
  \ overlay that does not change the fundamental deployment or layering model."
