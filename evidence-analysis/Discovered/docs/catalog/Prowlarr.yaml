review_notes: 'Prowlarr follows a traditional **Layered** architecture, which is the
  standard architectural template for the "*arr" family of applications (Sonarr, Radarr,
  etc.). It organizes the system into horizontal layers (Common, Core, Api, Host)
  that compile into a single deployable unit.


  ### 1. Horizontal Layering

  The codebase is strictly partitioned into functional layers as seen in `src/Prowlarr.sln`:

  - **Prowlarr.Common / NzbDrone.Common**: The lowest layer containing cross-cutting
  concerns like `Crypto`, `Serializer`, `Http` clients, and `EnvironmentInfo`.

  - **Prowlarr.Core (NzbDrone.Core)**: The business logic layer. It contains the domain
  entities and the primary services that orchestrate indexing and tracking logic.

  - **Prowlarr.Api.V1**: The presentation/service layer, exposing REST endpoints.
  It depends on `Core` to execute business operations.

  - **Prowlarr.Host (NzbDrone.Host / Prowlarr.Console)**: The entry point and infrastructure
  setup layer responsible for bootstrapping the application, dependency injection,
  and hosting the web server.


