classification_reasoning: 'Prowlarr follows a traditional **Layered** architecture,
  which is the standard architectural template for the "*arr" family of applications
  (Sonarr, Radarr, etc.). It organizes the system into horizontal layers (Common,
  Core, Api, Host) that compile into a single deployable unit.


  ### 1. Horizontal Layering

  The codebase is strictly partitioned into functional layers as seen in `src/Prowlarr.sln`:

  - **Prowlarr.Common / NzbDrone.Common**: The lowest layer containing cross-cutting
  concerns like `Crypto`, `Serializer`, `Http` clients, and `EnvironmentInfo`.

  - **Prowlarr.Core (NzbDrone.Core)**: The business logic layer. It contains the domain
  entities and the primary services that orchestrate indexing and tracking logic.

  - **Prowlarr.Api.V1**: The presentation/service layer, exposing REST endpoints.
  It depends on `Core` to execute business operations.

  - **Prowlarr.Host (NzbDrone.Host / Prowlarr.Console)**: The entry point and infrastructure
  setup layer responsible for bootstrapping the application, dependency injection,
  and hosting the web server.


  ### 2. Hexagonal (Ports and Adapters) Signals

  While primarily Layered, the system exhibits strong **Hexagonal** characteristics
  to maintain cross-platform compatibility (Windows/Linux/macOS):

  - **Adapters for OS concerns**: The presence of `NzbDrone.Mono` and `NzbDrone.Windows`
  folders (e.g., `src/NzbDrone.Mono/Disk/DiskProvider.cs` and `src/NzbDrone.Windows/Disk/DiskProvider.cs`)
  demonstrates the "Adapter" pattern, where the application core interacts with a
  "Port" (interface) and the specific OS implementation is injected at runtime.

  - **External Communications**: The system serves as a proxy for 500+ external trackers.
  This is handled via specialized indexer implementations that adapt external XML/JSON/Torznab
  interfaces into the internal Prowlarr domain model.


  ### 3. Modular Composition

  The repository uses a central `ServiceFactory` and `Composition` modules (seen in
  `src/NzbDrone.Common/Composition`) to wire together the layers. This ensures that
  while the layers are separate projects, they are tightly integrated during the bootstrap
  phase in `Prowlarr.Host`.


  ### Why not other styles?

  - **Not Microservices**: Despite the "Service" terminology in the README, all C#
  projects are compiled and shipped as a single executable.

  - **Not Microkernel**: Although it supports hundreds of trackers, these are typically
  integrated as classes within the `Core` project or via YML definitions parsed by
  a core engine, rather than true runtime-loaded binary plugins with independent lifecycles.

  - **Not Modular Monolith**: While there is separation, the boundaries are horizontal
  (layers) rather than vertical (feature-based domains like "Search", "Notifications",
  "Sync" each having their own API/Core/Data stack).'
