one_line_summary: An indexer manager and proxy built as a Modular Monolith with a
  Microkernel plugin layer — the ThingiProvider framework hosts 71+ indexer definitions
  (plus a Cardigann YAML engine for 500+ trackers), while ApplicationService reacts
  to indexer lifecycle events to push configuration outward to Sonarr, Radarr, Lidarr,
  and other *arr apps, all within a single ASP.NET Core process.
classification_reasoning: "## Primary Style: Modular Monolith\n\nProwlarr is a single
  deployable ASP.NET Core process bootstrapped in\n`NzbDrone.Host/Bootstrap.cs` using
  DryIoc auto-discovery. The solution\nspans ~28 projects compiled into one binary:\n\n-
  `NzbDrone.Core` — 938 .cs files, all business logic\n- `Prowlarr.Api.V1` — REST
  controllers (ASP.NET Core MVC)\n- `Prowlarr.Http` — middleware, authentication,
  error handling\n- `NzbDrone.SignalR` — real-time WebSocket push to the React frontend\n-
  `NzbDrone.Common` — shared infrastructure (HTTP, disk, serialization, DI)\n- `NzbDrone.Windows`
  / `NzbDrone.Mono` — platform-specific shims\n\nWithin `NzbDrone.Core`, every functional
  domain is vertically organized:\n\n- `Indexers/` — indexer request/response pipeline,
  RSS sync, 71+ definitions\n- `IndexerSearch/` — fan-out search across multiple
  indexers concurrently\n- `Applications/` — outbound sync to downstream *arr apps\n-
  `Download/` — download client abstraction and grab pipeline\n- `Notifications/`
  — notification fanout on grab/health events\n- `History/` — persistent grab/search
  audit log\n- `IndexerProxies/` — per-indexer HTTP/SOCKS/FlareSolverr proxies\n-
  `Jobs/` — scheduled task system\n- `Profiles/` — indexer sync profiles\n\nThe system
  runs against a single SQLite or PostgreSQL database accessed through\n`BasicRepository<T>`
  (Dapper-based), with 21+ migration scripts under\n`Datastore/Migration/`.\n\n##
  Secondary Style: Microkernel\n\nThe `ThingiProvider` framework (`NzbDrone.Core/ThingiProvider/`)\
  \ is a generic\nplugin bus. Every extension category implements `IProvider`.\nThe
  generic `ProviderFactory<TProvider, TProviderDefinition>` resolves\nimplementations
  from the DryIoc container at runtime and publishes lifecycle events\n(`ProviderAddedEvent<T>`,
  `ProviderUpdatedEvent<T>`, `ProviderDeletedEvent<T>`)\nthrough `EventAggregator`.
  Plugin populations:\n\n- 71+ indexer definitions in `Indexers/Definitions/` covering
  500+ trackers;\n  Cardigann YAML engine (`CardigannBase`/`CardigannParser`) interprets\n
  \ community-maintained YML specs at runtime without code changes\n- ~20 download
  client implementations (qBittorrent, Transmission, SABnzbd, etc.)\n- ~20 notification
  targets (Discord, Telegram, Slack, Email, Webhook, etc.)\n- 4 indexer proxy types
  (HTTP, SOCKS4, SOCKS5, FlareSolverr) via `IndexerProxyBase`\n- 7 downstream app
  integrations (Sonarr, Radarr, Lidarr, Readarr,\n  Mylar, Whisparr, LazyLibrarian)
  via `ApplicationBase`\n\nThe `ApplicationService` is event-driven within the monolith:
  it handles\n`ProviderAddedEvent<IIndexer>`, `ProviderUpdatedEvent<IIndexer>`,\n`ProviderBulkUpdatedEvent<IIndexer>`,
  `ProviderDeletedEvent<IIndexer>`, and\n`ApiKeyChangedEvent` to push indexer configuration
  changes to downstream apps.\n\n## What This Is NOT\n\n- **NOT Microservices**: One
  binary, one database, no network service boundary\n  between components.\n- **NOT
  Layered (horizontal)**: Organizing principle is vertical domain modules\n  within
  `NzbDrone.Core`, not horizontal technical tiers.\n- **NOT Event-Driven (async messaging)**:
  `EventAggregator` is in-process\n  publish/subscribe — no Kafka, RabbitMQ, or durable
  queues.\n- **NOT CQRS**: No separate read/write models.\n\n## Quality Attribute
  Evidence\n\n- **Modularity**: Domain folders with own Models/Services/Repositories/Events;\n
  \ `ThingiProvider` plugin contracts enforce separation between core and extensions.\n-
  **Evolvability**: 21+ DB migrations; Cardigann YAML engine allows zero-code tracker\n
  \ additions; `IHandle<TEvent>` allows new event reactions without modifying publishers.\n-
  **Observability**: NLog; SignalR real-time push to UI; 19 `HealthCheck/Checks/`;\n
  \ `IndexerStatusService` tracks per-indexer backoff state.\n- **Deployability**:
  Cross-platform .NET (Windows service, Linux daemon, Docker);\n  SQLite default,
  PostgreSQL optional.\n- **Interoperability**: Exposes Newznab/Torznab-compatible
  API; actively pushes\n  indexer config to 7 downstream *arr app types via their
  own REST APIs.\n- **Fault Tolerance**: Per-indexer backoff via `IndexerStatusService`;\n
  \ `CommandExecutor` isolates command failures; FlareSolverr proxy handles\n  Cloudflare-protected
  indexers.\n- **Scalability**: Single-process, single-host design; vertical scaling
  only.\n"
