classification_reasoning: "## Architecture Analysis: Prowlarr\n\n### Primary Classification:\
  \ Microkernel (Plugin)\n\nProwlarr implements a **Microkernel architecture** with\
  \ a plugin-based extensibility pattern centered around the \"Provider\" abstraction.\
  \ This is the dominant architectural style.\n\n**Key Evidence:**\n\n1. **Provider\
  \ Plugin System** (`src/NzbDrone.Core/ThingiProvider/`):\n   - Core interface `IProvider`\
  \ defines the plugin contract with methods like `Test()`, `RequestAction()`, and\
  \ properties for configuration\n   - Abstract `ProviderFactory<TProvider, TProviderDefinition>`\
  \ serves as the plugin registry/factory\n   - All extension points use this pattern:\
  \ `IndexerFactory`, `ApplicationFactory`, `NotificationFactory`, `IndexerProxyFactory`,\
  \ `DownloadClientFactory`\n\n2. **Runtime Plugin Discovery** (`src/NzbDrone.Common/Composition/Extensions.cs`):\n\
  \   ```csharp\n   public static IContainer AutoAddServices(this IContainer container,\
  \ List<string> assemblyNames)\n   {\n       container.RegisterMany(assemblies,\n\
  \           serviceTypeCondition: type => type.IsInterface && !type.FullName.StartsWith(\"\
  System\"),\n           reuse: Reuse.Singleton);\n   }\n   ```\n   - DryIoc DI container\
  \ automatically discovers and registers all provider implementations\n\n3. **143+\
  \ Indexer Implementations** (`src/NzbDrone.Core/Indexers/Definitions/`):\n   - Each\
  \ indexer (AlphaRatio, Anidex, BroadcastheNet, Cardigann, etc.) is a plugin implementing\
  \ `IIndexer`\n   - Abstract base class `IndexerBase<TSettings>` provides template\
  \ method pattern\n   - Indexers can be added without modifying core system\n\n4.\
  \ **External Definition Loading** (`src/NzbDrone.Core/IndexerVersions/IndexerDefinitionUpdateService.cs`):\n\
  \   - Cardigann indexers load YAML definitions from external servers\n   - `https://indexers.prowlarr.com/{branch}/{version}`\
  \ downloads new indexer definitions at runtime\n   - True plugin capability without\
  \ code changes\n\n5. **Multiple Extension Points**:\n   - **Indexers**: `IIndexer`\
  \ with 143+ implementations\n   - **Applications**: `IApplication` for integrations\
  \ (Sonarr, Radarr, Lidarr, etc.)\n   - **Notifications**: `INotification` for push\
  \ notifications\n   - **Download Clients**: `IDownloadClient` for torrent/usenet\
  \ clients\n   - **Indexer Proxies**: `IIndexerProxy` for VPN/proxy support\n\n###\
  \ Secondary Classification: Layered\n\nProwlarr exhibits conventional **Layered\
  \ architecture** as a supporting pattern:\n\n**Horizontal Layers** (from solution\
  \ structure `src/Prowlarr.sln`):\n- **Presentation Layer**: `frontend/` (React/TypeScript\
  \ SPA)\n- **API Layer**: `Prowlarr.Api.V1/`, `Prowlarr.Http/` (REST controllers)\n\
  - **Application/Host Layer**: `NzbDrone.Host/`, `NzbDrone.Console/` (bootstrap,\
  \ lifecycle)\n- **Core Domain Layer**: `NzbDrone.Core/` (business logic, providers,\
  \ services)\n- **Infrastructure Layer**: `NzbDrone.Common/`, `NzbDrone.Mono/`, `NzbDrone.Windows/`\
  \ (platform abstractions)\n- **Data Access**: `NzbDrone.Core/Datastore/` (SQLite/PostgreSQL\
  \ repositories)\n\n**Evidence**:\n- Clean separation via project references and\
  \ namespaces\n- `Startup.cs` configures ASP.NET Core middleware pipeline\n- Repository\
  \ pattern in `BasicRepository<TModel>` with event aggregation\n- Controllers in\
  \ `ProviderControllerBase` delegate to services/factories\n\n### Why Not Other Styles:\n\
  \n- **Not Microservices**: Single deployable application, shared database (SQLite/PostgreSQL),\
  \ no inter-service communication\n- **Not Domain-Driven Design**: No bounded contexts,\
  \ aggregates, domain events, or ubiquitous language organization\n- **Not Event-Driven\
  \ Architecture**: Uses in-process `EventAggregator` for internal decoupling, not\
  \ external message brokers\n- **Not CQRS**: No separate read/write models\n- **Not\
  \ Service-Based**: Not multiple coarse-grained services\n\n### Architecture Summary\
  \ Diagram:\n\n```\n┌─────────────────────────────────────────────────────────┐\n\
  │                   Frontend (React)                       │\n└──────────────────────────┬──────────────────────────────┘\n\
  \                           │ HTTP/REST\n┌──────────────────────────▼──────────────────────────────┐\n\
  │              API Layer (Prowlarr.Api.V1)                 │\n│         ProviderControllerBase,\
  \ REST endpoints          │\n└──────────────────────────┬──────────────────────────────┘\n\
  \                           │\n┌──────────────────────────▼──────────────────────────────┐\n\
  │                   Core (NzbDrone.Core)                   │\n│  ┌─────────────────────────────────────────────────────┐│\n\
  │  │           ProviderFactory<TProvider>               ││\n│  │    Plugin Registry\
  \ & Runtime Discovery              ││\n│  └──────────────────────┬──────────────────────────────┘│\n\
  │                         │                                │\n│  ┌──────────┬───────────┼───────────┬──────────┐\
  \         │\n│  │          │           │           │          │         │\n│  ▼\
  \          ▼           ▼           ▼          ▼         │\n│ Indexers  Apps   Notifications\
  \  Downloads  Proxies      │\n│ (143+)   (6+)       (20+)        (10+)      (4+)\
  \        │\n└───────────────────\n\n[truncated]"
