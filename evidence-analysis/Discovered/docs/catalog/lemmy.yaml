classification_reasoning: "Lemmy is a Modular Monolith at its core. The Cargo workspace\
  \ organizes ~30 tightly-coupled crates into a single lemmy_server binary backed\
  \ by a single PostgreSQL database. Key crate groups: crates/api/{api,api_crud,api_utils,routes}\
  \ for HTTP handling and business logic; crates/db_schema for write models and ORM\
  \ mappings; crates/db_views/{post,comment,community,person,...} (20+ crates) for\
  \ read aggregations; crates/apub/{apub,activities,objects,send} for ActivityPub\
  \ protocol; crates/routes for middleware, feeds, webfinger, nodeinfo. All modules\
  \ share a single LemmyContext (pool, HTTP client, secrets, rate-limit) passed as\
  \ Actix-web app data. 328 Diesel migrations in one schema confirm a unified data\
  \ layer.\n\nThe architecture is unmistakably Layered within that monolith. Request\
  \ flow: (1) HTTP route/middleware layer (rate limiting via RateLimit, session, CORS,\
  \ idempotency middleware in lemmy_routes), (2) API application layer (business logic,\
  \ validation, auth in api and api_crud), (3) data-access layer (db_schema impls,\
  \ db_views read queries), (4) PostgreSQL persistence via diesel-async. Layer dependencies\
  \ are strictly one-directional. db_views separates read aggregations from write\
  \ models - a deliberate read/write code path split, though not formal CQRS.\n\n\
  Federation adds an intra-process async pipeline quality: API write handlers post\
  \ SendActivityData enum variants to a tokio unbounded_channel (ActivityChannel in\
  \ api_utils/send_activity.rs). A dedicated Tokio task (handle_outgoing_activities)\
  \ consumes the channel, dispatches to match_outgoing_activities in lemmy_apub_activities,\
  \ which serializes the activity and writes it to the sent_activity DB queue. A separate\
  \ SendManager (lemmy_apub_send) reads that queue and delivers per-instance. This\
  \ pipeline runs entirely within the single process.\n\nThe WASM plugin system in\
  \ api_utils/plugins.rs gives Lemmy a Microkernel quality. LemmyPlugins uses the\
  \ extism WASM runtime to load plugins from configurable file paths or HTTP URLs\
  \ with SHA-256 hash verification. Hook points include: plugin_hook_before (data\
  \ mutation before processing), plugin_hook_after (fire-and-forget side effects),\
  \ notification_after_create, get_captcha/validate_captcha (pluggable captcha provider).\
  \ WASM sandboxing enforces allowed_hosts and allowed_paths. Core behavior is complete\
  \ without plugins; plugins extend at defined extension points.\n\nRejected: Not\
  \ Microservices - all domain logic is one binary with one database; lemmy-ui, pictrs,\
  \ and postgres are external dependencies, not decomposed services. Not Event-Driven\
  \ - the ActivityChannel is an in-process tokio channel, not an external event broker;\
  \ ActivityPub is a federation wire protocol, not an internal event bus. Not CQRS\
  \ - no command/event bus, no separate read store derived from events, no event sourcing.\
  \ Not DDD - no aggregate roots, domain events, or bounded contexts following DDD\
  \ conventions. Confidence 0.88: Modular Monolith and Layered are unambiguous from\
  \ code structure; Microkernel reflects a real but additive pattern in plugins.rs."
