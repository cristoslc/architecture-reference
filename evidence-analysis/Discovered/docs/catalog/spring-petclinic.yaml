classification_reasoning: |
  Spring PetClinic is the archetypal Layered architecture on Spring Boot. The codebase
  has a clear horizontal separation of concerns across three layers:

  1. Presentation Layer: Five @Controller classes (OwnerController, PetController,
     VisitController, VetController, WelcomeController/CrashController) handle HTTP
     requests and delegate to Thymeleaf templates in src/main/resources/templates/.

  2. Data Access Layer: Three Spring Data JPA repository interfaces
     (OwnerRepository extends JpaRepository<Owner, Integer>, VetRepository,
     PetTypeRepository) abstract all persistence. Spring profiles switch the underlying
     database (H2/MySQL/PostgreSQL) without code changes.

  3. Domain Model Layer: A @MappedSuperclass inheritance hierarchy (BaseEntity ->
     Person/NamedEntity -> Owner/Vet/Pet/PetType/Visit/Specialty) provides JPA entities
     with simple business methods (Owner.addPet(), Owner.addVisit(), Owner.getPet()).

  4. Cross-Cutting System Package: CacheConfiguration (@EnableCaching with JCache/Caffeine
     for the vets cache), WebConfiguration, and system controllers.

  Skinny-service variant: No @Service classes exist in production code. Controllers inject
  repositories directly (e.g., OwnerController(OwnerRepository owners)). The Owner entity
  acts as a lightweight aggregate root for coordinating pet/visit logic.

  Single deployable unit: One pom.xml artifact (spring-petclinic), one @SpringBootApplication
  entry point (PetClinicApplication), and a single-replica Kubernetes Deployment (image:
  dsyer/petclinic). docker-compose.yml contains only database containers.

  Not Modular Monolith: Feature packages (owner/, vet/, system/) are organizational only.
  No module-info.java, no ArchUnit rules, no package-private isolation. Cross-package imports
  are unrestricted (VisitController imports OwnerRepository from the owner package directly).

  Not Event-Driven: No message broker, no domain events, no @EventListener on business
  events, no @Async processing pipeline. The only ApplicationEvent reference is in test
  infrastructure (PostgresIntegrationTests).

  Not DDD: Entities are anemic data carriers with getters/setters. No aggregates in the
  DDD sense, no value objects, no bounded context contracts, no domain services, no
  domain events.

  Not Hexagonal: Repositories are Spring Data interfaces (framework-coupled), not ports.
  Controllers are Spring MVC classes, not adapters. No port/adapter contract layer exists.
review_notes: >-
  Spring PetClinic is a textbook Layered architecture: presentation (Spring MVC controllers
  + Thymeleaf templates), data access (Spring Data JPA repositories), and domain model
  (JPA entities) layers separated horizontally, with a cross-cutting system package. The
  "skinny service" variant omits a formal service layer because business logic is simple
  enough to live in controllers or domain entities. The feature-package layout (owner/,
  vet/) is organizational, not architectural — no boundary enforcement exists. Single
  Spring Boot JAR, single @SpringBootApplication, single Kubernetes Deployment.
