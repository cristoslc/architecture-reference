  \ handle HTTP requests:\n   - `OwnerController.java` (line 48: `@Controller`)\n\
  \   - `VetController.java` (line 35: `@Controller`)\n   - `VisitController.java`,\
  \ `PetController.java`, `WelcomeController.java`, `CrashController.java`\n\n2. **Data\
  \ Access Layer** - Repository interfaces abstract persistence:\n   - `OwnerRepository.java`\
  \ (line 36: `extends JpaRepository<Owner, Integer>`)\n   - `VetRepository.java`\
  \ (line 38: `extends Repository<Vet, Integer>`)\n   - `PetTypeRepository.java`\n\
  \n3. **Domain Model Layer** - JPA entities with business data:\n   - `Owner.java`\
  \ (line 47-48: `@Entity @Table(name = \"owners\")`)\n   - `Pet.java`, `Vet.java`,\
  \ `Visit.java`, `Specialty.java`, `PetType.java`\n   - Base classes: `BaseEntity.java`,\
  \ `Person.java`, `NamedEntity.java`\n\n**Direct layer dependencies:** Controllers\
  \ inject Repositories directly without an intermediate service layer (confirmed\
  \ by no `@Service` annotations found in codebase). Example from `OwnerController.java`\
  \ (line 53-57):\n```java\nprivate final OwnerRepository owners;\npublic OwnerController(OwnerRepository\
  \ owners) {\n    this.owners = owners;\n}\n```\n\n### Single Deployable Unit\n\n\
  - Single `pom.xml` with one artifact: `spring-petclinic` (line 10-11)\n- Single\
  \ entry point: `PetClinicApplication.java` with `@SpringBootApplication`\n- No multi-module\
  \ Maven/Gradle workspace structure\n- k8s deployment shows single container: `k8s/petclinic.yml`\
  \ (line 32: single `image: dsyer/petclinic`)\n\n### What It Is NOT\n\n**Not Modular\
  \ Monolith:** No enforced internal module boundaries detected:\n- No `module-info.java`\
  \ files\n- No ArchUnit or similar architecture enforcement tests\n- No package isolation\
  \ constraints\n- The `owner/`, `vet/`, `model/` packages are organizational, not\
  \ architectural boundaries\n\n**Not Microservices:** Single deployable artifact,\
  \ single database, single service definition in k8s\n\n**Not Service-Based:** Only\
  \ one service exists\n\n**Not Event-Driven:** No message broker configuration, no\
  \ event handlers\n\n**Not DDD:** No aggregates, bounded contexts, domain services,\
  \ or value objects—just anemic entities with getters/setters\n\n**Not Hexagonal:**\
  \ No ports-and-adapters pattern; repositories are Spring Data interfaces, not abstracted\
  \ application ports\n\n**Not CQRS:** Single read/write model\n\n### Conclusion\n\
  \nSpring PetClinic exemplifies the classic **Layered Architecture** pattern with\
  \ Controller → Repository → Entity layers. It's a well-structured monolithic application\
  \ demonstrating Spring Boot best practices with clean horizontal separation, but\
  \ without the module boundary enforcement that would make it a Modular Monolith."
