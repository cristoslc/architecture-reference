review_notes: 'Classic 3-tier layered architecture: Presentation (Thymeleaf templates
  in src/main/resources/templates/, @Controller classes OwnerController, VetController,
  PetController, VisitController), Persistence (@Repository interfaces OwnerRepository,
  VetRepository extending JpaRepository), Domain Model (JPA @Entity classes Owner,
  Pet, Visit, Vet in model/owner/vet packages with BaseEntity/NamedEntity/Person hierarchy).
  No service layer -- controllers call repositories directly, which is a simplified
  but valid layered pattern. Single deployable Spring Boot monolith (PetClinicApplication.java).
  docker-compose.yml only provides database containers (MySQL/PostgreSQL), not microservices.
  README explicitly describes it as a ''Spring Boot application'' sample. Package
  structure groups by domain feature (owner/, vet/, system/, model/) but each feature
  package contains controller+entity+repository -- layers within feature packages,
  not hexagonal ports/adapters.'
