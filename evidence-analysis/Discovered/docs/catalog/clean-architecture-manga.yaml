one_line_summary: >-
  Textbook Hexagonal Architecture (Ports and Adapters) reference implementation
  for a virtual wallet domain in .NET 6, with DDD tactical patterns in the Domain
  layer and feature-flag-swappable infrastructure adapters.
classification_reasoning: >-
  The repository is a deliberate, high-fidelity demonstration of Hexagonal Architecture
  (Ports and Adapters). Evidence is explicit at every level: the README wiki names the
  style and maps components to ports/adapters/left-side/right-side; the project reference
  graph enforces the inward dependency rule structurally (Domain has zero project references,
  Application references only Domain, Infrastructure references Application, WebApi wires
  them together for DI); every use case exposes an IOutputPort for each output path and
  receives driven ports by constructor injection; and test doubles (AccountRepositoryFake,
  UnitOfWorkFake) swap in via feature flags without modifying any inner-layer code.

  DDD tactical patterns (aggregate root Account, value objects Money/Currency/AccountId,
  repository interface IAccountRepository in Domain, IAccountFactory) are genuinely applied
  and documented in the README wiki under "Domain-Driven Design Patterns". These serve the
  hexagonal structure rather than defining the overall architecture—no bounded contexts,
  domain events, or CQRS split are present.

  Layered Architecture is present as a structural secondary style due to the four-layer
  horizontal separation (Domain / Application / Infrastructure / WebApi), but the dependency
  inversion rule distinguishes this from classical layering.

  No CQRS, no event-driven messaging, no microservices boundaries, and no microkernel
  plugin structure were observed. The primary classification is Hexagonal Architecture
  with high confidence (0.97).
