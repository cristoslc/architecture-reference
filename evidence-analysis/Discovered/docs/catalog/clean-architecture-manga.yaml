review_notes: "Evidence: README.md explicitly names 'Hexagonal Architecture Style (Ports and Adapters)' as a primary pattern (line 93). Project is organized into four layers: Domain (no dependencies, contains Aggregate Root Account.cs, Value Objects Money/Currency/AccountId, Entity Credit/Debit, Repository interface IAccountRepository.cs), Application (depends only on Domain via Application.csproj, contains Use Cases as central organizing structure with IOutputPort ports for each use case), Infrastructure (implements adapters: AccountRepository.cs implements IAccountRepository, CurrencyExchangeService.cs implements ICurrencyExchange, UnitOfWork.cs implements IUnitOfWork), and WebApi (controllers implement IOutputPort acting as driving adapters, e.g. TransactionsController.cs). Dependency direction enforced via .csproj references: Domain has zero project references, Application references only Domain, Infrastructure references Application, WebApi references Application+Infrastructure. DDD tactical patterns extensively used: Aggregate Root (Account), Entities (Credit, Debit), Value Objects (Money, Currency, AccountId), Repository pattern, First-Class Collections (CreditsCollection, DebitsCollection). The wiki index documents DDD patterns explicitly (lines 110-115). Not Microservices despite docker-compose presence - it is a single bounded context (Accounts) with supporting identity-server, not independently deployable microservices."