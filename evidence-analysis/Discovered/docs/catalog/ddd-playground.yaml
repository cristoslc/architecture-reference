review_notes: "Evidence: README.md explicitly states 'Wallet API in Symfony following DDD (Domain Driver Design)' and 'Code structured in layers as appears in DDD in php book.' src/ has four layers: Domain/, Application/, Infrastructure/, UI/. depfile.yml enforces strict layer dependency rules. Domain layer contains Aggregate Roots (AggregateRoot base class), Value Objects (UserId, TransactionState), Domain Events (UserWasCreated, TransactionWasCreated), Repository interfaces, and Factories across bounded contexts (User, Wallet, Transaction, Payment, Security, Money). AbstractBusController separates command bus ($bus/handle) from query bus ($queryBus/ask) using League Tactician, evidencing CQRS. EventPublisherMiddleware publishes domain events to RabbitMQ; EventStoreMiddleware persists to ElasticSearch via EventStoreRepository."