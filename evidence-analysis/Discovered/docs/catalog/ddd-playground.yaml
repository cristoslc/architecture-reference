one_line_summary: PHP/Symfony reference implementation of DDD tactical patterns (Aggregates, Value Objects, Domain Events)
  within a strict four-layer Hexagonal Architecture, with RabbitMQ async event publishing and an Elasticsearch event store.
classification_reasoning: |
  ## Primary Style: Domain-Driven Design

  The repository is an explicit teaching artifact for DDD tactical patterns.

  **Aggregates and Aggregate Roots:**
  - `User` extends `AggregateRoot` (`src/Domain/User/Model/User.php`)
  - `AbstractTransaction` extends `AggregateRoot` (`src/Domain/Transaction/Model/AbstractTransaction.php`)
  - Each aggregate encapsulates its own invariants and raises domain events internally.

  **Value Objects:**
  Rich immutable value object hierarchy: `UserId`, `WalletId`, `TransactionId`,
  `Credit`, `Money`, `Currency`, `AuthUser`, `TransactionType`, `TransactionState`.

  **Bounded Contexts:**
  `src/Domain/` is partitioned by domain context: `User`, `Wallet`, `Transaction`,
  `Payment`, `Money`, `Security`. Each owns its models, events, exceptions, and
  repository interfaces.

  **Domain Events raised from Aggregates:**
  `User.create()` calls `$this->raise(new UserWasCreated(...))`.
  `AbstractTransaction` calls `$this->raise(new TransactionWasCreated(...))`.
  The `AggregateRoot` base class delegates through a static `EventPublisher`
  singleton.

  **Repository Interfaces in Domain:**
  `UserRepositoryInterface`, `WalletRepositoryInterface`,
  `TransactionRepositoryInterface` are defined inside `src/Domain/`, enforcing
  that the domain dictates its persistence contract.

  **Application Use Cases as Handlers:**
  `src/Application/UseCase/` contains plain handler classes (e.g.
  `RegisterUserHandler`, `CreateDepositHandler`) that orchestrate domain objects.

  README self-identifies: "Wallet API in Symfony following DDD" and
  "Code structured in layers as appears in DDD in php book."

  ## Secondary Style: Hexagonal Architecture (Ports and Adapters)

  **Ports (Domain interfaces):**
  `UserRepositoryInterface`, `WalletRepositoryInterface`,
  `TransactionRepositoryInterface`, `UserFactoryInterface`,
  `EventDispatcherInterface` — all defined in `src/Domain/`.

  **Adapters (Infrastructure implementations):**
  `UserRepository`, `WalletRepository`, `TransactionRepository` in
  `src/Infrastructure/*/Repository/` implement the domain interfaces.
  `UserFactory` implements `UserFactoryInterface`.
  `EventDispatcher` implements `EventDispatcherInterface`.

  **Dependency inversion enforced:** `RegisterUserHandler` accepts
  `UserRepositoryInterface` and `UserFactoryInterface` by constructor injection,
  never referencing concrete infrastructure.

  **UI Adapter:** `src/UI/RestBundle/` acts as an inbound adapter exposing the
  domain via REST (FOSRestBundle), delegating to the Command Bus.

  **Technology isolation:** Infrastructure bundles (`UserBundle`, `WalletBundle`,
  etc.) isolate Doctrine ORM, RabbitMQ, and Elasticsearch from the domain core.

  ## Supporting Style: Layered Architecture

  Four horizontal layers enforced by directory structure:
  - UI (`src/UI/RestBundle/`) — REST controllers, routing, HTTP concerns
  - Application (`src/Application/UseCase/`) — use case orchestration, DTOs
  - Domain (`src/Domain/`) — business logic, Aggregates, Value Objects, Domain Events
  - Infrastructure (`src/Infrastructure/`) — Doctrine ORM, RabbitMQ, Elasticsearch adapters

  Dependency direction flows strictly inward.

  ## Supplementary: Event Pipeline

  A Command Bus (Tactician) pipeline adds event-driven behaviour post-command:
  - `EventPublisherMiddleware` publishes serialized domain events to RabbitMQ
    topic exchange after command handling.
  - RabbitMQ routes `UserWasCreated` to a `user` queue, `TransactionWasCreated`
    to a `transactions` queue, and all events (`#`) to an `elastic` queue.
  - `AsyncElasticEventStore` (RabbitMQ consumer) writes events to Elasticsearch
    for audit/query via Kibana.
  This is DDD domain event usage within the layered architecture, not a
  standalone Event-Driven Architecture.

  ## What This Is Not

  - **Not Microservices:** Single `AppKernel.php`, single docker-compose application
    container (fpm + nginx), no independent service deployments.
  - **Not CQRS (full):** Separate command/query buses exist but no separate read
    models or projections — same Doctrine ORM entities serve both paths.
  - **Not Event Sourcing:** Elasticsearch event store is append-only audit log;
    primary state lives in MySQL and is not derived from event replay.
  - **Not Modular Monolith:** Organization is horizontal (by layer), not vertical
    (by feature module). Domain contexts cross-depend within `src/Domain/`.
