one_line_summary: "A Laravel-based small-business accounting platform organized as a Microkernel with a first-class App Store plugin system that enables modules to be installed and toggled per-tenant at runtime."
classification_reasoning: "Akaunting exhibits a three-style composition: Microkernel as primary, Modular Monolith and Layered as secondary.\n\nMICROKERNEL (primary, 0.90): The dominant architectural characteristic is a first-class plugin system built on akaunting/laravel-module. App\\Utilities\\ModuleActivator implements ActivatorInterface to enable/disable modules per company at runtime — state persisted in DB and cached per tenant. The public App Store (akaunting.com/apps) allows third-party modules to be installed into modules/ via Composer at runtime. Abstract extension points are formalized in app/Abstracts/ (Model, Job, Event, Widget, Report, BulkAction, Export, Import, Notification, Observer) and hooks are exposed via events: PaymentMethodShowing, Menu\\AdminCreated, Menu\\PortalCreated, Report\\FilterShowing, Report\\RowsShowing. Route macros (Route::admin(), Route::portal(), Route::api(), Route::module()) give modules a standard integration path. Full module lifecycle events (Installing, Installed, Enabling, Enabled, Disabling, Disabled, Uninstalling, Uninstalled) are wired in app/Events/Module/ and app/Listeners/Module/.\n\nMODULAR MONOLITH (secondary, 0.85): Single deployable PHP process, single shared database. PSR-4 exposes Modules\\ alongside App\\ in the same composer.json. All modules share one Eloquent ORM with a unified schema and global Company scope for multi-tenancy. Two bundled modules (OfflinePayments, PaypalStandard) are installed into modules/ via installer-paths — the same mechanism used by third-party modules from the App Store.\n\nLAYERED (secondary, 0.80): Laravel MVC provides strict horizontal layering beneath the plugin system. HTTP layer (Controllers, Form Requests, API Resources), application layer (Jobs as command objects), data layer (Eloquent Active Record with global query scopes). The distinction from pure Layered is that the plugin system cuts vertically across all layers per module.\n\nRULED OUT - Microservices: Single deployable application. Modules share one database and one Composer manifest. No inter-service communication, no independent deployability per module.\n\nRULED OUT - Event-Driven (primary): 157 events and 69 listeners exist, but they are synchronous Laravel events used as extension hooks within the plugin system — not message-broker events decoupling separate services. No queue-backed inter-component communication as the primary integration mechanism.\n\nRULED OUT - Hexagonal/DDD: Controllers directly use Eloquent models (Active Record); no ports/adapters pattern, no bounded contexts with separate ubiquitous languages, no aggregate roots or value objects in the DDD sense.\n\nQUALITY ATTRIBUTES evidence: Extensibility — runtime module install/uninstall via App Store; abstract extension contracts in Abstracts/; event hooks for payments/menus/reports. Multi-tenancy — global Company scope on all Eloquent queries; ModuleActivator tracks per-company module state; {company_id} URL prefix on all scoped routes. Maintainability — PSR-4 module namespace isolation; abstract base classes enforce consistent patterns; stubs in config/module.php generate correct structure for new modules. Evolvability — 30+ versioned update listeners in app/Listeners/Update/ handling DB migrations across releases; modules upgradeable independently via Composer. Security — Laravel Sanctum API token auth; laratrust RBAC; akaunting/laravel-firewall IP filtering; rate limiters for API/email/import. Observability — Bugsnag and Sentry APM integrations; Laravel Debugbar (dev); model-level caching with explicit cache flushing on module state changes."
