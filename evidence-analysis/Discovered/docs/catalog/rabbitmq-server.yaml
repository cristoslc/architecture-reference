review_notes: 'The RabbitMQ Server repository is a classic exemplar of the **Microkernel
  (Plugin)** architecture style, implemented via a **Modular Monolith** build and
  deployment pattern.


  ### 1. Primary Style: Microkernel (Plugin)

  The core system (the "Microkernel") provides the essential broker services (queueing,
  exchange logic, and nodal distribution), while virtually all extended functionality—including
  different messaging protocols (MQTT, STOMP, AMQP 1.0), authentication backends,
  and management interfaces—is implemented as pluggable modules.


  **Evidence:**

  - **Plugin Infrastructure:** The `Makefile` explicitly manages a list of plugins
  (`include plugins.mk`) and provides variables for `ADDITIONAL_PLUGINS` and `COMMUNITY_PLUGINS`.

  - **Dynamic Loading:** The `enabled_plugins` file (found in several test directories)
  demonstrates how the system''s capabilities are composed at runtime. The contents
  show that core protocols like `rabbitmq_mqtt`, `rabbitmq_stomp`, and `rabbitmq_amqp1_0`
  are treated as plugins rather than hard-coded features.

  - **Contract-Based Extension:** The repository structure relies on Erlang applications
  as the unit of extension. Each plugin is an independent Erlang application that
  adheres to specific behaviors (e.g., `rabbit_auth_backend` behavior) expected by
  the core broker.'
