review_notes: 'README explicitly describes RabbitMQ as a multi-protocol messaging
  and streaming broker supporting AMQP, MQTT, STOMP, and RabbitMQ Streams. Core rabbit
  app (deps/rabbit/src/, 235 files) implements exchange types (direct, fanout, topic,
  headers) for message routing, queue types (classic, quorum, stream), channels, and
  bindings -- all fundamental event-driven messaging primitives. The 57-module deps/
  directory organizes the system as a modular monolith: protocol adapters (rabbitmq_mqtt,
  rabbitmq_stomp, rabbitmq_amqp1_0, rabbitmq_stream), auth backends (ldap, oauth2,
  http, cache), management/monitoring (rabbitmq_management, rabbitmq_prometheus),
  federation, and shovel -- all deployed as plugins within a single Erlang/OTP node.
  Boot steps in rabbit.erl define ordered startup phases (pre_boot -> database ->
  external_infrastructure -> kernel_ready -> core_initialized) with explicit dependency
  declarations. Event-Driven is primary: this IS a message broker; its entire purpose
  is event/message routing. Modular Monolith is secondary: the plugin architecture
  with well-defined boundaries between deps/ modules, each with own Makefile and src/,
  represents a monolith with strong internal modularity.'
