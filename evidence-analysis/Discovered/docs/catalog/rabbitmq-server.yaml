review_notes: 'Evidence: domain is ''Messaging'' - this is RabbitMQ server, the message
  broker infrastructure itself. Signal breakdown shows 14 package_manifests (multiple
  components), 9 container_orchestration, 9 infrastructure_as_code, 17 ci_cd. The
  heuristic candidates were Microservices (0.5) and Event-Driven (0.3). However, this
  is the broker software, not a consumer application. The Event-Driven classification
  applies because RabbitMQ IS an event/message broker - that''s its core purpose.
  The multi-language support (JS, Python, .NET, Java/Maven) suggests multiple client
  libraries and server components, pointing to a Modular Monolith structure. Not true
  microservices as this is the infrastructure itself, not a system built ON RabbitMQ.'
