classification_reasoning: "## Architecture Classification: rabbitmq-server\n\n###
  Primary Style: Microkernel (0.95)\n\nThe RabbitMQ broker is built around a minimal
  kernel (`deps/rabbit/`, `deps/rabbit_common/`) that is extended at runtime by ~57
  independent Erlang/OTP applications.\n\n**Plugin Registry** (`deps/rabbit_common/src/rabbit_registry.erl`)
  is a `gen_server` backed by ETS. Plugins call `rabbit_registry:register(Class, TypeName,
  ModuleName)` to make themselves discoverable; the kernel resolves implementations
  via `rabbit_registry:lookup_module/2`. No compile-time enumeration of plugins occurs.\n\n**Boot
  Step DAG** (`deps/rabbit/src/rabbit_boot_steps.erl`, `deps/rabbit/src/rabbit.erl`)
  uses `-rabbit_boot_step` module attributes. Steps form a `requires`/`enables` directed
  acyclic graph. The kernel collects steps from all loaded OTP applications, topologically
  sorts them, and executes in order. Plugins participate simply by declaring steps.\n\n**Behaviour-Based
  Extension Points** define every major axis of extensibility:\n- `rabbit_exchange_type`:
  kernel provides `direct`, `fanout`, `topic`, `headers`; plugins add `consistent_hash`,
  `random`, `recent_history`, `jms_topic`\n- `rabbit_queue_type`: `rabbit_classic_queue`,
  `rabbit_quorum_queue`, `rabbit_stream_queue` all implement this behaviour and register
  via boot steps\n- `rabbit_backing_queue`: storage backends (`rabbit_variable_queue`,
  `rabbit_priority_queue`)\n- `rabbit_authn_backend` / `rabbit_authz_backend`: `internal`,
  `http`, `ldap`, `oauth2`, `cache` implementations — each a separate OTP app\n-
  `rabbit_peer_discovery_backend`: k8s, consul, etcd, aws, DNS backends\n- `rabbit_mgmt_extension`:
  per-protocol management UI/API extensions\n\n**Dynamic Plugin Lifecycle** (`deps/rabbit/src/rabbit_plugins.erl`)
  enables/disables OTP applications at runtime via `rabbit:start_apps/stop_apps` and
  broadcasts `plugins_changed` events via `rabbit_event:sync_notify/2`. No broker
  restart is needed to change plugin configuration.\n\n**Feature Flags Framework**
  (`deps/rabbit/src/rabbit_feature_flags.erl`) uses `-rabbit_feature_flag()` module
  attributes cluster-wide to gate capabilities, enabling safe rolling upgrades across
  mixed-version clusters.\n\nThe full plugin set (57 OTP apps in `deps/`) covers:
  protocol adapters (MQTT, STOMP, AMQP 1.0, Stream, WebSocket variants), auth backends,
  exchange types, management HTTP API + UI, Prometheus metrics, federation, shovel,
  peer discovery, tracing, and more.\n\n### Secondary Style: Modular Monolith (0.88)\n\nAll
  57 plugin applications compile into and run within a single Erlang/OTP release artifact
  built by `erlang.mk` / `plugins.mk`. There are no network boundaries between components;
  plugin-to-kernel calls are in-process OTP message passing. The `deps/` directory
  structure enforces structural separation (each app has `src/`, `include/`, `test/`),
  but deployment is a single `rabbitmq-server` release. This satisfies the Modular
  Monolith definition: a single deployment unit with well-defined internal module
  boundaries.\n\n### Notable Internal Mechanisms (not topology-defining)\n\n**OTP
  Actor Model:** `rabbit_reader` (connection), `rabbit_channel` (channel), `rabbit_amqqueue_process`
  (classic queue), and `rabbit_vhost_sup` (vhost) each run as isolated Erlang processes
  under layered OTP supervision trees. Fault isolation is structural.\n\n**Internal
  Event Bus:** `rabbit_event` uses `gen_event` for internal pub/sub instrumentation.
  Stats emitters call `rabbit_event:notify/2`; management agents and tracing subscribe.
  This is a decoupling mechanism within the kernel, not an Event-Driven topology.\n\n**Raft
  Replication:** Quorum queues use the `ra` library (`rabbit_fifo.erl` implements
  `ra_machine`). Stream queues use Osiris. Both registered as `rabbit_queue_type`
  plugins.\n\n**Khepri Metadata Store:** `rabbit_khepri.erl` wraps Khepri (Raft-based
  tree) as a migration path from Mnesia. The `khepri_db` feature flag gates the transition.
  `rabbit_db*.erl` modules provide a facade over both backends.\n\n### Why Not Other
  Styles\n\n**Not Microservices:** Single Erlang VM; no independently deployable services
  with network boundaries.\n\n**Not Event-Driven (primary):** `rabbit_event` is internal
  instrumentation, not the topology-defining communication model. The broker IS the
  event infrastructure for external systems.\n\n**Not Layered (primary):** The dependency
  direction (`rabbit_common` \u2192 `rabbit` \u2192 plugins) exists but the defining
  characteristic is the runtime plugin registry, not horizontal layer contracts.\n\n**Not
  Pipeline:** The reader\u2192channel\u2192exchange\u2192queue routing path resembles
  a pipeline but is driven by runtime binding table lookups, not composable pipe/filter
  stages."
review_notes: "RabbitMQ is the canonical Erlang/OTP Microkernel. The rabbit_registry\
  \ gen_server, -rabbit_boot_step DAG, and ~57 behaviour-implementing OTP plugin applications\
  \ are textbook microkernel evidence. The prior entry incorrectly listed language as\
  \ JavaScript -- corrected to Erlang. Secondary Modular Monolith style reflects that\
  \ all plugins ship and run in a single BEAM release artifact."
