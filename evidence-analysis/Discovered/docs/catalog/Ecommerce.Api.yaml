review_notes: '### Architectural Analysis


  The repository is a classic example of a **CQRS (Command Query Responsibility Segregation)**
  architecture implemented within a .NET environment. The README explicitly identifies
  the use of CQRS and MediatR, and the directory structure reinforces this through
  a strict separation of read and write concerns at the infrastructure level.


  #### Evidence of CQRS:

  - **Separation of Models:** Under `src/Streetwood.Infrastructure`, there are distinct
  directories for `Commands` and `Queries`.

  - **Handler Pattern:** The presence of `Commands/Handlers` and `Queries/Handlers`
  indicates the use of the Mediator pattern (via MediatR) to decouple the entry points
  (API Controllers) from the execution logic.

  - **DTOs vs Domain:** A large collection of DTOs in `src/Streetwood.Infrastructure/Dto`
  is used for queries, while the `src/Streetwood.Core/Domain` contains the entities
  used for command-side persistence and state transitions.


  #### Evidence of Layered/Hexagonal influence:'
