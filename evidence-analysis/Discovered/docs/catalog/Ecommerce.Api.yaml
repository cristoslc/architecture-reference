review_notes: "CQRS: Explicit Commands/ and Queries/ directories under src/Streetwood.Infrastructure/ with separate Models and Handlers (e.g. Commands/Handlers/Order/CreateOrderCommandHandler.cs, Queries/Handlers/Order/GetFilteredOrdersQueryHandler.cs); MediatR IRequestHandler used for all dispatching via src/Streetwood.API/Bus/MediatorBus.cs; Services split into Abstract/Commands/ and Abstract/Queries/ interfaces. Layered: Three-project dependency chain API->Infrastructure->Core (src/Streetwood.API.csproj refs Infrastructure, Infrastructure.csproj refs Core); API has Controllers/, Middleware/, Filters/; Infrastructure has Services/, Mappers/, Factories/; Core has Domain/Entities, Domain/Abstract/Repositories. DDD: Rich domain entities with protected setters and behavior methods (e.g. src/Streetwood.Core/Domain/Entities/Order.cs with Close(), SetShipment(); Product.cs with SetPrice(), AddImage()); abstract Entity base class with Guid Id; repository interfaces in Core/Domain/Abstract/Repositories/; factory pattern (IOrderFactory). README explicitly states 'CQRS (one database)' and 'Smart domain objects (DDD)'. Single shared database via IDbContext - no read/write separation."