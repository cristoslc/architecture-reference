quality_attributes:
  Modularity: Autofac DI modules (RepositoriesModule, ServicesModule, FactoriesModule, HelpersModule, MediaTrModule, MapperModule) partition all registrations; automated convention tests assert every service class is internal and implements an interface.
  Evolvability: Interface-per-service convention enforced by xUnit convention tests; strict downward-only layer dependencies prevent cross-cutting coupling; code analysis rulesets (StyleCop + FxCop) on every project.
  Observability: Serilog integrated at host level with log-level differentiation (Warning for client errors, Error for server faults) in ExceptionHandlerMiddleware; structured error messages serialised to JSON HTTP responses.
  Fault Tolerance: Unhandled exceptions are written to Azure Storage Queue (AzureStorageQueueManager); a separate Azure Functions app (ExceptionQueueFunction) consumes the queue and sends alert emails, decoupling failure alerting from the request path.
  Deployability: Azure Pipelines CI pipeline performs dotnet build, dotnet test, and dotnet publish for every push to master/develop; Streetwood.Functions targets Azure Functions v2 as an independently deployable unit.
  Scalability: In-process memory cache (AddMemoryCache) reduces repeated DB queries; README acknowledges shared single SQL Server as the current scale ceiling ("one database").
one_line_summary: ASP.NET Core 2.2 e-commerce API using strict three-layer architecture (API / Infrastructure / Core) with MediatR-based CQRS and DDD-lite rich domain entities, complemented by an Azure Functions sidecar for async exception alerting.
classification_reasoning: |
  ## Architecture Classification: Ecommerce.Api (Streetwood)

  ### Primary Style: Layered Architecture

  The solution divides all code into three compile-time layers with enforced downward-only dependency:
  - **Streetwood.API** (presentation): controllers, view models, middleware, filters, Swagger, bus abstraction.
  - **Streetwood.Infrastructure** (application): command/query handlers and models, services, DTOs, mappers, managers, factories.
  - **Streetwood.Core** (domain): entities, repository interfaces, EF Core DbContext, enums, migrations, settings.

  Project-reference evidence is conclusive: `Streetwood.API.csproj` references only `Streetwood.Infrastructure`; `Streetwood.Infrastructure.csproj` references only `Streetwood.Core`. No skip-layer dependencies exist.

  ### Secondary Style: CQRS

  The README explicitly declares "CQRS (one database :))". The Infrastructure project contains two physically separate sub-trees:
  - `Commands/Models/` + `Commands/Handlers/` — write operations, handlers return scalar results or mutate state.
  - `Queries/Models/` + `Queries/Handlers/` — read operations, handlers return DTOs.

  MediatR is the in-process message bus. Controllers never call services directly; they dispatch via `IBus.SendAsync()` (a thin `MediatorBus` wrapper). Service interfaces are also split: `IOrderCommandService` vs `IOrderQueryService`. Because both reads and writes share the same SQL Server database, this is single-database CQRS, not event-sourced.

  ### Tertiary Style: Domain-Driven Design (lite)

  The README states "Smart domain objects (DDD)". Evidence in `Streetwood.Core/Domain/Entities/`:
  - Rich entities with protected setters and domain-verb methods (`Order.Close()`, `Order.SetShipment()`, `User.SetPassword()`, `User.SetRefreshToken()`).
  - Encapsulated collections exposed only as `IReadOnlyCollection<T>`.
  - Base `Entity` class providing `Guid Id`.
  - Repository interfaces defined inside the domain layer and implemented in Core (not Infrastructure), keeping the domain agnostic of EF Core details at the interface level.

  What is absent prevents full DDD classification: no explicit Aggregate Root markers, no Bounded Contexts, no Value Objects, a single shared `StreetwoodContext` spanning all 17 entity types, and no domain events.

  ### Deployment Topology

  The main API is a traditional monolithic ASP.NET Core web app deployed as a single unit. A companion `Streetwood.Functions` project (Azure Functions v2) handles two async background tasks: a timer-triggered keep-alive HTTP ping and a queue-triggered exception-email relay. The two deployable units communicate via Azure Storage Queue — exceptions are enqueued by the API's `ExceptionHandlerMiddleware` and dequeued by `ExceptionQueueFunction`. Azure Blob Storage backs image file management. No Docker, Kubernetes, or service-mesh configuration is present.

  ### What This Is NOT

  - **Not Microservices / Service-Based**: Single ASP.NET Core process, single SQL Server, one solution.
  - **Not Hexagonal Architecture**: Core layer contains EF Core `DbContext` and Migrations; no explicit Ports/Adapters boundary exists.
  - **Not Event-Driven**: The Azure Queue usage is a narrow operational channel for error alerting, not a domain event bus.
  - **Not Serverless (primary)**: The main workload is a long-running web server; Functions is a sidecar.

  ### Confidence Rationale

  Confidence 0.92. The Layered + CQRS combination is unambiguous — confirmed by project structure, .csproj references, README, and code inspection. DDD-lite is added at tertiary level because the rich-entity evidence is clear but incomplete (no BCs, no value objects). The 0.08 uncertainty reflects the absence of explicit Aggregate Root declarations and the fact that Core also hosts EF infrastructure code.
