classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Style: Layered Architecture\n\nThe repository exhibits a classic **Layered Architecture**\
  \ with three well-defined horizontal layers:\n\n1. **Presentation Layer (`Streetwood.API`)**:\
  \ Controllers, view models, middleware, filters, and API configuration\n2. **Application/Data\
  \ Access Layer (`Streetwood.Infrastructure`)**: Command/query handlers, services,\
  \ DTOs, mappers, and infrastructure concerns\n3. **Domain/Core Layer (`Streetwood.Core`)**:\
  \ Domain entities, repository interfaces, database context, migrations, and domain\
  \ abstractions\n\n**Evidence of strict layering:**\n- Dependencies flow downward\
  \ only: `Streetwood.API` → `Streetwood.Infrastructure` → `Streetwood.Core` (verified\
  \ in `.csproj` files)\n- Each layer has distinct responsibilities without cross-cutting\
  \ concerns\n- `Streetwood.API.csproj` only references `Streetwood.Infrastructure`,\
  \ not Core directly\n- `Streetwood.Infrastructure.csproj` references `Streetwood.Core`\
  \ for domain abstractions\n\n### Secondary Style: CQRS\n\nThe codebase implements\
  \ **CQRS (Command Query Responsibility Segregation)** using MediatR:\n\n**Evidence:**\n\
  - README explicitly states: \"CQRS (one database :)\"\n- Clear directory separation\
  \ under `src/Streetwood.Infrastructure/`:\n  - `Commands/Handlers/` and `Commands/Models/`\
  \ for write operations\n  - `Queries/Handlers/` and `Queries/Models/` for read operations\n\
  - Command handlers implement `IRequestHandler<CreateOrderCommandModel, int>` (returns\
  \ command result)\n- Query handlers implement `IRequestHandler<GetOrderQueryModel,\
  \ OrderDto>` (returns DTOs)\n- Separate service interfaces: `ICharmCommandService`\
  \ vs `ICharmQueryService`\n- Controllers dispatch via `IBus.SendAsync()` abstraction\
  \ over MediatR (see `OrdersController.cs`)\n\n### DDD Lite Elements (Not Primary)\n\
  \nThe README mentions \"Smart Domain objects (DDD)\" and there are DDD-influenced\
  \ patterns:\n- Rich entities with behavior methods (`Order.cs`, `Product.cs`, `User.cs`)\n\
  - Protected setters with domain methods like `SetName()`, `SetPrice()`, `Close()`\n\
  - Encapsulated collections with `IReadOnlyCollection`\n- Entity base class (`Streetwood.Core/Domain/Abstract/Entity.cs`)\n\
  \nHowever, it lacks full DDD tactical patterns:\n- No explicit Aggregate Root markers\n\
  - No Bounded Contexts\n- Single shared database context for all entities\n- No value\
  \ objects identified\n\n### What This Is NOT\n\n- **NOT Microservices**: Single\
  \ deployable ASP.NET Core application, single database, one solution\n- **NOT Serverless\
  \ (primary)**: Main API is a traditional web app; `Streetwood.Functions` is a secondary\
  \ Azure Functions project for background email processing\n- **NOT Hexagonal Architecture**:\
  \ No explicit ports/adapters pattern; Core layer contains EF Core DbContext, not\
  \ pure domain isolation\n\n### Deployment Topology\n\nSingle monolithic web application\
  \ with:\n- Main API project (`Streetwood.API`)\n- Auxiliary Azure Functions project\
  \ (`Streetwood.Functions`) for queue-triggered exception email handling\n- Shared\
  \ database accessed by the main API\n\n### Architectural Enforcement\n\n- Code analysis\
  \ ruleset (`streetwood.ruleset`) with StyleCop and FxCop analyzers\n- Convention\
  \ tests ensuring services are internal and implement interfaces (see `Streetwood.Convention.Tests`)\n\
  - Clear module separation via Autofac DI modules (`RepositoriesModule`, `MediaTrModule`,\
  \ etc.)"
