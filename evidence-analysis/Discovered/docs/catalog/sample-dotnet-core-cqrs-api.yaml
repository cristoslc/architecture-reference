classification_reasoning: "## Analysis\n\nThis repository implements a **CQRS (Command\
  \ Query Responsibility Segregation)** architecture with **Domain-Driven Design**\
  \ as a strong secondary style, built on Clean Architecture principles.\n\n### Primary\
  \ Style: CQRS\n\nThe defining architectural characteristic is the clear separation\
  \ between read and write models:\n\n**Write Model (Commands):**\n- Commands implement\
  \ `ICommand`/`ICommandHandler<T>` interfaces using MediatR (`src/SampleProject.Application/Configuration/Commands/ICommand.cs`)\n\
  - Uses Entity Framework Core with domain aggregates (`RegisterCustomerCommandHandler`\
  \ at `src/SampleProject.Application/Customers/RegisterCustomer/RegisterCustomerCommandHandler.cs`)\n\
  - Domain-driven write side with business rule validation\n\n**Read Model (Queries):**\n\
  - Queries implement `IQuery<TResult>`/`IQueryHandler<T>` interfaces (`src/SampleProject.Application/Configuration/Queries/IQuery.cs`)\n\
  - Uses raw SQL with Dapper against database views (`GetCustomerDetailsQueryHandler`\
  \ at `src/SampleProject.Application/Customers/GetCustomerDetails/GetCustomerDetailsQueryHandler.cs`):\n\
  \  ```csharp\n  const string sql = \"SELECT [Customer].[Id], [Customer].[Name]...\"\
  \n  var connection = _sqlConnectionFactory.GetOpenConnection();\n  return connection.QuerySingleAsync<CustomerDetailsDto>(sql,\
  \ ...);\n  ```\n- Separate DTOs for read projections (`CustomerDto`, `OrderDetailsDto`)\n\
  \nThe README explicitly confirms: *\"Read Model - executing raw SQL scripts on database\
  \ views objects (using Dapper). Write Model - Domain Driven Design approach (using\
  \ Entity Framework Core).\"*\n\n### Secondary Style: Domain-Driven Design\n\nStrong\
  \ DDD tactical patterns throughout the domain layer (`src/SampleProject.Domain/`):\n\
  \n**Aggregate Roots with encapsulated business logic:**\n- `Customer` aggregate\
  \ (`src/SampleProject.Domain/Customers/Customer.cs`) implements `IAggregateRoot`\n\
  - Factory methods: `Customer.CreateRegistered()`, internal constructors\n- Business\
  \ rules enforced via `CheckRule()` method:\n  ```csharp\n  CheckRule(new CustomerCannotOrderMoreThan2OrdersOnTheSameDayRule(_orders));\n\
  \  ```\n\n**DDD Building Blocks in SeedWork:**\n- `Entity` base class with domain\
  \ events (`src/SampleProject.Domain/SeedWork/Entity.cs`)\n- `ValueObject` base class\
  \ (`src/SampleProject.Domain/SeedWork/ValueObject.cs`)\n- `IAggregateRoot` marker\
  \ interface\n- `IBusinessRule` interface with concrete implementations\n\n**Domain\
  \ Events:**\n- Events like `OrderPlacedEvent`, `CustomerRegisteredEvent` raised\
  \ within aggregates\n- Domain event handlers for cross-aggregate coordination (`OrderPlacedDomainEventHandler`\
  \ creates `Payment` entity)\n\n### Hexagonal Architecture Foundation\n\nClean Architecture\
  \ implementation with dependency inversion:\n- **Domain** → No external dependencies\
  \ (only MediatR for events)\n- **Application** → Depends only on Domain\n- **Infrastructure**\
  \ → Implements interfaces (Repositories, EmailSender, etc.)\n- **API** → Presentation\
  \ layer, wires everything via Composition Root\n\nProject references confirm dependency\
  \ flow:\n```\nAPI → Infrastructure → Application → Domain\n```\n\n### What This\
  \ Is NOT\n\n- **NOT Microservices**: Single deployable unit (one API project, one\
  \ database)\n- **NOT Event-Driven Architecture**: Domain events are internal implementation\
  \ details processed synchronously within the monolith. No message broker, no async\
  \ cross-service event communication.\n- **NOT Modular Monolith**: No explicit bounded\
  \ context module boundaries—just layer separation\n- **NOT traditional Layered**:\
  \ The primary architectural driver is CQRS/DDD, not horizontal layering\n\n### Additional\
  \ Patterns Observed\n\n- **Outbox Pattern**: `OutboxMessage` storage with Quartz.NET\
  \ processing for reliable event delivery (`src/SampleProject.Infrastructure/Processing/Outbox/`)\n\
  - **Cache-Aside**: In-memory caching implementation (`src/SampleProject.Infrastructure/Caching/`)"
