one_line_summary: A .NET Core REST API demonstrating simple CQRS with a Dapper read
  model and EF Core write model, backed by a rich DDD aggregate layer and clean hexagonal
  project boundaries.
review_notes: Write path uses EF Core + domain aggregates; read path uses raw Dapper
  SQL against database views — two completely separate code paths sharing one database.
  Domain layer raises domain events (OrderPlacedEvent, CustomerRegisteredEvent) dispatched
  in-process by DomainEventsDispatcher. Outbox pattern via Quartz.NET provides durable
  at-least-once delivery for integration notifications. Internal command queue supports
  durable async scheduling. Four Autofac modules wire infrastructure adapters to domain/application
  port interfaces.
