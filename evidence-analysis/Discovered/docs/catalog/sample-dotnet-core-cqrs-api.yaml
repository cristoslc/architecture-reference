review_notes: 'README explicitly states ''CQRS implementation with raw SQL and DDD
  using Clean Architecture''. ICommand/IQuery separation in Application/Configuration/.
  Read model uses Dapper with raw SQL on DB views (GetCustomerOrderDetailsQueryHandler).
  Write model uses EF Core with rich domain entities (Customer aggregate root). DDD
  tactical patterns: Entity base with domain events, IAggregateRoot marker, TypedIdValueBase
  for strongly-typed IDs, IBusinessRule objects (CustomerCannotOrderMoreThan2OrdersOnTheSameDayRule),
  ValueObject base class, Repository interfaces in Domain layer. Outbox pattern for
  reliable event processing. Clean Architecture 4-layer structure: Domain, Application,
  Infrastructure, API.'
