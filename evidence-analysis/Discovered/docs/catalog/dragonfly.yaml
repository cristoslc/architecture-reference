review_notes: "SPACE-BASED: Shared-nothing architecture with data partitioned into N shards, each owned by a single thread (src/server/engine_shard.h: EngineShard with thread-local shard_, TxQueue, IntentLock). EngineShardSet (src/server/engine_shard_set.h) manages shard-per-proactor mapping. Key-to-shard routing via consistent hashing in src/server/sharding.cc (XXH64 hash % shard_num). In-memory Dash hashtable (src/core/dash.h, src/core/dash_internal.h) based on 'Dash: Scalable Hashing on Persistent Memory' paper. DbSlice (src/server/db_slice.h) manages per-shard database state. TieredStorage (src/server/tiered_storage.h) offloads cold data to disk per-shard. docs/df-share-nothing.md explicitly describes the shared-nothing, thread-per-core model. EVENT-DRIVEN: Fiber-based async I/O via helio library (helio/ submodule). Connection fibers act as coordinators dispatching to shard threads via message passing (docs/df-share-nothing.md, docs/transaction.md). PubSub via RCU-based ChannelStore (src/server/channel_store.h). Journal/replication streaming (src/server/journal/). Redis Streams support (src/server/stream_family.cc). VLL-based transaction scheduling with TxQueue (src/core/tx_queue.h) provides lock-free coordination. ProactorPool manages event loops with io_uring/epoll backends."