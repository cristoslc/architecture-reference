classification_reasoning: "## Analysis\n\nDragonfly is a **Modular Monolith** with\
  \ clearly enforced internal module boundaries, designed for vertical scaling on\
  \ a single instance.\n\n### Key Evidence for Modular Monolith\n\n**1. Single Deployable\
  \ Unit**\n- One executable (`dragonfly`) built from `src/server/CMakeLists.txt`:\n\
  \  ```cmake\n  add_executable(dragonfly dfly_main.cc version_monitor.cc)\n  cxx_link(dragonfly\
  \ base dragonfly_lib)\n  ```\n\n**2. Enforced Module Boundaries via CMake Targets**\n\
  The codebase is structured as separate CMake libraries with explicit dependency\
  \ hierarchies:\n- `dfly_facade` - Connection handling, protocol parsing (Redis/Memcache)\n\
  - `dfly_core` - Data structures (Dashtable, compact objects, interpreters)\n- `dfly_transaction`\
  \ - Transaction framework, db_slice, blocking controller\n- `dragonfly_lib` - Main\
  \ server logic, command families\n\nThe `src/facade/README.md` explicitly states\
  \ the boundary enforcement:\n> \"It should be separated from the rest of dragonfly\
  \ server logic and should be self-contained, i.e no redis-lib or server dependencies\
  \ are allowed.\"\n\n**3. Internal Sharding with Shared-Nothing Threading**\nFrom\
  \ `docs/df-share-nothing.md`:\n> \"The DF in-memory database is sharded into N parts,\
  \ where N is less or equal to the number of threads in the system. Each database\
  \ shard is owned and accessed by a single thread.\"\n\nAnd critically:\n> \"Inter-thread\
  \ interactions in Dragonfly occur only via passing messages from thread to thread.\"\
  \n\nThis is enforced through:\n- `EngineShardSet` (`src/server/engine_shard_set.h`)\
  \ - manages shard collection with message-passing APIs like `Await()`, `Add()`,\
  \ `RunBriefInParallel()`\n- `EngineShard` (`src/server/engine_shard.h`) - per-thread\
  \ shard with own `DbSlice`, `TxQueue`, `TaskQueue`\n- Each shard owns its data exclusively—no\
  \ mutex locks protecting shared data structures\n\n**4. Layered Organization**\n\
  ```\nsrc/\n├── facade/     # Protocol handling (Redis/Memcache parsers, connections)\n\
  ├── core/       # Data structures (dash tables, compact objects, JSON)\n├── server/\
  \     # Business logic (command families, transactions, replication)\n└── redis/\
  \      # Redis compatibility layer\n```\n\n### What This Is NOT\n\n**NOT Microservices**\
  \ - Single process, single executable. No independent deployment units. Designed\
  \ explicitly for vertical scaling within one instance.\n\n**NOT Event-Driven** -\
  \ While inter-thread communication uses message passing, there is no message broker.\
  \ Commands are synchronously dispatched to appropriate shards based on key hashing,\
  \ not published as events.\n\n**NOT Space-Based** - Despite the in-memory nature,\
  \ Space-Based architecture specifically refers to distributed systems with in-memory\
  \ data grids across multiple nodes. Dragonfly is a single-process, multi-threaded\
  \ system.\n\n**NOT Hexagonal** - No ports-and-adapters pattern. The `facade` layer\
  \ handles protocol compatibility but isn't an adapter pattern in the hexagonal sense.\n\
  \n### Architectural Highlights\n\nThe architecture is specifically optimized for\
  \ vertical scaling:\n- Thread-per-core design where each thread handles both I/O\
  \ and shard ownership\n- Fiber-based concurrency (Boost.Fibers) for non-blocking\
  \ operations within each thread\n- Dashtable data structure for memory-efficient\
  \ concurrent access\n- Coordinator pattern in `Transaction` class for multi-key\
  \ operations across shards\n\nThis is a textbook example of a **Modular Monolith**:\
  \ a single deployable with well-defined internal module boundaries, clear separation\
  \ of concerns, and enforced dependencies between components."
