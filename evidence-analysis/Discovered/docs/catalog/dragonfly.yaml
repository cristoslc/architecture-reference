review_notes: "Dragonfly is structured as a high-performance **Domain-Driven Design\
  \ (DDD)** system that leverages a **shared-nothing architecture**. The codebase\
  \ is explicitly partitioned into bounded contexts that separate the technical \"\
  facade\" (protocol handling) from the \"server\" (domain logic and coordination)\
  \ and the \"core\" (high-performance primitives).\n\n### 1. Primary Style: Domain-Driven\
  \ Design (DDD)\nThe repository is organized around the domain of \"In-Memory Data\
  \ Storage.\" The `src/server` directory acts as the core domain layer, where business\
  \ logic is split into \"Families\" (e.g., `src/server/set_family.cc`, `src/server/json_family.cc`,\
  \ `src/server/hset_family.cc`). \n- **Bounded Contexts:** Each \"Family\" represents\
  \ a Redis-compatible data type context.\n- **Engine/Sharding:** The system uses\
  \ a \"shared-nothing\" approach where the domain is partitioned into shards (`src/server/engine_shard.h`,\
  \ `src/server/db_slice.h`). This isn't just a technical detail; it's how the domain\
  \ state is modeled and accessed.\n- **Transaction Management:** Logic for ensuring\
  \ atomicity (VLL algorithm mentioned in README) is centralized in `src/server/transaction.cc`,\
  \ serving as the domain's coordinator.\n\n### 2. Secondary Style: Layered\nDragonfly\
  \ follows a clear vertical layering strategy within the `src/` directory:"
