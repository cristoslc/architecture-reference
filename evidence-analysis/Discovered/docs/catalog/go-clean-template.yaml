review_notes: "This repository is an explicit implementation of **Hexagonal Architecture**\
  \ (also known as Ports and Adapters), specifically following the \"Clean Architecture\"\
  \ flavor popularized by Robert C. Martin. \n\n### Evidence of Hexagonal Architecture\n\
  The project structure is strictly organized to decouple the business logic (the\
  \ \"Core\") from technical details (the \"Infrastructure\").\n\n1.  **The Core (Entities\
  \ & Usecases):** Located in `internal/entity` and `internal/usecase`. These represent\
  \ the domain models and business rules. Crucially, the README and `internal/usecase/contracts.go`\
  \ demonstrate that the core defines interfaces (Ports) that external layers must\
  \ implement.\n2.  **Driving Adapters (Controllers):** Located in `internal/controller`.\
  \ The repository provides multiple entry points (REST/Fiber, gRPC, AMQP RPC, NATS\
  \ RPC) that all drive the same underlying business logic. This \"pluggability\"\
  \ of transport layers is a hallmark of Hexagonal Architecture.\n3.  **Driven Adapters\
  \ (Repositories):** Located in `internal/repo`. These implement the interfaces defined\
  \ by the application layer. The segregation between `internal/repo/persistent` (Postgres)\
  \ and `internal/repo/webapi` (External HTTP APIs) shows that the domain logic doesn't\
  \ care whether data is stored in a database or fetched from a remote service.\n\
  4.  **Dependency Inversion:** The `internal/app/app.go` file acts as the \"Composition\
  \ Root,\" where dependencies are injected upwards. The business logic (`usecase`)\
  \ has zero imports from the `controller`, `repo`, or `pkg` directories, ensuring\
  \ it remains \"Clean.\""
