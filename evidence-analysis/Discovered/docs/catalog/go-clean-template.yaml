review_notes: "Hexagonal: internal/usecase/contracts.go defines inbound port (Translation interface); internal/repo/contracts.go defines outbound ports (TranslationRepo, TranslationWebAPI). Four driving adapters in internal/controller/ (restapi/, grpc/, amqp_rpc/, nats_rpc/) each adapt a protocol to the same use-case interface. Two driven adapters: internal/repo/persistent/ (Postgres) and internal/repo/webapi/ (Google Translate API). Composition root in internal/app/app.go wires all via constructor injection. Layered: strict inward dependency flow from controllers->usecases->entities; pkg/ isolates infrastructure. Single deployable (one cmd/app/main.go), not microservices despite multiple transport protocols."