review_notes: 'Hexagonal Architecture: clear separation into internal/usecase (application
  core), internal/controller (inbound adapters: restapi, grpc, amqp_rpc, nats_rpc),
  internal/repo (outbound adapters: persistent, webapi), internal/entity (domain),
  and internal/usecase/contracts.go + internal/repo/contracts.go defining ports (interfaces).
  Event-Driven: pkg/rabbitmq/rmq_rpc and pkg/nats/nats_rpc for RabbitMQ/NATS messaging
  with Request-Reply pattern. Single Dockerfile confirms single deployable unit (not
  microservices). Dependency injection via constructors enforces dependency inversion
  principle central to Hexagonal Architecture.'
