  \ Located in `internal/controller`. The repository provides multiple entry points\
  \ (REST/Fiber, gRPC, AMQP RPC, NATS RPC) that all drive the same underlying business\
  \ logic. This \"pluggability\" of transport layers is a hallmark of Hexagonal Architecture.\n\
  3.  **Driven Adapters (Repositories):** Located in `internal/repo`. These implement\
  \ the interfaces defined by the application layer. The segregation between `internal/repo/persistent`\
