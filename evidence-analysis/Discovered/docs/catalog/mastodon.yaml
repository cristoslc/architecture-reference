classification_reasoning: "## Architecture Classification: Mastodon\n\n### Primary\
  \ Style: Layered (Rails MVC)\n\nMastodon follows a classic **Ruby on Rails layered\
  \ architecture** with clear horizontal separation:\n\n**Presentation Layer (Controllers\
  \ & Views):**\n- `app/controllers/` contains 31+ controller files (e.g., `accounts_controller.rb`,\
  \ `statuses_controller.rb`)\n- `app/controllers/api/v1/` provides REST API endpoints\n\
  - `app/controllers/activitypub/` handles ActivityPub federation protocol\n- `app/views/`\
  \ contains view templates (HAML)\n- `app/policies/` implements authorization with\
  \ Pundit\n\n**Business Logic Layer (Services):**\n- `app/services/` contains 75+\
  \ service objects (e.g., `FanOutOnWriteService`, `DeleteAccountService`, `ProcessAccountService`)\n\
  - BaseService as abstract parent class pattern\n- Services encapsulate complex business\
  \ operations\n\n**Data Access Layer (Models):**\n- `app/models/` contains 144+ ActiveRecord\
  \ models\n- Models inherit from `ApplicationRecord` (standard Rails pattern)\n-\
  \ Domain entities: Account, Status, Follow, Block, etc.\n- Concerns for shared behaviors\
  \ (`app/models/concerns/`)\n\n**Supporting Layers:**\n- `app/workers/` - 54 Sidekiq\
  \ workers for background processing\n- `app/serializers/` - JSON serialization for\
  \ API responses\n- `app/lib/` - Utility modules and domain logic helpers\n- `app/helpers/`\
  \ - View helpers\n\n### Secondary Style: Event-Driven\n\nMastodon incorporates significant\
  \ **event-driven patterns**:\n\n**Redis Pub/Sub for Real-time Streaming:**\n- Separate\
  \ Node.js streaming server (`streaming/index.js`)\n- Subscribes to Redis channels\
  \ (`timeline:*`, `public`, `hashtag:*`, etc.)\n- WebSocket connections push real-time\
  \ updates to clients\n- The Rails app publishes events via `redis.publish()` in\
  \ `FanOutOnWriteService`\n\n**Background Job Processing (Sidekiq):**\n```yaml\n\
  # config/sidekiq.yml\n:queues:\n  - [default, 8]\n  - [push, 6]\n  - [ingress, 4]\n\
  \  - [mailers, 2]\n  - [pull]\n  - [scheduler]\n```\n\nWorkers handle async operations:\n\
  - `DistributionWorker` - fans out status updates to followers\n- `ActivityPub::DeliveryWorker`\
  \ - delivers ActivityPub payloads to remote servers\n- `FeedInsertWorker` - inserts\
  \ statuses into user timelines\n\n### Deployment Topology (Single Monolith)\n\n\
  The `docker-compose.yml` reveals the deployment:\n```yaml\nservices:\n  web:   \
  \     # Rails app (puma)\n  streaming:  # Node.js WebSocket server\n  sidekiq: \
  \   # Background job processor\n  db:         # PostgreSQL (shared)\n  redis:  \
  \    # Redis (shared)\n```\n\n**All processes share the same database and Redis\
  \ instance** - this is a single monolithic application with multiple runtime processes,\
  \ not microservices.\n\n### Why Not Other Styles\n\n**Not Microservices:**\n- Single\
  \ shared PostgreSQL database\n- Single shared Redis instance  \n- All components\
  \ must be deployed together\n- No independent service boundaries\n\n**Not Modular\
  \ Monolith:**\n- No enforced internal module boundaries\n- Services and models exist\
  \ in global namespace\n- No module-scoped schemas or isolation\n- Standard Rails\
  \ application structure\n\n**Not Hexagonal Architecture:**\n- Models directly inherit\
  \ from ActiveRecord (not abstracted)\n- No ports/adapters pattern\n- Controllers\
  \ access models directly without repository interfaces\n\n**Not Domain-Driven Design:**\n\
  - No bounded contexts explicitly defined\n- No aggregates, value objects, or domain\
  \ events pattern\n- Anemic ActiveRecord models with service objects for logic\n\n\
  ### Key Evidence Files\n\n- `app/controllers/application_controller.rb` - Base controller\
  \ with concerns\n- `app/services/base_service.rb` - Service object pattern\n- `app/workers/distribution_worker.rb`\
  \ - Sidekiq worker for fan-out\n- `streaming/index.js` - WebSocket server with Redis\
  \ pub/sub\n- `config/sidekiq.yml` - Background job queues\n- `docker-compose.yml`\
  \ - Single-app deployment topology\n- `app/models/status.rb` - ActiveRecord model\
  \ with concerns"
