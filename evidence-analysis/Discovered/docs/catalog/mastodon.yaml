review_notes: 'Evidence: (1) Modular Monolith - Single Rails application with 1199
  Ruby files in app/, shared PostgreSQL database, domain-organized models in app/models/
  (Account, Status, User, etc.); (2) Event-Driven - Sidekiq background workers, Redis
  queueing, ActivityPub federation inherently event-based; (3) Service-Based - 2 coarse-grained
  services: web (Rails monolith) and streaming (Node.js) with separate Dockerfiles
  (./Dockerfile vs ./streaming/Dockerfile), docker-compose.yml shows shared db/redis
  but separate deployments; (4) NOT microservices - single shared database, no service
  discovery, no API gateway, only 2 services not 5+'
