review_notes: "Event-Driven: Sidekiq queues (default/push/ingress/mailers/pull/scheduler) in config/sidekiq.yml; extensive async workers in app/workers/ and app/workers/activitypub/ (delivery_worker, distribution_worker, processing_worker); fan_out_on_write_service.rb for timeline distribution; Redis pub/sub powering the Node.js streaming/ service; ActivityPub federation inherently event-driven with inbox receipt triggering async processing chains. Layered: classic Rails MVC (app/controllers, app/models, app/views) plus service layer (app/services/), serializers (app/serializers/), policies (app/policies/ via Pundit), presenters (app/presenters/), validators (app/validators/), and infrastructure lib (app/lib/). docker-compose.yml shows web+sidekiq+streaming all sharing same DB and Redis - single monolith codebase, not microservices. Automated discovery incorrectly suggested Microservices and Pipe-and-Filter."