one_line_summary: |
  A .NET Aspire 9 coffee-shop reference implementation composed of independently deployed microservices (counter, barista, kitchen, product) that communicate asynchronously over RabbitMQ using MassTransit, with CQRS via MediatR and DDD aggregates within each service boundary.
classification_reasoning: |
  The system is composed of five distinct, independently deployable services (counter-api, barista-api, kitchen-api, product-api, yarp gateway), each with its own codebase and process — the defining characteristic of Microservices. Inter-service integration is predominantly asynchronous: counter-api publishes BaristaOrderPlaced and KitchenOrderPlaced events to RabbitMQ; barista-api and kitchen-api are pure consumers that reply with update events, establishing a clear Event-Driven topology. Within every service, commands and queries are separated via MediatR IRequest handlers with distinct Command and Query types (PlaceOrderCommand, OrderFulfillmentQuery, ItemTypesQuery), constituting an intra-service CQRS pattern. The shared library provides canonical DDD building blocks — Aggregate Root with domain event collection (EntityRootBase, IAggregateRoot), EntityBase, ValueObject, IDomainEvent, repository interfaces, and gateway (anti-corruption) interfaces — applied consistently across services. The README explicitly states "Microservices architectural style", "Domain Driven Design building blocks", and "CQRS with MediatR". .NET Aspire orchestrates all resources with health checks, service discovery, and OpenTelemetry wiring.
