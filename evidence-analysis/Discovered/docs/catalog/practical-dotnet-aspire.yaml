review_notes: 'README explicitly claims Microservices, DDD, and CQRS. 5 independent
  services (counter-api, barista-api, kitchen-api, product-api, order-summary) orchestrated
  by .NET Aspire app-host. YARP reverse proxy as API gateway. RabbitMQ message broker
  with MassTransit consumers (BaristaOrderedConsumer, KitchenOrderedConsumer, etc.)
  and EventDispatcher translating domain events to integration events. Shared kernel
  provides DDD building blocks: EntityRootBase (aggregate root), ValueObject, IDomainEvent,
  IAggregateRoot. MediatR used for CQRS with separate PlaceOrderCommand and OrderFulfillmentQuery
  handlers plus FluentValidation. C4 Container diagram in README shows full distributed
  topology. Event flow: counter-api publishes BaristaOrderPlaced/KitchenOrderPlaced
  via RabbitMQ; barista-api and kitchen-api consume and publish OrderUpdated events
  back.'
