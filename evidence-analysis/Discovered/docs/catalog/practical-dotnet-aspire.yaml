classification_reasoning: 'The repository is a textbook implementation of a **Microservices**
  architecture, explicitly identified as such in the README and demonstrated by its
  structural organization and deployment strategy.


  ### 1. Microservices (Primary)

  The codebase is partitioned into multiple independently deployable services, each
  with its own project file (`.csproj`), configuration, and domain logic:

  - `product-api`: Manages the product catalog.

  - `counter-api`: Handles order placement.

  - `barista-api`: Manages drink preparation.

  - `kitchen-api`: Manages food preparation.

  - `order-summary`: A reporting/read-side service.

  - `yarp`: Acts as the API Gateway (using Microsoft''s Yet Another Reverse Proxy).

  - **Deployment & Orchestration**: It uses **.NET Aspire** (`app-host/`), which is
  a cloud-native stack specifically designed for orchestrating microservices. There
  is also evidence of Kubernetes (`deployment-product-api.yaml`) and Docker Compose
  (`docker-compose.yaml`) configurations.


  ### 2. Event-Driven (Secondary)

  The services communicate asynchronously via a message broker.

  - **Infrastructure**: The README and diagrams specify **RabbitMQ** as the broker.

  - **Code implementation**: All service directories (e.g., `counter-api`, `barista-api`,
  `kitchen-api`) contain `IntegrationEvents` and `EventHandlers` folders. It uses
  **MassTransit** to implement the Pub/Sub pattern (notably seen in `KitchenOrderUpdatedConsumer.cs`
  and `BaristaOrderUpdatedConsumer.cs`).


  ### 3. Domain-Driven Design (Secondary)

  Each individual service is organized internally according to DDD tactical patterns
  and **Vertical Slice** principles:

  - **Bounded Contexts**: Each service represents a distinct business context (Barista,
  Kitchen, Counter).

  - **Tactical Patterns**: Directories contain `Domain`, `UseCases`, and `Infrastructure`.
  Files like `Order.cs` (Entity), `OrderPlaced.cs` (Domain Event), and `IOrderRepository.cs`
  (Interface/Port) indicate a strong adherence to DDD.

  - **CQRS**: The README specifically mentions CQRS with **MediatR**. This is visible
  in the directory structure through `Commands` and `UseCases` folders (e.g., `PlaceOrderCommand.cs`
  and `OrderFulfillmentQuery.cs`).


  ### Summary of Rejected Styles:

  - **Modular Monolith**: Rejected because services are physically separated into
  different projects, deployable units, and use a network-level message broker (RabbitMQ)
  for communication rather than in-process method calls.

  - **Serverless**: While the services are granular, they are implemented as long-running
  ASP.NET Core applications rather than individual function triggers.

  - **Hexagonal Architecture**: Although "Ports and Adapters" concepts are present
  (via DDD), the primary organizing principle of the repo is the service boundary
  and the event-driven interaction rather than strict isolation of the core from the
  infrastructure within a single unit.'
