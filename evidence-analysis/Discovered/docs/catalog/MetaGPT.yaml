classification_reasoning: "## Architecture Classification: Multi-Agent\n\n**MetaGPT\
  \ is a Multi-Agent framework** designed for orchestrating autonomous AI agents that\
  \ collaborate to solve complex tasks.\n\n### Core Architectural Evidence:\n\n**1.\
  \ Agent as Primary Abstraction**\n- The `Role` class (`metagpt/roles/role.py`) defines\
  \ autonomous agents with:\n  - Identity (`name`, `profile`, `goal`, `constraints`)\n\
  \  - Memory (`Memory` for storing messages and history)\n  - Cognition (`_think()`,\
  \ `_observe()`, `_act()` methods)\n  - Autonomy (`react_mode`: REACT, BY_ORDER,\
  \ PLAN_AND_ACT)\n  - Planning capability (`Planner` for task decomposition)\n\n\
  **2. Team Coordination**\n- `Team` class (`metagpt/team.py`) orchestrates multiple\
  \ agents:\n```python\nclass Team(BaseModel):\n    env: Optional[Environment] = None\n\
  \    def hire(self, roles: list[Role]):\n        self.env.add_roles(roles)\n```\n\
  - Agents are \"hired\" into a shared environment where they interact\n\n**3. Message-Based\
  \ Communication**\n- Agents communicate via `Message` objects with routing metadata\
  \ (`send_to`, `cause_by`, `sent_from`)\n- `Environment.publish_message()` distributes\
  \ messages to subscribing agents\n- Each agent watches for specific action types\
  \ via `_watch([ActionClass])` to determine relevance\n\n**4. Standard Operating\
  \ Procedures (SOP)**\nFrom `software_company.py`:\n```python\ncompany.hire([\n \
  \   TeamLeader(),\n    ProductManager(),\n    Architect(),\n    Engineer2(),\n \
  \   DataAnalyst(),\n])\n```\n- Predefined workflows: ProductManager watches UserRequirement\
  \ → Architect watches WritePRD → Engineer watches WriteTasks\n- The README explicitly\
  \ states: **\"Code = SOP(Team)\"** - codifying coordinated agent behavior\n\n**5.\
  \ Autonomous Behavior Patterns**\nFrom `metagpt/roles/role.py`:\n```python\nclass\
  \ RoleReactMode(str, Enum):\n    REACT = \"react\"\n    BY_ORDER = \"by_order\"\n\
  \    PLAN_AND_ACT = \"plan_and_act\"\n```\n- Agents can reason and act autonomously,\
  \ not just execute predefined workflows\n\n### Secondary Style: Event-Driven\n\n\
  The coordination mechanism between agents follows an event-driven pattern:\n- Messages\
  \ contain `cause_by` (what action triggered this message)\n- Agents subscribe to\
  \ specific action types and react when relevant messages arrive\n- The `Environment`\
  \ acts as an event bus routing messages between agents\n\nFrom `environment/base_env.py`:\n\
  ```python\ndef publish_message(self, message: Message, peekable: bool = True) ->\
  \ bool:\n    \"\"\"Distribute the message to the recipients.\"\"\"\n```\n\n### Rejected\
  \ Alternatives:\n\n- **Not Microservices**: Single deployable unit (`pip install\
  \ metagpt`), no independent service boundaries, no network communication between\
  \ components\n- **Not Pipeline**: Agents can react dynamically (REACT mode), not\
  \ just sequential stages. Communication is bidirectional and context-aware\n- **Not\
  \ Domain-Driven Design**: While there are domain concepts (ProductManager, Architect),\
  \ the primary organization is around *autonomous agents*, not bounded contexts or\
  \ aggregates\n- **Not Modular Monolith**: The module structure (`actions/`, `roles/`,\
  \ `tools/`) supports the multi-agent paradigm but isn't about enforcing module boundaries\
  \ in the traditional sense\n- **Not Hexagonal**: No ports-and-adapters isolation\
  \ pattern; agents directly interact with LLMs and tools\n\n### Key Differentiating\
  \ Features:\n1. **Agent autonomy**: Each agent can think, plan, and act independently\n\
  2. **Coordination via SOP**: Structured workflows define how agents interact\n3.\
  \ **Memory and state**: Agents maintain conversation history and working memory\n\
  4. **Tool extensibility**: `@register_tool` decorator allows dynamic capability\
  \ addition"
