review_notes: "README title: 'The Multi-Agent Framework'. metagpt/roles/ contains specialized agent classes (architect.py, engineer.py, product_manager.py, qa_engineer.py, etc.). metagpt/team.py orchestrates agents via Team.hire() and Team.run() with Environment for message routing. metagpt/roles/role.py defines base Role with think/act/react/run agent lifecycle and publish_message/put_message inter-agent communication. metagpt/base/base_role.py is abstract agent base class. metagpt/environment/ provides multiple env types (MGX, Android, Minecraft, Werewolf, StanfordTown). metagpt/memory/ implements agent memory subsystem. metagpt/actions/ contains 40+ action classes agents execute. metagpt/software_company.py instantiates a Team with TeamLeader, ProductManager, Architect, Engineer2, DataAnalyst agents. GitHub topics include 'multi-agent'. Paper: 'MetaGPT: Meta Programming for A Multi-Agent Collaborative Framework' at ICLR 2024."