review_notes: 'MetaGPT is a textbook implementation of a **Multi-Agent** architecture.
  The codebase is explicitly organized around the coordination of autonomous entities
  ("Roles") that encapsulate logic, state, and decision-making capabilities to achieve
  a shared goal.


  ### 1. Multi-Agent (Primary Style)

  The core of the repository is built on the interaction between autonomous agents.

  - **Agent Encapsulation:** The `metagpt/roles/role.py` file defines the `Role` base
  class, which encapsulates its own "Memory," "Actions," and "React Mode" (e.g., `PLAN_AND_ACT`).
  This follows the agent-oriented paradigm where each component is an independent
  actor.

  - **Social Coordination:** The system uses a "Software Company" metaphor to manage
  complex tasks, assigning specialized agents like `ProductManager`, `Architect`,
  and `Engineer` (`metagpt/roles/`).

  - **Environment Context:** The `metagpt/environment/base_env.py` provides the "world"
  (the `Environment` class) where agents exist, observe state, and act. This is a
  fundamental characteristic of Multi-Agent Systems (MAS).


  ### 2. Event-Driven (Secondary Style)

  While the high-level logic is Multi-Agent, the underlying communication mechanism
  is a sophisticated **Event-Driven** pub/sub system.'
