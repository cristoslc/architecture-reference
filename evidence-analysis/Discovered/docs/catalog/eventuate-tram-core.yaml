review_notes: "Event-Driven: Core abstraction is message/event publish-subscribe — MessageProducer/MessageConsumer interfaces (eventuate-tram-messaging/), DomainEventPublisher/DomainEventDispatcher (eventuate-tram-events/), CommandProducer/CommandDispatcher (eventuate-tram-commands/). Implements Transactional Outbox pattern via MessageProducerJdbcImpl inserting into OUTBOX table (eventuate-tram-producer-jdbc/). Supports multiple message brokers: Kafka, RabbitMQ, ActiveMQ, Redis (eventuate-tram-consumer-kafka/, eventuate-tram-consumer-rabbitmq/, eventuate-tram-consumer-activemq/, eventuate-tram-consumer-redis/). CDC service in docker-compose-mysql-binlog-kafka.yml tails transaction logs to publish outbox messages. Microservices: Explicitly designed as microservices collaboration platform (README.adoc line 5). Provides saga coordination primitives (commands/replies for orchestration-based sagas). Aggregate-scoped domain event publishing (eventuate-tram-aggregate-domain-events/). Channel-based inter-service messaging with subscriber ID isolation. Decorator chain pattern for cross-cutting concerns like duplicate detection (eventuate-tram-consumer-common/DecoratedMessageHandlerFactory.java, DuplicateDetectingMessageHandlerDecorator.java)."