review_notes: '### Architecture Analysis


  Dagster is a data orchestrator characterized by a **Pipeline (Pipe-and-Filter)**
  architecture at its core, extended via a **Microkernel** pattern for integrations,
  and deployed as a **Service-Based** system for its control plane.


  #### 1. Primary Style: Pipeline (Pipe-and-Filter)

  The fundamental unit of work in Dagster is the "Asset" or "Op," which are organized
  into a Directed Acyclic Graph (DAG). The architecture is designed to manage the
  flow of data and dependencies between these discrete processing stages.

  - **Evidence:** The `python_modules/dagster/dagster/_core/execution/plan/plan.py`
  file demonstrates a classic pipe-and-filter coordination logic. It uses `toposort`
  to order nodes and manages `StepInput` and `StepOutput` objects to facilitate data
  passing between filters (Ops).

  - **Control Flow:** The `_PlanBuilder` class explicitly constructs an `ExecutionPlan`
  where outputs of one step are mapped to the inputs of another (`step_output_map`),
  matching the "Pipes" (dependencies) and "Filters" (computational units) definition.


  #### 2. Secondary Style: Microkernel (Plugin)'
