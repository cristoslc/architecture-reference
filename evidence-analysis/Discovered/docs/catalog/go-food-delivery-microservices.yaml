review_notes: "The repository is a textbook implementation of a **Microservices**\
  \ architecture, explicitly designed as an exemplar of modern distributed systems.\
  \ \n\n### Architecture Breakdown\n\n1.  **Microservices (Primary Style):**\n   \
  \ *   **Independent Deployability:** The project contains multiple distinct services\
  \ under `internal/services/` (`catalogwriteservice`, `catalogreadservice`, and `orderservice`).\
  \ Each service has its own `Dockerfile`, `go.mod`, `config/`, and `Makefile`, allowing\
  \ them to be built and deployed independently.\n    *   **Data Sovereignty:** The\
  \ services utilize different database technologies (Postgres for writes, MongoDB/ElasticSearch\
  \ for reads, and EventStoreDB for sourcing), aligning with the microservices principle\
  \ of using the \"right tool for the job.\"\n    *   **Inter-Service Communication:**\
  \ The system uses gRPC for synchronous real-time communication and RabbitMQ for\
  \ asynchronous messaging.\n\n2.  **Event-Driven (Secondary Style):**"
