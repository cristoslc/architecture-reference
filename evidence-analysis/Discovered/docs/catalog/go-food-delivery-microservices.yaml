classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Style: Microservices\n\n**Strong evidence for Microservices architecture:**\n\n\
  1. **Three independently deployable services** with separate go.mod files:\n   -\
  \ `internal/services/catalogwriteservice/go.mod` —独立的go模块\n   - `internal/services/catalogreadservice/go.mod`\
  \ —独立的go模块  \n   - `internal/services/orderservice/go.mod` —独立的go模块\n\n2. **Separate\
  \ databases per service** (database-per-service pattern):\n   - `catalogwriteservice`:\
  \ PostgreSQL (`gormOptions` in config)\n   - `catalogreadservice`: MongoDB + Elasticsearch\
  \ + Redis (`mongoDbOptions`, `elasticOptions`, `redisOptions`)\n   - `orderservice`:\
  \ EventStoreDB + MongoDB + Elasticsearch (`eventStoreDbOptions`, `mongoDbOptions`)\n\
  \n3. **Individual Dockerfiles** for each service (`internal/services/*/Dockerfile`)\n\
  \n4. **Separate ports** for each service:\n   - catalogwriteservice: HTTP 7000,\
  \ gRPC 6003\n   - catalogreadservice: HTTP 7001, gRPC 6004\n   - orderservice: HTTP\
  \ 8000, gRPC 6005\n\n5. **Service-specific configurations** with distinct service\
  \ names and infrastructure dependencies\n\n### Secondary Style: Event-Driven Architecture\n\
  \n**Evidence:**\n\n1. **RabbitMQ message broker** configured in `docker-compose.infrastructure.yaml`\n\
  \n2. **Integration events** published between services:\n   ```go\n   // internal/services/catalogwriteservice/internal/products/features/creatingproduct/v1/create_product_handler.go\n\
  \   productCreated := integrationevents.NewProductCreatedV1(productDto)\n   err\
  \ = c.RabbitmqProducer.PublishMessage(ctx, productCreated, nil)\n   ```\n\n3. **Event\
  \ bus abstraction** in `internal/pkg/core/messaging/bus/bus.go`:\n   ```go\n   type\
  \ Bus interface {\n       producer.Producer\n       consumer.BusControl\n      \
  \ consumer.ConsumerConnector\n   }\n   ```\n\n4. **Projections** for handling events\
  \ (`orderservice/internal/orders/projections/`)\n\n### Secondary Style: CQRS\n\n\
  **Evidence:**\n\n1. **Separate read/write services**: `catalogreadservice` and `catalogwriteservice`\
  \ are physically separated services\n\n2. **Command/Query interfaces** in `internal/pkg/core/cqrs/`:\n\
  \   ```go\n   type Command interface { isCommand(); Request; TypeInfo }\n   type\
  \ Query interface { isQuery(); Request; TypeInfo }\n   ```\n\n3. **Different database\
  \ technologies** for read vs write sides:\n   - Write side: PostgreSQL (relational,\
  \ ACID transactions)\n   - Read side: MongoDB + Elasticsearch (document stores,\
  \ optimized for queries)\n\n4. **MediatR pattern** used for dispatching commands\
  \ and queries (`github.com/mehdihadeli/go-mediatr`)\n\n### Secondary Style: Domain-Driven\
  \ Design\n\n**Evidence:**\n\n1. **Aggregate roots** with domain behavior:\n   ```go\n\
  \   // internal/services/orderservice/internal/orders/models/orders/aggregate/order.go\n\
  \   type Order struct {\n       *models.EventSourcedAggregateRoot\n       shopItems\
  \       []*value_objects.ShopItem\n       accountEmail    string\n       // ...\n\
  \   }\n   ```\n\n2. **Domain events** (`createOrderDomainEventsV1`, `integrationevents`)\n\
  \n3. **Value objects** (`internal/services/orderservice/internal/orders/models/orders/value_objects/shop_item.go`)\n\
  \n4. **Domain exceptions** (`internal/services/orderservice/internal/orders/exceptions/domain_exceptions/`)\n\
  \n5. **Event Sourcing** implementation for Order aggregate with `EventSourcedAggregateRoot`\
  \ base type\n\n### What This Is NOT\n\n- **NOT a Modular Monolith**: Services are\
  \ separate deployment units with their own Dockerfiles, not modules within a single\
  \ application\n- **NOT Layered Architecture**: While there's some layering within\
  \ features, the primary organization is vertical slices per feature (`features/creatingproduct/`,\
  \ `features/gettingproducts/`)\n- **NOT Serverless**: No function-as-a-service deployments;\
  \ services are containerized applications\n- **NOT Hexagonal Architecture**: While\
  \ there are ports/adapters patterns, this is secondary to the microservices organization\n\
  \n### Vertical Slice Organization\n\nWithin each microservice, the code is organized\
  \ using **Vertical Slice Architecture**:\n```\ninternal/services/catalogwriteservice/internal/products/features/\n\
  ├── creatingproduct/v1/\n│   ├── create_product.go\n│   ├── create_product_endpoint.go\n\
  │   ├── create_product_handler.go\n│   ├── dtos/\n│   └── events/integrationevents/\n\
  ├── gettingproducts/v1/\n├── updatingproduct/\n└── deletingproduct/\n```\n\nEach\
  \ feature folder contains all the code it needs (handler, endpoint, DTOs, events),\
  \ rather than organizing by technical layer."
