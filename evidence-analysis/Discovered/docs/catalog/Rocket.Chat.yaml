classification_reasoning: "## Analysis\n\n**Primary Style: Microservices**\n\nRocket.Chat\
  \ is architected as a **microservices system** with clear evidence:\n\n### Deployment\
  \ Topology\nThe `docker-compose-local.yml` shows **8 independently deployable services**:\n\
  - `rocketchat` (main Meteor application)\n- `authorization-service`\n- `account-service`\
  \  \n- `presence-service`\n- `ddp-streamer-service`\n- `queue-worker-service`\n\
  - `omnichannel-transcript-service`\n- Supporting infrastructure: `nats` (message\
  \ broker), `mongo`, `traefik`\n\nEach service has its own **Dockerfile** (see `ee/apps/*/Dockerfile`)\
  \ and can be independently built and deployed.\n\n### Service Communication\nServices\
  \ communicate through **NATS message broker** with Moleculer framework:\n- `network-broker`\
  \ package uses `moleculer` ServiceBroker\n- Services use `TRANSPORTER` environment\
  \ variable for inter-service communication\n- Core services define typed event signatures\
  \ in `packages/core-services/src/events/Events.ts`\n\n### Service Broker Pattern\n\
  The architecture uses a broker abstraction (`packages/core-services/src/LocalBroker.ts`\
  \ and `ee/packages/network-broker/src/NetworkBroker.ts`) with two modes:\n1. **LocalBroker**:\
  \ In-process service orchestration (monolith mode)\n2. **NetworkBroker**: Moleculer-based\
  \ distributed service broker (microservices mode)\n\nThe `isRunningMs()` check in\
  \ `apps/meteor/server/services/startup.ts` conditionally registers services:\n```typescript\n\
  if (!isRunningMs()) {\n    // Services run in-process for monolith\n    api.registerService(new\
  \ Presence());\n    api.registerService(new Authorization());\n}\n```\n\n### Service\
  \ Definitions\nTyped service interfaces in `packages/core-services/src/types/` define\
  \ contracts: `IAccount`, `IAuthorization`, `IPresence`, `IMessageService`, `IOmnichannelService`,\
  \ etc.\n\n---\n\n**Secondary Style: Microkernel (Plugin)**\n\nThe **Apps Engine**\
  \ (`packages/apps-engine`) implements a plugin architecture:\n\n### Core Plugin\
  \ Infrastructure\n- **Abstract App base class** (`packages/apps-engine/src/definition/App.ts`):\
  \ Third-party apps extend this class\n- **AppManager** (`packages/apps-engine/src/server/AppManager.ts`):\
  \ Loads, manages, and orchestrates app lifecycle\n- **Bridge pattern**: Apps communicate\
  \ with Rocket.Chat through bridge interfaces (`src/server/bridges/`)\n\n### Plugin\
  \ Capabilities\nApps can extend the system through:\n- Event handlers (`AppEvents`)\n\
  - Slash commands (`AppSlashCommandManager`)\n- API extensions (`AppApiManager`)\n\
  - Video conference providers (`AppVideoConfProviderManager`)\n- Scheduled jobs (`AppSchedulerManager`)\n\
  - UI Kit components (`UIActionButtonManager`)\n\n### Runtime Isolation\nThe Apps\
  \ Engine supports isolated runtimes (`src/server/runtime/`), including Deno runtime\
  \ for sandboxed execution.\n\n---\n\n**What I Rejected:**\n\n- **Layered**: Not\
  \ a horizontal layering pattern. While there are UI packages and data models, the\
  \ defining characteristic is service boundaries, not layer separation.\n\n- **Modular\
  \ Monolith**: While there's a monolith deployment mode, the architecture is explicitly\
  \ designed for independent service deployment with message broker communication.\
  \ Services can be scaled independently.\n\n- **Event-Driven Architecture**: While\
  \ services use events for communication, this is secondary to the microservices\
  \ pattern. The events are service-to-service communications, not the primary architectural\
  \ paradigm.\n\n- **Domain-Driven Design**: While there are domain-focused packages\
  \ (omnichannel, livechat, etc.), the codebase doesn't exhibit DDD tactical patterns\
  \ like aggregates, bounded contexts with separate databases, or domain events as\
  \ a primary pattern."
