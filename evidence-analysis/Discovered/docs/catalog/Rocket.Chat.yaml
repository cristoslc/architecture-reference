review_notes: 'The Rocket.Chat repository is a sophisticated transition from a traditional
  Monolith to a Microservices architecture. While the core functionality still resides
  in a substantial "Legacy" Monolith (the Meteor application), the architecture is
  explicitly structured to support independent service deployment via a distributed
  broker system.


  ### 1. Primary Style: Microservices

  The codebase is organized as a monorepo that manages multiple independently deployable
  units. Evidence for this includes:

  - **Independent Deployment Units**: Under `ee/apps/`, there are several distinct
  services (e.g., `account-service`, `authorization-service`, `presence-service`,
  `ddp-streamer`) each containing its own `Dockerfile` and `package.json`.

  - **Service Orchestration**: The `docker-compose-local.yml` confirms these are not
  mere code modules but separate runtime containers. It defines services like `authorization-service`,
  `account-service`, and `presence-service` running as distinct processes.

  - **Service Discovery and Communication**: The system uses **NATS** as a message
  broker and `moleculer` (indicated in environment variables like `TRANSPORTER` and
  `MOLECULER_LOG_LEVEL`) as the microservices framework. This allows the services
  to communicate across network boundaries rather than just in-process memory.


  ### 2. Secondary Style: Event-Driven

  The architecture relies heavily on an event-driven or message-based backbone for
  inter-service communication:'
