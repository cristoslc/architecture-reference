review_notes: 'Evidence for Microservices: single Dockerfile at root, docker-compose
  deployment model described in README, multiple distinct service entry points (app/http.php,
  app/worker.php, app/realtime.php, app/cli.php), README explicitly states ''microservices
  architecture''. Evidence for Event-Driven: app/config/events.php defines system
  events, tests/unit/Event/ directory, worker.php consuming background queues for
  async tasks (emails, webhooks, builds) as described in README and CONTRIBUTING.
  Evidence for Modular Monolith: app/controllers/api/ with multiple domain subdirectories,
  docs/references/ with per-domain subdirectories (account, databases, storage, functions,
  messaging, teams, users, etc.), app/config/ with per-domain configs, all within
  a single deployable PHP container image.'
