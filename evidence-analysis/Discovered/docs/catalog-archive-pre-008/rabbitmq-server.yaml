review_notes: 'Evidence: AGENTS.md explicitly describes 40+ components under deps/
  (deps/rabbit as core, deps/rabbitmq_mqtt, deps/rabbitmq_stomp, deps/rabbitmq_stream,
  deps/rabbitmq_management, deps/rabbitmq_prometheus, etc.), each as independently
  developed Erlang/OTP applications with their own Makefiles (confirmed by glob showing
  deps/rabbitmq_auth_backend_oauth2/Makefile, deps/rabbitmq_shovel/Makefile, etc.).
  All components are built and deployed as a single broker unit — there is one packaging/docker-image/Dockerfile
  for the whole server. This is a textbook Modular Monolith: clear internal module
  boundaries (OTP apps/plugins), shared runtime, single deployment unit. Event-Driven
  is intrinsic: RabbitMQ IS a message broker implementing AMQP, MQTT, STOMP, and Stream
  Protocol — its entire purpose is routing events/messages between producers and consumers.
  deps/rabbitmq_event_exchange exposes internal broker events to AMQP clients. The
  multi-language signals (JS in selenium/, Maven in authorization-server/) are test
  infrastructure, not separate services.'
