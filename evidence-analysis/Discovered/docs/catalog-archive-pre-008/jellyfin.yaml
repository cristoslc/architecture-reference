review_notes: 'Evidence: Multiple distinct .csproj-based modules visible in directory
  tree: Jellyfin.Server.Implementations (data/infrastructure layer with repositories
  like BaseItemRepository, UserManager), MediaBrowser.Providers (provider/service
  layer), Emby.Naming (domain parsing logic), Emby.Photos (photo feature module).
  Repository pattern evident in Jellyfin.Server.Implementations/Item/ (BaseItemRepository,
  MediaStreamRepository, ChapterRepository). Internal event system at Jellyfin.Server.Implementations/Events/EventManager.cs
  and EventingServiceCollectionExtensions.cs. Domain-oriented naming: TV, Music, Movies,
  Books, Photos subdomains in MediaBrowser.Providers. No Kubernetes, no service discovery,
  no message broker config. Single deployable unit via dotnet run --project Jellyfin.Server.
  42 package manifests correspond to multiple .csproj files representing modular separation.
  Layer boundaries: API (Jellyfin.Api), business/controller (MediaBrowser.Controller),
  implementations (Jellyfin.Server.Implementations), model (MediaBrowser.Model).'
