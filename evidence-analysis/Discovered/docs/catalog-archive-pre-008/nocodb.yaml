  by OpenAPI spec (APIs.json), MVC structure typical of NocoDB''s backend; auto-upstall
  deploys PostgreSQL+Redis+Minio+Traefik as supporting infrastructure around single
  app container; (3) Event-Driven — Kafka and RabbitMQ in key_technologies with 4
  messaging signals detected; App Store for Workflow Automations section in README
  describes webhook/notification integrations (Slack, Discord, AWS SES) suggesting
  event-driven hooks; Kubernetes/Helm charts (charts/nocodb/) are deployment tooling
  for the single app, not evidence of microservices decomposition'
