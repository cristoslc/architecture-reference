review_notes: 'Evidence: (1) Modular Monolith — pnpm-workspace.yaml and lerna.json
  indicate a monorepo with multiple internal packages (nc-gui, nocodb-sdk, etc. per
  scripts referencing bumpNcGuiVersion, bumpNocodbSdkVersion, upgradeNcGui); single
  Docker image deployment confirmed by README showing ''docker run nocodb/nocodb:latest'';
