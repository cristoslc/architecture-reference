review_notes: 'Evidence: Hazelcast is fundamentally a distributed in-memory data grid
  - this is the Space-Based architecture style characterized by in-memory data grids.
  The codebase has 9300+ Java files in a single monolithic build (one root pom.xml).
  The 78 messaging signals represent Hazelcast''s internal pub/sub and queue mechanisms
  (distributed messaging), not external microservices. The Jet component provides
  stream processing pipelines, but this is a feature within the product, not Pipe-and-Filter
  as the primary architecture. There is no evidence of Microservices - no separate
  service directories, no Kubernetes deployments, no API Gateway (signal_breakdown
  shows container_orchestration:1). DDD signals are weak (0.3 score) - no clear bounded
  context organization in code structure.'
