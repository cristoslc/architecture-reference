review_notes: 'Evidence: The core architecture is Pipe-and-Filter - NiFi''s fundamental
  design is a visual dataflow engine where processors (filters) transform FlowFiles
  connected via connections (pipes). The directory structure shows numerous processor
  bundles (nifi-extension-bundles/*/nifi-*-processors) implementing transformation
  logic. Event-Driven signals (114 messaging signals in heuristics) include provenance
  tracking, event streams, and integration with Kafka/RabbitMQ. Microservices is incorrect
  - NiFi is a monolithic platform with extension bundles, not independent services
  with separate data stores. DDD and Hexagonal Architecture are not strongly evident
  - the extension bundles are feature/organization-based, not domain-driven bounded
  contexts with clear ports/adapters separation.'
