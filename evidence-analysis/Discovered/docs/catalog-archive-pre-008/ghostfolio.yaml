review_notes: 'Modular Monolith: single Dockerfile, Nx workspace with apps/api + apps/client
  + libs/common + libs/ui, no service discovery or API gateway, all modules co-deployed.
  Each domain area (order, portfolio, account, user, auth, import, export, etc.) has
  its own module/controller/service triple under apps/api/src/app/ — classic NestJS
  modular structure. Event-Driven (secondary): apps/api/src/events/ contains portfolio-changed.event.ts,
  asset-profile-changed.event.ts, portfolio-changed.listener.ts, asset-profile-changed.listener.ts,
  and events.module.ts — NestJS internal event bus; apps/api/src/app/admin/queue/
  indicates Bull/queue-based async job processing. Layered (secondary): consistent
  controller → service → Prisma (repository) pattern across every module (e.g. order.controller.ts
  / order.service.ts, portfolio.controller.ts / portfolio.service.ts); interceptors/,
  middlewares/, decorators/ directories reinforce horizontal layering. Redis caching
  via redis-cache module. No Kubernetes, no separate service deployments, no API gateway
  — rules out Microservices.'
