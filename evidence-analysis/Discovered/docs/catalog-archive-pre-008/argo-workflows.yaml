review_notes: 'Evidence: Single `go.mod` at root, single multi-stage Dockerfile building
  all components (argoexec, workflow-controller, argo, argo-ui) from unified codebase.
  Directory structure shows layered architecture: `cmd/` (entry points), `server/`
  (API layer), `workflow/` (business logic - 324 files), `pkg/` (shared packages),
  `util/` (utilities). No evidence of: (1) microservices - no separate service directories,
  no Kubernetes manifests for multiple services; (2) event-driven - no message brokers
  (Kafka/RabbitMQ/NATS) visible, no event schema definitions; (3) DDD - no explicit
  domain/aggregates/entities pattern. The signal_breakdown shows 58 container_orchestration
  signals (Kubernetes-related) but this is a single Kubernetes CRD controller, not
  microservices.'
