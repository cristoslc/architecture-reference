review_notes: 'Redpanda is fundamentally a streaming/messaging broker — it IS the
  event infrastructure, not a consumer of it. It''s Kafka-API compatible (proto/redpanda/core,
  buf.yaml, gRPC specs, 136 API specs detected), built as a single deployable unit
  (Bazel monobuild, single Dockerfile, no separate service directories), making Microservices
  classification inappropriate. Event-Driven is primary: the entire product is a pub/sub
  event streaming platform (Kafka-compatible, topic partitions, consumer groups seen
  in tools/offline_log_viewer/consumer_groups.py, consumer_offsets.py). Pipe-and-Filter
  is secondary: internal data flow through sequential processing stages is characteristic
  of streaming broker internals (tiered storage, schema registry, data lake via proto/redpanda/datalake).
  The extensive tooling (tools/offline_log_viewer, tools/rp_storage_tool, tools/schema_registry_tools)
  and test infrastructure (tests/rptest) are all part of a single product codebase.
  No separate service directories, no API gateway, no service discovery configs —
  ruling out Microservices as a primary style.'
