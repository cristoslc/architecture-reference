review_notes: 'Event-Driven: Architecture doc explicitly states ''the system functions
  via event sourcing: an append-only history of events is stored for each workflow
  execution''; service/history/ contains event sourcing infrastructure including historybuilder/,
  events/, replication/, and queues/. Microservices: Four independently deployable
  services each with their own service.go, fx.go, handler.go, and configs/ directory:
  service/frontend/, service/history/, service/matching/, service/worker/; docker-compose.cdc.yml
  and multiple Dockerfiles in docker/targets/ (server.Dockerfile, admin-tools.Dockerfile)
  confirm independent deployment; gRPC-based inter-service communication (67 API spec
  signals); service/history/ manages workflow state shards, service/matching/ manages
  task queues, service/frontend/ handles external gRPC/HTTP API, service/worker/ handles
  background jobs — each with distinct responsibilities and bounded contexts.'
