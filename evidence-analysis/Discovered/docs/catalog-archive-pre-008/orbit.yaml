review_notes: 'Evidence for Modular Monolith: single `./docker/server/Dockerfile`,
  single `docker-compose.yml`, single Helm chart (`./charts/orbit/`), single `build.gradle.kts`
  at root with `settings.gradle.kts` coordinating all modules — classic Gradle multi-project
  monolith. Modules (`orbit-server`, `orbit-client`, `orbit-proto`, `orbit-shared`,
  `orbit-util`, `orbit-server-etcd`, `orbit-server-prometheus`, `orbit-application`)
  are internal build units, not independently deployed services. Layered signals:
  `orbit-application`, `orbit-server`, `orbit-client`, `orbit-shared` suggest presentation/application/infrastructure
  layering within the monolith. gRPC via `orbit-proto` is client-server actor protocol,
  not microservice inter-communication.'
