review_notes: 'Strong evidence for Event-Driven: Core/Events/ directory with EventBus,
  IEventHandler, IEventBatchHandler, EventEnvelope, domain events, IExternalEvent;
  process managers (Core/ProcessManagers/); event store integrations (Marten, EventStoreDB).
  Strong CQRS signals: separate Core/Commands/ and Core/Queries/ directories, ICommandBus/IQueryBus,
  ICommandHandler/IQueryHandler, InMemoryCommandBus, QueryBus. DDD signals: Core/Aggregates/
  with IAggregate/Aggregate base, Core/Decider/, Core/ProcessManagers/, domain event
  classes throughout samples. Repository is a monorepo of multiple sample projects
  (not independently deployable services), so Microservices is not appropriate despite
  Docker Compose presence — these are infrastructure dependencies (Marten/EventStoreDB/Kafka/RabbitMQ),
  not separate application services.'
