review_notes: 'Primary style is Multi-Agent: the entire framework is built around
  autonomous actors (agents) that communicate via message passing — `actor/` package,
  `Receive(context actor.Context)` pattern, actor lifecycle events (Started/Stopping/Stopped),
  supervision hierarchies, and spawn/send primitives. Event-Driven is strongly present:
  `eventstream/` package, pub/sub patterns in `cluster/pubsub*.go`, protobuf message
  definitions (`.proto` files throughout), gossip protocol in `cluster/gossip*.go`,
  and async message delivery. The cluster module (`cluster/clusterproviders/k8s`,
  `k8s`, `consul`, `etcd`, `zk`) and gRPC remoting support distributed deployment,
  but this is a framework/library rather than a deployed microservices application
  — the Microservices label fits the examples (e.g., `examples/cluster-grain/docker-compose.yml`,
  multi-node examples) but not the core architecture style. This is fundamentally
  a Multi-Agent + Event-Driven framework.'
