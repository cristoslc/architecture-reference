review_notes: 'Evidence: The repository contains a single monolithic structure with
  modules (core/, services/, model/, server-spi/, etc.) under a single Maven build.
  Only ONE Dockerfile for the main server exists in quarkus/container/. There is no
  evidence of multiple independently deployable services, no Kubernetes deployment
  manifests, no API gateway, and no message broker configuration (RabbitMQ/Kafka)
  visible. The existing classification incorrectly claims Microservices and Event-Driven
  - these are not supported by the actual structure. Keycloak uses Quarkus and has
  a Kubernetes operator, but the main application is a single deployable unit.'
