review_notes: 'Pipe-and-Filter: Nextflow''s fundamental programming model is dataflow/channel-based
  pipelines where processes consume and emit data through channels — confirmed by
  README (''based on the dataflow programming model''), test files (topic-channel.nf,
  collect-and-merge.nf, splitLetters.nf, subworkflow.nf), and the Henri Bal quote
  about dataflow variables. Modular Monolith: single Gradle multi-module build with
  a plugins/ directory containing nf-amazon, nf-azure, nf-google, nf-k8s, nf-wave,
  nf-tower, nf-seqera, nf-cloudcache, nf-codecommit, nf-console — each with their
  own build.gradle and VERSION, all part of one deployable system with no API gateway
  or service discovery. Event-Driven: messaging signals (3), reactive dataflow channels
  between processes, GPars concurrency library (mentioned in README credits) which
  is actor/dataflow-based; channel operators drive reactive data propagation. DDD
  dropped from primary styles — while ADRs exist (adr/ directory with 4 entries) and
  domain concepts (Process, Channel, Executor) are present, DDD is more of an organizational
  approach here rather than a structural pattern; the three primary styles are well-evidenced.
  Docker signals are for workflow task execution environments (tests/Dockerfile, docker/
  directory), not application decomposition.'
