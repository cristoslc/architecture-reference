review_notes: 'Evidence: (1) Microservices: Multiple independent services each with
  their own Dockerfile — backend/core-api/Dockerfile, backend/gateway/Dockerfile,
  frontend/core-ui/Dockerfile, apps/frontline-widgets/Dockerfile, apps/posclient-front/Dockerfile;
  API Gateway at backend/gateway/ using Apollo Router; 10+ distinct plugin APIs in
  backend/plugins/ (sales_api, frontline_api, accounting_api, etc.); per-service CI
  workflows in .github/workflows/ (ci-api-sales.yml, ci-api-gateway.yml, etc.). (2)
  Event-Driven: RabbitMQ listed as key technology; backend/services/automations and
  backend/services/logs are standalone event-processing services; BullMQ in tech stack
  for async job queues. (3) Modular Monolith: Nx monorepo (nx.json, pnpm-workspace.yaml)
  with well-bounded plugin modules; frontend/plugins/ and backend/plugins/ mirror
  each other; shared libraries in backend/erxes-api-shared/ and frontend/libs/; each
  plugin self-contained with its own GraphQL schema, tRPC endpoints, DB models, and
  UI remote (Module Federation micro-frontends). README explicitly states ''Nx Monorepo
  + Plugin Architecture + GraphQL Federation + Module Federation''.'
