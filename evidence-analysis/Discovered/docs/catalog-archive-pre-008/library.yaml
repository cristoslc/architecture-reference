review_notes: 'Evidence: (1) Single pom.xml + single Dockerfile confirms single deployable
  unit (Modular Monolith, not Microservices); (2) README explicitly states ''the system
  is a modular monolith'' with bounded contexts as packages; (3) README describes
  hexagonal architecture for the lending context with domain/application/infrastructure
  separation, enforced via ArchUnit tests (`model_should_not_depend_on_infrastructure`);
  (4) DDD signals: aggregates, domain events, repositories, value objects, bounded
  contexts, EventStorming-driven design from ddd-by-examples org; (5) Event-Driven:
  DomainEvents interface, JustForwardDomainEventPublisher, StoreAndForwardDomainEventPublisher
  with event store, both immediate and eventual consistency patterns; (6) CQRS: README
  explicitly mentions ''separate read and write models (CQRS)'' with Patron Profiles
  and Daily Sheets as examples; (7) docker-compose.yml for infrastructure wiring,
  not service orchestration'
