review_notes: 'Pipe-and-Filter: core abstraction is flows composed of tasks — sequential/parallel
  data processing stages with caching, retries, and state transitions; `src/prefect/tasks.py`,
  `src/prefect/flow_runs.py`, `src/prefect/task_runs.py`, `src/prefect/runner/`, `src/prefect/cache_policies.py`.
  Event-Driven: `src/prefect/server/events/` directory, event-based automations referenced
  in README, `src/prefect/server/task_queue.py`, `src/prefect/_internal/websockets.py`,
  deployment triggers reacting to events. Layered: the server is clearly layered —
  `src/prefect/server/api/` (presentation/REST), `src/prefect/server/orchestration/`
  (business logic), `src/prefect/server/models/` (data access), `src/prefect/server/database/`
  (persistence), `src/prefect/server/schemas/` (DTOs). Not Microservices: single deployable
  Python package with one Dockerfile, no service discovery, no API gateway splitting
  services. Not DDD: no explicit aggregates/bounded-context/value-object directories.'
