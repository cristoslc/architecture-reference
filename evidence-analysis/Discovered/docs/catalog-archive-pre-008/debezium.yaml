review_notes: 'Evidence: README explicitly states Debezium ''achieves its durability,
  reliability, and fault tolerance qualities by reusing Kafka and Kafka Connect''
  and ''recording them in one or more Kafka topics''. The connector modules (debezium-connector-postgres,
  debezium-connector-mongodb, debezium-connector-oracle, etc.) are Kafka Connect plugins,
  not independent microservices. Signal breakdown shows 38 messaging signals (Kafka-centric).
  The debezium-storage/ directory contains kafka, rocketmq storage implementations
  confirming event-driven architecture.'
