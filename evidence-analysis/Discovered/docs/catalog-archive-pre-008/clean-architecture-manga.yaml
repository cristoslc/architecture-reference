review_notes: 'Evidence: (1) accounts-api/src/ directory contains classic Hexagonal
  structure: Domain/ (entities, value objects, repository interfaces), Application/
  (use cases, services), Infrastructure/ (data access, external adapters), WebApi/
  (presentation); (2) Domain layer has IAccountRepository.cs (port), ValueObjects/,
  Credits/, Debits/ directories showing DDD patterns; (3) WebApi Dockerfile copies
  all four layer projects into single deployable confirming Modular Monolith; (4)
  docker-compose.yml orchestrates single API + SPA + IdentityServer + SQL Server (not
  microservices); (5) README explicitly documents Architecture Styles including Hexagonal/Onion/Clean
  Architecture and DDD patterns (Value Object, Entity, Aggregate Root, Repository)'
