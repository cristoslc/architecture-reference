review_notes: 'Evidence strongly points to Modular Monolith + Layered, NOT Microservices:
  (1) README explicitly states ''runs as a single Linux binary'' — the definitive
  signal against microservices; (2) docker-compose.yaml shows a single ''mattermost-server''
  process deployed as leader/follower/follower2 replicas (horizontal scaling of one
  binary) behind nginx, with all other containers being infrastructure dependencies
  (postgres, redis, elasticsearch, minio, etc.) — not independently deployed business
  services; (3) server/platform/services/ contains internal service modules (cache,
  searchengine, remotecluster, sharedchannel, telemetry, imageproxy, etc.) all co-located
  in a single Go module (server/go.mod) — classic modular monolith with bounded internal
  modules; (4) server/platform/shared/ provides shared cross-cutting concerns (mail,
  filestore, mfa, templates); (5) webapp/channels/src/ shows traditional React layering:
  stores/, utils/, plugins/, types/ — a layered frontend; (6) The cluster setup (MM_CLUSTERSETTINGS_ENABLE)
  confirms this is a single binary running in clustered mode, not separate microservices;
  (7) RabbitMQ in catalog was likely from plugin/integration tooling, not core inter-service
  messaging; Event-Driven signals are weak and not structural.'
