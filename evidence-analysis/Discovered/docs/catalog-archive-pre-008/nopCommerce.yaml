review_notes: 'Evidence: (1) Modular Monolith — single Dockerfile at root, `src/Plugins/`
  directory with 30+ independently scoped plugins (ExternalAuth, Payments, Shipping,
  Tax, Widgets, etc.), single deployable unit with no service discovery or API gateway;
  (2) Layered — `src/Libraries/Nop.Core`, `src/Libraries/Nop.Services`, `src/Libraries/Nop.Data`
  form classic Core/Service/Data layers, `src/Presentation/Nop.Web` and `Nop.Web.Framework`
  form the presentation layer — textbook N-Tier; (3) Event-Driven — RabbitMQ listed
  as key technology, 64 messaging signals detected, docker-compose.yml + multiple
  DB variants (mysql-docker-compose.yml, postgresql-docker-compose.yml) support event
  bus integration; (4) DDD — e-commerce bounded contexts (catalog, orders, customers,
  payments, shipping, tax) visible in plugin and service naming; no Kubernetes/Helm
  or multiple independent Dockerfiles, ruling out Microservices'
