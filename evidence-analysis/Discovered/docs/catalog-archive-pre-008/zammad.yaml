review_notes: 'Evidence for Modular Monolith: single Ruby/Rails codebase with app/models,
  app/policies, app/mailers organized by domain concepts (ticket, user, organization,
  knowledge_base, channel, sla, etc.) — all within one deployable unit. Docker Compose
  (not Kubernetes/Helm per-service) for deployment. No separate service directories
  or per-service Dockerfiles visible. Evidence for Event-Driven: RabbitMQ listed as
  key technology, app/models/transaction directory suggests background transaction/event
  processing, app/models/webhook.rb indicates async event dispatching, CI/CD signals
  confirm automated deployment pipeline. DDD excluded as a primary style despite Rails
  domain modeling conventions — the directory structure reflects standard Rails MVC
  rather than explicit DDD constructs (no aggregates/, bounded-context directories,
  or value objects). Note: README mentions Helm chart for Kubernetes at zammad/zammad-helm
  (separate repo), so the core repo remains a monolith.'
