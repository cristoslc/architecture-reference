  - "No deployment or infrastructure view describing cloud hosting, scaling, or operational topology."
  - "Diagrams are limited to high-level component views without detailed interaction flows."
one_line_summary: "A pragmatic AI grading system that deliberately rejects RAG in favor of raw LLM reasoning with multi-agent viewpoint scoring, relational DB caching, configurable AI/human allocation, and detailed financial projections."
