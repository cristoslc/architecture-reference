# catalog-schema.yaml — Output schema for discovered architecture catalog entries
#
# Entries produced by /discover-architecture must conform to this schema.
# Compatible with existing evidence-analysis/*/docs/catalog/*.yaml entries.
#
# Required fields are marked (required). All others are optional but encouraged.

# --- Identity ---
project_name: ""              # (required) Human-readable project name
source: "Discovered"          # (required) Always "Discovered" for auto-generated entries
source_url: ""                # Git remote URL if available
project_url: ""               # Git remote URL or local path analyzed
evidence_type: "automated-discovery"  # (required) Distinguishes from manual entries

# --- Discovery metadata ---
discovered_at: ""             # (required) ISO 8601 timestamp of analysis
discovered_by: "discover-architecture"
discovery_version: "1.0.0"

# --- Classification ---
domain: ""                    # (required) e.g., "E-Commerce", "Developer Tools", "Healthcare"
language: ""                  # (required) Primary language (e.g., "TypeScript", "Go", "C#")
languages:                    # All detected languages
  - ""
architecture_styles:          # (required) From the 12 canonical styles:
  - ""                        #   Event-Driven, Microservices, Modular Monolith,
                              #   Service-Based, Domain-Driven Design, CQRS,
                              #   Space-Based, Hexagonal Architecture, Serverless,
                              #   Layered, Pipe-and-Filter, Multi-Agent
key_technologies:
  - ""
quality_attributes:           # Detected or inferred from signals
  - ""

# --- Assessment ---
notable_strengths:
  - ""
notable_gaps:
  - ""
one_line_summary: ""          # (required) Concise architecture description

# --- Confidence ---
discovery_metadata:
  confidence: 0.0             # (required) 0.0-1.0 overall classification confidence
  signals_detected: 0         # (required) Number of architecture signals found
  signals_evaluated: 0        # (required) Total signals checked
  classification_method: "heuristic+llm"
  primary_style_confidence: 0.0   # Confidence in the first listed style
  signal_breakdown:           # Per-category signal counts
    package_manifests: 0
    container_orchestration: 0
    infrastructure_as_code: 0
    messaging: 0
    api_specs: 0
    adrs: 0
    ci_cd: 0
    test_structure: 0
    documentation: 0
    directory_structure: 0

# --- Canonical architecture styles ---
# The 12 canonical styles recognized by the reference library.
# Discovery output MUST use these exact names in architecture_styles.
#
# Style                    | Key signals
# -------------------------|--------------------------------------------
# Event-Driven             | Message broker configs, event schemas, async handlers
# Microservices            | Multiple deployables, service discovery, API gateway
# Modular Monolith         | Single deployable, well-defined module boundaries, internal messaging
# Service-Based            | Coarse-grained services, shared database possible
# Domain-Driven Design     | Bounded contexts, aggregates, domain layer separation
# CQRS                     | Separate read/write models, command/query separation
# Space-Based              | In-memory data grid, processing units, virtualized middleware
# Hexagonal Architecture   | Ports and adapters, dependency inversion, clean layers
# Serverless               | Function-as-a-Service configs, event triggers, no server management
# Layered                  | Traditional N-tier: presentation, business, data layers
# Pipe-and-Filter          | Processing stages, data transformation pipelines
# Multi-Agent              | Autonomous agents, coordination protocols, agent-based processing
