production_scale: "Self-described as 'the most popular open-source ASP.NET Core e-commerce platform.' Powers thousands of online stores worldwide. Over 4 million downloads. Active marketplace with 1,500+ plugins and themes. Commercial support available."
has_running_code: true
has_tests: true
has_ci_cd: true
has_documentation: true
has_plugin_system: true
notable_strengths:
  - "Mature plugin architecture with 1,500+ marketplace plugins: payment gateways, shipping providers, tax calculators, themes, and feature extensions all loaded dynamically"
  - "Four-layer architecture (Presentation → Services → Data → Core) with clear dependency direction"
  - "Multi-store from a single installation: one admin panel managing multiple storefronts with shared or independent catalogs, customers, and settings"
  - "Multi-vendor marketplace support: multiple independent sellers within a single store"
  - "17+ years of continuous development (since 2008) — one of the longest-running .NET open-source projects, demonstrating architectural longevity"
  - "Redis-backed distributed caching layer for session, output, and object caching"
  - "Task scheduling via Hangfire for background operations (email queuing, inventory sync, import/export)"
  - "Database provider abstraction: supports SQL Server, PostgreSQL, and MySQL with the same codebase"
notable_gaps:
  - "Server-side Razor rendering means no modern SPA or headless experience out of the box (API-first is retrofitted)"
  - "Monolithic deployment: all features ship together regardless of whether a store needs them"
  - "Plugin quality varies widely across the marketplace — no enforced architectural standards for third-party plugins"
  - "Performance under high concurrency requires careful Redis and database tuning"
  - "Migration from older versions can be complex due to schema evolution over 17 years"
one_line_summary: "The most popular .NET open-source e-commerce platform with a 1,500+ plugin marketplace, multi-store/multi-vendor support, four-layer architecture, and 17 years of continuous development demonstrating long-term architectural durability."
