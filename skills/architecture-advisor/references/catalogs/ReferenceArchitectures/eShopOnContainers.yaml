notable_strengths:
  - "Canonical Microsoft microservices reference — companion to the official .NET Microservices Architecture book"
  - "Demonstrates multiple bounded contexts (Catalog, Ordering, Basket, Identity) with clear domain boundaries"
  - "Event bus abstraction with both RabbitMQ and Azure Service Bus implementations"
  - "CQRS pattern in Ordering microservice with MediatR command/query separation"
  - "API Gateway pattern using Envoy for BFF (Backend-for-Frontend)"
  - "Full Docker Compose and Kubernetes deployment configurations"
  - "gRPC for inter-service synchronous communication alongside asynchronous events"
notable_gaps:
  - "Archived in 2023; no longer actively maintained (succeeded by dotnet/eShop)"
  - "No ADRs documenting why specific patterns were chosen"
  - "Complex local setup requiring Docker with significant resource requirements"
one_line_summary: "Microsoft's canonical .NET microservices reference demonstrating DDD bounded contexts, CQRS with MediatR, event-driven integration via RabbitMQ/Azure Service Bus, and API Gateway with Envoy — companion to the official architecture book."
