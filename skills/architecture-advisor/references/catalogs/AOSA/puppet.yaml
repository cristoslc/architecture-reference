project_name: "Puppet"
source: "AOSA"
source_url: "https://aosabook.org/en/v2/puppet.html"
project_url: "https://github.com/puppetlabs/puppet"
evidence_type: "book-chapter"
aosa_volume: 2
aosa_chapter_authors: ["Luke Kanies"]
year_described: 2012
domain: "Infrastructure / Configuration Management"
architecture_styles:
  - "Declarative Configuration"
  - "Client-Server"
key_technologies:
  - "Ruby"
  - "Puppet DSL"
  - "Facter (system fact collection)"
  - "PuppetDB"
  - "SSL/TLS certificates"
  - "REST API"
quality_attributes:
  - "Idempotency"
  - "Scalability"
  - "Auditability"
  - "Convergence"
production_scale: "Manages infrastructure at tens of thousands of organizations including Google, Red Hat, and Cisco; handles millions of nodes globally"
notable_strengths:
  - "Declarative resource model: users describe desired state, not procedural steps — the system converges to that state idempotently"
  - "Resource Abstraction Layer (RAL) separates what (resource type) from how (provider), enabling cross-platform support"
  - "Catalog compilation: Puppet DSL is compiled into a directed acyclic graph of resources with dependency edges"
  - "Agent-master architecture with SSL certificate-based authentication and authorization"
  - "Facter provides a pluggable system for collecting node facts, enabling conditional configuration"
  - "Transactional application: changes are applied atomically with rollback on failure"
notable_gaps:
  - "Ruby-based agent has higher resource overhead compared to newer Go-based tools (Ansible is agentless)"
  - "Puppet DSL has a learning curve distinct from general-purpose languages"
  - "Master can become a bottleneck in very large deployments (addressed by PuppetDB and compile masters)"
one_line_summary: "A declarative configuration management system where infrastructure is described as a graph of typed resources compiled from a custom DSL, with agents converging nodes to desired state idempotently via SSL-authenticated client-server communication."
