# AOSA Evidence Catalog Schema
# =============================
# Adapted from TheKataLog catalog schema for book-based evidence.
# Source: "The Architecture of Open Source Applications" (aosabook.org)
#
# Key differences from TheKataLog schema:
#   - No competition fields (placement, season, kata_challenge)
#   - Adds: source, source_url, project_url, evidence_type, domain
#   - architecture_styles uses the same normalized vocabulary as TheKataLog
#
# Required fields:
#   project_name, source, source_url, evidence_type, architecture_styles,
#   one_line_summary
#
# Optional fields:
#   project_url, domain, aosa_volume, aosa_chapter_authors,
#   key_technologies, quality_attributes, diagram_types,
#   notable_strengths, notable_gaps, production_scale,
#   year_described

# --- Example entry ---
# project_name: "NGINX"
# source: "AOSA"
# source_url: "https://aosabook.org/en/v2/nginx.html"
# project_url: "https://github.com/nginx/nginx"
# evidence_type: "book-chapter"          # book-chapter | reference-implementation | cloud-pattern
# aosa_volume: 2
# aosa_chapter_authors: ["Andrew Alexeev"]
# year_described: 2012
# domain: "Web Infrastructure"
# architecture_styles:
#   - "Event-Driven"
#   - "Pipeline"
# key_technologies: [...]
# quality_attributes: [...]
# production_scale: "Serves ~30% of all websites worldwide"
# notable_strengths: [...]
# notable_gaps: [...]
# one_line_summary: "..."
