one_line_summary: >-
  A single-binary Rust vector search engine organized as a Modular Monolith with a strict
  Layered request path (REST/gRPC → Dispatcher → Collection → Shard → Segment) and an
  optional Raft consensus overlay for distributed cluster deployments.
classification_reasoning: |
  ## Primary Style: Modular Monolith

  Qdrant compiles to a single binary from one `src/main.rs` entry point and is packaged
  in a single Docker image. There is exactly one [[bin]] target named `qdrant` (plus
  three debug-only utility binaries behind a feature flag). All functionality runs
  in-process with no network boundaries between internal components.

  Module boundaries are enforced at Rust compiler time through the Cargo workspace. The
  `lib/` directory contains fourteen crates whose `Cargo.toml` files declare explicit
  path dependencies in a strict unidirectional acyclic graph:

    api → storage ← collection ← shard ← segment
                                          ├── quantization
                                          ├── sparse
                                          ├── gridstore
                                          └── posting_list
    common/* (leaf, depended on by all layers)

  No lower-level crate imports a higher-level crate. Rust's visibility system
  (pub(crate), pub(super)) reinforces boundaries at every API surface. This is the
  textbook definition of a modular monolith: single deployable unit, compiler-enforced
  module seams.

  ## Secondary Style: Layered

  Within the monolith, a clear five-tier horizontal stack carries every request:

  - API layer: src/actix/api/, src/tonic/api/ — HTTP/gRPC parsing, auth, CORS, TLS
  - Dispatcher/Service: lib/storage/src/dispatcher.rs, content_manager/toc/ —
    operation routing; consensus proposal injection when cluster mode is enabled
  - Collection/Domain: lib/collection/src/ — collection lifecycle, shard fan-out,
    replica management, WAL, update handler, background optimizers
  - Shard/Data: lib/shard/src/, local_shard/ — segment holder, WAL, search batching
  - Segment/Storage: lib/segment/src/ — HNSW graph index, payload index, vector
    storage (dense, sparse, multi-dense), mmap, quantization

  No layer calls upward to a higher layer. ShardOperation trait (shard_trait.rs) defines
  both update() and core_search() on the same interface, confirming no CQRS separation.

  ## Distributed Overlay: Raft Consensus (Not a Style)

  When cluster mode is enabled, Qdrant runs a Raft thread (src/consensus.rs using the
  raft crate). This thread receives ConsensusOperations via in-process mpsc channels and
  replicates collection metadata changes across peer nodes. Shard data is replicated by
  ReplicaSet in lib/collection/ via gRPC RemoteShard calls. Cluster peers run the
  identical monolithic binary — they are replicas, not decomposed services.

  ## Rejected Styles

  - Microservices: single binary, single Docker image. Cluster nodes are identical
    replicas of the same monolith, not decomposed services.
  - Event-Driven: no message broker. WAL and Raft are durability/consensus mechanisms,
    not async event streams. events.rs defines internal struct signals, not an event bus.
  - Service-Based: no coarse-grained independently deployed service decomposition.
  - CQRS: read and write share the same segment infrastructure.
  - Microkernel: no runtime plugin loading; feature flags select compiled-in code paths.
  - Pipeline: no stage-based transformation topology.
  - Space-Based: persistent on-disk mmap segments, not a distributed in-memory data grid.
  - Serverless: long-lived persistent process.
  - Hexagonal: REST and gRPC handlers are API-layer modules, not named ports/adapters.
  - DDD: organized around technical concerns (segment, shard, vector), not business domains.
