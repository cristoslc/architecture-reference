review_notes: |
  Official reference implementation for Vaughn Vernon's "Implementing Domain-Driven Design" (2013).
  Primary topology is Modular Monolith: single Gradle multi-project build, no independent deployment,
  no network boundary between the three bounded contexts (iddd_agilepm, iddd_collaboration,
  iddd_identityaccess). Cross-context integration is via RabbitMQ listeners or shared iddd_common
  library — all within one process. DDD, Hexagonal Architecture, CQRS, and Event Sourcing are
  design approaches/data patterns applied within the monolith, correctly classified as
  architecture_qualifiers rather than topology-defining styles per ADR-006.
classification_reasoning: |
  ## Architecture Classification: IDDD_Samples

  ### Topology: Modular Monolith (primary, confidence 0.97)

  The entire system is defined in a single Gradle multi-project build (`settings.gradle`
  includes `iddd_agilepm`, `iddd_collaboration`, `iddd_identityaccess`, `iddd_common`).
  There is no independent deployment mechanism, no service registry, no API gateway, and no
  network boundary between bounded contexts. Cross-context communication is handled by
  RabbitMQ message listeners that run within the same JVM process and share `iddd_common`
  infrastructure. This is the canonical definition of a Modular Monolith: a single deployable
  unit with well-defined internal module boundaries enforced by Gradle project references.

  Each Gradle sub-project represents a hard compile-time module boundary — a context can only
  access another context's types by declaring an explicit `compile project(...)` dependency in
  `build.gradle`. The only shared dependency is `iddd_common`, which functions as the DDD
  shared kernel. No context reaches into another's domain model directly.

  ### Rejected Styles

  **Not Microservices**: No independent deployment, no per-context API, no service discovery.
  All three contexts compile and run together. The README requires a single MySQL instance and
  single RabbitMQ broker — not per-service infrastructure.

  **Not Service-Based**: Service-Based requires coarse-grained services with independent
  deployment sharing a database. Here there is no independent deployment; the contexts share
  infrastructure libraries and are co-located in one process.

  **Not Layered (pure)**: While there are application/domain/infrastructure layers within each
  context, the primary organizing principle is bounded-context modularization, not horizontal
  layering across the whole system. The Hexagonal / ports-and-adapters pattern supersedes
  classic N-tier Layered style within each context.

  **Not Event-Driven (topology)**: While domain events and RabbitMQ are used, the overall
  system does not decompose into event processors. Events are used as a cross-context
  integration mechanism within a monolith, not as the primary topology-defining pattern.

  ---

  ### Design Approach: Domain-Driven Design (confidence 0.98)

  The repository is the official companion code for Vaughn Vernon's *Implementing Domain-Driven
  Design* (2013). Every bounded context implements the full suite of DDD tactical patterns:

  **Bounded Contexts (Gradle modules):**
  - `iddd_agilepm` — Agile Project Management (products, backlog items, sprints, releases, teams)
  - `iddd_collaboration` — Collaboration (forums, discussions, calendars, calendar entries)
  - `iddd_identityaccess` — Identity & Access (tenants, users, groups, roles)
  - `iddd_common` — Shared Kernel (entity base classes, domain event infrastructure, event store,
    notification log, RabbitMQ adapter base, persistence utilities)

  **Aggregate Roots:**
  - `Product extends Entity` (`iddd_agilepm`) — publishes `ProductCreated`, `ProductReleaseScheduled`
  - `Calendar extends EventSourcedRootEntity` (`iddd_collaboration`) — event-sourced aggregate
  - `User extends ConcurrencySafeEntity` (`iddd_identityaccess`) — publishes `UserRegistered`,
    `UserPasswordChanged`, `UserEnablementChanged` via `DomainEventPublisher.instance().publish(...)`

  **Value Objects:**
  - `TenantId`, `ProductId`, `CalendarId`, `EmailAddress`, `FullName`, `PostalAddress` — all
    immutable, identity-carrying or behavior-enriched value types extending `AbstractId` or
    `IdentifiedValueObject`.

  **Domain Services:**
  - `AuthenticationService` (identity context) — domain service for user authentication logic
  - `GroupMemberService` — traverses group membership for authorization
  - `CollaboratorService` (collaboration context) — translates identity context user data to
    Collaborator value objects

  **Repository Interfaces in Domain Layer:**
  - `ProductRepository`, `BacklogItemRepository`, `ReleaseRepository` (agilepm domain)
  - `CalendarRepository`, `ForumRepository`, `DiscussionRepository` (collaboration domain)
  - `UserRepository`, `GroupRepository`, `RoleRepository`, `TenantRepository` (identityaccess domain)
  All implemented in the port/adapter or infrastructure layer.

  **Domain Event Infrastructure:**
  - `DomainEvent` interface and `DomainEventPublisher` (thread-local singleton) in `iddd_common`
  - `DomainEventSubscriber<T>` for typed subscriptions
  - `StoredEvent` and `EventStore` for event persistence and notification log publication

  ---

  ### Design Approach: Hexagonal Architecture / Ports and Adapters (confidence 0.95)

  All three contexts explicitly organize secondary adapters under `port/adapter/` packages,
  separated from the domain model:

  **agilepm port/adapter:**
  - `port/adapter/persistence/` — `LevelDBProductRepository`, `LevelDBBacklogItemRepository`,
    `LevelDBSprintRepository`, `LevelDBTeamRepository` (all implement domain repository interfaces)
  - `port/adapter/messaging/rabbitmq/` — 8 RabbitMQ `ExchangeListener` subclasses handling
    cross-context events (e.g., `RabbitMQDiscussionStartedListener` updates `Product` discussion state)
  - `port/adapter/messaging/sloth/` — SlothMQ equivalents for development/testing without RabbitMQ

  **collaboration port/adapter:**
  - `port/adapter/persistence/repository/` — `EventStoreCalendarRepository`,
    `EventStoreForumRepository`, `EventStoreDiscussionRepository` (write-side)
  - `port/adapter/persistence/view/` — `MySQLCalendarProjection`, `MySQLForumProjection`,
    `MySQLDiscussionProjection`, `MySQLCalendarEntryProjection`, `MySQLPostProjection` (read-side)
  - `port/adapter/messaging/RabbitMQEventDispatcher` — re-publishes domain events to RabbitMQ
  - `port/adapter/event/FollowStoreEventDispatcher` — follows event store for projection catchup

  **identityaccess port/adapter + infrastructure:**
  - `infrastructure/persistence/` — `HibernateUserRepository`, `HibernateGroupRepository`,
    `HibernateRoleRepository`, `HibernateTenantRepository`
  - `infrastructure/services/MD5EncryptionService` — implements domain `EncryptionService` port
  - `resource/` — JAX-RS REST resources (`UserResource`, `GroupResource`, `TenantResource`,
    `NotificationResource`) as primary port (inbound adapter)

  Application services (`ProductApplicationService`, `CalendarApplicationService`,
  `IdentityApplicationService`, `AccessApplicationService`) serve as the primary ports, receiving
  commands from the REST layer or messaging listeners and delegating to domain objects via repository
  and domain service interfaces.

  ---

  ### Data Pattern: CQRS + Event Sourcing (iddd_collaboration, confidence 0.97)

  README explicitly states: "The iddd_collaboration project uses Event Sourcing and CQRS."

  **Write Model (Event Sourcing):**
  All collaboration aggregates extend `EventSourcedRootEntity` from `iddd_common`. State changes
  are recorded by calling `this.apply(new SomeDomainEvent(...))`, which adds the event to
  `mutatingEvents` and invokes the corresponding `protected void when(SomeDomainEvent)` mutator
  via reflection. The `EventStoreCalendarRepository` persists the event stream to LevelDB and
  reconstitutes aggregates by replaying events via the `Calendar(List<DomainEvent>, int)` constructor.

  **Read Model (CQRS Projections):**
  Five `MySQLXxxProjection` classes implement `EventDispatcher` and maintain denormalized MySQL
  view tables (`tbl_vw_calendar`, `tbl_vw_forum`, `tbl_vw_discussion`, `tbl_vw_post`, etc.).
  Each projection is idempotent (checks for existence before insert). The `MySQLProjectionDispatcher`
  coordinates which projection handles which event type.

  **Query Services:**
  `CalendarQueryService`, `CalendarEntryQueryService`, `ForumQueryService`, `DiscussionQueryService`,
  and `PostQueryService` all extend `AbstractQueryService` and issue raw JDBC queries against the
  MySQL view tables, returning lightweight `*Data` DTO objects to the application layer.

  **Two Stores, One Thread:**
  README notes: "To keep the example simple it persists the Event Sourced write model and the CQRS
  read model in one thread. Since two different stores are used — LevelDB for the Event Journal and
  MySQL for the read model — there may be very slight opportunities for inconsistency."

  ---

  ### Summary

  IDDD_Samples is the definitive reference for DDD, Hexagonal Architecture, CQRS, and Event
  Sourcing in Java. Its topology is a Modular Monolith — three bounded contexts in a single Gradle
  build, communicating via RabbitMQ listeners and shared kernel — with DDD, Hexagonal, CQRS, and
  Event Sourcing as design approaches layered on top of that topology. The architecture is
  intentionally didactic rather than production-grade, demonstrating how each pattern fits together
  within bounded context boundaries.
