one_line_summary: "An ASP.NET Core open-source e-commerce platform organized as a Microkernel with a first-class runtime plugin system layered over a strict four-tier dependency graph (Core / Data / Services / Presentation), deploying as a single monolithic process."
classification_reasoning: "nopCommerce exhibits a three-style composition: Microkernel as primary, Layered and Modular Monolith as secondary.\n\nMICROKERNEL (primary, 0.92): The dominant architectural force is a first-class, runtime-loadable plugin system. IPlugin defines the lifecycle contract (InstallAsync, UninstallAsync, UpdateAsync). 31 in-tree plugins across payment (IPaymentMethod), shipping (IShippingRateComputationMethod), tax (ITaxProvider), authentication (IExternalAuthenticationMethod), widgets (IWidgetPlugin), search (ISearchProvider), and miscellaneous (IMiscPlugin) categories. PluginManager<TPlugin> orchestrates assembly-level discovery — plugins compile as separate projects, output to Nop.Web/Plugins/, and are loaded at startup via WebAppTypeFinder scanning AppDomain. Each plugin has a plugin.json descriptor (SystemName, Version, SupportedVersions, Group). Widget zones (IWidgetPlugin.GetWidgetZonesAsync, GetWidgetViewComponent) provide named injection points into Razor views. Payment/shipping/tax plugins implement strategy interfaces consumed by IOrderProcessingService and IShoppingCartService — core logic never depends on specific implementations. PluginManager<TPlugin> applies per-customer-role and per-store plugin visibility for multi-store support.\n\nLAYERED (secondary, 0.90): Strict four-layer dependency chain enforced by project references. Nop.Core (domain entities, events, abstractions) has no outbound project references. Nop.Data references only Nop.Core; encapsulates all database access via IRepository<TEntity>, INopDataProvider, and FluentMigrator migrations for MSSQL/MySQL/PostgreSQL. Nop.Services references Core+Data; implements business logic across 41 service namespaces. Nop.Web.Framework and Nop.Web sit at the top. No reverse references — compile-time enforced. EntityRepository<TEntity> publishes EntityInsertedEvent/EntityUpdatedEvent/EntityDeletedEvent on every CRUD, decoupling cross-cutting concerns via the event bus without violating layer boundaries.\n\nMODULAR MONOLITH (secondary, 0.82): Deploys as a single ASP.NET Core process from Nop.Web/Program.cs. All plugins and core share a single database and single IRepository<TEntity> abstraction. NopEngine bootstraps a unified Autofac (or built-in) DI container scanning all assemblies including plugins. INopStartup implementations across core and plugins contribute services and middleware to the same pipeline in deterministic Order. Plugins are full .NET projects in NopCommerce.sln and call core service interfaces directly — no HTTP or message-broker inter-plugin communication. Docker Compose shows one web container plus one database container, not a service mesh.\n\nRULED OUT - Microservices: Single deployable unit, shared database and DI container, assembly-level plugin loading. No inter-service HTTP calls, no service registry, no independent deployment per plugin.\n\nRULED OUT - Event-Driven (primary): IEventPublisher/EventPublisher is in-process and synchronous (sequential consumer loop). No message broker present. The event bus (245 event files, 162 consumer files, IConsumer<T>) is a Microkernel extension hook, not the primary integration topology.\n\nRULED OUT - CQRS: No ICommand/IQuery split, no MediatR, no separate read/write models or data stores.\n\nRULED OUT - Hexagonal/DDD: Domain entities in Nop.Core.Domain are anemic (properties only); no aggregate roots, value objects, or bounded contexts. Services follow Transaction Script style. No formal ports/adapters boundary.\n\nQUALITY ATTRIBUTES evidence: Extensibility — 31 in-tree plugins; typed plugin interfaces; IConsumer<T> event subscriptions; named widget zones; per-store and per-customer-role plugin visibility. Maintainability — compile-time enforced four-project layer graph; interface-per-service; AutoMapper; FluentMigrator schema versioning. Scalability — Redis and SQL Server distributed cache via DistributedCacheConfig; web farm support; fully async/await throughout; configurable server GC. Portability — INopDataProvider abstraction for MSSQL/MySQL/PostgreSQL; cross-OS; official Docker support. Security — built-in MFA; ASP.NET Core Data Protection; HTTPS enforcement; customer-role ACL; entity-level audit events. Testability — Nop.Tests with SQLite-backed SqLiteNopDataProvider for in-process service tests."
