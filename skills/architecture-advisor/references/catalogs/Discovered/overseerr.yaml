classification_reasoning: "## Architecture Classification Analysis\n\n### Primary
  Style: Layered (0.91)\n\nOverseerr is organized as a textbook horizontal-layer stack
  within a single deployable Node.js process. The layers are:\n\n1. **Presentation
  Layer** — Next.js React SPA in `src/pages/` and `src/components/`. Server-side
  rendering runs in the same process via `next()` at `server/index.ts:43`.\n\n2.
  **API Layer** — Express router tree under `server/routes/` (14 feature sub-routers
  mounted at `/api/v1`). All routes are validated against `overseerr-api.yml` via
  `express-openapi-validator`. Session authentication middleware (`checkUser`, `isAuthenticated`)
  enforces access control at this layer.\n\n3. **Business Logic / Integration Layer**
  — `server/lib/` (NotificationManager with 10 pluggable agents, permission system,
  scanner infrastructure, settings singleton, download tracker, watchlist sync) and
  `server/subscriber/` (TypeORM `@EventSubscriber` hooks that drive the request lifecycle:
  auto-route to Radarr/Sonarr on approval, update media status, send notifications).
  `server/job/schedule.ts` manages 10 cron jobs (Plex scans, Radarr/Sonarr scans,
  availability sync, download sync, image cache cleanup).\n\n4. **Data Access Layer**
  — TypeORM entities in `server/entity/` (MediaRequest, Media, User, Issue, IssueComment,
  Season, SeasonRequest, Session, UserSettings, UserPushSubscription, DiscoverSlider)
  backed by a single SQLite database. 33 migration files in `server/migration/` manage
  schema evolution.\n\n5. **External Integration Layer** — `server/api/` contains
  an `ExternalAPI` base class with built-in response caching (node-cache, 5-minute
  TTL) and rate limiting (axios-rate-limit). Concrete clients: PlexAPI, PlexTV, RadarrAPI,
  SonarrAPI, TheMovieDb, Pushover, GitHub, AnimeLists, Tautulli. These are called
  synchronously by lib/ and subscriber/ code.\n\nDependency flow is strictly downward:
  routes -> lib/subscribers -> entities + API clients. The `server/index.ts` entrypoint
  wires all layers together in a single process.\n\n### Secondary Style: Modular Monolith
  (0.83)\n\nWithin the shared process and database, code is partitioned into feature-cohesive
  vertical modules: `auth`, `user`, `request`, `media`, `movie`, `tv`, `search`,
  `discover`, `issue`, `issueComment`, `collection`, `service`, `settings`. Each module
  owns its route file and corresponding entity or entities. All modules deploy together
  as one Docker image and share a single TypeORM DataSource. Internal coupling within
  modules (e.g., request -> MediaRequest entity -> MediaRequestSubscriber) is much tighter
  than cross-module coupling, which is limited to shared entities.\n\n### What Was
  Rejected\n\n**Not Microservices:** One process, one port (5055), one SQLite file,
  one Docker image. The Next.js frontend and Express backend are not separately deployable.\n\n**Not
  Event-Driven:** TypeORM @EventSubscriber is an in-process synchronous ORM hook,
  not a message broker. NotificationManager iterates agents synchronously in the same
  thread. No message queues or event buses are used.\n\n**Not Hexagonal Architecture:**
  No formal ports/adapters contracts. ExternalAPI is an integration convenience class,
  not a domain-defined port. Business logic calls API clients directly without an
  inversion layer.\n\n**Not CQRS:** Reads and writes share the same TypeORM repositories.
  No read model or command/query segregation exists.\n\n**Not Pipeline:** Background
  cron scanners are a secondary maintenance feature; the primary application path is
  synchronous HTTP -> route -> subscriber -> DB save."
review_notes: Single Node.js process serving both Next.js SSR and Express REST API
  on port 5055; SQLite via TypeORM with 33 migrations; 10 notification agent plugins
  (Discord, Email, Gotify, LunaSea, Pushbullet, Pushover, Slack, Telegram, Webhook,
  WebPush); 10 cron jobs for Plex/Radarr/Sonarr scanning; OpenAPI spec enforced at
  runtime; Radarr and Sonarr integration dispatched asynchronously from TypeORM entity
  subscribers after request approval.
