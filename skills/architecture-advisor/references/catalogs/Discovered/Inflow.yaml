one_line_summary: A virtual payments reference application built as an explicitly modular monolith in .NET 6, where four autonomous
  bounded-context modules (Customers, Payments, Wallets, Users) share a single process and PostgreSQL server but communicate
  exclusively through an in-process event bus with transactional Outbox/Inbox, aggregate-rooted DDD domain models, and a Saga
  for cross-module business processes.
classification_reasoning: |
  MODULAR MONOLITH (primary, 0.97):

  The entire system boots as a single ASP.NET Core process from src/Bootstrapper/Inflow.Bootstrapper. Startup.cs calls ModuleLoader.LoadAssemblies() to discover all Inflow.Modules.* assemblies at runtime, then iterates each IModule to call Register() and Use() on the shared DI container and application pipeline. Every module .csproj carries ProjectReferences only to Inflow.Shared.Abstractions or Inflow.Shared.Infrastructure — no module references another module at the project or namespace level. Physical isolation is enforced at four levels: (1) separate project assemblies per module, (2) separate DbContext types per module with distinct PostgreSQL schemas (wallets, payments, customers, users), (3) local-contracts pattern prevents shared event DTOs, and (4) module-internal types declared internal with InternalsVisibleTo restricted to layers within the same module. The docker-compose.yml contains only PostgreSQL, confirming single-process deployment with no external broker.

  EVIDENCE:
  - ModuleLoader.LoadAssemblies() / LoadModules(): src/Shared/Inflow.Shared.Infrastructure/Modules/ModuleLoader.cs
  - Zero cross-module ProjectReference in any module .csproj file (verified across all 14 module projects)
  - WalletsDbContext.HasDefaultSchema("wallets"), PaymentsDbContext.HasDefaultSchema("payments"), CustomersDbContext.HasDefaultSchema("customers")
  - IModule interface with Name, Register(), Use(): src/Shared/Inflow.Shared.Abstractions/Modules/IModule.cs
  - Single docker-compose.yml with only PostgreSQL service

  EVENT-DRIVEN (secondary, 0.93):

  Inter-module communication is handled exclusively through the IMessageBroker abstraction. InMemoryMessageBroker routes published IMessage events in-process via ModuleClient.PublishAsync(), which performs a JSON serialization round-trip to enforce type boundary isolation — a module receives its own local contract type, not the publisher's type. This prevents accidental coupling through shared object graphs. Optional async dispatch is supported via AsyncMessageDispatcher backed by Channel<MessageEnvelope>. The shared infrastructure provides transactional Outbox and Inbox tables (EfOutbox, EfInbox via OutboxProcessor background job) for reliable at-least-once cross-module delivery. A dedicated Saga module implements the Chronicle saga pattern: NewCustomerBonusFundsSaga listens to CustomerVerified, WalletAdded, DepositCompleted, and FundsAdded events to orchestrate a new-customer bonus deposit flow across module boundaries with compensating actions.

  EVIDENCE:
  - InMemoryMessageBroker: src/Shared/Inflow.Shared.Infrastructure/Messaging/Brokers/InMemoryMessageBroker.cs
  - ModuleClient.PublishAsync() with JSON serialize/deserialize round-trip: src/Shared/Inflow.Shared.Infrastructure/Modules/ModuleClient.cs
  - EfOutbox, EfInbox, OutboxProcessor: src/Shared/Inflow.Shared.Infrastructure/Messaging/Outbox/
  - Local contracts e.g. Wallets module owns its own CustomerCompleted.cs: src/Modules/Wallets/Inflow.Modules.Wallets.Application/Owners/Events/External/CustomerCompleted.cs
  - NewCustomerBonusFundsSaga: src/Modules/Saga/Inflow.Modules.Saga.Api/Sagas/NewCustomerBonusFundsSaga.cs

  DOMAIN-DRIVEN DESIGN (secondary, 0.82):

  DDD tactical patterns are applied consistently within each module. The Wallets module exhibits the fullest expression: Wallet extends AggregateRoot<WalletId> with a domain-event collection and optimistic-concurrency Version counter. Rich aggregate behavior (TransferFunds, AddFunds, DeductFunds) enforces domain invariants (InsufficientWalletFundsException, InvalidTransferAmountException) inside the aggregate rather than in application services. Value objects (TransferName, TransferMetadata, OwnerName, TaxId, Currency, Amount) validate at construction. Domain repository interfaces (IWalletRepository) are declared in the Core domain layer; EF Core implementations live in the Infrastructure layer, respecting the dependency rule. The Wallets module uses a full four-layer structure (Core → Application → Infrastructure → Api) corresponding to a DDD-aligned Clean Architecture. The Customers module is simpler (Core + Api only) but still uses value objects (Name, Address, Identity) and a rich Customer entity with domain methods (Complete, Verify, Lock, Unlock). IDomainEvent and IDomainEventDispatcher abstractions in Inflow.Shared.Abstractions.Kernel confirm DDD as a first-class concern.

  EVIDENCE:
  - Wallet : AggregateRoot<WalletId> with IncrementVersion(): src/Modules/Wallets/Inflow.Modules.Wallets.Core/Wallets/Entities/Wallet.cs
  - AggregateRoot<T> base with IDomainEvent collection: src/Shared/Inflow.Shared.Abstractions/Kernel/Types/AggregateRoot.cs
  - IDomainEvent, IDomainEventDispatcher, IDomainEventHandler: src/Shared/Inflow.Shared.Abstractions/Kernel/
  - Value objects in Wallets.Core: TransferName, TransferMetadata, OwnerName, TaxId
  - Domain invariants raised as typed exceptions in aggregate: InsufficientWalletFundsException, InvalidTransferAmountException
  - IWalletRepository (Core) vs WalletRepository : IWalletRepository (Infrastructure): domain/infra separation

  CQRS WITHIN MODULES (0.88, supporting DDD secondary):
  Every module implements CQRS internally using ICommand / ICommandHandler and IQuery / IQueryHandler from the shared abstractions, with ICommandDispatcher and IQueryDispatcher routing. Commands mutate state and publish events; queries use separate read-side storage (IWalletStorage, ITransferStorage via EF projections). This is an implementation detail within each module rather than a top-level architectural style, so it supports the DDD secondary classification.

  REJECTED STYLES:

  Microservices: Single process, single deployment artifact, single PostgreSQL server. The README notes the microservices transition is a separate branch and separate repository (Inflow-micro), explicitly confirming this codebase is not microservices.

  Service-Based: Service-Based implies a small number (2-5) of coarse services that share a single database without schema isolation. Inflow has tighter module boundaries (schema isolation, local contracts, no direct DB sharing) and finer-grained decomposition than Service-Based implies.

  Hexagonal Architecture: While dependency inversion is used within modules (domain interfaces, infrastructure implementations), the defining characteristic of the overall system is module boundary enforcement, not port/adapter port mapping at the system level. Hexagonal ports/adapters exist within the DDD layers of individual modules but do not define the system topology.

  Layered: Organization is vertical by bounded context (module), with layers existing only inside each module. The top-level `src/Modules/` structure is horizontal by domain concern, not by technical layer (presentation/business/data).

  Pipeline: No data-transformation pipeline topology. The messaging system routes events but does not apply sequential filters or transformers.
