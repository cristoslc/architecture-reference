review_notes: 'Gitpod (now Ona) is a cloud-native developer environment platform built
  as a large-scale Microservices architecture deployed on Kubernetes. The system decomposes
  into 25+ independently deployable services, each with its own Go module or Node.js
  package, Docker image, and Kubernetes Deployment. Services communicate via gRPC
  (65 proto files, 55+ named services) synchronously and via Redis Pub/Sub for event
  fan-out asynchronously. The workspace execution plane (supervisor in-workspace daemon,
  workspacekit namespace isolation, ws-daemon node agent) forms a nested service topology
  within each workspace pod. The Event-Driven secondary style is the architectural
  mechanism enabling stateless horizontal scaling of the server layer: ws-manager-bridge
  converts gRPC Subscribe streams into Redis Pub/Sub events consumed by all server
  replicas. A partial shared-database antipattern exists (gitpod-db TypeORM layer
  shared by TypeScript services), but Go services access disjoint table sets via GORM,
  mitigating the violation. Confidence 0.93.'
classification_reasoning: "## Analysis\n\n### Primary Classification: Microservices\n\
  \n25+ independently deployable services, each with independent build artifact (go.mod\
  \ or package.json, leeway.Dockerfile), separate Kubernetes Deployment generated\
  \ by install/installer/ per-component deployers, and typed gRPC contracts. Services\
  \ are fine-grained by capability: ws-manager-mk2 (workspace lifecycle CRD controller),\
  \ content-service (workspace content storage with GCS/S3/MinIO backends), image-builder-mk3\
  \ (on-demand image building), registry-facade (composable OCI registry with IPFS),\
  \ supervisor (in-workspace gRPC init daemon), ws-daemon (node-level DaemonSet operator),\
  \ ws-proxy (WebSocket/SSH reverse proxy), public-api-server (gRPC-Connect gateway),\
  \ spicedb (Zanzibar-style authorization), usage (metering + Stripe billing). Polyglot:\
  \ TypeScript for control-plane services (server, ws-manager-bridge, dashboard),\
  \ Go for execution-plane services.\n\n### Secondary Classification: Event-Driven\n\
  \nWorkspace state propagation: ws-manager-mk2 emits via gRPC Subscribe streaming\
  \ RPC -> ws-manager-bridge publishes to Redis channels (WorkspaceInstanceUpdatesChannel,\
  \ PrebuildUpdatesChannel, HeadlessUpdatesChannel) -> all server replicas consume\
  \ via ioredis and forward to WebSocket clients. Event schema formalized in gitpod-protocol\
  \ shared types. This fan-out pattern is the mechanism enabling stateless horizontal\
  \ server scaling.\n\n### What This Is NOT\n\nNot Service-Based: 25+ fine-grained\
  \ services, not 2-5 coarse-grained domain services. Not Hexagonal: storage adapter\
  \ pattern local to content-service only, not system-wide. Not Modular Monolith:\
  \ services deploy as independent containers, not shared-process modules."
