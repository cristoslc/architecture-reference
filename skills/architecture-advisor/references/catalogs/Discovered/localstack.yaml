one_line_summary: "A cloud-service emulator structured as a Microkernel (central HandlerChain gateway + plux plugin-managed service providers) combined with a Modular Monolith (all ~35 AWS service implementations co-deployed in one Python package and Docker container)."
classification_reasoning: "LocalStack exhibits a two-style composition: Microkernel as primary (0.92), Modular Monolith as secondary (0.88).\n\nMICROKERNEL (primary, 0.92): The kernel is LocalstackAwsGateway (localstack/aws/app.py), a HandlerChain-based gateway that handles all cross-cutting concerns — authentication, CORS, codec, tracing, metrics, request routing — via ~20 ordered handler objects, but contains zero AWS service business logic. Every AWS service is a plugin registered under the `localstack.aws.provider` plux namespace and loaded lazily on first request by ServicePluginManager (localstack/services/plugins.py). plux.ini is the plugin manifest listing 40+ service providers, 100+ CloudFormation resource providers, and 8 additional plugin namespaces (runtime.components, runtime.server, hooks.*, extensions, packages, openapi.spec, lambda.runtime_executor). ServicePluginManager wraps plux.PluginManager with lazy-loading, per-service RLocks, and lifecycle state machines (STARTING, RUNNING, ERROR, STOPPED). Multiple provider variants per service (apigateway:default/legacy/next_gen, cloudformation:default/engine-legacy, events:v1/v2) demonstrate the ability to swap implementations without kernel changes. The Extension base class (localstack/extensions/api/extension.py) exposes a clean external plugin API: update_gateway_routes, update_request_handlers, update_response_handlers, on_platform_start, on_platform_ready — a canonical Microkernel extension surface. Lifecycle hooks (on_infra_start, on_infra_ready, on_infra_shutdown) are themselves plux plugins, extending kernel lifecycle without modifying core code.\n\nMODULAR MONOLITH (secondary, 0.88): All ~35 AWS service implementations live in a single Python package (localstack-core) and are co-deployed in one Docker container on a single port (4566). Services are separated by module boundaries (localstack/services/sqs/, localstack/services/sns/, etc.) with a consistent internal structure per service: provider.py (ServiceProvider implementation), models.py (state definitions), utils.py, resource_providers/. State is managed in-process via AccountRegionBundle / BaseStore (localstack/services/stores.py): per-account, per-region dictionaries held in process memory with no separate data tier. Cross-service calls use in-process connect_to() clients or direct imports, not network RPC. This is the defining distinction from Microservices: no database-per-service, no inter-service network bus, no independent deployability.\n\nEVENT-DRIVEN (ruled out as structural style): Event-driven patterns appear as emulated AWS service behavior — SNS publisher.py, Lambda event_manager.py with internal SQS-backed async queue, EventBridge scheduler/target routing — not as a structural principle of LocalStack's own runtime. LocalStack's runtime is synchronous HTTP request/response.\n\nMICROSERVICES (ruled out): Single process, single port, shared in-memory state, no per-service database, no inter-service network communication, no independent service deployment.\n\nLAYERED (ruled out): Organization is vertical by AWS service domain, not horizontal by technical layer. The HandlerChain handlers are cross-cutting infrastructure, not business logic tiers.\n\nKey structural files: localstack/aws/app.py (LocalstackAwsGateway kernel), localstack/services/plugins.py (ServicePluginManager plugin host), localstack/services/providers.py (@aws_provider() factory registration), plux.ini (plugin manifest), localstack/runtime/hooks.py (lifecycle hook plugin namespaces), localstack/extensions/api/extension.py (external plugin API), localstack/aws/skeleton.py (operation dispatch table generation)."
