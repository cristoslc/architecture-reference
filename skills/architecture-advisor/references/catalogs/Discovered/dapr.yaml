one_line_summary: A Microkernel sidecar runtime with a 137-plugin registry, deployed
  alongside independent Microservices control-plane components (operator, placement,
  sentry, scheduler, injector).
classification_reasoning: "## Architecture Classification Analysis\n\n### Primary:\
  \ Microkernel\n\nDapr's repository is a textbook Microkernel (Plugin) architecture.\
  \ The evidence is unambiguous across multiple structural layers.\n\n**1. Registry-per-capability\
  \ plugin system**\n\nEvery building block is managed through a typed registry in\
  \ `pkg/components/`: bindings, state, pubsub, secretstores, lock, crypto, nameresolution,\
  \ configuration, conversation, and middleware/http. The composite `pkg/runtime/registry/registry.go`\
  \ aggregates all ten into a single `Registry` struct held by the sidecar at startup.\n\
  \n**2. Build-time plugin self-registration via Go `init()`**\n\n`cmd/daprd/components/`\
  \ contains 137 Go source files. Each registers one concrete implementation into\
  \ the appropriate typed registry using Go's `init()` mechanism. The daprd entrypoint\
  \ triggers all registrations with a single anonymous import of the components package.\
  \ Build tags (`//go:build allcomponents || stablecomponents`) allow selective inclusion.\n\
  \n**3. Runtime-pluggable components via gRPC sockets**\n\n`pkg/components/pluggable/discovery.go`\
  \ implements socket-based discovery: at startup, daprd scans a Unix socket directory,\
  \ uses gRPC reflection to identify services, and dynamically wires them in as first-class\
  \ components. `pkg/components/pluggable/grpc.go` provides the `GRPCConnector[TClient]`\
  \ generic that wraps any gRPC client as a Dapr component. This extends the Microkernel\
  \ pattern to support out-of-process plugins without recompilation.\n\n**4. Stable\
  \ kernel API surface**\n\n`dapr/proto/runtime/v1/dapr.proto` defines 50+ RPC methods\
  \ (state CRUD, pub/sub, secret retrieval, actor invocation, workflow, distributed\
  \ lock, jobs, conversation) that application code calls — immutable regardless of\
  \ which plugins are loaded.\n\n**5. Stable plugin contracts**\n\n`dapr/proto/components/v1/`\
  \ defines protobuf interfaces (`state.proto`, `pubsub.proto`, `bindings.proto`,\
  \ `secretstore.proto`) as the plugin API that all runtime and socket-based implementations\
  \ must satisfy.\n\n### Secondary: Microservices\n\nDapr's control plane is six independently\
  \ deployable services: daprd (sidecar), operator (CRD management), placement (Raft-based\
  \ actor partition table), sentry (SPIFFE/X.509 CA), injector (Kubernetes mutating\
  \ webhook), and scheduler (job/cron service). Each has its own `cmd/` entrypoint,\
  \ its own gRPC API in `dapr/proto/`, and is a separate Kubernetes Deployment in\
  \ `charts/dapr/Chart.yaml`. Services communicate exclusively over protobuf-defined\
  \ gRPC.\n\n### Rejected Styles\n\n**Layered:** Layers exist (API / runtime / components)\
  \ but layering is not the primary organizing principle — the plugin registry mechanism\
  \ is.\n\n**Modular Monolith:** Services are separate deployment units communicating\
  \ over the network, not modules in one binary.\n\n**Hexagonal Architecture:** Ports/adapters\
  \ exist (universal API shared by HTTP and gRPC adapters), but they serve the Microkernel's\
  \ component extension model; hexagonal isolation is not the dominant structural\
  \ intent.\n\n**Event-Driven:** Dapr enables event-driven applications but its own\
  \ internal component communication is synchronous gRPC, not event-driven messaging.\n\
  \n**Domain-Driven Design:** No bounded contexts, aggregates, or domain-model-first\
  \ organization. Structure is by infrastructure capability, not business domain.\n\
  \n**Service-Based:** The control-plane services do not share a monolithic core behind\
  \ a service layer; each is independently structured.\n\n**Pipeline, CQRS, Space-Based,\
  \ Serverless, Multi-Agent:** None of these topologies appear as primary organizing\
  \ principles in the codebase."
