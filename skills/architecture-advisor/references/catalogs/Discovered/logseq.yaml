classification_reasoning: "Logseq is a knowledge management application that has\
  \ undergone a major architectural refactoring from a file-based graph model to a\
  \ DB graph model backed by SQLite and DataScript. The primary topology is Modular\
  \ Monolith: the entire application (editor, database layer, plugin host, sync client,\
  \ vector search, publishing) ships as a single build artifact per platform. The\
  \ deps/ directory creates internally-enforced module seams (common, db, db-sync,\
  \ graph-parser, outliner, publish, publishing, shui), each with its own deps.edn\
  \ and explicit declared dependencies, but these are not independently deployable\
  \ services. The shadow-cljs.edn targets (:app, :db-worker, :electron, :mobile,\
  \ :publishing) are different packagings of the same monolith.\n\nThe secondary Microkernel\
  \ style is genuine: src/main/logseq/api/ exposes 100+ ClojureScript functions organized\
  \ by domain (app, block, db, editor, plugin); frontend/handler/plugin.cljs manages\
  \ plugin lifecycle and hook registration; plugins run sandboxed in iFrames/shadow\
  \ DOMs with postMessage-based RPC via Postmate. This matches the Richards & Ford\
  \ microkernel definition: stable core kernel extended by an independently loaded\
  \ plug-in registry.\n\nThe Layered style is structural and confirmed by CODEBASE_OVERVIEW.md:\
  \ components/ (presentation, 80+ Rum/React components) -> handler/ (application\
  \ logic, 30+ handler namespaces) -> db/ + deps/db/ (DataScript in-memory DB, Datalog\
  \ queries). Dependencies flow strictly downward.\n\nThe three-worker architecture\
  \ (main thread + db-worker via comlink + inference-worker for HNSW vector search)\
  \ is a performance optimization within the monolith, not service decomposition.\
  \ The deps/db-sync/ Cloudflare Durable Object sync backend is an optional cloud\
  \ extension for RTC (real-time collaboration), not a peer microservice. The internal\
  \ core.async event channel (system/events, capacity 1000) with 43+ defmulti handle\
  \ methods is a within-process coordination mechanism, not an Event-Driven architecture.\
  \ The post-transaction pipeline in worker/pipeline.cljs enforces referential integrity\
  \ and domain invariants (tag templates, block refs, journal protection) co-located\
  \ with the transaction layer."
