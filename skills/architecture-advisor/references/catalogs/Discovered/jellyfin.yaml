quality_attributes:
- Extensibility (runtime plugin system via AssemblyLoadContext)
- Privacy (no telemetry, fully self-hosted, no commercial tier)
- Cross-platform Compatibility (Linux, Windows, macOS, Docker)
- Observability (Prometheus metrics, WebSocket real-time push)
- Maintainability (interface-only controller layer, 18 test projects)
- Fault Isolation (limited — plugins run in-process)
notable_strengths:
- Runtime plugin loading via AssemblyLoadContext with IPluginServiceRegistrator for DI integration and GetApiPluginAssemblies() for controller contribution
- Interface-only MediaBrowser.Controller/ project enforces a hard layer boundary at compile time
- FFmpeg transcoding pipeline with hardware acceleration (VAAPI, NVENC, QSV) and HLS/DASH adaptive bitrate in a dedicated subsystem
- IJellyfinDatabaseProvider abstraction makes database engine swappable; SQLite ships by default with no external service dependencies
- IEventManager typed domain event bus enables decoupled plugin reactions to session, auth, and library lifecycle events
- No telemetry, no premium features, no external account requirements — privacy-first design trusted by 38k+ GitHub stars
notable_gaps:
- Plugin fault isolation is weak — plugins run in-process and a crash in a plugin DLL brings down the server
- SQLite limits concurrent write throughput for very large or multi-user libraries; no official PostgreSQL migration path
- No horizontal scaling support; single-process design restricts to vertical scaling only
- Plugin API compatibility relies on MinimumVersion/MaxVersion in PluginManifest rather than a stable ABI; major-version upgrades break third-party plugins
- No built-in clustering, multi-server replication, or load balancing
