one_line_summary: >-
  A privacy-first self-hosted media server built around a runtime plugin kernel
  that extends metadata providers, subtitle providers, live-TV tuners, and
  notification targets, layered over an ASP.NET Core REST API and an FFmpeg
  transcoding pipeline.
classification_method: deep-analysis
classification_confidence: 0.92
classification_model: claude-sonnet-4-6
classification_date: '2026-03-11'
classification_reasoning: >-
  Jellyfin's dominant structural characteristic is the microkernel: ApplicationHost
  (Emby.Server.Implementations/ApplicationHost.cs) acts as the core, discovering
  plugin assemblies at startup via PluginManager and loading them into isolated
  AssemblyLoadContext instances. Plugins register services via IPluginServiceRegistrator,
  contribute API controllers via GetApiPluginAssemblies(), and react to domain
  events via IEventConsumer<T> — all without modifying core code. Extension contracts
  (IMetadataProvider<T>, IImageProvider, ISubtitleProvider, ITunerHost) are defined
  as interfaces in MediaBrowser.Controller/ and resolved at runtime. Within the
  stable core, a clear horizontal layering organizes the system: Presentation
  (Jellyfin.Api, 60 controllers, 9 middleware), Service (Emby.Server.Implementations
  LibraryManager/SessionManager/UserDataManager), Abstraction (MediaBrowser.Controller,
  interface-only), Repository (Jellyfin.Server.Implementations EF Core repos),
  and Model (MediaBrowser.Model DTOs). Microservices was rejected (single process,
  single database). Modular Monolith was rejected (no enforced compile-time module
  boundaries; modularity is runtime-plugin, not build-time vertical slices).
  Event-Driven was rejected (IEventManager is a secondary pub/sub mechanism;
  primary coordination is direct DI method calls).
review_notes: >-
  Jellyfin is a Microkernel (primary) / Layered (secondary) architecture. The
  microkernel manifest: PluginManager discovers plugin DLLs from a configured
  filesystem path and loads them into AssemblyLoadContext isolation; IPlugin /
  BasePlugin<TConf> define the plugin contract; IPluginServiceRegistrator allows
  plugins to extend the DI container; GetExports<T>() resolves all implementations
  across core and plugin assemblies; IEventManager.PublishAsync<T> / IEventConsumer<T>
  provide a typed domain event bus that plugins can subscribe to. The layered
  foundation: MediaBrowser.Controller/ is interface-only (enforced layer boundary);
  60 ASP.NET Core controllers in Jellyfin.Api; EF Core repositories in
  Jellyfin.Server.Implementations/Item/; IJellyfinDatabaseProvider abstraction
  makes the database engine swappable (SQLite shipped). FFmpeg transcoding is a
  dedicated subsystem (MediaBrowser.MediaEncoding/, src/Jellyfin.MediaEncoding.Hls/).
