one_line_summary: "Multi-tenant accounting platform built as a NestJS modular monolith with pervasive event-driven cross-module coordination via @nestjs/event-emitter and BullMQ queues."
classification_reasoning: "Bigcapital is classified as Modular Monolith (primary) + Event-Driven (co-primary) + Layered (tertiary). The Modular Monolith classification is unambiguous: a single NestJS server process (packages/server) deploys in one container; 60+ feature modules share one DI container and runtime; docker-compose.prod.yml shows a single 'server' service with no inter-process backend communication. Event-Driven is co-primary, not secondary, because events are the structural integration mechanism between modules: src/common/events/events.ts defines 150+ named domain events across all aggregates (accounts, saleInvoice, bill, inventory, banking, stripe, plaid, etc.); every major module uses @OnEvent() subscribers to write GL entries, update inventory, send mail, and track analytics without direct service coupling; BullMQ queues (ComputeItemCostQueue, WriteInventoryTransactionsGLEntriesQueue, SendSaleInvoiceQueue) extend the pattern to async background processing via Redis; a Socket.IO gateway emits real-time events to frontend clients. Layered architecture is tertiary — it describes the internal structure within each module (Controller -> Application Service -> Command/Query Service -> Repository/Model) rather than the overall system topology. The previous classification (Modular Monolith + Layered) correctly identified the primary style but understated the structural role of event-driven coordination across module boundaries."
