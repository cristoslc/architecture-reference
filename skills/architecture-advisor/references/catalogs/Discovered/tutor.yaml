one_line_summary: Docker-based Open edX distribution tool built as a microkernel CLI
  application, where a minimal typed hook framework (Actions + Filters) delegates
  all feature surface — CLI commands, config, templates, deployments, and init jobs
  — to first- and third-party plugins.
classification_reasoning: "Tutor is a single Python package CLI tool (one pyproject.toml\
  \ entry point: tutor.commands.cli:main). Its internal architecture is a textbook\
  \ Microkernel: the core is kept intentionally minimal (hooks framework, config loader,\
  \ Jinja2 renderer, task runner base classes) and every functional concern is registered\
  \ through a typed hook catalog of 9 Actions and 30+ Filters defined in tutor/hooks/catalog.py.\n\
  \nKey evidence:\n1. Plugin discovery: Two standard paths — Python packages declaring\
  \ a 'tutor.plugin.v1' setuptools entrypoint (via importlib_metadata) and standalone\
  \ .py files in the plugins root directory. Both dynamically import modules on enable\
  \ and evict from sys.modules on unload to allow clean re-enable within a process.\n\
  2. Hook framework: tutor/core/hooks/actions.py implements priority+FIFO callback\
  \ dispatch; tutor/core/hooks/filters.py implements a typed callback chain where\
  \ each callback's return value feeds the next. tutor/core/hooks/contexts.py provides\
  \ context-scoped hook registration so all hooks from a plugin can be atomically\
  \ cleared on unload.\n3. Cross-cutting extension: Plugins can simultaneously add\
  \ CLI commands (CLI_COMMANDS filter), configuration defaults (CONFIG_DEFAULTS filter),\
  \ Jinja2 template roots (ENV_TEMPLATE_ROOTS filter), template splice-point content\
  \ (ENV_PATCHES filter), Docker build parameters (IMAGES_BUILD filter), Kubernetes\
  \ manifest patches, and initialization jobs (CLI_DO_INIT_TASKS filter) — all through\
  \ hooks, without modifying core files.\n4. Versioned plugin API: v0.py (BasePlugin\
  \ class, legacy) and v1.py (hook-based, current) maintained side by side for backward\
  \ compatibility.\n5. Design intent stated in documentation: 'users should not have\
  \ to fork Tutor to customise their deployments' — the microkernel guarantee.\n\n\
  Not Event-Driven: Actions and Filters are synchronous in-process callback chains,\
  \ not an async message bus. Not Microservices: Tutor is one process; the multi-service\
  \ Open edX stack it deploys is the output, not the architecture of Tutor itself.\
  \ Not Modular Monolith: there are no enforced peer-module boundaries; the plugin\
  \ system is hierarchical (core -> plugins), not peer-module isolation."
