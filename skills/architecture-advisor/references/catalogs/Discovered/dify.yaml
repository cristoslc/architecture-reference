one_line_summary: >-
  LLM application development platform built as a layered modular monolith with
  Celery-driven async event processing and a microkernel plugin system for model
  providers, tools, and extensions.
classification_reasoning: |
  ## Architecture Analysis: Dify

  ### Primary Style: Layered Architecture

  The backend (`api/`) is organized as a strict four-tier horizontal stack with
  unidirectional dependencies enforced by `api/.importlinter`:

  - **Controller layer** (`api/controllers/{console,service_api,web,trigger,inner_api,mcp}/`):
    Flask-RESTX route handlers for the console UI, external service API, end-user
    web API, webhooks/triggers, plugin inner API, and MCP endpoints.

  - **Service layer** (`api/services/`): 50+ service classes orchestrating business
    logic (`app_service.py`, `dataset_service.py`, `workflow_service.py`, etc.) without
    direct database coupling.

  - **Core domain layer** (`api/core/`): Domain logic subpackages for agents, RAG,
    tools, workflow, model runtime, plugins, MCP, and observability ops.

  - **Repository/Model layer** (`api/repositories/`, `api/models/`): Protocol-backed
    SQLAlchemy data access with explicit repository interfaces
    (`WorkflowExecutionRepository`, `WorkflowNodeExecutionRepository`) and ORM models.

  The `dify_graph` workflow engine has its own strictly nested layering:
  `graph_engine → graph_events → graph → nodes → node_events → entities`, with
  import-linter contracts preventing circular dependencies and infrastructure leakage
  into domain models.

  ### Secondary Style: Event-Driven

  Two event mechanisms operate in parallel:

  1. **Blinker signals** (`api/events/`): Synchronous in-process domain signals for
     lifecycle events (`app_was_created`, `app_model_config_was_updated`,
     `app_published_workflow_was_updated`). Handlers decouple cross-domain reactions.

  2. **Celery + Redis task queue** (`api/tasks/`, `api/extensions/ext_celery.py`):
     30+ async task modules for document indexing, workflow execution, mail delivery,
     and dataset cleanup. The `worker` deployment unit (`MODE=worker`) consumes tasks
     from Redis; `worker_beat` handles periodic scheduling.

  The graph engine itself is event-driven internally: all node executions emit typed
  events (`NodeRunStartedEvent`, `NodeRunSucceededEvent`, `NodeRunFailedEvent`) over
  a queue. External workflow control (stop/pause/resume) travels via Redis command
  channels (`dify_graph/graph_engine/command_channels/redis_channel.py`).

  ### Secondary Style: Microkernel (Plugin System)

  A microkernel-style plugin architecture governs extensibility:

  - **Plugin daemon** (`langgenius/dify-plugin-daemon`): A separate deployment unit
    managing plugin lifecycle, sandboxed execution, and package installation.
  - **Inner API** (`api/controllers/inner_api/`): Private HTTP API for bidirectional
    plugin-core communication.
  - **Extension scanning** (`api/core/extension/extensible.py`): Runtime filesystem
    scanning and dynamic import for built-in and custom extensions.
  - **Pluggable subsystems**: tools (`builtin_tool/`, `plugin_tool/`, `mcp_tool/`),
    moderation providers, datasource providers, and model providers
    (`dify_graph/model_runtime/model_providers/`) all follow the same extension
    registration pattern.

  ### Deployment Topology

  `docker/docker-compose.yaml` defines `api`, `worker`, `worker_beat`, `web`,
  `plugin_daemon`, `sandbox`, plus infrastructure (Redis, PostgreSQL/MySQL, vector
  DBs, Nginx). Both `api` and `worker` use the same image
  (`langgenius/dify-api:1.13.0`) and share one database schema. This confirms a
  modular monolith with operational split, not microservices.

  ### What This Is Not

  - **Not Microservices**: Single shared codebase and database between `api` and
    `worker`; no bounded context isolation or independent service communication.
  - **Not Service-Based**: Deployment units are operational splits of one monolith,
    not coarse-grained business services.
  - **Not CQRS**: No separate read/write model or query/command databases.
  - **Not Hexagonal**: Controller-service-repository follows layered convention, not
    ports/adapters.
  - **Not Multi-Agent**: Agent execution is one supported app type within the
    platform, not the governing architectural principle.
