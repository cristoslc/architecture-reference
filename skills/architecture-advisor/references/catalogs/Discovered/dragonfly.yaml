one_line_summary: >-
  A single-binary, thread-per-core in-memory data store organized as a Modular Monolith
  with enforced CMake module boundaries and a strict layered architecture from protocol
  ingress through command families down to custom data-structure primitives.
classification_reasoning: |
  ## Primary Style: Modular Monolith

  Dragonfly produces a single executable (`dragonfly`) from one CMake `add_executable` target
  in `src/server/CMakeLists.txt`. All functionality runs in-process; there are no network
  boundaries between components and no independent deployment units.

  Module boundaries are enforced at build time via four CMake library targets with explicit
  dependency rules:

  - `dfly_facade`       — TCP connection handling, Redis/Memcache/TLS protocol layer
  - `dfly_core`         — Custom data structures (DashTable, compact_object, tx_queue, Lua)
  - `dfly_transaction`  — Transaction framework, db_slice, blocking controller, journaling
  - `dragonfly_lib`     — Command families (business logic), replication, RDB persistence

  The `src/facade/README.md` documents the boundary rule explicitly: "It should be separated
  from the rest of dragonfly server logic and should be self-contained, i.e no redis-lib or
  server dependencies are allowed."

  ## Secondary Style: Layered

  The source tree enforces a strict vertical dependency hierarchy:

  ```
  facade/   → protocol ingress (no server deps allowed)
  core/     → data-structure primitives (no server deps)
  server/   → business logic (imports core and facade)
  redis/    → Redis compatibility shims
  ```

  Each layer depends only on lower layers. Upper layers are never imported by lower ones.

  ## Defining Internal Mechanism: Shared-Nothing Thread-Per-Core

  Dragonfly partitions its in-memory database into N shards (one per thread). Each shard is
  owned exclusively by its thread—no mutex locks protect shard data. Inter-shard communication
  uses only message passing via Boost.Fibers task queues (`EngineShardSet::Await`, `Add`,
  `RunBriefInParallel`). This shared-nothing model is the source of Dragonfly's vertical
  scaling advantage and is a specialization within the Modular Monolith style, not a
  separate architectural style.

  Multi-key transactions are coordinated by a VLL-based coordinator (each client connection
  fiber): it schedules hops across relevant shards under a global sequence counter, executes
  micro-ops shard-by-shard, and finalizes by releasing intent locks. This provides strict
  serializability without mutexes on the hot path.

  ## What This Is NOT

  - Not Microservices: single process, single executable, no independent deployment units.
  - Not Event-Driven: inter-shard dispatch is direct fiber queue injection, not a pub/sub bus.
  - Not Space-Based: single process; the Space-Based style requires a distributed data grid.
  - Not Hexagonal: `facade` is a network ingress layer, not a ports-and-adapters boundary.
  - Not DDD: command families partition by Redis data type (API concept), not business domain.
