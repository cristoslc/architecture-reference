classification_reasoning: |
  ## Analysis

  This repository is an intentional, documented reference implementation combining
  Hexagonal Architecture (Ports and Adapters) with Domain-Driven Design (DDD) tactical
  patterns and CQRS. The architecture is enforced programmatically, not merely described.

  ### Hexagonal Architecture (primary, 0.97)

  The defining characteristic is dependency inversion through domain-owned port interfaces.
  The domain core (`src/libs/ddd/`, `src/libs/ports/`) defines interfaces that infrastructure
  adapters must implement:

  - `RepositoryPort<Entity>` in `src/libs/ddd/repository.port.ts` — generic persistence contract
  - `LoggerPort` in `src/libs/ports/logger.port.ts` — logging abstraction
  - `UserRepositoryPort extends RepositoryPort<UserEntity>` — domain-specific extension

  Infrastructure adapters (`UserRepository`, `WalletRepository`) extend `SqlRepositoryBase`
  which implements `RepositoryPort`, pointing dependencies inward from infrastructure to domain.

  Inbound adapters for the same command exist in four forms: HTTP controller
  (`create-user.http.controller.ts`), CLI controller (`create-user.cli.controller.ts`),
  GraphQL resolver (`create-user.graphql-resolver.ts`), and message controller
  (`create-user.message.controller.ts`) — each translating an external protocol into a
  domain Command without the domain knowing the transport exists.

  Architecture enforcement is machine-verified: `.dependency-cruiser.js` declares five
  `severity: "error"` rules (no-domain-to-api-deps, no-domain-to-app-deps,
  no-domain-to-infra-deps, no-infra-to-api-deps, no-command-query-to-api-deps) that
  fail the build on any boundary violation.

  ### Domain-Driven Design (primary, 0.97)

  The `src/libs/ddd/` library provides the complete DDD tactical toolkit:
  `AggregateRoot`, `Entity`, `ValueObject`, `DomainEvent`, repository port, mapper interface,
  command base, and query base. `UserEntity extends AggregateRoot<UserProps>` demonstrates
  rich domain behaviour: factory `create()` emitting `UserCreatedDomainEvent`, guarded
  mutations (`makeAdmin()`, `updateAddress()`), and invariant validation. `Address` is a
  value object with structural equality. Cross-aggregate coordination uses domain events:
  `CreateWalletWhenUserIsCreatedDomainEventHandler` subscribes to `UserCreatedDomainEvent`
  via NestJS EventEmitter2, maintaining aggregate root encapsulation. Bounded contexts are
  expressed as NestJS modules (`UserModule`, `WalletModule`) with DI token isolation
  (`USER_REPOSITORY`, `WALLET_REPOSITORY`) preventing direct cross-module repository access.

  ### CQRS (secondary, 0.90)

  Commands (`CreateUserCommand`, `DeleteUserCommand`) are dispatched via `@nestjs/cqrs`
  `CommandBus` to `ICommandHandler` implementations that always route through the domain
  model and repository. Queries use a separate `QueryHandler` path: `FindUsersQueryHandler`
  explicitly bypasses the domain and repository, executing raw Slonik SQL against the
  database pool directly — a true read-model pattern. The `@CommandHandler` / `@QueryHandler`
  decorators make the split IDE-navigable and statically enforced.

  ### Modular Monolith (secondary, 0.85)

  All modules are composed into a single `AppModule` deploying as one NestJS process against
  one PostgreSQL instance (Docker Compose shows a single app container + db). Module
  boundaries are enforced by NestJS DI token isolation rather than network boundaries.
  The README explicitly states the pattern makes microservice extraction straightforward
  if needed — confirming this is a deliberately modular monolith, not a microservices system.

  ### What Was Rejected

  **Not Microservices:** `@nestjs/microservices` appears only as a transport adapter
  demonstration (the message controller), not as a distributed service topology.
  Single deployable unit, single database.

  **Not Event-Driven (primary):** Domain events via EventEmitter2 are a DDD coordination
  mechanism internal to the monolith. There is no message broker, event store, or
  event-sourcing infrastructure.

  **Not Layered (traditional):** Layers exist but the governing principle is dependency
  inversion via ports. Traditional layering has no such inversion; this does.

  **Not CQRS (primary):** CQRS is a secondary pattern within the application layer;
  the governing architecture is Hexagonal (the outer boundary with enforced port/adapter rules).
