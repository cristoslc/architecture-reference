one_line_summary: "ASP.NET Core-based runtime host for Azure Functions implementing a Microkernel architecture with pluggable out-of-process language workers (gRPC), dynamically loaded extension bundles, and a layered internal project hierarchy."
classification_reasoning: "The azure-functions-host is the platform runtime that hosts Azure Functions — it is the serverless infrastructure, not a serverless application. The dominant architectural pattern is Microkernel: the stable core (ScriptHost) manages lifecycle and invocation dispatch while delegating all execution concerns to external plugins. Out-of-process language workers (Python, Node.js, Java, PowerShell) are spawned as child processes and communicate via gRPC through IWorkerChannel / GrpcWorkerChannel. Binding providers (IScriptBindingProvider, GeneralScriptBindingProvider, CoreExtensionsScriptBindingProvider) follow the TryCreate() plugin contract. FunctionDescriptorProvider is an abstract plugin base with concrete implementations for .NET, RPC workers, and HTTP handlers selected at runtime by IWorkerFunctionDescriptorProviderFactory. Extension bundles are downloaded from CDN at runtime by ExtensionBundleManager and loaded in isolation via a custom FunctionAssemblyLoadContext (AssemblyLoadContext subclass), confirming true plugin isolation semantics. A Standby/Specialization lifecycle allows the kernel to pre-warm in a placeholder state and specialize to a specific function app identity at runtime. Layered architecture is the secondary organizing style: the four C# projects (Abstractions -> Script -> Grpc -> WebHost) form a strict unidirectional dependency chain. No CQRS read/write model separation, no DDD bounded contexts or aggregates, no independent microservice deployability, and no event sourcing are present. The internal Rx-based ScriptEventManager is internal lifecycle plumbing, not the primary architectural style."
