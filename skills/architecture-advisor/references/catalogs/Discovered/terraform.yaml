classification_reasoning: "Terraform is a canonical Microkernel system. The kernel
  is the graph engine + CLI + state manager + configuration loader; all resource-type-specific
  logic lives in external provider plugins that communicate over a versioned gRPC
  protocol (tfplugin5/6, via github.com/hashicorp/go-plugin). The kernel discovers,
  downloads, and launches providers as child processes, then drives their lifecycle
  through the Provider interface (~30 RPC methods). The README states explicitly:
  \"This repository contains only Terraform core... Providers are implemented as plugins.\"\
  \n\nThe kernel itself is a Modular Monolith: one go.mod, one deployable binary,
  65+ internal packages with clear bounded responsibility and a consistent dependency
  direction (command \u2192 backend \u2192 terraform/context \u2192 configs/states/providers/dag).\
  \ No runtime service boundaries exist within the kernel.\n\nThe dominant internal
  mechanism is a DAG-based execution engine (internal/dag, internal/terraform). Plan
  and apply graph builders compose ~30 GraphTransformer implementations in sequence
  to construct the execution graph; AcyclicGraph.Walk then evaluates vertices concurrently
  where no dependency edge separates them. This graph-based execution is a qualifier,
  not a separate style.\n\nThe Stacks subsystem (internal/stacks/) is an experimental
  higher-order abstraction above modules using a promise-based async evaluation model.\
  \ The RPC API layer (internal/rpcapi/) provides a gRPC surface that bypasses the
  CLI for automation consumers. Neither changes the primary style classification.\n\
  \nRejected Microservices: single binary, single process; providers are child processes
  per run, not independently deployed services. Rejected Layered: organized around
  the plugin contract and graph model, not horizontal abstraction layers. Rejected
  Pipeline at system level: the transformer sequence is internal to graph construction,
  not the system’s organizing principle. Rejected Event-Driven: no event bus or message
  queue; all coordination is synchronous or via Go channels in one process."
