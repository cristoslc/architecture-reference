classification_reasoning: >
  Fourteen independently deployable binaries (each with its own cmd/ entry point and
  Dockerfile) communicate via an API gateway (Gloo Edge) and internal HTTP REST — a
  clear Microservices topology. The core business domain is CI/CD workflow orchestration,
  implemented as a sequential Pipeline of named stages (with intra-stage concurrent
  job pools, 30+ factory-dispatched job types, and state-machine status aggregation).
  Pipeline is not merely a feature: it is the dominant internal topology of the primary
  service and the system's central value proposition. Event-Driven signals (Redis
  pub/sub for workflow cancel/debug) and internal layered structure (handler→service→
  repository) are architectural qualifiers, not primary styles.
one_line_summary: >
  Cloud-native DevOps platform built as true Microservices with a sequential Pipeline
  workflow engine at its core, LLM-augmented analytics, and multi-cluster Kubernetes
  management via WebSocket reverse tunnels.
