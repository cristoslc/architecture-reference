classification_reasoning: "## Architecture Classification Analysis\n\n### Primary
  Style: Microservices (0.95)\n\nGrafana Mimir is explicitly and consistently self-described
  as a microservices-based architecture across its documentation, Helm chart, and
  code structure. All components compile into a single Go binary, but the `-target`
  flag selects which service(s) to start in a given process. Production deployments
  use the `mimir-distributed` Helm chart, which runs each component as a separate
  Kubernetes Deployment.\n\n**Evidence from pkg/mimir/modules.go:** ~40 named modules
  are registered via `mm.RegisterModule`. The `deps` map in the same file hard-codes
  inter-module dependencies at a component boundary level (e.g., `QueryFrontend`
  depends on `{QueryFrontendTripperware, MemberlistKV, Vault}` — not on Ingester
  or Distributor). The `All` module aggregates `{QueryFrontend, QueryScheduler, Querier,
  Ingester, Distributor, StoreGateway, Ruler, Compactor}` for monolithic mode.\n\n
  **Explicit gRPC service contracts:** Each inter-service boundary is defined as a
  `.proto` file with a named `service` block: `service Ingester` (ingester/client/ingester.proto),
  `service Distributor` (distributor/distributorpb/distributor.proto), `service StoreGateway`
  (storegateway/storegatewaypb/gateway.proto), `service SchedulerForQuerier` and
  `service SchedulerForFrontend` (scheduler/schedulerpb/scheduler.proto), `service
  FrontendForQuerier` (frontend/v2/frontendv2pb/frontend.proto), `service Ruler` (ruler/ruler.proto),
  `service Alertmanager` (alertmanager/alertmanagerpb/alertmanager.proto), `service
  BlockBuilderScheduler` (blockbuilder/schedulerpb/scheduler.proto).\n\n**Decentralized
  service discovery via gossip hash rings:** No central registry or service mesh.
  Components join their own memberlist-backed ring (Ingesters ring, Partitions ring,
  Store Gateway ring, Distributor ring, Querier ring, Query Scheduler ring). Ring
  membership propagates via gossip; consistent hashing assigns token ranges without
  a coordinator. When instances join or leave, only a bounded token fraction moves.\n\n
  **Independent failure domains and scaling:** Distributor, Querier, and Query Frontend
  are stateless and scale horizontally with no data migration. Ingesters are semi-stateful
  (in-memory TSDB + WAL) but participate in ring-managed replication (classic architecture)
  or Kafka partition ownership (ingest storage architecture). Store Gateways replicate
  blocks with a configurable replication factor (default 3). Each component can be
  upgraded or scaled without affecting others.\n\n### Secondary Style: Event-Driven
  (0.82)\n\nMimir 3.0 introduced \"ingest storage architecture\" as the preferred
  production configuration. It interposes Apache Kafka (or a Kafka-compatible system
  such as WarpStream) between the write and read paths.\n\n**Write path ends at Kafka:**
  Distributors shard incoming series across Kafka partitions by `fnv32a` hash. A
  remote-write request is acknowledged to the client only after Kafka confirms persistence
  and replication. The write path never touches ingesters directly.\n\n**Ingesters
  are Kafka consumers:** Each ingester owns exactly one partition and continuously
  consumes from it. Multiple ingesters across availability zones consume the same
  partition for HA on the read path. Replication is Kafka-native, not ingester-side
  quorum.\n\n**Partition lifecycle as finite-state machine:** Partitions have explicit
  `Pending -> Active -> Inactive` states managed cooperatively by ingesters and the
  Kubernetes Rollout Operator. Distributors only write to Active partitions; queriers
  must read from Active and Inactive partitions.\n\n**Block Builder as independent
  Kafka consumer:** The Block Builder component consumes Kafka partitions and builds
  TSDB blocks directly, bypassing the in-memory ingester path entirely. It is a distinct
  event-driven consumer that can operate independently.\n\n**Decoupled read and write
  paths:** Heavy query load on ingesters no longer disrupts live writes; the write
  path terminates at the Kafka broker. This is the primary architectural motivation
  documented in pkg/storage/ingest/DESIGN.md and the ingest storage architecture
  documentation.\n\n### What Was Rejected and Why\n\n**Not Modular Monolith:** Although
  all components share a single Go binary, they are designed, documented, and deployed
  as separate services with independent Kubernetes Deployments, separate gRPC contracts,
  and independent scaling. The binary is a build optimization, not an architectural
  boundary.\n\n**Not Pipeline (primary):** The query path (Frontend -> Scheduler ->
  Querier -> Store Gateway) has a pipeline shape, and the ingest storage write path
  is a producer-consumer pipeline. However, the system's dominant characteristic
  is the independently scalable, ring-coordinated service mesh, not a sequential processing
  pipeline. The Pipeline pattern would be primary if data always flowed through a
  fixed ordered sequence of stages; in Mimir, fanout, sharding, and parallel execution
  are equally prominent.\n\n**Not CQRS (standalone):** Mimir has distinct write and
  read paths, but this is a natural consequence of time-series storage semantics (append-only
  writes, range-query reads), not an explicit application of Command Query Responsibility
  Segregation infrastructure with separate command and query models.\n\n### Quality
  Attributes Evidence\n\n**SCALABILITY:** Distributor, Querier, and Query Frontend
  are stateless and scale horizontally. Ingesters scale by adding partitions in the
  Kafka ring. The design goal is 1 billion active time series per cluster. Query sharding
  parallelizes PromQL execution across queriers.\n\n**HIGH AVAILABILITY:** Ring-based
  health checking and zone-aware replication across all components. Zero-downtime
  rolling updates. Ingest storage removes quorum dependency from the write path (Kafka
  handles replication). Store Gateway replicates blocks with configurable replication
  factor.\n\n**MULTI-TENANCY:** Every API request carries a tenant ID header. Per-tenant
  limits, shuffle sharding, and runtime configuration overrides are enforced at the
  Distributor. Tenants are isolated in separate TSDB blocks on object storage.\n\n
  **OPERABILITY:** All components expose /ready, /metrics, and ring status HTTP endpoints.
  The mimir-mixin bundles Grafana dashboards, Prometheus alerts, and runbooks for
  the cluster itself. Rolling updates are zero-downtime by design.\n\n**DURABILITY:**
  Long-term storage uses S3/GCS/Azure Blob or any S3-compatible object store. The
  Compactor deduplicates and merges blocks uploaded by multiple ingesters, ensuring
  correctness at the storage layer.\n\n**EXTENSIBILITY:** Ingest path supports Prometheus
  remote write v1/v2, OTLP, and InfluxDB. Object storage backends are pluggable.
  Runtime configuration supports per-tenant limit overrides without restarts."
