classification_reasoning: "## Architecture Classification for Apache Kafka\n\n###\
  \ Primary Style: Modular Monolith (0.95)\n\nKafka is a single deployable unit\
  \ — the Docker build at `docker/jvm/Dockerfile` packages everything into `kafka.tgz`,\
  \ and `core/src/main/scala/kafka/Kafka.scala` is the sole entry point that\
  \ instantiates `KafkaRaftServer`. The build system (`settings.gradle`) defines\
  \ 40+ Gradle subprojects in a deliberate dependency hierarchy. Module boundaries\
  \ are enforced at **compile time** by 17 Checkstyle import-control XML files:\n\
  \n- `checkstyle/import-control.xml` (665 lines): root policy; `<disallow pkg=\"\
  kafka\" />` — no Java module may depend on the Scala core\n- Separate files for\
  \ `metadata`, `server`, `server-common`, `storage`, `group-coordinator`,\
  \ `transaction-coordinator`, `coordinator-common`, `share-coordinator`,\
  \ `test-common`, `core`, `clients-integration-tests`, `jmh-benchmarks`, `examples`\n\
  \nEach file bears: `<!-- THINK HARD ABOUT THE LAYERING OF THE PROJECT BEFORE\
  \ CHANGING THIS FILE -->`. The enforced dependency direction:\n\n  `common` (base)\
  \ → `clients` → `server-common`/`metadata`/`storage` → coordinators → `raft`\
  \ → `core` (Scala) / `server` (Java)\n\nThis is the canonical Modular Monolith\
  \ pattern: a single release artifact with well-defined, statically enforced internal\
  \ module boundaries.\n\n### Secondary Style: Microkernel (0.90)\n\n**Kafka\
  \ Connect** implements a formal microkernel:\n- **Core system** (`connect/runtime/`):\
  \ `Connect.java`, `AbstractHerder.java`, distributed mode worker\n- **SPI** (`connect/api/`):\
  \ `Connector`, `Task`, `SourceConnector`, `SinkConnector`, `Transformation<R>`,\
  \ `Predicate<R>`, `Converter`, `HeaderConverter`\n- **Plugin loading**\
  \ (`connect/runtime/.../isolation/`): `DelegatingClassLoader.java` (\"dedicated\
  \ to loading Connect plugin classes in classloading isolation\"), `PluginClassLoader.java`\
  \ (per-plugin isolated classloader), `ServiceLoaderScanner.java` + `ReflectionScanner.java`\
  \ (dual discovery)\n- **Reference plugins**: `connect/file/`, `connect/json/`,\
  \ 15+ built-in transforms in `connect/transforms/`\n\n**Kafka Streams** exposes\
  \ a `Processor<KIn,VIn,KOut,VOut>` SPI and `ProcessorSupplier` factory for\
  \ user-defined stateful operators injected via `StreamsBuilder.addProcessor()`.\
  \ `ProcessorTopology` composes these extensions into a directed graph executed\
  \ by `StreamThread`.\n\n### Tertiary Style: Pipeline (0.85)\n\nKafka Streams\
  \ implements a Pipe-and-Filter execution model. `StreamsBuilder` translates\
  \ the high-level DSL (`KStream.map/filter/groupBy/window`) via `InternalTopologyBuilder`\
  \ into a `ProcessorTopology` — a directed graph of `ProcessorNode`, `SourceNode`,\
  \ and `SinkNode` objects. `StreamThread` drives the pipeline: poll records from\
  \ source topic partitions → route through processor nodes → write to sink topics\
  \ or state stores. This pipeline model is confined to the Streams subsystem;\
  \ the broker core uses synchronous request handling.\n\n### Why Not Other Styles\n\
  \n**Not Microservices:** Single deployable artifact with no independently deployed\
  \ services. The broker, Connect worker, and Streams app are distinct runtime\
  \ modes of the same codebase, not separate services.\n\n**Not Event-Driven\
  \ (primary):** Kafka *provides* the event backbone for Event-Driven systems\
  \ but its internal broker coordination is synchronous (Raft consensus, ISR\
  \ replication, request/response protocol). The broker processes requests via\
  \ a request handler thread pool, not an internal event bus.\n\n**Not Layered\
  \ (primary):** The dependency hierarchy exists but the organizing principle is\
  \ module cohesion by functional domain (coordinators, storage, metadata, raft),\
  \ not strict horizontal layers with unidirectional dependencies across the whole.\
  \ The `storage/` module has some upward references permitted by import-control,\
  \ unlike a strict layered system.\n\n### Quality Attributes Evidence\n\n**DURABILITY:**\
  \ Append-only log segments with ISR replication protocol; leader epoch tracking\
  \ prevents log divergence; configurable retention policies.\n\n**SCALABILITY:**\
  \ Partition-level horizontal scaling; consumer groups for parallel consumption;\
  \ KRaft eliminates ZooKeeper metadata bottleneck; partition reassignment.\n\n\
  **FAULT TOLERANCE:** KRaft Raft consensus for metadata leader election; ISR\
  \ protocol for data replication; exactly-once semantics via idempotent producer\
  \ + `transaction-coordinator/`; Streams state store checkpoint recovery.\n\n\
  **EXTENSIBILITY:** Connect plugin SPI with isolated classloaders; Streams\
  \ Processor SPI; authorizer and quota plugin interfaces; 16 import-control\
  \ files preserve internal extensibility boundaries.\n\n**THROUGHPUT:** Zero-copy\
  \ sendfile for consumer fetch; batch compression (gzip/Snappy/LZ4/Zstd);\
  \ producer batching with linger.ms; sequential log I/O.\n\n**OBSERVABILITY:**\
  \ JMX via Yammer Metrics; client-side telemetry push (KIP-714); configurable\
  \ log4j2; Connect REST API for connector status.\n\n**EVOLVABILITY:**\
  \ Scala core/ → Java server/ migration with import-control one-way direction;\
  \ @ApiVersion protocol versioning on all RPC message types; KRaft removes\
  \ ZooKeeper operational dependency; compile-time boundary enforcement enables\
  \ safe internal refactoring."
