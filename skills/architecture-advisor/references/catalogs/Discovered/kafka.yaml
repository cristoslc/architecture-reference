one_line_summary: Distributed commit log and event streaming platform built as a
  Modular Monolith with 17 checkstyle import-control files enforcing module boundaries,
  a Microkernel plugin system in Kafka Connect and Streams, and a Pipeline execution
  model in the Streams subsystem.
review_notes: "Single deployable unit (kafka.tgz / KafkaRaftServer entry point)\
  \ with 40+ Gradle subprojects. Module boundary enforcement via 17 Checkstyle\
  \ import-control XML files — root file globally disallows any Java module from\
  \ depending on the Scala kafka.* core. Kafka Connect implements a formal Microkernel:\
  \ SPI interfaces (Connector, Task, Transformation, Converter) in connect/api/,\
  \ isolated DelegatingClassLoader + PluginClassLoader per plugin, dual ServiceLoader\
  \ and reflection discovery. Kafka Streams implements a Pipeline (Pipe-and-Filter)\
  \ execution model: StreamsBuilder compiles DSL operations to a ProcessorTopology\
  \ directed graph driven by StreamThread. KRaft (raft/ module) provides Raft consensus\
  \ for metadata, eliminating ZooKeeper. Scala core/ is being progressively migrated\
  \ to Java server/; import-control rules enforce the one-way migration direction."
