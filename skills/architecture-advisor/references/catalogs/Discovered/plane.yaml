one_line_summary: Open-source project management tool deployed as a Service-Based
  architecture with a shared-database Django backend, Celery/RabbitMQ async task tier,
  and a dedicated Hocuspocus real-time collaboration service.
classification_reasoning: "## Architecture Analysis\n\n### Primary Style: Service-Based\n\
  \nPlane's `docker-compose.yml` defines the canonical deployment topology: multiple\
  \ independently started services that all share one PostgreSQL instance (`plane-db`)\
  \ and one Redis/Valkey instance (`plane-redis`).\n\nDeployed services:\n- **api**\
  \ ‚Äî Django REST backend, synchronous HTTP handling\n- **worker** ‚Äî Celery consumer,\
  \ async background task processing\n- **beat-worker** ‚Äî Celery Beat scheduler, periodic\
  \ tasks\n- **migrator** ‚Äî DB migration runner (ephemeral)\n- **live** ‚Äî Node.js\
  \ Hocuspocus/Y.js real-time collaboration server\n- **web** / **admin** / **space**\
  \ ‚Äî React Router v7 SPAs (three separate frontend applications)\n- **proxy** ‚Äî Caddy\
  \ reverse proxy\n\nThe `api`, `worker`, and `beat-worker` are all built from the\
  \ same Django codebase (`apps/api`), differentiated only by their startup scripts.\
  \ All connect to the same PostgreSQL database. This is the defining characteristic\
  \ of Service-Based: coarse-grained service partitions with a shared backing store,\
  \ not independent bounded contexts with separate databases.\n\n### Secondary Style:\
  \ Event-Driven (Celery/RabbitMQ)\n\nViews dispatch side-effects asynchronously\
  \ via Celery `.delay()` calls ‚Äî e.g., `issue_activity.delay()`, `model_activity.delay()`,\
  \ `recent_visited_task.delay()` from `plane/app/views/issue/base.py`. The Celery\
  \ beat schedule in `plane/celery.py` defines ~12 periodic tasks (email batching,\
  \ cleanup, automation, telemetry). RabbitMQ (`plane-mq`) is the Celery broker in\
  \ production. This decouples mutation side-effects from the synchronous request\
  \ path, constituting a clear event-driven processing tier ‚Äî secondary to the primary\
  \ service topology.\n\n### Internal Django Backend: Layered\n\nWithin the `apps/api`\
  \ monorepo package, the Django application is internally organized in horizontal\
  \ layers: URL routing ‚Üí Views ‚Üí Serializers ‚Üí Models (`plane/db/models/`) ‚Üí Background\
  \ tasks (`plane/bgtasks/`). This is a supporting internal pattern, not the top-level\
  \ architectural style.\n\n### Frontend: MobX + pnpm Monorepo\n\nThree React Router\
  \ v7 SPAs (`web`, `admin`, `space`) share code through pnpm workspace packages\
  \ (`@plane/services`, `@plane/shared-state`, `@plane/types`, `@plane/ui`, `@plane/editor`).\
  \ The main `web` app uses a deep MobX `CoreRootStore` with 35+ domain stores.\n\
  \n### What This Is NOT\n\n- **Not Microservices**: Single shared PostgreSQL database\
  \ across all backend services; no bounded contexts with independent data ownership;\
  \ coarse-grained service split\n- **Not Modular Monolith**: Multiple independently\
  \ deployed processes with separate Dockerfiles, not a single deployment unit\n-\
  \ **Not Hexagonal**: No explicit port/adapter interfaces; Django ORM accessed directly\
  \ from views and tasks\n- **Not CQRS**: No read/write model split; optional read\
  \ replica is a performance optimization, not a CQRS pattern\n- **Not Event-Driven\
  \ (primary)**: Celery tasks are triggered imperatively via `.delay()` calls, not\
  \ via a domain event bus; message queue is an implementation detail of background\
  \ processing"
