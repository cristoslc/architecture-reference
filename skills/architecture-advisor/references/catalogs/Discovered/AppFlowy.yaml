one_line_summary: "An open-source Notion alternative built on a dual Microkernel plugin architecture — AFPluginDispatcher in Rust and PluginSandbox in Flutter — with a strongly-bounded Modular Monolith backend of 30+ Cargo workspace crates linked by public trait interfaces."
classification_reasoning: |
  ## Primary Style: Microkernel

  AppFlowy implements a dual plugin system across both its Rust backend and Flutter frontend.

  **Rust backend plugin system** — `lib-dispatch` crate provides `AFPluginDispatcher`
  (`frontend/rust-lib/lib-dispatch/src/dispatcher.rs`), a central event bus that maps
  typed `AFPluginEvent` values to registered handler services. Each domain module exports
  a standardised `init()` function returning an `AFPlugin` with named event-handler
  bindings (e.g., `FolderEvent::CreateView`, `UserEvent::SignInWithEmailPassword`).
  All plugins are assembled in `flowy-core/src/module.rs` via `make_plugins()`:

    flowy_user::event_map::init(user_session),
    flowy_folder::event_map::init(folder_manager),
    flowy_database2::event_map::init(database_manager),
    flowy_document::event_map::init(document_manager2),
    flowy_ai::event_map::init(ai_manager),
    flowy_storage::event_map::init(file_storage_manager),

  No changes to the dispatcher are needed to add a new capability — only a new plugin
  registration.

  **Flutter frontend plugin system** — `PluginSandbox`
  (`appflowy_flutter/lib/startup/plugin/src/sandbox.dart`) manages UI plugins behind
  the abstract `Plugin` / `PluginBuilder` / `PluginWidgetBuilder` interfaces. Content
  types (Document, Grid, Board, Calendar, AIChatPlugin) are registered via
  `registerPlugin()` in `load_plugin.dart` at launch. The `makePlugin()` factory
  resolves the correct builder by `PluginType` at runtime.

  **FFI bridge** — `dart-ffi` crate (`rust-lib/dart-ffi/src/`) exposes C-ABI entry
  points consumed by `appflowy_backend/lib/appflowy_backend.dart` via `dart:ffi`,
  allowing Flutter to dispatch events to Rust plugins without any service boundary.

  ## Secondary Style: Modular Monolith

  The Rust workspace (`frontend/rust-lib/Cargo.toml`) defines 30+ crates with strict
  separation:
  - Domain modules: `flowy-user`, `flowy-folder`, `flowy-document`, `flowy-database2`,
    `flowy-ai`, `flowy-storage`, `flowy-search`
  - Public interface crates: `flowy-user-pub`, `flowy-folder-pub`, `flowy-document-pub`,
    `flowy-database-pub`, `flowy-ai-pub`, `flowy-storage-pub`, `flowy-search-pub`
  - Infrastructure: `lib-dispatch`, `lib-log`, `lib-infra`

  Each `-pub` crate declares async trait ports (`FolderCloudService`,
  `DocumentCloudService`, `UserCloudService`, `AppFlowyServer`) with concrete adapters
  injected via `ServerProvider` (`flowy-core/src/server_layer.rs`). This is a
  ports-and-adapters pattern contained within a single deployable binary.

  ## What This Is NOT

  - **NOT Microservices**: One binary per platform (desktop, iOS, Android). The
    docker-compose.yml builds a Linux desktop container for distribution, not service
    orchestration.
  - **NOT Event-Driven (async messaging)**: The event bus is synchronous request/response
    routing within a process — no Kafka, RabbitMQ, or durable queues.
  - **NOT Layered**: Structure is vertical by domain, not horizontal. Each plugin crate
    contains its own event handlers, business logic, and persistence access.

  ## Quality Attribute Evidence

  - **Modularity**: `-pub` crate interfaces enforce abstraction; `GetIt` DI container
    wires Flutter dependencies (`deps_resolver.dart`); `AppFlowyServer` trait enables
    local/cloud server swap without changing consumers.
  - **Evolvability**: `FeatureFlag` enum with KV-backed runtime toggles
    (`shared/feature_flags.dart`); plugin registration allows new content types without
    core changes.
  - **Observability**: `tracing` crate with `#[instrument]` macros throughout Rust
    backend; `StreamLog` / `RustLogStreamReceiver` streams Rust logs to Flutter layer;
    profiling feature gate for `console_subscriber`.
  - **Deployability**: Codemagic CI for iOS/Android; Docker build files for Linux; cargo-make
    build orchestration; Flathub, Snapcraft, App Store, Play Store distribution channels.
  - **Fault Tolerance**: Retry logic in `flowy-storage/src/uploader.rs`; `ServerProvider`
    supports local-only mode as fallback when cloud is unreachable; offline-first CRDT
    sync via `yrs` means data is never blocked on connectivity.
  - **Scalability**: Desktop single-process architecture; CRDT-based collaboration
    (`AppFlowy-Collab`, `yrs`) enables eventual consistency without server round-trips;
    vector search via `tantivy` and `flowy-sqlite-vec` for local AI features.
