classification_reasoning: "## Architecture Classification: Kibana\n\n**Primary Style:
  Microkernel** with **Modular Monolith** as the secondary deployment structure.\n\n###
  Evidence for Microkernel\n\n**1. Official documentation confirms the canonical criterion**\n\n`dev_docs/key_concepts/kibana_platform_plugin_intro.mdx`:
  *\"Almost everything you see in the Kibana UI is built inside a plugin? If you removed
  all plugins from Kibana, you\u2019d be left with an empty navigation menu, and a
  set of developer tools.\"* This satisfies Richards & Ford Ch.12\u2019s microkernel
  definition.\n\n**2. Kernel provides only infrastructure**\n\n`src/core/packages/root/server-internal/src/server.ts`
  instantiates 32 services: HTTP, Elasticsearch, SavedObjects, capabilities, security,
  ui-settings, metrics, status, logging, rendering, i18n, pricing, analytics, DI.
  None deliver user-visible application behavior.\n\n**3. Plugin lifecycle managed
  by kernel**\n\n`PluginsSystem.setupPlugins()` calls each plugin\u2019s `setup()`
  in topological dependency order via Kahn\u2019s algorithm (`getTopologicallySortedPluginNames`).
  Plugins declare `requiredPlugins` and `optionalPlugins` in `kibana.jsonc`; the kernel
  enforces the dependency graph. Plugins cannot self-initialize.\n\n**4. 1,294 plugin
  manifests across 6 search paths**\n\n- `src/platform/plugins/shared/` \u2014 56
  shared platform plugins\n- `x-pack/platform/plugins/shared/` \u2014 60 x-pack platform
  plugins\n- `x-pack/solutions/observability/plugins/` \u2014 18 plugins\n- `x-pack/solutions/security/plugins/`
  \u2014 13 plugins\n- `x-pack/solutions/search/plugins/` \u2014 11 plugins\n- `x-pack/solutions/workplaceai/plugins/`
  \u2014 2 plugins\n\n**5. Build-time boundary enforcement**\n\n`packages/kbn-eslint-plugin-imports/src/rules/no_group_crossing_imports.ts`
  statically enforces that `private`-visibility modules cannot be imported cross-group.
  Groups map to solution domains: `platform`, `security`, `observability`, `search`,
  `workplaceai`.\n\n### Evidence for Modular Monolith\n\n**1. Single deployable artifact**\n\nKibana
  deploys as a single Node.js process. All plugins share one process, one Elasticsearch
  cluster, and one SavedObjects schema.\n\n**2. 43 `@kbn/core-*` packages + 130+
  platform packages**\n\nThe Core is decomposed into 43 independently buildable packages
  (`src/core/packages/`) with physical boundaries enforced by package boundaries,
  not network isolation.\n\n**3. Node roles as operational scaling**\n\n`NodeRoles`
  (`ui`, `backgroundTasks`, `migrator`) allow process-level specialization for horizontal
  scaling without decomposing into independent services.\n\n### What This Is NOT\n\n-
  **Not Microservices**: All plugins run in one process sharing one database schema.
  Node roles are process specialization, not service decomposition.\n- **Not Layered**:
  Organization is domain-vertical by plugin group, not horizontal technical layers.\n-
  **Not Service-Based**: Solution groups are not independently deployed; they share
  one Elasticsearch instance and SavedObjects schema.\n- **Not Event-Driven**: Plugin-to-plugin
  communication is synchronous TypeScript interface calls through the contract system,
  not a message broker."
