notable_strengths:
- 1,294 plugin manifests demonstrate Microkernel operating at industrial scale
- Build-time group/visibility boundary enforcement via no_group_crossing_imports ESLint
  rule prevents cross-domain coupling silently accumulating
- Three-phase lifecycle (preboot → setup → start) with topological dependency ordering
  prevents initialization races across plugin dependency graphs
- Node roles (ui, backgroundTasks, migrator) enable horizontal scaling and zero-downtime
  rolling upgrades without service decomposition
- Serverless mode dynamically narrows loaded plugin set via allowlistPluginGroups
  without code changes
notable_gaps:
- Shared Elasticsearch cluster and SavedObjects schema couples all plugins with no
  per-domain schema isolation
- 1,294 plugins create a very large surface area for the topological sort; plugin
  load time can be significant at startup
- The group/visibility boundary is enforced only at build time (ESLint), not at runtime
  — a misconfigured direct import would not fail until CI
- No formal plugin versioning or backward-compatibility guarantees for cross-group
  shared APIs between major versions
