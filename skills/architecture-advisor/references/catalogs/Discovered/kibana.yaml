one_line_summary: "Open-source analytics and visualization platform for Elasticsearch
  whose core is a minimal runtime kernel that orchestrates 1,294 plugin lifecycles
  delivering all user-facing functionality."
review_notes: "Kibana is a textbook **Microkernel** architecture with a **Modular
  Monolith** backend. The Core (`src/core/`) provides 32 infrastructure services
  (HTTP, Elasticsearch, SavedObjects, logging, security, metrics) and orchestrates
  all plugins through a three-phase lifecycle (preboot \u2192 setup \u2192 start)
  managed by `PluginsSystem`. The official developer docs confirm the canonical criterion:
  removing all plugins leaves an empty navigation menu. 1,294 plugin manifests are
  registered across 6 search paths covering platform, observability, security, search,
  and workplace AI domains. Group/visibility boundaries (platform, security, observability,
  search, workplaceai) are enforced at build time by the `no_group_crossing_imports`
  ESLint rule, preventing `private`-visibility modules from being imported cross-group.
  Kibana deploys as a single Node.js process with node roles (`ui`, `backgroundTasks`,
  `migrator`) for horizontal scaling without service decomposition."
