one_line_summary: Unified stream and batch processing engine built as a strict five-layer
  architecture where user APIs compile to a dataflow pipeline executed by a runtime
  layer with a microkernel plugin system for filesystems, metrics reporters, and RPC.
review_notes: Five horizontal layers enforced by ArchUnit tests (ConnectorRules, TableApiRules);
  @Public/@PublicEvolving/@Internal annotation discipline; Table planner and RPC system
  loaded via isolated classloaders; 8 filesystem plugins and 9 metrics-reporter plugins
  loaded from plugins/ directory via SPI; credit-based backpressure and checkpoint
  barriers are intrinsic to the Pipe-and-Filter execution model.
