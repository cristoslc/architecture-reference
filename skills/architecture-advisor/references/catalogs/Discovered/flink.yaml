classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Styles: Layered + Pipeline\n\n**LAYERED (primary, 0.93):** Flink has a strict\
  \ five-layer architecture enforced by ArchUnit tests in `flink-architecture-tests/`.\
  \ Layer 1 (User API): `flink-datastream-api/`, `flink-table/flink-table-api-java/`,\
  \ and `flink-clients/` expose surfaces annotated with `@Public`/`@PublicEvolving`.\
  \ Layer 2 (Query Planning): `flink-table/flink-table-planner/` parses SQL, optimizes\
  \ with Calcite, and translates to `Transformation<T>` via the `Planner` delegation\
  \ interface; loaded in an isolated classloader via `flink-table-planner-loader/`.\
  \ Layer 3 (Streaming Runtime): `flink-streaming-java/` bridges DataStream API to\
  \ runtime via `StreamGraph` -> `JobGraph` compilation. Layer 4 (Runtime): `flink-runtime/`\
  \ -- Dispatcher, JobMaster, ExecutionGraph, Scheduler (Adaptive + AdaptiveBatch),\
  \ ResourceManager, CheckpointCoordinator, TaskExecutor. Layer 5 (Infrastructure):\
  \ `flink-rpc/`, `flink-metrics/`, `flink-core/` (FileSystem SPI, plugin loading).\
  \ The ConnectorRules ArchUnit test enforces that connector code may only depend\
  \ on `@Public`/`@PublicEvolving` from the core -- the canonical layering constraint.\n\
  \n**PIPELINE (primary, 0.90):** The fundamental execution model is a directed dataflow\
  \ graph. Users compose pipelines via DataStream operators; the runtime compiles\
  \ them to a `JobGraph` with `JobVertex` nodes and `IntermediateDataSet` edges, executed\
  \ by TaskManagers as an operator chain. Netty-based credit-based flow control provides\
  \ natural backpressure. Checkpoint barriers flow through the same network channels\
  \ as data records. The Table API compiles SQL into the same `Transformation<T>`\
  \ pipeline substrate, making Pipe-and-Filter the universal execution model.\n\n\
  ### Secondary Style: Microkernel\n\n**MICROKERNEL (secondary, 0.80):** A formal\
  \ plugin system in `flink-core/.../core/plugin/` loads JARs from a `plugins/` directory\
  \ at startup using isolated classloaders. Filesystem implementations (8 plugins:\
  \ S3-Hadoop, S3-Presto, GCS, Azure, OSS, HDFS) and metrics reporters (9 plugins:\
  \ Prometheus, Datadog, InfluxDB, Graphite, JMX, OpenTelemetry, StatsD, SLF4J, Dropwizard)\
  \ are pluggable without core changes. The Table planner and the RPC system (Akka)\
  \ are also loaded via explicit classloader isolation loaders. ArchUnit `ConnectorRules`\
  \ enforces the microkernel invariant: plugins must depend only on the public API\
  \ surface, never on internal implementation classes.\n\n### What Was Rejected and\
  \ Why\n\n**Not Microservices:** The JobManager (Dispatcher + ResourceManager + JobMaster)\
  \ and TaskManagers are deployment units of a single distributed application, not\
  \ independent services with separate data stores. They communicate via Akka-based\
  \ RPC (flink-rpc) and share a common configuration, not via service mesh or HTTP.\n\
  \n**Not Event-Driven (primary):** While checkpoint barriers and heartbeat messages\
  \ use event-like patterns, the primary coordination mechanism is synchronous RPC\
  \ (JobMaster <-> TaskExecutor) and the credit-based network buffer protocol, not\
  \ an event broker or message bus.\n\n**Not Modular Monolith only:** Unlike Airflow,\
  \ Flink’s modules have a strongly directional dependency hierarchy (API -> Planner\
  \ -> Streaming Runtime -> Runtime -> Infrastructure) enforced by ArchUnit, making\
  \ Layered a more precise classification than Modular Monolith.\n\n### Quality Attributes\
  \ Evidence\n\n**FAULT TOLERANCE:** Exactly-once checkpoint protocol; multiple state\
  \ backends (heap, RocksDB/ForSt, changelog); ZooKeeper/Kubernetes HA for JobManager\
  \ failover.\n\n**SCALABILITY:** Per-operator parallelism; credit-based backpressure;\
  \ AdaptiveBatchScheduler infers parallelism from runtime statistics; elastic YARN/Kubernetes\
  \ resource negotiation.\n\n**EXTENSIBILITY:** Plugin SPI for filesystems and metrics\
  \ reporters; planner and RPC as pluggable loader modules; connector public API contract\
  \ enforced by ArchUnit.\n\n**DEPLOYABILITY:** Session, Per-Job, and Application\
  \ deployment modes on YARN, Kubernetes, and standalone; Kubernetes Operator for\
  \ cloud-native.\n\n**OBSERVABILITY:** 9 pluggable metrics reporters; REST API for\
  \ job/checkpoint status; Flink Web UI with flamegraph and backpressure visualization.\n\
  \n**EVOLVABILITY:** @Public/@PublicEvolving/@Internal annotation discipline with\
  \ ArchUnit enforcement; isolated classloaders for planner and RPC upgrades; replaceable\
  \ scheduler implementations."
