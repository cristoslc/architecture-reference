classification_reasoning: OSGi-backed plugin registry infrastructure (`OSGIServiceRegistration<T>`)
  across 6 integration domains (payment, catalog, currency, usage, invoice, notification);
  `api/` module as explicit plugin contract layer; per-domain plugin registries with
  runtime register/unregister/lookup; payment state machine dispatching to control
  plugins at every transition; single WAR assembly via profiles/killbill/pom.xml;
  single Guice injector wiring all 13 domain modules; in-process PersistentBus for
  cross-module events.
