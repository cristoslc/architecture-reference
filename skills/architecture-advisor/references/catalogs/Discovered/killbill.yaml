one_line_summary: Open-source subscription billing and payments platform with OSGi
  plugin architecture for payment gateways, catalog, invoice, and currency providers.
review_notes: 'Kill Bill is a textbook **Microkernel (Plugin)** architecture wrapped
  in a **Modular Monolith** deployment model.


  ### 1. Primary Style: Microkernel (Plugin)


  The entire platform is organized around OSGi-backed plugin registries. Each integration
  domain has a dedicated `OSGIServiceRegistration<T>` registry that external OSGi
  bundles register with at runtime:


  - `DefaultPaymentProviderPluginRegistry implements OSGIServiceRegistration<PaymentPluginApi>`
  — payment gateways

  - `DefaultPaymentControlProviderPluginRegistry` — payment routing/retry control

  - `DefaultCatalogProviderPluginRegistry` — external catalog sources

  - `DefaultCurrencyProviderPluginRegistry` — currency conversion rate providers

  - `DefaultUsageProviderPluginRegistry` — usage data aggregators


  The `api/` module defines all plugin API contracts (`PaymentPluginApi`, `InvoicePluginApi`,
  `CatalogPluginApi`, `CurrencyPluginApi`, `UsagePluginApi`) with no implementation,
  enabling external plugins to depend only on the stable contract layer. 45 non-test
  source files import from `org.killbill.billing.osgi.api.*`. The payment module uses
  a state machine DSL (`PaymentStates.xml`) to route payment operations through plugin
  invocations at every state transition via `PluginControlPaymentAutomatonRunner`.


  ### 2. Secondary Style: Modular Monolith


  All 16 modules assemble into a single WAR via `profiles/killbill/pom.xml` (`<packaging>war</packaging>`).
  `KillbillServerModule` installs all 13 domain Guice modules into a single injector.
  Cross-module communication uses direct Guice-injected `api/` interface calls and
  an in-process database-backed `PersistentBus` (84 non-test files reference the bus
  infrastructure). All modules share a single JDBI connection pool, EhCache/Redis
  cache, Apache Shiro security manager, and notification queue service.'
