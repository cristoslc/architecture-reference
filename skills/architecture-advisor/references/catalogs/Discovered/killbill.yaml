notable_strengths:
- OSGi plugin registry with per-domain extension points for payment gateways, catalog,
  currency, usage, and notification; 135+ published ecosystem plugins
- First-class multi-tenancy via InternalCallContext carrying tenant context through
  every operation; per-tenant catalog, plugin config, and notification callbacks
- Database-backed PersistentBus and NotificationQueue ensure event delivery survives
  process restarts
- Payment state machine (PaymentStates.xml, RetryStates.xml) with plugin-driven routing
  and automatic retry logic
- api/ module as isolated plugin contract layer enabling external plugins to depend
  only on stable interfaces
notable_gaps:
- Single WAR deployment limits independent scaling of billing vs. payment subsystems
- JDBI v2 (not v3/JOOQ); Swagger 1.6 (not OpenAPI 3)
- OSGi plugin isolation is implemented via custom registry abstraction, not a full
  OSGi container — plugins share the same JVM classloader context in practice
