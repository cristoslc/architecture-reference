one_line_summary: >-
  A clustered Elixir/Phoenix application that streams PostgreSQL WAL events and
  ephemeral messages to WebSocket clients via an event-driven PubSub pipeline
  organized as a modular monolith with per-tenant isolation.
classification_reasoning: >-
  Event-Driven is the primary style: all message delivery—from CDC WAL polling
  through Phoenix PubSub fanout to WebSocket clients—is asynchronous and
  event-stream-based. The ReplicationPoller emits change events broadcast via
  TenantBroadcaster (PubSub direct or gen_rpc multicast); ReplicationConnection
  streams WAL inserts and triggers BatchBroadcast; channel lifecycle (token
  revalidation, presence sync, connection recovery) is driven entirely by
  Process.send_after messages. Modular Monolith is the structural style: a
  single OTP application boots all subsystems under one supervision tree with
  three well-bounded namespace modules (Realtime, RealtimeWeb, Extensions) and
  a PostgresCdc behaviour interface for pluggable CDC drivers. No inter-service
  HTTP calls or message brokers exist. Microkernel was considered due to the
  PostgresCdc plugin behaviour but rejected because the core carries full
  business logic rather than acting as a thin dispatcher. Layered was considered
  but rejected as the dominant style because the PubSub event bus cuts across
  web/domain/infra boundaries.
