one_line_summary: "A local-first collaborative workspace platform (Notion + Miro alternative) built on a microkernel block-plugin architecture with a modular NestJS backend and event-driven async processing."
classification_reasoning: "AFFiNE exhibits a three-style composition: Microkernel as primary, Modular Monolith and Event-Driven as secondary.\n\nMICROKERNEL (primary, 0.90): The blocksuite/ directory implements a formal extension system. ExtensionType, BaseExtensionProvider<Scope, Options>, and ExtensionManager<Scope> in blocksuite/affine/ext-loader/ provide the plugin infrastructure. The framework core (blocksuite/framework/std) supplies DI, lifecycle hooks, and minimal runtime; all 25+ block types (paragraph, image, database, surface, embed-doc, etc.) register as independent plugins through this system. The NestJS backend mirrors this pattern via AppModuleBuilder with conditional module loading (useIf() predicated on env.flavors.*), making entire server capabilities (GraphQL, sync, renderer, doc service) opt-in components.\n\nMODULAR MONOLITH (secondary, 0.85): packages/common/infra/src/framework/ provides a custom DI framework with explicit component types (Service, Entity, Store, Scope) and a hierarchical scope chain (Root -> Workspace -> Doc). ~50 modules in packages/frontend/core/src/modules/ (ai-button, cloud, doc, editor, feature-flag, journal, notification, workspace, etc.) are wired at startup via configure*Module(framework) functions but deploy as a single unit per platform. The NestJS backend deploys as one Docker image (ghcr.io/toeverything/affine) with all enabled modules co-located and sharing a single Prisma/PostgreSQL database.\n\nEVENT-DRIVEN (secondary, 0.72): A typed EventBus (base/event/eventbus.ts) built on eventemitter2 propagates domain events across modules with OnEvent decorator. Domain events are declared in modules (e.g., workspace.members.invite, workspace.members.removed in core/workspaces/event.ts). BullMQ job queues (nightly, notification, doc, copilot, indexer) decouple async processing. The EventBus also supports cluster-wide broadcast via Socket.io serverSideEmit for multi-instance deployments.\n\nDEPLOYABILITY evidence: Docker image, 4 Helm sub-charts (graphql, front, doc, sync) each independently scalable, GCP PodMonitoring configuration, multi-flavor server build via Flavor enum (AllInOne, Graphql, Sync, Renderer, Front, Doc).\n\nMODULARITY evidence: Custom DI framework with typed Services/Entities/Stores; NestJS modules with explicit import/export; 50+ frontend feature modules; 25+ blocksuite block plugins each self-contained with block definition, store, view, effects, and styles.\n\nSCALABILITY evidence: Four server flavors deployable independently; Redis used for cache (CacheRedis), session (SessionRedis), socket.io adapter (SocketIoRedis), and BullMQ queue (QueueRedis) - all separate instances; Helm allows independent replicaCount per service; pgvector extension for AI embeddings at scale.\n\nOBSERVABILITY evidence: OpenTelemetry NodeSDK with PrometheusExporter (port 9464), ZipkinExporter for distributed tracing, W3C trace context propagation, instrumentation plugins for GraphQL/HTTP/Redis/Prisma/Socket.io/NestJS, request ID via CLS propagated through all log lines, metrics for memory/event handlers/socket events.\n\nEVOLVABILITY evidence: AFFINE_FLAGS feature flag system in packages/frontend/core/src/modules/feature-flag/ with canary/stable/mobile-gated flags; AppModuleBuilder.useIf() for conditional server capabilities; plugin registration via DI avoids hard-wired dependencies between blocks.\n\nFAULT TOLERANCE evidence: BullMQ job queues with retry semantics; suppressError option on event handlers (EventBus.on); EventBus error boundary catching unhandled rejections from dispatchAsync; RateLimiterModule (base/throttler) with SkipThrottle decorator.\n\nRULED OUT - Microservices: Single NestJS server sharing one PostgreSQL database and one Docker image. Different flavors are build-time configurations of the same codebase, not separate services with independent data stores.\n\nRULED OUT - Layered: Organization is vertical by feature/plugin, not horizontal by layer. The DI framework enables cross-cutting concerns without strict layering.\n\nRULED OUT (pure) DDD: Feature modules rather than bounded contexts with separate ubiquitous languages. No aggregate roots, domain events in the DDD sense, or anti-corruption layers between bounded contexts."
