one_line_summary: "Python-based scientific workflow manager organized as a DAG-driven pipeline engine with a formal six-interface microkernel plugin system for execution backends, storage, reporting, logging, and scheduling."
classification_reasoning: "The primary organizing principle is the pipeline metaphor: Snakemake rules are pipeline stages that declare input/output file transformations, the DAG class (dag.py, 3416 lines) resolves a topological job ordering, and the JobScheduler drives execution by dispatching ready jobs to executor plugins — textbook pipe-and-filter. The Microkernel secondary style is formally designed and explicitly documented: six independently semver-versioned interface packages (snakemake-interface-executor-plugins, -storage-plugins, -report-plugins, -logger-plugins, -scheduler-plugins, -common) define typed abstract base classes; runtime plugin registries (ExecutorPluginRegistry, StoragePluginRegistry, ReportPluginRegistry, SchedulerPluginRegistry) discover and load plugins from the Python environment; a naming convention (snakemake-<type>-plugin-<name>) and PyPI catalog enable third-party extension without core modification. The core package's own documentation (docs/project_info/codebase.rst) explicitly identifies this combination as the intended architecture. The internal three-tier layering (user-facing API/CLI, language/DSL parser, core Workflow+DAG+Scheduler) is a real structural concern but subordinate to these two dominant styles. All components ship as a single PyPI wheel and run in a single Python process — a modular monolith in deployment topology."
