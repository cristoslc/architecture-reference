notable_strengths:
- Business logic layer has zero framework or infrastructure imports — pure unit-testable
- Four transport adapters (REST, gRPC, AMQP RPC, NATS RPC) demonstrate transport
  interchangeability without touching use cases
- Twelve-factor config via environment variables, Dockerfile, and Docker Compose for
  complete local dev stack
- CI pipeline covers linting, CVE scanning, unit tests, and integration tests
- Prometheus metrics and zerolog structured logging built in from the start
notable_gaps:
- No tooling (e.g., go-arch-lint) enforces layer boundaries at CI time — convention-only
- Single go.mod; boundaries not enforced by Go module system
- No OpenTelemetry distributed tracing despite multi-transport surface area
- Domain entities are plain structs with no behavior — template does not demonstrate
  rich domain modeling
