review_notes: "Re-classified from Hexagonal Architecture + Layered (prior entry) to\
  \ **Layered** (primary) with a `clean-architecture` design-approach qualifier.\n\
  \nThe prior classification placed Hexagonal Architecture as the primary style and\
  \ Layered as secondary, but this inverts the actual structural evidence:\n\n1. The\
  \ repository's own README and diagrams (`docs/img/layers-1.png`, `docs/img/layers-2.png`)\
  \ explicitly show a horizontal layer model.\n2. The `repo/` package contains both\
  \ port interfaces (`contracts.go`) and adapter implementations (`persistent/`, `webapi/`)\
  \ in the same directory subtree — not a true hexagonal ports-defined-by-core model.\n\
  3. All four controllers are a single style of driving adapter organized by transport\
  \ protocol, and the use case layer defines what it needs through contracts.go —\
  \ consistent with layered dependency inversion, not the full Hexagonal core-with-ports\
  \ model.\n4. Per the style taxonomy (ADR-006), Hexagonal is a design-approach qualifier,\
  \ not a topology-defining style in this catalog. The topology is Layered.\n\nThis\
  \ aligns the entry with ADR-006's qualifier system and with the way other clean-architecture-flavored\
  \ Go repos in the catalog are classified."
classification_reasoning: "## Analysis\n\nThis repository implements **Layered Architecture**\
  \ in the Clean Architecture (Uncle Bob) variant — four strictly-ordered horizontal\
  \ layers with dependency inversion at the repository boundary.\n\n### Evidence for\
  \ Layered Architecture (primary)\n\n**1. Four explicit horizontal layers:**\n- `internal/entity/`\
  \ — Domain entities. No imports from other internal packages.\n- `internal/usecase/`\
  \ — Business logic. Imports `entity/` and `repo/` (interfaces only). Zero imports\
  \ from `controller/` or `pkg/`.\n- `internal/repo/` — Port interfaces (`contracts.go`)\
  \ plus adapter implementations (`persistent/`, `webapi/`). Depends on `entity/`.\n\
  - `internal/controller/` — Transport handlers (REST, gRPC, AMQP, NATS). Depends\
  \ on `usecase/` interface and `entity/`. Outer-most layer.\n\n**2. Dependency inversion\
  \ at repo boundary:**\n`internal/usecase/translation/translation.go` imports `repo`\
  \ (the interface package), not `persistent` or `webapi` (the concrete adapters).\
  \ Concrete types are injected at the composition root (`internal/app/app.go`).\n\
  \n**3. README labels this \"Clean Architecture\" with layer diagrams:**\nThe README\
  \ shows `docs/img/layers-1.png` and `docs/img/layers-2.png` — horizontal layer\
  \ model diagrams, not a hexagonal diagram. The README explicitly cites \"principles\
  \ of Robert Martin (aka Uncle Bob).\"\n\n**4. Composition root assembles the entire\
  \ stack:**\n`app.go` imports all concrete packages and wires them together. This\
  \ is the standard pattern in layered Clean Architecture — a single wiring point\
  \ at the top.\n\n**5. No feature-module or bounded-context organization:**\nAll\
  \ code for a single use case (Translation) is spread horizontally across the four\
  \ layers. This is horizontal layering, not vertical slicing or modular decomposition.\n\
  \n### Why NOT Other Styles\n\n- **NOT Hexagonal Architecture (primary):** In true\
  \ Hexagonal, all ports are defined in the core and all adapters (inbound AND outbound)\
  \ are treated symmetrically. Here, `repo/contracts.go` defines outbound port interfaces\
  \ but lives in the same package subtree as the adapter implementations. The README's\
  \ own layer diagrams show a stack, not a hexagon. Per ADR-006, Hexagonal is a design-approach\
  \ qualifier in this catalog.\n- **NOT Microservices:** Single `go.mod`, single\
  \ Dockerfile, single process with all transports running concurrently.\n- **NOT\
  \ Domain-Driven Design:** No aggregates, bounded contexts, value objects, domain\
  \ events, or ubiquitous language. `entity.Translation` is a plain struct with no\
  \ behavior.\n- **NOT Modular Monolith:** No enforced module boundaries (no sub-module\
  \ `go.mod` files, no go-arch-lint rules). Separation is layer-based, not feature-module-based.\n\
  - **NOT Event-Driven:** AMQP and NATS are used with Request-Reply pattern (synchronous\
  \ RPC), not for asynchronous event streaming or pub/sub.\n\n### Dependency Flow\n\
  \n```\n controller/ (REST, gRPC, AMQP, NATS)    ← outer\n      ↓ depends on interface\n\
  \ usecase/                                  ← business logic\n      ↓ depends on\
  \ port interfaces\n repo/contracts.go                          ← port definitions\n\
  \      ↑ implemented by\n repo/persistent/  repo/webapi/           ← driven adapters\n\
  \n entity/                                    ← innermost (no dependencies)\n```\n\
  \nAll dependencies point inward. Outer layers provide implementations for interfaces\
  \ defined at inner layer boundaries."
