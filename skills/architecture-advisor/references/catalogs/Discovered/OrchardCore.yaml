one_line_summary: "An open-source modular multi-tenant CMS and application framework for ASP.NET Core built on a microkernel extension system where 94 plug-in modules are independently enabled per tenant at runtime inside a single deployable process."
classification_reasoning: "OrchardCore exhibits a three-style composition: Microkernel as primary, Modular Monolith and Pipeline as secondary.\n\nMICROKERNEL (primary, 0.94): The system is architected around a formal extension kernel. IExtensionManager (src/OrchardCore/OrchardCore/Extensions/ExtensionManager.cs) discovers, loads, and resolves dependency ordering for extensions and features using frozen dictionaries with a lazy dependency graph. Each of the 94 modules in src/OrchardCore.Modules/ declares itself via [Module] and [Feature] assembly attributes (Manifest.cs per module) with explicit Dependencies arrays. IShellHost (ShellHost.cs) manages an independent IoC container (ShellContext) per tenant, pre-created at startup and rebuilt on feature toggle. ModularTenantContainerMiddleware swaps the active ServiceProvider per HTTP request by calling httpContext.UseShellScopeServices(). IShellDescriptorFeaturesManager.UpdateFeaturesAsync() enables runtime enable/disable of features per tenant without process restart, which is the definitive microkernel plug-in lifecycle contract. IStartup.ConfigureServices() / IStartup.Configure() is the plug-in registration contract implemented by every module's Startup.cs.\n\nMODULAR MONOLITH (secondary, 0.88): All 94 modules deploy as a single ASP.NET Core process. The Dockerfile runs a single 'dotnet publish src/OrchardCore.Cms.Web/OrchardCore.Cms.Web.csproj' with a single ENTRYPOINT. OrchardCoreBuilder.ConfigureServices() accumulates all enabled module IStartup registrations into a per-tenant DI container sharing the same process heap. ShellDescriptor stores the list of enabled ShellFeature entries in a single YesSql/SQL database session per tenant. Modules communicate exclusively through shared DI interfaces (IContentManager, IContentHandler, IWorkflowManager, ISession) with no inter-module network boundary. Horizontal scaling uses optional Redis modules (OrchardCore.Redis.Cache, OrchardCore.Redis.Bus, OrchardCore.Redis.Lock) to provide distributed state across identical process instances.\n\nPIPELINE (secondary, 0.72): Three distinct pipeline patterns are present. (1) Recipe/deployment pipeline: IRecipeStep handlers (one per module: AdminMenuStep, WorkflowTypeStep, UrlRewritingStep, SitemapsStep, etc.) process JSON recipe documents sequentially. (2) Content lifecycle pipeline: ContentHandlerBase provides 14 paired before/after hooks (CreatingAsync/CreatedAsync, PublishingAsync/PublishedAsync, RemovingAsync/RemovedAsync, CloningAsync/ClonedAsync, etc.) invoked in sequence by ContentPartHandlerCoordinator across all registered IContentHandler implementations. (3) Workflow activity pipeline: WorkflowManager.cs executes user-defined DAG activity graphs (ForEach, Fork, Join, IfElse, While tasks) with a MaxRecursionDepth guard and distributed lock per workflow execution.\n\nDEPLOYABILITY evidence: Single Dockerfile producing one binary; Redis modules for distributed deployment; Deployment module for JSON recipe-based environment promotion.\n\nMODULARITY evidence: 94 modules each self-contained with Manifest.cs, Startup.cs, Permissions.cs, and optional AdminMenu.cs; feature-level granularity (Users module has 14 distinct features); runtime enable/disable per tenant via IShellDescriptorFeaturesManager.\n\nEVOLVABILITY evidence: IStartup plug-in contract allows new modules without touching existing code; Database Migrations pattern per module for schema evolution; ShellHost reload retries (up to 9) allow graceful feature reconfiguration; IModularTenantEvents for cross-cutting tenant lifecycle hooks.\n\nFAULT TOLERANCE evidence: IDistributedLock (LocalLock or RedisLock) prevents concurrent workflow execution and index rebuild races in WorkflowManager; ModularBackgroundService (ModularBackgroundService.cs) isolates per-shell background task failures; ShellHost ReloadShellMaxRetriesCount = 9 with semaphore-per-shell for safe concurrent reload.\n\nSCALABILITY evidence: Redis distributed cache, message bus, and lock modules decouple shared state for multi-node deployments; ShellHost ConcurrentDictionary supports hundreds of tenant shells each with independent feature sets; ModularBackgroundService schedules IBackgroundTask per tenant shell independently.\n\nOBSERVABILITY evidence: HealthChecks module (src/OrchardCore.Modules/OrchardCore.HealthChecks/Startup.cs) registers AddHealthChecks() with configurable URL and detail level; AuditTrail module for structured event logging of content and user operations; NLog integration via UseNLogHost() in CMS web host entry point.\n\nRULED OUT - Microservices: Single process with no inter-service network calls; modules share one database session per tenant via YesSql ISession injected through DI.\n\nRULED OUT - Event-Driven: IFeatureEventHandler and IModularTenantEvents provide lifecycle hooks but there is no central event bus or message broker for domain events between modules; communication is synchronous DI-based rather than event-sourced.\n\nRULED OUT - Layered: Module organization is vertical by feature domain, not horizontal by layer. Each module owns its own controllers, services, handlers, drivers, views, and data access, explicitly avoiding a cross-cutting layered dependency graph."
