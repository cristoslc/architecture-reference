quality_attributes:
  - Extensibility: PluginsRegistry with 20+ extension points; AppMixin enables plugins to register Django apps with models
  - Deployability: Single Docker image (inventree/inventree); Procfile-driven web+worker; supports PostgreSQL/MySQL/SQLite
  - Maintainability: Uniform per-app layering (models/serializers/api/tasks/admin) across all domain modules
  - Scalability: Configurable django-q2 qcluster worker count; Redis as shared cache/queue broker when enabled
  - Testability: Pytest with per-module test files; PLUGIN_TESTING and PLUGIN_TESTING_EVENTS isolation flags
  - Interoperability: drf-spectacular OpenAPI schema; OAuth2/SSO/API-token auth; APICallMixin for outbound plugin integrations
  - Observability: structlog structured logging; OpenTelemetry tracing; optional Sentry for web and worker
notable_strengths:
  - Runtime plugin hot-reload without server restart
  - Core features (barcodes, labels, currency) extensible via same plugin API as third-party code
  - REST API fully documented with OpenAPI/drf-spectacular; Python client library available
  - Supports multiple databases and storage backends without code changes
notable_gaps:
  - No enforced bounded contexts between domain apps; cross-app imports are unrestricted
  - No service mesh or API gateway; horizontal scaling requires external load balancer
  - Background task visibility limited to django-q2 admin; no built-in workflow orchestration
