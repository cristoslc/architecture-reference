one_line_summary: >-
  Open-source inventory management system with a plugin microkernel over a Django/DRF layered backend
  and React SPA frontend.
review_notes: >-
  InvenTree is primarily a Microkernel architecture: a central PluginsRegistry (plugin/registry.py)
  dynamically loads and manages plugins at runtime through 20+ named extension points defined by
  PluginMixinEnum. Core features (barcodes, labels, currency exchange, notifications) are themselves
  implemented as mandatory built-in plugins, making the extension mechanism first-class. Within each
  Django domain app the code follows strict horizontal Layered architecture (models/serializers/api/
  tasks/admin). Deployed as a monolithic unit (single Docker image) with a separate qcluster worker
  process for async tasks.
