classification_reasoning: |
  ## Architecture Analysis: InvenTree

  ### Primary Style: Microkernel (confidence 0.88)

  InvenTree is structured around a formal plugin microkernel. The central artefact is
  `PluginsRegistry` (`src/backend/InvenTree/plugin/registry.py`), which:
  - Discovers and loads plugins from pip entry points, a plugin file, and built-in packages
  - Maintains an ordered dict of active/inactive plugin instances with thread-safe locks
  - Dynamically registers Django apps, URL patterns, and admin interfaces per plugin at runtime
  - Exposes a `check_reload()` cycle so plugins can be hot-reloaded without restarting the server

  The extension contract is defined by `InvenTreePlugin` (plugin/plugin.py) and
  `PluginMixinEnum`, which enumerates 20+ named capabilities a plugin may provide:
  ACTION, API_CALL, APP, BARCODE, CURRENCY_EXCHANGE, EVENTS, EXPORTER, ICON_PACK, LABELS,
  LOCATE, MACHINE, MAIL, NAVIGATION, NOTIFICATION, REPORT, SCHEDULE, SETTINGS,
  STATE_TRANSITION, SUPPLIER, SUPPLIER_BARCODE, UI_MIXIN, VALIDATION.

  Each capability maps to a mixin class in `plugin/base/integration/` and `plugin/base/`:
  - ScheduleMixin — cron-style background tasks via django-q2
  - EventMixin — subscribe to domain events dispatched by `trigger_event()`
  - AppMixin — register full Django apps with models and migrations
  - UrlsMixin — expose custom REST endpoints
  - ValidationMixin — hook into model validation
  - UserInterfaceMixin, NavigationMixin — extend the React SPA

  Critically, core system capabilities are themselves delivered as built-in plugins under
  `plugin/builtin/`: barcode scanning, label printing, data exporters, currency exchange,
  supplier integrations, and notification delivery. A `MANDATORY_PLUGINS` registry list
  ensures these are always active. This is the defining Microkernel signal: the core
  runtime provides lifecycle management and extension points; features live in plugins.

  The Machine subsystem (`src/backend/InvenTree/machine/`) follows the same pattern —
  `MachineDriverMixin` is a plugin mixin, and machine types are registered via the plugin
  registry, not hard-coded.

  ### Secondary Style: Layered (confidence 0.85)

  Within each Django domain application the codebase rigidly follows horizontal layering:
  - Data layer: `models.py` — Django ORM models (4,446 lines in part/models.py alone)
  - Serialisation layer: `serializers.py` — DRF serializers for JSON I/O
  - API/Controller layer: `api.py` — DRF class-based views with filtering and permissions
  - Admin layer: `admin.py` — Django admin registrations
  - Async layer: `tasks.py` — django-q2 offloaded tasks
  - Test layer: per-module `test_*.py` files

  Domain apps following this pattern: part, stock, order, build, company, machine, report,
  importer, data_exporter, common, users, generic.

  The React/Mantine SPA (`src/frontend/`) is the presentation tier consuming the REST API
  exclusively via axios and @tanstack/react-query. The gunicorn WSGI process serves the web
  tier; a separate qcluster process (same codebase, different entrypoint) handles background
  tasks. Redis optionally provides shared cache and acts as the django-q2 broker when
  GLOBAL_CACHE_ENABLED is true.

  ### Domain Event System

  Each domain app publishes a typed event enum (`StockEvents`, `PartEvents`, `PurchaseOrderEvents`,
  `SalesOrderEvents`, `BuildEvents`) using `BaseEventEnum`. `trigger_event()` offloads event
  dispatch to the qcluster worker via `offload_task(register_event, ...)`. Plugins implementing
  `EventMixin` subscribe to these events. This is an event bus within the plugin microkernel
  — not a primary Event-Driven architecture style (all user-facing operations are synchronous REST).

  ### Deployment Topology

  - Single Docker image `inventree/inventree` contains both web (gunicorn) and worker (qcluster)
  - `Procfile`: `web: gunicorn ... InvenTree.wsgi` and `worker: manage.py qcluster`
  - Shared PostgreSQL (or MySQL/SQLite) database; no per-service databases
  - Optional Redis for cache, session, and queue broker
  - Caddy reverse proxy in compose; static frontend served by whitenoise/gunicorn

  ### What This Is NOT

  - Not Microservices: single Docker image, single shared database, no service boundaries
  - Not Modular Monolith: apps share the database, import each other freely; no enforced bounded contexts
  - Not Hexagonal: no ports/adapters abstraction; Django ORM used directly throughout domain apps
  - Not Event-Driven primary: REST synchronous API is the primary interaction model; events are a
    plugin notification mechanism, not the core communication backbone

