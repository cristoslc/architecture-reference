review_notes: A textbook Go microservices reference implementation for a food delivery platform. Three independently deployable
  services (catalogwriteservice, catalogreadservice, orderservice) each with their own go.mod, Dockerfile, and database. Catalog
  is split write/read (PostgreSQL vs MongoDB+Redis) as a service-level CQRS boundary. Orders use EventStoreDB event sourcing
  with MongoDB/Elasticsearch projections. RabbitMQ integration events propagate state across service boundaries. DDD tactical
  patterns (event-sourced aggregate, value objects, domain events with invariant validation, bounded context isolation) applied
  consistently. Vertical Slice Architecture used within each service. Full OpenTelemetry observability stack.
