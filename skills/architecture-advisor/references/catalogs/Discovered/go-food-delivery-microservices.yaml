classification_reasoning: |-
  ## Architecture Classification

  ### Primary: Microservices

  Three independently deployable services with separate go.mod files, Dockerfiles, and port allocations:
  - catalogwriteservice: HTTP :7000, gRPC :6003, PostgreSQL (catalogs_write_service)
  - catalogreadservice: HTTP :7001, gRPC :6004, MongoDB (catalogs_read_service) + Redis
  - orderservice: HTTP :8000, gRPC :6005, EventStoreDB + MongoDB (orders_service)

  Database-per-service enforced at config level. Services communicate asynchronously via RabbitMQ and synchronously via gRPC.

  ### Secondary: Event-Driven

  RabbitMQ is the sole inter-service async integration mechanism. ProductCreatedV1 integration event published in createProductHandler after PostgreSQL write; consumed by catalogreadservice productCreatedConsumer to project into MongoDB and Redis. Typed Bus interface (Producer + BusControl + ConsumerConnector) in internal/pkg/core/messaging/bus. RabbitMQ consumer implements exponential backoff retry (3 attempts, 300ms). OrderCreatedV1 domain events drive projections to MongoDB and Elasticsearch in the Order service.

  ### Secondary: CQRS

  Catalog domain split across two physical services: catalogwriteservice (writes to PostgreSQL) and catalogreadservice (reads from MongoDB + Redis). Formal Command/Query type system in internal/pkg/core/cqrs. All dispatch via go-mediatr registered handlers. Order service applies CQRS internally: EventStoreDB as write store, MongoDB/Elasticsearch projections as read models.

  ### Secondary: Domain-Driven Design

  Order aggregate extends EventSourcedAggregateRoot with full event-sourcing lifecycle. ShopItem is a proper value object (unexported fields, accessor methods only). Domain events (OrderCreatedV1) enforce business invariants in factory constructors. Domain exceptions are typed (OrderShopItemsRequiredError, InvalidDeliveryAddressError). Services represent bounded contexts with no shared domain types.

  ### Notable: Vertical Slice Architecture

  Each feature folder (e.g., creatingproduct/v1/) contains command type, HTTP endpoint, command handler, DTOs, and integration events — all concerns for a single feature in one place. Applied consistently across all three services.

  ### Ruled Out

  - Modular Monolith: separate Dockerfiles and databases per service
  - Layered: vertical feature slices, not horizontal technical layers
  - Hexagonal: bounded context decomposition is the primary driver, not port-centric design
  - Serverless: all services are containerized long-running processes
quality_attributes:
- name: Scalability
  justification: Each service is independently containerized and can be scaled horizontally without affecting siblings. Kubernetes
    manifests in deployments/kubernetes/ support replica-based scaling per service.
- name: Deployability
  justification: Three independent Dockerfiles, three independent go.mod files, and per-service Makefile/taskfile.yml enable
    fully independent build and deploy pipelines.
- name: Data Isolation
  justification: Strict database-per-service (PostgreSQL, MongoDB+Redis, EventStoreDB+MongoDB) with no cross-service direct
    database access possible by architecture.
- name: Fault Tolerance
  justification: RabbitMQ consumer implements exponential backoff retry (3 attempts, 300ms initial delay). EventStoreDB subscription
    uses durable named subscriptionId for at-least-once delivery. Services fail independently.
- name: Consistency (Eventual)
  justification: Cross-service state propagated asynchronously via RabbitMQ integration events. Catalog read model and Order
    MongoDB projection are eventually consistent with their respective write stores.
- name: Testability
  justification: testcontainers-go used for integration tests with real infrastructure per test. Mockery-generated mocks for
    all interface boundaries. config.test.json provides isolated test configurations.
- name: Observability
  justification: OpenTelemetry distributed tracing with Jaeger and Tempo exporters; Prometheus metrics with Grafana dashboards;
    Uber Zap structured logging; Swagger UI on all REST endpoints. Wired per-service throughout.
- name: Evolvability
  justification: Bounded context isolation allows independent domain model evolution per service. Versioned integration event
    types (ProductCreatedV1, OrderCreatedV1) support backward-compatible evolution. Shared infrastructure is a local module
    replacement, not a published dependency.
