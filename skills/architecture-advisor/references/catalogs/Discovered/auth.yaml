one_line_summary: "Single-binary Go authentication service with a clear HTTP/domain/storage layered architecture and cohesive internal module boundaries, supporting JWT, OAuth 2.1, SAML SSO, MFA, passkeys, and a hook-based extensibility system."
classification_reasoning: "Supabase Auth (formerly GoTrue) is a focused authentication service deployed as a single Go binary against a single PostgreSQL database. The primary style is Layered: internal/api/ forms the HTTP presentation tier (chi router, middleware chain, 80+ feature-by-feature handlers), internal/models/ and internal/tokens/ form the domain/business tier (User, Session, Identity, Factor entities plus JWT token service and lifecycle hook dispatch), and internal/storage/ forms the data access tier (gobuffalo/pop ORM, connection pool management, transaction handling). Dependencies flow strictly downward through these tiers with cross-cutting infrastructure packages (conf, observability, ratelimit, crypto) serving all layers. The secondary style is Modular Monolith: Go's internal/ package convention enforces module-level isolation with 16 distinct sub-packages each owning a single named responsibility, interfaces at key seams (mailer.Mailer, hooks dispatchers), and multiple mailer client implementations (templatemailer, taskclient, noopclient) that can be swapped independently. Despite this modularity, all components share one process, one database, and one configuration root, making this a single deployable unit rather than microservices. The hook system (v0hooks.Manager dispatching to HTTP endpoints or Postgres functions for SendSMS, SendEmail, CustomAccessToken, BeforeUserCreated, AfterUserCreated, MFAVerification, PasswordVerification) is an in-request synchronous extension point pattern, not a microkernel plugin architecture. Event-Driven, Hexagonal, CQRS, DDD, and Microservices were all ruled out: there is no message broker or async event bus, domain models directly reference storage.Connection without ports/adapters inversion, there is no read/write model separation or event sourcing, and there are no bounded contexts or inter-service network calls."
