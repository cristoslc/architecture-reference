one_line_summary: "An open-source Firebase alternative built as a suite of independently containerised microservices (auth, storage, GraphQL/Hasura, functions, AI/Graphite) each organised internally as a strict three-layer Go stack, plus file-per-endpoint serverless functions for custom logic."
classification_reasoning: "Nhost exhibits a three-style composition: Microservices as primary, Layered as secondary (per-service internal structure), and Serverless as secondary (Functions product).\n\nMICROSERVICES (primary, 0.87): The platform is composed of independently deployed, separately containerised services communicating exclusively over HTTP. Core services are: auth (nhost/auth, port 4000, Go), storage (nhost/storage, port 5000, Go), graphql (Hasura fork, port 8080), functions (Node.js Express, port 3000), ai/Graphite (nhost/graphite), dashboard (Next.js), postgres, minio, mailhog, and traefik as edge proxy. Each core service has its own directory (services/auth/, services/storage/), its own Go module entry point (main.go), its own migrations, its own Docker image, its own versioned CHANGELOG, and its own OpenAPI/GraphQL schema. The CLI's getServices() function in cli/dockercompose/compose.go assembles the full set as independent named containers with health-condition depends_on chains. The storage service uses Hasura GraphQL via HTTP as its metadata store (services/storage/metadata/hasura.go). The auth service reads and writes user data through HASURA_GRAPHQL_GRAPHQL_URL. Traefik routes subdomain-based requests to each service.\n\nLAYERED (secondary, 0.82): Each individual service is internally organised as a strict three-layer stack. Auth service: api/ (OpenAPI-generated transport + request parsing) -> controller/ (business logic with typed interfaces: DBClient, Emailer, SMSer, Encrypter, OAuthProvider) -> sql/ (sqlc-generated PostgreSQL queries). Storage service: api/ (OpenAPI) -> controller/ (MetadataStorage interface + ContentStorage interface) -> metadata/ (Hasura GraphQL adapter) + storage/ (S3 adapter). Dependency injection is manual, wired at startup in cmd/serve.go via getController(), which passes concrete implementations into the controller through interfaces, achieving inversion of control without a DI framework.\n\nSERVERLESS (secondary, 0.75): The Functions product deploys user-defined TypeScript/JavaScript files from a ./functions/ directory as individual HTTP endpoints, auto-routed by file path. Each function file exports a single default Express handler; the runtime assembles these into an HTTP server at container start. Documentation explicitly calls them 'serverless functions' and positions them alongside Lambda/Vercel use cases (event triggers, webhook handlers, custom API logic). The Nhost Run product extends this by allowing arbitrary Docker containers to run alongside the core stack.\n\nRULED OUT - Modular Monolith: Services are separate processes with separate databases/data stores and communicate only over HTTP. This is genuine distributed deployment, not a modular single-process application.\n\nRULED OUT - Event-Driven: There is no message broker, event bus, or async queue in the core nhost platform codebase. Services communicate synchronously over HTTP.\n\nRULED OUT - Microkernel: There is no plugin host or extension loading mechanism in the nhost platform itself. Extensibility is achieved by composing additional containers (Run) or adding files to functions/, not by registering plugins into a core runtime.\n\nRULED OUT - Service-Based (as primary): Services are at microservice granularity - each has its own schema, own migrations, own versioned image, and communicates over HTTP. Auth owns the 'auth' schema; storage owns the 'storage' schema. The Hasura GraphQL engine does provide a unified API surface but it is itself one of the independent services, not a monolithic application tier."
