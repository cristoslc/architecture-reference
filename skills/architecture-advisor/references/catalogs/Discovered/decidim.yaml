one_line_summary: >-
  A Rails-based participatory democracy platform built as a Microkernel
  (decidim-core kernel + self-registering plugin gems) deployed as a single
  Modular Monolith with a shared PostgreSQL database.
classification_reasoning: |
  ## Primary Style: Microkernel

  `decidim-core` functions as the kernel, providing a stable extension-point
  API: `ComponentManifest`, `ParticipatorySpaceManifest`, `ManifestRegistry`,
  `ViewHooks`, `WorkflowRegistry`, `ContentBlockRegistry`, `PermissionsRegistry`,
  `MutationRegistry`, `StatsRegistry`, and `MenuRegistry`. All 27+ feature
  modules self-register at boot via the kernel's DSL:

      Decidim.register_component(:proposals) do |component|
        component.engine = Decidim::Proposals::Engine
        component.permissions_class_name = "Decidim::Proposals::Permissions"
        component.on(:create) { |instance| ... }
        component.settings(:global) { |s| s.attribute :vote_limit, ... }
        component.register_resource(:proposal) { |r| ... }
      end

  The core `Component` model looks up manifests dynamically
  (`Decidim.find_component_manifest(manifest_name)`) — the kernel holds no
  hard-coded references to any plugin. Administrators can enable, disable, and
  configure plugins at runtime within participatory spaces.

  ## Co-primary Style: Modular Monolith

  Despite the plugin facade, all modules run in the same Ruby process, share a
  single PostgreSQL database (254 core migrations + module-specific migrations
  all in one schema), and are packaged together via `decidim.gemspec` as a
  single deployable unit. Module boundaries are organisational (gem + namespace)
  rather than process or deployment boundaries. This distinguishes the system
  from Microservices or Service-Based architecture.

  ## Internal Structuring: Layered

  Every module applies a consistent horizontal layering inside its `app/`
  directory: controllers and cells (presentation), commands and forms
  (application services), queries (read-side), models (domain/persistence),
  events (notification payloads), and jobs/mailers (infrastructure). The
  `Decidim::Command` base class integrates Wisper for intra-command pub/sub
  (`broadcast(:ok, resource)`), and `Decidim::Query` provides composable query
  object primitives. This is a uniform internal discipline, not a primary
  architectural style.

  ## Supplementary: Event-Driven Notification Subsystem

  `Decidim::EventsManager` wraps `ActiveSupport::Notifications` with a wildcard
  subscriber for `decidim.events.*` patterns. Commands publish domain events
  after writes; `EventPublisherJob` routes them asynchronously to email and
  in-app notification generators. This is scoped to the notification pipeline
  and does not govern primary business flows.

  ## Why Not Other Styles

  - NOT Microservices or Service-Based: single process, shared database, no
    inter-service communication.
  - NOT Hexagonal: no ports/adapters abstraction; direct Rails Engine coupling.
  - NOT CQRS: commands and queries share the same write model and database;
    there is no separate read model.
  - NOT Event-Driven (primary): events drive only notifications; core control
    flow is synchronous Rails MVC + Commands.
  - NOT Domain-Driven Design (style): modules share the kernel's schema and
    base classes rather than being autonomous bounded contexts.
