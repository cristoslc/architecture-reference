classification_reasoning: "Forem is classified as Layered (primary) + Event-Driven
  (secondary).\n\n### Primary Style: Layered\n\nThe codebase organizes every concern
  into explicit horizontal layers with unidirectional dependencies:\n\n1. **HTTP/Routing
  Layer** (`app/controllers/`, 229 files) — ApplicationController inherits from ActionController::Base,
  includes Pundit::Authorization, CachingHeaders, SessionCurrentUser. Routes split
  into admin.rb, api.rb, listing.rb sub-files within config/routes/ (510-line main
  file).\n2. **Authorization Layer** (`app/policies/`, 37 files, Pundit) — ApplicationPolicy
  documents itself as \"the canonical source for authorization\". Policies cover all
  domain entities (Article, User, Comment, Organization, etc.).\n3. **Business Logic
  Layer** (`app/services/`, 265 files) — ApplicationService defines a `.perform`
  base. All service objects follow `Module::Class.call(...)` pattern. Examples: Articles::Creator,
  Users::Update, Badges::Award, Notifications::NewFollower::Send.\n4. **Query Layer**
  (`app/queries/`, 18 files) — dedicated query classes separate complex ActiveRecord
  SQL (articles/api_search_query.rb, users/listing_query.rb, billboards/listing_query.rb).\n5.
  **Data Access Layer** (`app/models/`, 147 files, ActiveRecord) — ApplicationRecord
  adds batch query helpers, decorator inference, statement timeout controls. Models
  use Concerns (Reactable, AlgoliaSearchable, Purgeable) for cross-cutting behaviors.\n6.
  **Decoration Layer** (`app/decorators/`, 10 files, Draper) — Draper-based view-specific
  formatting. ApplicationRecord#decorator_class infers decorator from model name.\n\n###
  Secondary Style: Event-Driven\n\n122 Sidekiq worker files organized in domain namespaces
  constitute a substantial async event processing subsystem:\n\n- 6-tier priority
  queue: default(1), low_priority(10), medium_priority(100), high_priority(1000),
  scheduler(1000), mailers(1000)\n- sidekiq-cron: 15+ scheduled background events
  (feed imports, metrics recording, badge awards)\n- sidekiq-unique-jobs: deduplication
  semantics treating jobs as events\n- sidekiq-throttled: per-queue concurrency control\n-
  Workers namespace mirrors service namespace (notifications/, articles/, feeds/, users/,
  badges/, metrics/, spam/)\n- Workers delegate to service objects — async dispatch
  is separate from business logic\n\nExample: Notifications::NewFollowerWorker#perform
  calls Notifications::NewFollower::Send.call(follow_data, is_read: is_read)\n\n###
  Rejected classifications:\n\n- **Microkernel**: 64 Liquid tags are user-content
  embedding (render HTML in article bodies), not application extension hooks. No plugin
  lifecycle, no runtime enable/disable, no route/model/middleware injection by plugins.\n-
  **Modular Monolith**: No enforced module boundaries. Ruby namespace organization
  (Articles::, Users::, etc.) without isolation contracts, shared database, free cross-model
  references.\n- **Microservices/Service-Based**: Single Containerfile, single PostgreSQL,
  single Redis. Procfile has two processes (web + sidekiq), not services.\n- **CQRS**:
  Standard ActiveRecord read/write. Query objects are encapsulation patterns, not
  CQRS read models.\n- **Hexagonal**: No ports/adapters. Controllers call services
  directly; services call models directly.\n- **Pipeline**: No sequential transformation
  stages.\n\nConfidence 0.90: cap reflects that the Event-Driven pattern operates
  entirely within Sidekiq queue model (no message broker/pub-sub bus) — some analysts
  would weight it as a significant implementation pattern rather than co-primary style."
