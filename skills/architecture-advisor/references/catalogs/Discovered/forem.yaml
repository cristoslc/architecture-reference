notable_strengths:
- 265 service objects with consistent Module::Class.call(...) pattern keeps business
  logic named, focused, and testable
- 6-tier Sidekiq priority queue (default/low/medium/high/scheduler/mailers) with
  deduplication (sidekiq-unique-jobs) and throttling (sidekiq-throttled)
- Pundit policy layer documented as canonical authorization source with 37 policy
  files covering all domain entities
- 18 query objects separate complex ActiveRecord SQL from models
- Fastly CDN integration and edge cache services for high-scale content delivery
- 1,203 RSpec spec files plus Cypress end-to-end tests
- DataDog metrics instrumentation with dedicated background workers reporting queue stats
notable_gaps:
- No enforced module boundaries between domain areas despite large codebase (shared
  database, models freely cross-reference each other)
- No plugin API for community-contributed application extensions (Liquid tags are
  content embedding only, not application extensibility hooks)
- Single PostgreSQL database is the primary horizontal scaling bottleneck
- ActionCable not used (action_cable/engine commented out in application.rb) — real-time
  features are limited to polling or external push services
