classification_reasoning: >-
  Dagster exhibits two reinforcing primary architecture styles: Pipeline
  (Pipe-and-Filter) and Microkernel.


  PRIMARY STYLE — Pipeline (Pipe-and-Filter): The fundamental computational
  model is a directed acyclic graph (DAG) of discrete processing units (Ops
  and Assets) connected by typed inputs and outputs. The ExecutionPlan in
  `dagster/_core/execution/plan/plan.py` uses `toposort` to order steps and
  maps `StepOutput` handles to `StepInput` sources (FromStepOutput,
  FromConfig, etc.) — the textbook pipe-and-filter pattern. The
  `DependencyStructure` abstraction in `dagster/_core/definitions/dependency.py`
  formally models "pipes" (dependencies) connecting "filters" (nodes). The
  Software-Defined Asset model (`AssetsDefinition`) expresses data lineage as
  an upstream-downstream dependency graph. The `@op`, `@graph`, `@job`, and
  `@asset` decorator DSL provides the user-facing API for building these
  graphs declaratively.


  SECONDARY STYLE — Microkernel (Plugin): Dagster's extensibility is built on
  a stable core kernel that exposes abstract extension points (ABCs) against
  which 67+ independently versioned plugin packages register. Key extension
  points include: `Executor` ABC (in-process, multiprocess, Celery, Dask, K8s
  implementations), `RunLauncher` ABC (process, Docker, K8s), `RunCoordinator`
  ABC, `IOManagerDefinition`/`ResourceDefinition` for storage and external
  resource injection, `DagsterStorage` ABC covering EventLogStorage/RunStorage/
  ScheduleStorage, and the `Component` ABC with `build_defs()` for the
  component system. All 67 integration libraries call
  `DagsterLibraryRegistry.register()` in their `__init__.py`. The gRPC server
  dynamically loads user code repositories at runtime via
  `ReconstructableRepository` and `LoadableTargetOrigin`, enabling kernel
  extension without kernel modification. The `ComponentTree` discovers,
  loads, and composes pluggable `Component` instances from YAML or Python
  declarations.


  The deployment topology (webserver + daemon + user-code gRPC servers +
  shared PostgreSQL) has service-based characteristics, but these services
  share a database schema and are coordinated deployment units of a single
  logical system — not autonomous microservices.


  Rejected: Microservices (shared DB schema, no independent data ownership),
  Event-Driven (event log is a read model not a message bus; internal
  communication is synchronous via shared storage and gRPC), CQRS (no
  architectural command/query segregation principle), Serverless (persistent
  long-lived daemon and webserver processes), DDD (no bounded contexts or
  DDD tactical patterns), Hexagonal Architecture (conventional layering,
  not ports-and-adapters).
