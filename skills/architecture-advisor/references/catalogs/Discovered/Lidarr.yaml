one_line_summary: An automated music collection manager built as a Modular Monolith
  with a Microkernel plugin layer — the ThingiProvider framework lets indexers, download
  clients, and notifications be added at runtime without touching the core, while
  an internal EventAggregator and CommandExecutor coordinate all domain workflows
  within a single ASP.NET Core process.
classification_reasoning: "## Primary Style: Modular Monolith\n\nLidarr is a single\
  \ deployable ASP.NET Core process bootstrapped in\n`NzbDrone.Host/Bootstrap.cs`\
  \ using DryIoc (`AutoAddServices(assemblies)`).\nThe solution (`Lidarr.sln`) contains\
  \ ~25 projects, all compiled into one binary:\n\n- `NzbDrone.Core` — 1,399 .cs files,\
  \ all business logic\n- `Lidarr.Api.V1` — REST controllers (ASP.NET Core MVC)\n\
  - `Lidarr.Http` — middleware, authentication, error handling\n- `NzbDrone.SignalR`\
  \ — real-time WebSocket push to the React frontend\n- `NzbDrone.Common` — shared\
  \ infrastructure (HTTP, disk, serialization, DI)\n- `NzbDrone.Windows` / `NzbDrone.Mono`\
  \ — platform-specific shims\n\nWithin `NzbDrone.Core`, every functional domain is\
  \ organized as a vertical slice:\n\n- `Music/` — Artist, Album, Track services,\
  \ events (`AlbumAddedEvent`), handlers\n- `Download/` — download client abstraction,\
  \ completion/failure processing\n- `Indexers/` — indexer request/response pipeline,\
  \ RSS sync\n- `Notifications/` — notification fanout on grab/import/rename/health\
  \ events\n- `MediaFiles/` — disk scan, audio tag read/write, file import/rename\n\
  - `Queue/` — in-progress download tracking\n- `History/` — persistent download/import\
  \ audit log\n- `ImportLists/` — Spotify, Last.fm, Headphones, MusicBrainz list providers\n\
  \nThe system runs against a single SQLite or PostgreSQL database accessed through\n\
  `BasicRepository<T>` (Dapper-based), with 80 ordered migration scripts under\n`Datastore/Migration/`.\n\
  \n## Secondary Style: Microkernel\n\nThe `ThingiProvider` framework (`NzbDrone.Core/ThingiProvider/`)\
  \ is a generic\nplugin bus. Every extension category — indexers, download clients,\
  \ notifications,\nimport lists, metadata providers — implements `IProvider`:\n\n\
  \  public interface IProvider\n  {\n      string Name { get; }\n      Type ConfigContract\
  \ { get; }\n      IEnumerable<ProviderDefinition> DefaultDefinitions { get; }\n\
  \      ProviderDefinition Definition { get; set; }\n      ValidationResult Test();\n\
  \      object RequestAction(string action, IDictionary<string, string> query);\n\
  \  }\n\nThe generic `ProviderFactory<TProvider, TProviderDefinition>` (implements\n\
  `IProviderFactory`) resolves implementations from the DryIoc container at\nruntime\
  \ (`_container.GetRequiredService(type)`) and publishes lifecycle events\n(`ProviderAddedEvent<T>`,\
  \ `ProviderUpdatedEvent<T>`, `ProviderDeletedEvent<T>`)\nthrough `EventAggregator`.\
  \ Concrete plugin counts:\n\n- ~20 download client implementations (qBittorrent,\
  \ Transmission, Deluge,\n  SABnzbd, rTorrent, uTorrent, Flood, etc.) via `DownloadClientBase<TSettings>`\n\
  - ~30 notification targets (Discord, Email, Webhook, Apprise, Gotify, Join,\n  Plex,\
  \ Notifiarr, etc.) via `NotificationBase` / `INotification`\n- ~15 indexer types\
  \ (Newznab, Torznab, Gazelle, Redacted, Headphones, etc.)\n  via `HttpIndexerBase`\n\
  - ~10 import list sources (Spotify, Last.fm, MusicBrainz, Headphones, etc.)\n\n\
  Adding a new extension requires zero changes to the factory core; the new\nclass\
  \ is auto-discovered by DryIoc's `AutoAddServices`.\n\nThe internal event/command\
  \ infrastructure reinforces the plugin model:\n\n- `EventAggregator.PublishEvent<TEvent>`\
  \ resolves all `IHandle<TEvent>` +\n  `IHandleAsync<TEvent>` subscribers from the\
  \ container and dispatches\n  synchronously then asynchronously via `TaskFactory`.\n\
  - `CommandExecutor` resolves `IExecute<TCommand>` handlers from the container\n\
  \  and runs them across three worker threads from a `CommandQueue`.\n- Example flow:\
  \ `AlbumAddedHandler : IHandle<AlbumAddedEvent>` reacts to an\n  album being added\
  \ and pushes a `RefreshArtistCommand` or `RefreshAlbumCommand`\n  back to the `CommandQueueManager`.\n\
  \n## What This Is NOT\n\n- **NOT Microservices**: One binary, one database, no network\
  \ service boundary.\n  The *arr ecosystem is Service-Based at the ecosystem level,\
  \ but each member\n  is a self-contained monolith.\n- **NOT Layered (horizontal)**:\
  \ Organizing principle is vertical domain modules\n  within `NzbDrone.Core`, not\
  \ horizontal technical tiers (though Api -> Core ->\n  Datastore dependency direction\
  \ is layered).\n- **NOT Event-Driven (async messaging)**: `EventAggregator` is an\
  \ in-process\n  publish/subscribe mechanism — no Kafka, RabbitMQ, or durable queues.\n\
  - **NOT CQRS**: No separate read/write models; services read and write through\n\
  \  the same `BasicRepository<T>` and service layer.\n\n## Quality Attribute Evidence\n\
  \n- **Modularity**: Domain folders with own Models/Services/Repositories/Events;\n\
  \  `ThingiProvider` plugin contracts enforce separation between core and extensions;\n\
  \  DryIoc auto-discovery wires all implementations.\n- **Evolvability**: 80 ordered\
  \ DB migrations; adding new indexer/download-client/\n  notification requires no\
  \ core changes; `IHandle<TEvent>` allows new event\n  reactions without modifying\
  \ publishers.\n- **Observability**: NLog throughout; SignalR `MessageHub` pushes\
  \ real-time\n  command/event status to React UI; 20 `HealthCheck/Checks/` covering\
  \ indexer\n  status, download client config, root folder validity, API key, mount\
  \ points.\n- **Deployability**: Cross-platform .NET (Windows service, Linux daemon,\
  \ Docker);\n  SQLite default, PostgreSQL optional; Kestrel embedded web server;\
  \ no IIS\n  dependency.\n- **Fault Tolerance**: `CommandExecutor` catches per-command\
  \ exceptions and marks\n  commands failed without crashing worker threads; `ProviderFactory.Handle(ApplicationStartedEvent)`\n\
  \  removes missing implementations on startup rather than throwing; download\n \
  \ failure tracked and reported via `FailedDownloadService`.\n- **Scalability**:\
  \ Single-process, single-host design; vertical scaling only;\n  PostgreSQL support\
  \ allows external DB for home-lab multi-container setups.\n"
