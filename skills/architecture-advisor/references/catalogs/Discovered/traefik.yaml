classification_reasoning: "## Analysis\n\nTraefik exhibits a **Microkernel** architecture\
  \ as its primary pattern, with a strong **Pipeline** secondary pattern governing\
  \ request handling, and a **Layered** package topology as a supporting structural\
  \ property.\n\n### Evidence for Microkernel (Primary)\n\n**1. Formal Provider Interface**\n\
  - `pkg/provider/provider.go` defines `Provider{Provide(chan<- dynamic.Message, *safe.Pool)\
  \ error; Init() error}`\n- All 13+ built-in providers (Docker, Kubernetes, Consul,\
  \ ECS, Nomad, File, HTTP, KV, REST, ACME, Tailscale) and plugin providers implement\
  \ this identical contract\n- The core never references a concrete provider type\n\
  \n**2. Runtime Plugin Loading**\n- `pkg/plugins/manager.go` downloads, hash-validates\
  \ (SHA256), and installs plugins at runtime from an external registry\n- `pkg/plugins/builder.go`\
  \ instantiates them via Yaegi (Go interpreter) or Wazero (Wasm) without recompiling\
  \ the binary\n- Two plugin types: `typeMiddleware` and `typeProvider`\n- `type Constructor\
  \ func(context.Context, http.Handler) (http.Handler, error)` is the formal middleware\
  \ plugin contract\n\n**3. Extension Points in RouterFactory**\n- `pkg/server/routerfactory.go`\
  \ carries `pluginBuilder PluginsBuilder` as an interface dependency\n- Plugin middleware\
  \ and provider plugins are first-class in the routing assembly pipeline\n\n**4.\
  \ ProviderAggregator Pattern**\n- `pkg/provider/aggregator/aggregator.go` fans-in\
  \ all provider channels uniformly\n- Built-in and plugin providers are indistinguishable\
  \ from the aggregator's perspective\n\n**5. Single Deployable Core**\n- `Dockerfile`\
  \ copies a single `traefik` binary; `go.mod` is `github.com/traefik/traefik/v3`\n\
  - The core is fully functional with zero plugins installed\n\n### Evidence for Pipeline\
  \ (Secondary)\n\n**1. Middleware Chain Composition**\n- Every HTTP request passes\
  \ through an ordered `alice` chain: Recovery → Tracing/Metrics → AccessLog → EncodedCharacterDeny\
  \ → user middlewares → service handler\n- Each middleware receives `http.Handler`\
  \ and returns `http.Handler` — textbook pipe-and-filter\n\n**2. TCP Connection Pipeline**\n\
  - `TCPEntryPoint`: accept → deadline config → protocol sniff (`HandlerSwitcher`)\
  \ → TLS termination or passthrough → HTTP server dispatch\n\n**3. Configuration\
  \ Pipeline**\n- `receiveConfigurations` → transform/deduplicate → `applyConfigurations`\
  \ → `RouterFactory.CreateRouters()`\n- 100-capacity buffered channel between stages\n\
  \n**4. 30+ Composable Middleware Packages**\n- `pkg/middlewares/` contains independent\
  \ filter packages: auth, ratelimiter, circuitbreaker, compress, redirect, headers,\
  \ retry, buffering, capture, metrics, observability, ipallowlist, forwardedheaders,\
  \ passtlsclientcert, grpcweb, mirror, etc.\n\n### Evidence for Layered (Supporting)\n\
  \nStrict horizontal layering in `pkg/`:\n- Configuration Layer: `config/static/`,\
  \ `config/dynamic/`\n- Provider Layer: `provider/` (discovery adapters)\n- Server/Entrypoint\
  \ Layer: `server/` (listener management)\n- Router Layer: `server/router/`, `muxer/`\
  \ (rule matching)\n- Middleware Layer: `middlewares/` (request transformation)\n\
  - Service/Proxy Layer: `server/service/`, `proxy/` (backend forwarding)\n- Transport\
  \ Layer: `tcp/`, `udp/`, `tls/` (protocol primitives)\n\n### What Was Rejected\n\
  \n**Not Microservices**: Single binary deployment, single Go module, no inter-service\
  \ network communication.\n\n**Not Modular Monolith**: The runtime plugin loading\
  \ (Yaegi + Wasm) crosses into true microkernel territory. Modular monoliths have\
  \ compile-time-only extension; Traefik has genuine runtime extension without recompilation.\n\
  \n**Not Event-Driven Architecture**: Go channels are an internal delivery mechanism\
  \ for the configuration pipeline, not an architectural event bus. `dynamic.Message`\
  \ is the config update DTO, not a domain event.\n\n**Not Service-Based**: No decomposition\
  \ into separately deployed services; the API and dashboard are embedded in the same\
  \ binary.\n\n### Architecture Qualifiers Note\n\nPer ADR-006, Hexagonal/ports-and-adapters\
  \ is not assigned as a style. The Provider interface does resemble a port-and-adapter\
  \ boundary, but the dominant framing is microkernel (core + plugins) rather than\
  \ hexagonal (application + ports + adapters). Reverse-proxy, api-gateway, and load-balancer\
  \ are captured as `architecture_qualifiers` since they describe the domain role\
  \ rather than structural pattern."
review_notes: 'Traefik follows a Microkernel + Pipeline architecture. The core engine
  manages entrypoints and configuration watching without knowing about concrete providers
  or middleware implementations. All 13+ provider backends (Docker, Kubernetes, ECS,
  Consul, Nomad, File, HTTP, KV, REST, ACME, Tailscale) implement a single Provider
  interface and are treated uniformly by the ProviderAggregator. A runtime plugin
  system (Yaegi + Wasm) extends both middleware and provider types without binary
  recompilation. The request-handling path is a classic pipe-and-filter pipeline:
  TCP connections pass through a staged accept/sniff/route pipeline, and HTTP requests
  traverse an ordered alice middleware chain (Recovery → Observability → AccessLog
  → user middlewares → service handler) before reaching the backend. The Layered
  package structure enforces strict downward dependency flow across seven horizontal
  layers from config through transport.'
