one_line_summary: Single-binary Haskell REST server that auto-generates a RESTful API
  from any PostgreSQL schema using a strict horizontal layering of HTTP, auth, request
  parsing, planning, query building, transaction execution, and response rendering.
classification_reasoning: "## Architecture Classification Analysis\n\n### Primary Style:\
  \ Layered (0.94)\n\nPostgREST is organized as a set of strict horizontal layers,\
  \ each with a single responsibility, consuming the output of the layer below and\
  \ exposing a clean interface upward. The layer stack is: HTTP/Transport (App.hs,\
  \ Network.hs, Warp), Middleware chain (Auth.hs, Cors.hs, Logger.hs), Request parsing\
  \ (ApiRequest.hs and sub-modules), Planning/IR (Plan.hs and sub-modules), Query\
  \ building (Query.hs and sub-modules), Transaction execution (MainTx.hs), Response\
  \ rendering (Response.hs and sub-modules), and Schema knowledge (SchemaCache.hs\
  \ and sub-modules). Cross-cutting concerns (Config.hs, AppState.hs, Observation.hs,\
  \ Error.hs, Metrics.hs) are shared utilities, not layers. The middleware composition\
  \ in App.hs makes layer ordering explicit and enforced: traceHeaderMiddleware .\
  \ Cors.middleware . Auth.middleware . Logger.middleware. Each layer has unidirectional\
  \ dependencies downward — Plan never references Response; Query never references\
  \ ApiRequest directly.\n\n### Secondary Style: Pipeline (0.85)\n\nEvery HTTP request\
  \ flows through a strict five-stage processing pipeline within the layered structure:\
  \ (1) Parse — ApiRequest.userApiRequest decodes the HTTP request into a domain ApiRequest;\
  \ (2) Plan — Plan.actionPlan converts ApiRequest + SchemaCache into an ActionPlan\
  \ (intermediate representation); (3) Build — Query.mainQuery translates ActionPlan\
  \ into a MainQuery (SQL snippet bundle); (4) Execute — MainTx.mainTx runs the transaction\
  \ against the PostgreSQL pool via hasql; (5) Render — Response.actionResponse converts\
  \ DbResult into a PgrstResponse. This is explicit in postgrestResponse in App.hs\
  \ where each stage is timed separately for the Server-Timing response header. An\
  \ error at any stage short-circuits via ExceptT Error IO.\n\n### What Was Rejected\n\
  \n**Not Hexagonal/Ports-and-Adapters:** No explicit port interfaces for the database\
  \ adapter or HTTP driver. PostgREST uses hasql and Warp directly with no swappable\
  \ adapter abstraction layer.\n\n**Not Microkernel:** No plugin registry, no extension\
  \ point contracts, no dynamically loaded capabilities. Feature set is fixed at compile\
  \ time.\n\n**Not Modular Monolith:** Modules are horizontal layers, not independently\
  \ deployable vertical slices. There is no domain-by-domain decomposition.\n\n**Not\
  \ Event-Driven:** LISTEN/NOTIFY is limited to schema cache invalidation — it does\
  \ not represent a data-flow or coordination mechanism. No event broker or async message\
  \ passing between components.\n\n**Not CQRS:** Read and write paths are routed through\
  \ the same Plan->Query->MainTx->Response pipeline. WrappedReadPlan, MutateReadPlan,\
  \ and CallReadPlan are type-level variants inside a single pipeline, not separate\
  \ read/write models.\n\n### Quality Attributes Evidence\n\n**SIMPLICITY:** Single\
  \ binary, ~55 modules, one Cabal library + one executable, no inter-service communication.\
  \ The entire feature surface is a mapping of HTTP semantics to SQL.\n\n**PERFORMANCE:**\
  \ Compiled Haskell via Warp; hasql-pool for PostgreSQL connection pooling; JSON\
  \ serialisation delegated to PostgreSQL; JWT caching in Auth/JwtCache.hs using Sieve\
  \ cache; schema cache eliminates per-request catalog queries.\n\n**CORRECTNESS:**\
  \ Schema cache provides plan-time validation of resource embeddings, column names,\
  \ and function signatures before SQL is sent. Errors surface with structured PGRST\
  \ error codes.\n\n**OBSERVABILITY:** Prometheus metrics via prometheus-client; Server-Timing\
  \ headers per pipeline stage; centralised Observation handler routing to Logger and\
  \ Metrics; configurable query logging.\n\n**SECURITY:** JWT middleware runs before\
  \ any request reaches application logic; PostgreSQL row-level security and role-based\
  \ access are the primary authorization mechanism; CORS middleware is configurable.\n\
  \n**OPERABILITY:** LISTEN/NOTIFY-driven schema cache hot reload without process restart;\
  \ /live and /ready health endpoints via Admin server; configuration via file, environment,\
  \ and in-database settings."
