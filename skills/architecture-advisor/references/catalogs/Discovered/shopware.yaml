one_line_summary: A Symfony 7 / Vue.js 3 open-source e-commerce platform organised as a Modular Monolith with a two-track
  Microkernel extension system (Plugins and Apps), async Event-Driven processing via Symfony Messenger, and Hexagonal port-and-adapter
  abstractions across persistence, search, cache, and telemetry.
classification_reasoning: |-
  Shopware exhibits a four-style composition: Modular Monolith as primary, Microkernel, Event-Driven, and Hexagonal Architecture as secondary.

  MODULAR MONOLITH (primary, 0.92): Shopware deploys as a single PHP application that is decomposed into bounded domain modules sharing one database. Four top-level Symfony Bundles — Core, Storefront, Administration, Elasticsearch — are all registered in Kernel::registerBundles() and deployed together. Within Core there are thirteen high-cohesion subdomain namespaces (Checkout, Content, System, Framework, Service, Profiling, Maintenance, DevOps, Installer, Migration, etc.), each with its own Definition/Entity/Service/DependencyInjection/Migration slice. The 2022 ADR 'Mapping of product area' formalizes eight product areas (checkout, content, inventory, services-settings, buyers-experience, customer-order, admin, storefront) enforced by @Package annotations on every PHP class. All modules share a single Doctrine DBAL connection and a common DataAbstractionLayer (DAL). The project is distributed as a single Composer library (shopware/platform).

  MICROKERNEL (secondary, 0.88): A two-track runtime extension system sits atop the monolith. Plugins are PHP Symfony bundles loaded via KernelPluginLoader; Apps are manifest-driven, no-code extensions whose backend logic runs on remote HTTP servers (introduced in ADR 2020-08-12). The decoration pattern (ADR 2020-11-25) defines the standard Plugin contract: every extensible service exposes an abstract base class with getDecorated() so plugins chain-wrap services through the Symfony DI container. ADR 2024-06-18 formalises the transition from decoration to an event-based extension contract as the primary plug-in protocol. The App scripting system (Framework/Script/) adds Twig-sandbox hooks at named kernel extension points. CheckoutGatewayInterface and AppContextGateway are explicit contracts allowing app servers to intercept and modify core checkout and context workflows (ADRs 2024-04-01 and 2025-04-01).

  EVENT-DRIVEN (secondary, 0.82): Asynchronous message processing via Symfony Messenger is load-bearing throughout the platform. Framework/MessageQueue/ defines AsyncMessageInterface, LowPriorityMessageInterface, DeduplicatableMessageInterface, ScheduledTask infrastructure, and queue middleware. DAL indexing (EntityIndexer dispatches EntityIndexingMessage), mail delivery, import/export, and product export are all offloaded to async Messenger workers. The Flow Builder (Content/Flow/) is a business-rules automation engine that reacts to FlowEventAware domain events; ADR 2025-01-31 moves flow execution to after the business process (KernelEvents::TERMINATE, WorkerMessageHandledEvent) making the event bus the primary decoupling mechanism between business logic and side effects. The Redis-backed increment pool for queue stats (ADR 2021-11-09) and BusinessEventRegistry/NestedEventDispatcher complete the event infrastructure.

  HEXAGONAL ARCHITECTURE (secondary, 0.75): The platform consistently separates domain logic from infrastructure through port-and-adapter abstractions. Framework/Adapter/ groups infrastructure adapters by concern (Cache, Database, Filesystem, Messenger, Redis, Session, Storage). AbstractKeyValueStorage is a swappable port backed by MySQL or Redis. AbstractStockStorage (ADR 2023-05-15) is a domain port for pluggable stock backends. EntityWriteGatewayInterface is a DAL inbound write port. MetricTransportInterface (ADR 2024-07-30) is an outbound telemetry port whose implementations ship as separate packages. Payment handler interfaces (SynchronousPaymentHandlerInterface, AsynchronousPaymentHandlerInterface) isolate checkout from payment-provider specifics. Store API and Admin API are named, separated inbound ports.

  RULED OUT - Microservices: Single deployable PHP process, single shared database. All modules share one Composer manifest and one Doctrine connection. No independent deployability per module, no inter-service communication protocol.

  RULED OUT - Layered (primary): Standard Symfony MVC layering is present (Controller -> Service -> DAL) but is subordinate to the modular decomposition and microkernel extension system. Layering exists within each module as an implementation detail, not as the dominant organising principle.

  RULED OUT - CQRS: While the DAL has separate write (EntityWriter/EntityWriteGateway) and read (EntitySearcher/EntityAggregator) paths and async indexers build denormalised read models, there is no separate command/query bus, no explicit command and query handler separation, and no event sourcing. The pattern is present as a DAL-level optimization, not as a top-level architectural style.

  QUALITY ATTRIBUTES evidence: Extensibility — two-track Plugin/App extension system; decoration pattern with abstract base class chains; event-based extension hooks; Twig App scripts at named kernel points; Checkout/Context Gateway contracts for app-server integration. Maintainability — @Package annotations per-class; per-domain DomainException factory classes; 140+ ADRs; PHPStan/Rector/Scrutinizer enforcement; feature flags for major-version dark launches. Scalability — Symfony Messenger async worker queues; Redis cache and session; OpenSearch/Elasticsearch for catalog search; HTTP cache with cache-tag invalidation and Store API caching strategy (ADR 2025-09-15). Observability — MetricTransportInterface abstraction layer (Counter/Gauge/Histogram/UpDownCounter); SystemHealthCheck framework (SYSTEM/FEATURE/EXTERNAL/AUXILIARY categories); Messenger queue stats via increment pattern; Profiling bundle with Symfony Stopwatch. Evolvability — feature-flag system gating major version changes; versioned DB migrations per module; UUIDv7 adoption; App system decouples feature delivery from platform release cycle. Security — Symfony Security; OAuth2; ACL/permissions system; App manifest signature verification; Twig sandbox for App scripts; JWT; rate limiting. Testability — test pyramid ADR; PHPUnit unit and integration suites; Jest for Vue.js admin; mock-repository patterns; Playwright/Cypress acceptance tests.
