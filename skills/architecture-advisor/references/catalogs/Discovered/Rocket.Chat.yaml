one_line_summary: "An open-source team communication platform with a dual-topology architecture: a Meteor-based modular monolith for single-node deployment that transparently promotes to a distributed service-based topology (Moleculer + NATS) when TRANSPORTER is set, with an Apps Engine microkernel for third-party plugin extensibility."
classification_reasoning: "Rocket.Chat exhibits a four-style composition: Modular Monolith as primary, Service-Based and Event-Driven as secondary, Microkernel as tertiary.\n\nMODULAR MONOLITH (primary, 0.88): The Meteor app (apps/meteor/) is a single deployable unit in the default configuration. It contains ~97 feature modules under app/ (2fa, authorization, livechat, push-notifications, integrations, omnichannel, federation, etc.) and ~20 internal services under server/services/ (RoomService, TeamService, MessageService, UserService, OmnichannelService, etc.). All modules share a single MongoDB database. When TRANSPORTER env is unset, api.setBroker(new LocalBroker()) is called in server/startup/localServices.ts — LocalBroker uses a Node.js EventEmitter for in-process service dispatch. The monorepo's ~50 packages/ provide typed contracts (core-typings, rest-typings, model-typings) enforcing module interfaces.\n\nSERVICE-BASED (secondary, 0.85): When TRANSPORTER=nats://... is set (isRunningMs() returns true), the same codebase connects through NetworkBroker (ee/packages/network-broker/src/NetworkBroker.ts) backed by Moleculer and NATS. Dedicated service containers — account-service, authorization-service, presence-service, ddp-streamer-service, queue-worker-service, omnichannel-transcript-service — each run independently (ee/apps/*/src/service.ts). This is NOT Microservices: all containers share the same MONGO_URL; there is no per-service data store isolation. Inter-service communication uses Moleculer RPC over NATS. The IBroker / IApiService / proxify() abstraction in packages/core-services provides transparent switching between local and network modes.\n\nEVENT-DRIVEN (secondary, 0.78): EventSignatures (packages/core-services/src/events/Events.ts) declares ~60+ typed domain events (accounts.login, accounts.logout, message, room.video-conference, banner.new, license.sync, presence.status, livechat-inquiry-queue-observer, socket.connected/disconnected, etc.). Both LocalBroker and NetworkBroker implement broadcast() / broadcastLocal() / broadcastToServices(). Services subscribe via this.onEvent(...) and react asynchronously. NotificationsModule creates 15+ DDP streamers (notify-all, notify-logged, notify-room, room-messages, apps, roles, livechat-room, user-presence, etc.) that re-emit broker broadcasts to WebSocket clients.\n\nMICROKERNEL (tertiary, 0.72): The Apps Engine (packages/apps-engine/) implements a formal third-party plugin system. AppManager orchestrates app lifecycle (install, enable, disable, uninstall). A rich bridge layer (~20 bridge classes: MessageBridge, RoomBridge, UserBridge, LivechatBridge, CommandBridge, SchedulerBridge, HttpBridge, VideoConferenceBridge, etc.) defines the stable API surface. Third-party apps run in a sandboxed Deno runtime, isolated from core internals.\n\nDEPLOYABILITY evidence: Single Docker container for small deployments; Traefik + NATS + 6 independent service containers for enterprise scale; health check endpoints on all service containers; Docker Compose and Kubernetes supported.\n\nSCALABILITY evidence: ddp-streamer-service handles all WebSocket connections independently; NATS provides fan-out messaging for multi-node presence and notifications; account-service and authorization-service scale independently.\n\nEXTENSIBILITY evidence: Apps Engine with Deno-sandboxed apps and ~20 bridge interfaces; marketplace distribution; 20+ built-in slash command modules; REST API and webhook integrations.\n\nOBSERVABILITY evidence: Prometheus metrics via prom-client covering Meteor methods, callbacks, hooks, DDP sessions, Livechat queues (apps/meteor/app/metrics/server/lib/metrics.ts); OpenTelemetry OTLP tracing via @opentelemetry/sdk-node in packages/tracing/.\n\nFAULT TOLERANCE evidence: ServiceStarter used in OmnichannelQueue with start/stop lifecycle; NATS transporter retries in Moleculer; /health endpoints on all service containers; MongoDB replica set configuration.\n\nRULED OUT - Microservices: All service containers share the same MongoDB replica set — no per-service data store isolation. Shared data layer disqualifies true Microservices.\n\nRULED OUT - Layered: Vertical feature organization dominates; RoomService imports directly from app/lib/server/functions/; no strict horizontal layers enforced.\n\nRULED OUT - CQRS/Event Sourcing: No command/query separation or event store. MongoDB used as conventional mutable document store.\n\nRULED OUT (primary) - Hexagonal Architecture: Adapter patterns appear in federation (server/services/federation/infrastructure/rocket-chat/adapters/) but not applied consistently across the whole codebase."
