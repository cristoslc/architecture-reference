one_line_summary: >
  Multi-agent framework that models a software company as cooperating LLM-powered roles
  (ProductManager, Architect, Engineer, QaEngineer, DataInterpreter, TeamLeader) executing
  structured SOPs to convert a one-line requirement into production code.
quality_attributes:
  extensibility:
    present: true
    evidence: >
      @register_tool decorator in metagpt/tools/tool_registry.py allows new tools to be
      registered at import time without modifying the runtime. New Role subclasses can be
      instantiated and hired into any Team via team.hire(). Fifteen-plus LLM backends
      (OpenAI, Azure, Anthropic, Ollama, Gemini, Bedrock, Qianfan, Dashscope, etc.) are
      swappable through metagpt/provider/llm_provider_registry.py with no changes to role
      or action code.
  modularity:
    present: true
    evidence: >
      The package is cleanly partitioned into roles/, actions/, memory/, environment/,
      strategy/, tools/, provider/, and ext/. Each role owns its own action list and Memory
      object with no direct cross-role coupling. The ext/ subtree contains fully independent
      extensions (aflow, stanford_town, werewolf, minecraft, android_assistant, sela, spo)
      that import from the core but are not imported by it.
  autonomy:
    present: true
    evidence: >
      RoleReactMode (REACT, BY_ORDER, PLAN_AND_ACT) in metagpt/roles/role.py:82 lets agents
      reason independently about their next action using the LLM. The Planner class
      (metagpt/strategy/planner.py) supports dynamic multi-step task planning with AskReview
      checkpoints. RoleZero (metagpt/roles/di/role_zero.py) agents can execute shell
      commands, edit files with Editor, and browse the web with Browser — genuine tool-using
      autonomy.
  composability:
    present: true
    evidence: >
      Team.serialize / Team.deserialize (metagpt/team.py) persist and recover the full agent
      team state across runs. AFlow (metagpt/ext/aflow/) automatically generates and optimises
      agentic workflows by composing operator primitives. The MGXEnv TeamLeader dynamically
      dispatches work to the appropriate specialist role based on message content, enabling
      runtime composition.
  observability:
    present: true
    evidence: >
      Structured logging via loguru (metagpt/logs.py). ThoughtReporter streams intermediate
      LLM thoughts to the console or callback in real time (metagpt/utils/report.py).
      TaskReporter tracks task status through execution. Every Role maintains a full
      conversation History in Memory (metagpt/memory/memory.py) indexed by cause_by for
      post-hoc inspection and debugging.
notable_strengths:
  - Clean Role/Action/Environment triad makes it straightforward to add new agent types
  - SOP workflow (WritePRD → DesignAPI → WriteTasks → WriteCode) produces end-to-end software artifacts from a single prompt
  - Supports 15+ LLM backends through a uniform provider abstraction
  - MGXEnv TeamLeader provides orchestrated, conversational multi-agent interaction
  - AFlow extension enables automated agentic workflow search and optimisation
notable_gaps:
  - No distributed deployment support; the entire agent team runs in a single Python process
  - No built-in observability infrastructure (no Prometheus metrics, no distributed tracing)
  - Memory is in-process and volatile; long-context runs risk hitting LLM context limits
  - No formal interface contract between roles — coupling is through string-matched cause_by tags
