classification_reasoning: |
  ## Architecture Classification Analysis

  ### Primary Style: Multi-Agent

  MetaGPT's entire design is built around autonomous agents (Roles) that perceive, reason,
  and act in a shared Environment. The evidence is comprehensive and unambiguous:

  **Agent abstraction:** The `Role` base class (`metagpt/roles/role.py`) gives every agent:
  - Identity (`name`, `profile`, `goal`, `constraints`)
  - Private memory (`Memory`, `working_memory` — see `RoleContext` at line 100)
  - A perception-cognition-action loop (`_observe` → `_think` → `_act`)
  - Three selectable autonomy modes: `REACT` (LLM selects action each turn),
    `BY_ORDER` (fixed sequence), `PLAN_AND_ACT` (LLM plans, then executes)
  - A `Planner` object for multi-step task decomposition with review checkpoints

  **Specialised agent roster:** Concrete role subclasses encapsulate distinct professional
  competencies — `ProductManager` (writes PRD), `Architect` (designs API), `Engineer`
  (writes and reviews code), `QaEngineer` (writes tests), `DataInterpreter` (data analysis
  with code execution), `TeamLeader` (orchestrates other agents in MGX mode), `SWEAgent`
  (code repair via command loop). This is characteristic SOP-based multi-agent design.

  **Shared environment:** `Environment` (`metagpt/environment/base_env.py`) hosts all roles
  and implements address-set routing via `publish_message`. Each role subscribes to
  messages it cares about by registering addresses (`role.name`, `role.profile`) and
  watching specific `cause_by` action types. The `MGXEnv` variant adds a TeamLeader
  orchestrator that acts as a supervisor routing messages between specialist agents.

  **Team lifecycle:** `Team` (`metagpt/team.py`) assembles agents via `hire(roles)`,
  manages the investment/budget constraint, and runs the multi-round loop
  (`env.run()` dispatching `asyncio.gather` across all active roles). Serialisation
  and recovery are first-class features.

  **Research-grade extensions** in `metagpt/ext/` — AFlow (automated workflow generation),
  stanford_town (social simulation), werewolf (game-playing agents), minecraft (embodied
  agents), android_assistant (GUI agents) — all demonstrate the framework's generality
  as a multi-agent substrate beyond the primary software-company use case.

  ### Secondary Style: Pipeline (Pipe-and-Filter)

  The standard software development workflow in MetaGPT is a linear, dependency-ordered
  pipeline where each stage produces a typed artefact that triggers the next stage:

  `UserRequirement` → `WritePRD` (ProductManager) → `DesignAPI` (Architect) →
  `WriteTasks` (ProjectManager) → `WriteCode` (Engineer) → `WriteCodeReview` (Engineer) →
  `SummarizeCode`

  This pipeline character is structurally enforced: each role's `_watch` set contains
  exactly the `cause_by` type it depends on, so the message bus effectively acts as a
  typed pipe connecting sequential filters. The `Researcher` role makes this explicit with
  `RoleReactMode.BY_ORDER` across its three-action sequence. `ActionGraph`
  (`metagpt/actions/action_graph.py`) provides a topological-sort harness for
  dependency-ordered action execution within more complex agent flows.

  The pipeline pattern is secondary because in REACT mode and with MGX's TeamLeader,
  the flow is dynamic and bidirectional — agents can loop, ask for human input, and
  hand work back up the chain.

  ### Styles Considered But Not Primary

  - **Event-Driven:** The `cause_by`/address-based message routing and `SubscriptionRunner`
    are event-driven in mechanism. However, the macro-level workflow is agent-orchestrated,
    not event-reactive — there is no event backbone, no event store, and no independent
    event consumers. Event-driven is therefore an architectural qualifier rather than a
    primary style.
  - **Modular Monolith:** The package structure is clean and well-partitioned, but module
    boundaries are not enforced as deployment units or service contracts. It is a
    single-process Python application.
  - **Microservices:** No network service boundaries, no container orchestration, no inter-
    service protocols. The application runs as a single Python process.
  - **Hexagonal Architecture:** No port/adapter separation pattern; roles directly import
    and use LLM providers and tool implementations.

  ### Confidence

  0.95 — Multi-Agent is unambiguously the primary organising principle: the entire codebase
  is structured around the Role/Environment/Message triad, and the README's stated philosophy
  ("Code = SOP(Team)") makes the design intent explicit. Pipeline is strongly evidenced by
  the sequential SOP workflow and BY_ORDER react mode. Minor uncertainty on whether to list
  Event-Driven as a secondary style vs. qualifier; the qualifier treatment is more precise.
