one_line_summary: "Cloud-native L7 proxy built on a factory-registry microkernel that makes all functional logic (HTTP/network filters, tracers, transport sockets, cluster types) independently pluggable, layered over a libevent event-loop core and dynamically reconfigurable via xDS APIs."
classification_reasoning: "Envoy's primary organizing principle is the Microkernel (Plugin) pattern. The core runtime — the libevent-backed Dispatcher (source/common/event/dispatcher_impl.cc), HTTP connection manager (source/common/http/conn_manager_impl.cc), upstream cluster manager, router, and stats infrastructure — is kept deliberately minimal. All functional logic is delegated to independently selectable plugins registered through a factory-registry system (envoy/registry/registry.h: FactoryRegistry<Base>, RegisterFactory<T,Base>). Extension contracts are typed pure-virtual interfaces (envoy/server/filter_config.h: NamedHttpFilterConfigFactory, NamedNetworkFilterConfigFactory, etc.); each plugin implements its interface and self-registers via a static initializer macro. The scale of the extension system — 70+ HTTP filters, 20+ network filters, 8 tracer backends, 10 transport socket types, 12 cluster types, 8+ stat sinks, all in source/extensions/ — demonstrates that the kernel truly delegates rather than accumulates. Beyond compile-time registration, source/extensions/dynamic_modules/dynamic_modules.cc implements runtime dlopen/dlsym loading, extending the microkernel pattern to runtime plugin injection. The xDS API suite (api/envoy/service/: CDS, EDS, LDS, RDS, SDS, ADS, RTDS) acts as a configuration-level microkernel, allowing the static core to remain agnostic of deployment topology until runtime configuration arrives from a control plane. Layered Architecture is a strong secondary style, explicitly documented in REPO_LAYOUT.md: the envoy/ headers (pure-virtual public interfaces, Layer 0), source/common/ (embeddable kernel library, Layer 1), source/server/ (server lifecycle and runtime, Layer 2), and source/extensions/ (all plugins, Layer 3) form strict horizontal strata with well-enforced dependency directions. The libevent event loop is the execution mechanism that drives async I/O on each worker thread, but this is a runtime primitive of the kernel rather than the primary decomposition axis; Envoy is not classified as Event-Driven because the architecture does not organize around event types or message topics. Envoy is a single deployable binary with all extensions running in-process, explicitly distinguishing it from Microservices. The filter chain through which requests pass is an internal execution mechanism of the kernel's orchestrator, not a Pipeline architecture in its own right."
