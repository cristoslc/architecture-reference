one_line_summary: >-
  Open-source Airtable alternative built as a NestJS layered monolith with a
  microkernel plugin system for storage/notification adapters and event-driven
  internal coordination via AppHooks and Bull job queues.
classification_reasoning: >-
  NocoDB's primary architecture is Layered: the NestJS backend enforces a strict
  controller → service → model → db hierarchy across ~60 resource types (Base,
  Table, Column, View, Hook, etc.), sharing a single metadata database and a
  single deployable container. The Microkernel style is strongly evidenced by
  the plugin subsystem in src/plugins/ (12+ storage adapters, 3 email adapters,
  6 notification channel adapters) and the noco-integrations package which
  provides a build-time IntegrationRegistry and IntegrationWrapper base class
  for third-party plugins — the core application acts as the kernel and plugins
  extend it without modifying core code. Event-Driven patterns are structurally
  significant: AppHooksService implements a strongly-typed in-process event bus
  with 80+ named AppEvents; a Bull/Redis job queue with 30+ JobTypes handles
  async processing; a WebSocket gateway propagates real-time updates to
  browsers; emit handlers bridge events to job queues; and HookHandlerService
  dispatches outbound webhooks on data lifecycle events. These three styles
  operate at different layers and are not in tension: Layered governs
  synchronous request handling, Microkernel governs extension points, and
  Event-Driven governs async and real-time coordination.
