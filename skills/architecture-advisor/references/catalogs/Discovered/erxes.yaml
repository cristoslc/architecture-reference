one_line_summary: Plugin-driven experience management platform (XOS) built on an Nx
  monorepo with a Microkernel core, GraphQL Federation API gateway, Module Federation
  micro-frontends, and BullMQ-backed async automation — all services sharing a single
  multi-tenant MongoDB instance.
classification_reasoning: "## Analysis\n\nThe erxes repository is a textbook **Microkernel\
  \ (Plugin) Architecture** as its primary style, with **Microservices** characteristics\
  \ as a strong secondary.\n\n### Primary: Microkernel (Plugin) Architecture\n\nThe\
  \ repository's structure is built entirely around a formalized Core + Plugin extension\
  \ model:\n\n1. **Plugin Registration Contract** (`backend/erxes-api-shared/src/utils/start-plugin.ts`):\n\
  \   - Every plugin calls `startPlugin(config)` with a typed `ConfigTypes` object\
  \ declaring name, port, GraphQL schema factory, tRPC router, REST router, server\
  \ init hooks, and metadata configs (automations, segments, notifications, payments)\n\
  \   - On startup, each plugin calls `joinErxesGateway()` to register its address\
  \ in Redis under `erxes-service-${name}`\n\n2. **Kernel Host (Gateway)** (`backend/gateway/src/main.ts`,\
  \ `backend/gateway/src/apollo-router/`):\n   - Acts as the central kernel, discovering\
  \ plugins from Redis via `getPlugins()` / `getPlugin(name)`\n   - Spawns Apollo\
  \ Router as a child process to compose all plugin GraphQL subgraphs into a unified\
  \ supergraph\n   - Proxies REST requests to plugins via `/pl:serviceName` → plugin\
  \ address\n   - `ENABLED_PLUGINS` env var controls which plugins the kernel activates\
  \ — classic runtime capability selection\n\n3. **Frontend Microkernel** (`frontend/core-ui/module-federation.config.ts`):\n\
  \   - Core UI is the Module Federation host: `remotes: ENABLED_PLUGINS.split(',')\
  \ .map(p => p + '_ui')`\n   - Each plugin UI (`frontend/plugins/*/module-federation.config.ts`)\
  \ exposes named entry points (`./config`, `./frontline`, `./settings`, etc.) consumed\
  \ by the host at runtime\n\n4. **Plugin Scaffold** (`scripts/create-backend-plugin.js`):\n\
  \   - Generates the canonical plugin skeleton: `apollo/`, `trpc/`, `modules/`,\
  \ `db/models/` — enforcing the extension convention structurally\n\n5. **README\
  \ Explicit Statement**: \"erxes is composed of 2 main components: Core & Plugins\"\
  \ — the architecture is self-described as Microkernel\n\n### Secondary: Microservices\n\
  \nEach plugin is independently deployable and communicates over the network:\n\n\
  1. **Independent Deployment**: Each of the 11 backend plugins (`backend/plugins/*/`)\
  \ plus core-api, gateway, automations-service, and logs-service has its own `Dockerfile`\
  \ and runs on a dedicated port\n\n2. **GraphQL Federation Subgraphs**: Each plugin\
  \ calls `buildSubgraphSchema()` to expose an independent GraphQL subgraph; the\
  \ Apollo Router composes them into a unified supergraph\n\n3. **tRPC Inter-Service\
  \ RPC**: `sendTRPCMessage()` in `erxes-api-shared/src/utils/trpc/index.ts` provides\
  \ typed HTTP RPC between plugins; `sendCoreModuleProducer()` provides typed calls\
  \ into shared automation/segment/import-export producers\n\n4. **BullMQ Async Queues**:\
  \ `sendAutomationTrigger()` enqueues jobs to Redis-backed BullMQ queues; the standalone\
  \ automations service runs `triggerHandlerWorker`, `actionHandlerWorker`, and `aiWorker`\
  \ consumers\n\n5. **Redis Service Discovery**: Plugins register/deregister addresses\
  \ in Redis; the gateway performs health-checked proxy target resolution with retry\
  \ logic\n\n### Key Nuances\n\n- **Shared MongoDB**: All plugins share a single\
  \ `MONGO_URL` MongoDB instance. Per-tenant isolation is achieved via `useDb(subdomain)`\
  \ on the Mongoose connection (`backend/erxes-api-shared/src/utils/mongo/generate-models.ts`).\
  \ This diverges from strict microservices (database-per-service) but aligns with\
  \ the Microkernel model where plugins share kernel-managed infrastructure.\n\n-\
  \ **SaaS Billing Integration**: The gateway reads per-organization plugin entitlements\
  \ (`getSaasOrganizationDetail()`) to dynamically scope which plugins are available\
  \ per tenant, demonstrating commercial extensibility layered on top of the Microkernel\
  \ model.\n\n- **NOT Modular Monolith**: Services are independently deployable containers\
  \ with separate Dockerfiles and network addresses — not modules within a single\
  \ process.\n\n- **NOT Pure Event-Driven**: BullMQ is used only for the automations\
  \ pipeline. The primary communication pattern is synchronous GraphQL/tRPC over\
  \ HTTP. Events (via `createEventDispatcher`) are domain-level model change signals,\
  \ not the primary integration mechanism."
