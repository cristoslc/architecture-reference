one_line_summary: Rails monolith with a purpose-built dispatcher-listener event framework
  that decouples domain side-effects (webhooks, real-time pushes, notifications, automations)
  from core models, layered over standard MVC conventions.
classification_reasoning: "Chatwoot is classified as Event-Driven (primary) + Layered\
  \ (secondary).\n\nThe event-driven classification is earned by a purpose-built, first-party\
  \ dispatcher-listener framework — not incidental callbacks. The system defines a\
  \ typed event vocabulary (Events::Types with 30+ named constants), routes events\
  \ through both synchronous (ActionCableListener, AgentBotListener) and asynchronous\
  \ (Sidekiq-backed EventDispatcherJob) paths, and structures all cross-cutting domain\
  \ reactions as independent subscribing listeners: WebhookListener, NotificationListener,\
  \ AutomationRuleListener, CampaignListener, ReportingEventListener, HookListener,\
  \ InstallationWebhookListener. Domain models publish 34+ dispatch call-sites across\
  \ conversation, message, contact, inbox, and notification events. This decouples\
  \ models from side-effects while remaining within a single deployable.\n\nThe layered\
  \ classification is earned by consistent Rails conventions: versioned API controllers\
  \ (v1/v2), Pundit policy authorization, service objects for business logic, builders\
  \ and finders as supporting patterns, and Active Job/Sidekiq for background processing\
  \ across a rich queue hierarchy (critical, high, medium, default, mailers, scheduled_jobs,\
  \ low, deferred, housekeeping).\n\nDeployment is a single Rails monolith (web +\
  \ worker Procfile processes) backed by a single PostgreSQL database and Redis for\
  \ ActionCable and Sidekiq.\n\nRejected: Microservices (single database, no inter-service\
  \ communication), Modular Monolith (no enforced bounded-context isolation), CQRS\
  \ (standard ActiveRecord read/write patterns), Hexagonal (no ports/adapters abstraction),\
  \ DDD (no explicit aggregates or value objects), Pipeline (no sequential transformation\
  \ stages), Serverless (traditional server deployment)."
