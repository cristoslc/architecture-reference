one_line_summary: "HL7 FHIR reference Java implementation organized as a 60-module Maven project with strict unidirectional Layered tiers (core/model, REST framework, storage API, JPA implementation) all assembled into a single Spring application context Modular Monolith deployment, cross-cut by a 107-pointcut interceptor framework enabling behavior injection at every lifecycle stage."
classification_reasoning: "HAPI FHIR's dominant architectural style is Layered. The Maven module dependency graph enforces a strict directional layer hierarchy with no upward or cross-layer dependencies: hapi-fhir-base (FhirContext, interceptor API) at the core; hapi-fhir-structures-* (generated FHIR resource POJOs) and hapi-fhir-server (RestfulServer, IResourceProvider, BaseMethodBinding) at the REST framework tier; hapi-fhir-storage (IFhirResourceDao, IFhirSystemDao interfaces) and hapi-fhir-jpaserver-model (ResourceTable, ResourceIndexedSearchParam* JPA entities) at the storage API tier; hapi-fhir-jpaserver-base (BaseHapiFhirResourceDao, SearchCoordinatorSvcImpl) at the JPA implementation tier. The Pointcut enum's explicit layer-namespaced categories (CLIENT_, SERVER_, STORAGE_, JPA_PERFTRACE_, SUBSCRIPTION_, VALIDATION_) with 107 total pointcuts confirm the intentional horizontal decomposition. The secondary style is Modular Monolith: despite 60 Maven modules with compile-time boundary enforcement via pom.xml dependency declarations and Checkstyle rules, all modules assemble into a single WAR/fat JAR with a unified Spring application context (JpaConfig is the integration hub wiring all DAOs, search services, batch jobs, subscription services). No runtime module isolation, no service mesh, no independent deployment per module. Prior classification (2026-03-09, confidence 0.85) correctly identified both styles; this deep-analysis confirms with higher confidence (0.92) and corrects primary/secondary ordering — Layered is primary because it drives internal decomposition decisions, while Modular Monolith describes the deployment topology."
