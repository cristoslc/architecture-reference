one_line_summary: >-
  ASP.NET Core 9 dotnet project template demonstrating Vertical Slice Architecture
  within a single-deployable Modular Monolith, using CQRS via source-generated
  Mediator, Minimal APIs, and outbound MassTransit integration events.
quality_attributes:
  maintainability: high
  testability: high
  scalability: moderate
  observability: high
  deployability: simple
  cohesion: high
classification_reasoning: |-
  The dominant architectural style is Modular Monolith: one deployable unit, one
  CatalogsDbContext, one process, with a structured module registration boundary
  (AddProductsModuleServices / UseProductsModule / MapProductsModuleEndpoints
  convention in ProductConfigurations.cs). The single service in
  deployments/docker-compose/docker-compose.services.yaml confirms the topology.

  Vertical Slice Architecture is the defining design approach structuring the
  interior of the monolith. All business code lives under feature folders
  (Products/Features/CreatingProduct/v1/, GettingProductById/v1/, etc.), each
  containing the Minimal API endpoint, command or query record, handler,
  validator, DTOs, and DbExecutors delegate. Adding a feature is purely additive
  — no existing files are modified. This is an architecture qualifier, not a
  canonical style (ADR-006).

  CQRS is a supporting data pattern: ICommand<T>/IQuery<T> interfaces in
  Shared/Abstractions/Core/CQRS/ are dispatched via the source-generated Mediator
  library with a full pipeline (validation, EF transaction, caching, observability
  behaviors). There is no separate read/write store — reads project through EF
  Core at query time. Classified as architecture qualifier per ADR-006.

  Integration events (ProductCreatedIntegrationEventV1 via MasstransitExternalBus
  → RabbitMQ) are present but are purely outbound scaffolding. No inbound
  consumers exist in the template codebase. Event-Driven Architecture is rejected
  as a style.

  Microservices definitively rejected: single process, single database, single
  Docker service. Layered Architecture rejected: no horizontal technical layering;
  slices use Shared infrastructure utilities directly without prescribed layer
  traversal.
architecture_qualifiers:
