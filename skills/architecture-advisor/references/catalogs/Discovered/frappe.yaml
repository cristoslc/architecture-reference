one_line_summary: >-
  Full-stack low-code web framework built on a microkernel plugin architecture
  where a stable layered kernel (ORM, HTTP routing, auth, scheduler, multi-tenancy)
  hosts external "apps" that register behavior via a hooks-based extension system.
classification_reasoning: >-
  ## Analysis


  Frappe Framework is a **Microkernel** architecture with a **Layered** internal kernel
  structure. The plugin system is the primary and defining architectural characteristic.


  ### Primary Style: Microkernel (0.93)


  Frappe is built around the concept of "apps" as first-class plugins installed on a
  per-site basis. The kernel provides infrastructure; apps register all domain behavior
  through a structured hooks manifest.


  **Hook aggregation** (`frappe/__init__.py:976`): `get_hooks()` iterates all installed
  apps' `hooks.py` files and merges them into a single runtime registry. Installed apps
  are tracked per-site via `get_installed_apps()`, and `install_app()` / `uninstall_app()`
  in `installer.py` manage the full plugin lifecycle.


  **`frappe/hooks.py`** defines 30+ named extension points: `doc_events` (DocType lifecycle
  callbacks — on_update, on_cancel, on_trash, after_insert, after_rename); `scheduler_events`
  (cron/all/hourly/daily/weekly job registrations); `permission_query_conditions` and
  `has_permission` (row- and document-level permission hooks); `before_request` / `after_request`
  / `before_job` / `after_job` (lifecycle middleware); `override_whitelisted_methods`
  (endpoint replacement); `override_doctype_class` (controller class substitution);
  `extend_bootinfo` (client boot payload injection); `app_include_js` / `app_include_css`
  (asset bundle injection).


  **DocType controller dispatch** (`frappe/model/base_document.py:116`): `get_controller()`
  checks the `override_doctype_class` hook registry first, allowing any installed app to
  substitute or subclass the controller for any DocType at runtime. This is a canonical
  microkernel plugin dispatch mechanism.


  **Runtime code injection**: The `Server Script` DocType (managed in `frappe/utils/safe_exec.py`
  using `RestrictedPython`) allows administrators to inject Python at runtime for DocType events,
  API endpoints, and scheduled jobs without redeployment. This is an embedded script engine
  within the kernel.


  **App lifecycle** (`frappe/installer.py`): Apps are installed per site (`install_app()`),
  notified of their lifecycle via `after_app_install` / `after_app_uninstall` hooks, and
  discoverable in the UI via the `add_to_apps_screen` hook.


  ### Secondary Style: Layered (0.90)


  The kernel itself is organized into strict horizontal layers with no upward dependencies:


  ```
  Website Layer      (frappe/website/) — PathResolver, page_renderers, WebsiteGenerator
  Desk/UI Layer      (frappe/desk/)    — forms, notifications, dashboard, kanban
  API Layer          (frappe/api/)     — REST v1/v2, method whitelisting, werkzeug routing
  Model Layer        (frappe/model/)   — Document (2,403 lines), BaseDocument, Meta, Workflow
  Data Access Layer  (frappe/database/) — abstract Database → MariaDB / Postgres / SQLite
  Infrastructure     (frappe/utils/)   — Redis/RQ queues, session, rate limiting
  ```


  **Request flow** (`frappe/app.py`): `application()` → `init_request()` (infrastructure) →
  `validate_auth()` (auth) → `frappe.api.handle()` (API layer) or `get_response()` (website
  layer). Layers never skip: the API layer calls services via the model layer; the model layer
  calls the database layer exclusively through the `Database` abstract class.


  **Data access abstraction** (`frappe/database/database.py:84`): `Database` is an abstract
  base class with three concrete implementations — `MariaDBDatabase`, `PostgresDatabase`,
  `SQLiteDatabase`. The model layer is fully decoupled from driver specifics.


  **`frappe.local`**: A thread-local context object carries per-request state (`db`, `qb`,
  `conf`, `form_dict`, `session`, `flags`) that flows through all layers without direct
  coupling between them.


  ### What Was Rejected


  **Not Modular Monolith**: Frappe's internal modules (Core, Website, Workflow, Email,
  Automation, etc.) are framework infrastructure concerns, not independently deployable
  business domain modules. The defining characteristic is the plugin architecture for
  hosting external apps, not DDD-style module decomposition.


  **Not Event-Driven**: Redis/RQ background jobs are operational task queuing, not
  event-driven integration. The `doc_events` hook is a synchronous in-process callback
  registry. There is no event bus, publish/subscribe messaging, event sourcing, or domain
  event pattern.


  **Not Microservices**: Single `pyproject.toml`, single Python package, single database
  per site, single process. No inter-service communication.


  **Not Hexagonal**: `Document` controllers call `frappe.db.*` directly without
  ports/adapters abstraction. No inversion of dependency between domain and persistence.


  **Not DDD**: No bounded contexts, aggregates, or value objects. DocTypes are generic
  metadata-driven entities managed by a universal ORM.


  ### Conclusion


  Frappe's kernel ships a compact stable core (ORM, HTTP, auth, scheduler, multi-tenancy,
  permissions) and exposes 30+ hook categories through which installed apps register all
  domain behavior. The layered internal structure provides change isolation within the
  kernel. This is an archetypal low-code microkernel framework hosting an ecosystem of
  installable application plugins. Confidence 0.93; the hook aggregation mechanism and
  DocType controller dispatch are unambiguous microkernel evidence.
