classification_reasoning: "## Architecture Classification Analysis\n\n### Primary
  Styles: Pipeline + Event-Driven\n\n**PIPELINE (primary, 0.93):** Prefect's fundamental
  abstraction is the `@flow` / `@task` composition model, where every flow run is
  a series of state-machine transitions — Pending → Running → Completed/Failed —
  each of which must be validated by the server-side orchestration engine before user
  code can proceed. This is documented explicitly in `server/orchestration/rules.py`:
  \"no governed user code will execute without first requesting Prefect REST API validate
  a change in state.\" The five-stage execution path is: (1) a deployment scheduler
  (`server/services/scheduler.py`) creates Scheduled flow runs, (2) a Worker or Runner
  polls the API for runs and dispatches them, (3) the Flow Engine (`flow_engine.py`)
  runs the flow body, (4) each task is submitted to a TaskRunner and its state transitions
  are managed by the Task Engine (`task_engine.py`), (5) results are persisted via
  the result storage layer. The `runner/` module makes the pipeline explicit with
  named components: `_scheduled_run_poller.py`, `_flow_run_executor.py`, `_state_proposer.py`,
  `_hook_runner.py`. The `CoreFlowPolicy` and `CoreTaskPolicy` define the complete
  set of orchestration rules (retry, crash, pause, cancel, concurrency) applied at
  each transition.\n\n**EVENT-DRIVEN (primary, 0.87):** The events subsystem is architecturally
  central, not peripheral. Client-side, `emit_event()` is called throughout workers,
  flows, and tasks to emit lifecycle events. Server-side, an `EventPublisher` publishes
  to a pluggable topic-based message broker (configurable via `PREFECT_MESSAGING_BROKER`
  — memory or external). Background `Service` subclasses consume the event stream:
  `ReactiveTriggers` evaluates `EventTrigger`, `CompoundTrigger`, and `SequenceTrigger`
  automations (`server/events/triggers.py`), and on a match fires `TriggeredAction`
  objects (`server/events/actions.py`) that can run deployments, cancel flow runs,
  change state, call webhooks, send notifications, or pause/resume work pools. This
  constitutes a complete reactive event loop entirely decoupled from the polling scheduler.
  `EventsPipeline` (`server/events/pipeline.py`) shows the explicit stages: event
  → message → task_run_recorder consumer → event_persister consumer. The broker abstraction
  (`server/utilities/messaging/__init__.py`) with `Publisher`, `Consumer`, `Cache`,
  and `MessageHandler` protocols is a textbook event-driven backbone.\n\n### Secondary
  Style: Modular Monolith\n\n**MODULAR MONOLITH (secondary, 0.82):** Both the server
  and the client SDK are shipped as a single `prefect` Python distribution (one `pyproject.toml`,
  one Dockerfile). Internally the code is organized into strong module boundaries:
  `server/` (FastAPI REST API, orchestration, DB, services, events), `client/` (HTTP
  client, schema objects), `workers/` (abstract work dispatch), `runner/` (process-level
  runner), `events/` (client-side event emission and automation schema), `blocks/`
  (pluggable credential/config storage), `concurrency/` (global slot controls). Modules
  communicate across the HTTP boundary: `PrefectClient` and `SyncPrefectClient` are
  the sole entry points from client code to the server — there is no direct function
  call across this boundary in production use. The 18 integration packages in `src/integrations/`
  (prefect-aws, prefect-dbt, prefect-kubernetes, etc.) are independently versioned
  and loaded via `prefect.collections` entry points, giving the monolith a lightweight
  microkernel extension layer without changing the core delivery model.\n\n### What
  Was Rejected and Why\n\n**Not Microservices:** All process types (server, worker,
  runner) are deployed from the same `prefect` package and share a single database.
  Workers communicate with the server via the REST API as an integration boundary,
  not as peer services; they have no independent data stores or deployment pipelines.\n\
  \n**Not Microkernel (primary):** The plugin system (entry-point collections) is
  present but is not the primary architectural organising principle. The core server/orchestration/events
  subsystem is not a minimal kernel — it is a substantial application. The Pipeline
  + Event-Driven combination better explains the dominant structural patterns.\n\n\
  **Not CQRS:** While the server exposes read and write endpoints separately and the
  ORM uses a query-components abstraction (`server/database/query_components.py`),
  there is no separate read model or event-sourced command log; state is stored and
  queried from the same SQLAlchemy-backed database.\n\n### Quality Attributes Evidence\n\
  \n**OBSERVABILITY:** Every flow and task state transition is recorded in the DB;
  `emit_event()` publishes lifecycle events; OpenTelemetry and prometheus-client are
  bundled; `telemetry/` provides structured instrumentation; UI served embedded in
  the server.\n\n**RESILIENCE:** `CoreFlowPolicy` / `CoreTaskPolicy` handle retries,
  crashes, pauses, cancellations; `CancellationCleanupService`, `LateRunsService`,
  and `RepossessorService` repair stale or abandoned runs.\n\n**EXTENSIBILITY:** 18
  integration collections via entry points; `Block` base class for pluggable storage
  backends; `TaskRunner` abstract base enables thread-pool, process-pool, Dask, Ray
  executors; `BaseWorker` abstract class for new infrastructure targets.\n\n**SCALABILITY:**
  Work pools dispatch to Docker, Kubernetes, or cloud-native infrastructure; `TaskRunner`
  enables intra-flow parallelism; global and tag-based concurrency limits control
  slot allocation across the fleet.\n\n**DEPLOYABILITY:** Single Dockerfile; `prefect
  server start` for self-hosted; Prefect Cloud for managed; `prefect.yaml` manifest
  for GitOps-style deployment; work pools abstract infrastructure.\n\n**EVOLVABILITY:**
  Alembic migrations in `server/database/_migrations/`; `PrefectDBInterface` singleton
  abstracts SQLite vs PostgreSQL; pluggable message broker via settings; `_experimental/`
  namespace for pre-release features."
