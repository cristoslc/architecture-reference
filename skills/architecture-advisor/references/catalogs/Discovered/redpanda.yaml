one_line_summary: "Apache Kafka-compatible distributed streaming platform implemented as a single C++ binary with ~30 well-bounded internal modules (Modular Monolith) organized around a Raft-replicated distributed log as the authoritative event source (Event-Driven)."
classification_reasoning: "Redpanda compiles to one process containing all runtime subsystems — raft, cluster, storage, kafka, pandaproxy, schema_registry, cloud_storage, cloud_topics, transform, wasm, datalake, security, rpc, net, config, model — each in its own C++ namespace and Bazel BUILD target, wired by injected references to Seastar sharded services (ss::sharded<T>). This is a textbook Modular Monolith: firm module boundaries enforced at compile time by Bazel, no inter-process boundary between modules on the same node, single deployment unit. The rpk CLI is a separate Go binary but is a management tool only. Event-Driven is co-primary: the product is a distributed event-streaming platform (Kafka produce/consume); internally every durable state change is encoded as a Raft command making the controller Raft log the authoritative event source for the entire cluster; state machines (rm_stm, tm_stm, id_allocator_stm, archival_metadata_stm, transform_offsets_stm, datalake state machines) react to log entries as events; the transform control plane is explicitly documented (transform/README.md) as an event-emitting loop reacting to Raft leadership and data-plane error events; the cloud-topics write path is a sequential event pipeline through object storage and Raft placeholder replication. Microservices is ruled out — no inter-process HTTP/gRPC boundaries exist between runtime modules on the same node. Microkernel is ruled out — the Wasm/transform plugin system is a feature of one module (transform/wasm), not a system-wide microkernel organizing principle. CQRS is ruled out — no separate read/write models at the system level. Hexagonal is ruled out — ports-and-adapters is not the system-wide organizing principle."
