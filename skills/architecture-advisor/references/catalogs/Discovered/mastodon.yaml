classification_reasoning: "## Architecture Classification Analysis\n\n### Primary\
  \ Styles: Modular Monolith + Event-Driven\n\n**MODULAR MONOLITH (primary, 0.88):**\
  \ The Rails application is a single deployable unit organized into clear vertical\
  \ slices: `app/controllers/` (REST API v1/v2/v1_alpha, ActivityPub endpoints, OAuth,\
  \ admin), `app/services/` (~50+ service objects including FanOutOnWriteService,\
  \ NotifyService, BlockDomainService), `app/workers/` (Sidekiq workers by domain:\
  \ activitypub/, fasp/, admin/, import/), `app/serializers/`, `app/policies/` (Pundit),\
  \ `app/chewy/` (Elasticsearch indices). All share one PostgreSQL database and one\
  \ Redis instance. There are no enforced module isolation boundaries (no Rails engines\
  \ per domain), making this a well-organized monolith with good internal structure\
  \ rather than a strictly bounded modular monolith.\n\n**EVENT-DRIVEN (primary, 0.87):**\
  \ The event-driven character is central and pervasive. `config/sidekiq.yml` declares\
  \ seven named queues with priority weights (default:8, push:6, ingress:4, mailers:2,\
  \ pull:1, scheduler:1, fasp:1). Every significant user action dispatches an async\
  \ Sidekiq job: posting a status dispatches DistributionWorker -> FanOutOnWriteService,\
  \ receiving a federated activity dispatches ActivityPub::ProcessingWorker, delivering\
  \ to remote servers uses ActivityPub::DeliveryWorker (queue:push, retry:16 with\
  \ custom exponential backoff and jitter). The streaming server subscribes to Redis\
  \ pub/sub channels (user, user:notification, timeline:public, timeline:hashtag:*,\
  \ timeline:list:*) that Rails publishes to, then relays messages over WebSocket/SSE\
  \ — a textbook event broker pattern. 15+ Sidekiq Scheduler jobs handle periodic\
  \ background maintenance.\n\n### Secondary Style: Service-Based\n\n**SERVICE-BASED\
  \ (secondary, 0.80):** The `streaming/` directory is a self-contained Node.js package\
  \ (@mastodon/streaming) with its own package.json, Dockerfile, tsconfig.json, and\
  \ dependencies (Express 5, ioredis, prom-client, ws). It is independently containerized\
  \ in docker-compose.yml (mastodon-streaming image, port 4000), has its own health\
  \ check endpoint, and exports Prometheus metrics independently. It communicates\
  \ via shared data tier (direct PostgreSQL for auth token validation, direct Redis\
  \ for pub/sub subscription) rather than via an API contract with the Rails app.\
  \ The federation delivery subsystem (ActivityPub::DeliveryWorker with stoplight\
  \ circuit-breaker via DeliveryFailureTracker, 10 failures -> 60s cooloff per inbox\
  \ URL) exhibits autonomous service-like behavior within the monolith.\n\n### What\
  \ Was Rejected and Why\n\n**Not Microservices:** All process types (web, sidekiq,\
  \ streaming) share the same PostgreSQL and Redis — there is no independent data\
  \ store per service. The Rails web and sidekiq processes run identical code from\
  \ a single Docker image (ghcr.io/mastodon/mastodon). Two process types do not constitute\
  \ microservices decomposition.\n\n**Not Layered (primary):** The Rails app has recognizable\
  \ horizontal layers (controllers -> services -> models) but the dominant architectural\
  \ concern is the async event queue and ActivityPub federation protocol. Service objects,\
  \ workers, serializers, policies, and presenters add vertical decomposition that\
  \ goes well beyond classic layered architecture.\n\n**Not CQRS:** While Elasticsearch\
  \ serves read queries and PostgreSQL handles writes in some paths, there is no explicit\
  \ command/query segregation with separate models and handlers enforced as an architectural\
  \ pattern.\n\n**Not Domain-Driven Design:** No explicit domain aggregate or bounded\
  \ context structure. Models are organized by entity type (status.rb, account.rb,\
  \ etc.), not by domain boundary, and there is no ubiquitous language enforced in\
  \ code organization.\n\n### Quality Attributes Evidence\n\n**FEDERATION:** ActivityPub\
  \ protocol is first-class: app/lib/activitypub/ handles JSON-LD serialization,\
  \ HTTP Signatures, dereferencing, inbox/outbox. WebFinger, NodeInfo, and host-meta\
  \ endpoints implemented. Federated with any ActivityPub-compatible server.\n\n**SCALABILITY:**\
  \ Sidekiq concurrency configurable via SIDEKIQ_CONCURRENCY; multiple Sidekiq processes\
  \ can run in parallel; streaming server independently scalable; Elasticsearch optional\
  \ for full-text search at scale.\n\n**RESILIENCE:** ActivityPub::DeliveryWorker\
  \ implements exponential backoff (up to 16 retries) with custom jitter; DeliveryFailureTracker\
  \ stoplight circuit-breaker; Sidekiq at-least-once delivery; Redis Sentinel support\
  \ in both Rails and streaming server.\n\n**OBSERVABILITY:** Prometheus metrics from\
  \ streaming server (prom-client); PgHero for PostgreSQL query monitoring; Sidekiq\
  \ web UI for admin; structured logging throughout.\n\n**SECURITY:** OAuth2 via Doorkeeper;\
  \ HTTP Signatures on all ActivityPub deliveries; Pundit authorization policies;\
  \ Content Security Policy middleware; WebAuthn/security key 2FA support.\n\n**DEPLOYABILITY:**\
  \ Docker Compose for single-server production; Helm chart in mastodon/chart repo;\
  \ Heroku (app.json) and Scalingo (scalingo.json) support; single image for web\
  \ and sidekiq processes."
