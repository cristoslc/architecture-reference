review_notes: >
  OpenTripPlanner (OTP) is a mature Modular Monolith that has evolved over 15+ years of
  active production use across national transit agencies. The primary architectural concern
  is enforced module isolation within a single deployable JAR. The Raptor routing engine
  module is the clearest example: its zero-dependency contract from the rest of OTP code
  is documented in ARCHITECTURE.md and enforced by RaptorArchitectureTest (ArchUnit).
  Internal structure follows a four-layer hierarchy documented explicitly — Use Case
  Services, Domain Services, Domain Models, Repositories — making Layered the appropriate
  secondary style. DDD tactical patterns (aggregate roots, entities, value objects,
  repositories, bounded contexts) appear throughout the transit domain model and are
  called out in transit/model/package.md, qualifying as an architecture_qualifier rather
  than a primary style.
classification_reasoning: |
  ## Architecture Classification Analysis

  ### Primary Style: Modular Monolith

  OpenTripPlanner exhibits all defining characteristics of a Modular Monolith:

  **1. Single Deployable Unit**
  - The project produces one unified fat JAR: `otp-shaded/target/otp-shaded-VERSION.jar`
    (documented in README.md and CLAUDE.md)
  - A single `OTPMain` entry point starts the server process
  - No container orchestration, no independent service deployments

  **2. Well-Defined Internal Module Boundaries**
  - Eight Maven modules declared in root `pom.xml` (lines 97–107): `utils`, `domain-core`,
    `raptor`, `astar`, `street`, `gtfs-realtime-protobuf`, `application`, `otp-shaded`
  - Each module has a `pom.xml` with explicit `<dependency>` declarations controlling
    what each module may see
  - DEVELOPMENT_DECISION_RECORDS.md §Use-Module-Encapsulation mandates: "Consider adding
    an `api`, `spi` and mapping code to isolate the module from the rest of the code.
    Avoid circular dependencies between modules."

  **3. Compile-Time and Test-Time Boundary Enforcement**
  - `RaptorArchitectureTest.java` (ArchUnit) verifies exact allowed dependencies for
    every package within the Raptor module:
    - `API_MODEL.dependsOn(OTP_UTILS).verify()`
    - `RAPTOR_SPI.dependsOn(OTP_UTILS, API_MODEL, API_PATH).verify()`
    - `enforceNoCyclicDependencies()` test ensures the entire Raptor subgraph is cycle-free
  - `TimetableRepositoryArchitectureTest.java`, `DataStoreArchitectureTest.java`,
    `FrameworkArchitectureTest.java` apply similar ArchUnit enforcement to other modules
  - `OtpArchitectureModules.java` declares the canonical package-to-module mapping used
    by all architecture tests

  **4. Raptor as Canonical Isolated Module**
  - ARCHITECTURE.md (lines 64–67) states explicitly: "there are no dependencies from
    Raptor to other parts of OTP code, only to utility classes not found in the JDK"
  - OTP communicates with Raptor only via the SPI in `raptor/spi/` — OTP implements
    the SPI interfaces; Raptor knows nothing about OTP domain types
  - `RoutingService` maps from OTP's `RouteRequest` → `RaptorRequest` and back, acting
    as the anti-corruption layer between the two modules

  **5. Dagger Dependency Injection as Composition Root**
  - `standalone/configure/ConstructApplication.java` is the single wiring class that
    instantiates and connects all services before the HTTP server starts
  - Module wiring convention: each module places its Dagger `@Module` in
    `<module>/configure/<Module>Module.java` (DEVELOPMENT_DECISION_RECORDS.md
    §Use-Dependency-Injection)

  **6. Sandbox Feature Isolation**
  - Experimental features live under their own package with `OTPFeature` flag disabled by
    default, preventing unfinished code from leaking into the stable module graph

  ### Secondary Style: Layered

  ARCHITECTURE.md defines four explicit horizontal layers applied consistently across modules:

  - **Use Case Services** — stateless orchestrators combining multiple domain services to
    serve a use case (e.g., `DefaultRoutingService` delegates to `RoutingWorker` which
    then delegates to Raptor via the SPI adapter)
  - **Domain Services** — business logic for a specific domain (TransitService,
    RealtimeVehicleService, VehicleParkingService, etc.)
  - **Domain Models** — aggregate roots with separate read-only Service interface and
    mutable Repository interface (the transit model is the primary example)
  - **Repositories** — in-memory model stores updated by background real-time updater
    threads; the updater SPI (`GraphUpdater`, `WriteToGraphCallback`) ensures updaters
    cannot call services, only write to repositories

  The API layer (GraphQL via Jersey) sits above Use Case Services and has no direct
  contact with repositories or domain models. Config POJOs injected via Dagger sit
  outside the service layers. This is consistent with a classic horizontal layered topology.

  The `service/package.md` canonical sub-package layout (`configure/`, `internal/`,
  `model/`, `<Name>Service`, `<Name>Repository`) codifies this layering at the package
  level, making it prescriptive rather than emergent.

  ### Architecture Qualifiers

  **DDD Design Approach**
  - `transit/model/package.md` explicitly references Domain-Driven Design (footnote [1])
    and documents aggregate roots, entities, value objects, `sameAs()` semantics, and
    `logName()` conventions
  - `TimetableRepository` (610 lines) is the primary aggregate root for the transit domain
  - `TransitEditorService` / `TransitService` model a read/write split within the domain
    service layer (though not full CQRS — the same in-memory model backs both)
  - Repository interfaces (`TransitEditorService`, `VehicleParkingRepository`,
    `VehicleRentalRepository`, `RealtimeVehicleRepository`) follow DDD repository pattern

  ### Evidence Against Other Styles

  - **Not Microservices**: One deployable JAR, no independent service deployment units,
    no network boundaries between routing and transit data
  - **Not Hexagonal Architecture**: No explicit "ports" defined as Java interfaces that
    the application layer depends on; modules use DI injection directly
  - **Not CQRS**: While TransitService/TransitEditorService split read and write paths,
    they share the same in-memory model (TimetableRepository) — not separate read/write
    data stores. No command bus / query bus separation.
  - **Not Event-Driven**: The updater system uses polling (PollingGraphUpdater) and
    direct writes (WriteToGraphCallback), not asynchronous event propagation. Routing
    requests are synchronous HTTP/GraphQL.
  - **Not Microkernel**: The "sandbox" feature flag mechanism superficially resembles
    plugins but extensions are compiled-in modules, not dynamically loaded plugins.
    There is no plugin registry or runtime discovery mechanism.
  - **Not Pipeline**: While the graph builder (`graph_builder/`) processes data through
    sequential `GraphBuilderModule` steps, this is a one-time startup phase — not the
    primary runtime topology.

  ### Conclusion

  OpenTripPlanner is a textbook production **Modular Monolith** — a 15-year-old Java
  system that has deliberately avoided distributed architecture while still achieving
  strong modularity through Maven module boundaries, ArchUnit enforcement, and Dagger DI.
  Its internal organization follows a **Layered** architecture with DDD tactical patterns
  (aggregate roots, repositories, entities, value objects) applied inside the domain
  layer, qualifying as a design-approach qualifier rather than a topology-defining style.
  Classification confidence is 0.93 — the only uncertainty is that the ARCHITECTURE.md
  itself notes the package structure "needs cleanup," meaning the current code does not
  perfectly match the documented goal state.
