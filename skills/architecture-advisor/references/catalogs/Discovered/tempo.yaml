one_line_summary: >
  High-scale distributed tracing backend built as a single binary that deploys
  as a modular monolith or distributed microservices, with a pipeline-based query
  path and optional Kafka-driven ingest.
architecture_qualifiers:
- ring-based consistent hashing (dskit/ring via memberlist/Consul/etcd)
- WAL-backed block ingestion with Apache Parquet column storage
- optional Kafka event-driven ingest path (block-builder + live-store)
- TraceQL DSL with AST-based column push-down query engine
- tiered storage (live in-memory → WAL → object storage)
quality_attributes:
- horizontal scalability per component via consistent-hash rings
- object-storage-only persistence (S3, GCS, Azure) — no stateful databases
- configurable replication factor for ingestion availability
- composable query pipeline with sharding, caching, retry, and parallel combination
- extensive Prometheus metrics and OpenTelemetry self-instrumentation
- single-binary deployment mode for development and small-scale use
classification_reasoning: |
  ## Primary Style: Modular Monolith

  Tempo compiles entirely into a single Go binary (`cmd/tempo`). The `-target`
  flag at runtime selects which modules activate. All modules share the same
  `go.mod`, the same Docker image (`grafana/tempo:latest`), and are wired
  together by the `dskit/modules.Manager` in `cmd/tempo/app/modules.go`.

  Module constants defined in modules.go:
  - Distributor, Ingester, QueryFrontend, Querier, MetricsGenerator,
    BlockBuilder, LiveStore, BackendScheduler, BackendWorker, SingleBinary ("all")

  `SingleBinary` (`-target=all`) is the default config and activates all modules
  in a single process. This is a canonical Modular Monolith deployment.

  ## Secondary Style: Microservices

  In distributed deployment (Docker Compose `distributed/`, Helm `operations/helm/`),
  each module runs as an independent horizontally-scaled process. All inter-module
  communication is over gRPC or HTTP — there is no shared in-process state in this
  mode. Each component scales independently (e.g., multiple Distributor replicas,
  multiple Querier replicas). The consistent-hash ring (dskit/ring, backed by
  memberlist gossip) provides service discovery and ownership coordination.

  Evidence: distributor.go uses `ring_client.Pool` to dial ingesters by address;
  querier.go uses a separate `liveStorePool`; the Query Frontend dispatches
  sharded work to Queriers via streaming gRPC.

  ## Tertiary Style: Pipeline

  The Query Frontend (`modules/frontend/`) implements a composable middleware
  pipeline pattern. Incoming queries pass through:
  1. Sharder (splits block ID space or time range into parallel sub-requests)
  2. Async middleware chain (deny-list, tenant validation, weight balancing,
     cache lookup, retry)
  3. Dispatcher (fans out to Querier pool via streaming gRPC)
  4. Combiner (merges parallel Querier responses)

  This is architecturally a Pipeline style for the query path, with independently
  composable and testable stages (`pipeline/async_*.go`, `pipeline/sync_*.go`,
  `combiner/`).

  ## Optional Event-Driven Path (Kafka)

  `pkg/ingest/config.go` defines KafkaConfig. `modules/blockbuilder` and
  `modules/livestore` are dedicated Kafka consumers (franz-go). The generator
  also supports a Kafka consume path (`generator_kafka.go`). This is optional
  and does not define the primary architectural style — the default ingestion
  path is synchronous gRPC from Distributor to Ingester.

  ## What was rejected

  - **Event-Driven as primary**: Kafka is opt-in. The default, documented, and
    most common path is synchronous gRPC-based ingestion.
  - **Layered**: Organization is vertical by functional capability (distributor,
    querier, ingester), not horizontal layers (presentation, business, data).
  - **Service-Based**: Tempo's components are fine-grained and ring-sharded,
    not the coarse-grained 2–5 service pattern of Service-Based architecture.
