one_line_summary: Bitwarden Server is a Service-Based architecture of independently deployed ASP.NET Core services (Api, Identity,
  Billing, Notifications, Events, EventsProcessor, Icons, Admin, SSO, SCIM) sharing a single relational database via a shared
  Core library, augmented by a two-tier event-driven integration pipeline over Azure Service Bus and RabbitMQ, and internally
  structured around DDD bounded contexts with CQRS commands and queries.
classification_reasoning: |
  ## Architecture Analysis: Bitwarden Server

  ### Primary Style: Service-Based

  The solution contains ten independently deployable ASP.NET Core service entry
  points, each with its own Dockerfile, Program.cs, and Startup.cs:

  - `src/Api` — main REST API (vault, auth, billing, secrets manager, tools)
  - `src/Identity` — OAuth2/OIDC token issuance via Duende IdentityServer
  - `src/Billing` — Stripe/Braintree subscription lifecycle management
  - `src/Notifications` — real-time WebSocket push via SignalR hubs
  - `src/Events` — audit event ingestion REST endpoint
  - `src/EventsProcessor` — background Azure Queue consumer / event drain
  - `src/Icons` — favicon proxy service
  - `src/Admin` — internal administration portal
  - `bitwarden_license/src/Sso` — enterprise SSO (SAML/OIDC)
  - `bitwarden_license/src/Scim` — SCIM 2.0 provisioning

  Unlike Microservices, all services share a single logical database schema.
  The `Core` library exposes repository interfaces (IUserRepository,
  ICipherRepository, IOrganizationRepository, etc.) implemented by both
  Infrastructure.Dapper and Infrastructure.EntityFramework. Every deployable
  service wires these through `AddDatabaseRepositories(globalSettings)` in
  SharedWeb/Utilities/ServiceCollectionExtensions.cs, connecting all processes
  to the same SQL Server / PostgreSQL / MySQL / MariaDB schema. This
  shared-database characteristic is the decisive indicator of Service-Based
  rather than Microservices.

  The `Core` project acts as the shared kernel: entity definitions, repository
  interfaces, domain service interfaces (IUserService, IEventService,
  IPushNotificationService, IApplicationCacheService), infrastructure-neutral
  business logic, and all settings. All deployable services carry a
  ProjectReference into Core (and optionally Commercial.Core). Hub-and-spoke
  dependency on a common library is a hallmark of Service-Based architecture.

  ### Co-Style: Event-Driven

  The system uses two distinct async messaging layers:

  **Audit Event Pipeline (Azure Queue)**
  EventService calls IEventWriteService, implemented by
  AzureQueueEventWriteService in the cloud configuration. This enqueues audit
  events to Azure Storage Queue. The standalone EventsProcessor service polls
  that queue via its AzureQueueHostedService and writes events to Azure Table
  Storage or the database. The Notifications service has a parallel queue
  consumer that relays messages to connected SignalR clients.

  **Event Integration Pipeline (Azure Service Bus / RabbitMQ)**
  When event integrations are enabled, EventIntegrationEventWriteService
  publishes to a two-tier AMQP topology documented in
  `src/Core/Dirt/EventIntegrations/README.md`:

  - Tier 1 (Event Exchange/Topic): fan-out to EventRepositoryHandler
    (persistence) and EventIntegrationHandler (per-integration routing).
    Backed by Azure Service Bus (cloud) or RabbitMQ (self-hosted).
  - Tier 2 (Integration Exchange/Topic): per-integration queues consumed by
    SlackIntegrationHandler, WebhookIntegrationHandler,
    DatadogIntegrationHandler, TeamsIntegrationHandler, HecIntegrationHandler.
    Each returns IntegrationHandlerResult for retry/DLQ decisions, with
    exponential backoff and jitter via RabbitMQ retry queues or delay plugin,
    and Azure Service Bus native scheduled message delivery.

  Azure Service Bus also drives cross-service cache invalidation:
  InMemoryServiceBusApplicationCacheService publishes UpsertOrganizationAbility
  and DeleteOrganizationAbility messages on a topic; every Api instance
  subscribes and invalidates its local OrganizationAbility cache.

  Infrastructure confirmed in dev/docker-compose.yml: rabbitmq, service-bus
  (ASB emulator), storage (Azurite), redis.

  ### Co-Style: Domain-Driven Design

  src/Core is organized into explicit bounded contexts with Commands, Queries,
  Repositories, Services, and Entities per domain:

  - Auth — authentication, SSO, WebAuthn, emergency access, user keys
  - AdminConsole — organizations, collections, groups, providers, policies
  - Vault — ciphers, security tasks, cipher task notifications
  - SecretsManager — machine accounts, projects, secrets
  - KeyManagement — user key rotation, sends, Kdf management
  - NotificationCenter — in-app notification entities
  - Billing — subscriptions, licensing, tax
  - Tools — password generator, send, import
  - Dirt (Data Integrity, Reports & Telemetry) — audit events, integrations

  Repository interfaces (ports) are defined in each bounded context; Dapper
  and EF Core implementations in Infrastructure.Dapper and
  Infrastructure.EntityFramework fulfill the contracts.

  ### Co-Style: CQRS

  Multiple bounded contexts apply explicit Command/Query separation without
  MediatR: Core/Vault/Commands/ and Core/Vault/Queries/,
  Core/AdminConsole/OrganizationFeatures/Organizations/ (CloudOrganizationSignUpCommand,
  OrganizationDeleteCommand, BulkUpdateOrganizationSubscriptionsCommand, etc.),
  Core/KeyManagement/Commands/ and /Queries/,
  Core/SecretsManager/Commands/ and /Queries/,
  Core/NotificationCenter/Commands/ and /Queries/.

  This is a service-internal structural pattern, not a primary deployment-level
  style, and is listed as a co-style rather than primary.

  ### Rejected Styles

  - Microservices: Services share a single relational schema; no
    database-per-service ownership. The defining Microservices criterion is
    not met.
  - Modular Monolith: Multiple separately deployed Docker containers; not a
    single deployable unit.
  - Layered: Dominant organizing principle is bounded-context decomposition
    and per-service deployment, not a horizontal tier stack.
  - Hexagonal Architecture: Port/adapter patterns used tactically within
    bounded contexts but do not define the primary framing of the system.
  - Pipeline: EventsProcessor is a supporting queue drain component, not the
    primary application topology.
  - Microkernel: No plug-in host with extension registry. bitwarden_license
    projects are conditional build references, not runtime plugins.
  - Serverless: Services are long-running ASP.NET Core container processes.
  - Space-Based: No distributed grid or tuple-space partitioning.
  - Multi-Agent: No agent orchestration framework present.
