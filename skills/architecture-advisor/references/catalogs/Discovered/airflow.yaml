classification_reasoning: "## Architecture Classification Analysis\n\n### Primary Styles:\
  \ Microkernel + Pipeline\n\n**MICROKERNEL (primary, 0.92):** The `providers/` directory\
  \ contains 84 independently versioned provider packages (amazon, google, celery,\
  \ cncf/kubernetes, postgres, snowflake, openai, dbt, etc.), each declaring itself\
  \ via `[project.entry-points.\"apache_airflow_provider\"]` in its own `pyproject.toml`.\
  \ The core discovers providers at runtime in `shared/providers_discovery/src/airflow_shared/providers_discovery/providers_discovery.py`\
  \ using `entry_points_with_dist(\"apache_airflow_provider\")`. The `shared/plugins_manager/`\
  \ defines `AirflowPlugin` with 10+ extension point lists: hooks, operators, sensors,\
  \ executors, auth backends, secrets backends, listeners, triggers, flask_blueprints,\
  \ fastapi_apps. The `ExecutorLoader` in `airflow-core/.../executors/executor_loader.py`\
  \ loads `CeleryExecutor` and `KubernetesExecutor` from provider packages by class\
  \ path. The `task-sdk/src/airflow/sdk/bases/` defines `BaseOperator`, `BaseHook`,\
  \ and `BaseSensorOperator` as formal plugin contracts. DAG bundles (`AbstractDagBundle`)\
  \ are also pluggable.\n\n**PIPELINE (primary, 0.88):** The fundamental abstraction\
  \ is the DAG (directed acyclic graph of tasks). The five-component runtime enforces\
  \ a strict one-way pipeline documented in `AGENTS.md`: (1) DAG authors write tasks\
  \ via task-sdk, (2) DAG Processor parses DAG files in isolated subprocesses storing\
  \ serialized DAGs in the metadata DB, (3) Scheduler reads serialized DAGs and creates\
  \ task instances — never runs user code, (4) Workers execute tasks via task-sdk\
  \ communicating through the Execution API — never access the metadata DB, (5) Triggerer\
  \ evaluates deferred tasks in isolated processes. The dual FastAPI apps (`core_api`\
  \ for public REST, `execution_api` for worker communication) enforce this boundary\
  \ contractually. The supervisor in `task-sdk/.../execution_time/supervisor.py` uses\
  \ httpx to communicate back through the Execution API.\n\n### Secondary Style: Modular\
  \ Monolith\n\n**MODULAR MONOLITH (secondary, 0.82):** UV workspace monorepo with\
  \ clear internal package boundaries: `airflow-core` (scheduler, API server, models,\
  \ CLI, React UI), `task-sdk` (DAG authoring and task execution runtime), `shared/`\
  \ (configuration, secrets, logging, observability, plugin infrastructure — 11 sub-packages),\
  \ `airflow-ctl` (management CLI), `clients/` (Python and Go SDK clients). All packages\
  \ share a single SQLAlchemy metadata database and deploy from a common codebase.\
  \ They are independently testable units within the monorepo, not separate services.\n\
  \n### What Was Rejected and Why\n\n**Not Microservices:** The five process types\
  \ (scheduler, API server, DAG processor, worker, triggerer) share the same codebase\
  \ and a single metadata database. They are deployment configurations of one application,\
  \ not independent services with their own data stores.\n\n**Not pure Layered:** Organization\
  \ is primarily vertical by component responsibility and plugin extension, not horizontal\
  \ by layer. The `execution_api` isolation is an architectural boundary, not a traditional\
  \ presentation/business/data layer stack.\n\n**Not Event-Driven (primary):** While\
  \ callbacks and listeners exist, the primary coordination mechanism is the metadata\
  \ DB poll-based scheduler loop and the synchronous Execution API, not an event broker\
  \ or message bus.\n\n### Quality Attributes Evidence\n\n**EXTENSIBILITY:** 84 provider\
  \ packages discovered via Python entry points; AirflowPlugin extension points; AbstractDagBundle\
  \ for pluggable DAG sources; providers can be installed/removed without core changes.\n\
  \n**DEPLOYABILITY:** Helm chart in `chart/`; Docker Compose for local; five independently\
  \ scalable process types; Celery and Kubernetes executors via providers.\n\n**ISOLATION:**\
  \ DAG processor isolates user code in subprocesses; workers never access the metadata\
  \ DB (task-sdk boundary); scheduler never runs user code; triggerer runs deferred\
  \ tasks in isolated processes.\n\n**SCALABILITY:** Workers scale independently of\
  \ scheduler; Celery executor enables distributed execution across a fleet; Kubernetes\
  \ executor creates a pod per task; async triggerer handles high-concurrency deferred\
  \ sensors.\n\n**OBSERVABILITY:** StatsD/OpenTelemetry metrics in `airflow/_shared/observability/`;\
  \ DualStatsManager for concurrent metric emission; structlog structured logging;\
  \ job and task lifecycle tracking in the metadata DB.\n\n**EVOLVABILITY:** `execution_api/versions/`\
  \ for versioned worker communication contract; provider packages versioned independently\
  \ from `airflow-core`; `shared/` enables cross-package reuse without circular dependencies;\
  \ strict architectural boundaries enforced in code review guidelines."
