one_line_summary: Open-source data management system built on a formal plugin (Microkernel)
  architecture with a strict internal layered structure across views, logic/actions,
  and SQLAlchemy model layers.
classification_reasoning: "CKAN's primary architecture is Microkernel. The kernel\
  \ (ckan/) provides a minimal application skeleton and a registry of over 20 typed\
  \ extension interfaces (IActions, IAuthFunctions, IConfigurer, IDatasetForm, IBlueprint,\
  \ ISignal, IResourceController, and others defined in ckan/plugins/interfaces.py).\
  \ All domain capabilities — including features that ship with the product — are\
  \ implemented as ckanext.* plugins loaded at runtime via Python entry points (importlib.metadata\
  \ group='ckan.plugins'). Plugin lifecycle is managed by ckan/plugins/core.py through\
  \ load/unload/plugins_update functions and a global singleton registry. The plugin\
  \ toolkit (ckan/plugins/toolkit.py) provides a stable versioned API facade that\
  \ insulates plugins from internal refactoring. Blanket decorators (@tk.blanket.actions\
  \ etc.) enforce consistent plugin structure. The Layered secondary style reflects\
  \ strict internal discipline: views (ckan/views/ Flask blueprints) call get_action()\
  \ into the logic/actions layer (ckan/logic/action/ — ~6,856 lines across create/get/update/delete/patch),\
  \ which checks auth functions (ckan/logic/auth/) and manipulates SQLAlchemy ORM\
  \ models (ckan/model/). A Blinker signal system (ckan/lib/signals.py, action_succeeded\
  \ et al.) and Redis/RQ async job queues (ckan/lib/jobs.py) are secondary infrastructure\
  \ integrations. The application deploys as a single WSGI process (wsgi.py) with\
  \ one PostgreSQL database, making Microservices, Service-Based, and distributed\
  \ patterns inapplicable."
