classification_reasoning: |
  ## Analysis

  Squidex is a headless CMS whose runtime topology is a single deployable
  process (one Dockerfile, one Squidex.dll). The internal structure is
  organized around clear horizontal layers enforced by project boundaries:
  core domain models → core operations → entities/aggregates → web/API →
  host. This is the defining characteristic of the **Layered** style.

  ### Primary Style: Layered

  The project is divided into six distinct compilation units that form a
  strict dependency hierarchy:

  1. `Squidex.Domain.Apps.Core.Model` — pure domain models (no infrastructure
     dependencies)
  2. `Squidex.Domain.Apps.Core.Operations` — business logic operating on those
     models
  3. `Squidex.Domain.Apps.Events` — domain event definitions
  4. `Squidex.Domain.Apps.Entities` — aggregate roots, command handlers, query
     services, repositories (interfaces)
  5. `Squidex.Infrastructure` — cross-cutting concerns: command bus, event
     sourcing engine, caching, plugin manager, messaging
  6. `Squidex.Web` / `Squidex` (host) — ASP.NET Core controllers, middleware,
     DI composition root

  `Startup.cs` registers services in strict layer order, and ASP.NET Core
  Areas further separate API, IdentityServer, and Frontend concerns. Data
  access is isolated in `Squidex.Data.MongoDb` and
  `Squidex.Data.EntityFramework` behind `IStore<T>` / `IPersistenceFactory<T>`
  interfaces. This is a classic layered architecture.

  ### Secondary Style: Microkernel

  Squidex has a well-designed plugin system as a first-class architectural
  feature. The `IPlugin` interface defines `ConfigureServices` and
  `ConfigureServicesPost` hooks. `PluginManager` uses `McMaster.NETCore.Plugins`
  to load external assemblies at runtime, sharing the core Squidex assemblies
  as the stable kernel. The built-in `backend/extensions/Squidex.Extensions/`
  library delivers 20+ action plugins (Kafka, ElasticSearch, Algolia, Slack,
  Webhook, Typesense, OpenSearch, AzureQueue, SignalR, etc.), text indexing
  plugins (Azure, ElasticSearch), and asset metadata plugins. `AddSquidexPluginsPost`
  runs last in `Startup.ConfigureServices` to allow plugins to override any
  registered service — the canonical Microkernel pattern.

  ### CQRS (data-pattern qualifier)

  The command side uses `InMemoryCommandBus` which composes an ordered chain
  of `ICommandMiddleware` instances. Every aggregate is reached through
  `AggregateCommandMiddleware<TCommand, TDomainObject>`. The read side uses
  completely separate query services (`ContentQueryService`, `AssetQueryService`)
  that query `IContentRepository` directly without involving the command bus.
  Commands are in `.../Commands/` directories; queries in `.../Queries/`
  directories — a rigid structural enforcement of CQRS at the package level.
  The README explicitly states "built with ASP.NET Core and CQRS."

  ### Event Sourcing (data-pattern qualifier)

  `DomainObject<T>` is the universal aggregate root base class. It holds an
  `IPersistence<T>` that is initialized with `WithSnapshotsAndEventSourcing()`
  — meaning every aggregate state change is stored as a domain event. Uncommitted
  events accumulate in a list and are flushed atomically. Three pluggable
  `IEventStore` backends are supported: MongoDB, SQL via EntityFramework, and
  EventStoreDB. The `EventConsumerManager` and `EventConsumerWorker` process
  the outbound event stream to update projections, execute rules, and publish
  subscriptions.

  ### DDD (design-approach qualifier)

  All 15 domain areas (Apps, Assets, Backup, Billing, Collaboration, Contents,
  History, Invitation, Jobs, Properties, Rules, Schemas, Search, Tags, Teams)
  have their own dedicated aggregate roots and bounded sub-packages following
  DDD tactical patterns. Guard classes enforce domain invariants. Domain events
  are separated into their own project. This is thorough application of DDD
  tactical patterns, though there are no explicit published bounded context
  contracts (no inter-context integration events), so full strategic DDD is
  not applied.

  ### What Was Rejected

  **Not Microservices**: Single Dockerfile, single process, shared database.
  No independent deployment units.

  **Not Modular Monolith**: There are no enforced module boundaries with
  explicit public API contracts between modules. Dependencies flow through
  shared DI registrations, not through module facades.

  **Not Event-Driven (primary)**: Events are used internally for persistence
  (event sourcing) and rule triggering, but the system's topology is not
  organized around asynchronous event channels as the primary integration
  mechanism. The command bus is synchronous and in-process.
