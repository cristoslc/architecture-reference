one_line_summary: "A Rails 8 project management platform structured as a Modular Monolith of 27 Rails engine modules sharing one PostgreSQL database, augmented by a Microkernel plugin system (Hook, PatchRegistry, Notifications pub/sub) and a strict contract-service layering inside each module."
classification_reasoning: "OpenProject exhibits a three-style composition: Modular Monolith as primary, Microkernel and Layered as secondary.\n\nMODULAR MONOLITH (primary, 0.93): The repo contains 27 domain-specific Rails engines under modules/ — storages, meeting, backlogs, boards, bim, gantt, calendar, webhooks, github_integration, gitlab_integration, etc. Each module ships with its own app/ MVC tree, db/migrate/ migrations, config/routes.rb, and a *.gemspec making it a proper Ruby gem. All 27 are loaded in a single Ruby process via Gemfile.modules under group :opf_plugins and Bundler.require(*Rails.groups(:opf_plugins)) in application.rb. Migrations are merged at boot via ActsAsOpEngine#append_migrations so all modules share one PostgreSQL schema. Modules communicate through shared ActiveRecord models, direct Ruby calls, and the in-process notifications bus — no network boundaries separate them. The worker (GoodJob) process also shares the same codebase and database.\n\nMICROKERNEL (secondary, 0.88): The core exposes three structured extension mechanisms. First, OpenProject::Hook provides a Listener singleton pattern where modules register named hook implementations (e.g., view_account_login_auth_provider); Hook.call dispatches to all registered listeners for a given hook. Second, OpenProject::Plugins::PatchRegistry.register enables modules to inject concerns into core classes via ActiveSupport.on_load, fired by the 10-load_patches.rb initializer. Third, OpenProject::Notifications wraps ActiveSupport::Notifications with a named subscribe/send API; subscribe_listeners.rb wires 30+ named domain events (JOURNAL_CREATED, MEMBER_CREATED, WATCHER_ADDED, PROJECT_CREATED, STORAGE_TURNED_UNHEALTHY, etc.) to background job dispatch. The OpenProject::Events module defines these event constants as the canonical plugin vocabulary. Additionally, each module calls OpenProject::AccessControl.map to register permissions declaratively into a centralized capability registry. These structured extension points mean modules do not need to modify core source to extend behavior.\n\nLAYERED (secondary, 0.82): Both core and all 27 modules adhere to a consistent five-layer pipeline within Rails MVC. HTTP layer: thin controllers and Grape-based REST API v3 under lib/api/v3/. Contract layer: app/contracts/BaseContract with validation and permission checks per resource. Service layer: BaseContracted services enforce a fixed pipeline — validate_params > before_perform > validate_contract > after_validate > persist > after_persist > after_perform — returning ServiceResult value objects. Background layer: GoodJob-backed ApplicationJob subclasses for async work (notifications, webhooks, mail, cron). Data layer: ActiveRecord models with paper_trail audit journaling and Statesman state machines. The BaseContracted pipeline is enforced across 80+ services and all modules, ensuring authorization gates every mutation.\n\nRULED OUT - Microservices: All modules share one database, one Ruby process, and one Gemfile. The worker process shares the same codebase. No independently deployable units communicating over the network.\n\nRULED OUT - Event-Driven (primary): The OpenProject::Notifications bus is in-process (ActiveSupport instrumentation), not a broker-backed async event stream. Events trigger GoodJob job dispatch, not replacing request-response communication. The system is event-aware but request-driven at its core.\n\nRULED OUT - Hexagonal Architecture: No ports/adapters separation. Controllers and API endpoints are not formalized as adapters to domain ports. ActiveRecord models are used directly in service layer calls.\n\nRULED OUT - CQRS: The journals table is an append-only audit log (paper_trail) but there is no separate read/write model split or explicit event store. Reads and writes use the same ActiveRecord models.\n\nQUALITY ATTRIBUTES evidence: Extensibility — Hook listeners, PatchRegistry, Notifications pub/sub, and AccessControl.map provide four orthogonal extension points; 27 modules extend core without forking it. Maintainability — BaseContracted enforces consistent service pipeline; Primer ViewComponents for UI; contract-per-resource validation isolation. Modularity — each of 27 modules is a self-contained Rails engine gem with own migrations, routes, and MVC. Observability — AppSignal APM, OpenTelemetry initializer, GoodJob dashboard, Lograge structured logging, health_checks endpoint. Security — Doorkeeper OAuth2, Warden authentication, OmniAuth SSO providers, rack-attack rate limiting, rack-cors, BCrypt passwords, SSRF protection. Scalability — Puma multi-process web; GoodJob worker processes scale independently against the shared PostgreSQL queue; Redis-backed ActionCable for real-time channels. Auditability — paper_trail on all state changes; journal aggregation pipeline with AGGREGATED_*_JOURNAL_READY events; JournalChanges/JournalFormatter concerns on all major models. Internationalisation — i18n-js, Crowdin integration, per-module locale files merged at boot via i18n_load_paths initializer."
