classification_reasoning: "## Architecture Classification Analysis\n\n### Primary
  Styles: Microkernel + Layered\n\n**MICROKERNEL (primary, 0.91):** The defining characteristic
  of OpenMRS Core is its runtime module system. `ModuleFactory.java` (1628 lines)
  manages the full plugin lifecycle: `loadModule()`, `startModule()`, `stopModule()`,
  `unloadModule()`. Modules are `.omod` JARs discovered at runtime and loaded via
  `OpenmrsClassLoader`. `ModuleActivator` defines the plugin lifecycle contract with
  hooks for `willStart()`, `started()`, `willStop()`, `stopped()`, `willRefreshContext()`,
  and `contextRefreshed()`. `Extension` implements named UI extension points: modules
  declare extensions for specific `pointId` values. `ModuleFactory.extensionMap`
  maps each point to an ordered list of contributing extensions. Modules contribute
  Spring beans via their own `moduleApplicationContext.xml` (loaded with `classpath*:`
  wildcard in `web.xml`). `ServiceContext` is the runtime plugin registry: modules
  register additional `OpenmrsService` implementations accessible globally through
  `Context.getService(MyModuleService.class)`. AOP advice in `org.openmrs.aop` intercepts
  all service calls as `MethodBeforeAdvice`; modules can add their own `Advisor` objects
  at runtime. The `HandlerUtil` pattern allows modules to register handler interface
  implementations discovered at startup.\n\n**LAYERED (primary, 0.88):** Strict four-tier
  architecture within the kernel: (1) Presentation — `web/` module with `DispatcherServlet`
  and filters; (2) Service — 23 service interfaces in `org.openmrs.api` (`PatientService`,
  `EncounterService`, `ConceptService`, `OrderService`, etc.) all extending `OpenmrsService`,
  wrapped in AOP proxies with `@Transactional` at the implementation level; (3) DAO
  — 20+ DAO interfaces in `org.openmrs.api.db` with Hibernate implementations in
  `db/hibernate/` (e.g., `HibernatePatientDAO`); (4) Domain model — rich domain objects
  (`Patient`, `Encounter`, `Obs`, `Order`, `Concept`) mapped via JPA/Hibernate with
  Liquibase migrations. Cross-cutting concerns applied uniformly: `AuthorizationAdvice`
  enforces `@Authorized` privilege annotations on every service call; `LoggingAdvice`
  traces all service methods; `RequiredDataAdvice` fires save/void/unvoid handler
  callbacks before persistence.\n\n### Secondary Style: Modular Monolith\n\n**MODULAR
  MONOLITH (secondary, 0.75):** The Maven build produces a single deployable WAR (`webapp/target/openmrs.war`).
  Internal Maven modules — `api/`, `web/`, `webapp/`, `liquibase/`, `tools/`, `test/`,
  `bom/` — provide well-separated build boundaries, but all share one classpath, one
  Spring application context, one Hibernate session factory, and one relational database.
  All execute in one JVM process with no inter-process communication.\n\n### What
  Was Rejected and Why\n\n**Not Microservices:** Single WAR file, one database, one
  JVM. Runtime modules are dynamically loaded JARs in the same process, not independent
  services.\n\n**Not Event-Driven (primary):** `EventListeners`/`GlobalPropertyListener`
  is a narrow internal notification mechanism for configuration changes only, not
  a primary coordination mechanism. No message broker or event bus.\n\n**Not Service-Based:**
  No independently deployable service units; everything deploys as one WAR.\n\n**Not
  Hexagonal:** No formal port definitions; layering is directional top-down, not radial.
  DAO interface layer provides persistence abstraction but is not a secondary port
  in the Hexagonal sense.\n\n**Not Pipeline:** Request-response through Controller
  -> Service -> DAO -> Database is a layered call stack, not a pipeline.\n\n### Quality
  Attributes Evidence\n\n**EXTENSIBILITY:** Module system is the project's primary
  value proposition per README. Module Repository at https://addons.openmrs.org/
  lists hundreds of extensions. Named UI extension points, pluggable `IdentifierValidator`,
  `EncounterVisitHandler`, and authentication schemes.\n\n**SECURITY:** `AuthorizationAdvice`
  enforces `@Authorized` privilege annotations on every service method via AOP. Role-based
  access control (`Role`, `Privilege`) is first-class domain concept. Authentication
  schemes are pluggable interface implementations.\n\n**MAINTAINABILITY:** Clear layered
  separation prevents cross-layer coupling. All 23 services expose interfaces; implementations
  are injectable. 23+ validator classes enforce domain invariants at the service layer.
  AOP advice handles cross-cutting concerns without polluting business logic.\n\n**EVOLVABILITY:**
  Liquibase manages all schema migrations including per-module changelogs. Modules
  declare `requireOpenmrsVersion` compatibility constraints. `BaseModuleActivator`
  buffers modules from interface changes. `setupOnVersionChangeBeforeSchemaChanges()`
  hook enables safe migrations at upgrade.\n\n**OBSERVABILITY:** `LoggingAdvice` provides
  uniform method-level logging across all services. Log4j2 configured via `log4j2.xml`.
  `LoggingConfigurationGlobalPropertyListener` allows runtime log configuration changes.\n\n**TESTABILITY:**
  Shared `test/` module with base classes and test utilities. H2 in-memory database
  profile (`installation.h2.properties`) for fast integration testing. 424 test Java
  files.\n\n**PORTABILITY:** WAR packaging allows deployment to any Jakarta EE-compatible
  servlet container. Docker Compose for containerized deployments. Optional ElasticSearch
  backend via Docker Compose override."
