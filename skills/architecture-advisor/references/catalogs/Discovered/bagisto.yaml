one_line_summary: "Laravel e-commerce platform organized as a 31-module Modular Monolith with config-driven plugin registries for product types, payment methods, and shipping carriers, coordinated through a pervasive cross-module event bus."
classification_reasoning: "Bagisto is classified as a Modular Monolith (primary), Microkernel (secondary), and Event-Driven (secondary). The entire application deploys as a single Laravel process against a shared MySQL database, organized into 31 self-contained domain modules under packages/Webkul/ — each with its own migrations, models, routes, views, and service providers — registered centrally via config/concord.php using the konekt/concord framework. This is the canonical Modular Monolith structure. The Microkernel classification is earned by three fully realized config-driven plugin registries: product types (packages/Webkul/Product/src/Config/product_types.php maps keys like 'simple', 'configurable', 'bundle' to AbstractType subclasses), payment methods (Payment.php iterates Config::get('payment_methods') and instantiates registered classes), and shipping carriers (Shipping.php iterates Config::get('carriers')). In all three cases the core defines an abstract contract and implementations register via configuration — textbook Microkernel. The Event-Driven classification reflects the pervasive use of string-keyed Laravel domain events as the sole cross-module coordination mechanism: repositories fire named events (checkout.order.save.after, sales.shipment.save.after, catalog.product.update.after, etc.) and 14 EventServiceProvider declarations across the package tree register listeners. 157 source files fire events. The FPC module implements reactive cache invalidation through 16 event listeners reacting to domain changes across Product, Category, Sales, CMS, and Core modules — an architectural-level event-driven integration topology. The system is NOT Microservices (single deployment, shared database), NOT pure Layered (domain-vertical primary organization), NOT Hexagonal (Eloquent active-record without port/adapter isolation), and NOT CQRS (no separate read/write model with command bus)."
