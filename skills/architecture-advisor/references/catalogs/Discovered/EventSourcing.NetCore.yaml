quality_attributes:
  evolvability:
    present: true
    evidence: |
      EventStoreDBSubscriptionToAll persists checkpoint positions enabling full event stream replay from any position. Sample/EventsVersioning/ contains nine concrete versioning strategies (upcasting, new schema, weak schema, event transformations). MartenRepositoryWithETagDecorator and EventStoreDBRepositoryWithETagDecorator apply ETag-based optimistic concurrency on every aggregate write, preventing lost-update conflicts as schemas evolve.
  modularity:
    present: true
    evidence: |
      Core functionality is factored into independent adapter packages: Core.EventStoreDB, Core.Marten, Core.Kafka, Core.ElasticSearch, and Core.EntityFramework. Each sample selects and composes adapters independently with no cross-context coupling. Bounded contexts (Carts, Orders, Payments, Shipments) are each self-contained C# projects with their own solution files, communicating exclusively through events.
  observability:
    present: true
    evidence: |
      Core/OpenTelemetry/ implements ActivityScope and ActivitySource with structured telemetry tags for commands (type, active count, total, duration), queries, domain events, and Kafka messaging (system, destination, partition, consumer group). CommandHandlerMetrics.cs tracks active command count, total handled, and handling duration as .NET meters. Jaeger exporter is wired in docker-compose; OTLP and console exporters are available via OpenTelemetry.Exporter.* packages.
  fault_tolerance:
    present: true
    evidence: |
      EventBus accepts a configurable Polly AsyncPolicy wrapping every event handler invocation with retry logic (default no-op, overridable per service). EventStoreDBSubscriptionToAll tracks ProcessingStatus across NotStarted, Starting, Started, Paused, Errored, and Stopped states with checkpoint persistence for crash recovery. The GetCartById query handler applies a Polly WaitAndRetryAsync(5) policy for read-after-write consistency on the CQRS read model.
  correctness:
    present: true
    evidence: |
      Optimistic concurrency is enforced by expected-version checks in MartenRepository.Update() (nextVersion = expectedVersion + events.Length) and EventStoreDBRepository. HTTP If-Match ETag headers are extracted and converted to expected stream versions in ShoppingCartsController and Helpdesk Program.cs via GetAndUpdate Marten extension, preventing concurrent update conflicts across all write operations.
  testability:
    present: true
    evidence: |
      Core.Testing module provides shared test harnesses. Every sample ships a companion .Tests project using Testcontainers.PostgreSql for live EventStoreDB/Marten instances, Alba for HTTP integration testing, and Ogooreck for BDD-style scenario composition. Core.EventStoreDB.Tests and Core.Marten.Tests validate adapter-level behaviour independently. EventSourcing.Integration.Tests provides cross-cutting integration coverage.
one_line_summary: |
  .NET reference implementation of Event Sourcing, CQRS, and DDD patterns using EventStoreDB or Marten/PostgreSQL, with pluggable adapters, sagas, projections, and nine event-versioning strategies across realistic sample applications.
classification_reasoning: |
  ## Architecture Classification Analysis

  ### Primary Style: Event-Driven

  The entire codebase is organised around the principle that state changes are
  represented as immutable domain events persisted to an append-only event store.
  The base `Aggregate<TEvent, TId>` class in `Core/Aggregates/Aggregate.cs` exposes
  `Enqueue(event)` which queues events and immediately applies them via `Apply()`;
  `DequeueUncommittedEvents()` is called by the repository on every save, writing
  all queued events to the event stream. `MartenRepository.Add()` calls
  `documentSession.Events.StartStream()` and `Update()` calls
  `documentSession.Events.Append()` â€” making event append, not row update, the
  canonical persistence operation.

  Subscriptions are the downstream delivery mechanism. `EventStoreDBSubscriptionToAll`
  subscribes to the global event stream via `SubscribeToAllAsync`, batches events,
  and dispatches them to registered `IEventBatchHandler` implementations with checkpoint
  persistence for guaranteed delivery. Marten's async daemon (`AddAsyncDaemon(DaemonMode.HotCold)`)
  serves the same role in Marten-backed samples. The `EventBus` in `Core/Events/EventBus.cs`
  provides in-process fan-out, dispatching each event to all registered `IEventHandler<TEvent>`
  implementations with Polly retry wrapping. `KafkaProducer` and `SignalRProducer` are
  registered as Marten subscriptions in `Helpdesk.Api/Program.cs`, making cross-service
  and cross-protocol fan-out a first-class pattern. Docker-compose creates Kafka topics
  `Carts`, `Orders`, `Payments`, and `Shipments` for inter-context event propagation.

  ### Secondary Style: CQRS

  Command and query responsibilities are explicitly separated through formal interfaces.
  `Core/Commands/` defines `ICommandHandler<TCommand>` (writes) and `ICommandBus`
  (routing); `Core/Queries/` defines `IQueryHandler<TQuery, TResponse>` (reads) and
  `IQueryBus` (routing). The ECommerce `ShoppingCartsController` calls
  `commandBus.Send(command)` for all mutation operations (OpenCart, AddProduct,
  RemoveProduct, ConfirmCart, CancelCart) and `queryBus.Query<TQuery, TResponse>()` for
  all read operations with no cross-contamination.

  Read models are purpose-built projections maintained by the event stream.
  `ShoppingCartDetails` and `ShoppingCartShortInfo` are updated by Marten inline
  projections. `IncidentDetailsProjection : SingleStreamProjection<IncidentDetails>`
  folds each event type into an immutable record. `CustomerIncidentsSummaryProjection`
  uses `ProjectionLifecycle.Async` handled by the async daemon. `HandleGetCartById`
  queries `IQuerySession` (the Marten read-model store) not the event stream, confirming
  read-side independence. A Polly retry in `GetCartById` polls until the read model
  catches up to the expected version â€” a canonical CQRS read-after-write consistency
  pattern.

  Command handler registrations (`AddCommandHandler<OpenShoppingCart, HandleOpenShoppingCart>`)
  and query handler registrations (`AddQueryHandler<GetCartById, ShoppingCartDetails?, HandleGetCartById>`)
  are separately enumerated in each bounded context's `Config.cs`, making the CQRS
  boundary explicit at the service registration layer.

  ### Tertiary Style: Domain-Driven Design

  The design uses DDD building blocks with precision. Aggregates are strongly typed value
  objects with `Id` and `Version`, encapsulating domain invariants: `ShoppingCart.Confirm()`
  throws if status is not Pending; `ShoppingCart.AddProduct()` enforces pricing via a domain
  service `IProductPriceCalculator`. Events are named in the past tense
  (`ShoppingCartOpened`, `IncidentLogged`, `AgentAssignedToIncident`), carrying only the
  data needed to reconstruct state.

  `OrderSaga` implements a Process Manager: it implements multiple `IEventHandler<TEvent>`
  interfaces, reacting to `CartFinalized` to issue `InitializeOrder`, then `OrderInitiated`
  to issue `RequestPayment`, then `PaymentFinalized` to issue `RecordOrderPayment`,
  continuing through `PackageWasSent` to `CompleteOrder`, with compensating commands
  (`CancelOrder`, `DiscardPayment`) on `ProductWasOutOfStock`. This is a textbook
  saga coordinating a distributed multi-step business process through events.

  `Core/Decider/Decider.cs` encodes the functional DDD Decider pattern as a generic record:
  `Decider<TState, TCommand, TEvent>(Decide, Evolve, GetInitialState)`. The Helpdesk sample
  applies the functional style exclusively â€” `Incident` is a plain `record` with static
  `Apply` methods rather than an OO aggregate base class, and `IncidentService` is a static
  class of pure `Handle(state, command) -> event` functions with no side effects.

  Bounded contexts are enforced at the project level: `Carts.csproj`, `Orders.csproj`,
  `Payments.csproj`, `Shipments.csproj` are separate assemblies with no direct cross-context
  references; cross-context communication occurs exclusively through events published to
  Kafka or the in-process event bus.

  ### Styles Considered But Not Primary

  - Hexagonal Architecture: Port/adapter separation exists (Core.Marten, Core.EventStoreDB,
    Core.Kafka are infrastructure adapters behind `IMartenRepository`, `ICommandBus`,
    `IEventBus` ports) but the codebase does not organise itself around hexagonal layers â€”
    the dominant organising principle is event-centric.
  - Microservices: The ECommerce sample decomposes into Carts, Orders, Payments, Shipments
    services communicable over Kafka, but they share a single solution and are deployed as a
    single `backend` Docker image in the base compose file; the multi-service topology is a
    teaching pattern, not an independently deployable microservice fleet.
  - Pipeline: Event stream subscriptions with checkpoint-tracked consumption form a pipeline
    topology, but this is a delivery mechanism for the event-driven pattern rather than an
    independent architectural style.

  ### Confidence

  0.95 â€” Event-Driven and CQRS are unambiguous from code structure, interfaces, and
  runtime behaviour. DDD building blocks (Aggregate, ProcessManager, Decider, bounded
  contexts, past-tense events) are central design constructs rather than incidental patterns.
  Minor uncertainty reflects that this is a multi-purpose reference repo whose samples
  intentionally demonstrate style variation, making any single classification a summary
  of the dominant pattern rather than a universal descriptor.
