classification_reasoning: |
  ## Architecture Classification — NorthwindTraders (JasonGT)

  ### Primary Style: Hexagonal Architecture (confidence 0.93)

  The codebase is organized around strict ports-and-adapters dependency inversion
  across six C# projects grouped into three solution folders (Core, Infrastructure,
  Presentation).

  Structural evidence:
  - `Src/Domain/Domain.csproj` has zero project references (pure .NET Standard 2.1).
    This is the innermost ring with no knowledge of any outer layer.
  - `Src/Application/Application.csproj` references only Domain and Common. It
    defines five interface ports:
      - `INorthwindDbContext` — data access port
      - `ICurrentUserService` — authentication context port
      - `INotificationService` — messaging port
      - `ICsvFileBuilder` — file generation port
      - `IUserManager` — user management port
  - `Src/Persistence/NorthwindDbContext.cs` declares
    `public class NorthwindDbContext : DbContext, INorthwindDbContext`, acting as
    the data-access adapter. The Persistence project references Application.
  - `Src/Infrastructure/NotificationService.cs` implements `INotificationService`,
    and `Src/Infrastructure/Files/CsvFileBuilder.cs` implements `ICsvFileBuilder`.
    Infrastructure references Application.
  - `Src/WebUI/Services/CurrentUserService.cs` implements `ICurrentUserService`
    by reading from the ASP.NET Core HTTP context. WebUI references Infrastructure
    and Persistence (the outermost ring).
  - `Northwind.sln` solution folder nesting confirms the intent:
      - Core folder: Common, Domain, Application
      - Infrastructure folder: Infrastructure, Persistence
      - Presentation folder: WebUI

  All dependency arrows point inward toward Domain. Outer layers know about inner
  layers; inner layers know nothing about outer layers. This is the defining
  structural characteristic of Hexagonal Architecture (Ports and Adapters).

  ### Secondary Style: CQRS (confidence 0.91)

  The Application layer enforces Command/Query separation across all feature areas:

  Commands (state mutation via INorthwindDbContext port):
  - `CreateProductCommand` / `CreateProductCommandHandler`
  - `UpdateProductCommand` / `UpdateProductCommandHandler`
  - `DeleteProductCommand` / `DeleteProductCommandHandler`
  - `CreateCustomerCommand`, `UpdateCustomerCommand`, `DeleteCustomerCommand`
  - `UpsertCategoryCommand`, `DeleteCategoryCommand`
  - `UpsertEmployeeCommand`, `DeleteEmployeeCommand`

  Queries (read-optimized ViewModels via AutoMapper):
  - `GetProductsListQuery` → `ProductsListVm`
  - `GetProductDetailQuery` → `ProductDetailVm`
  - `GetProductsFileQuery` → `ProductsFileVm` (CSV download)
  - `GetCustomersListQuery`, `GetCustomerDetailQuery`
  - `GetEmployeesListQuery`, `GetEmployeeDetailQuery`
  - `GetCategoriesListQuery`

  All are dispatched via MediatR 7 `IRequestHandler<TRequest, TResponse>`.
  Controllers contain no business logic — they delegate entirely to MediatR:
  `var vm = await Mediator.Send(new GetProductsListQuery());`

  Cross-cutting pipeline behaviours apply uniformly:
  - `RequestValidationBehavior<TRequest, TResponse>` — FluentValidation
  - `RequestPerformanceBehaviour<TRequest, TResponse>` — 500 ms threshold logging
  - `RequestLogger<TRequest, TResponse>` — pre-handle request logging

  This is CQRS at the application use-case level, not at the database level
  (single NorthwindDbContext serves both reads and writes).

  ### Domain-Driven Design elements (tactical, not strategic)

  Some DDD tactical patterns are present but do not rise to primary classification:
  - `ValueObject` abstract base class in `Src/Domain/Common/ValueObject.cs`
  - `AdAccount` value object with factory method `AdAccount.For(string)` and
    domain exception `AdAccountInvalidException`
  - `AuditableEntity` tracking CreatedBy, Created, LastModifiedBy, LastModified

  Strategic DDD is absent:
  - No Aggregate Root pattern or aggregate enforcement
  - No domain events or domain event handlers
  - No bounded contexts; single flat domain model for all Northwind entities
  - No repository pattern abstraction (DbContext exposed directly via interface)

  ### Deployment Topology

  Single deployable unit: one ASP.NET Core 3.0 process hosting both the REST API
  (`/api/...` controllers) and the Angular SPA (`ClientApp/` via SpaServices). One
  SQL Server database accessed via NorthwindDbContext (business data) and a separate
  ApplicationDbContext (identity data). CI/CD via Azure Pipelines. Archived in 2023.

  ### Rejected Styles

  - **Layered (traditional)**: Dependencies are inverted (inner layers define
    interfaces that outer layers implement), not traditional top-to-bottom layering.
  - **Modular Monolith**: The defining characteristic is ports-and-adapters isolation,
    not vertical module partitioning with independent data ownership.
  - **Microservices**: Single deployable artifact, single database, no inter-service
    communication.
  - **Event-Driven**: No message broker, no event bus, no asynchronous domain events
    published across process boundaries. MediatR notifications are in-process only
    and not used for domain events in this repo (unlike its successor CleanArchitecture).
  - **Domain-Driven Design (primary)**: Only tactical DDD patterns present; no
    aggregate roots, no bounded contexts, no strategic DDD structure.
