one_line_summary: "A GraphQL-native composable commerce backend built as a modular monolith (18 Django domain apps, single PostgreSQL, single GraphQL endpoint) with an event-driven webhook bus (100+ async + 20+ sync event types via Celery/SQS/Pub/Sub) and a microkernel plugin system (BasePlugin with 100+ hook methods, PluginsManager chain)."
classification_reasoning: "Saleor exhibits a three-style composition: Modular Monolith as primary, Event-Driven as secondary, and Microkernel as tertiary.\n\nMODULAR MONOLITH (primary, 0.90): The entire backend is a single Django codebase deployed as one WSGI/ASGI process and one Celery worker pool, sharing a single PostgreSQL database. INSTALLED_APPS in saleor/settings.py lists 18 first-party Django apps (account, order, checkout, product, payment, discount, giftcard, warehouse, shipping, tax, channel, attribute, webhook, app, plugins, csv, invoice, thumbnail) each representing a bounded domain with its own models.py, migrations/, and optional tasks.py. The public surface is a single GraphQL endpoint at /graphql/ assembled in saleor/graphql/api.py by composing per-domain Query, Mutation, and Subscription mixin classes from each app's schema.py. Intra-domain communication is direct Python imports — checkout/complete_checkout.py imports order.actions.order_created and warehouse.management.decrease_stock without any network boundary. A primary/replica database router (saleor.core.db_routers.PrimaryReplicaRouter) provides read scaling but does not split the schema.\n\nEVENT-DRIVEN (secondary, 0.87): A first-class webhook subsystem in saleor/webhook/ provides async and sync event delivery to registered external Apps. WebhookEventAsyncType defines 100+ domain events (ORDER_CREATED, CHECKOUT_UPDATED, PRODUCT_VARIANT_OUT_OF_STOCK, etc.) delivered asynchronously via Celery tasks with 5-retry backoff (10s). WebhookEventSyncType defines 20+ synchronous callback events (CHECKOUT_CALCULATE_TAXES, SHIPPING_LIST_METHODS_FOR_CHECKOUT, PAYMENT_AUTHORIZE, TRANSACTION_CHARGE_REQUESTED) used for real-time tax computation, shipping rate resolution, and payment gateway delegation. Three transport mechanisms in saleor/webhook/transport/utils.py: HTTP/HTTPS, AWS SQS (awssqs:// scheme via custom kombu transport), and Google Cloud Pub/Sub (gcpubsub:// scheme via pubsub_v1). A Redis-backed circuit breaker (saleor/webhook/circuit_breaker/breaker_board.py) guards sync webhook calls with TTL window, failure-count threshold, half-open recovery state, and configurable cooldown. Celery Beat drives 15+ periodic domain tasks (expire orders, update search vectors, price recalculation, send promotion webhooks).\n\nMICROKERNEL (tertiary, 0.80): The plugin system in saleor/plugins/ is a textbook microkernel: BasePlugin (saleor/plugins/base_plugin.py, 1,899 lines) defines 100+ hook methods covering tax calculations, payment authorization, email notifications, and every order/checkout lifecycle event. PluginsManager (saleor/plugins/manager.py) is the kernel dispatcher — it loads plugins from settings.PLUGINS, maintains per-channel plugin caches, and chains hooks via __run_method_on_plugins/__run_method_on_single_plugin. Bundled plugin implementations (avatax, sendgrid, user_email, admin_email, openid_connect) are packaged in saleor/plugins/. External Apps (saleor/app/models.py) extend this further by registering webhook subscriptions that receive synchronous callbacks for tax/shipping/payment hooks, effectively acting as out-of-process plugin implementations without modifying core code.\n\nRULED OUT - Microservices: Single codebase, single Docker image, single shared PostgreSQL database; intra-domain calls are direct Python function calls with no network boundary; no per-service databases or independent deployment units.\n\nRULED OUT - Layered: Organization is vertical by domain (account, order, checkout, product) not horizontal by technical tier; each app owns its own models, business logic, and GraphQL schema in a consistent vertical slice.\n\nRULED OUT - Service-Based: No separation into coarse-grained independently-deployable services sharing a central database; all 18 domain apps are co-deployed and co-located in a single process boundary.\n\nRULED OUT - CQRS: While there is a read-replica database router, there are no separate read/write models, command buses, or event sourcing — only standard Django ORM patterns with optional replica routing."
