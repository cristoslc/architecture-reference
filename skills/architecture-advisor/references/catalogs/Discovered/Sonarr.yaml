one_line_summary: An automated TV series PVR built as a Modular Monolith with a Microkernel
  plugin layer ‚Äî the ThingiProvider framework lets indexers, download clients, and
  notification targets be added at runtime without touching core, while an internal
  EventAggregator and CommandExecutor coordinate all domain workflows within a single
  ASP.NET Core process.
classification_reasoning: "## Primary Style: Modular Monolith\n\nSonarr is a single\
  \ deployable ASP.NET Core process bootstrapped in\n`NzbDrone.Host/Bootstrap.cs`\
  \ using DryIoc (`AutoAddServices(ASSEMBLIES)`).\nThe solution contains ~27 projects,\
  \ all compiled into one binary:\n\n- `NzbDrone.Core` ‚Äî all business logic (~2,794\
  \ C# files)\n- `Sonarr.Api.V3` / `Sonarr.Api.V5` ‚Äî versioned REST controllers\n\
  - `Sonarr.Http` ‚Äî middleware, authentication, error handling\n- `NzbDrone.SignalR`\
  \ ‚Äî real-time WebSocket push via MessageHub\n- `NzbDrone.Common` ‚Äî shared infrastructure\
  \ (HTTP, disk, DI, serialization)\n- `NzbDrone.Windows` / `NzbDrone.Mono` ‚Äî platform-specific\
  \ shims\n\nWithin `NzbDrone.Core`, every functional domain is organized as a vertical\n\
  slice: `Tv/` (Series/Episode/Season entities and services), `Download/`\n(client\
  \ abstraction, completion/failure processing), `Indexers/` (RSS sync\npipeline),\
  \ `DecisionEngine/` (20+ chain-of-responsibility specifications),\n`MediaFiles/`\
  \ (disk scan, import, rename), `Notifications/` (25 plugin targets),\n`Queue/`,\
  \ `History/`, and `ImportLists/`.\n\nA single SQLite or PostgreSQL database accessed\
  \ through `BasicRepository<T>`\n(Dapper-backed, via `MainDatabase`) serves all modules.\
  \ 227 ordered FluentMigrator\nmigration scripts maintain the schema.\n\n## Secondary\
  \ Style: Microkernel\n\nThe `ThingiProvider` framework (`NzbDrone.Core/ThingiProvider/`)\
  \ is a generic\nplugin bus. Every extension category ‚Äî indexers, download clients,\
  \ notifications,\nimport lists, metadata providers ‚Äî implements `IProvider` and\
  \ registers via\n`ProviderDefinition` / `ProviderFactory<TProvider, TDef>`, resolved\
  \ from DryIoc\nat runtime. Concrete plugin counts:\n\n- ~20 download client implementations\
  \ (qBittorrent, Transmission, Deluge,\n  SABnzbd, rTorrent, Aria2, Flood, Freebox,\
  \ Nzbget, Tribler, uTorrent, Vuze, etc.)\n- 25 notification targets (Discord, Email,\
  \ Webhook, Apprise, Gotify, Slack,\n  Plex, Notifiarr, Ntfy, Signal, Telegram,\
  \ Twitter, Trakt, Synology, etc.)\n- ~10 indexer types (Newznab, Torznab, BroadcastheNet,\
  \ FileList, HDBits, Nyaa,\n  Torrentleech, TorrentRss, IPTorrents, Fanzub)\n- Import\
  \ list sources (AniList, Trakt, Custom)\n\nAdding any new extension requires zero\
  \ changes to the factory core; DryIoc\n`AutoAddServices` discovers it automatically.\n\
  \nThe internal event/command infrastructure reinforces the plugin model:\n\n- `EventAggregator.PublishEvent<TEvent>`\
  \ resolves all `IHandle<TEvent>`\n  (synchronous) and `IHandleAsync<TEvent>` (async\
  \ via TaskFactory) subscribers\n  from the container and dispatches in order.\n\
  - `CommandExecutor` resolves `IExecute<TCommand>` handlers from the container\n\
  \  and runs them across three worker threads from a `CommandQueue`.\n- Example flow:\
  \ `RssSyncCommand` ‚Üí `RssSyncService` ‚Üí `FetchAndParseRssService`\n  ‚Üí `DownloadDecisionMaker`\
  \ (20+ specs) ‚Üí `ProcessDownloadDecisions` ‚Üí\n  `EpisodeGrabbedEvent` ‚Üí `NotificationService`\
  \ fans out to all 25 targets.\n\n## What This Is NOT\n\n- **NOT Microservices**:\
  \ One binary, one database, no network service boundary.\n  The *arr ecosystem is\
  \ Service-Based at the ecosystem level, but each member\n  is a self-contained monolith.\n\
  - **NOT Layered (horizontal)**: Organizing principle is vertical domain modules\n\
  \  within `NzbDrone.Core`, not horizontal technical tiers.\n- **NOT Event-Driven\
  \ (async messaging)**: `EventAggregator` is in-process\n  publish/subscribe ‚Äî no\
  \ Kafka, RabbitMQ, or durable queues.\n- **NOT CQRS**: No separate read/write models;\
  \ all reads and writes through\n  the same `BasicRepository<T>` and service layer.\n\
  \n## Quality Attribute Evidence\n\n- **Modularity**: Vertical domain slices in `NzbDrone.Core`;\
  \ ThingiProvider plugin\n  contracts enforce separation between core and extensions;\
  \ DryIoc auto-discovery.\n- **Evolvability**: 227 ordered DB migrations; adding\
  \ indexers/download-clients/\n  notifications requires no core changes; dual Sonarr.Api.V3/V5\
  \ versioned API.\n- **Observability**: NLog throughout; SignalR `MessageHub` pushes\
  \ real-time\n  command/event status to React UI; 26 `HealthCheck/Checks/` covering\
  \ indexers,\n  download clients, root folders, update service, and API key.\n- **Deployability**:\
  \ Cross-platform .NET 10 (Windows service, Linux daemon, Docker);\n  SQLite default,\
  \ PostgreSQL optional; Kestrel embedded; no IIS dependency.\n- **Fault Tolerance**:\
  \ `CommandExecutor` catches per-command exceptions and marks\n  commands failed without\
  \ crashing worker threads; `ProviderFactory` removes\n  missing implementations\
  \ on startup; `FailedDownloadService` handles download\n  failure retry.\n- **Scalability**:\
  \ Single-process, single-host design; vertical scaling only;\n  PostgreSQL support\
  \ allows external DB for home-lab multi-container setups.\n"
