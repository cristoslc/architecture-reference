one_line_summary: Single-process schema registry built as a Maven multi-module monolith
  with a microkernel plugin system for schema providers, REST extensions, and ID generators,
  layered internally as REST resources -> domain service -> Kafka-backed storage.
review_notes: 30+ Maven modules in one deployable JVM process; three formal plugin extension
  points (SchemaProvider, SchemaRegistryResourceExtension, IdGenerator); DEK registry
  installs itself as a plugin via DekRegistryResourceExtension; strict three-layer
  structure within core (REST -> KafkaSchemaRegistry -> KafkaStore/InMemoryCache);
  leader election via Kafka consumer group protocol; all writes serialized through
  the leader and propagated via compacted _schemas topic.
