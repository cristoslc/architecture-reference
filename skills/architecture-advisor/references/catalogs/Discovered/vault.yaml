classification_reasoning: "Vault's Core struct (vault/core.go) contains no domain
  logic — only routing and lifecycle. All functional behavior lives in plugins that
  implement the logical.Backend interface (sdk/logical/logical.go) via the Factory
  constructor type. External plugins run as isolated gRPC child processes via
  github.com/hashicorp/go-plugin with HMAC handshake verification. Builtin and
  external plugins use identical contracts through the PluginCatalog. The Router
  uses radix-tree longest-prefix matching to dispatch to mounted backends. A
  layered processing pipeline (HTTP handler → Core → ACL/token → Router →
  Backend → SecurityBarrier → physical storage) exists within the kernel but is
  subordinate to the Microkernel classification. The EventBus (vault/eventbus/bus.go)
  is peripheral — it carries plugin observability events, not the primary
  request/response flow. Rejected: Microservices (single binary, no independent
  deployables), Modular Monolith (external plugin process isolation crosses
  monolith boundary), Layered (no horizontal tiering of the whole system),
  Service-Based (no coarse-grained independent service units), Event-Driven
  (synchronous RPC is the primary path)."
