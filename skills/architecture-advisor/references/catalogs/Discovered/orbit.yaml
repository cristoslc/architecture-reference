one_line_summary: Distributed virtual actor framework with a fixed six-step server
  message pipeline and a microkernel plugin surface for node/addressable directories
  and metrics backends.
classification_reasoning: "## Architecture Classification: Pipeline + Microkernel\n\
  \n### Primary Style: Pipeline (0.90)\n\nThe server's processing core is an explicit,\
  \ ordered, bidirectional message pipeline defined in `PipelineSteps.kt` as an immutable\
  \ `Array<PipelineStep>`: IdentityStep \u2192 RoutingStep \u2192 PlacementStep \u2192\
  \ VerifyStep \u2192 AuthStep \u2192 TransportStep. Every inbound and outbound message\
  \ flows through this chain via `PipelineContext.next(msg)`. `Pipeline.kt` feeds\
  \ a `RailWorker` (buffered Kotlin channel with 32 parallel worker coroutines and\
  \ a 10 000-message buffer). The comment in `PipelineSteps.kt` states explicitly:\
  \ 'inbound is up, outbound is down'. Stages are non-dynamic (no runtime composition\
  \ or reordering) and each stage has a single concern: identity resolution, shortest-path\
  \ routing (Dijkstra via jgrapht), actor placement (locateOrPlace against AddressableDirectory),\
  \ verification, auth, and final gRPC delivery. This is the architectural spine of\
  \ the entire server.\n\n### Secondary Style: Microkernel (0.82)\n\n`OrbitServerConfig`\
  \ exposes three `ExternallyConfigured<T>` plugin slots: `NodeDirectory` (local\
  \ in-memory or EtcdNodeDirectory), `AddressableDirectory` (local or EtcdAddressableDirectory),\
  \ and `MeterRegistry` (local or PrometheusMetrics). A fourth hook, `containerOverrides:\
  \ ComponentContainerRoot.() -> Unit`, allows arbitrary DI overrides. On the client\
  \ side, `OrbitClientConfig` exposes `AddressableConstructor` (default reflection\
  \ or SpringAddressableConstructor) and `NodeLeaseRenewalFailedHandler`. The etcd\
  \ and Prometheus modules (`orbit-server-etcd`, `orbit-server-prometheus`) are separate\
  \ Gradle subprojects consumed as optional plugins. This plugin surface is the primary\
  \ operational configuration axis: swapping from local to etcd directories is what\
  \ enables multi-node cluster deployments (evidenced in docker-compose.yml and Helm\
  \ chart).\n\n### Application Model: Virtual Actor Pattern\n\nBuilt on top of the\
  \ pipeline, the client SDK implements a virtual actor model. `ExecutionSystem` manages\
  \ a `ConcurrentHashMap<AddressableReference, ExecutionHandle>` of live actors with\
  \ TTL-based deactivation and lease renewal. `AddressableManager` on the server performs\
  \ placement via `locateOrPlace` with retry and reroute logic. gRPC uses a single\
  \ persistent bidirectional stream per client (`Connection.OpenStream`). Multiple\
  \ server nodes form a mesh; `ClusterManager` builds a directed visibility graph\
  \ for Dijkstra routing; `RemoteMeshNodeManager` maintains peer-to-peer connections\
  \ between mesh nodes. This actor runtime is the application model, not a separate\
  \ architecture style.\n"
